<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DECEPTION.SYS</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="style.css?v=3.0">
</head>
<body>

    <div id="global-loader">
        <div class="spinner"></div>
    </div>

    <div id="auth-modal" class="auth-overlay hidden">
        <div class="auth-card">
            <button class="close-modal-btn" onclick="closeAuthModal()"><i class="ph ph-x"></i></button>
            
            <div id="modal-welcome-view">
                <i class="ph-duotone ph-fingerprint" style="font-size: 56px; color: var(--accent-coral); margin-bottom: 20px; display: inline-block;"></i>
                <h2>سجل دخولك للنظام</h2>
                <p>الولوج السحابي لـ DECEPTION.SYS مطلوب لحفظ إحصائياتك وتقدمك.</p>
                <button class="btn-core" onclick="switchModalMode('forms')">تسجيل الدخول</button>
                <button class="link-guest" onclick="enterAsGuest()">المتابعة كزائر مؤقت</button>
            </div>

            <div id="modal-form-view" style="display: none;">
                <div class="modal-tabs">
                    <button id="tab-login" class="modal-tab-btn active" onclick="setFormType('login')">دخول</button>
                    <button id="tab-register" class="modal-tab-btn" onclick="setFormType('register')">حساب جديد</button>
                </div>
                
                <div id="auth-error" class="auth-error-msg"></div>

                <form id="firebase-form" onsubmit="handleAuthSubmit(event)" autocomplete="off">
                    <div id="login-fields">
                        <div class="input-wrapper">
                            <label>المعرف (Email / Username)</label>
                            <input type="text" id="login-id" class="premium-input" placeholder="User details" required>
                        </div>
                        <div class="input-wrapper">
                            <label>رمز المرور</label>
                            <input type="password" id="login-password" class="premium-input" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div id="register-fields" style="display: none;">
                        <div class="input-wrapper">
                            <label>اسم المستخدم (مميز)</label>
                            <input type="text" id="reg-username" class="premium-input" placeholder="PlayerName">
                        </div>
                        <div class="input-wrapper">
                            <label>البريد الإلكتروني</label>
                            <input type="email" id="reg-email" class="premium-input" placeholder="name@domain.com">
                        </div>
                        <div class="input-wrapper">
                            <label>رمز المرور</label>
                            <input type="password" id="reg-password" class="premium-input" placeholder="••••••••">
                        </div>
                        <div class="input-wrapper">
                            <label>تأكيد الرمز</label>
                            <input type="password" id="reg-confirm" class="premium-input" placeholder="••••••••">
                        </div>
                    </div>

                    <button type="submit" class="btn-core" id="modal-submit-btn" style="margin-top: 15px;">بدء الاتصال</button>
                </form>
            </div>
        </div>
    </div>

    <div id="app-shell" class="app-shell">
        
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">D</div>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active" data-tooltip="الرئيسية" onclick="loadFragment('home', this)"><i class="ph-fill ph-house"></i></button>
                <button class="nav-btn" data-tooltip="غرف اللعب" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i></button>
                <button class="nav-btn" data-tooltip="المتصدرون" onclick="loadFragment('leaderboard', this)"><i class="ph ph-trophy"></i></button>
                <button class="nav-btn" data-tooltip="المتجر" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i></button>
                <button class="nav-btn" data-tooltip="الحساب" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i></button>
            </nav>
            <div class="theme-wrapper">
                <button class="theme-btn active-theme" onclick="toggleTheme('dark')"><i class="ph-fill ph-moon"></i></button>
                <button class="theme-btn" onclick="toggleTheme('light')"><i class="ph ph-sun"></i></button>
            </div>
        </aside>

        <main class="main-viewport">
            <header class="top-header">
                <div class="header-page-info">
                    <h1 class="page-title" id="page-title">الرئيسية</h1>
                    <div class="server-status">
                        <div class="status-dot"></div> Online (24ms)
                    </div>
                </div>

                <div class="header-actions">
                    <button class="header-icon-btn"><i class="ph ph-gear"></i></button>
                    <button class="header-icon-btn">
                        <i class="ph ph-bell"></i>
                        <span class="notification-dot"></span>
                    </button>
                    
                    <div style="position: relative;">
                        <div class="profile-trigger" id="profile-trigger" onclick="toggleUserDropdown()">
                            <div class="profile-avatar-fallback" id="header-avatar-fallback">ز</div>
                            <div class="profile-info">
                                <span class="profile-name" id="header-name">زائر</span>
                                <span class="profile-status" id="header-status">غير مسجل</span>
                            </div>
                            <i class="ph-bold ph-caret-down"></i>
                        </div>
                        <div class="user-dropdown" id="user-dropdown">
                            </div>
                    </div>
                </div>
            </header>
            
            <div class="dynamic-content" id="content-holder">
                </div>
        </main>

        <aside class="right-sidebar">
            <div class="friends-header" id="friends-title">الأصدقاء</div>
            <div id="friends-container">
                </div>
        </aside>

        <nav class="bottom-bar">
            <button class="bottom-tab active" onclick="loadFragment('home', this)"><i class="ph-fill ph-house"></i></button>
            <button class="bottom-tab" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i></button>
            <button class="bottom-tab" onclick="loadFragment('leaderboard', this)"><i class="ph ph-trophy"></i></button>
            <button class="bottom-tab" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i></button>
            <button class="bottom-tab" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i></button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLFj5UTX9EtuehoMWV02gkPsAgKPvMhzI",
            authDomain: "web-game-260b5.firebaseapp.com",
            projectId: "web-game-260b5",
            storageBucket: "web-game-260b5.firebasestorage.app",
            messagingSenderId: "682229509792",
            appId: "1:682229509792:web:11b4a404459630fcd6a3c5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        window.authInstance = auth; window.dbInstance = db; window.signOutFunc = signOut;
        window.isGuest = false; window.currentFormMode = 'login'; 

        const hideLoader = () => {
            const loader = document.getElementById('global-loader');
            if(loader) { loader.style.opacity = '0'; setTimeout(() => loader.style.visibility = 'hidden', 400); }
        };

        // تحديث شريط الأصدقاء الأيمن بناءً على حالة المستخدم
        const updateFriendsSidebar = (isLoggedIn, hasFriends = false) => {
            const container = document.getElementById('friends-container');
            const title = document.getElementById('friends-title');
            
            if (!isLoggedIn) {
                title.style.display = 'none';
                container.innerHTML = `
                    <div class="guest-friends-msg">
                        <i class="ph-duotone ph-users-slash"></i>
                        <span>سجل دخولك لترى الأصدقاء</span>
                    </div>`;
            } else {
                title.style.display = 'block';
                if (!hasFriends) {
                    // عضو جديد ليس لديه أصدقاء: دائرة الإضافة فقط
                    container.innerHTML = `<button class="add-friend-btn" title="إضافة صديق"><i class="ph-bold ph-plus"></i></button>`;
                } else {
                    // مسجل ولديه أصدقاء (قالب جاهز للمستقبل عند ربط الداتابيس)
                    container.innerHTML = `
                        <div class="friend-avatar"><img src="https://i.pravatar.cc/150?img=11"><div class="online-dot"></div></div>
                        <div class="friend-avatar"><img src="https://i.pravatar.cc/150?img=12"><div class="online-dot"></div></div>
                        <button class="add-friend-btn" title="إضافة صديق"><i class="ph-bold ph-plus"></i></button>
                    `;
                }
            }
        };

        onAuthStateChanged(auth, async (user) => {
            const dropdown = document.getElementById('user-dropdown');
            const nameEl = document.getElementById('header-name');
            const statusEl = document.getElementById('header-status');
            const fallbackAvatar = document.getElementById('header-avatar-fallback');

            if (user) {
                window.isGuest = false;
                let displayName = user.email.split('@')[0];
                let matches = 0, wins = 0;

                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const data = userDoc.data();
                        displayName = data.username || displayName;
                        matches = data.matches || 0; wins = data.wins || 0;
                    }
                } catch (err) { console.warn("Error fetching data", err); }

                fallbackAvatar.innerText = displayName.charAt(0).toUpperCase();
                nameEl.innerText = displayName;
                statusEl.innerText = "Online";
                statusEl.style.color = "var(--accent-green)";

                dropdown.innerHTML = `
                    <div class="dropdown-header">
                        <div class="dropdown-name-ar">${displayName}</div>
                        <div class="dropdown-stats">
                            <div class="stat-item"><span class="stat-label">مباريات</span><span class="stat-value">${matches}</span></div>
                            <div class="stat-item"><span class="stat-label">انتصارات</span><span class="stat-value">${wins}</span></div>
                        </div>
                    </div>
                    <button class="dropdown-item" onclick="loadFragment('profile'); toggleUserDropdown();"><i class="ph-duotone ph-user-circle"></i> إعدادات الحساب</button>
                    <button class="dropdown-item logout" onclick="handleLogout()"><i class="ph-duotone ph-sign-out"></i> تسجيل الخروج</button>
                `;

                // تحديث شريط الأصدقاء (نرسل false حالياً لعدم وجود نظام أصدقاء في الداتابيس حتى الآن فتظهر أيقونة + فقط)
                updateFriendsSidebar(true, false);

                document.getElementById('auth-modal').classList.add('hidden');
                document.getElementById('app-shell').classList.add('unlocked');
                loadFragment('home', document.querySelector('.nav-btn.active'));
                hideLoader();
            } else {
                if (!window.isGuest) {
                    document.getElementById('auth-modal').classList.remove('hidden');
                    document.getElementById('app-shell').classList.remove('unlocked');
                }
                hideLoader();
            }
        });

        // تم اختصار أكواد المصادقة هنا لعدم تكرارها، فهي تعمل بنسبة 100% كما أرسلتها أنت في الكود الأول.
        // فقط تأكد من وضع دالة handleAuthSubmit هنا أو إبقائها كما كانت في ملفك الأصلي.
        window.handleAuthSubmit = async function(e) { /* نفس كودك السابق يعمل بشكل ممتاز */ e.preventDefault(); }
    </script>

    <script>
        function toggleUserDropdown() { 
            const trigger = document.getElementById('profile-trigger');
            trigger.classList.toggle('active');
            document.getElementById('user-dropdown').classList.toggle('show'); 
        }

        window.onclick = function(event) {
            if (!event.target.closest('.profile-trigger') && !event.target.closest('.user-dropdown')) {
                document.getElementById('profile-trigger').classList.remove('active');
                const dropdowns = document.getElementsByClassName("user-dropdown");
                for (let i = 0; i < dropdowns.length; i++) {
                    dropdowns[i].classList.remove('show');
                }
            }
        }

        function handleLogout() {
            window.signOutFunc(window.authInstance).then(() => {
                toggleUserDropdown();
                document.getElementById('auth-modal').classList.remove('hidden');
                document.getElementById('app-shell').classList.remove('unlocked');
            });
        }

        function switchModalMode(mode) {
            if(mode === 'forms') {
                document.getElementById('modal-welcome-view').style.display = 'none';
                document.getElementById('modal-form-view').style.display = 'block';
            }
        }

        function setFormType(type) {
            window.currentFormMode = type;
            document.getElementById('tab-login').classList.toggle('active', type === 'login');
            document.getElementById('tab-register').classList.toggle('active', type === 'register');
            document.getElementById('login-fields').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('register-fields').style.display = type === 'register' ? 'block' : 'none';
        }

        function enterAsGuest() {
            window.isGuest = true;
            document.getElementById('header-name').innerText = "زائر";
            document.getElementById('header-status').innerText = "غير مسجل";
            document.getElementById('header-status').style.color = "var(--text-dim)";
            document.getElementById('header-avatar-fallback').innerText = "ز";
            
            // تحديث شريط الأصدقاء للزائر
            const container = document.getElementById('friends-container');
            document.getElementById('friends-title').style.display = 'none';
            container.innerHTML = `
                <div class="guest-friends-msg">
                    <i class="ph-duotone ph-users-slash"></i>
                    <span>سجل دخولك لترى الأصدقاء</span>
                </div>`;

            document.getElementById('user-dropdown').innerHTML = `
                <div class="dropdown-header">
                    <div class="dropdown-name-ar" style="color: var(--text-dim);">زائر غير مسجل</div>
                </div>
                <button class="dropdown-item" onclick="document.getElementById('auth-modal').classList.remove('hidden'); toggleUserDropdown(); switchModalMode('forms'); setFormType('login');"><i class="ph-duotone ph-sign-in"></i> تسجيل الدخول</button>
            `;

            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('app-shell').classList.add('unlocked');
            loadFragment('home', document.querySelector('.nav-btn.active'));
        }

        function closeAuthModal() {
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('app-shell').classList.add('unlocked');
            if(!window.isGuest) enterAsGuest();
        }

        function loadFragment(pageName, element) {
            const contentHolder = document.getElementById('content-holder');
            const titles = { 'home': 'الرئيسية', 'play': 'غرف اللعب', 'leaderboard': 'المتصدرون', 'store': 'متجر المزايا', 'profile': 'الملف الشخصي' };
            
            document.getElementById('page-title').innerText = titles[pageName];
            
            // Change Active Icons
            document.querySelectorAll('.nav-btn, .bottom-tab').forEach(btn => {
                btn.classList.remove('active');
                const icon = btn.querySelector('i');
                if(icon) icon.className = icon.className.replace('ph-fill', 'ph'); // Reset to outline
            });

            if(element) {
                element.classList.add('active');
                const icon = element.querySelector('i');
                if(icon) icon.className = icon.className.replace('ph', 'ph-fill'); // Set active to fill
                
                // Sync mobile/desktop active states
                const index = Array.from(element.parentElement.children).indexOf(element);
                const mobileTab = document.querySelectorAll('.bottom-tab')[index];
                if(mobileTab && element.classList.contains('nav-btn')) {
                    mobileTab.classList.add('active');
                    mobileTab.querySelector('i').className = mobileTab.querySelector('i').className.replace('ph', 'ph-fill');
                }
            }

            // Fetch simulated or actual HTML
            contentHolder.innerHTML = `<div style="display:flex; justify-content:center; align-items:center; height:100%; color:var(--text-dim);">جاري تحميل ${titles[pageName]}...</div>`;
            // fetch(pageName + '.html').then(...).catch(...)
        }
    </script>
</body>
</html>
