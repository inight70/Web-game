<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مستودع الخداع - اللوبي</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* =========================================
           المتغيرات العالمية (الوضع الليلي الافتراضي)
           ========================================= */
        :root {
            --bg-base: #000000;
            --surface-panel: #09090b;
            --border-line: #1e1e20;
            --text-main: #ffffff;
            --text-dim: #71717a;
            --glass-bg: rgba(0, 0, 0, 0.75);
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* =========================================
           المتغيرات العالمية (الوضع النهاري)
           ========================================= */
        [data-theme="light"] {
            --bg-base: #f4f4f5;
            --surface-panel: #ffffff;
            --border-line: #e4e4e7;
            --text-main: #09090b;
            --text-dim: #71717a;
            --glass-bg: rgba(255, 255, 255, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-stack);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* =========================================
           1. شاشة تسجيل الدخول الزجاجية (Global Modal)
           ========================================= */
        .auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100000;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        .auth-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .auth-card {
            background-color: var(--surface-panel);
            border: 1px solid var(--border-line);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transform: translateY(0);
            transition: transform 0.4s ease;
        }
        .auth-overlay.hidden .auth-card {
            transform: translateY(30px);
        }
        .auth-card h2 { font-size: 22px; margin-bottom: 10px; }
        .auth-card p { color: var(--text-dim); font-size: 14px; margin-bottom: 25px; line-height: 1.6; }
        
        .btn-core {
            background-color: var(--text-main);
            color: var(--bg-base);
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-core:hover { opacity: 0.85; }

        /* =========================================
           2. الإطار الرئيسي للتطبيق (The Shell)
           ========================================= */
        .app-shell {
            display: flex;
            width: 100%;
            height: 100vh;
            filter: blur(10px); /* ضبابي قبل الدخول */
            pointer-events: none;
            transition: filter 0.5s ease;
        }
        .app-shell.unlocked {
            filter: blur(0);
            pointer-events: auto;
        }

        /* --- القائمة الجانبية (للكمبيوتر) --- */
        .sidebar {
            width: 250px;
            background-color: var(--bg-base);
            border-left: 1px solid var(--border-line);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .sidebar-brand {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 40px;
            padding-right: 12px;
        }
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            color: var(--text-dim);
            background: none;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            text-align: right;
            width: 100%;
            transition: all 0.2s ease;
        }
        .nav-btn i { font-size: 20px; }
        .nav-btn:hover, .nav-btn.active {
            background-color: var(--surface-panel);
            color: var(--text-main);
        }

        /* --- مساحة العرض المركزية --- */
        .main-viewport {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .top-header {
            height: 75px;
            border-bottom: 1px solid var(--border-line);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            transition: border-color 0.3s ease;
        }
        .header-title { font-size: 18px; font-weight: 600; }
        
        .header-actions { display: flex; align-items: center; gap: 20px; }
        .theme-btn {
            background: none; border: none; color: var(--text-main);
            font-size: 22px; cursor: pointer; transition: transform 0.2s;
        }
        .theme-btn:hover { transform: scale(1.1); }

        /* حاوية الملفات المنفصلة */
        .dynamic-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
        }

        .bottom-bar { display: none; }

        /* --- التجاوب مع الجوال --- */
        @media (max-width: 900px) {
            .sidebar { display: none; }
            .top-header { padding: 0 24px; }
            .dynamic-content { padding: 24px 20px 130px 20px; }

            .bottom-bar {
                display: flex;
                position: fixed;
                bottom: 24px; left: 50%; transform: translateX(-50%);
                width: calc(100% - 40px); max-width: 450px; height: 66px;
                background: var(--glass-bg);
                backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
                border: 1px solid var(--border-line);
                border-radius: 33px;
                justify-content: space-around; align-items: center;
                padding: 0 10px; z-index: 9999;
                box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            }
            .bottom-tab {
                display: flex; flex-direction: column; align-items: center; justify-content: center;
                color: var(--text-dim); background: none; border: none;
                height: 100%; flex: 1; cursor: pointer; transition: color 0.2s;
            }
            .bottom-tab i { font-size: 22px; }
            .bottom-tab span { font-size: 9px; font-weight: 500; margin-top: 3px; }
            .bottom-tab.active { color: var(--text-main); }
        }
    </style>
</head>
<body>

    <div id="auth-modal" class="auth-overlay">
        <div class="auth-card">
            <i class="ph ph-fingerprint" style="font-size: 40px; margin-bottom: 15px; color: var(--text-main);"></i>
            <h2>تأكيد الهوية</h2>
            <p>يرجى تسجيل الدخول للاتصال بقاعدة بيانات اللعبة والمزامنة.</p>
            <button class="btn-core" onclick="unlockSystem()">تسجيل الدخول</button>
        </div>
    </div>

    <div id="app-shell" class="app-shell">
        
        <aside class="sidebar">
            <div class="sidebar-brand">DECEPTION.SYS</div>
            <button class="nav-btn active" onclick="loadFragment('home', this)"><i class="ph ph-house"></i> الرئيسية</button>
            <button class="nav-btn" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i> اللعب</button>
            <button class="nav-btn" onclick="loadFragment('leaderboard', this)"><i class="ph ph-trophy"></i> المتصدرون</button>
            <button class="nav-btn" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i> المتجر</button>
            <button class="nav-btn" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i> الحساب</button>
        </aside>

        <main class="main-viewport">
            <header class="top-header">
                <div class="header-title" id="page-title">الرئيسية</div>
                <div class="header-actions">
                    <button class="theme-btn" onclick="toggleTheme()"><i id="theme-icon" class="ph ph-sun"></i></button>
                    <div style="font-size: 13px; color: var(--text-dim);">لاعب_01</div>
                </div>
            </header>

            <div class="dynamic-content" id="content-holder">
                <p style="color: var(--text-dim); text-align: center; margin-top: 50px;">جاري التهيئة...</p>
            </div>
        </main>

        <nav class="bottom-bar">
            <button class="bottom-tab active" onclick="loadFragment('home', this)"><i class="ph ph-house"></i><span>الرئيسية</span></button>
            <button class="bottom-tab" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i><span>اللعب</span></button>
            <button class="bottom-tab" onclick="loadFragment('leaderboard', this)"><i class="ph ph-trophy"></i><span>المتصدرون</span></button>
            <button class="bottom-tab" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i><span>المتجر</span></button>
            <button class="bottom-tab" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i><span>الحساب</span></button>
        </nav>

    </div>

    <script>
        // 1. فتح القفل بعد تسجيل الدخول
        function unlockSystem() {
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('app-shell').classList.add('unlocked');
            loadFragment('home', document.querySelector('.nav-btn')); // يحمل الرئيسية فور الدخول
        }

        // 2. تغيير الثيم (ليلي / نهاري)
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
                icon.classList.replace('ph-moon', 'ph-sun');
            } else {
                body.setAttribute('data-theme', 'light');
                icon.classList.replace('ph-sun', 'ph-moon');
            }
        }

        // 3. محرك جلب الملفات المستقلة (Components)
        function loadFragment(pageName, element) {
            const contentHolder = document.getElementById('content-holder');
            
            // قاموس العناوين
            const titles = { 
                'home': 'الرئيسية', 
                'play': 'غرف اللعب', 
                'leaderboard': 'المتصدرون', 
                'store': 'متجر المزايا', 
                'profile': 'إعدادات الحساب' 
            };
            document.getElementById('page-title').innerText = titles[pageName];

            // تحديث حالة الأزرار
            document.querySelectorAll('.nav-btn, .bottom-tab').forEach(btn => btn.classList.remove('active'));
            if(element) element.classList.add('active');

            // جلب الملف وعرضه
            fetch(pageName + '.html')
                .then(response => {
                    if (!response.ok) throw new Error('Not found');
                    return response.text();
                })
                .then(html => { contentHolder.innerHTML = html; })
                .catch(error => {
                    contentHolder.innerHTML = `
                        <div style="padding: 40px; border: 1px dashed var(--border-line); border-radius: 16px; text-align: center;">
                            <i class="ph ph-file-dashed" style="font-size: 32px; color: var(--text-dim); margin-bottom: 10px;"></i>
                            <p style="color: var(--text-dim); font-size: 14px;">ملف <b style="color: var(--text-main)">${pageName}.html</b> غير موجود بعد في المشروع.</p>
                            <p style="color: var(--text-dim); font-size: 12px; margin-top: 5px;">قم بإنشاء هذا الملف في GitHub ليظهر محتواه هنا.</p>
                        </div>`;
                });
        }
    </script>
</body>
</html>
