<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DECEPTION.SYS - Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>

    <div id="global-loader"><div class="spinner"></div></div>

    <div id="auth-modal" class="auth-overlay hidden">
        <div class="auth-card">
            <button class="close-modal-btn" onclick="closeAuthModal()" style="position:absolute; top:20px; left:20px; background:none; border:none; color:#8e929d; font-size:24px; cursor:pointer;"><i class="ph ph-x"></i></button>
            <div id="modal-welcome-view">
                <i class="ph ph-shield-check" style="font-size: 48px; color: var(--accent-primary); margin-bottom: 15px; display: inline-block;"></i>
                <h2 style="font-size: 24px; font-weight: 800; margin-bottom: 10px;">نظام الخداع</h2>
                <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 30px; line-height: 1.6;">قم بتسجيل الدخول للوصول إلى غرفة العمليات وحفظ تقدمك السحابي.</p>
                <button class="btn-core" onclick="switchModalMode('forms')">تسجيل الدخول / حساب جديد</button>
                <button onclick="enterAsGuest()" style="display:block; width:100%; margin-top:20px; background:none; border:none; color:var(--text-dim); cursor:pointer; font-weight:600;">المتابعة كزائر</button>
            </div>
            
            <div id="modal-form-view" style="display: none;">
                <div style="display:flex; border-bottom:1px solid var(--border-line); margin-bottom:20px;">
                    <button id="tab-login" class="modal-tab-btn active" onclick="setFormType('login')" style="flex:1; background:none; border:none; color:var(--text-main); padding:10px; border-bottom:2px solid var(--accent-primary); cursor:pointer; font-weight:700;">دخول</button>
                    <button id="tab-register" class="modal-tab-btn" onclick="setFormType('register')" style="flex:1; background:none; border:none; color:var(--text-dim); padding:10px; cursor:pointer; font-weight:700;">حساب جديد</button>
                </div>
                <div id="auth-error" class="auth-error-msg"></div>
                <form id="firebase-form" onsubmit="handleAuthSubmit(event)" autocomplete="off">
                    <div id="login-fields">
                        <div class="input-wrapper"><label>المعرف</label><input type="text" id="login-id" class="premium-input" placeholder="البريد أو اسم المستخدم" required></div>
                        <div class="input-wrapper"><label>الرمز السري</label><input type="password" id="login-password" class="premium-input" placeholder="••••••••" required></div>
                    </div>
                    <div id="register-fields" style="display: none;">
                        <div class="input-wrapper"><label>اسم المستخدم</label><input type="text" id="reg-username" class="premium-input" placeholder="DarkKnight"></div>
                        <div class="input-wrapper"><label>البريد</label><input type="email" id="reg-email" class="premium-input" placeholder="name@example.com"></div>
                        <div class="input-wrapper"><label>الرمز السري</label><input type="password" id="reg-password" class="premium-input" placeholder="••••••••"></div>
                        <div class="input-wrapper"><label>تأكيد الرمز</label><input type="password" id="reg-confirm" class="premium-input" placeholder="••••••••"></div>
                    </div>
                    <button type="submit" class="btn-core" id="modal-submit-btn">تأكيد</button>
                </form>
            </div>
        </div>
    </div>

    <div id="app-shell" class="app-shell">
        
        <aside class="sidebar-main">
            <div class="brand-logo">G<span>GEMINK</span></div>
            
            <nav class="nav-menu">
                <button class="nav-btn accent-btn" title="القائمة السريعة"><i class="ph-fill ph-squares-four"></i></button>
                <button class="nav-btn active" onclick="loadFragment('home', this)" title="الرئيسية"><i class="ph-fill ph-house"></i></button>
                <button class="nav-btn" onclick="loadFragment('play', this)" title="اللعب"><i class="ph ph-video-camera"></i></button>
                <button class="nav-btn" onclick="loadFragment('leaderboard', this)" title="المتصدرون"><i class="ph ph-users-three"></i></button>
                <button class="nav-btn" onclick="loadFragment('store', this)" title="المتجر"><i class="ph ph-storefront"></i></button>
                <button class="nav-btn" onclick="loadFragment('profile', this)" title="الحساب"><i class="ph ph-chart-bar"></i></button>
            </nav>

            <div class="theme-toggle-wrapper">
                <button class="theme-btn active" onclick="toggleTheme()" title="فاتح"><i class="ph ph-sun"></i></button>
                <button class="theme-btn" onclick="toggleTheme()" title="داكن"><i class="ph ph-moon"></i></button>
            </div>
        </aside>

        <main class="main-viewport">
            <header class="top-header">
                <div class="search-container">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" class="search-input" placeholder="البحث عن غرف، لاعبين، أو أحداث...">
                </div>
                
                <div class="header-actions">
                    <button class="action-btn"><i class="ph ph-broadcast"></i> ابدأ البث</button>
                    <button class="icon-action"><i class="ph ph-gear"></i></button>
                    <button class="icon-action"><i class="ph ph-bell"></i><span class="notification-dot"></span></button>
                    
                    <div class="user-profile-header" onclick="handleLogout()"> <img src="https://i.pravatar.cc/150?img=11" alt="Avatar" class="header-avatar" id="header-avatar-img">
                        <div class="header-user-info">
                            <span class="header-username" id="header-avatar">اللاعب</span>
                            <span class="header-status">متصل الآن</span>
                        </div>
                        <i class="ph ph-caret-down" style="color: var(--text-dim); margin-right: 5px;"></i>
                    </div>
                </div>
            </header>
            
            <div class="dynamic-content" id="content-holder"></div>
        </main>

        <aside class="sidebar-friends">
            <div class="friend-avatar-wrapper live">
                <img src="https://i.pravatar.cc/150?img=12" class="friend-avatar" alt="Friend">
            </div>
            <div class="friend-avatar-wrapper">
                <img src="https://i.pravatar.cc/150?img=32" class="friend-avatar" alt="Friend">
            </div>
            <div class="friend-avatar-wrapper">
                <img src="https://i.pravatar.cc/150?img=47" class="friend-avatar" alt="Friend">
            </div>
            <div class="friend-avatar-wrapper">
                <img src="https://i.pravatar.cc/150?img=68" class="friend-avatar" alt="Friend">
            </div>
            
            <button class="add-friend-btn"><i class="ph ph-plus"></i></button>

            <div class="game-icons-bottom">
                <img src="https://cdn-icons-png.flaticon.com/512/732/732228.png" class="game-icon" alt="Game 1">
                <img src="https://cdn-icons-png.flaticon.com/512/5969/5969282.png" class="game-icon" alt="Game 2">
            </div>
        </aside>

        <nav class="bottom-dock">
            <button class="dock-btn active" onclick="loadFragment('home', this)"><i class="ph-fill ph-house"></i></button>
            <button class="dock-btn" onclick="loadFragment('play', this)"><i class="ph ph-video-camera"></i></button>
            <div style="position: relative; top: -20px;">
                <button class="nav-btn accent-btn" style="margin: 0; width: 55px; height: 55px;"><i class="ph ph-plus"></i></button>
            </div>
            <button class="dock-btn" onclick="loadFragment('leaderboard', this)"><i class="ph ph-users-three"></i></button>
            <button class="dock-btn" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i></button>
        </nav>
    </div>

    <script type="module">
        // [ضع أكواد Firebase الخاصة بك التي أرسلتها لي هنا كاملة]
    </script>
    <script>
        // [ضع أكواد Toggle Modal و loadFragment الخاصة بك هنا]
        // ملاحظة: تأكد من إبقاء دالة loadFragment الخاصة بك تعمل بشكل صحيح لجلب home.html
    </script>
</body>
</html>
