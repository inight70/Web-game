<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مستودع الخداع - اللوبي</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* =========================================
           المتغيرات العالمية (ستايل أبيض وأسود فاخر)
           ========================================= */
        :root {
            --bg-base: #000000;
            --surface-panel: #09090b;
            --border-line: #1e1e20;
            --text-main: #ffffff;
            --text-dim: #71717a;
            --glass-bg: rgba(0, 0, 0, 0.85);
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        [data-theme="light"] {
            --bg-base: #f4f4f5;
            --surface-panel: #ffffff;
            --border-line: #e4e4e7;
            --text-main: #09090b;
            --text-dim: #a1a1aa;
            --glass-bg: rgba(255, 255, 255, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-stack);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* =========================================
           النافذة الزجاجية المتطورة (Auth Modal)
           ========================================= */
        .auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100000;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        .auth-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .auth-card {
            background-color: var(--surface-panel);
            border: 1px solid var(--border-line);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            position: relative;
        }
        
        /* زر الإغلاق X النظيف في الزاوية */
        .close-modal-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .close-modal-btn:hover { color: var(--text-main); }

        .auth-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
        .auth-card p { color: var(--text-dim); font-size: 13.5px; margin-bottom: 30px; line-height: 1.6; }
        
        .btn-core {
            background-color: var(--text-main);
            color: var(--bg-base);
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-core:hover { opacity: 0.9; }

        .link-guest {
            display: inline-block;
            margin-top: 18px;
            color: var(--text-dim);
            font-size: 13px;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: color 0.2s;
        }
        .link-guest:hover { color: var(--text-main); text-decoration: underline; }

        /* ستايل تبديل الفئات (تسجيل / حساب جديد) */
        .modal-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-line);
            margin-bottom: 25px;
        }
        .modal-tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: var(--text-dim);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }
        .modal-tab-btn.active {
            color: var(--text-main);
            border-bottom: 2px solid var(--text-main);
        }

        /* حقول الإدخال */
        .input-wrapper {
            margin-bottom: 16px;
            text-align: right;
        }
        .input-wrapper label {
            display: block;
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 6px;
            padding-right: 4px;
        }
        .premium-input {
            width: 100%;
            padding: 14px;
            background-color: var(--bg-base);
            border: 1px solid var(--border-line);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
        }
        .premium-input:focus { border-color: var(--text-main); }

        /* رسائل الخطأ داخل النافذة */
        .auth-error-msg {
            color: #ff4b4b;
            font-size: 12px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }

        /* =========================================
           2. هيكل الحماية لملف اللوبي الخارجي
           ========================================= */
        .app-shell {
            display: flex;
            width: 100%;
            height: 100vh;
            filter: blur(15px);
            pointer-events: none;
            transition: filter 0.5s ease;
        }
        .app-shell.unlocked {
            filter: blur(0);
            pointer-events: auto;
        }

        /* البار الجانبي المتزن للكمبيوتر */
        .sidebar {
            width: 250px;
            background-color: var(--bg-base);
            border-left: 1px solid var(--border-line);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }
        .sidebar-brand {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2.5px;
            margin-bottom: 40px;
            padding-right: 12px;
        }
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            color: var(--text-dim);
            background: none;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            text-align: right;
            width: 100%;
            transition: all 0.2s ease;
        }
        .nav-btn i { font-size: 20px; }
        .nav-btn:hover, .nav-btn.active {
            background-color: var(--surface-panel);
            color: var(--text-main);
        }

        /* مساحة العرض المركزية (تمنع تشوه الأبعاد على الشاشات العريضة للكمبيوتر) */
        .main-viewport {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .top-header {
            height: 75px;
            border-bottom: 1px solid var(--border-line);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
        }
        .header-title { font-size: 18px; font-weight: 600; }
        
        .header-actions { display: flex; align-items: center; gap: 20px; }
        .theme-btn {
            background: none; border: none; color: var(--text-main);
            font-size: 22px; cursor: pointer;
        }

        .dynamic-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
            width: 100%;
            max-width: 1100px; /* توازن الأبعاد على شاشات الماك والكمبيوتر */
            margin: 0 auto;
        }

        .bottom-bar { display: none; }

        /* تجاوب الجوال */
        @media (max-width: 900px) {
            .sidebar { display: none; }
            .top-header { padding: 0 24px; }
            .dynamic-content { padding: 24px 20px 130px 20px; }

            .bottom-bar {
                display: flex;
                position: fixed;
                bottom: 24px; left: 50%; transform: translateX(-50%);
                width: calc(100% - 40px); max-width: 450px; height: 66px;
                background: var(--glass-bg);
                backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
                border: 1px solid var(--border-line);
                border-radius: 33px;
                justify-content: space-around; align-items: center;
                padding: 0 10px; z-index: 9999;
                box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            }
            .bottom-tab {
                display: flex; flex-direction: column; align-items: center; justify-content: center;
                color: var(--text-dim); background: none; border: none;
                height: 100%; flex: 1; cursor: pointer;
            }
            .bottom-tab i { font-size: 22px; }
            .bottom-tab span { font-size: 9px; font-weight: 500; margin-top: 3px; }
            .bottom-tab.active { color: var(--text-main); }
        }
    </style>
</head>
<body>

    <div id="auth-modal" class="auth-overlay">
        <div class="auth-card">
            <button class="close-modal-btn" onclick="closeAuthModal()"><i class="ph ph-x"></i></button>
            
            <div id="modal-welcome-view">
                <i class="ph ph-user-focus" style="font-size: 38px; margin-bottom: 15px; display: inline-block;"></i>
                <h2>سجل دخولك</h2>
                <p>سجل دخولك الآن لتلعب، وتحفظ تقدمك، إحصائياتك، وإعداداتك السحابية بشكل آمن.</p>
                <button class="btn-core" onclick="switchModalMode('forms')">تسجيل الدخول</button>
                <button class="link-guest" onclick="enterAsGuest()">المتابعة كزائر</button>
            </div>

            <div id="modal-form-view" style="display: none;">
                <div class="modal-tabs">
                    <button id="tab-login" class="modal-tab-btn active" onclick="setFormType('login')">تسجيل الدخول</button>
                    <button id="tab-register" class="modal-tab-btn" onclick="setFormType('register')">حساب جديد</button>
                </div>
                
                <div id="auth-error" class="auth-error-msg"></div>

                <form id="firebase-form" onsubmit="handleAuthSubmit(event)">
                    <div class="input-wrapper" id="wrapper-name" style="display: none;">
                        <label>اسم اللاعب</label>
                        <input type="text" id="input-name" class="premium-input" placeholder="اكتب اسمك المستعار">
                    </div>
                    
                    <div class="input-wrapper">
                        <label>البريد الإلكتروني</label>
                        <input type="email" id="input-email" class="premium-input" placeholder="name@example.com" required>
                    </div>

                    <div class="input-wrapper">
                        <label>كلمة المرور</label>
                        <input type="password" id="input-password" class="premium-input" placeholder="••••••••" required>
                    </div>

                    <div class="input-wrapper" id="wrapper-confirm" style="display: none;">
                        <label>تأكيد كلمة المرور</label>
                        <input type="password" id="input-confirm" class="premium-input" placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn-core" id="modal-submit-btn" style="margin-top: 10px;">دخول</button>
                </form>
            </div>
        </div>
    </div>

    <div id="app-shell" class="app-shell">
        
        <aside class="sidebar">
            <div class="sidebar-brand">DECEPTION.SYS</div>
            <button class="nav-btn active" onclick="loadFragment('home', this)"><i class="ph ph-house"></i> الرئيسية</button>
            <button class="nav-btn" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i> اللعب</button>
            <button class="nav-btn" onclick="loadFragment('leaderboard', this)"><i class="ph ph-trophy"></i> المتصدرون</button>
            <button class="nav-btn" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i> المتجر</button>
            <button class="nav-btn" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i> الحساب</button>
        </aside>

        <main class="main-viewport">
            <header class="top-header">
                <div class="header-title" id="page-title">الرئيسية</div>
                <div class="header-actions">
                    <button class="theme-btn" onclick="toggleTheme()"><i id="theme-icon" class="ph ph-sun"></i></button>
                    <div style="font-size: 13px; color: var(--text-dim);" id="header-user-tag">زائر</div>
                </div>
            </header>

            <div class="dynamic-content" id="content-holder"></div>
        </main>

        <nav class="bottom-bar">
            <button class="bottom-tab active" onclick="loadFragment('home', this)"><i class="ph ph-house"></i><span>الرئيسية</span></button>
            <button class="bottom-tab" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i><span>اللعب</span></button>
            <button class="bottom-tab" onclick="loadFragment('leaderboard', this)"><i class="ph ph-trophy"></i><span>المتصدرون</span></button>
            <button class="bottom-tab" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i><span>المتجر</span></button>
            <button class="bottom-tab" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i><span>الحساب</span></button>
        </nav>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // مفاتيح سيرفرك الحقيقي
        const firebaseConfig = {
            apiKey: "AIzaSyCLFj5UTX9EtuehoMWV02gkPsAgKPvMhzI",
            authDomain: "web-game-260b5.firebaseapp.com",
            projectId: "web-game-260b5",
            storageBucket: "web-game-260b5.firebasestorage.app",
            messagingSenderId: "682229509792",
            appId: "1:682229509792:web:11b4a404459630fcd6a3c5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.isGuest = false;
        window.currentFormMode = 'login'; 

        // مراقبة حالة الاتصال الحقيقي بالسيرفر
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.isGuest = false;
                document.getElementById('header-user-tag').innerText = user.email.split('@')[0];
                document.getElementById('auth-modal').classList.add('hidden');
                document.getElementById('app-shell').classList.add('unlocked');
                window.loadFragment('home', document.querySelector('.nav-btn'));
            } else {
                if (!window.isGuest) {
                    // إذا لم يكن زائر وليس مسجل دخول، تفتح النافذة إجبارياً
                    document.getElementById('auth-modal').classList.remove('hidden');
                    document.getElementById('app-shell').classList.remove('unlocked');
                }
            }
        });

        // تقديم معالجة الفورم للفايربيس الحقيقي
        window.handleAuthSubmit = async function(e) {
            e.preventDefault();
            const email = document.getElementById('input-email').value;
            const password = document.getElementById('input-password').value;
            const errorDiv = document.getElementById('auth-error');
            errorDiv.style.display = 'none';

            try {
                if (window.currentFormMode === 'login') {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    const confirmPass = document.getElementById('input-confirm').value;
                    if (password !== confirmPass) {
                        throw { message: "كلمات المرور غير متطابقة." };
                    }
                    await createUserWithEmailAndPassword(auth, email, password);
                }
            } catch (error) {
                errorDiv.innerText = error.message.includes("credential") ? "بيانات الدخول غير صحيحة." : error.message;
                errorDiv.style.display = 'block';
            }
        }
    </script>

    <script>
        // التبديل بين واجهة الترحيب والفورم داخل المودال
        function switchModalMode(mode) {
            if(mode === 'forms') {
                document.getElementById('modal-welcome-view').style.display = 'none';
                document.getElementById('modal-form-view').style.display = 'block';
            }
        }

        // التبديل بين خيارات اللوق إن والسين أب
        function setFormType(type) {
            window.currentFormMode = type;
            document.getElementById('tab-login').classList.toggle('active', type === 'login');
            document.getElementById('tab-register').classList.toggle('active', type === 'register');
            
            document.getElementById('wrapper-name').style.display = type === 'register' ? 'block' : 'none';
            document.getElementById('wrapper-confirm').style.display = type === 'register' ? 'block' : 'none';
            document.getElementById('modal-submit-btn').innerText = type === 'register' ? 'إنشاء الحساب' : 'دخول';
        }

        // الدخول كزائر
        function enterAsGuest() {
            window.isGuest = true;
            document.getElementById('header-user-tag').innerText = "زائر";
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('app-shell').classList.add('unlocked');
            loadFragment('home', document.querySelector('.nav-btn'));
        }

        // إغلاق النافذة عبر زر X الحر
        function closeAuthModal() {
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('app-shell').classList.add('unlocked');
            if(!window.isGuest) window.isGuest = true; // يحوله لزائر تلقائياً عند الإغلاق العنيد
        }

        // التبديل بين ثيمات آبل الاحترافية
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
                icon.className = 'ph ph-sun';
            } else {
                body.setAttribute('data-theme', 'light');
                icon.className = 'ph ph-moon';
            }
        }

        // محرك جلب الأقسام وفحص حماية حساب الزائر (نقطة 4)
        function loadFragment(pageName, element) {
            const contentHolder = document.getElementById('content-holder');
            const titles = { 'home': 'الرئيسية', 'play': 'غرف اللعب', 'leaderboard': 'المتصدرون', 'store': 'متجر المزايا', 'profile': 'إعدادات الحساب' };
            
            document.getElementById('page-title').innerText = titles[pageName];
            document.querySelectorAll('.nav-btn, .bottom-tab').forEach(btn => btn.classList.remove('active'));
            if(element) element.classList.add('active');

            // حماية حساب الزائر (النقطة رقم 4 في طلبك)
            if (pageName === 'profile' && window.isGuest) {
                contentHolder.innerHTML = `
                    <div style="padding: 40px; border: 1px solid var(--border-line); background-color: var(--surface-panel); border-radius: 20px; text-align: center; max-width: 500px; margin: 40px auto;">
                        <i class="ph ph-user-circle-plus" style="font-size: 40px; margin-bottom: 15px; color: var(--text-dim);"></i>
                        <h3 style="font-size: 18px; margin-bottom: 10px;">أنت تتصفح كزائر</h3>
                        <p style="color: var(--text-dim); font-size: 13.5px; margin-bottom: 25px; line-height: 1.6;">قسم الحساب مخصص للاعبين المسجلين. أنشئ حسابك الآن لحفظ تقدمك ونقاطك السحابية والوصول لها من أي مكان.</p>
                        <button class="btn-core" style="max-width: 200px; margin: 0 auto; display: block;" onclick="document.getElementById('auth-modal').classList.remove('hidden'); switchModalMode('forms');">سجل دخولك الآن</button>
                    </div>`;
                return;
            }

            fetch(pageName + '.html')
                .then(response => { if (!response.ok) throw new Error(); return response.text(); })
                .then(html => { contentHolder.innerHTML = html; })
                .catch(() => {
                    contentHolder.innerHTML = `
                        <div style="padding: 40px; border: 1px dashed var(--border-line); border-radius: 16px; text-align: center;">
                            <i class="ph ph-file-dashed" style="font-size: 32px; color: var(--text-dim); margin-bottom: 10px;"></i>
                            <p style="color: var(--text-dim); font-size: 14px;">ملف <b>${pageName}.html</b> جاهز هندسياً ومحمي بالكامل.</p>
                            <p style="color: var(--text-dim); font-size: 12px; margin-top: 5px;">أنشئ الملف الآن في قيت هب لتبدأ تصميم محتواه الداخلي حبة حبة.</p>
                        </div>`;
                });
        }
    </script>
</body>
</html>
