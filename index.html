<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DECEPTION</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=9.0">
</head>
<body>

    <div id="global-loader"><div class="spinner"></div></div>

    <!-- نافذة المصادقة -->
    <div id="auth-modal" class="auth-overlay hidden">
        <div class="auth-card">
            <button class="close-modal-btn" onclick="closeAuthModal()"><i class="ph ph-x"></i></button>
            <div id="modal-welcome-view">
                <div class="brand-logo" style="align-items: center; margin-bottom: 20px; font-size: 2.5rem;">
                    <span class="brand-white">decep</span>
                    <span class="brand-red" style="padding-right:0; margin-left:30px;">tion.</span>
                </div>
                <h2 data-i18n="cloud_system">النظام السحابي</h2>
                <p data-i18n="cloud_desc">سجل دخولك الآن لتتمكن من اللعب، حفظ تقدمك، والتفاعل مع الأصدقاء.</p>
                <button class="btn-core" onclick="switchModalMode('forms')" data-i18n="login_btn">تسجيل الدخول</button>
                <button class="link-guest" onclick="enterAsGuest()" data-i18n="guest_btn">المتابعة كزائر</button>
            </div>
            <div id="modal-form-view" style="display: none;">
                <div class="modal-tabs">
                    <button id="tab-login" class="modal-tab-btn active" onclick="setFormType('login')" data-i18n="login_tab">تسجيل الدخول</button>
                    <button id="tab-register" class="modal-tab-btn" onclick="setFormType('register')" data-i18n="register_tab">حساب جديد</button>
                </div>
                <div id="auth-error" class="auth-error-msg"></div>
                <form id="firebase-form" onsubmit="handleAuthSubmit(event)" autocomplete="off">
                    <div id="login-fields">
                        <div class="input-wrapper"><label data-i18n="email_user">المعرف (Email/Username)</label><input type="text" id="login-id" class="premium-input" placeholder="User / Email" required autocomplete="off"></div>
                        <div class="input-wrapper"><label data-i18n="password">كلمة المرور</label><input type="password" id="login-password" class="premium-input" placeholder="••••••••" required autocomplete="new-password"></div>
                    </div>
                    <div id="register-fields" style="display: none;">
                        <div class="input-wrapper"><label data-i18n="username">اسم المستخدم</label><input type="text" id="reg-username" class="premium-input" placeholder="Player1" autocomplete="off"></div>
                        <div class="input-wrapper"><label data-i18n="email">البريد الإلكتروني</label><input type="email" id="reg-email" class="premium-input" placeholder="name@domain.com" autocomplete="off"></div>
                        <div class="input-wrapper"><label data-i18n="password">كلمة المرور</label><input type="password" id="reg-password" class="premium-input" placeholder="••••••••" autocomplete="new-password"></div>
                        <div class="input-wrapper"><label data-i18n="confirm_password">تأكيد كلمة المرور</label><input type="password" id="reg-confirm" class="premium-input" placeholder="••••••••" autocomplete="new-password"></div>
                    </div>
                    <button type="submit" class="btn-core" id="modal-submit-btn" data-i18n="submit_login">تأكيد الدخول</button>
                </form>
            </div>
        </div>
    </div>

    <!-- نوافذ الأصدقاء -->
    <div id="add-friend-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <button class="close-modal-btn" onclick="closeFriendModal('add-friend-modal')"><i class="ph ph-x"></i></button>
            <h2 data-i18n="add_friend_title">إضافة صديق</h2>
            <p data-i18n="add_friend_desc">أدخل اسم المستخدم الخاص بصديقك لإرسال طلب صداقة.</p>
            <div id="friend-error" class="auth-error-msg"></div>
            <div class="input-wrapper">
                <input type="text" id="search-friend-input" class="premium-input" placeholder="Username" autocomplete="off">
            </div>
            <button class="btn-core" onclick="sendFriendRequest()" data-i18n="send_request">إرسال الطلب</button>
        </div>
    </div>

    <div id="remove-friend-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <button class="close-modal-btn" onclick="closeFriendModal('remove-friend-modal')"><i class="ph ph-x"></i></button>
            <h2 data-i18n="remove_friend_title">حذف صديق</h2>
            <p><span data-i18n="remove_friend_desc">هل أنت متأكد أنك تريد حذف</span> <strong id="remove-friend-name"></strong><span data-i18n="from_list"> من قائمة أصدقائك؟</span></p>
            <button class="btn-secondary" onclick="closeFriendModal('remove-friend-modal')" data-i18n="cancel">إلغاء</button>
            <button class="btn-core" onclick="confirmRemoveFriend()" data-i18n="confirm_remove">تأكيد الحذف</button>
        </div>
    </div>

    <div id="app-shell" class="app-shell">
        
        <!-- الشريط الأيسر (الكمبيوتر) -->
        <aside class="sidebar">
            <div class="brand-logo">
                <span class="brand-white">decep</span>
                <span class="brand-red">tion.</span>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active" onclick="loadFragment('home', this)"><i class="ph-fill ph-squares-four"></i></button>
                <button class="nav-btn" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i></button>
                <button class="nav-btn" onclick="loadFragment('achievements', this)"><i class="ph ph-medal"></i></button>
                <button class="nav-btn" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i></button>
                <button class="nav-btn" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i></button>
            </nav>
        </aside>

        <main class="main-viewport">
            <header class="top-header">
                
                <div class="header-page-info">
                    <h1 class="page-title" id="page-title" data-i18n="home">الرئيسية</h1>
                    
                    <div class="mobile-brand-title">
                        <div class="brand-logo-mobile">
                            <span class="brand-white">decep</span>
                            <span class="brand-red">tion.</span>
                        </div>
                        <div class="mobile-section-name" id="mobile-section-name" data-i18n="home">الرئيسية</div>
                    </div>
                </div>

                <div class="header-actions">
                    
                    <!-- قائمة الإعدادات الاحترافية (ترتيب الحجم: صغير، افتراضي، كبير) -->
                    <div style="position: relative;">
                        <button class="header-icon-btn" onclick="toggleDropdown('settings-dropdown', this)"><i class="ph ph-gear"></i></button>
                        <div class="header-dropdown" id="settings-dropdown">
                            <div class="dropdown-header" data-i18n="settings">الإعدادات</div>
                            
                            <div class="settings-group">
                                <label data-i18n="font_size">حجم الواجهة</label>
                                <div class="segmented-control">
                                    <button class="segment-btn" id="font-small" onclick="setFontSize('small')" data-i18n="font_s">صغير</button>
                                    <button class="segment-btn active" id="font-default" onclick="setFontSize('default')" data-i18n="font_m">افتراضي</button>
                                    <button class="segment-btn" id="font-large" onclick="setFontSize('large')" data-i18n="font_l">كبير</button>
                                </div>
                            </div>

                            <div class="settings-group">
                                <label data-i18n="language">اللغة</label>
                                <div class="segmented-control">
                                    <button class="segment-btn" id="lang-en" onclick="setLanguage('en')">English</button>
                                    <button class="segment-btn active" id="lang-ar" onclick="setLanguage('ar')">العربية</button>
                                </div>
                            </div>

                            <div class="settings-group">
                                <label data-i18n="animations">المؤثرات الحركية</label>
                                <div class="segmented-control">
                                    <button class="segment-btn" id="anim-off" onclick="setAnimation(false)" data-i18n="off">إيقاف</button>
                                    <button class="segment-btn active" id="anim-on" onclick="setAnimation(true)" data-i18n="on">تشغيل</button>
                                </div>
                            </div>

                            <div class="settings-group mobile-only-theme">
                                <label data-i18n="theme">المظهر</label>
                                <div class="segmented-control">
                                    <button class="segment-btn" id="mini-theme-light" onclick="toggleTheme('light')" data-i18n="light">فاتح</button>
                                    <button class="segment-btn active" id="mini-theme-dark" onclick="toggleTheme('dark')" data-i18n="dark">داكن</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- قائمة التنبيهات (مع النقطة الحمراء الديناميكية) -->
                    <div style="position: relative;">
                        <button class="header-icon-btn" onclick="toggleDropdown('noti-dropdown', this)">
                            <i class="ph ph-bell"></i>
                            <span class="red-dot" id="noti-dot"></span>
                        </button>
                        <div class="header-dropdown" id="noti-dropdown">
                            <div class="dropdown-header" data-i18n="noti">التنبيهات</div>
                            <div id="noti-list"></div>
                        </div>
                    </div>
                    
                    <div style="position: relative;">
                        <div class="profile-trigger" onclick="toggleDropdown('user-dropdown', this)">
                            <div class="profile-avatar-fallback" id="header-avatar-fallback">ز</div>
                            <div class="profile-info">
                                <span class="profile-name" id="header-name" data-i18n="guest">زائر</span>
                            </div>
                            <i class="ph-bold ph-caret-down"></i>
                        </div>
                        <div class="header-dropdown" id="user-dropdown">
                            <div class="dropdown-header" id="dropdown-status-name" data-i18n="not_registered">غير مسجل</div>
                            <div id="dropdown-content-area"></div>
                        </div>
                    </div>
                </div>
            </header>
            
            <div class="dynamic-content" id="content-holder"></div>
        </main>

        <!-- الشريط الأيمن للكمبيوتر -->
        <aside class="right-sidebar">
            <div id="friends-container-desktop"></div>
        </aside>

        <!-- شريط الجوال السفلي -->
        <nav class="bottom-bar">
            <button class="bottom-tab active" onclick="loadFragment('home', this)"><i class="ph-fill ph-squares-four"></i></button>
            <button class="bottom-tab" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i></button>
            <button class="bottom-tab" onclick="loadFragment('achievements', this)"><i class="ph ph-medal"></i></button>
            <button class="bottom-tab" onclick="loadFragment('friends', this)"><i class="ph ph-users"></i></button>
            <button class="bottom-tab" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i></button>
            <button class="bottom-tab" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i></button>
        </nav>
    </div>

    <!-- Firebase & Logic Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc, arrayUnion, arrayRemove, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCLFj5UTX9EtuehoMWV02gkPsAgKPvMhzI", authDomain: "web-game-260b5.firebaseapp.com", projectId: "web-game-260b5", storageBucket: "web-game-260b5.firebasestorage.app", messagingSenderId: "682229509792", appId: "1:682229509792:web:11b4a404459630fcd6a3c5" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app); const db = getFirestore(app);
        
        window.authInstance = auth; window.dbInstance = db; window.signOutFunc = signOut; window.updateDocFunc = updateDoc; window.docFunc = doc; window.arrayUnion = arrayUnion; window.arrayRemove = arrayRemove; window.getDocsFunc = getDocs; window.queryFunc = query; window.whereFunc = where; window.collectionFunc = collection;
        
        window.isGuest = false; window.currentFormMode = 'login'; window.currentUserData = null; window.friendToRemove = null;
        let unsubSnapshot = null;

        const hideLoader = () => { const l = document.getElementById('global-loader'); if(l){ l.style.opacity = '0'; setTimeout(()=>l.style.visibility='hidden',400); } };

        // نظام الأصدقاء (UI)
        window.renderFriendsList = function(containerId) {
            const container = document.getElementById(containerId);
            if(!container) return;
            if (window.isGuest || !window.currentUserData) {
                container.innerHTML = `<div class="guest-friends-msg"><i class="ph-duotone ph-users-slash"></i><span data-i18n="login_friends">سجل دخولك لترى الأصدقاء</span></div>`;
                window.applyI18n(); return;
            }
            const friends = window.currentUserData.friends || [];
            let html = `<div class="friends-header" data-i18n="friends">الأصدقاء</div>`;
            if (friends.length === 0) {
                html += `<button class="add-friend-btn" onclick="openAddFriendModal()"><i class="ph-bold ph-plus"></i></button>`;
            } else {
                friends.forEach(f => {
                    html += `<div class="friend-avatar" onclick="openRemoveFriendModal('${f}')" title="حذف صديق"><div style="width:100%; height:100%; border-radius:50%; background:var(--surface-panel); display:flex; justify-content:center; align-items:center; font-weight:bold; font-size:1.1rem; color:var(--text-main);">${f.charAt(0).toUpperCase()}</div><div class="online-dot"></div></div>`;
                });
                html += `<button class="add-friend-btn" onclick="openAddFriendModal()"><i class="ph-bold ph-plus"></i></button>`;
            }
            container.innerHTML = html;
            window.applyI18n();
        };

        // نظام التنبيهات الفوري (UI)
        window.renderNotifications = function() {
            const list = document.getElementById('noti-list');
            const dot = document.getElementById('noti-dot');
            const reqs = window.currentUserData?.friendRequests || [];
            
            if (window.isGuest || reqs.length === 0) {
                dot.classList.remove('active');
                list.innerHTML = `<div class="empty-state"><i class="ph-duotone ph-bell-slash"></i><span data-i18n="no_noti">لا يوجد تنبيهات حالياً</span></div>`;
                window.applyI18n(); return;
            }
            
            dot.classList.add('active'); // إظهار النقطة الحمراء!
            let html = '';
            reqs.forEach(req => {
                html += `
                    <div class="noti-item">
                        <span class="noti-text" style="direction:rtl;">أرسل لك <strong style="color:var(--accent-red);">${req}</strong> طلب صداقة.</span>
                        <div class="noti-actions">
                            <button class="btn-accept" onclick="acceptFriendRequest('${req}')" data-i18n="accept">قبول</button>
                            <button class="btn-reject" onclick="rejectFriendRequest('${req}')" data-i18n="reject">رفض</button>
                        </div>
                    </div>`;
            });
            list.innerHTML = html;
            window.applyI18n();
        };

        // الاستماع الفوري لقاعدة البيانات (The Magic of Real-Time)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.isGuest = false;
                if(unsubSnapshot) unsubSnapshot(); // إلغاء القديم إن وجد
                
                unsubSnapshot = onSnapshot(doc(db, "users", user.uid), (userDoc) => {
                    if (userDoc.exists()) {
                        window.currentUserData = userDoc.data();
                        
                        // تطبيق الإعدادات الفورية من السحاب
                        if (window.currentUserData.settings) {
                            if(window.toggleTheme) window.toggleTheme(window.currentUserData.settings.theme || 'dark', true);
                            if(window.setFontSize) window.setFontSize(window.currentUserData.settings.fontSize || 'default', true);
                            if(window.setAnimation) window.setAnimation(window.currentUserData.settings.animations !== false, true);
                            if(window.setLanguage) window.setLanguage(window.currentUserData.settings.lang || 'ar', true);
                        }

                        // تحديث الهيدر
                        document.getElementById('header-avatar-fallback').innerText = (window.currentUserData.username || user.email).charAt(0).toUpperCase();
                        document.getElementById('header-name').innerText = window.currentUserData.username || user.email;
                        
                        // تحديث محتوى الحساب المنسدل
                        document.getElementById('dropdown-content-area').innerHTML = `
                            <button class="dropdown-item" onclick="loadFragment('profile', null); toggleDropdown('');"><i class="ph ph-user-circle"></i> <span data-i18n="profile">الحساب</span></button>
                            <button class="dropdown-item logout" onclick="handleLogout()"><i class="ph ph-sign-out"></i> <span data-i18n="logout">تسجيل خروج</span></button>
                        `;

                        // تحديث القوائم الحية
                        window.renderFriendsList('friends-container-desktop');
                        if(document.getElementById('mobile-friends-wrapper')) window.renderFriendsList('mobile-friends-wrapper');
                        window.renderNotifications();
                        window.applyI18n();
                    }
                });

                if(window.clearAuthInputs) window.clearAuthInputs(); 
                document.getElementById('auth-modal').classList.add('hidden');
                document.getElementById('app-shell').classList.add('unlocked');
                loadFragment('home', document.querySelector('.nav-btn.active'));
                hideLoader();

            } else {
                if(unsubSnapshot) { unsubSnapshot(); unsubSnapshot = null; }
                if (!window.isGuest) {
                    window.currentUserData = null;
                    if(window.clearAuthInputs) window.clearAuthInputs(); 
                    document.getElementById('auth-modal').classList.remove('hidden');
                    document.getElementById('app-shell').classList.remove('unlocked');
                }
                hideLoader();
            }
        });

        // إنشاء أو تسجيل حساب
        window.handleAuthSubmit = async function(e) {
            e.preventDefault(); 
            const errorDiv = document.getElementById('auth-error'); const btn = document.getElementById('modal-submit-btn');
            errorDiv.style.display = 'none'; btn.disabled = true;
            
            try {
                if (window.currentFormMode === 'login') {
                    let id = document.getElementById('login-id').value.trim(); let pass = document.getElementById('login-password').value;
                    let email = id;
                    if (!id.includes('@')) {
                        const q = query(collection(db, "users"), where("username_lower", "==", id.toLowerCase()));
                        const snap = await getDocs(q);
                        if (snap.empty) throw { message: "البيانات غير صحيحة" };
                        email = snap.docs[0].data().email;
                    }
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const user = document.getElementById('reg-username').value.trim(); 
                    const email = document.getElementById('reg-email').value.trim();
                    const pass = document.getElementById('reg-password').value; const conf = document.getElementById('reg-confirm').value;
                    if (pass !== conf) throw { message: "كلمات المرور غير متطابقة" };
                    if (pass.length < 6) throw { message: "كلمة المرور قصيرة" };
                    
                    const q = query(collection(db, "users"), where("username_lower", "==", user.toLowerCase()));
                    const snap = await getDocs(q);
                    if (!snap.empty) throw { message: "اسم المستخدم محجوز" };
                    
                    const cred = await createUserWithEmailAndPassword(auth, email.toLowerCase(), pass);
                    await setDoc(doc(db, "users", cred.user.uid), { 
                        username: user, username_lower: user.toLowerCase(), email: email.toLowerCase(), 
                        matches: 0, wins: 0, friends: [], friendRequests: [],
                        settings: { theme: 'dark', fontSize: 'default', animations: true, lang: 'ar' }, 
                        createdAt: new Date().toISOString() 
                    });
                }
            } catch (err) {
                let msg = "حدث خطأ في الاتصال";
                if(err.message.includes("credential")) msg = "البيانات غير صحيحة";
                if(err.message.includes("in-use")) msg = "البريد الإلكتروني مستخدم";
                if(err.message.includes("محجوز") || err.message.includes("متطابقة") || err.message.includes("قصيرة")) msg = err.message;
                errorDiv.innerText = msg; errorDiv.style.display = 'block';
            } finally { btn.disabled = false; }
        }
    </script>

                cloud_system: "النظام السحابي", cloud_desc: "سجل دخولك الآن لتتمكن من اللعب، حفظ تقدمك، والتفاعل مع الأصدقاء.",

                login_btn: "Log In", guest_btn: "Continue as Guest", login_tab: "Log In", register_tab: "Sign Up",
                email_user: "Email / Username", password: "Password", username: "Username", email: "Email Address", confirm_password: "Confirm Password", submit_login: "Confirm",
                add_friend_title: "Add Friend", add_friend_desc: "Enter your friend's username to send a request.", send_request: "Send Request",
                remove_friend_title: "Remove Friend", remove_friend_desc: "Are you sure you want to remove", from_list: " from your friends list?", cancel: "Cancel", confirm_remove: "Confirm Removal",
                settings: "Settings", font_size: "Interface Size", font_s: "Small", font_m: "Default", font_l: "Large", language: "Language",
                animations: "Animations", on: "On", off: "Off", theme: "Theme", light: "Light", dark: "Dark",
                noti: "Notifications", no_noti: "No notifications right now", accept: "Accept", reject: "Reject", guest: "Guest", not_registered: "Not Registered", logout: "Logout", login_friends: "Login to see friends"
            }
        };

        window.currentLang = 'ar';
        window.applyI18n = function() {
            document.documentElement.lang = window.currentLang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[window.currentLang] && dict[window.currentLang][key]) {
                    if (el.tagName === 'INPUT' && el.type !== 'button' && el.type !== 'submit') el.placeholder = dict[window.currentLang][key];
                    else el.innerText = dict[window.currentLang][key];
                }
            });
            // تحديث اسم القسم الحالي
            const activePage = document.getElementById('content-holder').getAttribute('data-current-page') || 'home';
            const pageTitleStr = dict[window.currentLang][activePage] || dict[window.currentLang]['home'];
            document.getElementById('page-title').innerText = pageTitleStr;
            document.getElementById('mobile-section-name').innerText = pageTitleStr;
        };

        window.setLanguage = async function(lang, skipSave = false) {
            window.currentLang = lang;
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            document.getElementById('lang-ar').classList.toggle('active', lang === 'ar');
            window.applyI18n();
            if (!skipSave && window.authInstance && window.authInstance.currentUser && !window.isGuest) {
                try { await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { "settings.lang": lang }); } catch(e){}
            }
        };

        // الإعدادات الباقية
        window.setFontSize = async function(size, skipSave = false) {
            document.documentElement.classList.remove('font-small', 'font-large');
            if(size !== 'default') document.documentElement.classList.add(`font-${size}`);
            
            document.querySelectorAll('#font-small, #font-default, #font-large').forEach(b => b.classList.remove('active'));
            document.getElementById(`font-${size}`).classList.add('active');

            if (!skipSave && window.authInstance && window.authInstance.currentUser && !window.isGuest) {
                try { await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { "settings.fontSize": size }); } catch(e){}
            }
        };

        window.setAnimation = async function(isOn, skipSave = false) {
            if(isOn) document.body.classList.remove('no-animations'); else document.body.classList.add('no-animations');
            document.getElementById('anim-on').classList.toggle('active', isOn); document.getElementById('anim-off').classList.toggle('active', !isOn);
            if (!skipSave && window.authInstance && window.authInstance.currentUser && !window.isGuest) {
                try { await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { "settings.animations": isOn }); } catch(e){}
            }
        };

        window.toggleTheme = async function(mode, skipSave = false) {
            const body = document.body; 
            if (mode === 'light') { body.setAttribute('data-theme', 'light'); } else { body.removeAttribute('data-theme'); }
            
            // تحديث الأزرار (إن وجدت)
            const dBtns = [document.getElementById('btn-theme-dark'), document.getElementById('mini-theme-dark')];
            const lBtns = [document.getElementById('btn-theme-light'), document.getElementById('mini-theme-light')];
            if(mode === 'light') { lBtns.forEach(b => b?.classList.add('active-theme', 'active')); dBtns.forEach(b => b?.classList.remove('active-theme', 'active')); }
            else { dBtns.forEach(b => b?.classList.add('active-theme', 'active')); lBtns.forEach(b => b?.classList.remove('active-theme', 'active')); }

            if (!skipSave && window.authInstance && window.authInstance.currentUser && !window.isGuest) {
                try { await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { "settings.theme": mode }); } catch (e) {}
            }
        };

        // منطق إرسال وقبول وحذف الأصدقاء السحابي
        window.sendFriendRequest = async function() {
            const targetUsername = document.getElementById('search-friend-input').value.trim().toLowerCase();
            const errDiv = document.getElementById('friend-error');
            if(!targetUsername) return;
            if(targetUsername === window.currentUserData.username_lower) { errDiv.innerText = window.currentLang==='ar'?"لا يمكنك إضافة نفسك!":"You can't add yourself!"; errDiv.style.display='block'; return; }
            
            try {
                const q = window.queryFunc(window.collectionFunc(window.dbInstance, "users"), window.whereFunc("username_lower", "==", targetUsername));
                const snap = await window.getDocsFunc(q);
                if(snap.empty) { errDiv.innerText = window.currentLang==='ar'?"المستخدم غير موجود.":"User not found."; errDiv.style.display='block'; return; }
                
                // التأكد من عدم وجوده مسبقاً
                if(window.currentUserData.friends?.includes(snap.docs[0].data().username)) { errDiv.innerText = window.currentLang==='ar'?"هو صديقك بالفعل.":"Already a friend."; errDiv.style.display='block'; return; }
                
                const targetDocId = snap.docs[0].id;
                await window.updateDocFunc(window.docFunc(window.dbInstance, "users", targetDocId), { friendRequests: window.arrayUnion(window.currentUserData.username) });
                
                alert(window.currentLang==='ar'?"تم إرسال الطلب بنجاح!":"Request sent successfully!");
                closeFriendModal('add-friend-modal');
            } catch(e) { errDiv.innerText = window.currentLang==='ar'?"حدث خطأ في الإرسال.":"Error sending request."; errDiv.style.display='block'; }
        }

        window.acceptFriendRequest = async function(requesterName) {
            try {
                await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), {
                    friends: window.arrayUnion(requesterName), friendRequests: window.arrayRemove(requesterName)
                });
                const q = window.queryFunc(window.collectionFunc(window.dbInstance, "users"), window.whereFunc("username", "==", requesterName));
                const snap = await window.getDocsFunc(q);
                if(!snap.empty) { await window.updateDocFunc(window.docFunc(window.dbInstance, "users", snap.docs[0].id), { friends: window.arrayUnion(window.currentUserData.username) }); }
            } catch(e) { alert("حدث خطأ / Error"); }
        }

        window.rejectFriendRequest = async function(requesterName) {
            try { await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { friendRequests: window.arrayRemove(requesterName) }); } catch(e) {}
        }

        function openAddFriendModal() { document.getElementById('add-friend-modal').classList.remove('hidden'); document.getElementById('friend-error').style.display='none'; document.getElementById('search-friend-input').value=''; }
        function closeFriendModal(id) { document.getElementById(id).classList.add('hidden'); }
        function openRemoveFriendModal(friendName) { window.friendToRemove = friendName; document.getElementById('remove-friend-name').innerText = friendName; document.getElementById('remove-friend-modal').classList.remove('hidden'); }
        
        window.confirmRemoveFriend = async function() {
            if(!window.friendToRemove) return;
            try {
                await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { friends: window.arrayRemove(window.friendToRemove) });
                // حذف اسمنا من عند الطرف الآخر
                const q = window.queryFunc(window.collectionFunc(window.dbInstance, "users"), window.whereFunc("username", "==", window.friendToRemove));
                const snap = await window.getDocsFunc(q);
                if(!snap.empty) { await window.updateDocFunc(window.docFunc(window.dbInstance, "users", snap.docs[0].id), { friends: window.arrayRemove(window.currentUserData.username) }); }
                closeFriendModal('remove-friend-modal');
            } catch(e) { alert("حدث خطأ / Error"); }
        }

        // تفريغ وتأمين
        window.clearAuthInputs = function() {
            const form = document.getElementById('firebase-form'); if(form) form.reset();
            const err = document.getElementById('auth-error'); if(err) err.style.display = 'none';
        };
        function setFormType(type) { 
            window.currentFormMode = type; 
            document.getElementById('tab-login').classList.toggle('active', type === 'login'); document.getElementById('tab-register').classList.toggle('active', type === 'register'); 
            document.getElementById('login-fields').style.display = type === 'login' ? 'block' : 'none'; document.getElementById('register-fields').style.display = type === 'register' ? 'block' : 'none'; 
            document.getElementById('login-id').required = type === 'login'; document.getElementById('login-password').required = type === 'login';
            document.getElementById('reg-username').required = type === 'register'; document.getElementById('reg-email').required = type === 'register'; document.getElementById('reg-password').required = type === 'register';
            document.getElementById('modal-submit-btn').innerText = window.currentLang==='ar'?(type==='register'?'حساب جديد':'تأكيد الدخول'):(type==='register'?'Sign Up':'Log In');
        }

        function toggleDropdown(dropdownId, triggerElement) {
            const isCurrentlyOpen = document.getElementById(dropdownId).classList.contains('show');
            document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show'));
            if (!isCurrentlyOpen) document.getElementById(dropdownId).classList.add('show');
        }
        window.onclick = function(e) { 
            if (!e.target.closest('.header-icon-btn') && !e.target.closest('.profile-trigger') && !e.target.closest('.header-dropdown')) { 
                document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show')); 
            } 
        }
        
        function handleLogout() { 
            window.signOutFunc(window.authInstance).then(() => { 
                document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show'));
                document.body.removeAttribute('data-theme'); document.documentElement.className='';
                window.currentUserData = null; window.clearAuthInputs(); window.setLanguage('ar', true);
                document.getElementById('auth-modal').classList.remove('hidden'); document.getElementById('app-shell').classList.remove('unlocked'); 
            }); 
        }

        function switchModalMode(mode) { if(mode === 'forms'){ document.getElementById('modal-welcome-view').style.display = 'none'; document.getElementById('modal-form-view').style.display = 'block'; } }
        
        function enterAsGuest() {
            window.isGuest = true; window.currentUserData = null;
            document.getElementById('header-name').innerText = dict[window.currentLang]['guest']; 
            document.getElementById('dropdown-status-name').innerText = dict[window.currentLang]['not_registered']; 
            document.getElementById('header-avatar-fallback').innerText = "ز";
            window.renderFriendsList('friends-container-desktop'); window.renderNotifications();
            document.getElementById('dropdown-content-area').innerHTML = `<button class="dropdown-item" onclick="window.clearAuthInputs(); document.getElementById('auth-modal').classList.remove('hidden'); toggleDropdown(''); switchModalMode('forms'); setFormType('login');"><i class="ph ph-sign-in"></i> <span data-i18n="login_btn">تسجيل الدخول</span></button>`;
            window.clearAuthInputs(); document.getElementById('auth-modal').classList.add('hidden'); document.getElementById('app-shell').classList.add('unlocked'); loadFragment('home', document.querySelector('.nav-btn.active'));
        }

        function closeAuthModal() { window.clearAuthInputs(); document.getElementById('auth-modal').classList.add('hidden'); document.getElementById('app-shell').classList.add('unlocked'); if(!window.isGuest) enterAsGuest(); }
        
        function loadFragment(pageName, element) {
            const contentHolder = document.getElementById('content-holder');
            contentHolder.setAttribute('data-current-page', pageName); // حفظ الصفحة الحالية للترجمة
            window.applyI18n(); // تحديث العناوين

            document.querySelectorAll('.nav-btn, .bottom-tab').forEach(btn => {
                btn.classList.remove('active'); const icon = btn.querySelector('i'); if(icon) icon.className = icon.className.replace('ph-fill', 'ph');
            });

            if(element) {
                element.classList.add('active'); const icon = element.querySelector('i'); if(icon) icon.className = icon.className.replace('ph', 'ph-fill');
                const isNav = element.classList.contains('nav-btn');
                const tabsList = isNav ? document.querySelectorAll('.nav-btn') : document.querySelectorAll('.bottom-tab');
                const targetList = isNav ? document.querySelectorAll('.bottom-tab') : document.querySelectorAll('.nav-btn');
                const index = Array.from(tabsList).indexOf(element);
                
                if(pageName === 'friends' && isNav === false) { }
                else if (pageName === 'store' && isNav === true) { const mobileStore = document.querySelectorAll('.bottom-tab')[4]; if(mobileStore) { mobileStore.classList.add('active'); mobileStore.querySelector('i').className = mobileStore.querySelector('i').className.replace('ph', 'ph-fill'); } }
                else if (pageName === 'profile' && isNav === true) { const mobileProf = document.querySelectorAll('.bottom-tab')[5]; if(mobileProf) { mobileProf.classList.add('active'); mobileProf.querySelector('i').className = mobileProf.querySelector('i').className.replace('ph', 'ph-fill'); } }
                else { const matchedTab = targetList[index]; if(matchedTab) { matchedTab.classList.add('active'); matchedTab.querySelector('i').className = matchedTab.querySelector('i').className.replace('ph', 'ph-fill'); } }
            }

            if (pageName === 'friends') {
                contentHolder.innerHTML = `<div id="mobile-friends-wrapper" style="max-width:400px; margin: 40px auto; display:flex; flex-direction:column; align-items:center; gap:20px;"></div>`;
                window.renderFriendsList('mobile-friends-wrapper');
            } else {
                contentHolder.innerHTML = `<div style="display:flex; justify-content:center; align-items:center; height:100%; color:var(--text-dim); font-size:1.2rem; font-weight:bold;">القسم جاهز للبرمجة</div>`;
            }
        }
    </script>
</body>
</html>
