<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DECEPTION.SYS</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=5.0">
</head>
<body>

    <div id="global-loader"><div class="spinner"></div></div>

    <div id="auth-modal" class="auth-overlay hidden">
        <div class="auth-card">
            <button class="close-modal-btn" onclick="closeAuthModal()"><i class="ph ph-x"></i></button>
            
            <div id="modal-welcome-view">
                <i class="ph-duotone ph-shield-check" style="font-size: 50px; color: var(--accent-red); margin-bottom: 15px; display: inline-block;"></i>
                <h2>النظام السحابي</h2>
                <p>سجل دخولك الآن لتتمكن من اللعب، حفظ تقدمك، والتفاعل مع الأصدقاء.</p>
                <button class="btn-core" onclick="switchModalMode('forms')">تسجيل الدخول</button>
                <button class="link-guest" onclick="enterAsGuest()">المتابعة كزائر</button>
            </div>

            <div id="modal-form-view" style="display: none;">
                <div class="modal-tabs">
                    <button id="tab-login" class="modal-tab-btn active" onclick="setFormType('login')">تسجيل الدخول</button>
                    <button id="tab-register" class="modal-tab-btn" onclick="setFormType('register')">حساب جديد</button>
                </div>
                <div id="auth-error" class="auth-error-msg"></div>
                <form id="firebase-form" onsubmit="handleAuthSubmit(event)" autocomplete="off">
                    <div id="login-fields">
                        <div class="input-wrapper">
                            <label>المعرف (Email/Username)</label>
                            <input type="text" id="login-id" class="premium-input" placeholder="User details" required>
                        </div>
                        <div class="input-wrapper">
                            <label>كلمة المرور</label>
                            <input type="password" id="login-password" class="premium-input" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div id="register-fields" style="display: none;">
                        <div class="input-wrapper"><label>اسم المستخدم</label><input type="text" id="reg-username" class="premium-input"></div>
                        <div class="input-wrapper"><label>البريد الإلكتروني</label><input type="email" id="reg-email" class="premium-input"></div>
                        <div class="input-wrapper"><label>كلمة المرور</label><input type="password" id="reg-password" class="premium-input"></div>
                        <div class="input-wrapper"><label>تأكيد كلمة المرور</label><input type="password" id="reg-confirm" class="premium-input"></div>
                    </div>
                    <button type="submit" class="btn-core" id="modal-submit-btn">تأكيد الدخول</button>
                </form>
            </div>
        </div>
    </div>

    <div id="app-shell" class="app-shell">
        
        <aside class="sidebar">
            <div class="sidebar-logo">
                Gege<br><span>Gemink</span>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active" onclick="loadFragment('home', this)"><i class="ph-fill ph-squares-four"></i></button>
                <button class="nav-btn" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i></button>
                <button class="nav-btn" onclick="loadFragment('leaderboard', this)"><i class="ph ph-trophy"></i></button>
                <button class="nav-btn" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i></button>
                <button class="nav-btn" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i></button>
            </nav>
            <div class="theme-wrapper">
                <button class="theme-btn active-theme" id="btn-theme-dark" onclick="toggleTheme('dark')"><i class="ph-fill ph-moon"></i></button>
                <button class="theme-btn" id="btn-theme-light" onclick="toggleTheme('light')"><i class="ph-fill ph-sun"></i></button>
            </div>
        </aside>

        <main class="main-viewport">
            <header class="top-header">
                <div class="header-page-info">
                    <h1 class="page-title" id="page-title">الرئيسية</h1>
                    <div class="server-status"><div class="status-dot"></div> System Online</div>
                </div>

                <div class="header-actions">
                    <button class="header-icon-btn"><i class="ph ph-gear"></i></button>
                    <button class="header-icon-btn"><i class="ph ph-bell"></i><span class="notification-dot"></span></button>
                    
                    <div style="position: relative;">
                        <div class="profile-trigger" id="profile-trigger" onclick="toggleUserDropdown()">
                            <div class="profile-avatar-fallback" id="header-avatar-fallback">ز</div>
                            <div class="profile-info">
                                <span class="profile-name" id="header-name">زائر</span>
                                <span class="profile-status" id="header-status">غير مسجل</span>
                            </div>
                            <i class="ph-bold ph-caret-down"></i>
                        </div>
                        <div class="user-dropdown" id="user-dropdown"></div>
                    </div>
                </div>
            </header>
            
            <div class="dynamic-content" id="content-holder"></div>
        </main>

        <aside class="right-sidebar">
            <div id="friends-container"></div>
        </aside>

        <nav class="bottom-bar">
            <button class="bottom-tab active" onclick="loadFragment('home', this)"><i class="ph-fill ph-squares-four"></i></button>
            <button class="bottom-tab" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i></button>
            <button class="bottom-tab" onclick="loadFragment('leaderboard', this)"><i class="ph ph-trophy"></i></button>
            <button class="bottom-tab" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i></button>
            <button class="bottom-tab" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i></button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLFj5UTX9EtuehoMWV02gkPsAgKPvMhzI",
            authDomain: "web-game-260b5.firebaseapp.com",
            projectId: "web-game-260b5",
            storageBucket: "web-game-260b5.firebasestorage.app",
            messagingSenderId: "682229509792",
            appId: "1:682229509792:web:11b4a404459630fcd6a3c5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app); const db = getFirestore(app);
        
        window.authInstance = auth; window.dbInstance = db; 
        window.updateDocFunc = updateDoc; window.docFunc = doc; 
        window.signOutFunc = signOut; window.isGuest = false; window.currentFormMode = 'login'; 

        const hideLoader = () => { const l = document.getElementById('global-loader'); if(l){ l.style.opacity = '0'; setTimeout(()=>l.style.visibility='hidden',400); } };

        // تحديث واجهة الأصدقاء باحترافية
        window.updateFriendsUI = function(isLoggedIn, hasFriends = false) {
            const container = document.getElementById('friends-container');
            if (!isLoggedIn) {
                container.innerHTML = `
                    <div class="guest-friends-msg">
                        <i class="ph-duotone ph-users"></i>
                        <span>سجل دخولك لترى الأصدقاء</span>
                    </div>`;
            } else {
                if (!hasFriends) {
                    container.innerHTML = `<button class="add-friend-btn"><i class="ph-bold ph-plus"></i></button>`;
                } else {
                    container.innerHTML = `
                        <div class="friend-avatar"><img src="https://i.pravatar.cc/150?img=11"><div class="online-dot"></div></div>
                        <div class="friend-avatar"><img src="https://i.pravatar.cc/150?img=12"><div class="online-dot"></div></div>
                        <button class="add-friend-btn"><i class="ph-bold ph-plus"></i></button>
                    `;
                }
            }
        };

        onAuthStateChanged(auth, async (user) => {
            const dropdown = document.getElementById('user-dropdown');
            const nameEl = document.getElementById('header-name');
            const statusEl = document.getElementById('header-status');
            const fallbackAvatar = document.getElementById('header-avatar-fallback');

            if (user) {
                window.isGuest = false;
                let displayName = user.email.split('@')[0]; let matches = 0, wins = 0;
                
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) { 
                        const d = userDoc.data(); 
                        displayName = d.username || displayName; 
                        matches = d.matches || 0; wins = d.wins || 0; 
                        
                        // جلب وتفعيل الثيم المحفوظ
                        let userTheme = 'dark';
                        if (d.settings && d.settings.theme) userTheme = d.settings.theme;
                        window.applyTheme(userTheme);
                    }
                } catch (err) { console.warn("Error fetching data", err); }

                fallbackAvatar.innerText = displayName.charAt(0).toUpperCase();
                nameEl.innerText = displayName;
                statusEl.innerText = "Online"; statusEl.style.color = "var(--accent-green)";

                dropdown.innerHTML = `
                    <div class="dropdown-header">
                        <div class="dropdown-name-ar">${displayName}</div>
                        <div class="dropdown-stats">
                            <div class="stat-item"><span class="stat-label">المباريات</span><span class="stat-value">${matches}</span></div>
                            <div class="stat-item"><span class="stat-label">الانتصارات</span><span class="stat-value">${wins}</span></div>
                        </div>
                    </div>
                    <button class="dropdown-item" onclick="loadFragment('profile', document.querySelectorAll('.nav-btn')[4]); toggleUserDropdown();"><i class="ph ph-user-circle"></i> الحساب</button>
                    <button class="dropdown-item logout" onclick="handleLogout()"><i class="ph ph-sign-out"></i> تسجيل خروج</button>
                `;

                window.updateFriendsUI(true, false);

                document.getElementById('auth-modal').classList.add('hidden');
                document.getElementById('app-shell').classList.add('unlocked');
                loadFragment('home', document.querySelector('.nav-btn.active'));
                hideLoader();
            } else {
                if (!window.isGuest) {
                    document.getElementById('auth-modal').classList.remove('hidden');
                    document.getElementById('app-shell').classList.remove('unlocked');
                }
                hideLoader();
            }
        });

        window.handleAuthSubmit = async function(e) {
            e.preventDefault(); const errorDiv = document.getElementById('auth-error'); const btn = document.getElementById('modal-submit-btn');
            errorDiv.style.display = 'none'; btn.disabled = true; btn.innerText = "جاري التحقق...";
            try {
                if (window.currentFormMode === 'login') {
                    let id = document.getElementById('login-id').value.trim(); let pass = document.getElementById('login-password').value;
                    let email = id;
                    if (!id.includes('@')) {
                        const q = query(collection(db, "users"), where("username_lower", "==", id.toLowerCase()));
                        const snap = await getDocs(q);
                        if (snap.empty) throw { message: "البيانات غير صحيحة" };
                        email = snap.docs[0].data().email;
                    }
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const user = document.getElementById('reg-username').value.trim(); const email = document.getElementById('reg-email').value.trim();
                    const pass = document.getElementById('reg-password').value; const conf = document.getElementById('reg-confirm').value;
                    if (pass !== conf) throw { message: "كلمات المرور غير متطابقة" };
                    const q = query(collection(db, "users"), where("username_lower", "==", user.toLowerCase()));
                    const snap = await getDocs(q);
                    if (!snap.empty) throw { message: "اسم المستخدم محجوز" };
                    const cred = await createUserWithEmailAndPassword(auth, email.toLowerCase(), pass);
                    
                    // حفظ الإعدادات الافتراضية
                    await setDoc(doc(db, "users", cred.user.uid), { 
                        username: user, username_lower: user.toLowerCase(), email: email.toLowerCase(), 
                        matches: 0, wins: 0, 
                        settings: { theme: 'dark' },
                        createdAt: new Date().toISOString() 
                    });
                }
            } catch (err) {
                errorDiv.innerText = err.message || "حدث خطأ"; errorDiv.style.display = 'block';
            } finally { btn.disabled = false; btn.innerText = window.currentFormMode === 'register' ? 'حساب جديد' : 'تسجيل الدخول'; }
        }
    </script>

    <script>
        // نظام الثيم
        window.applyTheme = function(theme) {
            const btnDark = document.getElementById('btn-theme-dark');
            const btnLight = document.getElementById('btn-theme-light');
            
            if (theme === 'light') {
                document.body.setAttribute('data-theme', 'light');
                btnDark.classList.remove('active-theme');
                btnLight.classList.add('active-theme');
            } else {
                document.body.removeAttribute('data-theme');
                btnLight.classList.remove('active-theme');
                btnDark.classList.add('active-theme');
            }
        };

        window.toggleTheme = async function(theme) {
            window.applyTheme(theme);
            
            // تحديث السيرفر إذا كان اللاعب مسجلاً
            if (window.authInstance && window.authInstance.currentUser && !window.isGuest) {
                try {
                    await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), {
                        "settings.theme": theme
                    });
                } catch (e) { console.warn("لم يتم حفظ الثيم سحابياً", e); }
            }
        };

        function toggleUserDropdown() { document.getElementById('user-dropdown').classList.toggle('show'); }
        
        window.onclick = function(e) { 
            if (!e.target.closest('.profile-trigger') && !e.target.closest('.user-dropdown')) { 
                document.querySelectorAll('.user-dropdown').forEach(d => d.classList.remove('show')); 
            } 
        }
        
        function handleLogout() { 
            window.signOutFunc(window.authInstance).then(() => { 
                toggleUserDropdown(); 
                document.body.removeAttribute('data-theme'); // رجوع للدارك مود عند الخروج
                window.applyTheme('dark');
                document.getElementById('auth-modal').classList.remove('hidden'); 
                document.getElementById('app-shell').classList.remove('unlocked'); 
            }); 
        }
        
        function switchModalMode(mode) { 
            if(mode==='forms'){ 
                document.getElementById('modal-welcome-view').style.display='none'; 
                document.getElementById('modal-form-view').style.display='block'; 
            } 
        }
        
        function setFormType(type) { 
            window.currentFormMode = type; 
            document.getElementById('tab-login').classList.toggle('active', type==='login'); 
            document.getElementById('tab-register').classList.toggle('active', type==='register'); 
            document.getElementById('login-fields').style.display = type==='login'?'block':'none'; 
            document.getElementById('register-fields').style.display = type==='register'?'block':'none'; 
        }
        
        function enterAsGuest() {
            window.isGuest = true;
            document.getElementById('header-name').innerText = "زائر";
            document.getElementById('header-status').innerText = "غير مسجل";
            document.getElementById('header-status').style.color = "var(--text-dim)";
            document.getElementById('header-avatar-fallback').innerText = "ز";
            
            window.updateFriendsUI(false);

            document.getElementById('user-dropdown').innerHTML = `<div class="dropdown-header"><div class="dropdown-name-ar" style="color:var(--text-dim);">زائر غير مسجل</div></div><button class="dropdown-item" onclick="document.getElementById('auth-modal').classList.remove('hidden'); toggleUserDropdown(); switchModalMode('forms'); setFormType('login');"><i class="ph ph-sign-in"></i> تسجيل الدخول</button>`;
            document.getElementById('auth-modal').classList.add('hidden'); document.getElementById('app-shell').classList.add('unlocked'); loadFragment('home', document.querySelector('.nav-btn.active'));
        }
        
        function closeAuthModal() { 
            document.getElementById('auth-modal').classList.add('hidden'); 
            document.getElementById('app-shell').classList.add('unlocked'); 
            if(!window.isGuest) enterAsGuest(); 
        }
        
        function loadFragment(pageName, element) {
            const contentHolder = document.getElementById('content-holder');
            const titles = { 'home': 'الرئيسية', 'play': 'غرف اللعب', 'leaderboard': 'المتصدرون', 'store': 'متجر المزايا', 'profile': 'الملف الشخصي' };
            document.getElementById('page-title').innerText = titles[pageName];
            
            document.querySelectorAll('.nav-btn, .bottom-tab').forEach(btn => {
                btn.classList.remove('active');
                const icon = btn.querySelector('i');
                if(icon) icon.className = icon.className.replace('ph-fill', 'ph');
            });

            if(element) {
                element.classList.add('active');
                const icon = element.querySelector('i');
                if(icon) icon.className = icon.className.replace('ph', 'ph-fill');
                
                const index = Array.from(element.parentElement.children).indexOf(element);
                const mobileTab = document.querySelectorAll('.bottom-tab')[index];
                if(mobileTab && element.classList.contains('nav-btn')) {
                    mobileTab.classList.add('active');
                    mobileTab.querySelector('i').className = mobileTab.querySelector('i').className.replace('ph', 'ph-fill');
                }
            }
            contentHolder.innerHTML = `<div style="display:flex; justify-content:center; align-items:center; height:100%; color:var(--text-dim);">القسم جاهز للبرمجة (${titles[pageName]})</div>`;
        }
    </script>
</body>
</html>
