<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Deception</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="translations.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap');

        :root {
            --bg-base: #141419;
            --surface-panel: #1c1c24;
            --surface-hover: rgba(255, 255, 255, 0.05);
            --accent-red: #ff4c6a;
            --accent-red-dim: rgba(255, 76, 106, 0.2);
            --accent-green: #2ecc71;
            --text-main: #ffffff;
            --text-dim: #6c6d76;
            
            --radius-pill: 100px;
            --font-en: 'Plus Jakarta Sans', sans-serif;
            --font-ar: 'IBM Plex Sans Arabic', sans-serif;
            
            --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 8px 20px rgba(255, 76, 106, 0.35);
            --glass-bg: rgba(20, 20, 25, 0.85);
            --trans-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-base: #f4f5f7;
            --surface-panel: #ffffff;
            --surface-hover: rgba(0, 0, 0, 0.05);
            --text-main: #141419;
            --text-dim: #8f929b;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        html { font-size: 16px; }
        html.font-small { font-size: 14px; }
        html.font-large { font-size: 18px; }

        body.no-animations * { transition: none !important; animation: none !important; }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            background-color: var(--bg-base); color: var(--text-main); font-family: var(--font-ar);
            height: 100vh; overflow: hidden; 
            transition: background-color 0.4s ease, color 0.4s ease;
            overscroll-behavior-y: none; -webkit-user-select: none; user-select: none; 
        }

        input, textarea { -webkit-user-select: auto; user-select: auto; }

        #global-loader { position: fixed; inset: 0; background-color: var(--bg-base); z-index: 999999; display: flex; justify-content: center; align-items: center; transition: 0.5s; }
        .spinner { width: 45px; height: 45px; border: 3px solid rgba(255, 255, 255, 0.1); border-top-color: var(--accent-red); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .auth-overlay, .modal-overlay { position: fixed; inset: 0; background: var(--glass-bg); backdrop-filter: blur(20px); display: flex; justify-content: center; align-items: center; z-index: 100000; transition: var(--trans-smooth); }
        .auth-overlay.hidden, .modal-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .auth-card, .modal-card { background-color: var(--surface-panel); border-radius: 24px; padding: 40px; width: 90%; max-width: 400px; text-align: center; box-shadow: var(--shadow-soft); position: relative; }

        .close-modal-btn { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; transition: var(--trans-smooth); }
        [dir="ltr"] .close-modal-btn { right: auto; left: 20px; }
        .close-modal-btn:hover { color: var(--accent-red); transform: rotate(90deg); }

        .auth-card h2, .modal-card h2 { font-size: 1.5rem; margin-bottom: 10px; font-weight: 700; }
        .auth-card p, .modal-card p { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 30px; line-height: 1.6; }

        .btn-core { background-color: var(--accent-red); color: #fff; border: none; padding: 15px; width: 100%; border-radius: var(--radius-pill); font-weight: 700; font-size: 0.95rem; cursor: pointer; box-shadow: var(--shadow-glow); transition: var(--trans-smooth); }
        .btn-core:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(255, 76, 106, 0.5); }
        .btn-secondary { background-color: var(--surface-hover); color: var(--text-main); border: 1px solid rgba(100,100,100,0.2); padding: 15px; width: 100%; border-radius: var(--radius-pill); font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: var(--trans-smooth); margin-top: 10px; }
        .btn-secondary:hover { background-color: rgba(100,100,100,0.1); }
        .link-guest { display: inline-block; margin-top: 20px; color: var(--text-dim); font-size: 0.9rem; background: none; border: none; cursor: pointer; font-weight: 600; transition: var(--trans-smooth); }
        .link-guest:hover { color: var(--text-main); }

        .modal-tabs { display: flex; margin-bottom: 25px; border-bottom: 2px solid rgba(100,100,100,0.2); }
        .modal-tab-btn { flex: 1; padding: 12px; background: none; border: none; color: var(--text-dim); font-weight: 700; cursor: pointer; position: relative; transition: var(--trans-smooth); }
        .modal-tab-btn.active { color: var(--text-main); }
        .modal-tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 2px; background-color: var(--accent-red); }

        .input-wrapper { margin-bottom: 18px; text-align: center; }
        .input-wrapper label { display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }
        .premium-input { width: 100%; padding: 15px 18px; background-color: var(--bg-base); border: 1px solid transparent; border-radius: 14px; color: var(--text-main); font-size: 0.9rem; outline: none; transition: var(--trans-smooth); direction: ltr; text-align: center; }
        .premium-input:focus { border-color: var(--accent-red); background-color: rgba(100,100,100,0.05); }
        .auth-error-msg { background: rgba(255, 76, 106, 0.1); color: var(--accent-red); padding: 12px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 20px; display: none; text-align: center; }

        .app-shell { display: grid; grid-template-columns: 100px 1fr 100px; width: 100%; height: 100vh; filter: blur(15px); pointer-events: none; opacity: 0; transition: filter 0.5s, opacity 0.5s; }
        .app-shell.unlocked { filter: blur(0); pointer-events: auto; opacity: 1; }

        .sidebar { display: flex; flex-direction: column; align-items: center; padding: 35px 0; background-color: transparent; }

        .sidebar-logo { display: flex; flex-direction: column; align-items: center; margin-bottom: 50px; font-family: var(--font-en); font-size: 1.4rem; font-weight: 800; letter-spacing: 0.5px; line-height: 1.1; color: var(--text-main); cursor: pointer; text-transform: capitalize; }
        .sidebar-logo span { color: var(--text-dim); font-size: 1.2rem; font-weight: 600; }

        .nav-menu { display: flex; flex-direction: column; gap: 15px; width: 100%; align-items: center; }
        .nav-btn { width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: var(--text-dim); background: transparent; border: none; font-size: 1.4rem; cursor: pointer; transition: var(--trans-smooth); }
        .nav-btn:hover { color: var(--accent-red); background-color: var(--surface-hover); }
        .nav-btn.active { color: #fff; background-color: var(--accent-red); box-shadow: var(--shadow-glow); }

        .theme-wrapper { margin-top: auto; background-color: var(--surface-panel); border-radius: var(--radius-pill); padding: 5px; display: flex; flex-direction: column; gap: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .theme-btn { width: 38px; height: 38px; border-radius: 50%; border: none; background: transparent; color: var(--text-dim); font-size: 1.1rem; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: var(--trans-smooth); }
        .theme-btn.active-theme { background-color: #ffffff; color: #141419; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        [data-theme="light"] .theme-btn.active-theme { background-color: #141419; color: #ffffff; }

        .right-sidebar { display: flex; flex-direction: column; align-items: center; padding: 35px 0; background-color: transparent; }
        .friends-header { font-size: 0.8rem; color: var(--text-dim); font-weight: 700; margin-bottom: 25px; text-align: center; }
        #friends-container-desktop { display: flex; flex-direction: column; gap: 15px; align-items: center; width: 100%; }
        .friend-avatar { width: 44px; height: 44px; border-radius: 50%; position: relative; cursor: pointer; transition: var(--trans-smooth); padding: 2px; border: 2px solid transparent; }
        .friend-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .friend-avatar:hover { border-color: var(--accent-red); transform: scale(1.1); }
        .online-dot { position: absolute; bottom: 0; right: 0; width: 12px; height: 12px; background-color: var(--accent-green); border: 2px solid var(--bg-base); border-radius: 50%; }

        .add-friend-btn { width: 44px; height: 44px; border-radius: 50%; background-color: var(--surface-panel); border: 1px dashed var(--text-dim); color: var(--text-dim); display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; transition: var(--trans-smooth); margin-top: 10px; }
        .add-friend-btn:hover { border-color: var(--text-main); color: var(--text-main); background: var(--surface-hover); transform: rotate(90deg); }

        .guest-friends-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; text-align: center; opacity: 0.6; padding: 0 10px; }
        .guest-friends-msg i { font-size: 1.8rem; color: var(--text-dim); }
        .guest-friends-msg span { font-size: 0.75rem; color: var(--text-dim); line-height: 1.6; }

        .main-viewport { display: flex; flex-direction: column; height: 100vh; background-color: transparent; }
        .top-header { height: 100px; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; position: relative; z-index: 100; }

        .header-page-info { display: flex; align-items: center; }
        .page-title { font-size: 1.5rem; font-weight: 700; color: var(--accent-red); margin-inline-start: 40px; transition: var(--trans-smooth); }
        .mobile-brand-title { display: none; }

        .header-actions { display: flex; align-items: center; gap: 20px; direction: ltr; }
        .header-icon-btn { background: transparent; border: none; color: var(--text-dim); font-size: 1.4rem; cursor: pointer; transition: var(--trans-smooth); width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center; position: relative; }
        .header-icon-btn:hover, .header-icon-btn.active { color: var(--text-main); background-color: var(--surface-hover); }
        .notification-dot { position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; background-color: var(--accent-red); border-radius: 50%; display: none; }

        .header-dropdown { position: absolute; top: 65px; left: 0; background-color: var(--surface-panel); border: 1px solid rgba(100,100,100,0.1); border-radius: 16px; width: 280px; box-shadow: var(--shadow-soft); display: none; flex-direction: column; z-index: 1000; direction: var(--dir, rtl); text-align: center; }
        .header-dropdown.show { display: flex; }
        .dropdown-header { padding: 16px 20px; border-bottom: 1px solid rgba(100,100,100,0.1); font-weight: 700; font-size: 0.9rem; color: var(--text-main); display: flex; justify-content: center; }

        .settings-group { padding: 20px; border-bottom: 1px solid rgba(100,100,100,0.05); display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .settings-group label { font-size: 0.8rem; color: var(--text-dim); font-weight: 600; text-transform: uppercase; }
        .segmented-control { display: flex; background: var(--bg-base); border-radius: var(--radius-pill); padding: 4px; border: 1px solid rgba(100,100,100,0.1); width: 100%; direction: ltr; }
        .segment-btn { flex: 1; border: none; background: transparent; color: var(--text-dim); padding: 8px 0; border-radius: var(--radius-pill); font-size: 0.8rem; font-family: var(--font-ar); font-weight: 600; cursor: pointer; transition: var(--trans-smooth); text-align: center; }
        .segment-btn.active { background: var(--surface-panel); color: var(--text-main); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .mobile-only-theme { display: none; } 

        .empty-state { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; color: var(--text-dim); }
        .empty-state i { font-size: 2.5rem; opacity: 0.5; }
        .empty-state span { font-size: 0.85rem; font-weight: 500; }
        .noti-item { padding: 15px 20px; border-bottom: 1px solid rgba(100,100,100,0.05); display: flex; align-items: center; gap: 15px; text-align: right; cursor: pointer; transition: var(--trans-smooth); }
        [dir="ltr"] .noti-item { text-align: left; }
        .noti-item:hover { background-color: var(--surface-hover); }
        .noti-icon { background: var(--accent-red-dim); color: var(--accent-red); width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; flex-shrink: 0; }
        .noti-text-content { display: flex; flex-direction: column; }
        .noti-text { font-size: 0.85rem; color: var(--text-main); line-height: 1.4; }
        .noti-time { font-size: 0.7rem; color: var(--text-dim); margin-top: 4px; }

        .profile-trigger { display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; padding-left: 15px; border-left: 1px solid rgba(100,100,100,0.2); margin-left: 10px; }
        .profile-avatar-fallback { width: 40px; height: 40px; border-radius: 50%; background: var(--surface-panel); display: flex; justify-content: center; align-items: center; font-weight: 700; color: var(--text-main); font-size: 1rem; border: 1px solid rgba(100,100,100,0.1); }
        .profile-info { display: flex; flex-direction: column; text-align: center; font-family: var(--font-en); }
        .profile-name { font-size: 0.85rem; font-weight: 700; color: var(--text-main); }
        .profile-status { font-size: 0.7rem; color: var(--text-dim); }

        .dropdown-item { padding: 16px; color: var(--text-dim); text-decoration: none; display: flex; justify-content: center; align-items: center; gap: 10px; background: transparent; border: none; width: 100%; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: var(--trans-smooth); }
        .dropdown-item:hover { background-color: var(--surface-hover); color: var(--text-main); }
        .dropdown-item.logout { color: var(--accent-red); border-top: 1px solid rgba(100,100,100,0.1); }

        .dynamic-content { flex-grow: 1; overflow-y: auto; overflow-x: hidden; padding: 0 10px 40px 10px; }
        .dynamic-content::-webkit-scrollbar { display: none; } 

        .bottom-bar { display: none; }

        @media (max-width: 900px) {
            .app-shell { display: flex; flex-direction: column; grid-template-columns: none; }
            .sidebar, .right-sidebar { display: none; }
            .top-header { padding: 0 24px; height: 85px; border-bottom: 1px solid rgba(100,100,100,0.05); }
            
            .page-title { display: none; }
            
            .mobile-brand-title { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
            .brand-name { font-size: 1.3rem; font-weight: 800; color: var(--text-main); font-family: var(--font-en); line-height: 1.1; text-transform: capitalize; }
            .brand-name span { color: var(--text-dim); }
            .mobile-section-name { font-size: 0.75rem; color: var(--accent-red); font-weight: 700; }
            
            .mobile-only-theme { display: flex; }
            .dynamic-content { padding: 20px 24px calc(90px + env(safe-area-inset-bottom)) 24px; }
            
            .bottom-bar {
                display: flex; justify-content: space-around; align-items: center;
                position: fixed; 
                bottom: calc(15px + env(safe-area-inset-bottom));
                left: 50%; transform: translateX(-50%);
                width: calc(100% - 40px); max-width: 420px; height: 68px;
                background: rgba(25, 25, 30, 0.25);
                backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
                border: none; box-shadow: none;
                border-radius: var(--radius-pill);
                padding: 0 5px; z-index: 9999;
            }
            
            [data-theme="light"] .bottom-bar {
                background: rgba(255, 255, 255, 0.45);
            }

            .bottom-tab {
                display: flex; flex-direction: column; align-items: center; justify-content: center;
                color: var(--text-dim); background: transparent; border: none;
                height: 100%; flex: 1; cursor: pointer; transition: var(--trans-smooth);
            }
            .bottom-tab i { font-size: 1.6rem; transition: var(--trans-smooth); }
            .bottom-tab.active { color: var(--accent-red); }
            .bottom-tab.active i { transform: translateY(-4px); filter: drop-shadow(0 6px 12px var(--accent-red-dim)); }
        }
    </style>
</head>
<body>
    
    <div id="global-loader"><div class="spinner"></div></div>

    <div id="auth-modal" class="auth-overlay hidden">
        <div class="auth-card">
            <button class="close-modal-btn" onclick="window.closeAuthModal()"><i class="ph ph-x"></i></button>
            <div id="modal-welcome-view">
                <i class="ph-duotone ph-shield-check" style="font-size: 3.5rem; color: var(--accent-red); margin-bottom: 20px; display: inline-block;"></i>
                <h2 data-i18n="welcome_title">النظام السحابي</h2>
                <p data-i18n="welcome_desc">سجل دخولك الآن لتتمكن من اللعب، حفظ تقدمك، والتفاعل مع الأصدقاء.</p>
                <button class="btn-core" onclick="window.switchModalMode('forms')" data-i18n="login_btn">تسجيل الدخول</button>
                <button class="link-guest" onclick="window.enterAsGuest()" data-i18n="guest_btn">المتابعة كزائر</button>
            </div>
            <div id="modal-form-view" style="display: none;">
                <div class="modal-tabs">
                    <button id="tab-login" class="modal-tab-btn active" onclick="window.setFormType('login')" data-i18n="login_btn">تسجيل الدخول</button>
                    <button id="tab-register" class="modal-tab-btn" onclick="window.setFormType('register')" data-i18n="register_btn">حساب جديد</button>
                </div>
                <div id="auth-error" class="auth-error-msg"></div>
                <form id="firebase-form" onsubmit="window.handleAuthSubmit(event)" autocomplete="off">
                    <div id="login-fields">
                        <div class="input-wrapper"><label data-i18n="email_user">المعرف (Email/Username)</label><input type="text" id="login-id" class="premium-input" data-i18n="email_user_ph" placeholder="أدخل البيانات" required autocomplete="off"></div>
                        <div class="input-wrapper"><label data-i18n="password">كلمة المرور</label><input type="password" id="login-password" class="premium-input" placeholder="••••••••" required autocomplete="new-password"></div>
                    </div>
                    <div id="register-fields" style="display: none;">
                        <div class="input-wrapper"><label data-i18n="username">اسم المستخدم</label><input type="text" id="reg-username" class="premium-input" data-i18n="username_ph" placeholder="مثال: Player1" autocomplete="off"></div>
                        <div class="input-wrapper"><label data-i18n="email">البريد الإلكتروني</label><input type="email" id="reg-email" class="premium-input" placeholder="name@domain.com" autocomplete="off"></div>
                        <div class="input-wrapper"><label data-i18n="password">كلمة المرور</label><input type="password" id="reg-password" class="premium-input" placeholder="••••••••" autocomplete="new-password"></div>
                        <div class="input-wrapper"><label data-i18n="confirm_pass">تأكيد كلمة المرور</label><input type="password" id="reg-confirm" class="premium-input" placeholder="••••••••" autocomplete="new-password"></div>
                    </div>
                    <button type="submit" class="btn-core" id="modal-submit-btn" data-i18n="confirm_login">تأكيد الدخول</button>
                </form>
            </div>
        </div>
    </div>

    <div id="add-friend-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <button class="close-modal-btn" onclick="window.closeFriendModal('add-friend-modal')"><i class="ph ph-x"></i></button>
            <h2 data-i18n="add_friend_title">إضافة صديق</h2>
            <p data-i18n="add_friend_desc">أدخل اسم المستخدم لإرسال طلب صداقة.</p>
            <div id="friend-error" class="auth-error-msg"></div>
            <div class="input-wrapper"><input type="text" id="search-friend-input" class="premium-input" data-i18n="search_friend_placeholder" placeholder="اسم المستخدم" autocomplete="off"></div>
            <button class="btn-core" onclick="window.sendFriendRequest()" data-i18n="send_request">إرسال الطلب</button>
        </div>
    </div>

    <div id="review-request-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <button class="close-modal-btn" onclick="window.closeFriendModal('review-request-modal')"><i class="ph ph-x"></i></button>
            <i class="ph-duotone ph-user-plus" style="font-size: 3.5rem; color: var(--accent-green); margin-bottom: 15px; display: inline-block;"></i>
            <h2 data-i18n="friend_req_title">طلب صداقة</h2>
            <p><span data-i18n="friend_req_from">لقد أرسل لك</span> <strong id="request-sender-name" style="color: var(--text-main);"></strong> <span data-i18n="friend_req_msg">طلب صداقة، هل توافق؟</span></p>
            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <button class="btn-core" style="background: var(--accent-green); box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3);" onclick="window.processFriendRequest(true)" data-i18n="accept">قبول</button>
                <button class="btn-secondary" style="margin-top: 0;" onclick="window.processFriendRequest(false)" data-i18n="reject">رفض</button>
            </div>
        </div>
    </div>

    <div id="remove-friend-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <button class="close-modal-btn" onclick="window.closeFriendModal('remove-friend-modal')"><i class="ph ph-x"></i></button>
            <h2 data-i18n="remove_friend_title">حذف صديق</h2>
            <p><span data-i18n="remove_friend_desc">هل أنت متأكد أنك تريد حذف</span> <strong id="remove-friend-name"></strong>؟</p>
            <button class="btn-secondary" style="margin-bottom: 15px;" onclick="window.closeFriendModal('remove-friend-modal')" data-i18n="cancel">إلغاء</button>
            <button class="btn-core" onclick="window.confirmRemoveFriend()" data-i18n="confirm_remove">تأكيد الحذف</button>
        </div>
    </div>

    <div id="app-shell" class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-logo">Decep<br><span>tion</span></div>
            <nav class="nav-menu">
                <button class="nav-btn active" onclick="window.loadFragment('home', this)"><i class="ph-fill ph-squares-four"></i></button>
                <button class="nav-btn" onclick="window.loadFragment('play', this)"><i class="ph ph-game-controller"></i></button>
                <button class="nav-btn" onclick="window.loadFragment('achievements', this)"><i class="ph ph-medal"></i></button>
                <button class="nav-btn" onclick="window.loadFragment('store', this)"><i class="ph ph-storefront"></i></button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc, arrayUnion, arrayRemove, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCLFj5UTX9EtuehoMWV02gkPsAgKPvMhzI", authDomain: "web-game-260b5.firebaseapp.com", projectId: "web-game-260b5", storageBucket: "web-game-260b5.firebasestorage.app", messagingSenderId: "682229509792", appId: "1:682229509792:web:11b4a404459630fcd6a3c5" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app); const db = getFirestore(app);
        
        window.authInstance = auth; window.dbInstance = db; window.signOutFunc = signOut; window.updateDocFunc = updateDoc; window.docFunc = doc; window.arrayUnion = arrayUnion; window.arrayRemove = arrayRemove; window.getDocsFunc = getDocs; window.queryFunc = query; window.whereFunc = where; window.collectionFunc = collection;
        window.isGuest = false; window.currentFormMode = 'login'; window.currentUserData = null; window.friendToRemove = null; window.friendToReview = null;
        window.unsubscribeSnapshot = null;
        window.currentLang = 'ar';

        const hideLoader = () => { const l = document.getElementById('global-loader'); if(l){ l.style.opacity = '0'; setTimeout(()=>l.style.visibility='hidden',400); } };

        window.renderFriendsList = function(containerId) {
            const container = document.getElementById(containerId); if(!container) return;
            if (window.isGuest || !window.currentUserData) {
                container.innerHTML = `<div class="guest-friends-msg"><i class="ph-duotone ph-lock-key"></i><span data-i18n="login_to_see_friends">${window.translations[window.currentLang].login_to_see_friends}</span></div>`;
                return;
            }
            const friends = window.currentUserData.friends || [];
            let html = `<div class="friends-header" data-i18n="friends">${window.translations[window.currentLang].friends}</div>`;
            if (friends.length === 0) { html += `<button class="add-friend-btn" onclick="window.openAddFriendModal()"><i class="ph-bold ph-plus"></i></button>`; } 
            else {
                friends.forEach(f => { html += `<div class="friend-avatar" onclick="window.openRemoveFriendModal('${f}')"><div style="width:100%; height:100%; border-radius:50%; background:var(--surface-panel); display:flex; justify-content:center; align-items:center; font-weight:bold; font-size:16px; color:var(--text-main);">${f.charAt(0).toUpperCase()}</div><div class="online-dot"></div></div>`; });
                html += `<button class="add-friend-btn" onclick="window.openAddFriendModal()"><i class="ph-bold ph-plus"></i></button>`;
            }
            container.innerHTML = html;
        };

        window.renderNotifications = function() {
            const list = document.getElementById('noti-list'); const dot = document.getElementById('noti-dot');
            if(!list || !dot) return;
            if (window.isGuest || !window.currentUserData || !window.currentUserData.friendRequests || window.currentUserData.friendRequests.length === 0) {
                list.innerHTML = `<div class="empty-state"><i class="ph-duotone ph-bell-slash"></i><span data-i18n="no_noti">${window.translations[window.currentLang].no_noti}</span></div>`;
                dot.style.display = 'none'; return;
            }
            dot.style.display = 'block'; let html = '';
            window.currentUserData.friendRequests.forEach(req => {
                html += `<div class="noti-item" onclick="window.openReviewRequestModal('${req}')"><div class="noti-icon"><i class="ph-bold ph-user-plus"></i></div><div class="noti-text-content"><span class="noti-text"><span data-i18n="new_friend_req">${window.translations[window.currentLang].new_friend_req}</span> <strong>${req}</strong></span><span class="noti-time" data-i18n="now">${window.translations[window.currentLang].now}</span></div></div>`;
            });
            list.innerHTML = html;
        };

        onAuthStateChanged(auth, (user) => {
            const nameEl = document.getElementById('header-name'); const fallbackAvatar = document.getElementById('header-avatar-fallback');
            const dropdownStatus = document.getElementById('dropdown-status-name'); const dropdownContent = document.getElementById('dropdown-content-area');

            if (window.unsubscribeSnapshot) { window.unsubscribeSnapshot(); window.unsubscribeSnapshot = null; }

            if (user) {
                window.isGuest = false; let isInitialLoad = true; 
                window.unsubscribeSnapshot = onSnapshot(doc(db, "users", user.uid), (userDoc) => {
                    if (userDoc.exists()) {
                        window.currentUserData = userDoc.data();
                        let displayName = window.currentUserData.username || user.email.split('@')[0];

                        if(nameEl){ nameEl.removeAttribute('data-i18n'); nameEl.innerText = displayName; }
                        if(fallbackAvatar) fallbackAvatar.innerText = displayName.charAt(0).toUpperCase();
                        if(dropdownStatus) dropdownStatus.innerText = "متصل";

                        if (window.currentUserData.settings) {
                            if(window.toggleTheme) window.toggleTheme(window.currentUserData.settings.theme || 'dark', true);
                            if(window.setFontSize) window.setFontSize(window.currentUserData.settings.fontSize || 'default', true);
                            if(window.setAnimation) window.setAnimation(window.currentUserData.settings.animations !== false, true);
                            if(window.setLanguage && window.currentLang !== window.currentUserData.settings.language) window.setLanguage(window.currentUserData.settings.language || 'ar', true);
                        }

                        window.renderFriendsList('friends-container-desktop'); if(document.getElementById('mobile-friends-wrapper')) window.renderFriendsList('mobile-friends-wrapper');
                        window.renderNotifications();

                        if (isInitialLoad && dropdownContent) {
                            dropdownContent.innerHTML = `<button class="dropdown-item" onclick="window.loadFragment('profile', null); window.toggleDropdown('');"><i class="ph ph-user-circle"></i> <span data-i18n="title_profile">${window.translations[window.currentLang].title_profile}</span></button><button class="dropdown-item logout" onclick="window.handleLogout()"><i class="ph ph-sign-out"></i> <span data-i18n="logout">${window.translations[window.currentLang].logout}</span></button>`;
                            if(window.clearAuthInputs) window.clearAuthInputs(); 
                            document.getElementById('auth-modal').classList.add('hidden'); 
                            document.getElementById('app-shell').classList.add('unlocked');
                            
                            const currentActive = document.querySelector('.nav-btn.active');
                            if(currentActive) window.loadFragment(['home','play','achievements','store','profile'][Array.from(document.querySelectorAll('.nav-btn')).indexOf(currentActive)] || 'home', currentActive);
                            hideLoader(); isInitialLoad = false;
                        }
                    }
                });
            } else {
                if (!window.isGuest) {
                    window.currentUserData = null; if(window.clearAuthInputs) window.clearAuthInputs(); 
                    if(nameEl) { nameEl.setAttribute('data-i18n', 'guest_name'); nameEl.innerText = window.translations[window.currentLang].guest_name; }
                    if(document.getElementById('modal-welcome-view')) document.getElementById('modal-welcome-view').style.display = 'block'; 
                    if(document.getElementById('modal-form-view')) document.getElementById('modal-form-view').style.display = 'none';
                    if(document.getElementById('auth-modal')) document.getElementById('auth-modal').classList.remove('hidden'); 
                    if(document.getElementById('app-shell')) document.getElementById('app-shell').classList.remove('unlocked');
                }
                hideLoader();
            }
        });

        window.handleAuthSubmit = async function(e) {
            e.preventDefault(); const errorDiv = document.getElementById('auth-error'); const btn = document.getElementById('modal-submit-btn');
            errorDiv.style.display = 'none'; btn.disabled = true; btn.innerText = "جاري التحقق...";
            try {
                if (window.currentFormMode === 'login') {
                    let id = document.getElementById('login-id').value.trim(); let pass = document.getElementById('login-password').value; let email = id;
                    if (!id.includes('@')) { const q = query(collection(db, "users"), where("username_lower", "==", id.toLowerCase())); const snap = await getDocs(q); if (snap.empty) throw { message: "البيانات غير صحيحة" }; email = snap.docs[0].data().email; }
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const user = document.getElementById('reg-username').value.trim(); const email = document.getElementById('reg-email').value.trim(); const pass = document.getElementById('reg-password').value; const conf = document.getElementById('reg-confirm').value;
                    if (pass !== conf) throw { message: "كلمات المرور غير متطابقة" }; if (pass.length < 6) throw { message: "كلمة المرور 6 أحرف على الأقل" };
                    const q = query(collection(db, "users"), where("username_lower", "==", user.toLowerCase())); const snap = await getDocs(q); if (!snap.empty) throw { message: "اسم المستخدم محجوز" };
                    const cred = await createUserWithEmailAndPassword(auth, email.toLowerCase(), pass);
                    await setDoc(doc(db, "users", cred.user.uid), { username: user, username_lower: user.toLowerCase(), email: email.toLowerCase(), matches: 0, wins: 0, friends: [], friendRequests: [], settings: { theme: 'dark', fontSize: 'default', animations: true, language: 'ar' }, createdAt: new Date().toISOString() });
                }
            } catch (err) {
                let msg = err.message; if(msg.includes("invalid-credential")) msg = "البيانات غير صحيحة"; if(msg.includes("email-already-in-use")) msg = "البريد الإلكتروني مستخدم";
                errorDiv.innerText = msg; errorDiv.style.display = 'block';
            } finally { btn.disabled = false; btn.innerText = window.currentFormMode === 'register' ? window.translations[window.currentLang].confirm_register : window.translations[window.currentLang].confirm_login; }
        }

        window.setLanguage = async function(lang, skipSave = false) {
            window.currentLang = lang; document.documentElement.lang = lang; document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active')); const langBtn = document.getElementById('lang-' + lang); if(langBtn) langBtn.classList.add('active');
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (window.translations && window.translations[lang] && window.translations[lang][key]) {
                    if (el.tagName === 'INPUT' && el.hasAttribute('placeholder')) el.setAttribute('placeholder', window.translations[lang][key]);
                    else el.innerText = window.translations[lang][key];
                }
            });
            window.renderNotifications(); window.renderFriendsList('friends-container-desktop'); if(document.getElementById('mobile-friends-wrapper')) window.renderFriendsList('mobile-friends-wrapper');
            const activeBtn = document.querySelector('.nav-btn.active');
            if(activeBtn) {
                const pageId = Array.from(document.querySelectorAll('.nav-btn')).indexOf(activeBtn); const pages = ['home', 'play', 'achievements', 'store', 'profile'];
                if(pages[pageId]) { const pt = document.getElementById('page-title'); if(pt) pt.innerText = window.translations[lang]['title_' + pages[pageId]]; const mn = document.getElementById('mobile-section-name'); if(mn) mn.innerText = window.translations[lang]['title_' + pages[pageId]]; }
            }
            if (!skipSave && auth.currentUser && !window.isGuest) { try { await updateDoc(doc(db, "users", auth.currentUser.uid), { "settings.language": lang }); } catch(e){} }
        };

        window.setFontSize = async function(size, skipSave = false) {
            document.documentElement.classList.remove('font-small', 'font-large'); if(size !== 'default') document.documentElement.classList.add(`font-${size}`);
            document.querySelectorAll('#font-small, #font-default, #font-large').forEach(b => b.classList.remove('active')); const sizeBtn = document.getElementById(`font-${size}`); if(sizeBtn) sizeBtn.classList.add('active');
            if (!skipSave && auth.currentUser && !window.isGuest) { try { await updateDoc(doc(db, "users", auth.currentUser.uid), { "settings.fontSize": size }); } catch(e){} }
        };

        window.setAnimation = async function(isOn, skipSave = false) {
            if(isOn) document.body.classList.remove('no-animations'); else document.body.classList.add('no-animations');
            const animOn = document.getElementById('anim-on'); if(animOn) animOn.classList.toggle('active', isOn); const animOff = document.getElementById('anim-off'); if(animOff) animOff.classList.toggle('active', !isOn);
            if (!skipSave && auth.currentUser && !window.isGuest) { try { await updateDoc(doc(db, "users", auth.currentUser.uid), { "settings.animations": isOn }); } catch(e){} }
        };

        window.toggleTheme = async function(mode, skipSave = false) {
            const body = document.body; const darkBtns = [document.getElementById('btn-theme-dark'), document.getElementById('mini-theme-dark')]; const lightBtns = [document.getElementById('btn-theme-light'), document.getElementById('mini-theme-light')];
            if (mode === 'light') { body.setAttribute('data-theme', 'light'); lightBtns.forEach(b => { if(b) b.classList.add('active-theme', 'active'); }); darkBtns.forEach(b => { if(b) b.classList.remove('active-theme', 'active'); }); } 
            else { body.removeAttribute('data-theme'); darkBtns.forEach(b => { if(b) b.classList.add('active-theme', 'active'); }); lightBtns.forEach(b => { if(b) b.classList.remove('active-theme', 'active'); }); }
            if (!skipSave && auth.currentUser && !window.isGuest) { try { await updateDoc(doc(db, "users", auth.currentUser.uid), { "settings.theme": mode }); } catch (e) {} }
        };

        window.openAddFriendModal = function() { document.getElementById('add-friend-modal').classList.remove('hidden'); const err = document.getElementById('friend-error'); if(err) err.style.display='none'; const inp = document.getElementById('search-friend-input'); if(inp) inp.value=''; }
        window.openRemoveFriendModal = function(friendName) { window.friendToRemove = friendName; document.getElementById('remove-friend-name').innerText = friendName; document.getElementById('remove-friend-modal').classList.remove('hidden'); }
        window.closeFriendModal = function(id) { document.getElementById(id).classList.add('hidden'); }
        window.openReviewRequestModal = function(requesterName) { window.friendToReview = requesterName; document.getElementById('request-sender-name').innerText = requesterName; window.toggleDropdown('noti-dropdown'); document.getElementById('review-request-modal').classList.remove('hidden'); };

        window.sendFriendRequest = async function() {
            const targetUsername = document.getElementById('search-friend-input').value.trim().toLowerCase(); const errDiv = document.getElementById('friend-error'); if(!targetUsername) return;
            if(targetUsername === window.currentUserData.username_lower) { errDiv.innerText="لا يمكنك إضافة نفسك!"; errDiv.style.display='block'; return; }
            try {
                const q = query(collection(db, "users"), where("username_lower", "==", targetUsername));
                const snap = await getDocs(q);
                if(snap.empty) { errDiv.innerText="المستخدم غير موجود."; errDiv.style.display='block'; return; }
                const targetDocId = snap.docs[0].id; const myName = window.currentUserData.username || auth.currentUser.email.split('@')[0];
                await updateDoc(doc(db, "users", targetDocId), { friendRequests: arrayUnion(myName) });
                alert("تم إرسال الطلب بنجاح!"); window.closeFriendModal('add-friend-modal');
            } catch(e) { errDiv.innerText = "حدث خطأ في الإرسال."; errDiv.style.display='block'; }
        }

        window.processFriendRequest = async function(isAccepted) {
            if(!window.friendToReview) return; const reqName = window.friendToReview; window.closeFriendModal('review-request-modal');
            try {
                if(isAccepted) {
                    await updateDoc(doc(db, "users", auth.currentUser.uid), { friends: arrayUnion(reqName), friendRequests: arrayRemove(reqName) });
                    const q = query(collection(db, "users"), where("username_lower", "==", reqName.toLowerCase()));
                    const snap = await getDocs(q);
                    if(!snap.empty) { await updateDoc(doc(db, "users", snap.docs[0].id), { friends: arrayUnion(window.currentUserData.username) }); }
                } else {
                    await updateDoc(doc(db, "users", auth.currentUser.uid), { friendRequests: arrayRemove(reqName) });
                }
            } catch(e) { alert("حدث خطأ أثناء معالجة الطلب."); }
        };

        window.confirmRemoveFriend = async function() {
            if(!window.friendToRemove) return;
            try {
                const targetFriendName = window.friendToRemove; const myUid = auth.currentUser.uid; const myName = window.currentUserData.username;
                await updateDoc(doc(db, "users", myUid), { friends: arrayRemove(targetFriendName) });
                const q = query(collection(db, "users"), where("username_lower", "==", targetFriendName.toLowerCase()));
                const snap = await getDocs(q);
                if (!snap.empty) { const targetDocId = snap.docs[0].id; await updateDoc(doc(db, "users", targetDocId), { friends: arrayRemove(myName) }); }
                window.closeFriendModal('remove-friend-modal'); window.friendToRemove = null;
            } catch(e) { alert("حدث خطأ أثناء الحذف."); }
        }

        window.clearAuthInputs = function() { const form = document.getElementById('firebase-form'); if(form) form.reset(); const err = document.getElementById('auth-error'); if(err) err.style.display = 'none'; };

        window.setFormType = function(type) { 
            window.currentFormMode = type; 
            const tLog = document.getElementById('tab-login'); if(tLog) tLog.classList.toggle('active', type === 'login'); 
            const tReg = document.getElementById('tab-register'); if(tReg) tReg.classList.toggle('active', type === 'register'); 
            const lFields = document.getElementById('login-fields'); if(lFields) lFields.style.display = type === 'login' ? 'block' : 'none'; 
            const rFields = document.getElementById('register-fields'); if(rFields) rFields.style.display = type === 'register' ? 'block' : 'none'; 
            document.getElementById('login-id').required = type === 'login'; document.getElementById('login-password').required = type === 'login';
            document.getElementById('reg-username').required = type === 'register'; document.getElementById('reg-email').required = type === 'register'; document.getElementById('reg-password').required = type === 'register';
            const sBtn = document.getElementById('modal-submit-btn'); if(sBtn) sBtn.innerText = type === 'register' ? window.translations[window.currentLang].confirm_register : window.translations[window.currentLang].confirm_login;
        }

        window.toggleDropdown = function(dropdownId, triggerElement) {
            const tgt = document.getElementById(dropdownId); const isOpen = tgt && tgt.classList.contains('show');
            document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show')); document.querySelectorAll('.header-icon-btn, .profile-trigger').forEach(t => t.classList.remove('active'));
            if (!isOpen && tgt) { tgt.classList.add('show'); if(triggerElement) triggerElement.classList.add('active'); }
        }

        window.onclick = function(e) { 
            if (!e.target.closest('.header-icon-btn') && !e.target.closest('.profile-trigger') && !e.target.closest('.header-dropdown') && !e.target.closest('.modal-card')) { 
                document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show')); document.querySelectorAll('.header-icon-btn, .profile-trigger').forEach(t => t.classList.remove('active')); 
            } 
        }

        window.handleLogout = function() { 
            signOut(auth).then(() => { 
                document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show'));
                document.body.removeAttribute('data-theme'); document.documentElement.className=''; document.body.className='';
                window.currentUserData = null; window.clearAuthInputs(); 
                const nameEl = document.getElementById('header-name'); if(nameEl) { nameEl.setAttribute('data-i18n', 'guest_name'); nameEl.innerText = window.translations[window.currentLang].guest_name; }
                const wView = document.getElementById('modal-welcome-view'); if(wView) wView.style.display = 'block'; 
                const fView = document.getElementById('modal-form-view'); if(fView) fView.style.display = 'none';
                const aModal = document.getElementById('auth-modal'); if(aModal) aModal.classList.remove('hidden'); 
                const shell = document.getElementById('app-shell'); if(shell) shell.classList.remove('unlocked'); 
            }); 
        }

        window.switchModalMode = function(mode) { 
            if(mode === 'forms'){ 
                const wView = document.getElementById('modal-welcome-view'); if(wView) wView.style.display = 'none'; 
                const fView = document.getElementById('modal-form-view'); if(fView) fView.style.display = 'block'; 
            } 
        }

        window.openLoginDirectly = function() {
            const wView = document.getElementById('modal-welcome-view'); if(wView) wView.style.display = 'none'; 
            const fView = document.getElementById('modal-form-view'); if(fView) fView.style.display = 'block';
            window.setFormType('login'); 
            const aModal = document.getElementById('auth-modal'); if(aModal) aModal.classList.remove('hidden'); 
            const shell = document.getElementById('app-shell'); if(shell) shell.classList.remove('unlocked'); 
            window.toggleDropdown('');
        };

        window.enterAsGuest = function() {
            window.isGuest = true; window.currentUserData = null;
            const nameEl = document.getElementById('header-name'); if(nameEl) { nameEl.setAttribute('data-i18n', 'guest_name'); nameEl.innerText = window.translations[window.currentLang].guest_name; }
            const dropStat = document.getElementById('dropdown-status-name'); if(dropStat) dropStat.innerText = window.translations[window.currentLang].guest_status; 
            const avtFall = document.getElementById('header-avatar-fallback'); if(avtFall) avtFall.innerText = "ز";
            window.renderFriendsList('friends-container-desktop'); window.renderNotifications();
            const dropContent = document.getElementById('dropdown-content-area'); if(dropContent) dropContent.innerHTML = `<button class="dropdown-item" onclick="window.openLoginDirectly()"><i class="ph ph-sign-in"></i> <span data-i18n="login_btn">${window.translations[window.currentLang].login_btn}</span></button>`;
            window.clearAuthInputs(); 
            const aModal = document.getElementById('auth-modal'); if(aModal) aModal.classList.add('hidden'); 
            const shell = document.getElementById('app-shell'); if(shell) shell.classList.add('unlocked'); 
            window.loadFragment('home', document.querySelector('.nav-btn.active'));
        }

        window.closeAuthModal = function() { 
            window.clearAuthInputs(); 
            const aModal = document.getElementById('auth-modal'); if(aModal) aModal.classList.add('hidden'); 
            const shell = document.getElementById('app-shell'); if(shell) shell.classList.add('unlocked'); 
            if(!window.isGuest) window.enterAsGuest(); 
        }

        window.loadFragment = async function(pageName, element) {
            const contentHolder = document.getElementById('content-holder');
            const titles = { 'home': 'title_home', 'play': 'title_play', 'achievements': 'title_achievements', 'store': 'title_store', 'friends': 'title_friends', 'profile': 'title_profile' };
            
            const pt = document.getElementById('page-title'); if(pt && window.translations) pt.innerText = window.translations[window.currentLang][titles[pageName]];
            const mn = document.getElementById('mobile-section-name'); if(mn && window.translations) mn.innerText = window.translations[window.currentLang][titles[pageName]];
            
            document.querySelectorAll('.nav-btn, .bottom-tab').forEach(btn => { 
                btn.classList.remove('active'); 
                const icon = btn.querySelector('i'); 
                if(icon) icon.className = icon.className.replace('ph-fill', 'ph'); 
            });

            if(element) {
                element.classList.add('active'); 
                const icon = element.querySelector('i'); 
                if(icon) icon.className = icon.className.replace('ph', 'ph-fill');
                
                const isNav = element.classList.contains('nav-btn');
                const tabsList = isNav ? document.querySelectorAll('.nav-btn') : document.querySelectorAll('.bottom-tab');
                const targetList = isNav ? document.querySelectorAll('.bottom-tab') : document.querySelectorAll('.nav-btn');
                const index = Array.from(tabsList).indexOf(element);
                
                if(pageName === 'friends' && !isNav) {} 
                else if (pageName === 'store' && isNav) { const mStore = document.querySelectorAll('.bottom-tab')[3]; if(mStore) { mStore.classList.add('active'); mStore.querySelector('i').className = mStore.querySelector('i').className.replace('ph', 'ph-fill'); } }
                else if (pageName === 'profile' && isNav) { const mProf = document.querySelectorAll('.bottom-tab')[5]; if(mProf) { mProf.classList.add('active'); mProf.querySelector('i').className = mProf.querySelector('i').className.replace('ph', 'ph-fill'); } }
                else { const matchedTab = targetList[index]; if(matchedTab) { matchedTab.classList.add('active'); matchedTab.querySelector('i').className = matchedTab.querySelector('i').className.replace('ph', 'ph-fill'); } }
            }

            if(contentHolder) contentHolder.innerHTML = '<div style="display:flex; justify-content:center; align-items:center; height:100%;"><div class="spinner" style="width:30px; height:30px;"></div></div>';

            try {
                const response = await fetch(`pages/${pageName}.html`);
                if (!response.ok) throw new Error('Page not found');
                
                const htmlContent = await response.text();
                
                // حقن الكود داخل الـ content-holder
                if(contentHolder) {
                    contentHolder.innerHTML = htmlContent;

                    // --- الكود السحري الجديد لتشغيل الجافاسكريبت داخل الصفحات الفرعية ---
                    const scripts = contentHolder.querySelectorAll('script');
                    scripts.forEach(oldScript => {
                        const newScript = document.createElement('script');
                        Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                        newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                        oldScript.parentNode.replaceChild(newScript, oldScript);
                    });
                    // ------------------------------------------------------------------
                }

                if(window.setLanguage) window.setLanguage(window.currentLang, true);

                if (pageName === 'friends') {
                    window.renderFriendsList('mobile-friends-wrapper');
                }

            } catch (error) {
                if(contentHolder && window.translations) contentHolder.innerHTML = `<div style="display:flex; justify-content:center; align-items:center; height:100%; color:var(--text-dim); font-size:1.2rem; font-weight:bold;">جاري العمل على صفحة ${window.translations[window.currentLang][titles[pageName]]}...</div>`;
            }
        }
    </script>
</body>
</html>
