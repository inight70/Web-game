<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مستودع الخداع - اللوبي</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>

    <div id="global-loader">
        <div class="spinner"></div>
    </div>

    <div id="auth-modal" class="auth-overlay hidden">
        <div class="auth-card">
            <button class="close-modal-btn" onclick="closeAuthModal()"><i class="ph ph-x"></i></button>
            
            <div id="modal-welcome-view">
                <i class="ph ph-fingerprint" style="font-size: 42px; color: var(--text-primary); margin-bottom: 20px; display: inline-block;"></i>
                <h2>سجل دخولك</h2>
                <p>سجل دخولك الآن لتلعب، وتحفظ تقدمك، إحصائياتك، وإعداداتك السحابية بشكل آمن.</p>
                <button class="btn-core" onclick="switchModalMode('forms')">تسجيل الدخول</button>
                <button class="link-guest" onclick="enterAsGuest()">المتابعة كزائر</button>
            </div>

            <div id="modal-form-view" style="display: none;">
                <div class="modal-tabs">
                    <button id="tab-login" class="modal-tab-btn active" onclick="setFormType('login')">تسجيل الدخول</button>
                    <button id="tab-register" class="modal-tab-btn" onclick="setFormType('register')">حساب جديد</button>
                </div>
                
                <div id="auth-error" class="auth-error-msg"></div>

                <form id="firebase-form" onsubmit="handleAuthSubmit(event)" autocomplete="off">
                    <div id="login-fields">
                        <div class="input-wrapper">
                            <label>البريد الإلكتروني أو اسم المستخدم</label>
                            <input type="text" id="login-id" class="premium-input" placeholder="أدخل البيانات" autocomplete="off" required>
                        </div>
                        <div class="input-wrapper">
                            <label>كلمة المرور</label>
                            <input type="password" id="login-password" class="premium-input" placeholder="••••••••" autocomplete="new-password" required>
                        </div>
                    </div>

                    <div id="register-fields" style="display: none;">
                        <div class="input-wrapper">
                            <label>اسم المستخدم (مميز ولا يتكرر)</label>
                            <input type="text" id="reg-username" class="premium-input" placeholder="مثال: DarkKnight" autocomplete="off">
                        </div>
                        <div class="input-wrapper">
                            <label>البريد الإلكتروني</label>
                            <input type="email" id="reg-email" class="premium-input" placeholder="name@example.com" autocomplete="off">
                        </div>
                        <div class="input-wrapper">
                            <label>كلمة المرور</label>
                            <input type="password" id="reg-password" class="premium-input" placeholder="••••••••" autocomplete="new-password">
                        </div>
                        <div class="input-wrapper">
                            <label>تأكيد كلمة المرور</label>
                            <input type="password" id="reg-confirm" class="premium-input" placeholder="••••••••" autocomplete="new-password">
                        </div>
                    </div>

                    <button type="submit" class="btn-core" id="modal-submit-btn" style="margin-top: 10px;">دخول</button>
                </form>
            </div>
        </div>
    </div>

    <!-- الهيكل الجديد ثلاثي الأعمدة (CSS Grid) -->
    <div id="app-shell" class="app-shell">
        
        <!-- العمود الأول: القائمة الجانبية (يمين) -->
        <aside class="sidebar">
            <div class="sidebar-brand">D.S</div>
            
            <div class="nav-wrapper">
                <button class="nav-btn active" onclick="loadFragment('home', this)"><i class="ph ph-house"></i><span></span></button>
                <button class="nav-btn" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i><span></span></button>
                <button class="nav-btn" onclick="loadFragment('leaderboard', this)"><i class="ph ph-trophy"></i><span></span></button>
                <button class="nav-btn" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i><span></span></button>
                <button class="nav-btn" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i><span></span></button>
            </div>

            <!-- زر الثيم الكبسولي (مطابق للصورة) -->
            <div class="theme-pill-container">
                <button class="theme-icon-btn active" id="theme-light-btn" onclick="setTheme('light')"><i class="ph ph-sun"></i></button>
                <button class="theme-icon-btn" id="theme-dark-btn" onclick="setTheme('dark')"><i class="ph ph-moon"></i></button>
            </div>
        </aside>

        <!-- العمود الثاني: المحتوى الرئيسي (الوسط) -->
        <main class="main-viewport">
            <header class="top-header">
                <div class="header-title" id="page-title">الرئيسية</div>
                <div class="header-actions">
                    <div class="user-info-text">
                        <span class="user-name-display" id="display-name">زائر</span>
                        <span class="user-status-display" id="display-status">غير مسجل</span>
                    </div>
                    <div style="position: relative;">
                        <div class="avatar-circle" id="header-avatar" onclick="toggleUserDropdown()">ز</div>
                        <div class="user-dropdown" id="user-dropdown"></div>
                    </div>
                </div>
            </header>
            <div class="dynamic-content" id="content-holder"></div>
        </main>

        <!-- العمود الثالث: شريط الأصدقاء (يسار) -->
        <aside class="friends-sidebar" id="friends-sidebar">
            <!-- سيتم حقن المحتوى هنا برمجياً بناءً على حالة تسجيل الدخول -->
        </aside>

        <!-- شريط التصفح السفلي للجوال -->
        <nav class="bottom-bar">
            <button class="bottom-tab active" onclick="loadFragment('home', this)"><i class="ph ph-house"></i></button>
            <button class="bottom-tab" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i></button>
            <button class="bottom-tab" onclick="loadFragment('leaderboard', this)"><i class="ph ph-trophy"></i></button>
            <button class="bottom-tab" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i></button>
            <button class="bottom-tab" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i></button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLFj5UTX9EtuehoMWV02gkPsAgKPvMhzI",
            authDomain: "web-game-260b5.firebaseapp.com",
            projectId: "web-game-260b5",
            storageBucket: "web-game-260b5.firebasestorage.app",
            messagingSenderId: "682229509792",
            appId: "1:682229509792:web:11b4a404459630fcd6a3c5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        window.authInstance = auth; 
        window.dbInstance = db;
        window.updateDocFunc = updateDoc;
        window.docFunc = doc;
        window.signOutFunc = signOut;
        window.isGuest = false;
        window.currentFormMode = 'login'; 

        window.clearAuthInputs = function() {
            document.getElementById('login-id').value = "";
            document.getElementById('login-password').value = "";
            document.getElementById('reg-username').value = "";
            document.getElementById('reg-email').value = "";
            document.getElementById('reg-password').value = "";
            document.getElementById('reg-confirm').value = "";
            if(document.getElementById('auth-error')) document.getElementById('auth-error').style.display = 'none';
        };

        const hideLoader = () => {
            const loader = document.getElementById('global-loader');
            if(loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.visibility = 'hidden', 500);
            }
        };

        // دالة التحكم بتصميم الأصدقاء الذكية
        const updateFriendsSidebar = (isLoggedIn) => {
            const friendsSidebar = document.getElementById('friends-sidebar');
            if (!isLoggedIn) {
                friendsSidebar.innerHTML = `
                    <div class="friends-guest-state">
                        <i class="ph ph-lock-key"></i>
                        <p>سجل دخولك<br>لترى الأصدقاء</p>
                    </div>
                `;
            } else {
                friendsSidebar.innerHTML = `
                    <div class="friends-title">الأصدقاء</div>
                    <div class="friends-list">
                        <!-- أيقونات وهمية مؤقتة مطابقة للصورة -->
                        <div class="friend-item" title="صديق 1"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="F"><div class="status-dot online"></div></div>
                        <div class="friend-item" title="صديق 2"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" alt="A"><div class="status-dot online"></div></div>
                        <div class="friend-item" title="صديق 3"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Milo" alt="M"><div class="status-dot dnd"></div></div>
                        
                        <button class="add-friend-btn" title="إضافة صديق"><i class="ph ph-plus"></i></button>
                    </div>
                `;
            }
        };

        onAuthStateChanged(auth, async (user) => {
            const dropdown = document.getElementById('user-dropdown');
            const avatar = document.getElementById('header-avatar');
            const nameDisplay = document.getElementById('display-name');
            const statusDisplay = document.getElementById('display-status');

            if (user) {
                window.isGuest = false;
                let displayName = user.email.split('@')[0];
                let matches = 0;
                let wins = 0;

                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const data = userDoc.data();
                        displayName = data.username || displayName;
                        matches = data.matches || 0;
                        wins = data.wins || 0;
                        
                        let userTheme = 'dark';
                        if (data.settings && data.settings.theme) {
                            userTheme = data.settings.theme;
                        } else if (data.theme) {
                            userTheme = data.theme; 
                        }
                        window.setTheme(userTheme, false); // تطبيق الثيم بدون رفع للسيرفر لأنه مسحوب للتو
                    }
                } catch (err) { console.warn("مشكلة في السيرفر", err); }

                avatar.innerText = displayName.charAt(0).toUpperCase();
                nameDisplay.innerText = displayName;
                statusDisplay.innerText = "متصل";
                statusDisplay.style.color = "var(--status-online)";

                dropdown.innerHTML = `
                    <div class="dropdown-header">
                        <div class="dropdown-name">${displayName}</div>
                        <div class="dropdown-stats">
                            <div class="stat-item"><span class="stat-label">مباريات</span><span class="stat-value">${matches}</span></div>
                            <div class="stat-item"><span class="stat-label">انتصارات</span><span class="stat-value">${wins}</span></div>
                        </div>
                    </div>
                    <button class="dropdown-item" onclick="loadFragment('profile', document.querySelectorAll('.nav-btn')[4]); toggleUserDropdown();"><i class="ph ph-user-circle"></i> إعدادات الحساب</button>
                    <button class="dropdown-item logout" onclick="handleLogout()"><i class="ph ph-sign-out"></i> تسجيل الخروج</button>
                `;

                updateFriendsSidebar(true);
                window.clearAuthInputs(); 
                document.getElementById('auth-modal').classList.add('hidden');
                document.getElementById('app-shell').classList.add('unlocked');
                window.loadFragment('home', document.querySelector('.nav-btn'));
                hideLoader();
            } else {
                if (!window.isGuest) {
                    window.clearAuthInputs();
                    document.getElementById('auth-modal').classList.remove('hidden');
                    document.getElementById('app-shell').classList.remove('unlocked');
                }
                hideLoader();
            }
        });

        window.handleAuthSubmit = async function(e) {
            e.preventDefault();
            const errorDiv = document.getElementById('auth-error');
            const submitBtn = document.getElementById('modal-submit-btn');
            
            errorDiv.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerText = "جاري التحقق...";

            try {
                if (window.currentFormMode === 'login') {
                    let loginId = document.getElementById('login-id').value.trim();
                    let password = document.getElementById('login-password').value;
                    let loginEmail = loginId;

                    if (!loginId.includes('@')) {
                        const loginIdLower = loginId.toLowerCase();
                        const usersRef = collection(db, "users");
                        const q = query(usersRef, where("username_lower", "==", loginIdLower));
                        const querySnapshot = await getDocs(q);
                        
                        if (querySnapshot.empty) throw { message: "اسم المستخدم غير موجود." };
                        loginEmail = querySnapshot.docs[0].data().email;
                    } else {
                        loginEmail = loginId.toLowerCase();
                    }
                    
                    await signInWithEmailAndPassword(auth, loginEmail, password);

                } else {
                    const username = document.getElementById('reg-username').value.trim();
                    const email = document.getElementById('reg-email').value.trim();
                    const password = document.getElementById('reg-password').value;
                    const confirmPass = document.getElementById('reg-confirm').value;
                    
                    if (password !== confirmPass) throw { message: "كلمات المرور غير متطابقة." };
                    
                    const usernameLower = username.toLowerCase();
                    const usersRef = collection(db, "users");
                    
                    const q = query(usersRef, where("username_lower", "==", usernameLower));
                    const querySnapshot = await getDocs(q);
                    
                    if (!querySnapshot.empty) throw { message: "اسم المستخدم محجوز مسبقاً، اختر اسماً آخر." };

                    const userCredential = await createUserWithEmailAndPassword(auth, email.toLowerCase(), password);
                    const user = userCredential.user;

                    await setDoc(doc(db, "users", user.uid), {
                        username: username, 
                        username_lower: usernameLower, 
                        email: email.toLowerCase(),
                        matches: 0,
                        wins: 0,
                        settings: { theme: 'dark' },
                        createdAt: new Date().toISOString()
                    });
                }
            } catch (error) {
                let errorMsg = "حدث خطأ ما.";
                if (error.message) {
                    if(error.message.includes("اسم المستخدم غير موجود")) errorMsg = error.message;
                    else if (error.message.includes("محجوز")) errorMsg = error.message;
                    else if (error.message.includes("كلمات المرور")) errorMsg = error.message;
                    else if (error.message.includes("invalid-credential")) errorMsg = "بيانات الدخول غير صحيحة.";
                    else if (error.message.includes("email-already-in-use")) errorMsg = "البريد الإلكتروني مستخدم مسبقاً.";
                    else if (error.message.includes("network-request-failed")) errorMsg = "تأكد من اتصالك بالإنترنت.";
                }
                errorDiv.innerText = errorMsg;
                errorDiv.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = window.currentFormMode === 'register' ? 'إنشاء الحساب' : 'تسجيل الدخول';
            }
        }
    </script>

    <script>
        function toggleUserDropdown() { document.getElementById('user-dropdown').classList.toggle('show'); }

        window.onclick = function(event) {
            if (!event.target.matches('.avatar-circle') && !event.target.closest('.user-dropdown')) {
                const dropdowns = document.getElementsByClassName("user-dropdown");
                for (let i = 0; i < dropdowns.length; i++) {
                    if (dropdowns[i].classList.contains('show')) dropdowns[i].classList.remove('show');
                }
            }
        }

        function handleLogout() {
            if (typeof window.clearAuthInputs === 'function') window.clearAuthInputs();
            window.setTheme('dark', false); // العودة للثيم الافتراضي
            
            window.signOutFunc(window.authInstance).then(() => {
                toggleUserDropdown();
                document.getElementById('auth-modal').classList.remove('hidden');
                document.getElementById('app-shell').classList.remove('unlocked');
            });
        }

        function switchModalMode(mode) {
            if(mode === 'forms') {
                document.getElementById('modal-welcome-view').style.display = 'none';
                document.getElementById('modal-form-view').style.display = 'block';
            }
        }

        function setFormType(type) {
            window.currentFormMode = type;
            document.getElementById('tab-login').classList.toggle('active', type === 'login');
            document.getElementById('tab-register').classList.toggle('active', type === 'register');
            document.getElementById('login-fields').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('register-fields').style.display = type === 'register' ? 'block' : 'none';
            document.getElementById('login-id').required = type === 'login';
            document.getElementById('login-password').required = type === 'login';
            document.getElementById('reg-username').required = type === 'register';
            document.getElementById('reg-email').required = type === 'register';
            document.getElementById('reg-password').required = type === 'register';
            document.getElementById('modal-submit-btn').innerText = type === 'register' ? 'إنشاء الحساب' : 'تسجيل الدخول';
        }

        function enterAsGuest() {
            window.isGuest = true;
            if (typeof window.clearAuthInputs === 'function') window.clearAuthInputs();

            document.getElementById('header-avatar').innerText = "ز";
            document.getElementById('display-name').innerText = "زائر";
            document.getElementById('display-status').innerText = "غير مسجل";
            document.getElementById('display-status').style.color = "var(--text-muted)";

            document.getElementById('user-dropdown').innerHTML = `
                <div class="dropdown-header">
                    <div class="dropdown-name" style="color: var(--text-muted);">زائر غير مسجل</div>
                </div>
                <button class="dropdown-item" onclick="document.getElementById('auth-modal').classList.remove('hidden'); toggleUserDropdown(); switchModalMode('forms'); setFormType('login');"><i class="ph ph-sign-in"></i> تسجيل الدخول لحفظ تقدمك</button>
            `;

            // تحديث شريط الأصدقاء ليظهر وضع الزائر
            const friendsSidebar = document.getElementById('friends-sidebar');
            if(friendsSidebar) {
                friendsSidebar.innerHTML = `
                    <div class="friends-guest-state">
                        <i class="ph ph-lock-key"></i>
                        <p>سجل دخولك<br>لترى الأصدقاء</p>
                    </div>
                `;
            }

            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('app-shell').classList.add('unlocked');
            loadFragment('home', document.querySelector('.nav-btn'));
        }

        function closeAuthModal() {
            if (typeof window.clearAuthInputs === 'function') window.clearAuthInputs();
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('app-shell').classList.add('unlocked');
            if(!window.isGuest) enterAsGuest();
        }

        // دالة الثيم المحدثة لتلائم الكبسولة الجانبية
        window.setTheme = async function(theme, updateServer = true) {
            const body = document.body;
            const btnLight = document.getElementById('theme-light-btn');
            const btnDark = document.getElementById('theme-dark-btn');

            if (theme === 'light') {
                body.setAttribute('data-theme', 'light');
                btnLight.classList.add('active');
                btnDark.classList.remove('active');
            } else {
                body.removeAttribute('data-theme');
                btnDark.classList.add('active');
                btnLight.classList.remove('active');
            }

            if (updateServer && window.authInstance && window.authInstance.currentUser && !window.isGuest) {
                try {
                    await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), {
                        "settings.theme": theme
                    });
                } catch (e) { console.warn("خطأ في حفظ الثيم سحابياً", e); }
            }
        };

        function loadFragment(pageName, element) {
            const contentHolder = document.getElementById('content-holder');
            const titles = { 'home': 'الرئيسية', 'play': 'غرف اللعب', 'leaderboard': 'المتصدرون', 'store': 'متجر المزايا', 'profile': 'إعدادات الحساب' };
            
            document.getElementById('page-title').innerText = titles[pageName];
            document.querySelectorAll('.nav-btn, .bottom-tab').forEach(btn => btn.classList.remove('active'));
            if(element) element.classList.add('active');

            if (pageName === 'profile' && window.isGuest) {
                contentHolder.innerHTML = `
                    <div style="padding: 50px; background: var(--bg-surface); border: 1px solid var(--border-strong); border-radius: var(--radius-lg); text-align: center; max-width: 500px; margin: 40px auto; box-shadow: var(--shadow-md);">
                        <i class="ph ph-user-circle-plus" style="font-size: 50px; margin-bottom: 20px; color: var(--text-muted);"></i>
                        <h3 style="font-size: 20px; margin-bottom: 12px; font-weight: 700;">أنت تتصفح كزائر</h3>
                        <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 30px; line-height: 1.6;">قسم الحساب مخصص للاعبين المسجلين. أنشئ حسابك الآن لفتح كافة المزايا.</p>
                        <button class="btn-core btn-primary" style="max-width: 200px; margin: 0 auto;" onclick="document.getElementById('auth-modal').classList.remove('hidden'); switchModalMode('forms');">سجل دخولك الآن</button>
                    </div>`;
                return;
            }

            fetch(pageName + '.html')
                .then(response => { if (!response.ok) throw new Error(); return response.text(); })
                .then(html => { contentHolder.innerHTML = html; })
                .catch(() => {
                    contentHolder.innerHTML = `
                        <div style="padding: 40px; border: 1px dashed var(--border-strong); border-radius: var(--radius-lg); text-align: center; background: rgba(0,0,0,0.1);">
                            <p style="color: var(--text-secondary); font-size: 14px; font-weight: 600;">جاري العمل على صفحة <b>${pageName}</b>... (ملف غير موجود)</p>
                        </div>`;
                });
        }
    </script>
</body>
</html>
