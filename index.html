<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مستودع الخداع - اللوبي</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* =========================================
           نظام التصميم المرئي - أسود نقي وفخم (Premium Dark)
           ========================================= */
        :root {
            --bg-black: #000000;
            --surface-gray: #09090b; /* أسود دافئ خفيف للمواجهات */
            --border-subtle: #1e1e20; /* حدود نحيفة جداً لتقسيم احترافي */
            --text-white: #ffffff;
            --text-muted: #71717a;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-stack);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* الإطار الرئيسي للتطبيق */
        .lobby-wrapper {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* =========================================
           تصميم الكمبيوتر واللابتوب (Desktop Layout)
           ========================================= */
        
        /* القائمة الجانبية الفخمة والمثبتة بدقة */
        .sidebar {
            width: 260px;
            background-color: var(--bg-black);
            border-left: 1px solid var(--border-subtle);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        .sidebar-brand {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text-white);
            margin-bottom: 40px;
            padding-right: 12px;
        }

        .nav-button {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            color: var(--text-muted);
            background: none;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            text-align: right;
            width: 100%;
            transition: all 0.2s ease;
        }

        .nav-button i { font-size: 20px; }

        .nav-button:hover, .nav-button.active {
            background-color: var(--surface-gray);
            color: var(--text-white);
        }

        /* منطقة عرض المحتوى (تتوسط الشاشة على الكمبيوتر لمنع التمدد المشوه) */
        .content-viewport {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: var(--bg-black);
        }

        .top-header {
            height: 75px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            padding: 0 40px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
        }

        /* الحاوية التي ستستقبل الملفات المنفصلة */
        .dynamic-content-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
            width: 100%;
            max-width: 1100px; /* يمنع الكروت من التمدد العريض والمشوه على الشاشات الكبيرة */
            margin: 0 auto;   /* يوسط المحتوى بالمنتصف تماماً */
        }

        /* البار السفلي للجوال (يختفي تلقائياً على الكمبيوتر) */
        .bottom-bar { display: none; }

        /* =========================================
           تصميم الجوال الذكي (Mobile Responsive)
           ========================================= */
        @media (max-width: 900px) {
            .sidebar { display: none; } /* إخفاء القائمة الجانبية */
            
            .top-header { padding: 0 24px; }
            
            .dynamic-content-area {
                padding: 24px 20px 130px 20px; /* مساحة بالأسفل عشان الكبسولة العائمة */
            }

            /* تفعيل الكبسولة العائمة الفخمة أسفل شاشة الجوال */
            .bottom-bar {
                display: flex;
                position: fixed;
                bottom: 24px;
                left: 50%;
                transform: translateX(-50%);
                width: calc(100% - 40px);
                max-width: 400px;
                height: 66px;
                background: rgba(9, 9, 11, 0.85);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border: 1px solid var(--border-subtle);
                border-radius: 33px;
                justify-content: space-around;
                align-items: center;
                padding: 0 10px;
                z-index: 9999;
                box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            }

            .bottom-tab {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                color: var(--text-muted);
                background: none;
                border: none;
                height: 100%;
                flex: 1;
                cursor: pointer;
            }

            .bottom-tab i { font-size: 22px; }
            .bottom-tab span { font-size: 9px; font-weight: 500; margin-top: 3px; }
            .bottom-tab.active { color: var(--text-white); }
        }
    </style>
</head>
<body>

    <div class="lobby-wrapper">
        
        <aside class="sidebar">
            <div class="sidebar-brand">DECEPTION SYSTEM</div>
            <button class="nav-button active" onclick="loadPage('home', this)"><i class="ph ph-house"></i> الرئيسية</button>
            <button class="nav-button" onclick="loadPage('play', this)"><i class="ph ph-game-controller"></i> اللعب</button>
            <button class="nav-button" onclick="loadPage('store', this)"><i class="ph ph-storefront"></i> المتجر</button>
            <button class="nav-button" onclick="loadPage('profile', this)"><i class="ph ph-user"></i> الحساب</button>
        </aside>

        <main class="content-viewport">
            <header class="top-header">
                <div class="header-title" id="page-main-title">الرئيسية</div>
            </header>

            <div class="dynamic-content-area" id="master-content-holder">
                <p style="color: var(--text-muted); font-size: 14px;">جاري تحميل الواجهة...</p>
            </div>
        </main>

        <nav class="bottom-bar">
            <button class="bottom-tab active" onclick="loadPage('home', this)"><i class="ph ph-house"></i><span>الرئيسية</span></button>
            <button class="bottom-tab" onclick="loadPage('play', this)"><i class="ph ph-game-controller"></i><span>اللعب</span></button>
            <button class="bottom-tab" onclick="loadPage('store', this)"><i class="ph ph-storefront"></i><span>المتجر</span></button>
            <button class="bottom-tab" onclick="loadPage('profile', this)"><i class="ph ph-user"></i><span>الحساب</span></button>
        </nav>

    </div>

    <script>
        // دالة لجلب كود أي صفحة منفصلة وعرضها بالمنتصف
        function loadPage(pageName, element) {
            const contentHolder = document.getElementById('master-content-holder');
            
            // العناوين العلوية لكل صفحة
            const titles = { 'home': 'الرئيسية', 'play': 'غرف اللعب', 'store': 'متجر المزايا', 'profile': 'الملف الشخصي' };
            document.getElementById('page-main-title').innerText = titles[pageName];

            // تحديث الأزرار النشطة في الكمبيوتر والجوال
            document.querySelectorAll('.nav-button, .bottom-tab').forEach(btn => btn.classList.remove('active'));
            
            // تمييز الزر المفتوح حالياً
            if(element) element.classList.add('active');

            // السحر هنا: نقرأ كود الملف المنفصل (مثال: store.html) ونضعه داخل الـ div
            fetch(pageName + '.html')
                .then(response => {
                    if (!response.ok) throw new Error('الملف غير موجود بعد');
                    return response.text();
                })
                .then(html => {
                    contentHolder.innerHTML = html;
                })
                .catch(error => {
                    contentHolder.innerHTML = `
                        <div style="padding: 30px; border: 1px dashed #1e1e20; border-radius: 12px; text-align: center;">
                            <p style="color: #71717a; font-size: 14px;">ملف <b>${pageName}.html</b> جاهز برمجياً، يرجى إنشاؤه في GitHub ليظهر محتواه هنا.</p>
                        </div>`;
                });
        }

        // تشغيل الصفحة الرئيسية تلقائياً عند فتح الموقع
        window.onload = () => { loadPage('home', document.querySelector('.nav-button')); };
    </script>
</body>
</html>
