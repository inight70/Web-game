<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>DECEPTION.SYS — اللوبي</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

<!-- Film grain -->
<div id="noise-layer"></div>

<!-- ─── LOADER ─── -->
<div id="global-loader">
  <div class="loader-logo">DECEPTION.SYS</div>
  <div class="loader-track"></div>
</div>

<!-- ════════════════════════════════════════
     AUTH MODAL
════════════════════════════════════════ -->
<div id="auth-modal" class="auth-overlay hidden">
  <div class="auth-card">
    <button class="close-modal-btn" onclick="closeAuthModal()"><i class="ph ph-x"></i></button>

    <!-- Welcome view -->
    <div id="modal-welcome-view">
      <div class="auth-card-brand">DECEPTION.SYS</div>
      <div class="auth-icon-w"><i class="ph ph-fingerprint"></i></div>
      <h2 class="auth-title">ادخل الساحة</h2>
      <p class="auth-sub">سجل دخولك لتحفظ تقدمك وإحصائياتك وإعداداتك السحابية.</p>
      <button class="btn btn-primary btn-full btn-lg" onclick="switchModalMode('forms')">
        <i class="ph ph-sign-in"></i> تسجيل الدخول
      </button>
      <div style="text-align:center;margin-top:14px;">
        <button class="link-subtle" onclick="enterAsGuest()">المتابعة كزائر</button>
      </div>
    </div>

    <!-- Form view -->
    <div id="modal-form-view" style="display:none">
      <div class="auth-card-brand">DECEPTION.SYS</div>
      <div class="modal-tabs">
        <button id="tab-login"    class="modal-tab-btn active" onclick="setFormType('login')">تسجيل الدخول</button>
        <button id="tab-register" class="modal-tab-btn"        onclick="setFormType('register')">حساب جديد</button>
      </div>
      <div id="auth-error" class="auth-error"></div>
      <form id="firebase-form" onsubmit="handleAuthSubmit(event)" autocomplete="off">

        <div id="login-fields">
          <div class="input-group" style="margin-bottom:13px">
            <label class="input-label">البريد الإلكتروني أو اسم المستخدم</label>
            <input id="login-id" class="input" type="text" placeholder="DarkKnight أو you@mail.com" autocomplete="off" required>
          </div>
          <div class="input-group" style="margin-bottom:20px">
            <label class="input-label">كلمة المرور</label>
            <input id="login-password" class="input" type="password" placeholder="••••••••" autocomplete="new-password" required>
          </div>
        </div>

        <div id="register-fields" style="display:none">
          <div class="input-group" style="margin-bottom:12px">
            <label class="input-label">اسم المستخدم</label>
            <input id="reg-username" class="input" type="text" placeholder="DarkKnight" autocomplete="off">
          </div>
          <div class="input-group" style="margin-bottom:12px">
            <label class="input-label">البريد الإلكتروني</label>
            <input id="reg-email" class="input" type="email" placeholder="you@mail.com" autocomplete="off">
          </div>
          <div class="input-group" style="margin-bottom:12px">
            <label class="input-label">كلمة المرور</label>
            <input id="reg-password" class="input" type="password" placeholder="••••••••" autocomplete="new-password">
          </div>
          <div class="input-group" style="margin-bottom:20px">
            <label class="input-label">تأكيد كلمة المرور</label>
            <input id="reg-confirm" class="input" type="password" placeholder="••••••••" autocomplete="new-password">
          </div>
        </div>

        <button type="submit" id="modal-submit-btn" class="btn btn-primary btn-full">دخول</button>
      </form>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════
     APP SHELL
════════════════════════════════════════ -->
<div id="app-shell" class="app-shell">

  <!-- ── Icon Sidebar (Desktop) ── -->
  <aside class="sidebar">
    <!-- Logo mark -->
    <div class="sidebar-logo">D</div>

    <!-- Main nav -->
    <button class="nav-icon-btn active" title="الرئيسية" onclick="loadFragment('home',this)">
      <i class="ph ph-house-simple"></i>
    </button>
    <button class="nav-icon-btn" title="اللعب" onclick="loadFragment('play',this)">
      <i class="ph ph-game-controller"></i>
    </button>
    <button class="nav-icon-btn" title="المتصدرون" onclick="loadFragment('leaderboard',this)">
      <i class="ph ph-trophy"></i>
    </button>

    <div class="sidebar-sep"></div>

    <button class="nav-icon-btn" title="المتجر" onclick="loadFragment('store',this)">
      <i class="ph ph-storefront"></i>
    </button>
    <button class="nav-icon-btn" title="حسابي" onclick="loadFragment('profile',this)">
      <i class="ph ph-user"></i>
    </button>

    <!-- Bottom -->
    <div class="sidebar-bottom">
      <button class="nav-icon-btn" title="الإعدادات" onclick="">
        <i class="ph ph-gear"></i>
      </button>
      <button class="nav-icon-btn" id="theme-btn-sidebar" title="المظهر" onclick="toggleTheme()">
        <i id="theme-icon" class="ph ph-sun"></i>
      </button>
    </div>
  </aside>

  <!-- ── Main Viewport ── -->
  <main class="main-viewport">

    <!-- Header -->
    <header class="top-header">
      <!-- Mobile: show brand name -->
      <div class="header-brand" style="display:none" id="mobile-brand">
        DECEPTION<span>.</span>SYS
      </div>

      <!-- Search -->
      <div class="search-box">
        <i class="ph ph-magnifying-glass"></i>
        <input type="text" placeholder="البحث...">
      </div>

      <!-- CTA — Start Game -->
      <button class="header-cta" onclick="loadFragment('play', document.querySelectorAll('.nav-icon-btn')[1])">
        <i class="ph ph-game-controller"></i>
        ابدأ اللعبة
      </button>

      <div class="header-spacer"></div>

      <!-- Page title (hidden on mobile, shown desktop) -->
      <div class="header-title" id="page-title">الرئيسية</div>

      <!-- Actions -->
      <div class="header-actions">
        <!-- Desktop theme toggle -->
        <button class="btn-icon" id="theme-btn-header" onclick="toggleTheme()" style="display:none">
          <i class="ph ph-sun"></i>
        </button>
        <button class="btn-icon">
          <i class="ph ph-bell"></i>
        </button>
        <div style="position:relative">
          <div class="avatar avatar-md" id="header-avatar" onclick="toggleDropdown()">ز</div>
          <div class="user-dropdown" id="user-dropdown"></div>
        </div>
      </div>
    </header>

    <!-- Content + Right panel -->
    <div class="content-wrapper">
      <div class="dynamic-content" id="content-holder"></div>

      <!-- Right panel (Desktop only) — like image right column -->
      <aside class="right-panel" id="right-panel">
        <div style="font-family:var(--wide);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);margin-bottom:14px">
          أونلاين الآن
        </div>
        <!-- Placeholder online players — populated by pages -->
        <div id="right-panel-content">
          <div style="text-align:center;padding:32px 0;color:var(--tx4);font-size:13px">
            جارٍ التحميل...
          </div>
        </div>
      </aside>
    </div>

  </main>

  <!-- ── Bottom Nav (Mobile) ── -->
  <nav class="bottom-bar">
    <button class="bottom-tab active" onclick="loadFragment('home',this)">
      <i class="ph ph-house-simple"></i><span>الرئيسية</span>
    </button>
    <button class="bottom-tab" onclick="loadFragment('play',this)">
      <i class="ph ph-game-controller"></i><span>اللعب</span>
    </button>
    <button class="bottom-tab" onclick="loadFragment('leaderboard',this)">
      <i class="ph ph-trophy"></i><span>المتصدرون</span>
    </button>
    <button class="bottom-tab" onclick="loadFragment('store',this)">
      <i class="ph ph-storefront"></i><span>المتجر</span>
    </button>
    <button class="bottom-tab" onclick="loadFragment('profile',this)">
      <i class="ph ph-user"></i><span>حسابي</span>
    </button>
  </nav>

</div><!-- /app-shell -->

<!-- ════════════════════════════════════════
     FIREBASE
════════════════════════════════════════ -->
<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
    onAuthStateChanged, signOut
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, getDoc,
    collection, query, where, getDocs, updateDoc
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const app  = initializeApp({
    apiKey:            "AIzaSyCLFj5UTX9EtuehoMWV02gkPsAgKPvMhzI",
    authDomain:        "web-game-260b5.firebaseapp.com",
    projectId:         "web-game-260b5",
    storageBucket:     "web-game-260b5.firebasestorage.app",
    messagingSenderId: "682229509792",
    appId:             "1:682229509792:web:11b4a404459630fcd6a3c5"
  });
  const auth = getAuth(app);
  const db   = getFirestore(app);

  Object.assign(window, {
    authInstance: auth, dbInstance: db,
    updateDocFunc: updateDoc, docFunc: doc, signOutFunc: signOut,
    isGuest: false, currentFormMode: 'login', currentUserData: null
  });

  window.clearAuthInputs = () => {
    ['login-id','login-password','reg-username','reg-email','reg-password','reg-confirm']
      .forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
    const err = document.getElementById('auth-error');
    if(err) err.style.display = 'none';
  };

  const hideLoader = () => {
    const l = document.getElementById('global-loader');
    if(!l) return;
    l.style.opacity = '0';
    setTimeout(() => l.style.visibility = 'hidden', 500);
  };

  const buildDropdown = (name, matches, wins) => {
    const wr = matches > 0 ? Math.round(wins/matches*100) : 0;
    return `
      <div class="dropdown-header">
        <div class="dropdown-name">${name}</div>
        <div class="dropdown-stats">
          <div><div class="ds-lbl">المباريات</div><div class="ds-val">${matches}</div></div>
          <div><div class="ds-lbl">الانتصارات</div><div class="ds-val">${wins}</div></div>
          <div><div class="ds-lbl">نسبة الفوز</div><div class="ds-val">${wr}%</div></div>
        </div>
      </div>
      <button class="dropdown-item" onclick="loadFragment('profile',document.querySelectorAll('.nav-icon-btn')[4]);toggleDropdown()">
        <i class="ph ph-user-circle"></i> الملف الشخصي
      </button>
      <button class="dropdown-item danger" onclick="handleLogout()">
        <i class="ph ph-sign-out"></i> تسجيل الخروج
      </button>`;
  };

  onAuthStateChanged(auth, async user => {
    const avatar   = document.getElementById('header-avatar');
    const dropdown = document.getElementById('user-dropdown');
    if(user) {
      window.isGuest = false;
      let name = user.email.split('@')[0], matches = 0, wins = 0;
      try {
        const snap = await getDoc(doc(db,'users',user.uid));
        if(snap.exists()) {
          const d = snap.data();
          name = d.username || name; matches = d.matches||0; wins = d.wins||0;
          window.currentUserData = d;
          applyTheme(d.settings?.theme || d.theme || 'dark');
        }
      } catch(e) { console.warn(e); }
      avatar.innerText = name.charAt(0).toUpperCase();
      dropdown.innerHTML = buildDropdown(name, matches, wins);
      window.clearAuthInputs();
      document.getElementById('auth-modal').classList.add('hidden');
      document.getElementById('app-shell').classList.add('unlocked');
      window.loadFragment('home', document.querySelector('.nav-icon-btn'));
      hideLoader();
    } else {
      if(!window.isGuest) {
        window.clearAuthInputs();
        document.getElementById('auth-modal').classList.remove('hidden');
        document.getElementById('app-shell').classList.remove('unlocked');
      }
      hideLoader();
    }
  });

  window.handleAuthSubmit = async e => {
    e.preventDefault();
    const errDiv = document.getElementById('auth-error');
    const btn    = document.getElementById('modal-submit-btn');
    errDiv.style.display = 'none';
    btn.disabled = true; btn.innerText = '...';
    try {
      if(window.currentFormMode === 'login') {
        let id = document.getElementById('login-id').value.trim();
        const pw = document.getElementById('login-password').value;
        let email = id;
        if(!id.includes('@')) {
          const q = query(collection(db,'users'), where('username_lower','==',id.toLowerCase()));
          const r = await getDocs(q);
          if(r.empty) throw {message:'اسم المستخدم غير موجود.'};
          email = r.docs[0].data().email;
        } else email = id.toLowerCase();
        await signInWithEmailAndPassword(auth, email, pw);
      } else {
        const uname = document.getElementById('reg-username').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const pw    = document.getElementById('reg-password').value;
        const conf  = document.getElementById('reg-confirm').value;
        if(pw !== conf)   throw {message:'كلمات المرور غير متطابقة.'};
        if(pw.length < 6) throw {message:'كلمة المرور 6 أحرف على الأقل.'};
        if(uname.length < 3) throw {message:'الاسم 3 أحرف على الأقل.'};
        const uL = uname.toLowerCase();
        const r  = await getDocs(query(collection(db,'users'), where('username_lower','==',uL)));
        if(!r.empty) throw {message:'هذا الاسم محجوز.'};
        const cred = await createUserWithEmailAndPassword(auth, email.toLowerCase(), pw);
        await setDoc(doc(db,'users',cred.user.uid), {
          username:uname, username_lower:uL, email:email.toLowerCase(),
          matches:0, wins:0, settings:{theme:'dark'},
          createdAt:new Date().toISOString()
        });
      }
    } catch(err) {
      let m = err.message||'';
      if(m.includes('credential')||m.includes('invalid-login')||m.includes('wrong-password')) m='بيانات الدخول غير صحيحة.';
      else if(m.includes('email-already-in-use')) m='البريد مستخدم مسبقاً.';
      else if(m.includes('network')) m='تأكد من اتصالك بالإنترنت.';
      errDiv.innerText = m; errDiv.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.innerText = window.currentFormMode === 'register' ? 'إنشاء الحساب' : 'دخول';
    }
  };

  function applyTheme(t) {
    const icons = document.querySelectorAll('#theme-icon');
    if(t === 'light') {
      document.body.setAttribute('data-theme','light');
      icons.forEach(i => i.className = 'ph ph-moon');
    } else {
      document.body.removeAttribute('data-theme');
      icons.forEach(i => i.className = 'ph ph-sun');
    }
  }

  window.toggleTheme = async () => {
    const isLight = document.body.getAttribute('data-theme') === 'light';
    applyTheme(isLight ? 'dark' : 'light');
    if(window.authInstance?.currentUser && !window.isGuest) {
      try {
        await window.updateDocFunc(
          window.docFunc(window.dbInstance,'users',window.authInstance.currentUser.uid),
          {'settings.theme': isLight ? 'dark' : 'light'}
        );
      } catch(e) {}
    }
  };
</script>

<!-- ════════════════════════════════════════
     UI LOGIC
════════════════════════════════════════ -->
<script>
  /* Responsive header tweak */
  (function(){
    const mq = window.matchMedia('(max-width:900px)');
    const apply = (m) => {
      const mb = document.getElementById('mobile-brand');
      const th = document.getElementById('theme-btn-header');
      if(mb) mb.style.display = m.matches ? 'block' : 'none';
      if(th) th.style.display = m.matches ? 'none'  : 'flex';
    };
    mq.addEventListener('change', apply);
    apply(mq);
  })();

  function toggleDropdown() {
    document.getElementById('user-dropdown').classList.toggle('show');
  }
  document.addEventListener('click', e => {
    if(!e.target.closest('#header-avatar') && !e.target.closest('#user-dropdown'))
      document.getElementById('user-dropdown')?.classList.remove('show');
  });

  function handleLogout() {
    if(typeof window.clearAuthInputs === 'function') window.clearAuthInputs();
    document.body.removeAttribute('data-theme');
    document.querySelectorAll('#theme-icon').forEach(i => i.className = 'ph ph-sun');
    window.currentUserData = null;
    window.signOutFunc(window.authInstance).then(() => {
      document.getElementById('user-dropdown').classList.remove('show');
      document.getElementById('auth-modal').classList.remove('hidden');
      document.getElementById('app-shell').classList.remove('unlocked');
    });
  }

  function switchModalMode(mode) {
    if(mode === 'forms') {
      document.getElementById('modal-welcome-view').style.display = 'none';
      document.getElementById('modal-form-view').style.display    = 'block';
    }
  }

  function setFormType(t) {
    window.currentFormMode = t;
    document.getElementById('tab-login').classList.toggle('active',    t === 'login');
    document.getElementById('tab-register').classList.toggle('active', t === 'register');
    document.getElementById('login-fields').style.display    = t === 'login'    ? 'block' : 'none';
    document.getElementById('register-fields').style.display = t === 'register' ? 'block' : 'none';
    document.getElementById('login-id').required             = t === 'login';
    document.getElementById('login-password').required       = t === 'login';
    document.getElementById('reg-username').required         = t === 'register';
    document.getElementById('reg-email').required            = t === 'register';
    document.getElementById('reg-password').required         = t === 'register';
    document.getElementById('modal-submit-btn').innerText    = t === 'register' ? 'إنشاء الحساب' : 'دخول';
  }

  function enterAsGuest() {
    window.isGuest = true;
    if(typeof window.clearAuthInputs === 'function') window.clearAuthInputs();
    const av = document.getElementById('header-avatar');
    const dd = document.getElementById('user-dropdown');
    av.innerText = 'ز';
    dd.innerHTML = `
      <div class="dropdown-header">
        <div class="dropdown-name tx3">زائر</div>
      </div>
      <button class="dropdown-item" onclick="document.getElementById('auth-modal').classList.remove('hidden');toggleDropdown();switchModalMode('forms');setFormType('login')">
        <i class="ph ph-sign-in"></i> سجل دخولك
      </button>`;
    document.getElementById('auth-modal').classList.add('hidden');
    document.getElementById('app-shell').classList.add('unlocked');
    loadFragment('home', document.querySelector('.nav-icon-btn'));
  }

  function closeAuthModal() {
    if(typeof window.clearAuthInputs === 'function') window.clearAuthInputs();
    if(!window.isGuest) enterAsGuest();
    else {
      document.getElementById('auth-modal').classList.add('hidden');
      document.getElementById('app-shell').classList.add('unlocked');
    }
  }

  /* ════ FRAGMENT ROUTER ════ */
  const TITLES = {
    home:'الرئيسية', play:'غرف اللعب',
    leaderboard:'المتصدرون', store:'المتجر', profile:'الحساب'
  };

  window.loadFragment = function(page, el) {
    const holder = document.getElementById('content-holder');

    document.getElementById('page-title').innerText = TITLES[page] || page;

    /* Sync both nav systems */
    document.querySelectorAll('.nav-icon-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.bottom-tab').forEach(b => b.classList.remove('active'));
    if(el) el.classList.add('active');

    /* Guest guard */
    if(page === 'profile' && window.isGuest) {
      holder.innerHTML = `
        <div class="page-section" style="display:flex;justify-content:center;padding-top:60px">
          <div class="card p-lg" style="text-align:center;max-width:420px;width:100%">
            <i class="ph ph-lock-key" style="font-size:36px;color:var(--tx4);display:block;margin-bottom:14px"></i>
            <div style="font-size:17px;font-weight:700;margin-bottom:7px">للاعبين المسجلين فقط</div>
            <p style="font-size:13px;color:var(--tx3);line-height:1.6;margin-bottom:22px">
              أنشئ حسابك لتحفظ تقدمك وإحصائياتك وإعداداتك.
            </p>
            <button class="btn btn-primary btn-full" onclick="document.getElementById('auth-modal').classList.remove('hidden');switchModalMode('forms')">
              <i class="ph ph-user-plus"></i> سجل دخولك
            </button>
          </div>
        </div>`;
      return;
    }

    fetch('pages/' + page + '.html')
      .then(r => { if(!r.ok) throw 0; return r.text(); })
      .then(html => {
        holder.innerHTML = `<div class="page-section">${html}</div>`;
        holder.querySelectorAll('script').forEach(old => {
          const s = document.createElement('script');
          s.textContent = old.textContent;
          document.body.appendChild(s);
          old.remove();
        });
      })
      .catch(() => {
        holder.innerHTML = `
          <div class="page-section" style="display:flex;justify-content:center;padding-top:60px">
            <div class="card p-md" style="text-align:center;border-style:dashed;max-width:360px;width:100%">
              <i class="ph ph-file-dashed" style="font-size:30px;color:var(--tx4);display:block;margin-bottom:10px"></i>
              <p style="color:var(--tx4);font-size:13px">
                <code style="color:var(--red)">pages/${page}.html</code> غير موجود بعد.
              </p>
            </div>
          </div>`;
      });
  };
</script>
</body>
</html>
