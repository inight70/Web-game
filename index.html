<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Deception</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=9.0">
</head>
<body>

    <div id="global-loader"><div class="spinner"></div></div>

    <!-- نافذة المصادقة -->
    <div id="auth-modal" class="auth-overlay hidden">
        <div class="auth-card">
            <button class="close-modal-btn" onclick="closeAuthModal()"><i class="ph ph-x"></i></button>
            <div id="modal-welcome-view">
                <i class="ph-duotone ph-shield-check" style="font-size: 3.5rem; color: var(--accent-red); margin-bottom: 20px; display: inline-block;"></i>
                <h2 data-i18n="login_sys">النظام السحابي</h2>
                <p data-i18n="login_desc">سجل دخولك الآن لتتمكن من اللعب، حفظ تقدمك، والتفاعل مع الأصدقاء.</p>
                <button class="btn-core" onclick="switchModalMode('forms')" data-i18n="btn_login">تسجيل الدخول</button>
                <button class="link-guest" onclick="enterAsGuest(true)" data-i18n="btn_guest">المتابعة كزائر</button>
            </div>
            <div id="modal-form-view" style="display: none;">
                <div class="modal-tabs">
                    <button id="tab-login" class="modal-tab-btn active" onclick="setFormType('login')" data-i18n="btn_login">تسجيل الدخول</button>
                    <button id="tab-register" class="modal-tab-btn" onclick="setFormType('register')" data-i18n="btn_register">حساب جديد</button>
                </div>
                <div id="auth-error" class="auth-error-msg"></div>
                <form id="firebase-form" onsubmit="handleAuthSubmit(event)" autocomplete="off">
                    <div id="login-fields">
                        <div class="input-wrapper"><label data-i18n="lbl_id">المعرف (Email/Username)</label><input type="text" id="login-id" class="premium-input" required autocomplete="off"></div>
                        <div class="input-wrapper"><label data-i18n="lbl_pass">كلمة المرور</label><input type="password" id="login-password" class="premium-input" required autocomplete="new-password"></div>
                    </div>
                    <div id="register-fields" style="display: none;">
                        <div class="input-wrapper"><label data-i18n="lbl_user">اسم المستخدم</label><input type="text" id="reg-username" class="premium-input" autocomplete="off"></div>
                        <div class="input-wrapper"><label data-i18n="lbl_email">البريد الإلكتروني</label><input type="email" id="reg-email" class="premium-input" autocomplete="off"></div>
                        <div class="input-wrapper"><label data-i18n="lbl_pass">كلمة المرور</label><input type="password" id="reg-password" class="premium-input" autocomplete="new-password"></div>
                        <div class="input-wrapper"><label data-i18n="lbl_conf">تأكيد كلمة المرور</label><input type="password" id="reg-confirm" class="premium-input" autocomplete="new-password"></div>
                    </div>
                    <button type="submit" class="btn-core" id="modal-submit-btn" data-i18n="btn_submit">تأكيد الدخول</button>
                </form>
            </div>
        </div>
    </div>

    <!-- نوافذ الأصدقاء -->
    <div id="add-friend-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <button class="close-modal-btn" onclick="closeFriendModal('add-friend-modal')"><i class="ph ph-x"></i></button>
            <h2 data-i18n="add_friend">إضافة صديق</h2>
            <p data-i18n="enter_friend">أدخل اسم المستخدم الخاص بصديقك لإرسال طلب صداقة.</p>
            <div id="friend-error" class="auth-error-msg"></div>
            <div class="input-wrapper">
                <input type="text" id="search-friend-input" class="premium-input" autocomplete="off">
            </div>
            <button class="btn-core" onclick="sendFriendRequest()" data-i18n="btn_send">إرسال الطلب</button>
        </div>
    </div>

    <div id="remove-friend-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <button class="close-modal-btn" onclick="closeFriendModal('remove-friend-modal')"><i class="ph ph-x"></i></button>
            <h2 data-i18n="remove_friend">حذف صديق</h2>
            <p><span data-i18n="confirm_remove_text">هل أنت متأكد أنك تريد حذف</span> <strong id="remove-friend-name" style="color:var(--accent-red);"></strong>؟</p>
            <button class="btn-secondary" onclick="closeFriendModal('remove-friend-modal')" data-i18n="cancel">إلغاء</button>
            <button class="btn-core" onclick="confirmRemoveFriend()" data-i18n="confirm_remove">تأكيد الحذف</button>
        </div>
    </div>

    <div id="app-shell" class="app-shell">
        
        <aside class="sidebar">
            <div class="sidebar-logo">Decep<br><span>tion</span></div>
            <nav class="nav-menu">
                <button class="nav-btn active" data-page="home" onclick="loadFragment('home', this)"><i class="ph-fill ph-squares-four"></i></button>
                <button class="nav-btn" data-page="play" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i></button>
                <button class="nav-btn" data-page="achievements" onclick="loadFragment('achievements', this)"><i class="ph ph-medal"></i></button>
                <button class="nav-btn" data-page="store" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i></button>
                <button class="nav-btn" data-page="profile" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i></button>
            </nav>
            <div class="theme-wrapper">
                <button id="btn-theme-dark" class="theme-btn active-theme" onclick="toggleTheme('dark')"><i class="ph-fill ph-moon"></i></button>
                <button id="btn-theme-light" class="theme-btn" onclick="toggleTheme('light')"><i class="ph-fill ph-sun"></i></button>
            </div>
        </aside>

        <main class="main-viewport">
            <header class="top-header">
                
                <div class="header-page-info">
                    <h1 class="page-title" id="page-title" data-i18n="title_home">الرئيسية</h1>
                    <div class="mobile-brand-title">

                        <div class="mobile-section-name" id="mobile-section-name" data-i18n="title_home">الرئيسية</div>
                    </div>
                </div>

                <div class="header-actions">
                    
                    <div style="position: relative;">
                        <button class="header-icon-btn" id="settings-trigger" onclick="toggleDropdown('settings-dropdown', this)"><i class="ph ph-gear"></i></button>
                        <div class="header-dropdown" id="settings-dropdown">
                            <div class="dropdown-header" data-i18n="settings">الإعدادات</div>
                            
                            <div class="settings-group">
                                <label data-i18n="size">حجم الواجهة</label>
                                <div class="segmented-control">
                                    <button class="segment-btn" id="font-small" onclick="setFontSize('small')" data-i18n="small">صغير</button>
                                    <button class="segment-btn active" id="font-default" onclick="setFontSize('default')" data-i18n="default">افتراضي</button>
                                    <button class="segment-btn" id="font-large" onclick="setFontSize('large')" data-i18n="large">كبير</button>
                                </div>
                            </div>

                            <div class="settings-group">
                                <label data-i18n="lang">اللغة</label>
                                <div class="segmented-control">
                                    <button class="segment-btn" id="lang-en" onclick="setLanguage('en')">English</button>
                                    <button class="segment-btn active" id="lang-ar" onclick="setLanguage('ar')">العربية</button>
                                </div>
                            </div>

                            <div class="settings-group">
                                <label data-i18n="anim">المؤثرات الحركية</label>
                                <div class="segmented-control">
                                    <button class="segment-btn" id="anim-off" onclick="setAnimation(false)" data-i18n="off">إيقاف</button>
                                    <button class="segment-btn active" id="anim-on" onclick="setAnimation(true)" data-i18n="on">تشغيل</button>
                                </div>
                            </div>

                            <div class="settings-group mobile-only-theme">
                                <label data-i18n="theme">المظهر</label>
                                <div class="segmented-control">
                                    <button class="segment-btn" id="mini-theme-light" onclick="toggleTheme('light')" data-i18n="light">فاتح</button>
                                    <button class="segment-btn active" id="mini-theme-dark" onclick="toggleTheme('dark')" data-i18n="dark">داكن</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div style="position: relative;">
                        <button class="header-icon-btn" id="noti-trigger" onclick="toggleDropdown('noti-dropdown', this)"><i class="ph ph-bell"></i></button>
                        <div class="header-dropdown" id="noti-dropdown">
                            <div class="dropdown-header" data-i18n="noti">التنبيهات</div>
                            <div id="noti-list">
                                <div class="empty-state">
                                    <i class="ph-duotone ph-bell-slash"></i>
                                    <span data-i18n="no_noti">لا يوجد تنبيهات حالياً</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div style="position: relative;">
                        <div class="profile-trigger" id="profile-trigger" onclick="toggleDropdown('user-dropdown', this)">
                            <div class="profile-avatar-fallback" id="header-avatar-fallback">ز</div>
                            <div class="profile-info">
                                <span class="profile-name" id="header-name" data-i18n="guest">زائر</span>
                            </div>
                            <i class="ph-bold ph-caret-down"></i>
                        </div>
                        <div class="header-dropdown" id="user-dropdown">
                            <div class="dropdown-header" id="dropdown-status-name" data-i18n="unregistered">غير مسجل</div>
                            <div id="dropdown-content-area"></div>
                        </div>
                    </div>
                </div>
            </header>
            
            <div class="dynamic-content" id="content-holder"></div>
        </main>

        <aside class="right-sidebar">
            <div id="friends-container-desktop"></div>
        </aside>

        <nav class="bottom-bar">
            <button class="bottom-tab active" data-page="home" onclick="loadFragment('home', this)"><i class="ph-fill ph-squares-four"></i></button>
            <button class="bottom-tab" data-page="play" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i></button>
            <button class="bottom-tab" data-page="achievements" onclick="loadFragment('achievements', this)"><i class="ph ph-medal"></i></button>
            <button class="bottom-tab" data-page="friends" onclick="loadFragment('friends', this)"><i class="ph ph-users"></i></button>
            <button class="bottom-tab" data-page="store" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i></button>
            <button class="bottom-tab" data-page="profile" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i></button>

    <!-- قاموس الترجمة الفوري الاحترافي (i18n) -->

        window.translations = {

                login_sys: 'النظام السحابي', login_desc: 'سجل دخولك الآن لتتمكن من اللعب، حفظ تقدمك، والتفاعل مع الأصدقاء.',
                btn_login: 'تسجيل الدخول', btn_register: 'حساب جديد', btn_guest: 'المتابعة كزائر',

                btn_submit: 'تأكيد الدخول', guest: 'زائر', unregistered: 'غير مسجل',
                settings: 'الإعدادات', size: 'حجم الواجهة', small: 'صغير', default: 'افتراضي', large: 'كبير',

                noti: 'التنبيهات', no_noti: 'لا يوجد تنبيهات حالياً', friends: 'الأصدقاء', logout: 'تسجيل خروج',
                add_friend: 'إضافة صديق', enter_friend: 'أدخل اسم المستخدم لإرسال طلب صداقة.', btn_send: 'إرسال الطلب', 
                remove_friend: 'حذف صديق', confirm_remove_text: 'هل أنت متأكد أنك تريد حذف', confirm_remove: 'تأكيد الحذف', cancel: 'إلغاء',
                lock_msg: 'سجل دخولك للوصول إلى الأصدقاء وإضافتهم'
            },
            en: {
                title_home: 'Home', title_play: 'Game Rooms', title_achievements: 'Achievements', title_store: 'Store', title_profile: 'Profile', title_friends: 'Friends',
                login_sys: 'Cloud System', login_desc: 'Login now to play, save progress, and interact with friends.',
                btn_login: 'Login', btn_register: 'New Account', btn_guest: 'Continue as Guest',
                lbl_id: 'ID (Email/Username)', lbl_pass: 'Password', lbl_user: 'Username', lbl_email: 'Email', lbl_conf: 'Confirm Password',
                btn_submit: 'Confirm Login', guest: 'Guest', unregistered: 'Unregistered',

                lang: 'Language', anim: 'Animations', on: 'On', off: 'Off', theme: 'Theme', dark: 'Dark', light: 'Light',
                noti: 'Notifications', no_noti: 'No notifications currently', friends: 'Friends', logout: 'Logout',

    <!-- أكواد Firebase الأساسية -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCLFj5UTX9EtuehoMWV02gkPsAgKPvMhzI", authDomain: "web-game-260b5.firebaseapp.com", projectId: "web-game-260b5", storageBucket: "web-game-260b5.firebasestorage.app", messagingSenderId: "682229509792", appId: "1:682229509792:web:11b4a404459630fcd6a3c5" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app); const db = getFirestore(app);
        
        window.authInstance = auth; window.dbInstance = db; window.signOutFunc = signOut; window.updateDocFunc = updateDoc; window.docFunc = doc; window.arrayUnion = arrayUnion; window.arrayRemove = arrayRemove; window.getDocsFunc = getDocs; window.queryFunc = query; window.whereFunc = where; window.collectionFunc = collection;
        window.isGuest = false; window.currentFormMode = 'login'; window.currentUserData = null; window.friendToRemove = null;

        const hideLoader = () => { const l = document.getElementById('global-loader'); if(l){ l.style.opacity = '0'; setTimeout(()=>l.style.visibility='hidden',400); } };

        // نظام الأصدقاء (يظهر رسالة القفل إذا كان زائر ولا يسمح بالإضافة)
        window.renderFriendsList = function(containerId) {
            const container = document.getElementById(containerId);
            if(!container) return;

            if (window.isGuest || !window.currentUserData) {
                container.innerHTML = `<div class="guest-friends-msg"><i class="ph-duotone ph-lock-key"></i><span data-i18n="lock_msg">${window.translations[document.documentElement.lang||'ar'].lock_msg}</span></div>`;
                return;
            }

            const friends = window.currentUserData.friends || [];
            let html = `<div class="friends-header" data-i18n="friends">${window.translations[document.documentElement.lang||'ar'].friends}</div>`;
            
            if (friends.length === 0) {
                html += `<button class="add-friend-btn" onclick="openAddFriendModal()"><i class="ph-bold ph-plus"></i></button>`;
            } else {
                friends.forEach(f => {
                    html += `<div class="friend-avatar" onclick="openRemoveFriendModal('${f}')"><div style="width:100%; height:100%; border-radius:50%; background:var(--surface-hover); display:flex; justify-content:center; align-items:center; font-weight:bold; font-size:1.2rem; color:var(--text-main);">${f.charAt(0).toUpperCase()}</div><div class="online-dot"></div></div>`;
                });
                html += `<button class="add-friend-btn" onclick="openAddFriendModal()"><i class="ph-bold ph-plus"></i></button>`;
            }
            container.innerHTML = html;
        };

        window.renderNotifications = function() {
            const list = document.getElementById('noti-list');
            if (window.isGuest || !window.currentUserData || !window.currentUserData.friendRequests || window.currentUserData.friendRequests.length === 0) {
                list.innerHTML = `<div class="empty-state"><i class="ph-duotone ph-bell-slash"></i><span data-i18n="no_noti">${window.translations[document.documentElement.lang||'ar'].no_noti}</span></div>`;
                return;
            }
            let html = '';
            window.currentUserData.friendRequests.forEach(req => {
                html += `
                    <div class="noti-item">
                        <span class="noti-text">${req} sent a request.</span>
                        <div class="noti-actions">
                            <button class="btn-accept" onclick="acceptFriendRequest('${req}')"><i class="ph-bold ph-check"></i></button>
                            <button class="btn-reject" onclick="rejectFriendRequest('${req}')"><i class="ph-bold ph-x"></i></button>
                        </div>
                    </div>`;
            });
            list.innerHTML = html;
        };

        onAuthStateChanged(auth, async (user) => {
            const nameEl = document.getElementById('header-name');
            const fallbackAvatar = document.getElementById('header-avatar-fallback');
            const dropdownStatus = document.getElementById('dropdown-status-name');
            const dropdownContent = document.getElementById('dropdown-content-area');

            if (user) {
                window.isGuest = false;
                localStorage.removeItem('deception_guest'); // إزالة حالة الزائر
                let displayName = user.email.split('@')[0]; 

                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) { 
                        window.currentUserData = userDoc.data();
                        displayName = window.currentUserData.username || displayName; 
                        
                        // استرجاع وتطبيق الإعدادات
                        if (window.currentUserData.settings) {
                            if(window.toggleTheme) window.toggleTheme(window.currentUserData.settings.theme || 'dark', true);
                            if(window.setFontSize) window.setFontSize(window.currentUserData.settings.fontSize || 'default', true);
                            if(window.setAnimation) window.setAnimation(window.currentUserData.settings.animations !== false, true);
                            if(window.setLanguage) window.setLanguage(window.currentUserData.settings.language || 'ar', true);
                        }
                    }
                } catch (err) {}

                fallbackAvatar.innerText = displayName.charAt(0).toUpperCase();
                nameEl.innerText = displayName;
                dropdownStatus.innerText = displayName;

                dropdownContent.innerHTML = `
                    <button class="dropdown-item" onclick="loadFragment('profile', null); toggleDropdown('');"><i class="ph ph-user-circle"></i> <span data-i18n="title_profile">${window.translations[document.documentElement.lang||'ar'].title_profile}</span></button>
                    <button class="dropdown-item logout" onclick="handleLogout()"><i class="ph ph-sign-out"></i> <span data-i18n="logout">${window.translations[document.documentElement.lang||'ar'].logout}</span></button>
                `;

                window.renderFriendsList('friends-container-desktop');
                window.renderNotifications();

                if(window.clearAuthInputs) window.clearAuthInputs(); 
                document.getElementById('auth-modal').classList.add('hidden');
                document.getElementById('app-shell').classList.add('unlocked');
                loadFragment('home', document.querySelector('.nav-btn.active'));
                hideLoader();
            } else {
                // نظام ظهور النافذة الذكي (إذا كان قد اختار زائر مسبقاً، ادخله كزائر دون إزعاج)
                if (localStorage.getItem('deception_guest') === 'true') {
                    if(window.enterAsGuest) window.enterAsGuest(true);
                } else {
                    window.currentUserData = null;
                    if(window.clearAuthInputs) window.clearAuthInputs(); 
                    document.getElementById('auth-modal').classList.remove('hidden');
                    document.getElementById('app-shell').classList.remove('unlocked');
                }
                hideLoader();
            }
        });

        window.handleAuthSubmit = async function(e) {
            e.preventDefault(); 
            const errorDiv = document.getElementById('auth-error'); 
            const btn = document.getElementById('modal-submit-btn');
            errorDiv.style.display = 'none'; btn.disabled = true;
            
            try {
                if (window.currentFormMode === 'login') {
                    let id = document.getElementById('login-id').value.trim(); let pass = document.getElementById('login-password').value;
                    let email = id;
                    if (!id.includes('@')) {
                        const q = query(collection(db, "users"), where("username_lower", "==", id.toLowerCase()));
                        const snap = await getDocs(q);
                        if (snap.empty) throw { message: "البيانات غير صحيحة" };
                        email = snap.docs[0].data().email;
                    }
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const user = document.getElementById('reg-username').value.trim(); 
                    const email = document.getElementById('reg-email').value.trim();
                    const pass = document.getElementById('reg-password').value; 
                    const conf = document.getElementById('reg-confirm').value;
                    if (pass !== conf) throw { message: "كلمات المرور غير متطابقة" };
                    if (pass.length < 6) throw { message: "كلمة المرور يجب أن تكون 6 أحرف على الأقل" };
                    const q = query(collection(db, "users"), where("username_lower", "==", user.toLowerCase()));
                    const snap = await getDocs(q);
                    if (!snap.empty) throw { message: "اسم المستخدم محجوز" };
                    const cred = await createUserWithEmailAndPassword(auth, email.toLowerCase(), pass);
                    await setDoc(doc(db, "users", cred.user.uid), { 
                        username: user, username_lower: user.toLowerCase(), email: email.toLowerCase(), 
                        matches: 0, wins: 0, friends: [], friendRequests: [],
                        settings: { theme: 'dark', fontSize: 'default', animations: true, language: 'ar' }, 
                        createdAt: new Date().toISOString() 
                    });
                }
            } catch (err) {
                let msg = err.message || "حدث خطأ غير معروف";
                if(msg.includes("invalid-credential")) msg = "البيانات غير صحيحة";
                if(msg.includes("email-already-in-use")) msg = "البريد الإلكتروني مستخدم مسبقاً";
                errorDiv.innerText = msg; errorDiv.style.display = 'block';
            } finally { btn.disabled = false; }
        }
    </script>

    <script>
        // إعدادات الواجهة الاحترافية (يتم حفظها في قاعدة البيانات للمسجلين)
        window.setLanguage = async function(lang, skipSave = false) {
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

            document.getElementById('lang-ar').classList.toggle('active', lang === 'ar');
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');

            // ترجمة كل عنصر يحمل data-i18n
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(window.translations[lang] && window.translations[lang][key]) {
                    el.innerText = window.translations[lang][key];
                }
            });
            
            // تحديث عنوان الصفحة النشطة
            const activeNav = document.querySelector('.nav-btn.active') || document.querySelector('.bottom-tab.active');
            if (activeNav) {
                const pageId = activeNav.getAttribute('data-page');
                if (pageId) loadFragment(pageId, activeNav); 
            }
            
            // تحديث رسائل الأصدقاء
            window.renderFriendsList('friends-container-desktop');
            if(document.getElementById('mobile-friends-wrapper')) window.renderFriendsList('mobile-friends-wrapper');
            window.renderNotifications();

            if (!skipSave && window.authInstance && window.authInstance.currentUser && !window.isGuest) {
                try { await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { "settings.language": lang }); } catch(e){}
            }
        };

        window.setFontSize = async function(size, skipSave = false) {
            document.documentElement.classList.remove('font-small', 'font-large');
            if(size !== 'default') document.documentElement.classList.add(`font-${size}`);
            
            document.querySelectorAll('.segment-btn[id^="font-"]').forEach(b => b.classList.remove('active'));
            document.getElementById(`font-${size}`).classList.add('active');

            if (!skipSave && window.authInstance && window.authInstance.currentUser && !window.isGuest) {
                try { await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { "settings.fontSize": size }); } catch(e){}
            }
        };

        window.setAnimation = async function(isOn, skipSave = false) {
            if(isOn) document.body.classList.remove('no-animations');
            else document.body.classList.add('no-animations');

            document.getElementById('anim-on').classList.toggle('active', isOn);
            document.getElementById('anim-off').classList.toggle('active', !isOn);

            if (!skipSave && window.authInstance && window.authInstance.currentUser && !window.isGuest) {
                try { await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { "settings.animations": isOn }); } catch(e){}
            }
        };

        window.toggleTheme = async function(mode, skipSave = false) {
            const body = document.body; 
            const darkBtns = [document.getElementById('btn-theme-dark'), document.getElementById('mini-theme-dark')];
            const lightBtns = [document.getElementById('btn-theme-light'), document.getElementById('mini-theme-light')];
            
            if (mode === 'light') { 
                body.setAttribute('data-theme', 'light'); 
                lightBtns.forEach(b => { if(b) b.classList.add('active-theme', 'active'); });
                darkBtns.forEach(b => { if(b) b.classList.remove('active-theme', 'active'); });
            } else { 
                body.removeAttribute('data-theme'); 
                darkBtns.forEach(b => { if(b) b.classList.add('active-theme', 'active'); });
                lightBtns.forEach(b => { if(b) b.classList.remove('active-theme', 'active'); });
            }
            if (!skipSave && window.authInstance && window.authInstance.currentUser && !window.isGuest) {
                try { await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { "settings.theme": mode }); } catch (e) {}
            }
        };

        // نظام الأصدقاء الدقيق (إرسال، قبول، وحذف)
        function openAddFriendModal() { document.getElementById('add-friend-modal').classList.remove('hidden'); document.getElementById('friend-error').style.display='none'; document.getElementById('search-friend-input').value=''; }
        function closeFriendModal(id) { document.getElementById(id).classList.add('hidden'); }
        function openRemoveFriendModal(friendName) { window.friendToRemove = friendName; document.getElementById('remove-friend-name').innerText = friendName; document.getElementById('remove-friend-modal').classList.remove('hidden'); }
        
        async function sendFriendRequest() {
            const targetUsername = document.getElementById('search-friend-input').value.trim().toLowerCase();
            const errDiv = document.getElementById('friend-error');
            if(!targetUsername) return;
            if(targetUsername === window.currentUserData.username_lower) { errDiv.innerText="لا يمكنك إضافة نفسك!"; errDiv.style.display='block'; return; }
            try {
                const q = window.queryFunc(window.collectionFunc(window.dbInstance, "users"), window.whereFunc("username_lower", "==", targetUsername));
                const snap = await window.getDocsFunc(q);
                if(snap.empty) { errDiv.innerText="المستخدم غير موجود."; errDiv.style.display='block'; return; }
                const targetDocId = snap.docs[0].id;
                await window.updateDocFunc(window.docFunc(window.dbInstance, "users", targetDocId), { friendRequests: window.arrayUnion(window.currentUserData.username) });
                closeFriendModal('add-friend-modal');
            } catch(e) { errDiv.innerText="حدث خطأ."; errDiv.style.display='block'; }
        }

        async function acceptFriendRequest(requesterName) {
            try {
                await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { friends: window.arrayUnion(requesterName), friendRequests: window.arrayRemove(requesterName) });
                const q = window.queryFunc(window.collectionFunc(window.dbInstance, "users"), window.whereFunc("username", "==", requesterName));
                const snap = await window.getDocsFunc(q);
                if(!snap.empty) { await window.updateDocFunc(window.docFunc(window.dbInstance, "users", snap.docs[0].id), { friends: window.arrayUnion(window.currentUserData.username) }); }
                window.currentUserData.friends.push(requesterName); window.currentUserData.friendRequests = window.currentUserData.friendRequests.filter(r => r !== requesterName);
                window.renderFriendsList('friends-container-desktop'); window.renderNotifications();
                if(document.getElementById('mobile-friends-wrapper')) window.renderFriendsList('mobile-friends-wrapper');
            } catch(e) { }
        }

        async function rejectFriendRequest(requesterName) {
            try { await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { friendRequests: window.arrayRemove(requesterName) }); window.currentUserData.friendRequests = window.currentUserData.friendRequests.filter(r => r !== requesterName); window.renderNotifications(); } catch(e) {}
        }

        async function confirmRemoveFriend() {
            if(!window.friendToRemove) return;
            try {
                await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { friends: window.arrayRemove(window.friendToRemove) });
                window.currentUserData.friends = window.currentUserData.friends.filter(f => f !== window.friendToRemove);
                window.renderFriendsList('friends-container-desktop');
                if(document.getElementById('mobile-friends-wrapper')) window.renderFriendsList('mobile-friends-wrapper');
                closeFriendModal('remove-friend-modal');
            } catch(e) { }
        }

        window.clearAuthInputs = function() {
            const form = document.getElementById('firebase-form'); if(form) form.reset();
            const err = document.getElementById('auth-error'); if(err) err.style.display = 'none';
        };

        function setFormType(type) { 
            window.currentFormMode = type; 
            document.getElementById('tab-login').classList.toggle('active', type === 'login'); 
            document.getElementById('tab-register').classList.toggle('active', type === 'register'); 
            document.getElementById('login-fields').style.display = type === 'login' ? 'block' : 'none'; 
            document.getElementById('register-fields').style.display = type === 'register' ? 'block' : 'none'; 
        }

        function toggleDropdown(dropdownId, triggerElement) {
            const isCurrentlyOpen = document.getElementById(dropdownId).classList.contains('show');
            document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show'));
            document.querySelectorAll('.header-icon-btn, .profile-trigger').forEach(t => t.classList.remove('active'));
            if (!isCurrentlyOpen) { document.getElementById(dropdownId).classList.add('show'); if(triggerElement) triggerElement.classList.add('active'); }
        }

        window.onclick = function(e) { 
            if (!e.target.closest('.header-icon-btn') && !e.target.closest('.profile-trigger') && !e.target.closest('.header-dropdown')) { 
                document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show')); 
                document.querySelectorAll('.header-icon-btn, .profile-trigger').forEach(t => t.classList.remove('active'));
            } 
        }
        
        function handleLogout() { 
            window.signOutFunc(window.authInstance).then(() => { 
                localStorage.removeItem('deception_guest'); // إزالة حالة الزائر ليتم إظهار نافذة الدخول
                document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show'));
                document.body.removeAttribute('data-theme'); document.documentElement.className=''; 
                window.currentUserData = null; window.clearAuthInputs(); 
                document.getElementById('auth-modal').classList.remove('hidden'); document.getElementById('app-shell').classList.remove('unlocked'); 
            }); 
        }

        function switchModalMode(mode) { if(mode === 'forms'){ document.getElementById('modal-welcome-view').style.display = 'none'; document.getElementById('modal-form-view').style.display = 'block'; } }
        
        window.enterAsGuest = function(silent = false) {
            window.isGuest = true; window.currentUserData = null;
            localStorage.setItem('deception_guest', 'true'); // حفظ الزائر
            document.getElementById('header-name').innerText = window.translations[document.documentElement.lang||'ar'].guest; 
            document.getElementById('dropdown-status-name').innerText = window.translations[document.documentElement.lang||'ar'].unregistered; 
            document.getElementById('header-avatar-fallback').innerText = "ز";
            window.renderFriendsList('friends-container-desktop'); window.renderNotifications();
            document.getElementById('dropdown-content-area').innerHTML = `<button class="dropdown-item" onclick="window.clearAuthInputs(); document.getElementById('auth-modal').classList.remove('hidden'); toggleDropdown(''); switchModalMode('forms'); setFormType('login');"><i class="ph ph-sign-in"></i> <span data-i18n="btn_login">${window.translations[document.documentElement.lang||'ar'].btn_login}</span></button>`;
            
            window.clearAuthInputs(); 
            if(!silent) document.getElementById('auth-modal').classList.add('hidden'); 
            document.getElementById('app-shell').classList.add('unlocked'); 
            
            if(!silent) loadFragment('home', document.querySelector('.nav-btn.active'));
        }

        function closeAuthModal() { 
            window.clearAuthInputs(); 
            document.getElementById('auth-modal').classList.add('hidden'); 
            document.getElementById('app-shell').classList.add('unlocked'); 
            if(!window.isGuest) window.enterAsGuest(); 
        }
        
        function loadFragment(pageName, element) {
            const contentHolder = document.getElementById('content-holder');
            const lang = document.documentElement.lang || 'ar';
            const pageTitleStr = window.translations[lang][`title_${pageName}`] || pageName;
            
            document.getElementById('page-title').innerText = pageTitleStr;
            document.getElementById('mobile-section-name').innerText = pageTitleStr;
            
            document.querySelectorAll('.nav-btn, .bottom-tab').forEach(btn => {
                btn.classList.remove('active'); const icon = btn.querySelector('i'); if(icon) icon.className = icon.className.replace('ph-fill', 'ph');
            });

            if(element) {
                element.classList.add('active'); const icon = element.querySelector('i'); if(icon) icon.className = icon.className.replace('ph', 'ph-fill');
                const isNav = element.classList.contains('nav-btn');
                const tabsList = isNav ? document.querySelectorAll('.nav-btn') : document.querySelectorAll('.bottom-tab');
                const targetList = isNav ? document.querySelectorAll('.bottom-tab') : document.querySelectorAll('.nav-btn');
                const index = Array.from(tabsList).indexOf(element);
                
                if(pageName === 'friends' && isNav === false) {}
                else if (pageName === 'store' && isNav === true) { const m = document.querySelectorAll('.bottom-tab')[4]; if(m) { m.classList.add('active'); m.querySelector('i').className = m.querySelector('i').className.replace('ph', 'ph-fill'); } }
                else if (pageName === 'profile' && isNav === true) { const m = document.querySelectorAll('.bottom-tab')[5]; if(m) { m.classList.add('active'); m.querySelector('i').className = m.querySelector('i').className.replace('ph', 'ph-fill'); } }
                else { const m = targetList[index]; if(m) { m.classList.add('active'); m.querySelector('i').className = m.querySelector('i').className.replace('ph', 'ph-fill'); } }
            }

            if (pageName === 'friends') {
                contentHolder.innerHTML = `<div id="mobile-friends-wrapper" style="max-width:400px; margin: 40px auto; display:flex; flex-direction:column; align-items:center; gap:20px;"></div>`;
                window.renderFriendsList('mobile-friends-wrapper');
            } else {
                contentHolder.innerHTML = `<div style="display:flex; justify-content:center; align-items:center; height:100%; color:var(--text-dim); font-size:1.2rem; font-weight:bold;">${pageTitleStr} - جاهز للتصميم</div>`;
            }
        }
    </script>
</body>
</html>
