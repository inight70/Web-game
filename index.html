<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Deception</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=11.0">
</head>
<body>

    <div id="global-loader"><div class="spinner"></div></div>

    <!-- نافذة المصادقة -->
    <div id="auth-modal" class="auth-overlay hidden">
        <div class="auth-card">
            <button class="close-modal-btn" onclick="closeAuthModal()"><i class="ph ph-x"></i></button>
            
            <div id="modal-welcome-view">
                <i class="ph-duotone ph-shield-check" style="font-size: 3.5rem; color: var(--accent-red); margin-bottom: 20px; display: inline-block;"></i>
                <h2 data-i18n="welcome_title">النظام السحابي</h2>
                <p data-i18n="welcome_desc">سجل دخولك الآن لتتمكن من اللعب، حفظ تقدمك، والتفاعل مع الأصدقاء.</p>
                <button class="btn-core" onclick="switchModalMode('forms')" data-i18n="login_btn">تسجيل الدخول</button>
                <button class="link-guest" onclick="enterAsGuest()" data-i18n="guest_btn">المتابعة كزائر</button>
            </div>
            
            <div id="modal-form-view" style="display: none;">
                <div class="modal-tabs">
                    <button id="tab-login" class="modal-tab-btn active" onclick="setFormType('login')" data-i18n="login_btn">تسجيل الدخول</button>
                    <button id="tab-register" class="modal-tab-btn" onclick="setFormType('register')" data-i18n="register_btn">حساب جديد</button>
                </div>
                <div id="auth-error" class="auth-error-msg"></div>
                <form id="firebase-form" onsubmit="handleAuthSubmit(event)" autocomplete="off">
                    <div id="login-fields">
                        <div class="input-wrapper"><label data-i18n="email_user">المعرف (Email/Username)</label><input type="text" id="login-id" class="premium-input" data-i18n="email_user_ph" placeholder="أدخل البيانات" required autocomplete="off"></div>
                        <div class="input-wrapper"><label data-i18n="password">كلمة المرور</label><input type="password" id="login-password" class="premium-input" placeholder="••••••••" required autocomplete="new-password"></div>
                    </div>
                    <div id="register-fields" style="display: none;">
                        <div class="input-wrapper"><label data-i18n="username">اسم المستخدم</label><input type="text" id="reg-username" class="premium-input" data-i18n="username_ph" placeholder="مثال: Player1" autocomplete="off"></div>
                        <div class="input-wrapper"><label data-i18n="email">البريد الإلكتروني</label><input type="email" id="reg-email" class="premium-input" placeholder="name@domain.com" autocomplete="off"></div>
                        <div class="input-wrapper"><label data-i18n="password">كلمة المرور</label><input type="password" id="reg-password" class="premium-input" placeholder="••••••••" autocomplete="new-password"></div>
                        <div class="input-wrapper"><label data-i18n="confirm_pass">تأكيد كلمة المرور</label><input type="password" id="reg-confirm" class="premium-input" placeholder="••••••••" autocomplete="new-password"></div>
                    </div>
                    <button type="submit" class="btn-core" id="modal-submit-btn" data-i18n="confirm_login">تأكيد الدخول</button>
                </form>
            </div>
        </div>
    </div>

    <!-- نوافذ الأصدقاء (إضافة / حذف / مراجعة الطلب) -->
    <div id="add-friend-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <button class="close-modal-btn" onclick="closeFriendModal('add-friend-modal')"><i class="ph ph-x"></i></button>
            <h2 data-i18n="add_friend_title">إضافة صديق</h2>
            <p data-i18n="add_friend_desc">أدخل اسم المستخدم لإرسال طلب صداقة.</p>
            <div id="friend-error" class="auth-error-msg"></div>
            <div class="input-wrapper">
                <input type="text" id="search-friend-input" class="premium-input" data-i18n="search_friend_placeholder" placeholder="اسم المستخدم" autocomplete="off">
            </div>
            <button class="btn-core" onclick="sendFriendRequest()" data-i18n="send_request">إرسال الطلب</button>
        </div>
    </div>

    <div id="review-request-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <button class="close-modal-btn" onclick="closeFriendModal('review-request-modal')"><i class="ph ph-x"></i></button>
            <i class="ph-duotone ph-user-plus" style="font-size: 3.5rem; color: var(--accent-green); margin-bottom: 15px; display: inline-block;"></i>
            <h2 data-i18n="friend_req_title">طلب صداقة</h2>
            <p><span data-i18n="friend_req_from">لقد أرسل لك</span> <strong id="request-sender-name" style="color: var(--text-main);"></strong> <span data-i18n="friend_req_msg">طلب صداقة، هل توافق؟</span></p>
            
            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <button class="btn-core" style="background: var(--accent-green); box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3);" onclick="processFriendRequest(true)" data-i18n="accept">قبول</button>
                <button class="btn-secondary" style="margin-top: 0;" onclick="processFriendRequest(false)" data-i18n="reject">رفض</button>
            </div>
        </div>
    </div>

    <div id="remove-friend-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <button class="close-modal-btn" onclick="closeFriendModal('remove-friend-modal')"><i class="ph ph-x"></i></button>
            <h2 data-i18n="remove_friend_title">حذف صديق</h2>
            <p><span data-i18n="remove_friend_desc">هل أنت متأكد أنك تريد حذف</span> <strong id="remove-friend-name"></strong>؟</p>
            <button class="btn-secondary" style="margin-bottom: 15px;" onclick="closeFriendModal('remove-friend-modal')" data-i18n="cancel">إلغاء</button>
            <button class="btn-core" onclick="confirmRemoveFriend()" data-i18n="confirm_remove">تأكيد الحذف</button>
        </div>
    </div>

    <!-- الهيكل الأساسي للعبة -->
    <div id="app-shell" class="app-shell">
        
        <aside class="sidebar">
            <div class="sidebar-logo">Decep<br><span>tion</span></div>
            <nav class="nav-menu">
                <button class="nav-btn active" onclick="loadFragment('home', this)"><i class="ph-fill ph-squares-four"></i></button>
                <button class="nav-btn" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i></button>
                <button class="nav-btn" onclick="loadFragment('achievements', this)"><i class="ph ph-medal"></i></button>
                <button class="nav-btn" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i></button>
                <button class="nav-btn" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i></button>
            </nav>
            <div class="theme-wrapper">
                <button id="btn-theme-dark" class="theme-btn active-theme" onclick="toggleTheme('dark')"><i class="ph-fill ph-moon"></i></button>
                <button id="btn-theme-light" class="theme-btn" onclick="toggleTheme('light')"><i class="ph-fill ph-sun"></i></button>
            </div>
        </aside>

        <main class="main-viewport">
            <header class="top-header">
                
                <div class="header-page-info">
                    <h1 class="page-title" id="page-title" data-i18n="title_home">الرئيسية</h1>
                    <div class="mobile-brand-title">
                        <div class="brand-name">Decep<br><span>tion</span></div>
                        <div class="mobile-section-name" id="mobile-section-name" data-i18n="title_home">الرئيسية</div>
                    </div>
                </div>

                <div class="header-actions">
                    
                    <div style="position: relative;">
                        <button class="header-icon-btn" id="settings-trigger" onclick="toggleDropdown('settings-dropdown', this)"><i class="ph ph-gear"></i></button>
                        <div class="header-dropdown" id="settings-dropdown">
                            <div class="dropdown-header" data-i18n="settings">الإعدادات</div>
                            
                            <div class="settings-group">
                                <label data-i18n="font_size">حجم الواجهة</label>
                                <div class="segmented-control">
                                    <button class="segment-btn" id="font-small" onclick="setFontSize('small')" data-i18n="font_small">صغير</button>
                                    <button class="segment-btn active" id="font-default" onclick="setFontSize('default')" data-i18n="font_default">افتراضي</button>
                                    <button class="segment-btn" id="font-large" onclick="setFontSize('large')" data-i18n="font_large">كبير</button>
                                </div>
                            </div>

                            <div class="settings-group">
                                <label data-i18n="language">اللغة</label>
                                <div class="segmented-control">
                                    <button class="segment-btn lang-btn" id="lang-en" onclick="setLanguage('en')">English</button>
                                    <button class="segment-btn lang-btn active" id="lang-ar" onclick="setLanguage('ar')">العربية</button>
                                </div>
                            </div>

                            <div class="settings-group">
                                <label data-i18n="animations">المؤثرات الحركية</label>
                                <div class="segmented-control">
                                    <button class="segment-btn" id="anim-off" onclick="setAnimation(false)" data-i18n="anim_off">إيقاف</button>
                                    <button class="segment-btn active" id="anim-on" onclick="setAnimation(true)" data-i18n="anim_on">تشغيل</button>
                                </div>
                            </div>

                            <div class="settings-group mobile-only-theme">
                                <label data-i18n="theme">المظهر</label>
                                <div class="segmented-control">
                                    <button class="segment-btn" id="mini-theme-light" onclick="toggleTheme('light')" data-i18n="theme_light">فاتح</button>
                                    <button class="segment-btn active" id="mini-theme-dark" onclick="toggleTheme('dark')" data-i18n="theme_dark">داكن</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div style="position: relative;">
                        <button class="header-icon-btn" id="noti-trigger" onclick="toggleDropdown('noti-dropdown', this)">
                            <i class="ph ph-bell"></i>
                            <span class="notification-dot" id="noti-dot"></span>
                        </button>
                        <div class="header-dropdown" id="noti-dropdown">
                            <div class="dropdown-header" data-i18n="notifications">التنبيهات</div>
                            <div id="noti-list"></div>
                        </div>
                    </div>
                    
                    <div style="position: relative;">
                        <div class="profile-trigger" id="profile-trigger" onclick="toggleDropdown('user-dropdown', this)">
                            <div class="profile-avatar-fallback" id="header-avatar-fallback">ز</div>
                            <div class="profile-info">
                                <span class="profile-name" id="header-name" data-i18n="guest_name">زائر</span>
                            </div>
                            <i class="ph-bold ph-caret-down"></i>
                        </div>
                        <div class="header-dropdown" id="user-dropdown">
                            <div class="dropdown-header" id="dropdown-status-name" data-i18n="guest_status">غير مسجل</div>
                            <div id="dropdown-content-area"></div>
                        </div>
                    </div>
                </div>
            </header>
            
            <div class="dynamic-content" id="content-holder"></div>
        </main>

        <aside class="right-sidebar">
            <div id="friends-container-desktop"></div>
        </aside>

        <!-- شريط الجوال -->
        <nav class="bottom-bar">
            <button class="bottom-tab active" onclick="loadFragment('home', this)"><i class="ph-fill ph-squares-four"></i></button>
            <button class="bottom-tab" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i></button>
            <button class="bottom-tab" onclick="loadFragment('achievements', this)"><i class="ph ph-medal"></i></button>
            <button class="bottom-tab" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i></button>
            <button class="bottom-tab" onclick="loadFragment('friends', this)"><i class="ph ph-users"></i></button>
            <button class="bottom-tab" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i></button>
        </nav>
    </div>

    <!-- أكواد Firebase، الترجمة، والمنطق -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc, arrayUnion, arrayRemove, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCLFj5UTX9EtuehoMWV02gkPsAgKPvMhzI", authDomain: "web-game-260b5.firebaseapp.com", projectId: "web-game-260b5", storageBucket: "web-game-260b5.firebasestorage.app", messagingSenderId: "682229509792", appId: "1:682229509792:web:11b4a404459630fcd6a3c5" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app); const db = getFirestore(app);
        
        window.authInstance = auth; window.dbInstance = db; window.signOutFunc = signOut; window.updateDocFunc = updateDoc; window.docFunc = doc; window.arrayUnion = arrayUnion; window.arrayRemove = arrayRemove; window.getDocsFunc = getDocs; window.queryFunc = query; window.whereFunc = where; window.collectionFunc = collection;
        window.isGuest = false; window.currentFormMode = 'login'; window.currentUserData = null; window.friendToRemove = null; window.friendToReview = null;
        window.unsubscribeSnapshot = null;

        window.translations = {
            ar: {
                "title_home": "الرئيسية", "title_play": "غرف اللعب", "title_achievements": "الإنجازات", "title_friends": "الأصدقاء", "title_store": "المتجر", "title_profile": "الملف الشخصي",
                "welcome_title": "النظام السحابي", "welcome_desc": "سجل دخولك الآن لتتمكن من اللعب، حفظ تقدمك، والتفاعل مع الأصدقاء.",
                "login_btn": "تسجيل الدخول", "guest_btn": "المتابعة كزائر", "register_btn": "حساب جديد",
                "settings": "الإعدادات", "notifications": "التنبيهات", "no_noti": "لا يوجد تنبيهات حالياً",
                "guest_name": "زائر", "guest_status": "غير مسجل", "logout": "تسجيل خروج",
                "font_size": "حجم الواجهة", "font_small": "صغير", "font_default": "افتراضي", "font_large": "كبير",
                "language": "اللغة", "animations": "المؤثرات الحركية", "anim_on": "تشغيل", "anim_off": "إيقاف",
                "theme": "المظهر", "theme_dark": "داكن", "theme_light": "فاتح",
                "login_to_see_friends": "يجب تسجيل الدخول لإضافة الأصدقاء ورؤيتهم.",
                "email_user": "المعرف (Email/Username)", "password": "كلمة المرور", "username": "اسم المستخدم", "email": "البريد الإلكتروني", "confirm_pass": "تأكيد كلمة المرور",
                "email_user_ph": "أدخل البيانات", "username_ph": "مثال: Player1",
                "confirm_login": "تأكيد الدخول", "confirm_register": "إنشاء الحساب",
                "add_friend_title": "إضافة صديق", "add_friend_desc": "أدخل اسم المستخدم لإرسال طلب صداقة.", "search_friend_placeholder": "اسم المستخدم", "send_request": "إرسال الطلب",
                "remove_friend_title": "حذف صديق", "remove_friend_desc": "هل أنت متأكد أنك تريد حذف", "cancel": "إلغاء", "confirm_remove": "تأكيد الحذف",
                "friends": "الأصدقاء", "friend_req_from": "لقد أرسل لك", "friend_req_msg": "طلب صداقة، هل توافق؟", "friend_req_title": "طلب صداقة", "accept": "قبول", "reject": "رفض",
                "new_friend_req": "طلب صداقة جديد من", "now": "الآن"
            },
            en: {
                "title_home": "Home", "title_play": "Play Rooms", "title_achievements": "Achievements", "title_friends": "Friends", "title_store": "Store", "title_profile": "Profile",
                "welcome_title": "Cloud System", "welcome_desc": "Log in now to play, save progress, and interact with friends.",
                "login_btn": "Log In", "guest_btn": "Continue as Guest", "register_btn": "New Account",
                "settings": "Settings", "notifications": "Notifications", "no_noti": "No notifications currently",
                "guest_name": "Guest", "guest_status": "Not registered", "logout": "Log Out",
                "font_size": "UI Size", "font_small": "Small", "font_default": "Default", "font_large": "Large",
                "language": "Language", "animations": "Animations", "anim_on": "On", "anim_off": "Off",
                "theme": "Theme", "theme_dark": "Dark", "theme_light": "Light",
                "login_to_see_friends": "You must log in to see and add friends.",
                "email_user": "Identifier (Email/Username)", "password": "Password", "username": "Username", "email": "Email", "confirm_pass": "Confirm Password",
                "email_user_ph": "Enter details", "username_ph": "e.g. Player1",
                "confirm_login": "Confirm Login", "confirm_register": "Create Account",
                "add_friend_title": "Add Friend", "add_friend_desc": "Enter username to send a friend request.", "search_friend_placeholder": "Username", "send_request": "Send Request",
                "remove_friend_title": "Remove Friend", "remove_friend_desc": "Are you sure you want to remove", "cancel": "Cancel", "confirm_remove": "Confirm Remove",
                "friends": "Friends", "friend_req_from": "", "friend_req_msg": "sent you a friend request. Accept?", "friend_req_title": "Friend Request", "accept": "Accept", "reject": "Decline",
                "new_friend_req": "New friend request from", "now": "Just now"
            }
        };
        window.currentLang = 'ar';

        const hideLoader = () => { const l = document.getElementById('global-loader'); if(l){ l.style.opacity = '0'; setTimeout(()=>l.style.visibility='hidden',400); } };

        window.renderFriendsList = function(containerId) {
            const container = document.getElementById(containerId); if(!container) return;
            if (window.isGuest || !window.currentUserData) {
                container.innerHTML = `<div class="guest-friends-msg"><i class="ph-duotone ph-lock-key"></i><span data-i18n="login_to_see_friends">${window.translations[window.currentLang].login_to_see_friends}</span></div>`;
                return;
            }
            const friends = window.currentUserData.friends || [];
            let html = `<div class="friends-header" data-i18n="friends">${window.translations[window.currentLang].friends}</div>`;
            if (friends.length === 0) { html += `<button class="add-friend-btn" onclick="openAddFriendModal()"><i class="ph-bold ph-plus"></i></button>`; } 
            else {
                friends.forEach(f => { html += `<div class="friend-avatar" onclick="openRemoveFriendModal('${f}')"><div style="width:100%; height:100%; border-radius:50%; background:var(--surface-panel); display:flex; justify-content:center; align-items:center; font-weight:bold; font-size:16px; color:var(--text-main);">${f.charAt(0).toUpperCase()}</div><div class="online-dot"></div></div>`; });
                html += `<button class="add-friend-btn" onclick="openAddFriendModal()"><i class="ph-bold ph-plus"></i></button>`;
            }
            container.innerHTML = html;
        };

        window.renderNotifications = function() {
            const list = document.getElementById('noti-list');
            const dot = document.getElementById('noti-dot');
            if (window.isGuest || !window.currentUserData || !window.currentUserData.friendRequests || window.currentUserData.friendRequests.length === 0) {
                list.innerHTML = `<div class="empty-state"><i class="ph-duotone ph-bell-slash"></i><span data-i18n="no_noti">${window.translations[window.currentLang].no_noti}</span></div>`;
                dot.style.display = 'none';
                return;
            }
            
            dot.style.display = 'block'; 
            let html = '';
            window.currentUserData.friendRequests.forEach(req => {
                html += `
                    <div class="noti-item" onclick="openReviewRequestModal('${req}')">
                        <div class="noti-icon"><i class="ph-bold ph-user-plus"></i></div>
                        <div class="noti-text-content">
                            <span class="noti-text"><span data-i18n="new_friend_req">${window.translations[window.currentLang].new_friend_req}</span> <strong>${req}</strong></span>
                            <span class="noti-time" data-i18n="now">${window.translations[window.currentLang].now}</span>
                        </div>
                    </div>`;
            });
            list.innerHTML = html;
        };

        onAuthStateChanged(auth, (user) => {
            const nameEl = document.getElementById('header-name');
            const fallbackAvatar = document.getElementById('header-avatar-fallback');
            const dropdownStatus = document.getElementById('dropdown-status-name');
            const dropdownContent = document.getElementById('dropdown-content-area');

            if (window.unsubscribeSnapshot) {
                window.unsubscribeSnapshot();
                window.unsubscribeSnapshot = null;
            }

            if (user) {
                window.isGuest = false; 
                let isInitialLoad = true; 

                window.unsubscribeSnapshot = onSnapshot(doc(db, "users", user.uid), (userDoc) => {
                    if (userDoc.exists()) {
                        window.currentUserData = userDoc.data();
                        let displayName = window.currentUserData.username || user.email.split('@')[0];

                        nameEl.removeAttribute('data-i18n'); 
                        nameEl.innerText = displayName;
                        fallbackAvatar.innerText = displayName.charAt(0).toUpperCase();
                        dropdownStatus.innerText = "متصل";

                        if (window.currentUserData.settings) {
                            if(window.toggleTheme) window.toggleTheme(window.currentUserData.settings.theme || 'dark', true);
                            if(window.setFontSize) window.setFontSize(window.currentUserData.settings.fontSize || 'default', true);
                            if(window.setAnimation) window.setAnimation(window.currentUserData.settings.animations !== false, true);
                            if(window.setLanguage && window.currentLang !== window.currentUserData.settings.language) {
                                window.setLanguage(window.currentUserData.settings.language || 'ar', true);
                            }
                        }

                        window.renderFriendsList('friends-container-desktop'); 
                        if(document.getElementById('mobile-friends-wrapper')) window.renderFriendsList('mobile-friends-wrapper');
                        window.renderNotifications();

                        if (isInitialLoad) {
                            dropdownContent.innerHTML = `
                                <button class="dropdown-item" onclick="loadFragment('profile', null); toggleDropdown('');"><i class="ph ph-user-circle"></i> <span data-i18n="title_profile">${window.translations[window.currentLang].title_profile}</span></button>
                                <button class="dropdown-item logout" onclick="handleLogout()"><i class="ph ph-sign-out"></i> <span data-i18n="logout">${window.translations[window.currentLang].logout}</span></button>
                            `;
                            if(window.clearAuthInputs) window.clearAuthInputs(); 
                            document.getElementById('auth-modal').classList.add('hidden'); 
                            document.getElementById('app-shell').classList.add('unlocked');
                            
                            const currentActive = document.querySelector('.nav-btn.active');
                            if(currentActive) loadFragment(['home','play','achievements','store','profile'][Array.from(document.querySelectorAll('.nav-btn')).indexOf(currentActive)] || 'home', currentActive);
                            hideLoader();
                            isInitialLoad = false;
                        }
                    }
                });

            } else {
                if (!window.isGuest) {
                    window.currentUserData = null; if(window.clearAuthInputs) window.clearAuthInputs(); 
                    nameEl.setAttribute('data-i18n', 'guest_name'); nameEl.innerText = window.translations[window.currentLang].guest_name;
                    document.getElementById('modal-welcome-view').style.display = 'block'; document.getElementById('modal-form-view').style.display = 'none';
                    document.getElementById('auth-modal').classList.remove('hidden'); document.getElementById('app-shell').classList.remove('unlocked');

        window.handleAuthSubmit = async function(e) {
            e.preventDefault(); const errorDiv = document.getElementById('auth-error'); const btn = document.getElementById('modal-submit-btn');
            errorDiv.style.display = 'none'; btn.disabled = true; btn.innerText = "جاري التحقق...";
            try {
                if (window.currentFormMode === 'login') {
                    let id = document.getElementById('login-id').value.trim(); let pass = document.getElementById('login-password').value; let email = id;
                    if (!id.includes('@')) { const q = query(collection(db, "users"), where("username_lower", "==", id.toLowerCase())); const snap = await getDocs(q); if (snap.empty) throw { message: "البيانات غير صحيحة" }; email = snap.docs[0].data().email; }
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const user = document.getElementById('reg-username').value.trim(); const email = document.getElementById('reg-email').value.trim(); const pass = document.getElementById('reg-password').value; const conf = document.getElementById('reg-confirm').value;
                    if (pass !== conf) throw { message: "كلمات المرور غير متطابقة" }; if (pass.length < 6) throw { message: "كلمة المرور 6 أحرف على الأقل" };
                    const q = query(collection(db, "users"), where("username_lower", "==", user.toLowerCase())); const snap = await getDocs(q); if (!snap.empty) throw { message: "اسم المستخدم محجوز" };
                    const cred = await createUserWithEmailAndPassword(auth, email.toLowerCase(), pass);
                    await setDoc(doc(db, "users", cred.user.uid), { username: user, username_lower: user.toLowerCase(), email: email.toLowerCase(), matches: 0, wins: 0, friends: [], friendRequests: [], settings: { theme: 'dark', fontSize: 'default', animations: true, language: 'ar' }, createdAt: new Date().toISOString() });
                }
            } catch (err) {
                let msg = err.message; if(msg.includes("invalid-credential")) msg = "البيانات غير صحيحة"; if(msg.includes("email-already-in-use")) msg = "البريد الإلكتروني مستخدم";
                errorDiv.innerText = msg; errorDiv.style.display = 'block';
            } finally { btn.disabled = false; btn.innerText = window.currentFormMode === 'register' ? window.translations[window.currentLang].confirm_register : window.translations[window.currentLang].confirm_login; }
        }

    <script>

        window.processFriendRequest = async function(isAccepted) {
            if(!window.friendToReview) return;
            const reqName = window.friendToReview;
            closeFriendModal('review-request-modal');
            
            try {
                if(isAccepted) {
                    await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { 
                        friends: window.arrayUnion(reqName), 
                        friendRequests: window.arrayRemove(reqName)

                    const q = window.queryFunc(window.collectionFunc(window.dbInstance, "users"), window.whereFunc("username_lower", "==", reqName.toLowerCase()));
                    const snap = await window.getDocsFunc(q);
                    
                    if(!snap.empty) { 
                        await window.updateDocFunc(window.docFunc(window.dbInstance, "users", snap.docs[0].id), { 
                            friends: window.arrayUnion(window.currentUserData.username)

                } else {
                    await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), {

        async function sendFriendRequest() {
            const targetUsername = document.getElementById('search-friend-input').value.trim().toLowerCase(); 
            const errDiv = document.getElementById('friend-error'); 
            if(!targetUsername) return;
            
            if(targetUsername === window.currentUserData.username_lower) { errDiv.innerText="لا يمكنك إضافة نفسك!"; errDiv.style.display='block'; return; }
            
            try {
                const q = window.queryFunc(window.collectionFunc(window.dbInstance, "users"), window.whereFunc("username_lower", "==", targetUsername));
                const snap = await window.getDocsFunc(q);
                if(snap.empty) { errDiv.innerText="المستخدم غير موجود."; errDiv.style.display='block'; return; }
                
                const targetDocId = snap.docs[0].id;
                const myName = window.currentUserData.username || window.authInstance.currentUser.email.split('@')[0];
                
                await window.updateDocFunc(window.docFunc(window.dbInstance, "users", targetDocId), { 
                    friendRequests: window.arrayUnion(myName) 
                });
                
                alert("تم إرسال الطلب بنجاح!"); closeFriendModal('add-friend-modal');
            } catch(e) {

                errDiv.innerText = "حدث خطأ في الإرسال."; errDiv.style.display='block';

        }

        async function confirmRemoveFriend() {
            if(!window.friendToRemove) return;
            try {
                const targetFriendName = window.friendToRemove;
                const myUid = window.authInstance.currentUser.uid;
                const myName = window.currentUserData.username;

                // 1. مسح الصديق من قائمتي
                await window.updateDocFunc(window.docFunc(window.dbInstance, "users", myUid), { 
                    friends: window.arrayRemove(targetFriendName) 
                });

                // 2. البحث عن ملف الصديق في قاعدة البيانات
                const q = window.queryFunc(window.collectionFunc(window.dbInstance, "users"), window.whereFunc("username_lower", "==", targetFriendName.toLowerCase()));
                const snap = await window.getDocsFunc(q);

                // 3. مسح اسمي من قائمة الصديق
                if (!snap.empty) {
                    const targetDocId = snap.docs[0].id;
                    await window.updateDocFunc(window.docFunc(window.dbInstance, "users", targetDocId), {
                        friends: window.arrayRemove(myName)
                    });
                }

                // إغلاق النافذة (و onSnapshot سيتكفل بتحديث الواجهة تلقائياً وبسرعة)
                closeFriendModal('remove-friend-modal');
