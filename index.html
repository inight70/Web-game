<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Deception</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=9.0">
    <script>
        // تحميل الإعدادات من LocalStorage فوراً لتجنب الوميض (Flicker)
        const savedSettings = JSON.parse(localStorage.getItem('appSettings')) || { theme: 'dark', fontSize: 'default', lang: 'ar', anim: true };
        if(savedSettings.theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
        if(savedSettings.fontSize !== 'default') document.documentElement.classList.add(`font-${savedSettings.fontSize}`);
        if(savedSettings.lang === 'en') { document.documentElement.lang = 'en'; document.documentElement.dir = 'ltr'; }
        if(savedSettings.anim === false) document.documentElement.classList.add('no-animations');
    </script>
</head>
<body>

    <div id="global-loader"><div class="spinner"></div></div>

    <!-- نافذة المصادقة -->
    <div id="auth-modal" class="auth-overlay hidden">
        <div class="auth-card">
            <button class="close-modal-btn" onclick="closeAuthModal()"><i class="ph ph-x"></i></button>
            <div id="modal-welcome-view">
                <i class="ph-duotone ph-shield-check" style="font-size: 3.5rem; color: var(--accent-red); margin-bottom: 20px; display: inline-block;"></i>
                <h2 data-i18n="cloud_system">النظام السحابي</h2>
                <p data-i18n="login_desc">سجل دخولك الآن لتتمكن من اللعب، حفظ تقدمك، والتفاعل مع الأصدقاء.</p>
                <button class="btn-core" onclick="switchModalMode('forms')" data-i18n="login_btn">تسجيل الدخول</button>
                <button class="link-guest" onclick="enterAsGuest()" data-i18n="guest_btn">المتابعة كزائر</button>
            </div>
            <div id="modal-form-view" style="display: none;">
                <div class="modal-tabs">
                    <button id="tab-login" class="modal-tab-btn active" onclick="setFormType('login')" data-i18n="login_tab">تسجيل الدخول</button>
                    <button id="tab-register" class="modal-tab-btn" onclick="setFormType('register')" data-i18n="register_tab">حساب جديد</button>
                </div>
                <div id="auth-error" class="auth-error-msg"></div>
                <form id="firebase-form" onsubmit="handleAuthSubmit(event)" autocomplete="off">
                    <div id="login-fields">
                        <div class="input-wrapper"><label data-i18n="email_user">المعرف (Email/Username)</label><input type="text" id="login-id" class="premium-input" required autocomplete="off"></div>
                        <div class="input-wrapper"><label data-i18n="password">كلمة المرور</label><input type="password" id="login-password" class="premium-input" required autocomplete="new-password"></div>
                    </div>
                    <div id="register-fields" style="display: none;">
                        <div class="input-wrapper"><label data-i18n="username">اسم المستخدم</label><input type="text" id="reg-username" class="premium-input" autocomplete="off"></div>
                        <div class="input-wrapper"><label data-i18n="email">البريد الإلكتروني</label><input type="email" id="reg-email" class="premium-input" autocomplete="off"></div>
                        <div class="input-wrapper"><label data-i18n="password">كلمة المرور</label><input type="password" id="reg-password" class="premium-input" autocomplete="new-password"></div>
                        <div class="input-wrapper"><label data-i18n="confirm_password">تأكيد كلمة المرور</label><input type="password" id="reg-confirm" class="premium-input" autocomplete="new-password"></div>
                    </div>
                    <button type="submit" class="btn-core" id="modal-submit-btn" data-i18n="confirm_login">تأكيد الدخول</button>
                </form>
            </div>
        </div>
    </div>

    <div id="app-shell" class="app-shell">
        
        <!-- الشريط الأيسر (الكمبيوتر) -->
        <aside class="sidebar">
            <div class="sidebar-logo">Decep<br><span>tion</span></div>
            <nav class="nav-menu">
                <button class="nav-btn active" onclick="loadFragment('home', this)"><i class="ph-fill ph-squares-four"></i></button>
                <button class="nav-btn" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i></button>
                <button class="nav-btn" onclick="loadFragment('achievements', this)"><i class="ph ph-medal"></i></button>
                <button class="nav-btn" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i></button>
                <button class="nav-btn" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i></button>
            </nav>
            <div class="theme-wrapper">
                <button id="btn-theme-dark" class="theme-btn active-theme" onclick="updateSetting('theme', 'dark')"><i class="ph-fill ph-moon"></i></button>
                <button id="btn-theme-light" class="theme-btn" onclick="updateSetting('theme', 'light')"><i class="ph-fill ph-sun"></i></button>
            </div>
        </aside>

        <main class="main-viewport">
            <header class="top-header">
                
                <div class="header-page-info">
                    <h1 class="page-title" id="page-title" data-i18n="nav_home">الرئيسية</h1>
                    
                    <!-- هيدر الجوال (يمين الصفحة) -->
                    <div class="mobile-brand-title">
                        <div class="brand-name-top">Decep</div>
                        <div class="brand-name-bottom">tion</div>
                        <div class="mobile-section-name" id="mobile-section-name" data-i18n="nav_home">الرئيسية</div>
                    </div>
                </div>

                <div class="header-actions">
                    <!-- الإعدادات -->
                    <div style="position: relative;">
                        <button class="header-icon-btn" id="settings-trigger" onclick="toggleDropdown('settings-dropdown', this)"><i class="ph ph-gear"></i></button>
                        <div class="header-dropdown" id="settings-dropdown">
                            <div class="dropdown-header" data-i18n="settings">الإعدادات</div>
                            
                            <!-- ترتيب الأحجام المُصحح -->
                            <div class="settings-group">
                                <label data-i18n="ui_size">حجم الواجهة</label>
                                <div class="segmented-control">
                                    <button class="segment-btn" id="font-small" onclick="updateSetting('fontSize', 'small')" data-i18n="size_small">صغير</button>
                                    <button class="segment-btn active" id="font-default" onclick="updateSetting('fontSize', 'default')" data-i18n="size_default">وسط</button>
                                    <button class="segment-btn" id="font-large" onclick="updateSetting('fontSize', 'large')" data-i18n="size_large">كبير</button>
                                </div>
                            </div>

                            <div class="settings-group">
                                <label data-i18n="language">اللغة</label>
                                <div class="segmented-control">
                                    <button class="segment-btn" id="lang-ar" onclick="updateSetting('lang', 'ar')">العربية</button>
                                    <button class="segment-btn" id="lang-en" onclick="updateSetting('lang', 'en')">English</button>
                                </div>
                            </div>

                            <div class="settings-group mobile-only-theme">
                                <label data-i18n="theme">المظهر</label>
                                <div class="segmented-control">
                                    <button class="segment-btn" id="mini-theme-light" onclick="updateSetting('theme', 'light')" data-i18n="light">فاتح</button>
                                    <button class="segment-btn active" id="mini-theme-dark" onclick="updateSetting('theme', 'dark')" data-i18n="dark">داكن</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- التنبيهات -->
                    <div style="position: relative;">
                        <button class="header-icon-btn" id="noti-trigger" onclick="toggleDropdown('noti-dropdown', this)"><i class="ph ph-bell"></i></button>
                        <div class="header-dropdown" id="noti-dropdown">
                            <div class="dropdown-header" data-i18n="notifications">التنبيهات</div>
                            <div id="noti-list">
                                <div class="empty-state">
                                    <i class="ph-duotone ph-bell-slash"></i>
                                    <span data-i18n="no_noti">لا يوجد تنبيهات حالياً</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- الملف الشخصي -->
                    <div style="position: relative;">
                        <div class="profile-trigger" id="profile-trigger" onclick="toggleDropdown('user-dropdown', this)">
                            <div class="profile-avatar-fallback" id="header-avatar-fallback">ز</div>
                            <div class="profile-info">
                                <span class="profile-name" id="header-name" data-i18n="guest">زائر</span>
                            </div>
                            <i class="ph-bold ph-caret-down"></i>
                        </div>
                        <div class="header-dropdown" id="user-dropdown">
                            <div class="dropdown-header" id="dropdown-status-name" data-i18n="unregistered">غير مسجل</div>
                            <div id="dropdown-content-area"></div>
                        </div>
                    </div>
                </div>
            </header>
            
            <div class="dynamic-content" id="content-holder"></div>
        </main>

        <!-- الشريط الأيمن (الكمبيوتر) -->
        <aside class="right-sidebar">
            <div id="friends-container-desktop"></div>
        </aside>

        <!-- شريط الجوال السفلي -->
        <nav class="bottom-bar">
            <button class="bottom-tab active" onclick="loadFragment('home', this)"><i class="ph-fill ph-squares-four"></i></button>
            <button class="bottom-tab" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i></button>
            <button class="bottom-tab" onclick="loadFragment('achievements', this)"><i class="ph ph-medal"></i></button>
            <button class="bottom-tab" onclick="loadFragment('friends', this)"><i class="ph ph-users"></i></button>
            <button class="bottom-tab" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i></button>
            <button class="bottom-tab" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i></button>
        </nav>
    </div>

    <!-- أكواد المنطق واللغات و Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCLFj5UTX9EtuehoMWV02gkPsAgKPvMhzI", authDomain: "web-game-260b5.firebaseapp.com", projectId: "web-game-260b5", storageBucket: "web-game-260b5.firebasestorage.app", messagingSenderId: "682229509792", appId: "1:682229509792:web:11b4a404459630fcd6a3c5" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app); const db = getFirestore(app);
        
        window.authInstance = auth; window.dbInstance = db; window.signOutFunc = signOut; window.updateDocFunc = updateDoc; window.docFunc = doc;
        window.isGuest = false; window.currentFormMode = 'login'; window.currentUserData = null;

        const hideLoader = () => { const l = document.getElementById('global-loader'); if(l){ l.style.opacity = '0'; setTimeout(()=>l.style.visibility='hidden',400); } };

        window.renderFriendsList = function(containerId) {
            const container = document.getElementById(containerId);
            if(!container) return;
            if (window.isGuest || !window.currentUserData) {
                container.innerHTML = `<div class="guest-friends-msg"><i class="ph-duotone ph-lock-key"></i><span data-i18n="login_friends">${window.i18n[window.currentLang].login_friends}</span></div>`;
                return;
            }
            container.innerHTML = `<div class="friends-header" data-i18n="friends">${window.i18n[window.currentLang].friends}</div><button class="add-friend-btn"><i class="ph-bold ph-plus"></i></button>`;
        };

        onAuthStateChanged(auth, async (user) => {
            const nameEl = document.getElementById('header-name');
            const fallbackAvatar = document.getElementById('header-avatar-fallback');

            if (user) {
                window.isGuest = false;
                let displayName = user.email.split('@')[0]; 

                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) { 
                        window.currentUserData = userDoc.data();
                        displayName = window.currentUserData.username || displayName; 
                        if (window.currentUserData.settings) {
                            // دمج الإعدادات السحابية مع المحلية
                            window.currentSettings = { ...window.currentSettings, ...window.currentUserData.settings };
                            window.applyAllSettings(window.currentSettings);
                        }
                    }
                } catch (err) {}

                fallbackAvatar.innerText = displayName.charAt(0).toUpperCase();
                nameEl.innerText = displayName;

                document.getElementById('dropdown-content-area').innerHTML = `
                    <button class="dropdown-item" onclick="loadFragment('profile', null); toggleDropdown('');"><i class="ph ph-user-circle"></i> <span data-i18n="nav_profile">${window.i18n[window.currentLang].nav_profile}</span></button>
                    <button class="dropdown-item logout" onclick="handleLogout()"><i class="ph ph-sign-out"></i> <span data-i18n="logout">${window.i18n[window.currentLang].logout}</span></button>
                `;

                window.renderFriendsList('friends-container-desktop');
                window.clearAuthInputs(); 
                document.getElementById('auth-modal').classList.add('hidden');
                document.getElementById('app-shell').classList.add('unlocked');
                loadFragment('home', document.querySelector('.nav-btn.active'));
                hideLoader();
            } else {
                if (!window.isGuest) {
                    window.currentUserData = null;
                    window.clearAuthInputs(); 
                    
                    // نظام Session Storage (لا تظهر نافذة الدخول إلا مرة واحدة)
                    if(!sessionStorage.getItem('loginPromptShown')) {
                        document.getElementById('auth-modal').classList.remove('hidden');
                        document.getElementById('app-shell').classList.remove('unlocked');
                        sessionStorage.setItem('loginPromptShown', 'true');
                    } else {
                        enterAsGuest();
                    }
                }
                hideLoader();
            }
        });

        window.handleAuthSubmit = async function(e) {
            e.preventDefault(); 
            const errorDiv = document.getElementById('auth-error'); 
            const btn = document.getElementById('modal-submit-btn');
            errorDiv.style.display = 'none'; btn.disabled = true; 
            
            try {
                if (window.currentFormMode === 'login') {
                    let id = document.getElementById('login-id').value.trim(); let pass = document.getElementById('login-password').value;
                    let email = id;
                    if (!id.includes('@')) {
                        const q = query(collection(db, "users"), where("username_lower", "==", id.toLowerCase()));
                        const snap = await getDocs(q);
                        if (snap.empty) throw { message: "البيانات غير صحيحة" };
                        email = snap.docs[0].data().email;
                    }
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const user = document.getElementById('reg-username').value.trim(); 
                    const email = document.getElementById('reg-email').value.trim();
                    const pass = document.getElementById('reg-password').value; 
                    const conf = document.getElementById('reg-confirm').value;
                    if (pass !== conf) throw { message: "كلمات المرور غير متطابقة" };
                    if (pass.length < 6) throw { message: "يجب أن تكون 6 أحرف" };
                    const cred = await createUserWithEmailAndPassword(auth, email.toLowerCase(), pass);
                    await setDoc(doc(db, "users", cred.user.uid), { 
                        username: user, username_lower: user.toLowerCase(), email: email.toLowerCase(), 
                        settings: window.currentSettings, createdAt: new Date().toISOString() 
                    });
                }
            } catch (err) {
                errorDiv.innerText = "تأكد من صحة البيانات المُدخلة."; errorDiv.style.display = 'block';
            } finally { btn.disabled = false; }
        }
    </script>

    <script>
        /* =========================================
           نظام اللغات والترجمة (i18n)
           ========================================= */
        window.i18n = {
            ar: {
                cloud_system: "النظام السحابي", login_desc: "سجل دخولك الآن لتتمكن من اللعب والتفاعل.", login_btn: "تسجيل الدخول", guest_btn: "المتابعة كزائر",
                login_tab: "تسجيل الدخول", register_tab: "حساب جديد", email_user: "المعرف (Email/Username)", password: "كلمة المرور", username: "اسم المستخدم",
                email: "البريد الإلكتروني", confirm_password: "تأكيد كلمة المرور", confirm_login: "تأكيد الدخول", nav_home: "الرئيسية", nav_play: "العب",
                nav_achievements: "الإنجازات", nav_store: "المتجر", nav_profile: "الحساب", friends: "الأصدقاء", settings: "الإعدادات", ui_size: "حجم الواجهة",
                size_small: "صغير", size_default: "وسط", size_large: "كبير", language: "اللغة", theme: "المظهر", dark: "داكن", light: "فاتح",
                notifications: "التنبيهات", no_noti: "لا يوجد تنبيهات حالياً", guest: "زائر", unregistered: "غير مسجل", login_friends: "القسم مقفل، سجل دخولك", logout: "تسجيل خروج"
            },
            en: {
                cloud_system: "Cloud System", login_desc: "Log in now to play, save progress, and interact.", login_btn: "Log In", guest_btn: "Continue as Guest",
                login_tab: "Log In", register_tab: "New Account", email_user: "ID (Email/Username)", password: "Password", username: "Username",
                email: "Email", confirm_password: "Confirm Password", confirm_login: "Confirm", nav_home: "Home", nav_play: "Play",
                nav_achievements: "Awards", nav_store: "Store", nav_profile: "Profile", friends: "Friends", settings: "Settings", ui_size: "UI Size",
                size_small: "Small", size_default: "Mid", size_large: "Large", language: "Language", theme: "Theme", dark: "Dark", light: "Light",
                notifications: "Alerts", no_noti: "No alerts right now", guest: "Guest", unregistered: "Unregistered", login_friends: "Locked, please login", logout: "Log Out"
            }
        };

        window.currentSettings = JSON.parse(localStorage.getItem('appSettings')) || { theme: 'dark', fontSize: 'default', lang: 'ar', anim: true };
        window.currentLang = window.currentSettings.lang;

        window.applyLanguage = function(lang) {
            window.currentLang = lang;
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'en' ? 'ltr' : 'rtl';
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (window.i18n[lang][key]) el.innerText = window.i18n[lang][key];
            });

            // تحديث الأزرار
            document.getElementById('lang-ar').classList.toggle('active', lang === 'ar');
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
        };

        /* =========================================
           نظام إدارة الإعدادات الشامل (Global State)
           ========================================= */
        window.applyAllSettings = function(settings) {
            // الثيم
            if (settings.theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
            else document.documentElement.removeAttribute('data-theme');
            ['dark', 'light'].forEach(t => {
                const deskBtn = document.getElementById(`btn-theme-${t}`);
                const mobBtn = document.getElementById(`mini-theme-${t}`);
                if(deskBtn) deskBtn.classList.toggle('active-theme', settings.theme === t);
                if(mobBtn) mobBtn.classList.toggle('active', settings.theme === t);
            });

            // الخط
            document.documentElement.classList.remove('font-small', 'font-large');
            if(settings.fontSize !== 'default') document.documentElement.classList.add(`font-${settings.fontSize}`);
            ['small', 'default', 'large'].forEach(s => {
                const btn = document.getElementById(`font-${s}`);
                if(btn) btn.classList.toggle('active', settings.fontSize === s);
            });

            // اللغة
            window.applyLanguage(settings.lang);

            // حفظ في LocalStorage (ليعمل للزوار وقبل تحميل الصفحة)
            localStorage.setItem('appSettings', JSON.stringify(settings));
        };

        window.updateSetting = async function(key, value) {
            window.currentSettings[key] = value;
            window.applyAllSettings(window.currentSettings);

            // مزامنة مع Firebase إذا كان مسجلاً
            if (window.authInstance && window.authInstance.currentUser && !window.isGuest) {
                try { await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { [`settings.${key}`]: value }); } catch(e){}
            }
        };

        // تشغيل الإعدادات عند البداية
        window.applyAllSettings(window.currentSettings);

        /* =========================================
           نظام التحكم بالواجهة (UX)
           ========================================= */
        window.clearAuthInputs = function() {
            const form = document.getElementById('firebase-form'); if(form) form.reset();
            const err = document.getElementById('auth-error'); if(err) err.style.display = 'none';
        };

        function setFormType(type) { 
            window.currentFormMode = type; 
            document.getElementById('tab-login').classList.toggle('active', type === 'login'); 
            document.getElementById('tab-register').classList.toggle('active', type === 'register'); 
            document.getElementById('login-fields').style.display = type === 'login' ? 'block' : 'none'; 
            document.getElementById('register-fields').style.display = type === 'register' ? 'block' : 'none'; 
        }

        function toggleDropdown(dropdownId, triggerElement) {
            const isCurrentlyOpen = document.getElementById(dropdownId).classList.contains('show');
            document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show'));
            document.querySelectorAll('.header-icon-btn, .profile-trigger').forEach(t => t.classList.remove('active'));
            if (!isCurrentlyOpen) { document.getElementById(dropdownId).classList.add('show'); if(triggerElement) triggerElement.classList.add('active'); }
        }

        window.onclick = function(e) { 
            if (!e.target.closest('.header-icon-btn') && !e.target.closest('.profile-trigger') && !e.target.closest('.header-dropdown')) { 
                document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show')); 
                document.querySelectorAll('.header-icon-btn, .profile-trigger').forEach(t => t.classList.remove('active'));
            } 
        }
        
        function handleLogout() { 
            window.signOutFunc(window.authInstance).then(() => { 
                document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show'));
                window.currentUserData = null; window.clearAuthInputs(); 
                document.getElementById('auth-modal').classList.remove('hidden'); document.getElementById('app-shell').classList.remove('unlocked'); 
            }); 
        }

        function switchModalMode(mode) { if(mode === 'forms'){ document.getElementById('modal-welcome-view').style.display = 'none'; document.getElementById('modal-form-view').style.display = 'block'; } }
        
        function enterAsGuest() {
            window.isGuest = true; window.currentUserData = null;
            document.getElementById('header-name').innerText = window.i18n[window.currentLang].guest; 
            document.getElementById('dropdown-status-name').innerText = window.i18n[window.currentLang].unregistered;
            window.renderFriendsList('friends-container-desktop'); 
            document.getElementById('dropdown-content-area').innerHTML = `<button class="dropdown-item" onclick="window.clearAuthInputs(); document.getElementById('auth-modal').classList.remove('hidden'); toggleDropdown(''); switchModalMode('forms'); setFormType('login');"><i class="ph ph-sign-in"></i> <span data-i18n="login_tab">${window.i18n[window.currentLang].login_tab}</span></button>`;
            window.clearAuthInputs(); document.getElementById('auth-modal').classList.add('hidden'); document.getElementById('app-shell').classList.add('unlocked'); loadFragment('home', document.querySelector('.nav-btn.active'));
        }

        function closeAuthModal() { window.clearAuthInputs(); document.getElementById('auth-modal').classList.add('hidden'); document.getElementById('app-shell').classList.add('unlocked'); if(!window.isGuest) enterAsGuest(); }
        
        function loadFragment(pageName, element) {
            const contentHolder = document.getElementById('content-holder');
            const translationKey = `nav_${pageName === 'friends' ? 'friends' : pageName}`;
            
            // تحديث العناوين
            document.getElementById('page-title').innerText = window.i18n[window.currentLang][translationKey] || window.i18n[window.currentLang].friends;
            document.getElementById('mobile-section-name').innerText = window.i18n[window.currentLang][translationKey] || window.i18n[window.currentLang].friends;
            document.getElementById('page-title').setAttribute('data-i18n', translationKey);
            document.getElementById('mobile-section-name').setAttribute('data-i18n', translationKey);
            
            document.querySelectorAll('.nav-btn, .bottom-tab').forEach(btn => {
                btn.classList.remove('active'); const icon = btn.querySelector('i'); if(icon) icon.className = icon.className.replace('ph-fill', 'ph');
            });

            if(element) {
                element.classList.add('active'); const icon = element.querySelector('i'); if(icon) icon.className = icon.className.replace('ph', 'ph-fill');
                const isNav = element.classList.contains('nav-btn');
                const tabsList = isNav ? document.querySelectorAll('.nav-btn') : document.querySelectorAll('.bottom-tab');
                const targetList = isNav ? document.querySelectorAll('.bottom-tab') : document.querySelectorAll('.nav-btn');
                const index = Array.from(tabsList).indexOf(element);
                
                if(pageName === 'friends' && isNav === false) { }
                else if (pageName === 'store' && isNav === true) { const mob = document.querySelectorAll('.bottom-tab')[4]; if(mob) { mob.classList.add('active'); mob.querySelector('i').className = mob.querySelector('i').className.replace('ph', 'ph-fill'); } }
                else if (pageName === 'profile' && isNav === true) { const mob = document.querySelectorAll('.bottom-tab')[5]; if(mob) { mob.classList.add('active'); mob.querySelector('i').className = mob.querySelector('i').className.replace('ph', 'ph-fill'); } }
                else { const matchedTab = targetList[index]; if(matchedTab) { matchedTab.classList.add('active'); matchedTab.querySelector('i').className = matchedTab.querySelector('i').className.replace('ph', 'ph-fill'); } }
            }

            if (pageName === 'friends') {
                contentHolder.innerHTML = `<div id="mobile-friends-wrapper" style="max-width:400px; margin: 40px auto; display:flex; flex-direction:column; align-items:center; gap:20px;"></div>`;
                window.renderFriendsList('mobile-friends-wrapper');
            } else {
                contentHolder.innerHTML = `<div style="display:flex; justify-content:center; align-items:center; height:100%; color:var(--text-dim); font-size:1.2rem; font-weight:bold;">${window.i18n[window.currentLang][translationKey]} - جاهز للتصميم</div>`;
            }
        }
    </script>
</body>
</html>
