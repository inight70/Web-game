<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مستودع الخداع - اللوبي</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>

    <div id="global-loader"><div class="spinner"></div></div>

    <!-- نافذة المصادقة الزجاجية -->
    <div id="auth-modal" class="auth-overlay hidden">
        <div class="auth-card">
            <button class="close-modal-btn" onclick="closeAuthModal()"><i class="ph ph-x"></i></button>
            <div id="modal-welcome-view">
                <i class="ph ph-fingerprint" style="font-size: 38px; color: var(--accent-red); margin-bottom: 15px; display: inline-block;"></i>
                <h2>سجل دخولك</h2>
                <p>سجل دخولك الآن لتلعب، وتحفظ تقدمك، إحصائياتك السحابية.</p>
                <button class="btn-core" onclick="switchModalMode('forms')">تسجيل الدخول</button>
                <button class="link-guest" onclick="enterAsGuest()">المتابعة كزائر</button>
            </div>

            <div id="modal-form-view" style="display: none;">
                <div class="modal-tabs">
                    <button id="tab-login" class="modal-tab-btn active" onclick="setFormType('login')">تسجيل الدخول</button>
                    <button id="tab-register" class="modal-tab-btn" onclick="setFormType('register')">حساب جديد</button>
                </div>
                <div id="auth-error" class="auth-error-msg"></div>
                <form id="firebase-form" onsubmit="handleAuthSubmit(event)" autocomplete="off">
                    <div id="login-fields">
                        <div class="input-wrapper">
                            <label>البريد أو اسم المستخدم</label>
                            <input type="text" id="login-id" class="premium-input" placeholder="أدخل البيانات" autocomplete="off" required>
                        </div>
                        <div class="input-wrapper">
                            <label>كلمة المرور</label>
                            <input type="password" id="login-password" class="premium-input" placeholder="••••••••" autocomplete="new-password" required>
                        </div>
                    </div>
                    <div id="register-fields" style="display: none;">
                        <div class="input-wrapper">
                            <label>اسم المستخدم</label>
                            <input type="text" id="reg-username" class="premium-input" placeholder="مثال: DarkKnight">
                        </div>
                        <div class="input-wrapper">
                            <label>البريد الإلكتروني</label>
                            <input type="email" id="reg-email" class="premium-input" placeholder="name@example.com">
                        </div>
                        <div class="input-wrapper">
                            <label>كلمة المرور</label>
                            <input type="password" id="reg-password" class="premium-input" placeholder="••••••••">
                        </div>
                        <div class="input-wrapper">
                            <label>تأكيد كلمة المرور</label>
                            <input type="password" id="reg-confirm" class="premium-input" placeholder="••••••••">
                        </div>
                    </div>
                    <button type="submit" class="btn-core" id="modal-submit-btn" style="margin-top: 10px;">دخول</button>
                </form>
            </div>
        </div>
    </div>

    <!-- الهيكل الثلاثي الأبعاد (يمين: قائمة، وسط: محتوى، يسار: أصدقاء) -->
    <div id="app-shell" class="app-shell">
        
        <!-- 1. الشريط الجانبي الأساسي (أيقونات فقط) -->
        <aside class="sidebar-left">
            <div class="brand-logo">DECEP<br>TION</div>
            <div class="nav-menu">
                <button class="nav-btn active" onclick="loadFragment('home', this)"><i class="ph-fill ph-house"></i></button>
                <button class="nav-btn" onclick="loadFragment('play', this)"><i class="ph-fill ph-game-controller"></i></button>
                <button class="nav-btn" onclick="loadFragment('leaderboard', this)"><i class="ph-fill ph-trophy"></i></button>
                <button class="nav-btn" onclick="loadFragment('store', this)"><i class="ph-fill ph-storefront"></i></button>
                <button class="nav-btn" onclick="loadFragment('profile', this)"><i class="ph-fill ph-user"></i></button>
            </div>
            <div class="theme-wrapper">
                <button id="theme-light-btn" class="theme-btn-mini" onclick="setTheme('light')"><i class="ph-fill ph-sun"></i></button>
                <button id="theme-dark-btn" class="theme-btn-mini active" onclick="setTheme('dark')"><i class="ph-fill ph-moon"></i></button>
            </div>
        </aside>

        <!-- 2. منطقة المحتوى الأوسط -->
        <main class="main-viewport">
            <header class="top-header">
                <!-- أزرار أو تفاصيل خاصة باللعبة بدلاً من البحث -->
                <div class="header-actions-left">
                    <div class="action-chip"><i class="ph-fill ph-coin"></i> <span>1,200</span></div>
                    <div class="action-chip"><i class="ph-fill ph-star"></i> <span>مستوى 5</span></div>
                </div>

                <!-- ملف المستخدم الشخصي (مثل الصورة) -->
                <div style="position: relative;">
                    <div class="header-profile" onclick="toggleUserDropdown()">
                        <div class="profile-info">
                            <span class="profile-name" id="display-name">زائر</span>
                            <span class="profile-status" id="display-status"><span class="status-dot"></span> متصل</span>
                        </div>
                        <div class="profile-avatar" id="header-avatar">ز</div>
                        <i class="ph ph-caret-down" style="color: var(--text-secondary); margin-right: 8px;"></i>
                    </div>
                    
                    <div class="user-dropdown" id="user-dropdown">
                        <div class="dropdown-header">
                            <div class="dropdown-name" id="drop-name">زائر غير مسجل</div>
                            <div class="dropdown-stats">
                                <div class="stat-item"><span class="stat-label">المباريات</span><span class="stat-value" id="stat-matches">0</span></div>
                                <div class="stat-item"><span class="stat-label">الانتصارات</span><span class="stat-value" id="stat-wins">0</span></div>
                            </div>
                        </div>
                        <div id="dropdown-actions">
                            <!-- سيتم تعبئتها بالجافاسكريبت -->
                        </div>
                    </div>
                </div>
            </header>
            <div class="dynamic-content" id="content-holder"></div>
        </main>

        <!-- 3. قائمة الأصدقاء (الشريط الأيسر) مطابقة للصورة -->
        <aside class="sidebar-right">
            <div class="friends-header"><i class="ph-fill ph-users"></i></div>
            
            <div id="friends-container" class="friends-list">
                <!-- سيتم تعبئتها عبر الجافاسكريبت بناءً على حالة تسجيل الدخول -->
            </div>
        </aside>

        <!-- شريط الجوال (يظهر فقط في الشاشات الصغيرة) -->
        <nav class="bottom-bar">
            <button class="bottom-tab active" onclick="loadFragment('home', this)"><i class="ph-fill ph-house"></i></button>
            <button class="bottom-tab" onclick="loadFragment('play', this)"><i class="ph-fill ph-game-controller"></i></button>
            <button class="bottom-tab" onclick="loadFragment('leaderboard', this)"><i class="ph-fill ph-trophy"></i></button>
            <button class="bottom-tab" onclick="loadFragment('store', this)"><i class="ph-fill ph-storefront"></i></button>
            <button class="bottom-tab" onclick="loadFragment('profile', this)"><i class="ph-fill ph-user"></i></button>
        </nav>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLFj5UTX9EtuehoMWV02gkPsAgKPvMhzI",
            authDomain: "web-game-260b5.firebaseapp.com",
            projectId: "web-game-260b5",
            storageBucket: "web-game-260b5.firebasestorage.app",
            messagingSenderId: "682229509792",
            appId: "1:682229509792:web:11b4a404459630fcd6a3c5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        window.authInstance = auth; 
        window.dbInstance = db;
        window.updateDocFunc = updateDoc;
        window.docFunc = doc;
        window.signOutFunc = signOut;
        window.isGuest = false;
        window.currentFormMode = 'login'; 

        const hideLoader = () => {
            const loader = document.getElementById('global-loader');
            if(loader) { loader.style.opacity = '0'; setTimeout(() => loader.style.visibility = 'hidden', 500); }
        };

        // دالة تحديث واجهة الأصدقاء بناءً على الصورة
        function updateFriendsUI(isLoggedIn, hasFriends = false) {
            const container = document.getElementById('friends-container');
            if (!isLoggedIn) {
                container.innerHTML = `
                    <div class="friends-guest-state">
                        <i class="ph-fill ph-lock-key"></i>
                        <p>سجل دخولك<br>لترى الأصدقاء</p>
                    </div>`;
            } else {
                if (hasFriends) {
                    // هيكل مطابق للصورة (أيقونات دوائر متصلين) + زر إضافة بالنهاية
                    container.innerHTML = `
                        <div class="friend-avatar-wrapper">
                            <div class="friend-avatar online">A</div>
                            <div class="friend-status-badge"></div>
                        </div>
                        <div class="friend-avatar-wrapper">
                            <div class="friend-avatar">K</div>
                        </div>
                        <button class="btn-add-friend" title="إضافة صديق"><i class="ph ph-plus"></i></button>
                    `;
                } else {
                    // إذا لم يكن لديه أصدقاء، نعرض دائرة الإضافة فقط
                    container.innerHTML = `
                        <button class="btn-add-friend" title="إضافة صديق"><i class="ph ph-plus"></i></button>
                    `;
                }
            }
        }

        onAuthStateChanged(auth, async (user) => {
            const avatar = document.getElementById('header-avatar');
            const dName = document.getElementById('display-name');
            const dropName = document.getElementById('drop-name');
            const actions = document.getElementById('dropdown-actions');

            if (user) {
                window.isGuest = false;
                let displayName = user.email.split('@')[0];
                
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const data = userDoc.data();
                        displayName = data.username || displayName;
                        document.getElementById('stat-matches').innerText = data.matches || 0;
                        document.getElementById('stat-wins').innerText = data.wins || 0;
                        
                        let userTheme = 'dark';
                        if (data.settings && data.settings.theme) userTheme = data.settings.theme;
                        window.setTheme(userTheme, false);
                    }
                } catch (err) { console.warn("Error fetching profile", err); }

                dName.innerText = displayName;
                dropName.innerText = displayName;
                avatar.innerText = displayName.charAt(0).toUpperCase();
                
                actions.innerHTML = `
                    <button class="dropdown-item" onclick="loadFragment('profile', document.querySelectorAll('.nav-btn')[4]); toggleUserDropdown();"><i class="ph ph-user-circle"></i> الملف الشخصي</button>
                    <button class="dropdown-item logout" onclick="handleLogout()"><i class="ph ph-sign-out"></i> تسجيل الخروج</button>
                `;

                // بناء واجهة الأصدقاء للمسجل (نفترض حالياً أن لديه أصدقاء للعرض التجريبي)
                updateFriendsUI(true, true);

                document.getElementById('auth-modal').classList.add('hidden');
                document.getElementById('app-shell').classList.add('unlocked');
                window.loadFragment('home', document.querySelector('.nav-btn'));
                hideLoader();
            } else {
                if (!window.isGuest) {
                    document.getElementById('auth-modal').classList.remove('hidden');
                    document.getElementById('app-shell').classList.remove('unlocked');
                }
                hideLoader();
            }
        });

        // دوال المصادقة (اختصارها للحفاظ على المنطق كما هو)
        window.handleAuthSubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('modal-submit-btn');
            btn.innerText = "جاري التحقق..."; btn.disabled = true;
            try {
                if (window.currentFormMode === 'login') {
                    let id = document.getElementById('login-id').value.trim().toLowerCase();
                    let pass = document.getElementById('login-password').value;
                    let email = id;
                    if (!id.includes('@')) {
                        const q = query(collection(db, "users"), where("username_lower", "==", id));
                        const snap = await getDocs(q);
                        if (snap.empty) throw {message: "User not found"};
                        email = snap.docs[0].data().email;
                    }
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    // Logic Register
                    let userText = document.getElementById('reg-username').value.trim();
                    let emailText = document.getElementById('reg-email').value.trim().toLowerCase();
                    let passText = document.getElementById('reg-password').value;
                    if(passText !== document.getElementById('reg-confirm').value) throw {message: "كلمات المرور غير متطابقة"};
                    const q = query(collection(db, "users"), where("username_lower", "==", userText.toLowerCase()));
                    const snap = await getDocs(q);
                    if (!snap.empty) throw {message: "الاسم محجوز"};
                    const cred = await createUserWithEmailAndPassword(auth, emailText, passText);
                    await setDoc(doc(db, "users", cred.user.uid), { username: userText, username_lower: userText.toLowerCase(), email: emailText, matches: 0, wins: 0, settings: {theme: 'dark'}, createdAt: new Date().toISOString() });
                }
            } catch (err) {
                const errDiv = document.getElementById('auth-error');
                errDiv.innerText = "حدث خطأ في البيانات"; errDiv.style.display = 'block';
            } finally {
                btn.disabled = false; btn.innerText = "دخول";
            }
        }
    </script>

    <script>
        function toggleUserDropdown() { document.getElementById('user-dropdown').classList.toggle('show'); }
        window.onclick = e => { if (!e.target.closest('.header-profile') && !e.target.closest('.user-dropdown')) { document.getElementById('user-dropdown').classList.remove('show'); } }

        function switchModalMode(mode) {
            document.getElementById('modal-welcome-view').style.display = 'none';
            document.getElementById('modal-form-view').style.display = 'block';
        }

        function setFormType(type) {
            window.currentFormMode = type;
            document.getElementById('tab-login').classList.toggle('active', type === 'login');
            document.getElementById('tab-register').classList.toggle('active', type === 'register');
            document.getElementById('login-fields').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('register-fields').style.display = type === 'register' ? 'block' : 'none';
        }

        function enterAsGuest() {
            window.isGuest = true;
            document.getElementById('display-name').innerText = "زائر";
            document.getElementById('drop-name').innerText = "زائر غير مسجل";
            document.getElementById('header-avatar').innerText = "ز";
            document.getElementById('dropdown-actions').innerHTML = `<button class="dropdown-item" onclick="document.getElementById('auth-modal').classList.remove('hidden'); toggleUserDropdown();"><i class="ph ph-sign-in"></i> تسجيل الدخول</button>`;
            
            // تحديث واجهة الأصدقاء للزائر
            updateFriendsUI(false);

            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('app-shell').classList.add('unlocked');
            loadFragment('home', document.querySelector('.nav-btn'));
        }

        function closeAuthModal() {
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('app-shell').classList.add('unlocked');
            if(!window.isGuest) enterAsGuest();
        }

        function handleLogout() {
            setTheme('dark', false); // العودة للثيم الافتراضي
            window.signOutFunc(window.authInstance).then(() => {
                document.getElementById('auth-modal').classList.remove('hidden');
                document.getElementById('app-shell').classList.remove('unlocked');
                document.getElementById('user-dropdown').classList.remove('show');
            });
        }

        // دالة الثيم المتوافقة مع أزرار الشريط الجانبي
        async function setTheme(mode, updateServer = true) {
            const body = document.body;
            document.getElementById('theme-light-btn').classList.toggle('active', mode === 'light');
            document.getElementById('theme-dark-btn').classList.toggle('active', mode === 'dark');

            if (mode === 'light') { body.setAttribute('data-theme', 'light'); } 
            else { body.removeAttribute('data-theme'); }

            if (updateServer && window.authInstance && window.authInstance.currentUser && !window.isGuest) {
                try { await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { "settings.theme": mode }); } catch (e) {}
            }
        }

        function loadFragment(pageName, element) {
            const contentHolder = document.getElementById('content-holder');
            document.querySelectorAll('.nav-btn, .bottom-tab').forEach(btn => btn.classList.remove('active'));
            if(element) element.classList.add('active');

            if (pageName === 'profile' && window.isGuest) {
                contentHolder.innerHTML = `<div class="card-glass" style="text-align:center; padding: 40px;"><i class="ph-fill ph-lock-key" style="font-size: 40px; color: var(--text-secondary);"></i><h3 style="margin-top: 15px;">أنت زائر</h3><p style="color: var(--text-secondary); margin-top: 10px;">سجل دخولك لحفظ وتعديل بياناتك.</p></div>`; return;
            }
            fetch(pageName + '.html')
                .then(r => { if (!r.ok) throw new Error(); return r.text(); })
                .then(html => { contentHolder.innerHTML = html; })
                .catch(() => { contentHolder.innerHTML = `<div class="card-glass"><p style="color: var(--text-secondary);">ملف ${pageName}.html غير موجود.</p></div>`; });
        }
    </script>
</body>
</html>
