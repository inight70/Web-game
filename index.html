<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DECEPTION</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=8.0">
</head>
<body>

    <div id="global-loader"><div class="spinner"></div></div>

    <!-- بوابة المصادقة -->
    <div id="auth-modal" class="overlay-modal hidden">
        <div class="card-modal">
            <button class="close-modal-btn" onclick="closeAuthModal()"><i class="ph ph-x"></i></button>
            <div id="modal-welcome-view">
                <i class="ph-duotone ph-shield-check" style="font-size: 56px; color: var(--accent-red); margin-bottom: 20px; display: inline-block;"></i>
                <h2>النظام السحابي</h2>
                <p>سجل دخولك الآن لتتمكن من اللعب، حفظ تقدمك، والتفاعل مع الأصدقاء.</p>
                <button class="btn-core" onclick="switchModalMode('forms')">تسجيل الدخول</button>
                <button class="link-guest" onclick="enterAsGuest()">المتابعة كزائر</button>
            </div>
            <div id="modal-form-view" style="display: none;">
                <div class="modal-tabs">
                    <button id="tab-login" class="modal-tab-btn active" onclick="setFormType('login')">تسجيل الدخول</button>
                    <button id="tab-register" class="modal-tab-btn" onclick="setFormType('register')">حساب جديد</button>
                </div>
                <div id="auth-error" class="auth-error-msg"></div>
                <form id="firebase-form" onsubmit="handleAuthSubmit(event)" autocomplete="off">
                    <div id="login-fields">
                        <div class="input-wrapper"><label>المعرف (Email/Username)</label><input type="text" id="login-id" class="premium-input" required></div>
                        <div class="input-wrapper"><label>كلمة المرور</label><input type="password" id="login-password" class="premium-input" required></div>
                    </div>
                    <div id="register-fields" style="display: none;">
                        <div class="input-wrapper"><label>اسم المستخدم</label><input type="text" id="reg-username" class="premium-input"></div>
                        <div class="input-wrapper"><label>البريد الإلكتروني</label><input type="email" id="reg-email" class="premium-input"></div>
                        <div class="input-wrapper"><label>كلمة المرور</label><input type="password" id="reg-password" class="premium-input"></div>
                        <div class="input-wrapper"><label>تأكيد كلمة المرور</label><input type="password" id="reg-confirm" class="premium-input"></div>
                    </div>
                    <button type="submit" class="btn-core" id="modal-submit-btn">تأكيد الدخول</button>
                </form>
            </div>
        </div>
    </div>

    <!-- نافذة إضافة الأصدقاء الحقيقية -->
    <div id="friend-modal" class="overlay-modal hidden">
        <div class="card-modal">
            <button class="close-modal-btn" onclick="closeFriendModal()"><i class="ph ph-x"></i></button>
            <h2>إضافة صديق</h2>
            <p>ابحث عن صديقك بواسطة اسم المستخدم (Username) الخاص به.</p>
            <div class="input-wrapper">
                <input type="text" id="friend-search-input" class="premium-input" placeholder="اسم المستخدم (مثال: Player1)">
            </div>
            <div id="friend-search-msg" style="font-size: 13px; font-weight: 600; margin-bottom: 15px; text-align: center;"></div>
            <button class="btn-core" onclick="searchAndAddFriend()">بحث وإضافة</button>
        </div>
    </div>

    <!-- الهيكل الأساسي -->
    <div id="app-shell" class="app-shell">
        
        <aside class="sidebar">
            <!-- الشعار المودرن للكمبيوتر -->
            <div class="sidebar-logo">
                <div class="logo-mark">D</div>
                <div class="logo-text">DECEPTION</div>
            </div>
            <nav class="nav-menu">
                <!-- استخدام data-target لربط الكمبيوتر والجوال بدقة -->
                <button class="nav-btn active" data-target="home" onclick="loadFragment('home')"><i class="ph-fill ph-squares-four"></i></button>
                <button class="nav-btn" data-target="play" onclick="loadFragment('play')"><i class="ph ph-game-controller"></i></button>
                <button class="nav-btn" data-target="leaderboard" onclick="loadFragment('leaderboard')"><i class="ph ph-trophy"></i></button>
                <button class="nav-btn" data-target="store" onclick="loadFragment('store')"><i class="ph ph-storefront"></i></button>
                <button class="nav-btn" data-target="profile" onclick="loadFragment('profile')"><i class="ph ph-user"></i></button>
            </nav>
        </aside>

        <main class="main-viewport">
            <header class="top-header">
                
                <div class="header-page-info">
                    <!-- عنوان الكمبيوتر (أحمر) -->
                    <h1 class="page-title" id="page-title">الرئيسية</h1>
                    <!-- عنوان الجوال (ديناميكي وشعار يمين) -->
                    <div class="mobile-brand-title">
                        <span class="brand-name">DECEPTION</span>
                        <div class="mobile-section-name" id="mobile-section-name">الرئيسية</div>
                    </div>
                </div>

                <div class="header-actions">
                    <!-- قائمة الإعدادات المطورة (أزرار تعمل فعلياً) -->
                    <div style="position: relative;">
                        <button class="header-icon-btn" onclick="toggleDropdown('settings-dropdown', this)"><i class="ph ph-gear"></i></button>
                        <div class="header-dropdown" id="settings-dropdown">
                            <div class="dropdown-header"><div class="dropdown-name-ar">إعدادات النظام</div></div>
                            <div class="settings-group">
                                <label>حجم الواجهة</label>
                                <div class="setting-controls">
                                    <button class="setting-btn" id="btn-font-small" onclick="setFontSize('small')">صغير</button>
                                    <button class="setting-btn active" id="btn-font-default" onclick="setFontSize('default')">افتراضي</button>
                                    <button class="setting-btn" id="btn-font-large" onclick="setFontSize('large')">كبير</button>
                                </div>
                            </div>
                            <div class="settings-group">
                                <label>الرسوم المتحركة</label>
                                <div class="setting-controls">
                                    <button class="setting-btn active" id="btn-anim-on" onclick="setAnimation('on')">مفعل</button>
                                    <button class="setting-btn" id="btn-anim-off" onclick="setAnimation('off')">معطل</button>
                                </div>
                            </div>
                            <div class="settings-group mobile-only">
                                <label>المظهر (الجوال)</label>
                                <div class="setting-controls">
                                    <button class="setting-btn active" id="mini-theme-dark" onclick="toggleTheme('dark')">داكن</button>
                                    <button class="setting-btn" id="mini-theme-light" onclick="toggleTheme('light')">فاتح</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- التنبيهات (متوسطة وبدون نقطة حمراء) -->
                    <div style="position: relative;">
                        <button class="header-icon-btn" onclick="toggleDropdown('noti-dropdown', this)"><i class="ph ph-bell"></i></button>
                        <div class="header-dropdown" id="noti-dropdown">
                            <div class="dropdown-header"><div class="dropdown-name-ar">التنبيهات</div></div>
                            <div class="empty-state"><i class="ph-duotone ph-bell-slash"></i><span>لا يوجد تنبيهات حالياً</span></div>
                        </div>
                    </div>
                    
                    <div style="position: relative;">
                        <div class="profile-trigger" onclick="toggleDropdown('user-dropdown', this)">
                            <div class="profile-avatar-fallback" id="header-avatar-fallback">ز</div>
                            <div class="profile-info">
                                <span class="profile-name" id="header-name">زائر</span>
                                <span class="profile-status" id="header-status">غير مسجل</span>
                            </div>
                            <i class="ph-bold ph-caret-down"></i>
                        </div>
                        <div class="header-dropdown user-dropdown" id="user-dropdown"></div>
                    </div>
                </div>
            </header>
            
            <div class="dynamic-content" id="content-holder"></div>
        </main>

        <!-- الأصدقاء (كمبيوتر) -->
        <aside class="right-sidebar">
            <div id="friends-container"></div>
        </aside>

        <!-- شريط الجوال السفلي المطور (يحتوي قسم الأصدقاء والإنجازات) -->
        <nav class="bottom-bar">
            <button class="bottom-tab active" data-target="home" onclick="loadFragment('home')"><i class="ph-fill ph-squares-four"></i></button>
            <button class="bottom-tab" data-target="play" onclick="loadFragment('play')"><i class="ph ph-game-controller"></i></button>
            <button class="bottom-tab" data-target="leaderboard" onclick="loadFragment('leaderboard')"><i class="ph ph-medal"></i></button> <!-- الإنجازات -->
            <button class="bottom-tab" data-target="store" onclick="loadFragment('store')"><i class="ph ph-storefront"></i></button>
            <button class="bottom-tab mobile-only" data-target="friends-mobile" onclick="loadFragment('friends-mobile')"><i class="ph ph-users"></i></button> <!-- الأصدقاء للجوال -->
            <button class="bottom-tab" data-target="profile" onclick="loadFragment('profile')"><i class="ph ph-user"></i></button>
        </nav>
    </div>

    <!-- أكواد Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCLFj5UTX9EtuehoMWV02gkPsAgKPvMhzI", authDomain: "web-game-260b5.firebaseapp.com", projectId: "web-game-260b5", storageBucket: "web-game-260b5.firebasestorage.app", messagingSenderId: "682229509792", appId: "1:682229509792:web:11b4a404459630fcd6a3c5" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app); const db = getFirestore(app);
        
        window.authInstance = auth; window.dbInstance = db; window.signOutFunc = signOut; 
        window.updateDocFunc = updateDoc; window.docFunc = doc; window.arrayUnion = arrayUnion; window.arrayRemove = arrayRemove;
        window.isGuest = false; window.currentFormMode = 'login'; 

        const hideLoader = () => { const l = document.getElementById('global-loader'); if(l){ l.style.opacity = '0'; setTimeout(()=>l.style.visibility='hidden',400); } };

        // دالة عرض الأصدقاء بدقة (مع خيار الحذف)
        window.updateFriendsUI = function(isLoggedIn, friendsList = []) {
            const container = document.getElementById('friends-container');
            if (!isLoggedIn) {
                container.innerHTML = `<div class="guest-friends-msg"><i class="ph-duotone ph-user-circle-plus"></i><span>سجل دخولك لترى الأصدقاء</span></div>`;
            } else {
                let html = `<div class="friends-header">الأصدقاء</div>`;
                if (friendsList.length > 0) {
                    friendsList.forEach(f => {
                        html += `<div class="friend-avatar" title="حذف ${f.username}؟" onclick="removeFriend('${f.uid}', '${f.username}')"><div style="width:100%; height:100%; background:var(--surface-hover); border-radius:50%; display:flex; justify-content:center; align-items:center; font-weight:700; color:var(--text-main); font-size:16px;">${f.username.charAt(0).toUpperCase()}</div><div class="online-dot"></div></div>`;
                    });
                }
                html += `<button class="add-friend-btn" onclick="openFriendModal()"><i class="ph-bold ph-plus"></i></button>`;
                container.innerHTML = html;
            }
        };

        window.loadUserFriends = async function() {
            if(!auth.currentUser) return;
            try {
                const d = await getDoc(doc(db, "users", auth.currentUser.uid));
                if(d.exists()) { updateFriendsUI(true, d.data().friends || []); }
            } catch(e) {}
        }

        onAuthStateChanged(auth, async (user) => {
            const dropdown = document.getElementById('user-dropdown');
            const nameEl = document.getElementById('header-name');
            const statusEl = document.getElementById('header-status');
            const fallbackAvatar = document.getElementById('header-avatar-fallback');

            if (user) {
                window.isGuest = false;
                let displayName = user.email.split('@')[0]; let matches = 0, wins = 0; let userTheme = 'dark';
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) { 
                        const d = userDoc.data(); displayName = d.username || displayName; matches = d.matches || 0; wins = d.wins || 0; 
                        if (d.settings && d.settings.theme) userTheme = d.settings.theme;
                    }
                } catch (err) {}

                if(window.toggleTheme) window.toggleTheme(userTheme, true);

                fallbackAvatar.innerText = displayName.charAt(0).toUpperCase();
                nameEl.innerText = displayName;
                statusEl.innerText = "Online"; statusEl.style.color = "var(--accent-green)";

                dropdown.innerHTML = `
                    <div class="dropdown-header"><div class="dropdown-name-ar">${displayName}</div></div>
                    <div class="dropdown-stats">
                        <div class="stat-item"><span class="stat-label">المباريات</span><span class="stat-value">${matches}</span></div>
                        <div class="stat-item"><span class="stat-label">الانتصارات</span><span class="stat-value">${wins}</span></div>
                    </div>
                    <button class="dropdown-item" onclick="loadFragment('profile'); toggleDropdown('user-dropdown');"><i class="ph ph-user-circle"></i> الحساب</button>
                    <button class="dropdown-item logout" onclick="handleLogout()"><i class="ph ph-sign-out"></i> تسجيل خروج</button>
                `;

                window.loadUserFriends();
                if(window.clearAuthInputs) window.clearAuthInputs(); 
                document.getElementById('auth-modal').classList.add('hidden');
                document.getElementById('app-shell').classList.add('unlocked');
                loadFragment('home');
                hideLoader();
            } else {
                if (!window.isGuest) {
                    if(window.clearAuthInputs) window.clearAuthInputs(); 
                    document.getElementById('auth-modal').classList.remove('hidden');
                    document.getElementById('app-shell').classList.remove('unlocked');
                }
                hideLoader();
            }
        });

        // دالة إضافة الأصدقاء الفعالة
        window.searchAndAddFriend = async function() {
            const input = document.getElementById('friend-search-input').value.trim().toLowerCase();
            const msgDiv = document.getElementById('friend-search-msg');
            if(!input) return;
            msgDiv.innerText = "جاري البحث..."; msgDiv.style.color = "var(--text-dim)";
            try {
                const q = query(collection(db, "users"), where("username_lower", "==", input));
                const snap = await getDocs(q);
                if(snap.empty) { msgDiv.innerText = "لم يتم العثور على اللاعب."; msgDiv.style.color = "var(--accent-red)"; } 
                else {
                    const friendDoc = snap.docs[0]; const friendData = friendDoc.data();
                    if(friendDoc.id === auth.currentUser.uid) { msgDiv.innerText = "لا يمكنك إضافة نفسك!"; msgDiv.style.color = "var(--accent-red)"; return; }
                    await updateDoc(doc(db, "users", auth.currentUser.uid), { friends: window.arrayUnion({ uid: friendDoc.id, username: friendData.username }) });
                    msgDiv.innerText = "تمت إضافة " + friendData.username + " بنجاح!"; msgDiv.style.color = "var(--accent-green)";
                    document.getElementById('friend-search-input').value = "";
                    window.loadUserFriends(); setTimeout(closeFriendModal, 1500);
                }
            } catch(e) { msgDiv.innerText = "حدث خطأ أثناء الإضافة."; msgDiv.style.color = "var(--accent-red)"; }
        }

        // دالة حذف الصديق
        window.removeFriend = async function(uid, username) {
            if(confirm(`هل تريد بالتأكيد حذف ${username} من الأصدقاء؟`)) {
                try {
                    await updateDoc(doc(db, "users", auth.currentUser.uid), { friends: window.arrayRemove({ uid: uid, username: username }) });
                    window.loadUserFriends();
                } catch(e) { alert("حدث خطأ"); }
            }
        }

        window.handleAuthSubmit = async function(e) {
            e.preventDefault(); const errorDiv = document.getElementById('auth-error'); const btn = document.getElementById('modal-submit-btn');
            errorDiv.style.display = 'none'; btn.disabled = true; btn.innerText = "جاري التحقق...";
            try {
                if (window.currentFormMode === 'login') {
                    let id = document.getElementById('login-id').value.trim(); let pass = document.getElementById('login-password').value;
                    let email = id;
                    if (!id.includes('@')) {
                        const q = query(collection(db, "users"), where("username_lower", "==", id.toLowerCase()));
                        const snap = await getDocs(q);
                        if (snap.empty) throw { message: "البيانات غير صحيحة" };
                        email = snap.docs[0].data().email;
                    }
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const user = document.getElementById('reg-username').value.trim(); const email = document.getElementById('reg-email').value.trim();
                    const pass = document.getElementById('reg-password').value; const conf = document.getElementById('reg-confirm').value;
                    if (pass !== conf) throw { message: "كلمات المرور غير متطابقة" };
                    const q = query(collection(db, "users"), where("username_lower", "==", user.toLowerCase()));
                    const snap = await getDocs(q);
                    if (!snap.empty) throw { message: "اسم المستخدم محجوز" };
                    const cred = await createUserWithEmailAndPassword(auth, email.toLowerCase(), pass);
                    await setDoc(doc(db, "users", cred.user.uid), { username: user, username_lower: user.toLowerCase(), email: email.toLowerCase(), matches: 0, wins: 0, settings: { theme: 'dark' }, createdAt: new Date().toISOString() });
                }
            } catch (err) {
                let msg = err.message || "حدث خطأ غير معروف";
                if(msg.includes("invalid-credential")) msg = "البيانات غير صحيحة";
                if(msg.includes("email-already-in-use")) msg = "مستخدم مسبقاً";
                errorDiv.innerText = msg; errorDiv.style.display = 'block';
            } finally { btn.disabled = false; btn.innerText = window.currentFormMode === 'register' ? 'حساب جديد' : 'تسجيل الدخول'; }
        }
    </script>

    <script>
        // التحكم بالواجهات والإعدادات
        window.clearAuthInputs = function() {
            const form = document.getElementById('firebase-form'); if(form) form.reset();
            const errorDiv = document.getElementById('auth-error'); if(errorDiv) errorDiv.style.display = 'none';
        };

        window.toggleTheme = async function(mode, skipSave = false) {
            const body = document.body; 
            const dBtns = [document.getElementById('mini-theme-dark')]; const lBtns = [document.getElementById('mini-theme-light')];
            if (mode === 'light') { body.setAttribute('data-theme', 'light'); lBtns.forEach(b=>b?.classList.add('active')); dBtns.forEach(b=>b?.classList.remove('active')); } 
            else { body.removeAttribute('data-theme'); dBtns.forEach(b=>b?.classList.add('active')); lBtns.forEach(b=>b?.classList.remove('active')); }
            if (!skipSave && window.authInstance && window.authInstance.currentUser && !window.isGuest) {
                try { await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { "settings.theme": mode }); } catch (e) {}
            }
        };

        // تغيير حجم الخط
        function setFontSize(size) {
            document.body.classList.remove('font-small', 'font-large');
            ['small', 'default', 'large'].forEach(s => document.getElementById('btn-font-' + s).classList.remove('active'));
            if(size !== 'default') document.body.classList.add('font-' + size);
            document.getElementById('btn-font-' + size).classList.add('active');
        }

        // تغيير الرسوم المتحركة
        function setAnimation(state) {
            document.getElementById('btn-anim-on').classList.remove('active'); document.getElementById('btn-anim-off').classList.remove('active');
            if(state === 'off') { document.body.classList.add('no-animations'); document.getElementById('btn-anim-off').classList.add('active'); }
            else { document.body.classList.remove('no-animations'); document.getElementById('btn-anim-on').classList.add('active'); }
        }

        function setFormType(type) { 
            window.currentFormMode = type; 
            document.getElementById('tab-login').classList.toggle('active', type === 'login'); document.getElementById('tab-register').classList.toggle('active', type === 'register'); 
            document.getElementById('login-fields').style.display = type === 'login' ? 'block' : 'none'; document.getElementById('register-fields').style.display = type === 'register' ? 'block' : 'none'; 
            document.getElementById('login-id').required = type === 'login'; document.getElementById('login-password').required = type === 'login';
            document.getElementById('reg-username').required = type === 'register'; document.getElementById('reg-email').required = type === 'register'; document.getElementById('reg-password').required = type === 'register';
            document.getElementById('modal-submit-btn').innerText = type === 'register' ? 'حساب جديد' : 'تسجيل الدخول';
        }

        function toggleDropdown(dropdownId, triggerElement) {
            const target = document.getElementById(dropdownId); const isOpen = target.classList.contains('show');
            document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show'));
            if (!isOpen) target.classList.add('show');
        }

        window.onclick = function(e) { 
            if (!e.target.closest('.header-icon-btn') && !e.target.closest('.profile-trigger') && !e.target.closest('.header-dropdown')) { 
                document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show')); 
            } 
        }
        
        function handleLogout() { 
            window.signOutFunc(window.authInstance).then(() => { 
                document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show'));
                document.body.removeAttribute('data-theme'); window.clearAuthInputs(); 
                document.getElementById('auth-modal').classList.remove('hidden'); document.getElementById('app-shell').classList.remove('unlocked'); 
            }); 
        }

        function switchModalMode(mode) { if(mode === 'forms'){ document.getElementById('modal-welcome-view').style.display = 'none'; document.getElementById('modal-form-view').style.display = 'block'; } }
        
        function enterAsGuest() {
            window.isGuest = true;
            document.getElementById('header-name').innerText = "زائر"; document.getElementById('header-status').innerText = "غير مسجل"; document.getElementById('header-avatar-fallback').innerText = "ز";
            window.updateFriendsUI(false); 
            document.getElementById('user-dropdown').innerHTML = `<div class="dropdown-header"><div class="dropdown-name-ar" style="color:var(--text-dim);">زائر</div></div><button class="dropdown-item" onclick="window.clearAuthInputs(); document.getElementById('auth-modal').classList.remove('hidden'); toggleDropdown('user-dropdown'); switchModalMode('forms'); setFormType('login');"><i class="ph ph-sign-in"></i> تسجيل الدخول</button>`;
            window.clearAuthInputs(); document.getElementById('auth-modal').classList.add('hidden'); document.getElementById('app-shell').classList.add('unlocked'); loadFragment('home');
        }

        function closeAuthModal() { window.clearAuthInputs(); document.getElementById('auth-modal').classList.add('hidden'); document.getElementById('app-shell').classList.add('unlocked'); if(!window.isGuest) enterAsGuest(); }
        
        function openFriendModal() { document.getElementById('friend-modal').classList.remove('hidden'); document.getElementById('friend-search-msg').innerText = ""; }
        function closeFriendModal() { document.getElementById('friend-modal').classList.add('hidden'); }

        function loadFragment(targetName) {
            const contentHolder = document.getElementById('content-holder');
            const isMobile = window.innerWidth <= 900;
            
            // تخصيص الأسماء الديناميكية بناءً على الجهاز كما طلبت
            const titles = { 
                'home': 'الرئيسية', 'play': 'غرف اللعب', 
                'leaderboard': isMobile ? 'الإنجازات' : 'المتصدرون', // إنجازات في الجوال فقط
                'store': 'متجر المزايا', 'profile': 'الملف الشخصي',
                'friends-mobile': 'الأصدقاء'
            };
            
            document.getElementById('page-title').innerText = titles[targetName];
            document.getElementById('mobile-section-name').innerText = titles[targetName];
            
            // تغيير تظليل الأزرار عبر data-target
            document.querySelectorAll('.nav-btn, .bottom-tab').forEach(btn => {
                btn.classList.remove('active');
                const icon = btn.querySelector('i'); if(icon) icon.className = icon.className.replace('ph-fill', 'ph');
            });
            document.querySelectorAll(`[data-target="${targetName}"]`).forEach(btn => {
                btn.classList.add('active');
                const icon = btn.querySelector('i'); if(icon) icon.className = icon.className.replace('ph', 'ph-fill');
            });

            // رسالة برمجة مؤقتة للقسم
            contentHolder.innerHTML = `<div style="display:flex; justify-content:center; align-items:center; height:100%; color:var(--text-dim); font-weight: 700; font-size: 16px;">القسم جاهز للبرمجة (${titles[targetName]})</div>`;
        }
    </script>
</body>
</html>
