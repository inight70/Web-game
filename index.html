<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        
        body {
            /* خلفية تحاكي الإضاءة العميقة في الصورة */
            background: radial-gradient(circle at top left, #3b151d 0%, #11090b 50%, #000000 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* حاوية الكرت الأساسية */
        .hero-card {
            width: 320px;
            height: 450px;
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.8) 100%);
            border-radius: 40px;
            position: relative; /* مهم جداً لنجاح خدعة الطبقات */
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            /* لاحظ أننا لم نضع overflow: hidden لكي نسمح للشخصية بالبروز */
        }

        /* الشخصية المقصوصة (سر البعد الثلاثي) */
        .character-art {
            position: absolute;
            top: -60px; /* القيمة السالبة ترفع الصورة خارج الإطار */
            left: 50%;
            transform: translateX(-50%);
            width: 110%; /* أكبر من الكرت قليلاً */
            z-index: 10;
            pointer-events: none; /* عشان ما تخرب الضغط على الأزرار */
            filter: drop-shadow(0 20px 20px rgba(0,0,0,0.5)); /* ظل على الشخصية نفسها */
        }

        /* النصوص والأزرار أسفل الكرت */
        .content {
            position: relative;
            z-index: 20; /* يجب أن تكون فوق الشخصية */
            color: white;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 14px;
            color: #a09a9a;
            margin-bottom: 30px;
        }

        /* زر مشع */
        .action-btn {
            background: #d84545;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 15px 25px rgba(216, 69, 69, 0.4); /* ظل أحمر مشع */
            transition: 0.3s;
        }

        .action-btn:hover {
            transform: scale(0.95);
            box-shadow: 0 5px 10px rgba(216, 69, 69, 0.6);
        }

        /* أيقونة عائمة (Floating UI) */
        .floating-icon {
            position: absolute;
            right: -20px;
            top: 40%;
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            z-index: 30;
        }
    </style>
</head>
<body>

    <div class="hero-card">
        <!-- استخدمت صورة مقصوصة للتجربة لتوضيح الفكرة -->
        <img src="https://pngimg.com/d/fortnite_PNG90.png" alt="Character" class="character-art">
        
        <div class="floating-icon">🎯</div>

        <div class="content">
            <h1 class="title">Good evening,<br>Hero!</h1>
            <p class="subtitle">May your gaming exploits be legendary! 🎮✨</p>
            <button class="action-btn">Start</button>
        </div>
    </div>

</body>
</html>
