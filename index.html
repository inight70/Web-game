<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة مستودع الخداع - تصميم احترافي</title>
    <style>
        /* إعدادات الخلفية العامة */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body {
            background: radial-gradient(circle at top right, #1a233a 0%, #08090d 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* ستايل الكارد الزجاجي الفخم */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7);
            transition: transform 0.3s ease;
        }

        /* --- تصميم الكمبيوتر (Desktop) --- */
        @media (min-width: 1024px) {
            .auth-container {
                width: 100%;
                max-width: 650px;
                padding: 50px;
                margin-bottom: 50px;
            }
            .brand-title { font-size: 34px; letter-spacing: 2px; }
            .brand-subtitle { font-size: 16px; }
            .auth-buttons-container { display: flex; gap: 20px; }
            .auth-btn { flex: 1; padding: 18px; font-size: 18px; }
            
            /* شريط المربعات الأربعة السفلية */
            .bottom-panels-container {
                display: flex;
                gap: 20px;
                width: 100%;
                max-width: 900px;
            }
            .bottom-panel { flex: 1; padding: 25px; min-height: 150px; }
        }

        /* --- تصميم الجوال (Mobile) --- */
        @media (max-width: 1023px) {
            .auth-container {
                width: 100%;
                max-width: 400px;
                padding: 40px 25px;
                margin-bottom: 30px;
            }
            .brand-title { font-size: 28px; }
            .brand-subtitle { font-size: 14px; }
            .auth-buttons-container { display: flex; flex-direction: column; gap: 15px; }
            .auth-btn { width: 100%; padding: 16px; font-size: 16px; }
            
            /* المربعات الأربعة السفلية مرتبة عمودياً */
            .bottom-panels-container {
                display: flex;
                flex-direction: column;
                gap: 15px;
                width: 100%;
                max-width: 400px;
            }
            .bottom-panel { width: 100%; padding: 20px; min-height: 120px; }
        }

        /* --- ستايلات العناصر المشتركة --- */
        .brand-title {
            text-align: center; font-weight: 900; margin-bottom: 10px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .brand-subtitle { text-align: center; color: #8a99ad; margin-bottom: 40px; }

        /* الأزرار المضيئة */
        .auth-btn {
            border: none; color: white; font-weight: 700; border-radius: 16px; cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 198, 255, 0.3); transition: 0.3s ease; text-align: center;
        }
        .login-btn { background: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%); }
        .signup-btn { background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.1); color: #b4c6ef; }
        .signup-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: #00f2fe; color: white; }
        .auth-btn:active { transform: scale(0.98); }

        .forgot-password { text-align: center; color: #8a99ad; font-size: 13px; margin-top: 25px; cursor: pointer; display: block; }
        .forgot-password:hover { color: #00f2fe; text-decoration: underline; }

        /* ستايل المربعات السفلية */
        .bottom-panel {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .panel-icon { font-size: 32px; margin-bottom: 15px; }
        .panel-title { font-size: 16px; font-weight: 700; color: #ffffff; }
    </style>
</head>
<body>

    <div class="glass-panel auth-container">
        <div class="brand-title">مستودع الخداع</div>
        <div class="brand-subtitle">الجيل الجديد من ألعاب التحدي أونلاين</div>

        <div class="auth-buttons-container">
            <button class="auth-btn login-btn" onclick="goToAuthPage()">تسجيل الدخول</button>
            <button class="auth-btn signup-btn" onclick="goToAuthPage()">حساب جديد</button>
        </div>

        <span class="forgot-password">نسيت كلمة المرور؟</span>
    </div>

    <div class="bottom-panels-container">
        <div class="glass-panel bottom-panel">
            <div class="panel-icon">📢</div>
            <div class="panel-title">آخر الأخبار</div>
        </div>
        <div class="glass-panel bottom-panel">
            <div class="panel-icon">🛒</div>
            <div class="panel-title">المتجر</div>
        </div>
        <div class="glass-panel bottom-panel">
            <div class="panel-icon">👥</div>
            <div class="panel-title">المجتمع</div>
        </div>
        <div class="glass-panel bottom-panel">
            <div class="panel-icon">⚙️</div>
            <div class="panel-title">الإعدادات</div>
        </div>
    </div>

    <script type="module">
        // وظيفة التوجيه لصفحة اللعب بعد ثانية ونصف
        window.goToAuthPage = function() {
            window.location.href = 'auth.html';
        };
    </script>
</body>
</html>
