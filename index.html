<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مستودع الخداع - اللوبي</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* =========================================
           المتغيرات العالمية
           ========================================= */
        :root {
            --bg-base: #000000;
            --surface-panel: #09090b;
            --border-line: #1e1e20;
            --text-main: #ffffff;
            --text-dim: #71717a;
            --glass-bg: rgba(0, 0, 0, 0.85);
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --accent-color: #ffffff;
        }

        [data-theme="light"] {
            --bg-base: #f4f4f5;
            --surface-panel: #ffffff;
            --border-line: #e4e4e7;
            --text-main: #09090b;
            --text-dim: #a1a1aa;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --accent-color: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-stack); -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-base); color: var(--text-main); min-height: 100vh; display: flex; overflow: hidden; transition: 0.3s; }

        /* =========================================
           النافذة الزجاجية لتسجيل الدخول
           ========================================= */
        .auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--glass-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            display: flex; justify-content: center; align-items: center; z-index: 100000;
            transition: 0.4s;
        }
        .auth-overlay.hidden { opacity: 0; visibility: hidden; }
        .auth-card {
            background-color: var(--surface-panel); border: 1px solid var(--border-line);
            border-radius: 24px; padding: 40px 30px; width: 90%; max-width: 400px; text-align: center;
            position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }
        .close-modal-btn { position: absolute; top: 20px; left: 20px; background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; }
        .auth-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
        .auth-card p { color: var(--text-dim); font-size: 13.5px; margin-bottom: 30px; line-height: 1.6; }
        
        .btn-core { background-color: var(--accent-color); color: var(--bg-base); border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; }
        .link-guest { display: inline-block; margin-top: 18px; color: var(--text-dim); font-size: 13px; text-decoration: none; background: none; border: none; cursor: pointer; font-weight: 500; }
        
        .modal-tabs { display: flex; border-bottom: 1px solid var(--border-line); margin-bottom: 25px; }
        .modal-tab-btn { flex: 1; padding: 12px; background: none; border: none; color: var(--text-dim); font-weight: 600; font-size: 14px; cursor: pointer; }
        .modal-tab-btn.active { color: var(--text-main); border-bottom: 2px solid var(--text-main); }

        .input-wrapper { margin-bottom: 16px; text-align: right; }
        .input-wrapper label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; padding-right: 4px; }
        .premium-input { width: 100%; padding: 14px; background-color: var(--bg-base); border: 1px solid var(--border-line); border-radius: 10px; color: var(--text-main); font-size: 14px; outline: none; text-transform: lowercase; }
        .auth-error-msg { color: #ff4b4b; font-size: 12px; margin-bottom: 15px; text-align: center; display: none; }

        /* =========================================
           الهيكل الرئيسي (اللوبي)
           ========================================= */
        .app-shell { display: flex; width: 100%; height: 100vh; filter: blur(15px); pointer-events: none; transition: 0.5s; }
        .app-shell.unlocked { filter: blur(0); pointer-events: auto; }

        .sidebar { width: 250px; background-color: var(--bg-base); border-left: 1px solid var(--border-line); padding: 40px 20px; display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
        .sidebar-brand { font-size: 13px; font-weight: 700; letter-spacing: 2.5px; margin-bottom: 40px; padding-right: 12px; }
        .nav-btn { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 10px; color: var(--text-dim); background: none; border: none; font-size: 15px; font-weight: 500; cursor: pointer; text-align: right; width: 100%; }
        .nav-btn:hover, .nav-btn.active { background-color: var(--surface-panel); color: var(--text-main); }

        .main-viewport { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; }
        .top-header { height: 75px; border-bottom: 1px solid var(--border-line); display: flex; justify-content: space-between; align-items: center; padding: 0 40px; }
        .header-title { font-size: 18px; font-weight: 600; }
        
        .header-actions { display: flex; align-items: center; gap: 20px; position: relative; }
        .theme-btn { background: none; border: none; color: var(--text-main); font-size: 22px; cursor: pointer; }

        /* =========================================
           نظام الأفتار والقائمة المنسدلة الجديد
           ========================================= */
        .user-menu-container { position: relative; display: flex; align-items: center; gap: 10px; }
        
        /* الدائرة الخاصة بالأفتار */
        .avatar-circle {
            width: 38px; height: 38px; border-radius: 50%; background-color: var(--surface-panel);
            border: 1px solid var(--border-line); display: flex; justify-content: center; align-items: center;
            font-weight: 700; font-size: 16px; cursor: pointer; background-size: cover; background-position: center;
            text-transform: uppercase; color: var(--text-main); transition: 0.2s;
        }
        .avatar-circle:hover { border-color: var(--text-dim); }

        /* القائمة المنسدلة */
        .dropdown-menu {
            position: absolute; top: 50px; left: 0; width: 220px; background-color: var(--surface-panel);
            border: 1px solid var(--border-line); border-radius: 14px; padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); opacity: 0; visibility: hidden;
            transform: translateY(-10px); transition: 0.2s; z-index: 1000;
        }
        .dropdown-menu.active { opacity: 1; visibility: visible; transform: translateY(0); }
        
        .dropdown-header { border-bottom: 1px solid var(--border-line); padding-bottom: 10px; margin-bottom: 10px; }
        .dropdown-username { font-weight: 700; font-size: 15px; color: var(--text-main); }
        .dropdown-role { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

        .dropdown-stats { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .stat-item { text-align: center; }
        .stat-value { font-weight: 700; font-size: 16px; color: var(--text-main); }
        .stat-label { font-size: 10px; color: var(--text-dim); }

        .dropdown-action {
            display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px;
            background: none; border: none; color: var(--text-dim); font-size: 13px; font-weight: 500;
            border-radius: 8px; cursor: pointer; transition: 0.2s; text-align: right;
        }
        .dropdown-action:hover { background-color: var(--bg-base); color: var(--text-main); }
        .dropdown-action.danger:hover { color: #ff4b4b; }

        /* إخفاء زر رفع الصورة (يعمل عند الضغط على الأفتار) */
        #avatar-upload-input { display: none; }

        /* ========================================= */

        .dynamic-content { flex-grow: 1; overflow-y: auto; padding: 40px; width: 100%; max-width: 1100px; margin: 0 auto; }
        .bottom-bar { display: none; }

        @media (max-width: 900px) {
            .sidebar { display: none; } .top-header { padding: 0 24px; } .dynamic-content { padding: 24px 20px 130px 20px; }
            .dropdown-menu { left: auto; right: 0; } /* ضبط القائمة في الجوال */
            .bottom-bar {
                display: flex; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
                width: calc(100% - 40px); max-width: 450px; height: 66px; background: var(--glass-bg);
                backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--border-line);
                border-radius: 33px; justify-content: space-around; align-items: center; padding: 0 10px; z-index: 9999;
            }
            .bottom-tab { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; height: 100%; flex: 1; }
            .bottom-tab i { font-size: 22px; } .bottom-tab span { font-size: 9px; font-weight: 500; margin-top: 3px; } .bottom-tab.active { color: var(--text-main); }
        }
    </style>
</head>
<body>

    <div id="auth-modal" class="auth-overlay">
        <div class="auth-card">
            <button class="close-modal-btn" onclick="closeAuthModal()"><i class="ph ph-x"></i></button>
            
            <div id="modal-welcome-view">
                <i class="ph ph-user-focus" style="font-size: 38px; margin-bottom: 15px; display: inline-block;"></i>
                <h2>سجل دخولك</h2>
                <p>سجل دخولك الآن لتلعب، وتحفظ تقدمك، إحصائياتك، وإعداداتك السحابية بشكل آمن.</p>
                <button class="btn-core" onclick="switchModalMode('forms')">تسجيل الدخول</button>
                <button class="link-guest" onclick="enterAsGuest()">المتابعة كزائر</button>
            </div>

            <div id="modal-form-view" style="display: none;">
                <div class="modal-tabs">
                    <button id="tab-login" class="modal-tab-btn active" onclick="setFormType('login')">تسجيل الدخول</button>
                    <button id="tab-register" class="modal-tab-btn" onclick="setFormType('register')">حساب جديد</button>
                </div>
                
                <div id="auth-error" class="auth-error-msg"></div>

                <form id="firebase-form" onsubmit="handleAuthSubmit(event)">
                    <div class="input-wrapper">
                        <label>اسم المستخدم (يجب أن يكون باللغة الإنجليزية وبدون مسافات)</label>
                        <input type="text" id="input-username" class="premium-input" placeholder="مثال: Ninja" required pattern="[A-Za-z0-9_]+" title="أحرف إنجليزية وأرقام فقط">
                    </div>

                    <div class="input-wrapper">
                        <label>كلمة المرور</label>
                        <input type="password" id="input-password" class="premium-input" placeholder="••••••••" required minlength="6">
                    </div>

                    <div class="input-wrapper" id="wrapper-confirm" style="display: none;">
                        <label>تأكيد كلمة المرور</label>
                        <input type="password" id="input-confirm" class="premium-input" placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn-core" id="modal-submit-btn" style="margin-top: 10px;">دخول</button>
                </form>
            </div>
        </div>
    </div>

    <div id="app-shell" class="app-shell">
        
        <aside class="sidebar">
            <div class="sidebar-brand">DECEPTION.SYS</div>
            <button class="nav-btn active" onclick="loadFragment('home', this)"><i class="ph ph-house"></i> الرئيسية</button>
            <button class="nav-btn" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i> اللعب</button>
            <button class="nav-btn" onclick="loadFragment('leaderboard', this)"><i class="ph ph-trophy"></i> المتصدرون</button>
            <button class="nav-btn" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i> المتجر</button>
            <button class="nav-btn" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i> الحساب</button>
        </aside>

        <main class="main-viewport">
            <header class="top-header">
                <div class="header-title" id="page-title">الرئيسية</div>
                <div class="header-actions">
                    <button class="theme-btn" onclick="toggleTheme()"><i id="theme-icon" class="ph ph-sun"></i></button>
                    
                    <div class="user-menu-container">
                        <div class="avatar-circle" id="header-avatar" onclick="toggleDropdown()" title="اضغط لفتح القائمة أو تغيير الصورة">؟</div>
                        
                        <input type="file" id="avatar-upload-input" accept="image/*">
                        
                        <div class="dropdown-menu" id="user-dropdown">
                            <div class="dropdown-header">
                                <div class="dropdown-username" id="drop-username">زائر</div>
                                <div class="dropdown-role">محقق مبتدئ</div>
                            </div>
                            <div class="dropdown-stats">
                                <div class="stat-item">
                                    <div class="stat-value">0</div>
                                    <div class="stat-label">الأقيام</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-value">0</div>
                                    <div class="stat-label">الانتصارات</div>
                                </div>
                            </div>
                            <button class="dropdown-action" onclick="document.getElementById('avatar-upload-input').click()">
                                <i class="ph ph-image"></i> تغيير الأفتار
                            </button>
                            <button class="dropdown-action" onclick="loadFragment('profile', null); toggleDropdown()">
                                <i class="ph ph-user"></i> الملف الشخصي
                            </button>
                            <button class="dropdown-action danger" onclick="logoutSystem()" id="btn-logout" style="display:none;">
                                <i class="ph ph-sign-out"></i> تسجيل الخروج
                            </button>
                        </div>
                    </div>

                </div>
            </header>

            <div class="dynamic-content" id="content-holder"></div>
        </main>

        <nav class="bottom-bar">
            <button class="bottom-tab active" onclick="loadFragment('home', this)"><i class="ph ph-house"></i><span>الرئيسية</span></button>
            <button class="bottom-tab" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i><span>اللعب</span></button>
            <button class="bottom-tab" onclick="loadFragment('leaderboard', this)"><i class="ph ph-trophy"></i><span>المتصدرون</span></button>
            <button class="bottom-tab" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i><span>المتجر</span></button>
            <button class="bottom-tab" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i><span>الحساب</span></button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // ============================================
        // ⚠️ هام: ضع مفاتيح مشروعك هنا بدلاً من هذه ⚠️
        // ============================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.firebasestorage.app",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.isGuest = false;
        window.currentFormMode = 'login'; 

        // تحديث الواجهة بناءً على حالة تسجيل الدخول
        onAuthStateChanged(auth, (user) => {
            const avatar = document.getElementById('header-avatar');
            const dropUsername = document.getElementById('drop-username');
            const logoutBtn = document.getElementById('btn-logout');

            if (user) {
                window.isGuest = false;
                const actualUsername = user.displayName || user.email.split('@')[0]; // استخراج الاسم
                
                dropUsername.innerText = actualUsername;
                logoutBtn.style.display = 'flex';
                
                // استرجاع الأفتار المحفوظ أو وضع الحرف الأول
                const savedAvatar = localStorage.getItem('avatar_' + actualUsername);
                if(savedAvatar) {
                    avatar.style.backgroundImage = `url(${savedAvatar})`;
                    avatar.innerText = '';
                } else {
                    avatar.style.backgroundImage = 'none';
                    avatar.innerText = actualUsername.charAt(0).toUpperCase();
                }

                document.getElementById('auth-modal').classList.add('hidden');
                document.getElementById('app-shell').classList.add('unlocked');
                window.loadFragment('home', document.querySelector('.nav-btn'));
            } else {
                if (!window.isGuest) {
                    avatar.innerText = '؟';
                    avatar.style.backgroundImage = 'none';
                    dropUsername.innerText = 'زائر';
                    logoutBtn.style.display = 'none';
                    
                    document.getElementById('auth-modal').classList.remove('hidden');
                    document.getElementById('app-shell').classList.remove('unlocked');
                }
            }
        });

        // تقديم فورم الدخول (بخدعة الدومين الوهمي)
        window.handleAuthSubmit = async function(e) {
            e.preventDefault();
            const usernameInput = document.getElementById('input-username').value.trim().toLowerCase();
            const password = document.getElementById('input-password').value;
            const errorDiv = document.getElementById('auth-error');
            errorDiv.style.display = 'none';

            // الخدعة: تحويل الاسم إلى إيميل مخفي ليعمل مع فايربيس ويمنع التكرار
            const fakeEmail = usernameInput + "@deception.sys";

            try {
                if (window.currentFormMode === 'login') {
                    await signInWithEmailAndPassword(auth, fakeEmail, password);
                } else {
                    const confirmPass = document.getElementById('input-confirm').value;
                    if (password !== confirmPass) throw { message: "كلمات المرور غير متطابقة." };
                    
                    const userCredential = await createUserWithEmailAndPassword(auth, fakeEmail, password);
                    // حفظ اسم المستخدم الحقيقي في بروفايل فايربيس
                    await updateProfile(userCredential.user, { displayName: usernameInput });
                }
            } catch (error) {
                if(error.message.includes("email-already-in-use")) {
                    errorDiv.innerText = "اسم المستخدم هذا محجوز مسبقاً، اختر اسماً آخر.";
                } else if(error.message.includes("credential")) {
                    errorDiv.innerText = "اسم المستخدم أو كلمة المرور غير صحيحة.";
                } else {
                    errorDiv.innerText = error.message;
                }
                errorDiv.style.display = 'block';
            }
        }

        // وظيفة تسجيل الخروج
        window.logoutSystem = function() {
            signOut(auth).then(() => {
                document.getElementById('user-dropdown').classList.remove('active');
            });
        }
    </script>

    <script>
        // إظهار وإخفاء القائمة المنسدلة
        function toggleDropdown() {
            document.getElementById('user-dropdown').classList.toggle('active');
        }
        
        // إخفاء القائمة إذا ضغط اللاعب في أي مكان آخر بالشاشة
        document.addEventListener('click', function(event) {
            const container = document.querySelector('.user-menu-container');
            if (!container.contains(event.target)) {
                document.getElementById('user-dropdown').classList.remove('active');
            }
        });

        // نظام رفع الأفتار برمجياً وحفظه محلياً
        document.getElementById('avatar-upload-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Image = e.target.result;
                    const avatar = document.getElementById('header-avatar');
                    const username = document.getElementById('drop-username').innerText;
                    
                    avatar.style.backgroundImage = `url(${base64Image})`;
                    avatar.innerText = ''; // إخفاء الحرف
                    
                    // حفظ الصورة في الذاكرة المحلية للجهاز بناءً على اسم المستخدم
                    localStorage.setItem('avatar_' + username, base64Image);
                    document.getElementById('user-dropdown').classList.remove('active');
                }
                reader.readAsDataURL(file);
            }
        });

        // دوال النافذة الزجاجية والثيم
        function switchModalMode(mode) {
            if(mode === 'forms') { document.getElementById('modal-welcome-view').style.display = 'none'; document.getElementById('modal-form-view').style.display = 'block'; }
        }
        function setFormType(type) {
            window.currentFormMode = type;
            document.getElementById('tab-login').classList.toggle('active', type === 'login');
            document.getElementById('tab-register').classList.toggle('active', type === 'register');
            document.getElementById('wrapper-confirm').style.display = type === 'register' ? 'block' : 'none';
            document.getElementById('modal-submit-btn').innerText = type === 'register' ? 'إنشاء الحساب' : 'دخول';
        }
        function enterAsGuest() {
            window.isGuest = true;
            document.getElementById('drop-username').innerText = "زائر";
            document.getElementById('header-avatar').innerText = "؟";
            document.getElementById('header-avatar').style.backgroundImage = 'none';
            document.getElementById('btn-logout').style.display = 'none';
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('app-shell').classList.add('unlocked');
            loadFragment('home', document.querySelector('.nav-btn'));
        }
        function closeAuthModal() {
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('app-shell').classList.add('unlocked');
            if(!window.isGuest && document.getElementById('drop-username').innerText === 'زائر') window.isGuest = true;
        }
        function toggleTheme() {
            const body = document.body; const icon = document.getElementById('theme-icon');
            if (body.getAttribute('data-theme') === 'light') { body.removeAttribute('data-theme'); icon.className = 'ph ph-sun'; } 
            else { body.setAttribute('data-theme', 'light'); icon.className = 'ph ph-moon'; }
        }

        // محرك الأقسام
        window.loadFragment = function(pageName, element) {
            const contentHolder = document.getElementById('content-holder');
            const titles = { 'home': 'الرئيسية', 'play': 'غرف اللعب', 'leaderboard': 'المتصدرون', 'store': 'متجر المزايا', 'profile': 'إعدادات الحساب' };
            
            document.getElementById('page-title').innerText = titles[pageName];
            document.querySelectorAll('.nav-btn, .bottom-tab').forEach(btn => btn.classList.remove('active'));
            if(element) element.classList.add('active');

            if (pageName === 'profile' && window.isGuest) {
                contentHolder.innerHTML = `
                    <div style="padding: 40px; border: 1px solid var(--border-line); background-color: var(--surface-panel); border-radius: 20px; text-align: center; max-width: 500px; margin: 40px auto;">
                        <i class="ph ph-user-circle-plus" style="font-size: 40px; margin-bottom: 15px; color: var(--text-dim);"></i>
                        <h3 style="font-size: 18px; margin-bottom: 10px;">أنت تتصفح كزائر</h3>
                        <p style="color: var(--text-dim); font-size: 13.5px; margin-bottom: 25px; line-height: 1.6;">قسم الحساب مخصص للاعبين المسجلين. أنشئ حسابك الآن.</p>
                        <button class="btn-core" style="max-width: 200px; margin: 0 auto; display: block;" onclick="document.getElementById('auth-modal').classList.remove('hidden'); switchModalMode('forms');">سجل دخولك الآن</button>
                    </div>`;
                return;
            }

            fetch(pageName + '.html')
                .then(response => { if (!response.ok) throw new Error(); return response.text(); })
                .then(html => { contentHolder.innerHTML = html; })
                .catch(() => {
                    contentHolder.innerHTML = `<div style="padding: 40px; border: 1px dashed var(--border-line); border-radius: 16px; text-align: center;"><p style="color: var(--text-dim);">ملف ${pageName}.html غير موجود بعد.</p></div>`;
                });
        }
    </script>
</body>
</html>
