<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Deception</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=9.0">
</head>
<body>

    <div id="global-loader"><div class="spinner"></div></div>

    <!-- نوافذ المصادقة والأصدقاء -->
    <div id="auth-modal" class="auth-overlay hidden">
        <div class="auth-card">
            <button class="close-modal-btn" onclick="closeAuthModal()"><i class="ph ph-x"></i></button>
            <div id="modal-welcome-view">
                <i class="ph-duotone ph-shield-check" style="font-size: 3.5rem; color: var(--accent-red); margin-bottom: 20px; display: inline-block;"></i>
                <h2 data-i18n="login_title">النظام السحابي</h2>
                <p data-i18n="login_desc">سجل دخولك الآن لتتمكن من اللعب، حفظ تقدمك، والتفاعل مع الأصدقاء.</p>
                <button class="btn-core" onclick="switchModalMode('forms')" data-i18n="login_btn">تسجيل الدخول</button>
                <button class="link-guest" onclick="enterAsGuest()" data-i18n="guest_btn">المتابعة كزائر</button>
            </div>
            <div id="modal-form-view" style="display: none;">
                <div class="modal-tabs">
                    <button id="tab-login" class="modal-tab-btn active" onclick="setFormType('login')" data-i18n="login_btn">تسجيل الدخول</button>
                    <button id="tab-register" class="modal-tab-btn" onclick="setFormType('register')" data-i18n="register_btn">حساب جديد</button>
                </div>
                <div id="auth-error" class="auth-error-msg"></div>
                <form id="firebase-form" onsubmit="handleAuthSubmit(event)" autocomplete="off">
                    <div id="login-fields">
                        <div class="input-wrapper"><label data-i18n="id_label">المعرف (Email/Username)</label><input type="text" id="login-id" class="premium-input" required autocomplete="off"></div>
                        <div class="input-wrapper"><label data-i18n="pass_label">كلمة المرور</label><input type="password" id="login-password" class="premium-input" placeholder="••••••••" required autocomplete="new-password"></div>
                    </div>
                    <div id="register-fields" style="display: none;">
                        <div class="input-wrapper"><label data-i18n="user_label">اسم المستخدم</label><input type="text" id="reg-username" class="premium-input" autocomplete="off"></div>
                        <div class="input-wrapper"><label data-i18n="email_label">البريد الإلكتروني</label><input type="email" id="reg-email" class="premium-input" autocomplete="off"></div>
                        <div class="input-wrapper"><label data-i18n="pass_label">كلمة المرور</label><input type="password" id="reg-password" class="premium-input" placeholder="••••••••" autocomplete="new-password"></div>
                        <div class="input-wrapper"><label data-i18n="confirm_label">تأكيد كلمة المرور</label><input type="password" id="reg-confirm" class="premium-input" placeholder="••••••••" autocomplete="new-password"></div>
                    </div>
                    <button type="submit" class="btn-core" id="modal-submit-btn" data-i18n="login_btn">تسجيل الدخول</button>
                </form>
            </div>
        </div>
    </div>

    <div id="add-friend-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <button class="close-modal-btn" onclick="closeFriendModal('add-friend-modal')"><i class="ph ph-x"></i></button>
            <h2 data-i18n="add_friend">إضافة صديق</h2>
            <p data-i18n="add_friend_desc">أدخل اسم المستخدم الخاص بصديقك لإرسال طلب صداقة.</p>
            <div id="friend-error" class="auth-error-msg"></div>
            <div class="input-wrapper"><input type="text" id="search-friend-input" class="premium-input" autocomplete="off"></div>
            <button class="btn-core" onclick="sendFriendRequest()" data-i18n="send_req">إرسال الطلب</button>
        </div>
    </div>

    <div id="remove-friend-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <button class="close-modal-btn" onclick="closeFriendModal('remove-friend-modal')"><i class="ph ph-x"></i></button>
            <h2 data-i18n="rem_friend">حذف صديق</h2>
            <p><span data-i18n="rem_confirm">هل أنت متأكد أنك تريد حذف</span> <strong id="remove-friend-name"></strong>؟</p>
            <button class="btn-core" style="background: var(--surface-hover); color: var(--text-main); margin-bottom: 10px;" onclick="closeFriendModal('remove-friend-modal')" data-i18n="cancel">إلغاء</button>
            <button class="btn-core" onclick="confirmRemoveFriend()" data-i18n="confirm_del">تأكيد الحذف</button>
        </div>
    </div>

    <!-- الهيكل الأساسي -->
    <div id="app-shell" class="app-shell">
        
        <aside class="sidebar">
            <!-- شعار الكمبيوتر سطر واحد -->
            <div class="sidebar-logo">Deception</div>
            <nav class="nav-menu">
                <button class="nav-btn active" onclick="loadFragment('home', this)"><i class="ph-fill ph-squares-four"></i></button>
                <button class="nav-btn" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i></button>
                <button class="nav-btn" onclick="loadFragment('achievements', this)"><i class="ph ph-medal"></i></button>
                <button class="nav-btn" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i></button>
                <button class="nav-btn" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i></button>
            </nav>
            <div class="theme-wrapper">
                <button id="btn-theme-dark" class="theme-btn active-theme" onclick="toggleTheme('dark')"><i class="ph-fill ph-moon"></i></button>
                <button id="btn-theme-light" class="theme-btn" onclick="toggleTheme('light')"><i class="ph-fill ph-sun"></i></button>
            </div>
        </aside>

        <main class="main-viewport">
            <header class="top-header">
                
                <div class="header-page-info">
                    <h1 class="page-title" id="page-title" data-i18n="home">الرئيسية</h1>
                    <div class="mobile-brand-title">
                        <span class="brand-name">Decep<br>tion</span>
                        <div class="mobile-section-name" id="mobile-section-name" data-i18n="home">الرئيسية</div>
                    </div>
                </div>

                <div class="header-actions">
                    
                    <div style="position: relative;">
                        <button class="header-icon-btn" id="settings-trigger" onclick="toggleDropdown('settings-dropdown', this)"><i class="ph ph-gear"></i></button>
                        <div class="header-dropdown" id="settings-dropdown">
                            <div class="dropdown-header" data-i18n="settings">الإعدادات</div>
                            
                            <!-- ترتيب الحجم الصحيح (صغير-افتراضي-كبير) -->
                            <div class="settings-group">
                                <label data-i18n="font_size">حجم الواجهة</label>
                                <div class="segmented-control">
                                    <button class="segment-btn" id="font-small" onclick="setFontSize('small')" data-i18n="small">صغير</button>
                                    <button class="segment-btn active" id="font-default" onclick="setFontSize('default')" data-i18n="default">افتراضي</button>
                                    <button class="segment-btn" id="font-large" onclick="setFontSize('large')" data-i18n="large">كبير</button>
                                </div>
                            </div>

                            <!-- خيار اللغة -->
                            <div class="settings-group">
                                <label data-i18n="lang">اللغة</label>
                                <div class="segmented-control">
                                    <button class="segment-btn" id="lang-en" onclick="setLanguage('en')">English</button>
                                    <button class="segment-btn active" id="lang-ar" onclick="setLanguage('ar')">العربية</button>
                                </div>
                            </div>

                            <div class="settings-group">
                                <label data-i18n="anim">المؤثرات الحركية</label>
                                <div class="segmented-control">
                                    <button class="segment-btn" id="anim-off" onclick="setAnimation(false)" data-i18n="off">إيقاف</button>
                                    <button class="segment-btn active" id="anim-on" onclick="setAnimation(true)" data-i18n="on">تشغيل</button>
                                </div>
                            </div>

                            <div class="settings-group mobile-only-theme">
                                <label data-i18n="theme">المظهر</label>
                                <div class="segmented-control">
                                    <button class="segment-btn" id="mini-theme-light" onclick="toggleTheme('light')" data-i18n="light">فاتح</button>
                                    <button class="segment-btn active" id="mini-theme-dark" onclick="toggleTheme('dark')" data-i18n="dark">داكن</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div style="position: relative;">
                        <button class="header-icon-btn" id="noti-trigger" onclick="toggleDropdown('noti-dropdown', this)"><i class="ph ph-bell"></i></button>
                        <div class="header-dropdown" id="noti-dropdown">
                            <div class="dropdown-header" data-i18n="noti">التنبيهات</div>
                            <div id="noti-list">
                                <div class="empty-state">
                                    <i class="ph-duotone ph-bell-slash"></i>
                                    <span data-i18n="empty_noti">لا يوجد تنبيهات حالياً</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div style="position: relative;">
                        <div class="profile-trigger" id="profile-trigger" onclick="toggleDropdown('user-dropdown', this)">
                            <div class="profile-avatar-fallback" id="header-avatar-fallback">ز</div>
                            <div class="profile-info">
                                <span class="profile-name" id="header-name" data-i18n="guest">زائر</span>
                            </div>
                            <i class="ph-bold ph-caret-down"></i>
                        </div>
                        <div class="header-dropdown" id="user-dropdown">
                            <div class="dropdown-header" id="dropdown-status-name" data-i18n="unregistered">غير مسجل</div>
                            <div id="dropdown-content-area"></div>
                        </div>
                    </div>
                </div>
            </header>
            
            <div class="dynamic-content" id="content-holder"></div>
        </main>

        <aside class="right-sidebar">
            <div id="friends-container-desktop"></div>
        </aside>

        <!-- شريط الجوال السفلي المحدث (بدون فواصل) -->
        <nav class="bottom-bar">
            <button class="bottom-tab active" onclick="loadFragment('home', this)"><i class="ph-fill ph-squares-four"></i></button>
            <button class="bottom-tab" onclick="loadFragment('play', this)"><i class="ph ph-game-controller"></i></button>
            <button class="bottom-tab" onclick="loadFragment('achievements', this)"><i class="ph ph-medal"></i></button>
            <button class="bottom-tab" onclick="loadFragment('friends', this)"><i class="ph ph-users"></i></button>
            <button class="bottom-tab" onclick="loadFragment('store', this)"><i class="ph ph-storefront"></i></button>
            <button class="bottom-tab" onclick="loadFragment('profile', this)"><i class="ph ph-user"></i></button>
        </nav>
    </div>

    <!-- أكواد المنطق و Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCLFj5UTX9EtuehoMWV02gkPsAgKPvMhzI", authDomain: "web-game-260b5.firebaseapp.com", projectId: "web-game-260b5", storageBucket: "web-game-260b5.firebasestorage.app", messagingSenderId: "682229509792", appId: "1:682229509792:web:11b4a404459630fcd6a3c5" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app); const db = getFirestore(app);
        
        window.authInstance = auth; window.dbInstance = db; window.signOutFunc = signOut; window.updateDocFunc = updateDoc; window.docFunc = doc; window.arrayUnion = arrayUnion; window.arrayRemove = arrayRemove; window.getDocsFunc = getDocs; window.queryFunc = query; window.whereFunc = where; window.collectionFunc = collection;
        window.isGuest = false; window.currentFormMode = 'login'; window.currentUserData = null; window.friendToRemove = null;

        const hideLoader = () => { const l = document.getElementById('global-loader'); if(l){ l.style.opacity = '0'; setTimeout(()=>l.style.visibility='hidden',400); } };

        // نظام الترجمة العالمي (I18n)
        const i18n = {
            ar: {
                home: "الرئيسية", play: "غرف اللعب", achievements: "الإنجازات", store: "المتجر", profile: "الملف الشخصي", friends: "الأصدقاء",
                login_title: "النظام السحابي", login_desc: "سجل دخولك الآن لتتمكن من اللعب، حفظ تقدمك، والتفاعل مع الأصدقاء.",
                login_btn: "تسجيل الدخول", register_btn: "حساب جديد", guest_btn: "المتابعة كزائر",
                settings: "الإعدادات", noti: "التنبيهات", empty_noti: "لا يوجد تنبيهات حالياً",
                font_size: "حجم الواجهة", lang: "اللغة", anim: "المؤثرات الحركية", theme: "المظهر",
                small: "صغير", default: "افتراضي", large: "كبير", dark: "داكن", light: "فاتح", on: "تشغيل", off: "إيقاف",
                guest: "زائر", unregistered: "غير مسجل", logout: "تسجيل خروج",
                id_label: "المعرف (Email/Username)", user_label: "اسم المستخدم", email_label: "البريد الإلكتروني", pass_label: "كلمة المرور", confirm_label: "تأكيد كلمة المرور",
                add_friend: "إضافة صديق", add_friend_desc: "أدخل اسم المستخدم لإرسال طلب صداقة.", send_req: "إرسال الطلب",
                rem_friend: "حذف صديق", rem_confirm: "هل أنت متأكد أنك تريد حذف", cancel: "إلغاء", confirm_del: "تأكيد الحذف",
                login_to_see: "سجل دخولك لترى الأصدقاء"
            },
            en: {
                home: "Home", play: "Play", achievements: "Achievements", store: "Store", profile: "Profile", friends: "Friends",
                login_title: "Cloud System", login_desc: "Login to play, save progress, and interact with friends.",
                login_btn: "Login", register_btn: "Register", guest_btn: "Continue as Guest",
                settings: "Settings", noti: "Notifications", empty_noti: "No notifications",
                font_size: "UI Size", lang: "Language", anim: "Animations", theme: "Theme",
                small: "Small", default: "Default", large: "Large", dark: "Dark", light: "Light", on: "On", off: "Off",
                guest: "Guest", unregistered: "Unregistered", logout: "Logout",
                id_label: "ID (Email/Username)", user_label: "Username", email_label: "Email", pass_label: "Password", confirm_label: "Confirm Password",
                add_friend: "Add Friend", add_friend_desc: "Enter username to send request.", send_req: "Send Request",
                rem_friend: "Remove Friend", rem_confirm: "Are you sure you want to remove", cancel: "Cancel", confirm_del: "Confirm",
                login_to_see: "Login to see friends"
            }
        };

        window.currentLang = 'ar';
        window.setLanguage = async function(lang, skipSave = false) {
            window.currentLang = lang;
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            
            // تحديث النصوص
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.innerText = i18n[lang][key];
            });

            // تحديث الأزرار
            document.getElementById('lang-ar').classList.toggle('active', lang === 'ar');
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');

            // حفظ الإعداد
            if (!skipSave) {
                saveLocalSetting('lang', lang);
                if (window.authInstance && window.authInstance.currentUser && !window.isGuest) {
                    try { await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { "settings.lang": lang }); } catch(e){}
                }
            }
        };

        // نظام التخزين المحلي (يطبق على كل الصفحات)
        function saveLocalSetting(key, value) {
            let s = JSON.parse(localStorage.getItem('deception_settings') || '{}');
            s[key] = value; localStorage.setItem('deception_settings', JSON.stringify(s));
        }

        window.applyGlobalSettings = function(settingsObj) {
            const s = settingsObj || JSON.parse(localStorage.getItem('deception_settings') || '{"theme":"dark", "fontSize":"default", "animations":true, "lang":"ar"}');
            if(window.toggleTheme) window.toggleTheme(s.theme || 'dark', true);
            if(window.setFontSize) window.setFontSize(s.fontSize || 'default', true);
            if(window.setAnimation) window.setAnimation(s.animations !== false, true);
            if(window.setLanguage) window.setLanguage(s.lang || 'ar', true);
        };
        // تطبيق فوري عند التحميل
        window.applyGlobalSettings();

        window.renderFriendsList = function(containerId) {
            const container = document.getElementById(containerId); if(!container) return;
            const titleMsg = i18n[window.currentLang].friends;
            const loginMsg = i18n[window.currentLang].login_to_see;

            if (window.isGuest || !window.currentUserData) {
                container.innerHTML = `<div class="guest-friends-msg"><i class="ph-duotone ph-users-slash"></i><span>${loginMsg}</span></div>`;
                return;
            }
            const friends = window.currentUserData.friends || [];
            let html = `<div class="friends-header">${titleMsg}</div>`;
            if (friends.length === 0) { html += `<button class="add-friend-btn" onclick="openAddFriendModal()"><i class="ph-bold ph-plus"></i></button>`; } 
            else {
                friends.forEach(f => { html += `<div class="friend-avatar" onclick="openRemoveFriendModal('${f}')"><div style="width:100%; height:100%; border-radius:50%; background:var(--surface-panel); display:flex; justify-content:center; align-items:center; font-weight:bold; font-size:16px;">${f.charAt(0).toUpperCase()}</div><div class="online-dot"></div></div>`; });
                html += `<button class="add-friend-btn" onclick="openAddFriendModal()"><i class="ph-bold ph-plus"></i></button>`;
            }
            container.innerHTML = html;
        };

        onAuthStateChanged(auth, async (user) => {
            const nameEl = document.getElementById('header-name');
            const fallbackAvatar = document.getElementById('header-avatar-fallback');
            const dropdownStatus = document.getElementById('dropdown-status-name');
            const dropdownContent = document.getElementById('dropdown-content-area');

            if (user) {
                window.isGuest = false; sessionStorage.setItem('authPrompted', 'true');
                let displayName = user.email.split('@')[0]; 

                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) { 
                        window.currentUserData = userDoc.data();
                        displayName = window.currentUserData.username || displayName; 
                        if (window.currentUserData.settings) {
                            window.applyGlobalSettings(window.currentUserData.settings);
                            // حفظها محلياً للصفحات المستقبلية
                            localStorage.setItem('deception_settings', JSON.stringify(window.currentUserData.settings));
                        }
                    }
                } catch (err) {}

                fallbackAvatar.innerText = displayName.charAt(0).toUpperCase();
                nameEl.innerText = displayName;
                dropdownStatus.innerText = "Online";

                dropdownContent.innerHTML = `
                    <button class="dropdown-item" onclick="loadFragment('profile', null); toggleDropdown('');"><i class="ph ph-user-circle"></i> <span data-i18n="profile">${i18n[window.currentLang].profile}</span></button>
                    <button class="dropdown-item logout" onclick="handleLogout()"><i class="ph ph-sign-out"></i> <span data-i18n="logout">${i18n[window.currentLang].logout}</span></button>
                `;

                window.renderFriendsList('friends-container-desktop');
                if(window.clearAuthInputs) window.clearAuthInputs(); 
                document.getElementById('auth-modal').classList.add('hidden');
                document.getElementById('app-shell').classList.add('unlocked');
                loadFragment('home', document.querySelector('.nav-btn.active'));
                hideLoader();
            } else {
                window.currentUserData = null;
                // منطق ظهور النافذة لأول مرة فقط
                if (!sessionStorage.getItem('authPrompted')) {
                    document.getElementById('auth-modal').classList.remove('hidden');
                    document.getElementById('app-shell').classList.remove('unlocked');
                    sessionStorage.setItem('authPrompted', 'true');
                } else {
                    enterAsGuest(true); // دخول صامت
                }
                hideLoader();
            }
        });

        window.handleAuthSubmit = async function(e) {
            e.preventDefault(); 
            const errorDiv = document.getElementById('auth-error'); const btn = document.getElementById('modal-submit-btn');
            errorDiv.style.display = 'none'; btn.disabled = true;
            try {
                if (window.currentFormMode === 'login') {
                    let id = document.getElementById('login-id').value.trim(); let pass = document.getElementById('login-password').value;
                    let email = id;
                    if (!id.includes('@')) {
                        const q = query(collection(db, "users"), where("username_lower", "==", id.toLowerCase()));
                        const snap = await getDocs(q);
                        if (snap.empty) throw { message: "البيانات غير صحيحة" }; email = snap.docs[0].data().email;
                    }
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const user = document.getElementById('reg-username').value.trim(); const email = document.getElementById('reg-email').value.trim();
                    const pass = document.getElementById('reg-password').value; const conf = document.getElementById('reg-confirm').value;
                    if (pass !== conf) throw { message: "كلمات المرور غير متطابقة" };
                    if (pass.length < 6) throw { message: "كلمة المرور قصيرة" };
                    const q = query(collection(db, "users"), where("username_lower", "==", user.toLowerCase()));
                    const snap = await getDocs(q);
                    if (!snap.empty) throw { message: "اسم المستخدم محجوز" };
                    const cred = await createUserWithEmailAndPassword(auth, email.toLowerCase(), pass);
                    await setDoc(doc(db, "users", cred.user.uid), { username: user, username_lower: user.toLowerCase(), email: email.toLowerCase(), matches: 0, wins: 0, friends: [], friendRequests: [], settings: JSON.parse(localStorage.getItem('deception_settings') || '{}'), createdAt: new Date().toISOString() });
                }
            } catch (err) { errorDiv.innerText = "البيانات غير صحيحة أو مستخدمة."; errorDiv.style.display = 'block'; } finally { btn.disabled = false; }
        }
    </script>

    <script>
        window.setFontSize = async function(size, skipSave = false) {
            document.documentElement.classList.remove('font-small', 'font-large');
            if(size !== 'default') document.documentElement.classList.add(`font-${size}`);
            document.querySelectorAll('#font-small, #font-default, #font-large').forEach(b => b.classList.remove('active'));
            if(document.getElementById(`font-${size}`)) document.getElementById(`font-${size}`).classList.add('active');
            if (!skipSave) {
                saveLocalSetting('fontSize', size);
                if (window.authInstance && window.authInstance.currentUser && !window.isGuest) { try { await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { "settings.fontSize": size }); } catch(e){} }
            }
        };

        window.setAnimation = async function(isOn, skipSave = false) {
            if(isOn) document.body.classList.remove('no-animations'); else document.body.classList.add('no-animations');
            document.getElementById('anim-on').classList.toggle('active', isOn); document.getElementById('anim-off').classList.toggle('active', !isOn);
            if (!skipSave) {
                saveLocalSetting('animations', isOn);
                if (window.authInstance && window.authInstance.currentUser && !window.isGuest) { try { await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { "settings.animations": isOn }); } catch(e){} }
            }
        };

        window.toggleTheme = async function(mode, skipSave = false) {
            const body = document.body; const darkBtns = [document.getElementById('btn-theme-dark'), document.getElementById('mini-theme-dark')]; const lightBtns = [document.getElementById('btn-theme-light'), document.getElementById('mini-theme-light')];
            if (mode === 'light') { body.setAttribute('data-theme', 'light'); lightBtns.forEach(b => { if(b) b.classList.add('active-theme', 'active'); }); darkBtns.forEach(b => { if(b) b.classList.remove('active-theme', 'active'); }); } 
            else { body.removeAttribute('data-theme'); darkBtns.forEach(b => { if(b) b.classList.add('active-theme', 'active'); }); lightBtns.forEach(b => { if(b) b.classList.remove('active-theme', 'active'); }); }
            if (!skipSave) {
                saveLocalSetting('theme', mode);
                if (window.authInstance && window.authInstance.currentUser && !window.isGuest) { try { await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { "settings.theme": mode }); } catch (e) {} }
            }
        };

        function openAddFriendModal() { document.getElementById('add-friend-modal').classList.remove('hidden'); document.getElementById('friend-error').style.display='none'; document.getElementById('search-friend-input').value=''; }
        function closeFriendModal(id) { document.getElementById(id).classList.add('hidden'); }
        function openRemoveFriendModal(friendName) { window.friendToRemove = friendName; document.getElementById('remove-friend-name').innerText = friendName; document.getElementById('remove-friend-modal').classList.remove('hidden'); }
        
        async function sendFriendRequest() {
            const targetUsername = document.getElementById('search-friend-input').value.trim().toLowerCase();
            const errDiv = document.getElementById('friend-error');
            if(!targetUsername) return;
            if(targetUsername === window.currentUserData.username_lower) { errDiv.innerText="لا يمكنك إضافة نفسك!"; errDiv.style.display='block'; return; }
            try {
                const q = window.queryFunc(window.collectionFunc(window.dbInstance, "users"), window.whereFunc("username_lower", "==", targetUsername));
                const snap = await window.getDocsFunc(q);
                if(snap.empty) { errDiv.innerText="المستخدم غير موجود."; errDiv.style.display='block'; return; }
                await window.updateDocFunc(window.docFunc(window.dbInstance, "users", snap.docs[0].id), { friendRequests: window.arrayUnion(window.currentUserData.username) });
                closeFriendModal('add-friend-modal');
            } catch(e) { errDiv.style.display='block'; }
        }

        async function confirmRemoveFriend() {
            if(!window.friendToRemove) return;
            try {
                await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { friends: window.arrayRemove(window.friendToRemove) });
                window.currentUserData.friends = window.currentUserData.friends.filter(f => f !== window.friendToRemove);
                window.renderFriendsList('friends-container-desktop');
                if(document.getElementById('mobile-friends-wrapper')) window.renderFriendsList('mobile-friends-wrapper');
                closeFriendModal('remove-friend-modal');
            } catch(e) { }
        }

        window.clearAuthInputs = function() {
            const form = document.getElementById('firebase-form'); if(form) form.reset();
            const err = document.getElementById('auth-error'); if(err) err.style.display = 'none';
        };

        function setFormType(type) { 
            window.currentFormMode = type; 
            document.getElementById('tab-login').classList.toggle('active', type === 'login'); document.getElementById('tab-register').classList.toggle('active', type === 'register'); 
            document.getElementById('login-fields').style.display = type === 'login' ? 'block' : 'none'; document.getElementById('register-fields').style.display = type === 'register' ? 'block' : 'none'; 
            document.getElementById('login-id').required = type === 'login'; document.getElementById('login-password').required = type === 'login';
            document.getElementById('reg-username').required = type === 'register'; document.getElementById('reg-email').required = type === 'register'; document.getElementById('reg-password').required = type === 'register';
        }

        function toggleDropdown(dropdownId, triggerElement) {
            const t = document.getElementById(dropdownId); const isOpen = t ? t.classList.contains('show') : false;
            document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show')); document.querySelectorAll('.header-icon-btn, .profile-trigger').forEach(t => t.classList.remove('active'));
            if (!isOpen && t) { t.classList.add('show'); if(triggerElement) triggerElement.classList.add('active'); }
        }

        window.onclick = function(e) { 
            if (!e.target.closest('.header-icon-btn') && !e.target.closest('.profile-trigger') && !e.target.closest('.header-dropdown')) { 
                document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show')); document.querySelectorAll('.header-icon-btn, .profile-trigger').forEach(t => t.classList.remove('active'));
            } 
        }
        
        function handleLogout() { 
            window.signOutFunc(window.authInstance).then(() => { 
                document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show'));
                window.currentUserData = null; window.clearAuthInputs(); 
                document.getElementById('auth-modal').classList.remove('hidden'); document.getElementById('app-shell').classList.remove('unlocked'); 
            }); 
        }

        function switchModalMode(mode) { if(mode === 'forms'){ document.getElementById('modal-welcome-view').style.display = 'none'; document.getElementById('modal-form-view').style.display = 'block'; } }
        
        window.enterAsGuest = function(silent = false) {
            window.isGuest = true; window.currentUserData = null;
            document.getElementById('header-name').innerText = i18n[window.currentLang].guest; document.getElementById('dropdown-status-name').innerText = i18n[window.currentLang].unregistered; document.getElementById('header-avatar-fallback').innerText = "ز";
            window.renderFriendsList('friends-container-desktop');
            document.getElementById('dropdown-content-area').innerHTML = `<button class="dropdown-item" onclick="window.clearAuthInputs(); document.getElementById('auth-modal').classList.remove('hidden'); toggleDropdown(''); switchModalMode('forms'); setFormType('login');"><i class="ph ph-sign-in"></i> <span data-i18n="login_btn">${i18n[window.currentLang].login_btn}</span></button>`;
            
            if(!silent) window.clearAuthInputs(); 
            document.getElementById('auth-modal').classList.add('hidden'); document.getElementById('app-shell').classList.add('unlocked'); 
            loadFragment('home', document.querySelector('.nav-btn.active'));
        }

        function closeAuthModal() { window.clearAuthInputs(); document.getElementById('auth-modal').classList.add('hidden'); document.getElementById('app-shell').classList.add('unlocked'); if(!window.isGuest) enterAsGuest(); }
        
        function loadFragment(pageName, element) {
            const contentHolder = document.getElementById('content-holder');
            const title = i18n[window.currentLang][pageName] || pageName;
            document.getElementById('page-title').innerText = title; document.getElementById('mobile-section-name').innerText = title;
            
            document.querySelectorAll('.nav-btn, .bottom-tab').forEach(btn => { btn.classList.remove('active'); const icon = btn.querySelector('i'); if(icon) icon.className = icon.className.replace('ph-fill', 'ph'); });

            if(element) {
                element.classList.add('active'); const icon = element.querySelector('i'); if(icon) icon.className = icon.className.replace('ph', 'ph-fill');
                const isNav = element.classList.contains('nav-btn');
                const tabsList = isNav ? document.querySelectorAll('.nav-btn') : document.querySelectorAll('.bottom-tab');
                const targetList = isNav ? document.querySelectorAll('.bottom-tab') : document.querySelectorAll('.nav-btn');
                const index = Array.from(tabsList).indexOf(element);
                
                if(pageName === 'friends' && isNav === false) { }
                else if (pageName === 'store' && isNav === true) { const m = document.querySelectorAll('.bottom-tab')[4]; if(m) { m.classList.add('active'); m.querySelector('i').className = m.querySelector('i').className.replace('ph', 'ph-fill'); } }
                else if (pageName === 'profile' && isNav === true) { const m = document.querySelectorAll('.bottom-tab')[5]; if(m) { m.classList.add('active'); m.querySelector('i').className = m.querySelector('i').className.replace('ph', 'ph-fill'); } }
                else { const matchedTab = targetList[index]; if(matchedTab) { matchedTab.classList.add('active'); matchedTab.querySelector('i').className = matchedTab.querySelector('i').className.replace('ph', 'ph-fill'); } }
            }

            if (pageName === 'friends') {
                contentHolder.innerHTML = `<div id="mobile-friends-wrapper" style="max-width:400px; margin: 40px auto; display:flex; flex-direction:column; align-items:center; gap:20px;"></div>`;
                window.renderFriendsList('mobile-friends-wrapper');
            } else {
                contentHolder.innerHTML = `<div style="display:flex; justify-content:center; align-items:center; height:100%; color:var(--text-dim); font-size:1.2rem; font-weight:bold;">${title}</div>`;
            }
        }
    </script>
</body>
</html>
