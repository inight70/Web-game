<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>deception</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=8.0">
</head>
<body>

    <div id="global-loader"><div class="spinner"></div></div>

    <!-- نافذة المصادقة -->
    <div id="auth-modal" class="auth-overlay hidden">
        <div class="auth-card">
            <button class="close-modal-btn" onclick="closeAuthModal()"><i class="ph-bold ph-x"></i></button>
            <div id="modal-welcome-view">
                <i class="ph-duotone ph-shield-check" style="font-size: 60px; color: var(--accent-red); margin-bottom: 15px; display: inline-block;"></i>
                <h2>النظام السحابي</h2>
                <p>سجل دخولك الآن لتتمكن من اللعب، حفظ تقدمك، والتفاعل مع الأصدقاء.</p>
                <button class="btn-core" onclick="switchModalMode('forms')">تسجيل الدخول</button>
                <button class="link-guest" onclick="enterAsGuest()">المتابعة كزائر</button>
            </div>
            <div id="modal-form-view" style="display: none;">
                <div class="modal-tabs">
                    <button id="tab-login" class="modal-tab-btn active" onclick="setFormType('login')">تسجيل الدخول</button>
                    <button id="tab-register" class="modal-tab-btn" onclick="setFormType('register')">حساب جديد</button>
                </div>
                <div id="auth-error" class="auth-error-msg"></div>
                <form id="firebase-form" onsubmit="handleAuthSubmit(event)" autocomplete="off">
                    <div id="login-fields">
                        <div class="input-wrapper"><label>المعرف (Email/Username)</label><input type="text" id="login-id" class="premium-input" placeholder="أدخل المعرف" required autocomplete="off"></div>
                        <div class="input-wrapper"><label>كلمة المرور</label><input type="password" id="login-password" class="premium-input" placeholder="••••••••" required autocomplete="new-password"></div>
                    </div>
                    <div id="register-fields" style="display: none;">
                        <div class="input-wrapper"><label>اسم المستخدم</label><input type="text" id="reg-username" class="premium-input" placeholder="مثال: Player1" autocomplete="off"></div>
                        <div class="input-wrapper"><label>البريد الإلكتروني</label><input type="email" id="reg-email" class="premium-input" placeholder="name@domain.com" autocomplete="off"></div>
                        <div class="input-wrapper"><label>كلمة المرور</label><input type="password" id="reg-password" class="premium-input" placeholder="••••••••" autocomplete="new-password"></div>
                        <div class="input-wrapper"><label>تأكيد كلمة المرور</label><input type="password" id="reg-confirm" class="premium-input" placeholder="••••••••" autocomplete="new-password"></div>
                    </div>
                    <button type="submit" class="btn-core" id="modal-submit-btn">تأكيد الدخول</button>
                </form>
            </div>
        </div>
    </div>

    <!-- نافذة إضافة الأصدقاء (الفعلية) -->
    <div id="friend-modal" class="auth-overlay hidden">
        <div class="auth-card">
            <button class="close-modal-btn" onclick="document.getElementById('friend-modal').classList.add('hidden')"><i class="ph-bold ph-x"></i></button>
            <h2>إضافة صديق</h2>
            <p>ابحث عن صديقك بواسطة اسم المستخدم الخاص به.</p>
            <div class="input-wrapper">
                <input type="text" id="search-friend-input" class="premium-input" placeholder="أدخل اسم المستخدم..." autocomplete="off">
            </div>
            <button class="btn-core" id="btn-search-friend" onclick="searchForFriend()">بحث</button>
            <div id="friend-search-error" class="auth-error-msg" style="margin-top: 15px;"></div>
            
            <div id="friend-search-result" class="friend-search-result">
                <div class="friend-search-info">
                    <div class="friend-search-avatar" id="fs-avatar">A</div>
                    <span id="fs-name" style="font-weight: 700; font-family: var(--font-en);">Username</span>
                </div>
                <button class="btn-add-mini" id="fs-add-btn">إضافة</button>
            </div>
        </div>
    </div>

    <div id="app-shell" class="app-shell">
        
        <aside class="sidebar">
            <div class="sidebar-logo">decep<span>tion</span></div>
            <nav class="nav-menu">
                <button class="nav-btn active" onclick="loadFragment('home', this)"><i class="ph-fill ph-squares-four"></i></button>
                <button class="nav-btn" onclick="loadFragment('play', this)"><i class="ph-fill ph-game-controller"></i></button>
                <button class="nav-btn" onclick="loadFragment('leaderboard', this)"><i class="ph-fill ph-trophy"></i></button>
                <button class="nav-btn" onclick="loadFragment('store', this)"><i class="ph-fill ph-storefront"></i></button>
                <button class="nav-btn" onclick="loadFragment('profile', this)"><i class="ph-fill ph-user"></i></button>
            </nav>
        </aside>

        <main class="main-viewport">
            <header class="top-header">
                <div class="header-page-info">
                    <h1 class="page-title" id="page-title">الرئيسية</h1>
                    <div class="mobile-brand-title">
                        <span class="brand-name">decep<span>tion</span></span>
                        <div class="mobile-section-name" id="mobile-section-name">الرئيسية</div>
                    </div>
                </div>

                <div class="header-actions">
                    <!-- قائمة الإعدادات (Segmented Controls) محاذاة للوسط -->
                    <div style="position: relative;">
                        <button class="header-icon-btn" id="settings-trigger" onclick="toggleDropdown('settings-dropdown', this)"><i class="ph-fill ph-gear"></i></button>
                        <div class="header-dropdown" id="settings-dropdown">
                            <div class="dropdown-header"><div class="dropdown-name-ar">إعدادات النظام</div></div>
                            
                            <div class="settings-group">
                                <label>حجم الخط</label>
                                <div class="segmented-control">
                                    <button class="seg-btn" id="font-sm" onclick="setAppSetting('font', 'sm', this)">صغير</button>
                                    <button class="seg-btn active" id="font-md" onclick="setAppSetting('font', 'md', this)">افتراضي</button>
                                    <button class="seg-btn" id="font-lg" onclick="setAppSetting('font', 'lg', this)">كبير</button>
                                </div>
                            </div>
                            
                            <div class="settings-group">
                                <label>الرسوميات (Animations)</label>
                                <div class="segmented-control">
                                    <button class="seg-btn active" id="anim-on" onclick="setAppSetting('anim', 'on', this)">تفعيل</button>
                                    <button class="seg-btn" id="anim-off" onclick="setAppSetting('anim', 'off', this)">إيقاف</button>
                                </div>
                            </div>
                            
                            <div class="settings-group">
                                <label>لغة الواجهة</label>
                                <div class="segmented-control">
                                    <button class="seg-btn active">العربية</button>
                                    <button class="seg-btn" style="opacity: 0.5; cursor: not-allowed;" title="قريباً">English</button>
                                </div>
                            </div>

                            <div class="settings-group mobile-only-theme">
                                <label>مظهر التطبيق</label>
                                <div class="segmented-control">
                                    <button class="seg-btn active" id="theme-dark-btn" onclick="toggleTheme('dark')">داكن <i class="ph-fill ph-moon"></i></button>
                                    <button class="seg-btn" id="theme-light-btn" onclick="toggleTheme('light')">فاتح <i class="ph-fill ph-sun"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- قائمة التنبيهات (متوسطة) -->
                    <div style="position: relative;">
                        <button class="header-icon-btn" id="noti-trigger" onclick="toggleDropdown('noti-dropdown', this)"><i class="ph-fill ph-bell"></i></button>
                        <div class="header-dropdown" id="noti-dropdown">
                            <div class="dropdown-header"><div class="dropdown-name-ar">الإشعارات</div></div>
                            <div class="empty-state">
                                <i class="ph-duotone ph-bell-slash"></i>
                                <span>لا توجد تنبيهات حالياً.</span>
                            </div>
                        </div>
                    </div>
                    
                    <div style="position: relative;">
                        <div class="profile-trigger" id="profile-trigger" onclick="toggleDropdown('user-dropdown', this)">
                            <div class="profile-avatar-fallback" id="header-avatar-fallback">ز</div>
                            <div class="profile-info">
                                <span class="profile-name" id="header-name">زائر</span>
                                <span class="profile-status" id="header-status">غير مسجل</span>
                            </div>
                            <i class="ph-bold ph-caret-down"></i>
                        </div>
                        <div class="header-dropdown user-dropdown" id="user-dropdown"></div>
                    </div>
                </div>
            </header>
            
            <div class="dynamic-content" id="content-holder"></div>
        </main>

        <aside class="right-sidebar">
            <div class="friends-header-title" id="friends-header-title">الأصدقاء</div>
            <div id="friends-container"></div>
        </aside>

        <!-- شريط الجوال السفلي المحدث (زجاجي مع خانة الأصدقاء في المنتصف) -->
        <nav class="bottom-bar">
            <button class="bottom-tab active" onclick="loadFragment('home', this)"><i class="ph-fill ph-squares-four"></i></button>
            <button class="bottom-tab" onclick="loadFragment('play', this)"><i class="ph-fill ph-game-controller"></i></button>
            <!-- زر الأصدقاء الجديد في المنتصف -->
            <button class="bottom-tab" onclick="openFriendModal()"><i class="ph-fill ph-users"></i></button>
            <button class="bottom-tab" onclick="loadFragment('store', this)"><i class="ph-fill ph-storefront"></i></button>
            <button class="bottom-tab" onclick="loadFragment('profile', this)"><i class="ph-fill ph-user"></i></button>
        </nav>
    </div>

    <!-- Firebase & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        // استدعاء arrayUnion و arrayRemove لنظام الأصدقاء
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCLFj5UTX9EtuehoMWV02gkPsAgKPvMhzI", authDomain: "web-game-260b5.firebaseapp.com", projectId: "web-game-260b5", storageBucket: "web-game-260b5.firebasestorage.app", messagingSenderId: "682229509792", appId: "1:682229509792:web:11b4a404459630fcd6a3c5" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app); const db = getFirestore(app);
        
        window.authInstance = auth; window.dbInstance = db; window.signOutFunc = signOut; window.updateDocFunc = updateDoc; window.docFunc = doc;
        window.arrayUnion = arrayUnion; window.arrayRemove = arrayRemove;
        window.isGuest = false; window.currentFormMode = 'login'; 
        window.currentUserData = null; // تخزين بيانات المستخدم الحالي

        const hideLoader = () => { const l = document.getElementById('global-loader'); if(l){ l.style.opacity = '0'; setTimeout(()=>l.style.visibility='hidden',400); } };

        // دالة عرض الأصدقاء ديناميكياً مع زر الحذف (Hover)
        window.renderFriendsList = function() {
            const container = document.getElementById('friends-container');
            const title = document.getElementById('friends-header-title');
            
            if (window.isGuest || !window.currentUserData) {
                title.style.display = 'none';
                container.innerHTML = `<div class="guest-friends-msg"><i class="ph-duotone ph-user-circle-plus"></i><span>سجل دخولك لترى الأصدقاء</span></div>`;
                return;
            }

            title.style.display = 'block';
            let html = '';
            const friends = window.currentUserData.friends || [];
            
            friends.forEach(f => {
                const char = f.username.charAt(0).toUpperCase();
                html += `
                    <div class="friend-item-wrapper" title="${f.username}">
                        <div class="friend-avatar">${char}<div class="online-dot"></div></div>
                        <div class="remove-friend-overlay" onclick="removeFriend('${f.uid}', '${f.username}')"><i class="ph-bold ph-trash"></i></div>
                    </div>`;
            });
            
            html += `<button class="add-friend-btn" onclick="openFriendModal()"><i class="ph-bold ph-plus"></i></button>`;
            container.innerHTML = html;
        };

        onAuthStateChanged(auth, async (user) => {
            const dropdown = document.getElementById('user-dropdown');
            const nameEl = document.getElementById('header-name');
            const statusEl = document.getElementById('header-status');
            const fallbackAvatar = document.getElementById('header-avatar-fallback');

            if (user) {
                window.isGuest = false;
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) { 
                        window.currentUserData = userDoc.data();
                        window.currentUserData.uid = user.uid; 
                    }
                } catch (err) {}

                const d = window.currentUserData || { username: user.email.split('@')[0], matches: 0, wins: 0, friends: [] };
                
                if (d.settings && d.settings.theme) window.toggleTheme(d.settings.theme, true);

                fallbackAvatar.innerText = d.username.charAt(0).toUpperCase();
                nameEl.innerText = d.username;
                statusEl.innerText = "Online"; statusEl.style.color = "var(--accent-green)";

                dropdown.innerHTML = `
                    <div class="dropdown-header"><div class="dropdown-name-ar">${d.username}</div></div>
                    <div class="dropdown-stats">
                        <div class="stat-item"><span class="stat-label">المباريات</span><span class="stat-value">${d.matches||0}</span></div>
                        <div class="stat-item"><span class="stat-label">الانتصارات</span><span class="stat-value">${d.wins||0}</span></div>
                    </div>
                    <button class="dropdown-item" onclick="loadFragment('profile', document.querySelectorAll('.nav-btn')[4]); toggleDropdown('user-dropdown');"><i class="ph-fill ph-user-circle"></i> إعدادات الحساب</button>
                    <button class="dropdown-item logout" onclick="handleLogout()"><i class="ph-fill ph-sign-out"></i> تسجيل خروج</button>
                `;

                window.renderFriendsList();
                window.clearAuthInputs(); 
                document.getElementById('auth-modal').classList.add('hidden');
                document.getElementById('app-shell').classList.add('unlocked');
                loadFragment('home', document.querySelector('.nav-btn.active'));
                hideLoader();
            } else {
                if (!window.isGuest) {
                    window.clearAuthInputs(); 
                    document.getElementById('auth-modal').classList.remove('hidden');
                    document.getElementById('app-shell').classList.remove('unlocked');
                }
                hideLoader();
            }
        });

        window.handleAuthSubmit = async function(e) {
            e.preventDefault(); 
            const errorDiv = document.getElementById('auth-error'); 
            const btn = document.getElementById('modal-submit-btn');
            errorDiv.style.display = 'none'; btn.disabled = true; btn.innerText = "جاري التحقق...";
            
            try {
                if (window.currentFormMode === 'login') {
                    let id = document.getElementById('login-id').value.trim(); let pass = document.getElementById('login-password').value;
                    let email = id;
                    if (!id.includes('@')) {
                        const q = query(collection(db, "users"), where("username_lower", "==", id.toLowerCase()));
                        const snap = await getDocs(q);
                        if (snap.empty) throw { message: "البيانات غير صحيحة" };
                        email = snap.docs[0].data().email;
                    }
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const user = document.getElementById('reg-username').value.trim(); 
                    const email = document.getElementById('reg-email').value.trim();
                    const pass = document.getElementById('reg-password').value; 
                    const conf = document.getElementById('reg-confirm').value;
                    if (pass !== conf) throw { message: "كلمات المرور غير متطابقة" };
                    if (pass.length < 6) throw { message: "كلمة المرور 6 أحرف على الأقل" };
                    const q = query(collection(db, "users"), where("username_lower", "==", user.toLowerCase()));
                    const snap = await getDocs(q);
                    if (!snap.empty) throw { message: "اسم المستخدم محجوز" };
                    const cred = await createUserWithEmailAndPassword(auth, email.toLowerCase(), pass);
                    await setDoc(doc(db, "users", cred.user.uid), { username: user, username_lower: user.toLowerCase(), email: email.toLowerCase(), matches: 0, wins: 0, friends: [], settings: { theme: 'dark' }, createdAt: new Date().toISOString() });
                }
            } catch (err) {
                let msg = err.message || "حدث خطأ غير معروف";
                if(msg.includes("invalid-credential")) msg = "البيانات غير صحيحة";
                if(msg.includes("email-already-in-use")) msg = "البريد الإلكتروني مستخدم";
                errorDiv.innerText = msg; errorDiv.style.display = 'block';
            } finally { btn.disabled = false; btn.innerText = window.currentFormMode === 'register' ? 'حساب جديد' : 'تسجيل الدخول'; }
        }

        // ================== نظام الأصدقاء (بحث / إضافة / حذف) ==================
        window.searchForFriend = async function() {
            const input = document.getElementById('search-friend-input').value.trim().toLowerCase();
            const errorDiv = document.getElementById('friend-search-error');
            const resultDiv = document.getElementById('friend-search-result');
            const btn = document.getElementById('btn-search-friend');
            
            errorDiv.style.display = 'none'; resultDiv.classList.remove('active');
            if(!input) return;
            
            if(window.currentUserData && window.currentUserData.username_lower === input) {
                errorDiv.innerText = "لا يمكنك إضافة نفسك!"; errorDiv.style.display = 'block'; return;
            }

            btn.disabled = true; btn.innerText = "...";
            try {
                const q = query(collection(db, "users"), where("username_lower", "==", input));
                const snap = await getDocs(q);
                if (snap.empty) throw { message: "اللاعب غير موجود" };
                
                const friendData = snap.docs[0].data();
                const friendId = snap.docs[0].id;
                
                // التحقق إذا كان مضاف مسبقاً
                const isAlreadyFriend = (window.currentUserData.friends || []).some(f => f.uid === friendId);
                
                document.getElementById('fs-avatar').innerText = friendData.username.charAt(0).toUpperCase();
                document.getElementById('fs-name').innerText = friendData.username;
                const addBtn = document.getElementById('fs-add-btn');
                
                if (isAlreadyFriend) {
                    addBtn.innerText = "مضاف"; addBtn.disabled = true; addBtn.style.opacity = '0.5';
                } else {
                    addBtn.innerText = "إضافة"; addBtn.disabled = false; addBtn.style.opacity = '1';
                    addBtn.onclick = () => window.addNewFriend(friendId, friendData.username);
                }
                resultDiv.classList.add('active');
            } catch (err) {
                errorDiv.innerText = err.message; errorDiv.style.display = 'block';
            } finally { btn.disabled = false; btn.innerText = "بحث"; }
        };

        window.addNewFriend = async function(friendUid, friendName) {
            const addBtn = document.getElementById('fs-add-btn');
            addBtn.innerText = "..."; addBtn.disabled = true;
            try {
                const myRef = doc(db, "users", window.currentUserData.uid);
                const friendObj = { uid: friendUid, username: friendName };
                await updateDoc(myRef, { friends: arrayUnion(friendObj) });
                
                // تحديث البيانات محلياً
                if(!window.currentUserData.friends) window.currentUserData.friends = [];
                window.currentUserData.friends.push(friendObj);
                
                addBtn.innerText = "تمت الإضافة";
                window.renderFriendsList();
                setTimeout(() => document.getElementById('friend-modal').classList.add('hidden'), 1000);
            } catch(e) {
                addBtn.innerText = "خطأ"; addBtn.disabled = false;
            }
        };

        window.removeFriend = async function(friendUid, friendName) {
            if(!confirm(`هل أنت متأكد من إزالة ${friendName} من الأصدقاء؟`)) return;
            try {
                const myRef = doc(db, "users", window.currentUserData.uid);
                const friendObj = { uid: friendUid, username: friendName };
                await updateDoc(myRef, { friends: arrayRemove(friendObj) });
                
                window.currentUserData.friends = window.currentUserData.friends.filter(f => f.uid !== friendUid);
                window.renderFriendsList();
            } catch(e) { alert("حدث خطأ أثناء الحذف"); }
        };
    </script>

    <script>
        window.clearAuthInputs = function() {
            const form = document.getElementById('firebase-form'); if(form) form.reset();
            const errorDiv = document.getElementById('auth-error'); if(errorDiv) errorDiv.style.display = 'none';
        };

        // إعدادات النظام الحقيقية (حجم الخط و الرسوميات)
        window.setAppSetting = function(type, val, btnEl) {
            // تحديث الأزرار (Segmented Control UI)
            const parent = btnEl.parentElement;
            parent.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
            btnEl.classList.add('active');

            // تطبيق الإعدادات فعلياً على الواجهة
            if (type === 'font') {
                document.body.classList.remove('text-sm', 'text-lg');
                if(val === 'sm') document.body.classList.add('text-sm');
                if(val === 'lg') document.body.classList.add('text-lg');
            } else if (type === 'anim') {
                if(val === 'off') document.body.classList.add('no-animations');
                else document.body.classList.remove('no-animations');
            }
        };

        window.toggleTheme = async function(mode, skipSave = false) {
            const body = document.body; 
            const darkBtnDesk = document.getElementById('btn-theme-dark');
            const lightBtnDesk = document.getElementById('btn-theme-light');
            const darkBtnMob = document.getElementById('theme-dark-btn');
            const lightBtnMob = document.getElementById('theme-light-btn');
            
            if (mode === 'light') { 
                body.setAttribute('data-theme', 'light'); 
                if(lightBtnDesk) { lightBtnDesk.classList.add('active-theme'); darkBtnDesk.classList.remove('active-theme'); }
                if(lightBtnMob) { lightBtnMob.classList.add('active'); darkBtnMob.classList.remove('active'); }
            } else { 
                body.removeAttribute('data-theme'); 
                if(darkBtnDesk) { darkBtnDesk.classList.add('active-theme'); lightBtnDesk.classList.remove('active-theme'); }
                if(darkBtnMob) { darkBtnMob.classList.add('active'); lightBtnMob.classList.remove('active'); }
            }
            if (!skipSave && window.authInstance && window.authInstance.currentUser && !window.isGuest) {
                try { await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), { "settings.theme": mode }); } catch (e) {}
            }
        };

        function setFormType(type) { 
            window.currentFormMode = type; 
            document.getElementById('tab-login').classList.toggle('active', type === 'login'); document.getElementById('tab-register').classList.toggle('active', type === 'register'); 
            document.getElementById('login-fields').style.display = type === 'login' ? 'block' : 'none'; document.getElementById('register-fields').style.display = type === 'register' ? 'block' : 'none'; 
            document.getElementById('login-id').required = type === 'login'; document.getElementById('login-password').required = type === 'login';
            document.getElementById('reg-username').required = type === 'register'; document.getElementById('reg-email').required = type === 'register'; document.getElementById('reg-password').required = type === 'register';
            document.getElementById('modal-submit-btn').innerText = type === 'register' ? 'حساب جديد' : 'تسجيل الدخول';
        }

        function toggleDropdown(dropdownId, triggerElement) {
            const allDropdowns = document.querySelectorAll('.header-dropdown');
            const allTriggers = document.querySelectorAll('.header-icon-btn, .profile-trigger');
            const targetDropdown = document.getElementById(dropdownId);
            const isCurrentlyOpen = targetDropdown.classList.contains('show');
            allDropdowns.forEach(d => d.classList.remove('show'));
            allTriggers.forEach(t => t.classList.remove('active'));
            if (!isCurrentlyOpen) { targetDropdown.classList.add('show'); if(triggerElement) triggerElement.classList.add('active'); }
        }

        window.onclick = function(e) { 
            if (!e.target.closest('.header-icon-btn') && !e.target.closest('.profile-trigger') && !e.target.closest('.header-dropdown')) { 
                document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show')); 
                document.querySelectorAll('.header-icon-btn, .profile-trigger').forEach(t => t.classList.remove('active'));
            } 
        }
        
        function handleLogout() { 
            window.signOutFunc(window.authInstance).then(() => { 
                document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show'));
                document.body.removeAttribute('data-theme');
                window.currentUserData = null; window.clearAuthInputs(); 
                document.getElementById('auth-modal').classList.remove('hidden'); document.getElementById('app-shell').classList.remove('unlocked'); 
            }); 
        }

        function switchModalMode(mode) { if(mode === 'forms'){ document.getElementById('modal-welcome-view').style.display = 'none'; document.getElementById('modal-form-view').style.display = 'block'; } }
        
        function openFriendModal() {
            if(window.isGuest || !window.currentUserData) { alert("يرجى تسجيل الدخول أولاً لإضافة الأصدقاء"); return; }
            document.getElementById('friend-search-input').value = "";
            document.getElementById('friend-search-result').classList.remove('active');
            document.getElementById('friend-search-error').style.display = 'none';
            document.getElementById('friend-modal').classList.remove('hidden');
        }

        function enterAsGuest() {
            window.isGuest = true; window.currentUserData = null;
            document.getElementById('header-name').innerText = "زائر"; document.getElementById('header-status').innerText = "غير مسجل"; document.getElementById('header-avatar-fallback').innerText = "ز";
            window.renderFriendsList(); 
            document.getElementById('user-dropdown').innerHTML = `
                <div class="dropdown-header"><div class="dropdown-name-ar" style="color:var(--text-dim);">زائر غير مسجل</div></div>
                <button class="dropdown-item" onclick="window.clearAuthInputs(); document.getElementById('auth-modal').classList.remove('hidden'); toggleDropdown('user-dropdown'); switchModalMode('forms'); setFormType('login');"><i class="ph-fill ph-sign-in"></i> تسجيل الدخول</button>
            `;
            window.clearAuthInputs(); document.getElementById('auth-modal').classList.add('hidden'); document.getElementById('app-shell').classList.add('unlocked'); loadFragment('home', document.querySelector('.nav-btn.active'));
        }

        function closeAuthModal() { window.clearAuthInputs(); document.getElementById('auth-modal').classList.add('hidden'); document.getElementById('app-shell').classList.add('unlocked'); if(!window.isGuest) enterAsGuest(); }
        
        function loadFragment(pageName, element) {
            const contentHolder = document.getElementById('content-holder');
            const titles = { 'home': 'الرئيسية', 'play': 'غرف اللعب', 'leaderboard': 'المتصدرون', 'store': 'متجر المزايا', 'profile': 'الملف الشخصي' };
            document.getElementById('page-title').innerText = titles[pageName];
            document.getElementById('mobile-section-name').innerText = titles[pageName];
            
            document.querySelectorAll('.nav-btn, .bottom-tab').forEach(btn => {
                btn.classList.remove('active'); const icon = btn.querySelector('i'); if(icon && icon.className.includes('ph-fill')) { /* Keep fill as requested in dark modern apps, or toggle outline. Sticking to solid for better app feel */ }
            });

            if(element) {
                element.classList.add('active');
                let index = Array.from(element.parentElement.children).indexOf(element);
                // Adjust index for mobile tabs since friends is injected in the middle (index 2)
                if(element.classList.contains('nav-btn')) {
                    let mobileIndex = index >= 2 ? index + 1 : index; 
                    const mobileTab = document.querySelectorAll('.bottom-tab')[mobileIndex];
                    if(mobileTab) mobileTab.classList.add('active');
                }
            }
            contentHolder.innerHTML = `<div style="display:flex; justify-content:center; align-items:center; height:100%; color:var(--text-dim);">القسم جاهز للبرمجة (${titles[pageName]})</div>`;
        }
    </script>
</body>
</html>
