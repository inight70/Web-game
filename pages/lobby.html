<style>
    .lobby-master-container { max-width: 950px; margin: 0 auto; padding: 20px 10px 90px 10px; animation: smoothFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes spinFast { 100% { transform: rotate(360deg); } }
    .animate-spin { animation: spinFast 1s linear infinite; display: inline-block; }

    /* =========================================
       1. الهيدر الفني النظيف (Clean Art Header)
       ========================================= */
    .premium-lobby-header {
        background-image: url('assets/images/lobby-header-bg.jpg');
        background-color: var(--surface-panel); /* لون احتياطي */
        background-size: cover; background-position: center;
        border-radius: 12px; /* زوايا حادة وأنيقة */
        position: relative; overflow: hidden;
        margin-bottom: 30px; box-shadow: 0 15px 30px rgba(0,0,0,0.4);
    }
    
    /* طبقة تظليل خفيفة جداً لتحسين قراءة النصوص بدون تشويه الصورة */
    .premium-lobby-header::before { 
        content: ''; position: absolute; inset: 0; 
        background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.8) 100%); 
        z-index: 1; pointer-events: none;
    }

    .header-content-wrapper {
        position: relative; z-index: 2; width: 100%; height: 100%;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
    }

    /* عنوان اللعبة في المنتصف */
    .lobby-game-title {
        font-size: 3.5rem; font-weight: 900; color: white; font-family: var(--font-en);
        letter-spacing: 8px; text-transform: uppercase; text-shadow: 0 4px 15px rgba(0,0,0,0.9);
        margin: 0; padding: 0;
    }

    /* نص الانتظار السفلي (بدون مربعات) */
    .lobby-waiting-text {
        position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
        font-size: 0.85rem; font-weight: 700; color: rgba(255,255,255,0.7); letter-spacing: 1px;
        text-shadow: 0 2px 5px rgba(0,0,0,0.8); white-space: nowrap;
    }

    /* العناصر في أقصى اليسار */
    .lobby-header-left-zone {
        position: absolute; left: 30px; top: 50%; transform: translateY(-50%);
        display: flex; flex-direction: column; gap: 20px; align-items: flex-start;
    }

    .room-data-block { display: flex; flex-direction: column; gap: 4px; }
    .block-label { font-size: 0.65rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
    
    .code-display { 
        font-size: 1.8rem; color: white; font-weight: 900; font-family: var(--font-en); 
        letter-spacing: 4px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; 
        text-shadow: 0 2px 10px rgba(0,0,0,0.8); 
    }
    .code-display:hover { color: var(--accent-red); }
    
    .settings-btn { 
        background: transparent; border: none; color: white; font-size: 0.95rem; font-weight: 800; 
        cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; padding: 0; 
        text-shadow: 0 2px 5px rgba(0,0,0,0.8); -webkit-tap-highlight-color: transparent;
    }
    .settings-btn:hover { color: var(--accent-red); }

    /* =========================================
       2. شبكة اللاعبين ومربع الشخصية
       ========================================= */
    .lobby-section-title { font-size: 1rem; font-weight: 900; color: rgba(255,255,255,0.5); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
    .emblems-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }

    /* الحاوية الجامعة: في اللغة العربية (RTL)، العنصر الأول يمين، والثاني يسار */
    .player-slot-combo { display: flex; align-items: stretch; gap: 8px; position: relative; transition: 0.3s; }
    .player-slot-combo:hover { transform: translateY(-2px); }

    /* غلاف الأمبلم يأخذ باقي المساحة وارتفاعه 100% ليتبع الأب */
    .emblem-fluid-wrapper { flex: 1; min-width: 0; position: relative; }

    /* مربع الشخصية (على اليسار) - محاذاة تامة للمحتوى */
    .character-select-box {
        background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
        border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 6px;
        cursor: pointer; transition: 0.3s; flex-shrink: 0; box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
    }
    .character-select-box:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); }
    .character-select-box i { font-size: 1.8rem; color: rgba(255,255,255,0.3); transition: 0.3s; display: block; }
    .character-select-box:hover i { color: var(--accent-red); transform: scale(1.1); }
    .char-box-label { font-size: 0.65rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; display: block; text-align: center; }

    /* أيقونة المالك (صغيرة ودائرة مثالية) */
    .host-badge-circle { 
        position: absolute; top: -8px; right: -8px; z-index: 10; 
        background: var(--surface-panel); width: 22px; height: 22px; border-radius: 50%; 
        display: flex; justify-content: center; align-items: center; 
        box-shadow: 0 2px 8px rgba(0,0,0,0.8); border: 1px solid rgba(255,215,0,0.3);
    }
    .host-badge-circle i { font-size: 0.8rem; color: gold; filter: drop-shadow(0 0 2px rgba(255,215,0,0.5)); }

    /* المكان الفارغ */
    .empty-emblem-slot {
        border-radius: 12px; background: transparent; border: 1px dashed rgba(255,255,255,0.15);
        display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
        color: rgba(255,255,255,0.4); transition: 0.3s; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .empty-emblem-slot:hover { background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.4); color: white; }

    /* =========================================
       3. أزرار التحكم السفلية (AAA Esports Style)
       ========================================= */
    .lobby-bottom-actions { display: flex; gap: 15px; margin-top: 10px; }
    
    .btn-ready-master {
        flex: 3; background: transparent; border: 2px solid rgba(255,255,255,0.1); color: white;
        padding: 18px; border-radius: 8px; font-weight: 900; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px;
        cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; gap: 10px;
    }
    /* خط جانبي يعطي طابعاً احترافياً */
    .btn-ready-master::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--text-dim); transition: 0.3s; }
    .btn-ready-master:hover { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.3); }
    .btn-ready-master:active { transform: scale(0.98); }
    
    .btn-ready-master.is-ready { border-color: var(--accent-green); background: rgba(46, 204, 113, 0.05); color: var(--accent-green); }
    .btn-ready-master.is-ready::before { background: var(--accent-green); width: 6px; }
    
    .btn-leave-master {
        flex: 1; background: transparent; border: 2px solid rgba(255, 76, 106, 0.2); color: var(--accent-red);
        padding: 18px; border-radius: 8px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s;
        display: flex; justify-content: center; align-items: center;
    }
    .btn-leave-master:hover { background: var(--accent-red); color: white; border-color: var(--accent-red); }
    .btn-leave-master:active { transform: scale(0.98); }

    /* =========================================
       4. الاستجابة والمقاسات (Responsive Scaling)
       ========================================= */
    @media (min-width: 769px) {
        /* سطح المكتب: تكبير ملحوظ للأمبلم والمربع */
        .premium-lobby-header { min-height: 240px; }
        .player-slot-combo, .empty-emblem-slot { height: 105px; } 
        .character-select-box { width: 95px; } 
    }

    @media (max-width: 768px) {
        /* الجوال: الهيدر مستطيل عريض، والأمبلم بحجمه الأصلي، ومربع الشخصية أعرض قليلاً ومحاذى تماماً */
        .premium-lobby-header { min-height: 140px; padding: 15px 20px; border-radius: 8px; }
        .lobby-game-title { font-size: 2.2rem; letter-spacing: 5px; }
        .lobby-header-left-zone { left: 15px; gap: 15px; }
        .code-display { font-size: 1.3rem; }
        .settings-btn { font-size: 0.85rem; }
        
        .emblems-grid { grid-template-columns: 1fr; }
        
        /* ضبط الارتفاعات للجوال */
        .player-slot-combo, .empty-emblem-slot { height: 85px; }
        .character-select-box { width: 85px; gap: 4px; } /* أعرض قليلاً ومحاذاة مثالية */
        .character-select-box i { font-size: 1.5rem; }
        .char-box-label { font-size: 0.6rem; }
        
        .lobby-bottom-actions { flex-direction: column; }
        .btn-ready-master, .btn-leave-master { width: 100%; flex: none; }
    }

    /* النوافذ المخصصة (Modals) */
    .game-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 100000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s ease; padding: 15px; }
    .game-modal-overlay.show { opacity: 1; visibility: visible; }
    .game-modal-card { background: var(--surface-panel); width: 100%; max-width: 420px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 30px 60px rgba(0,0,0,0.8); display: flex; flex-direction: column; overflow: hidden; transform: scale(0.9) translateY(20px); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .game-modal-overlay.show .game-modal-card { transform: scale(1) translateY(0); }

    .leave-content { padding: 40px 30px; text-align: center; }
    .leave-title { font-size: 1.5rem; font-weight: 900; color: white; margin-bottom: 10px; }
    .leave-desc { font-size: 0.95rem; color: var(--text-dim); font-weight: 600; line-height: 1.6; margin-bottom: 30px; }
    .leave-actions { display: flex; gap: 15px; }
    .btn-cancel-leave { flex: 1; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.3s; }
    .btn-cancel-leave:hover { background: rgba(255,255,255,0.1); }
    .btn-confirm-leave { flex: 1; background: transparent; color: var(--accent-red); border: 2px solid var(--accent-red); padding: 14px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.3s; }
    .btn-confirm-leave:hover { background: var(--accent-red); color: white; }

    .modal-header { padding: 20px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); }
    .modal-title { font-size: 1.1rem; font-weight: 900; color: white; text-transform: uppercase; letter-spacing: 1px; }
    .btn-close-modal { background: transparent; border: none; color: var(--text-dim); font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
    .btn-close-modal:hover { color: var(--accent-red); transform: rotate(90deg); }

    .character-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
    .char-item { aspect-ratio: 1; background: var(--bg-base); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; display: flex; justify-content: center; align-items: center; color: var(--text-dim); cursor: not-allowed; transition: 0.3s; }
    .char-item:hover { border-color: rgba(255,255,255,0.2); color: white; }

    .invite-list-wrapper { padding: 15px; max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; scrollbar-width: none; }
    .friend-invite-row { display: flex; align-items: center; justify-content: space-between; background: var(--bg-base); padding: 12px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03); transition: 0.3s; cursor: pointer; }
    .friend-invite-row:hover { border-color: rgba(255,255,255,0.1); background: rgba(255,255,255,0.02); }
    .friend-info-mini { display: flex; align-items: center; gap: 12px; }
    .friend-av-mini { width: 40px; height: 40px; border-radius: 50%; background: var(--surface-panel); display: flex; justify-content: center; align-items: center; font-weight: bold; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
    .friend-av-mini img { width: 100%; height: 100%; object-fit: cover; }
    .friend-name-mini { font-size: 1rem; font-weight: 800; color: var(--text-main); font-family: var(--font-en); }
    .custom-checkbox { width: 22px; height: 22px; border-radius: 6px; border: 2px solid rgba(255,255,255,0.2); display: flex; justify-content: center; align-items: center; transition: 0.2s; color: transparent; font-size: 0.8rem; }
    .friend-invite-row.selected .custom-checkbox { background: var(--accent-red); border-color: var(--accent-red); color: white; }

    .modal-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2); display: flex; gap: 10px; }
    .btn-select-all { flex: 1; background: transparent; color: var(--text-main); border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.3s; }
    .btn-select-all:hover { background: rgba(255,255,255,0.05); }
    .btn-send-invites { flex: 2; background: var(--accent-red); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s; }
</style>

<div class="lobby-master-container">
    
    <div class="premium-lobby-header">
        
        <div class="header-content-wrapper">
            <h1 class="lobby-game-title">Deception</h1>
        </div>

        <div class="lobby-waiting-text" id="player-count-text">
            بانتظار اللاعبين... (0/6)
        </div>

        <div class="lobby-header-left-zone">
            <div class="room-data-block" onclick="copyRoomCode()">
                <span class="block-label">كود اللعبة</span>
                <span class="code-display" id="dynamic-room-code">---- <i class="ph-bold ph-copy" style="font-size:1.2rem; color:var(--text-dim);"></i></span>
            </div>
            
            <div class="room-data-block">
                <button class="settings-btn" onclick="openSettingsModal()">
                    <i class="ph-bold ph-sliders-horizontal"></i> إعدادات اللعبة
                </button>
            </div>
        </div>
    </div>

    <div class="lobby-section-title">فريق العمليات</div>
    <div class="emblems-grid" id="lobby-players-grid">
        <div style="text-align:center; padding: 20px; color:var(--text-dim); width:100%; grid-column: span 2;">
            <i class="ph-bold ph-spinner animate-spin" style="font-size:2rem;"></i> جاري التحميل...
        </div>
    </div>

    <div class="lobby-bottom-actions">
        <button class="btn-ready-master" id="btn-ready-action" onclick="toggleReadyState()">تأكيد الجاهزية</button>
        <button class="btn-leave-master" onclick="openLeaveModal()">مغادرة</button>
    </div>

</div>

<div class="game-modal-overlay" id="custom-leave-modal">
    <div class="game-modal-card">
        <div class="leave-content">
            <h3 class="leave-title">مغادرة الغرفة؟</h3>
            <p class="leave-desc">إذا غادرت الآن، ستفقد مكانك في التشكيلة.</p>
            <div class="leave-actions">
                <button class="btn-cancel-leave" onclick="closeLeaveModal()">إلغاء</button>
                <button class="btn-confirm-leave" onclick="executeLeaveRoom()">مغادرة</button>
            </div>
        </div>
    </div>
</div>

<div class="game-modal-overlay" id="character-select-modal" onclick="if(event.target === this) closeCharModal()">
    <div class="game-modal-card">
        <div class="modal-header">
            <div class="modal-title">اختيار الشخصية</div>
            <button class="btn-close-modal" onclick="closeCharModal()"><i class="ph-bold ph-x"></i></button>
        </div>
        <div class="character-grid">
            <div class="char-item"><i class="ph-duotone ph-lock-key"></i></div>
            <div class="char-item"><i class="ph-duotone ph-lock-key"></i></div>
            <div class="char-item"><i class="ph-duotone ph-lock-key"></i></div>
            <div class="char-item"><i class="ph-duotone ph-lock-key"></i></div>
            <div class="char-item"><i class="ph-duotone ph-lock-key"></i></div>
            <div class="char-item"><i class="ph-duotone ph-lock-key"></i></div>
        </div>
    </div>
</div>

<div class="game-modal-overlay" id="invite-friends-modal" onclick="if(event.target === this) closeInviteModal()">
    <div class="game-modal-card">
        <div class="modal-header">
            <div class="modal-title">دعوة الأصدقاء</div>
            <button class="btn-close-modal" onclick="closeInviteModal()"><i class="ph-bold ph-x"></i></button>
        </div>
        <div class="invite-list-wrapper" id="invite-friends-list"></div>
        <div class="modal-footer">
            <button class="btn-select-all" id="btn-select-all" onclick="toggleSelectAllFriends()">تحديد الكل</button>
            <button class="btn-send-invites" id="btn-send-inv-submit" onclick="sendInvitesToSelected()">إرسال الدعوات</button>
        </div>
    </div>
</div>

<script>
    window.fetchAndRenderLobbyPlayers = function() {
        if (!window.currentRoomData || !window.UI_COMPONENTS) return;

        document.getElementById('dynamic-room-code').innerHTML = `${window.currentRoomData.id} <i class="ph-bold ph-copy" style="font-size:1.2rem; color:var(--text-dim);"></i>`;
        
        const playersArray = window.currentRoomData.players || [];
        const maxPlayers = window.currentRoomData.maxPlayers || 6;
        document.getElementById('player-count-text').innerText = `بانتظار اللاعبين... (${playersArray.length}/${maxPlayers})`;

        const grid = document.getElementById('lobby-players-grid');
        grid.innerHTML = ''; 

        playersArray.forEach(pName => {
            let pData = window.lobbyPlayersCache[pName] || window.friendsCache[pName] || { username: pName };
            
            // الأمبلم الصافي (يأخذ ارتفاع 100% من الأب)
            let emblem = window.UI_COMPONENTS.buildEmblemCard(pData, "100%", true);
            
            // علامة المالك الدائرية الدقيقة
            let hostMark = (window.currentRoomData.hostId === pData.uid || pName === playersArray[0]) ? 
                `<div class="host-badge-circle"><i class="ph-fill ph-crown"></i></div>` : '';

            // الترتيب: مربع الشخصية يسار (يعني ثانياً في الـ DOM لأن اتجاه الصفحة RTL)
            grid.innerHTML += `
                <div class="player-slot-combo">
                    <div class="emblem-fluid-wrapper">
                        ${hostMark}
                        ${emblem}
                    </div>
                    <div class="character-select-box" onclick="openCharModal()">
                        <i class="ph-duotone ph-user"></i>
                        <span class="char-box-label">الشخصية</span>
                    </div>
                </div>
            `;
        });

        const emptyCount = maxPlayers - playersArray.length;
        for(let i=0; i<emptyCount; i++) {
            grid.innerHTML += `
                <div class="empty-emblem-slot" onclick="openInviteModal()">
                    <i class="ph-bold ph-plus"></i>
                </div>
            `;
        }
    };

    function copyRoomCode() {
        const codeText = window.currentRoomData ? window.currentRoomData.id : '';
        if(!codeText) return;
        navigator.clipboard.writeText(codeText);
        const display = document.getElementById('dynamic-room-code');
        display.innerHTML = `${codeText} <i class="ph-bold ph-check" style="font-size:1.2rem; color:var(--accent-green);"></i>`;
        setTimeout(() => { display.innerHTML = `${codeText} <i class="ph-bold ph-copy" style="font-size:1.2rem; color:var(--text-dim);"></i>`; }, 2000);
    }

    function toggleReadyState() {
        const btn = document.getElementById('btn-ready-action');
        btn.classList.toggle('is-ready');
        if (btn.classList.contains('is-ready')) {
            btn.innerText = `بانتظار البقية`;
        } else {
            btn.innerText = `تأكيد الجاهزية`;
        }
    }

    function openSettingsModal() { alert("سيتم فتح نافذة إعدادات الغرفة هنا."); }
    function openLeaveModal() { document.getElementById('custom-leave-modal').classList.add('show'); }
    function closeLeaveModal() { document.getElementById('custom-leave-modal').classList.remove('show'); }
    function executeLeaveRoom() { closeLeaveModal(); if(window.leaveFirebaseRoom) window.leaveFirebaseRoom(); }
    function openCharModal() { document.getElementById('character-select-modal').classList.add('show'); }
    function closeCharModal() { document.getElementById('character-select-modal').classList.remove('show'); }

    window.selectedFriendsToInvite = new Set();
    function openInviteModal() {
        const modal = document.getElementById('invite-friends-modal');
        const listContainer = document.getElementById('invite-friends-list');
        window.selectedFriendsToInvite.clear(); updateSelectAllBtnText();
        const friendsArray = (window.currentUserData && Array.isArray(window.currentUserData.friends)) ? window.currentUserData.friends : [];
        const currentPlayers = window.currentRoomData ? window.currentRoomData.players : [];
        
        if (friendsArray.length === 0) {
            listContainer.innerHTML = `<div style="text-align:center; padding: 40px 20px; color: var(--text-dim);">لا يوجد أصدقاء لدعوتهم.</div>`;
        } else {
            let html = '';
            friendsArray.forEach(fName => {
                if(currentPlayers.includes(fName.toLowerCase())) return; 
                const fData = window.friendsCache[fName] || { username: fName };
                const safeName = fData.username || fName;
                let avHtml = `<span>${safeName.charAt(0).toUpperCase()}</span>`;
                if(fData.avatar) avHtml = `<img src="${fData.avatar}">`;
                html += `<div class="friend-invite-row" onclick="toggleFriendSelection(this, '${fName}')" data-fname="${fName}"><div class="friend-info-mini"><div class="friend-av-mini">${avHtml}</div><div class="friend-name-mini">${safeName}</div></div><div class="custom-checkbox"><i class="ph-bold ph-check"></i></div></div>`;
            });
            if(html === '') html = `<div style="text-align:center; padding: 40px 20px; color: var(--text-dim);">جميع أصدقائك في الغرفة بالفعل!</div>`;
            listContainer.innerHTML = html;
        }
        modal.classList.add('show');
    }

    function closeInviteModal() { document.getElementById('invite-friends-modal').classList.remove('show'); }
    function toggleFriendSelection(rowElement, friendName) { if (window.selectedFriendsToInvite.has(friendName)) { window.selectedFriendsToInvite.delete(friendName); rowElement.classList.remove('selected'); } else { window.selectedFriendsToInvite.add(friendName); rowElement.classList.add('selected'); } updateSelectAllBtnText(); }
    function toggleSelectAllFriends() { const rows = document.querySelectorAll('.friend-invite-row'); if (rows.length === 0) return; if (window.selectedFriendsToInvite.size === rows.length) { window.selectedFriendsToInvite.clear(); rows.forEach(r => r.classList.remove('selected')); } else { rows.forEach(r => { const fname = r.getAttribute('data-fname'); window.selectedFriendsToInvite.add(fname); r.classList.add('selected'); }); } updateSelectAllBtnText(); }
    function updateSelectAllBtnText() { const rows = document.querySelectorAll('.friend-invite-row'); const btn = document.getElementById('btn-select-all'); if(rows.length === 0) return; if (window.selectedFriendsToInvite.size === rows.length) { btn.innerText = "إلغاء التحديد"; btn.style.color = "var(--accent-red)"; } else { btn.innerText = "تحديد الكل"; btn.style.color = "var(--text-main)"; } }

    async function sendInvitesToSelected() {
        if (window.selectedFriendsToInvite.size === 0) return;
        const btn = document.getElementById('btn-send-inv-submit');
        btn.innerHTML = 'جاري الإرسال...'; btn.disabled = true;
        try {
            const { getDocs, query, collection, where, updateDoc, doc, arrayUnion } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
            const friendsArray = Array.from(window.selectedFriendsToInvite).map(f => f.toLowerCase());
            const q = query(collection(window.dbInstance, "users"), where("username_lower", "in", friendsArray));
            const snap = await getDocs(q);
            const inviteData = { roomId: window.currentRoomId, hostName: window.currentUserData.username, timestamp: Date.now() };
            snap.forEach(async (d) => { await updateDoc(doc(window.dbInstance, "users", d.id), { gameInvites: arrayUnion(inviteData) }); });
            closeInviteModal();
            const btnReady = document.getElementById('btn-ready-action'); const originalReadyText = btnReady.innerHTML;
            btnReady.innerHTML = `تم إرسال الدعوات`;
            setTimeout(() => { btnReady.innerHTML = originalReadyText; }, 3000);
        } catch (e) { alert("حدث خطأ أثناء الإرسال"); } finally { btn.innerHTML = 'إرسال الدعوات'; btn.disabled = false; }
    }

    if (window.currentRoomId) { window.listenToRoom(); }
</script>
