<style>
    .lobby-master-container { max-width: 1000px; margin: 0 auto; padding: 20px 10px 90px 10px; animation: smoothFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes spinFast { 100% { transform: rotate(360deg); } }
    .animate-spin { animation: spinFast 1s linear infinite; display: inline-block; }

    /* =========================================
       1. الهيدر النظيف والاحترافي (AAA UI)
       ========================================= */
    .premium-lobby-header {
        background-image: url('assets/images/lobby-header-bg.jpg');
        background-size: cover; background-position: center;
        border-radius: 16px; 
        position: relative; overflow: hidden;
        min-height: 220px; margin-bottom: 30px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    
    /* نص الانتظار في الأسفل بدون إطارات */
    .waiting-text-simple {
        position: absolute; bottom: 20px; right: 30px;
        font-size: 1rem; font-weight: 800; color: white;
        text-shadow: 0 2px 5px rgba(0,0,0,0.9);
        display: flex; align-items: center; gap: 8px;
    }

    /* قسم اليسار (الكود والإعدادات) */
    .header-left-controls {
        position: absolute; left: 30px; top: 50%; transform: translateY(-50%);
        display: flex; flex-direction: column; align-items: flex-start; gap: 10px;
    }

    /* مربع الكود الأنيق */
    .esports-code-box {
        background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        padding: 8px 20px; border-radius: 10px; display: flex; align-items: center; gap: 12px;
        cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05);
    }
    .esports-code-box:hover { border-color: var(--accent-red); background: rgba(0,0,0,0.85); }
    .code-value { font-size: 1.8rem; font-weight: 900; color: white; font-family: var(--font-en); letter-spacing: 4px; line-height: 1; }
    .copy-icon { color: var(--text-dim); font-size: 1.1rem; transition: 0.3s; }
    .esports-code-box:hover .copy-icon { color: var(--accent-red); }

    /* زر الإعدادات النصي */
    .settings-text-btn {
        font-size: 0.9rem; font-weight: 800; color: rgba(255,255,255,0.8);
        cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 6px;
        text-shadow: 0 2px 4px rgba(0,0,0,0.8); margin-left: 5px; -webkit-tap-highlight-color: transparent;
    }
    .settings-text-btn:hover { color: var(--accent-red); }

    /* =========================================
       2. شبكة اللاعبين (تكبير الأمبلم وترتيب العناصر)
       ========================================= */
    .lobby-section-title { font-size: 1rem; font-weight: 900; color: var(--text-dim); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
    .emblems-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 40px; }

    /* الحاوية: الأمبلم على اليمين، ومربع الشخصية على اليسار */
    .player-slot-combo { display: flex; align-items: stretch; gap: 12px; position: relative; transition: 0.3s; }
    
    .emblem-fluid-wrapper { flex: 1; min-width: 0; position: relative; }

    /* أيقونة المالك (صغيرة جداً ودائرية بالكامل) */
    .host-star-wrapper { 
        position: absolute; top: -6px; right: -6px; z-index: 10; 
        background: var(--bg-base); width: 22px; height: 22px; border-radius: 50%; 
        display: flex; justify-content: center; align-items: center; 
        box-shadow: 0 2px 5px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1);
    }
    .host-star-wrapper i { font-size: 0.8rem; color: var(--accent-red); }

    /* مربع الشخصية (اليسار - أعرض وأيقونة بالمنتصف) */
    .character-select-box {
        width: 85px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05);
        border-radius: 16px; display: flex; justify-content: center; align-items: center;
        cursor: pointer; transition: 0.3s; flex-shrink: 0; box-shadow: inset 0 0 15px rgba(0,0,0,0.3);
    }
    .character-select-box:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); }
    .character-select-box i { font-size: 1.8rem; color: rgba(255,255,255,0.15); transition: 0.3s; }
    .character-select-box:hover i { color: var(--accent-red); transform: scale(1.1); }

    /* المكان الفارغ */
    .empty-emblem-slot {
        height: 95px; border-radius: 16px; background: transparent; border: 1px dashed rgba(255,255,255,0.2);
        display: flex; justify-content: center; align-items: center; color: rgba(255,255,255,0.3); 
        transition: 0.3s; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .empty-emblem-slot:hover { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.5); color: white; }
    .empty-emblem-slot i { font-size: 2rem; }

    /* =========================================
       3. أزرار التحكم السفلية (النظيفة والحديثة)
       ========================================= */
    .lobby-bottom-actions { display: flex; gap: 20px; }
    
    .btn-ready-master { 
        flex: 1; background: white; color: var(--bg-base); border: none; padding: 18px; 
        border-radius: 14px; font-weight: 900; font-size: 1.1rem; cursor: pointer; 
        transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: flex; justify-content: center; align-items: center; gap: 10px; 
    }
    .btn-ready-master:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255,255,255,0.2); }
    .btn-ready-master.is-ready { background: var(--accent-red); color: white; box-shadow: 0 10px 25px rgba(255, 76, 106, 0.4); }
    .btn-ready-master:active { transform: scale(0.98); }
    
    .btn-leave-master { 
        background: transparent; color: var(--text-dim); padding: 18px 35px; border-radius: 14px; 
        font-weight: 800; font-size: 1rem; border: 1px solid rgba(255,255,255,0.15); cursor: pointer; 
        transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; 
    }
    .btn-leave-master:hover { background: rgba(255,76,106,0.1); color: var(--accent-red); border-color: rgba(255,76,106,0.3); }

    /* =========================================
       4. النوافذ المنبثقة
       ========================================= */
    .game-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 100000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s ease; padding: 15px; }
    .game-modal-overlay.show { opacity: 1; visibility: visible; }
    .game-modal-card { background: var(--surface-panel); width: 100%; max-width: 420px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 30px 60px rgba(0,0,0,0.8); display: flex; flex-direction: column; overflow: hidden; transform: scale(0.9) translateY(20px); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .game-modal-overlay.show .game-modal-card { transform: scale(1) translateY(0); }

    /* المغادرة */
    .leave-content { padding: 40px 30px; text-align: center; }
    .leave-title { font-size: 1.4rem; font-weight: 900; color: white; margin-bottom: 10px; }
    .leave-desc { font-size: 0.95rem; color: var(--text-dim); margin-bottom: 30px; }
    .leave-actions { display: flex; gap: 15px; }
    .btn-cancel-leave { flex: 1; background: rgba(255,255,255,0.05); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; }
    .btn-cancel-leave:hover { background: rgba(255,255,255,0.1); }
    .btn-confirm-leave { flex: 1; background: var(--accent-red); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; }

    /* الدعوة واختيار الشخصية */
    .modal-header { padding: 20px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-size: 1.1rem; font-weight: 900; color: white; display: flex; align-items: center; gap: 10px; }
    .btn-close-modal { background: rgba(255,255,255,0.05); border: none; color: var(--text-dim); width: 34px; height: 34px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; }
    .btn-close-modal:hover { background: rgba(255,76,106,0.1); color: var(--accent-red); }

    .invite-list-wrapper { padding: 15px; max-height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; scrollbar-width: none; }
    .friend-invite-row { display: flex; align-items: center; justify-content: space-between; background: var(--bg-base); padding: 12px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03); transition: 0.3s; cursor: pointer; }
    .friend-invite-row:hover { border-color: rgba(255,255,255,0.1); }
    .friend-info-mini { display: flex; align-items: center; gap: 12px; }
    .friend-av-mini { width: 40px; height: 40px; border-radius: 50%; background: var(--surface-panel); display: flex; justify-content: center; align-items: center; font-weight: bold; overflow: hidden; }
    .friend-av-mini img { width: 100%; height: 100%; object-fit: cover; }
    .friend-name-mini { font-size: 0.95rem; font-weight: 800; color: var(--text-main); font-family: var(--font-en); }
    .custom-checkbox { width: 22px; height: 22px; border-radius: 6px; border: 2px solid rgba(255,255,255,0.2); display: flex; justify-content: center; align-items: center; transition: 0.2s; color: transparent; font-size: 0.8rem; }
    .friend-invite-row.selected .custom-checkbox { background: var(--accent-red); border-color: var(--accent-red); color: white; }

    .modal-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 10px; }
    .btn-select-all { flex: 1; background: var(--surface-panel); color: var(--text-main); border: none; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; }
    .btn-send-invites { flex: 2; background: var(--accent-red); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s; }

    .character-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
    .char-item { aspect-ratio: 1; background: var(--bg-base); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; display: flex; justify-content: center; align-items: center; color: rgba(255,255,255,0.2); cursor: not-allowed; }

    /* =========================================
       5. استجابة الجوال (مستطيل عريض وضبط المسافات)
       ========================================= */
    @media (max-width: 768px) {
        .emblems-grid { grid-template-columns: 1fr; gap: 15px; }
        
        /* جعل الهيدر مستطيلاً عريضاً في الجوال */
        .premium-lobby-header { min-height: 130px; padding: 20px; aspect-ratio: 21/9; margin-bottom: 20px; border-radius: 12px; }
        
        .waiting-text-simple { bottom: 15px; right: 20px; font-size: 0.85rem; }
        .header-left-controls { left: 20px; gap: 8px; }
        .code-value { font-size: 1.4rem; }
        .esports-code-box { padding: 6px 15px; }
        
        /* تضبيط صندوق الشخصية ليكون أعرض قليلاً في الجوال والأيقونة بالمنتصف تماماً */
        .character-select-box { width: 80px; }
        
        .lobby-bottom-actions { flex-direction: column; gap: 10px; }
        .btn-leave-master { padding: 16px; }
    }
</style>

<div class="lobby-master-container">
    
    <div class="premium-lobby-header">
        
        <div class="waiting-text-simple">
            <i class="ph-bold ph-spinner animate-spin"></i> بانتظار اللاعبين... (<span id="player-count-text">0/6</span>)
        </div>

        <div class="header-left-controls">
            <div class="esports-code-box" onclick="copyRoomCode()">
                <span class="code-value" id="dynamic-room-code">----</span>
                <i class="ph-bold ph-copy copy-icon"></i>
            </div>
            <div class="settings-text-btn" onclick="openSettingsModal()">
                <i class="ph-fill ph-sliders-horizontal"></i> إعدادات اللعبة
            </div>
        </div>

    </div>

    <div class="lobby-section-title">الفريق</div>
    <div class="emblems-grid" id="lobby-players-grid">
        <div style="text-align:center; padding: 20px; color:var(--text-dim); width:100%; grid-column: span 2;">
            <i class="ph-bold ph-spinner animate-spin" style="font-size:2rem;"></i> جاري تحميل الغرفة...
        </div>
    </div>

    <div class="lobby-bottom-actions">
        <button class="btn-ready-master" id="btn-ready-action" onclick="toggleReadyState()">
            تأكيد الجاهزية
        </button>
        <button class="btn-leave-master" onclick="openLeaveModal()">
            مغادرة <i class="ph-bold ph-sign-out"></i>
        </button>
    </div>

</div>

<div class="game-modal-overlay" id="custom-leave-modal">
    <div class="game-modal-card">
        <div class="leave-content">
            <h3 class="leave-title">مغادرة الغرفة؟</h3>
            <p class="leave-desc">سيتم خروجك من اللوبي الحالي.</p>
            <div class="leave-actions">
                <button class="btn-cancel-leave" onclick="closeLeaveModal()">إلغاء</button>
                <button class="btn-confirm-leave" onclick="executeLeaveRoom()">مغادرة</button>
            </div>
        </div>
    </div>
</div>

<div class="game-modal-overlay" id="character-select-modal" onclick="if(event.target === this) closeCharModal()">
    <div class="game-modal-card">
        <div class="modal-header">
            <div class="modal-title">اختيار الشخصية</div>
            <button class="btn-close-modal" onclick="closeCharModal()"><i class="ph-bold ph-x"></i></button>
        </div>
        <div class="character-grid">
            <div class="char-item"><i class="ph-duotone ph-lock-key"></i></div>
            <div class="char-item"><i class="ph-duotone ph-lock-key"></i></div>
            <div class="char-item"><i class="ph-duotone ph-lock-key"></i></div>
            <div class="char-item"><i class="ph-duotone ph-lock-key"></i></div>
            <div class="char-item"><i class="ph-duotone ph-lock-key"></i></div>
            <div class="char-item"><i class="ph-duotone ph-lock-key"></i></div>
        </div>
    </div>
</div>

<div class="game-modal-overlay" id="invite-friends-modal" onclick="if(event.target === this) closeInviteModal()">
    <div class="game-modal-card">
        <div class="modal-header">
            <div class="modal-title"><i class="ph-fill ph-users-three" style="color: var(--accent-red);"></i> دعوة الأصدقاء</div>
            <button class="btn-close-modal" onclick="closeInviteModal()"><i class="ph-bold ph-x"></i></button>
        </div>
        <div class="invite-list-wrapper" id="invite-friends-list"></div>
        <div class="modal-footer">
            <button class="btn-select-all" id="btn-select-all" onclick="toggleSelectAllFriends()">تحديد الكل</button>
            <button class="btn-send-invites" id="btn-send-inv-submit" onclick="sendInvitesToSelected()">إرسال الدعوات</button>
        </div>
    </div>
</div>

<script>
    window.fetchAndRenderLobbyPlayers = function() {
        if (!window.currentRoomData || !window.UI_COMPONENTS) return;

        document.getElementById('dynamic-room-code').innerText = window.currentRoomData.id;
        
        const playersArray = window.currentRoomData.players || [];
        const maxPlayers = window.currentRoomData.maxPlayers || 6;
        document.getElementById('player-count-text').innerText = `${playersArray.length}/${maxPlayers}`;

        const grid = document.getElementById('lobby-players-grid');
        grid.innerHTML = ''; 

        playersArray.forEach(pName => {
            let pData = window.lobbyPlayersCache[pName] || window.friendsCache[pName] || { username: pName };
            
            // زيادة الحجم قليلاً كما طلبت (95px بدلاً من 85)
            let emblem = window.UI_COMPONENTS.buildEmblemCard(pData, "95px", true);
            
            let hostMark = (window.currentRoomData.hostId === pData.uid || pName === playersArray[0]) ? 
                `<div class="host-star-wrapper"><i class="ph-fill ph-star-four"></i></div>` : '';

            // الترتيب: الأمبلم يمين، مربع الشخصية يسار (باستخدام flex-direction الافتراضي في بيئة RTL)
            grid.innerHTML += `
                <div class="player-slot-combo">
                    <div class="emblem-fluid-wrapper">
                        ${hostMark}
                        ${emblem}
                    </div>
                    <div class="character-select-box" onclick="openCharModal()">
                        <i class="ph-duotone ph-user"></i>
                    </div>
                </div>
            `;
        });

        const emptyCount = maxPlayers - playersArray.length;
        for(let i=0; i<emptyCount; i++) {
            grid.innerHTML += `
                <div class="empty-emblem-slot" onclick="openInviteModal()">
                    <i class="ph-bold ph-plus"></i>
                </div>
            `;
        }
    };

    function copyRoomCode() {
        const code = document.getElementById('dynamic-room-code').innerText;
        if(code === '----') return;
        navigator.clipboard.writeText(code);
        const icon = document.querySelector('.copy-icon');
        icon.className = 'ph-bold ph-check copy-icon';
        setTimeout(() => { icon.className = 'ph-bold ph-copy copy-icon'; }, 2000);
    }

    function toggleReadyState() {
        const btn = document.getElementById('btn-ready-action');
        btn.classList.toggle('is-ready');
        if (btn.classList.contains('is-ready')) {
            btn.innerHTML = `بانتظار البقية`;
        } else {
            btn.innerHTML = `تأكيد الجاهزية`;
        }
    }

    function openSettingsModal() { alert("نافذة إعدادات اللعبة"); }
    function openLeaveModal() { document.getElementById('custom-leave-modal').classList.add('show'); }
    function closeLeaveModal() { document.getElementById('custom-leave-modal').classList.remove('show'); }
    function executeLeaveRoom() { closeLeaveModal(); if(window.leaveFirebaseRoom) window.leaveFirebaseRoom(); }
    function openCharModal() { document.getElementById('character-select-modal').classList.add('show'); }
    function closeCharModal() { document.getElementById('character-select-modal').classList.remove('show'); }

    /* نظام الدعوات */
    window.selectedFriendsToInvite = new Set();
    function openInviteModal() {
        const modal = document.getElementById('invite-friends-modal');
        const listContainer = document.getElementById('invite-friends-list');
        window.selectedFriendsToInvite.clear(); updateSelectAllBtnText();
        const friendsArray = (window.currentUserData && Array.isArray(window.currentUserData.friends)) ? window.currentUserData.friends : [];
        const currentPlayers = window.currentRoomData ? window.currentRoomData.players : [];
        
        if (friendsArray.length === 0) {
            listContainer.innerHTML = `<div style="text-align:center; padding: 40px 20px; color: var(--text-dim);">لا يوجد أصدقاء لدعوتهم.</div>`;
        } else {
            let html = '';
            friendsArray.forEach(fName => {
                if(currentPlayers.includes(fName.toLowerCase())) return; 
                const fData = window.friendsCache[fName] || { username: fName };
                const safeName = fData.username || fName;
                let avHtml = `<span>${safeName.charAt(0).toUpperCase()}</span>`;
                if(fData.avatar) avHtml = `<img src="${fData.avatar}">`;
                html += `<div class="friend-invite-row" onclick="toggleFriendSelection(this, '${fName}')" data-fname="${fName}"><div class="friend-info-mini"><div class="friend-av-mini">${avHtml}</div><div class="friend-name-mini">${safeName}</div></div><div class="custom-checkbox"><i class="ph-bold ph-check"></i></div></div>`;
            });
            if(html === '') html = `<div style="text-align:center; padding: 40px 20px; color: var(--text-dim);">جميع أصدقائك في الغرفة بالفعل!</div>`;
            listContainer.innerHTML = html;
        }
        modal.classList.add('show');
    }

    function closeInviteModal() { document.getElementById('invite-friends-modal').classList.remove('show'); }
    function toggleFriendSelection(rowElement, friendName) { if (window.selectedFriendsToInvite.has(friendName)) { window.selectedFriendsToInvite.delete(friendName); rowElement.classList.remove('selected'); } else { window.selectedFriendsToInvite.add(friendName); rowElement.classList.add('selected'); } updateSelectAllBtnText(); }
    function toggleSelectAllFriends() { const rows = document.querySelectorAll('.friend-invite-row'); if (rows.length === 0) return; if (window.selectedFriendsToInvite.size === rows.length) { window.selectedFriendsToInvite.clear(); rows.forEach(r => r.classList.remove('selected')); } else { rows.forEach(r => { const fname = r.getAttribute('data-fname'); window.selectedFriendsToInvite.add(fname); r.classList.add('selected'); }); } updateSelectAllBtnText(); }
    function updateSelectAllBtnText() { const rows = document.querySelectorAll('.friend-invite-row'); const btn = document.getElementById('btn-select-all'); if(rows.length === 0) return; if (window.selectedFriendsToInvite.size === rows.length) { btn.innerText = "إلغاء التحديد"; btn.style.color = "var(--accent-red)"; } else { btn.innerText = "تحديد الكل"; btn.style.color = "var(--text-main)"; } }

    async function sendInvitesToSelected() {
        if (window.selectedFriendsToInvite.size === 0) return;
        const btn = document.getElementById('btn-send-inv-submit');
        btn.innerHTML = '<i class="ph-bold ph-spinner ph-spin"></i>'; btn.disabled = true;
        try {
            const { getDocs, query, collection, where, updateDoc, doc, arrayUnion } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
            const friendsArray = Array.from(window.selectedFriendsToInvite).map(f => f.toLowerCase());
            const q = query(collection(window.dbInstance, "users"), where("username_lower", "in", friendsArray));
            const snap = await getDocs(q);
            const inviteData = { roomId: window.currentRoomId, hostName: window.currentUserData.username, timestamp: Date.now() };
            snap.forEach(async (d) => { await updateDoc(doc(window.dbInstance, "users", d.id), { gameInvites: arrayUnion(inviteData) }); });
            closeInviteModal();
        } catch (e) { alert("حدث خطأ"); } finally { btn.innerHTML = 'إرسال الدعوات'; btn.disabled = false; }
    }

    if (window.currentRoomId) { window.listenToRoom(); }
</script>
