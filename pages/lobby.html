<style>
    .lobby-master-container { max-width: 1000px; margin: 0 auto; padding: 15px 15px 90px 15px; animation: smoothFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    /* =========================================
       1. الهيدر الفخم للغرفة (Mission Briefing Style)
       ========================================= */
    .premium-lobby-header {
        background: var(--surface-panel); border-radius: 28px; padding: 2px;
        position: relative; overflow: hidden; margin-bottom: 30px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }
    .premium-lobby-header::before {
        content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
        background: conic-gradient(from 0deg, transparent 0%, rgba(255, 76, 106, 0.2) 30%, transparent 60%);
        animation: rotateGlow 8s linear infinite; z-index: 0; pointer-events: none;
    }
    @keyframes rotateGlow { 100% { transform: rotate(360deg); } }
    
    .header-inner-content {
        background: linear-gradient(180deg, var(--bg-base) 0%, var(--surface-panel) 100%);
        border-radius: 26px; padding: 35px 25px; position: relative; z-index: 1;
        display: flex; flex-direction: column; align-items: center; border: 1px solid rgba(255,255,255,0.05);
    }

    .room-status-badge {
        background: rgba(46, 204, 113, 0.1); color: var(--accent-green); padding: 6px 16px; border-radius: 100px;
        font-size: 0.85rem; font-weight: 800; border: 1px solid rgba(46, 204, 113, 0.3); margin-bottom: 15px;
        display: flex; align-items: center; gap: 8px; box-shadow: 0 0 15px rgba(46, 204, 113, 0.2);
    }

    .code-display-group { text-align: center; }
    .code-label { font-size: 0.8rem; color: var(--text-dim); font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; }
    .code-value-box {
        background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 10px 30px;
        border-radius: 20px; display: inline-flex; align-items: center; gap: 15px; cursor: pointer;
        transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); backdrop-filter: blur(10px);
    }
    .code-value-box:hover { background: rgba(255, 76, 106, 0.1); border-color: var(--accent-red); transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 25px rgba(255, 76, 106, 0.2); }
    .code-text { font-size: 3.5rem; font-weight: 900; color: white; font-family: var(--font-en); letter-spacing: 8px; text-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-right: -8px; }
    .copy-icon { color: var(--accent-red); font-size: 1.8rem; opacity: 0.8; }

    /* =========================================
       2. قائمة اللاعبين بالأمبلمات (Emblems Grid)
       ========================================= */
    .lobby-section-title {
        font-size: 1.2rem; font-weight: 800; color: white; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between;
    }
    .invite-btn-small {
        background: rgba(255, 76, 106, 0.1); color: var(--accent-red); border: 1px solid rgba(255, 76, 106, 0.3);
        padding: 8px 16px; border-radius: 12px; font-weight: 700; font-size: 0.85rem; cursor: pointer;
        transition: 0.3s; display: flex; align-items: center; gap: 6px; -webkit-tap-highlight-color: transparent;
    }
    .invite-btn-small:hover { background: var(--accent-red); color: white; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 76, 106, 0.4); }

    .emblems-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }

    /* مكان اللاعب الفارغ (مصمم ليتطابق مع حجم الأمبلم) */
    .empty-emblem-slot {
        height: 100px; border-radius: 20px; background: rgba(255,255,255,0.02); border: 2px dashed rgba(255,255,255,0.1);
        display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px;
        color: var(--text-dim); transition: 0.3s; position: relative; overflow: hidden;
    }
    .empty-emblem-slot::after {
        content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
        transform: translateX(-100%); animation: shimmer 3s infinite; pointer-events: none;
    }
    @keyframes shimmer { 100% { transform: translateX(100%); } }
    .empty-emblem-slot i { font-size: 2rem; color: rgba(255,255,255,0.2); transition: 0.3s; }
    .empty-emblem-slot span { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

    /* علامة المالك (Host Crown) تضاف فوق الأمبلم */
    .host-crown-wrapper { position: absolute; top: -12px; left: 15px; z-index: 10; animation: bounceGlow 2s infinite alternate; filter: drop-shadow(0 2px 8px rgba(255,215,0,0.6)); }
    @keyframes bounceGlow { 0% { transform: translateY(0); filter: drop-shadow(0 2px 5px rgba(255,215,0,0.4)); } 100% { transform: translateY(-3px); filter: drop-shadow(0 5px 15px rgba(255,215,0,0.8)); } }

    /* =========================================
       3. أزرار التحكم السفلية
       ========================================= */
    .lobby-bottom-actions { display: flex; gap: 15px; }
    .btn-ready-master {
        flex: 2; background: linear-gradient(135deg, var(--accent-green) 0%, #27ae60 100%); color: var(--bg-base);
        padding: 18px; border-radius: 20px; font-weight: 900; font-size: 1.2rem; border: none; cursor: pointer;
        transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 10px 30px rgba(46, 204, 113, 0.3);
        display: flex; justify-content: center; align-items: center; gap: 10px; position: relative; overflow: hidden;
    }
    .btn-ready-master:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 40px rgba(46, 204, 113, 0.5); }
    .btn-ready-master:active { transform: translateY(0) scale(0.98); }
    
    .btn-leave-master {
        flex: 1; background: var(--surface-panel); color: var(--accent-red); padding: 18px; border-radius: 20px;
        font-weight: 800; font-size: 1.1rem; border: 1px solid rgba(255,76,106,0.3); cursor: pointer;
        transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: flex; justify-content: center; align-items: center; gap: 8px;
    }
    .btn-leave-master:hover { background: rgba(255, 76, 106, 0.1); border-color: var(--accent-red); transform: translateY(-3px); }
    .btn-leave-master:active { transform: translateY(0) scale(0.98); }

    /* =========================================
       4. نافذة دعوة الأصدقاء (Invite Modal) المتقدمة
       ========================================= */
    .invite-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 100000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s ease; padding: 15px; }
    .invite-modal-overlay.show { opacity: 1; visibility: visible; }
    .invite-modal-card { background: var(--surface-panel); width: 100%; max-width: 450px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 30px 60px rgba(0,0,0,0.6); display: flex; flex-direction: column; overflow: hidden; transform: scale(0.9) translateY(20px); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); max-height: 85vh; }
    .invite-modal-overlay.show .invite-modal-card { transform: scale(1) translateY(0); }

    .invite-header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); }
    .invite-title { font-size: 1.3rem; font-weight: 800; color: white; display: flex; align-items: center; gap: 10px; }
    .close-invite-btn { background: rgba(255,255,255,0.05); border: none; color: var(--text-dim); width: 34px; height: 34px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; }
    .close-invite-btn:hover { background: rgba(255,76,106,0.1); color: var(--accent-red); transform: rotate(90deg); }

    .invite-list-wrapper { padding: 15px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; scrollbar-width: none; }
    .invite-list-wrapper::-webkit-scrollbar { display: none; }
    
    .friend-invite-row { display: flex; align-items: center; justify-content: space-between; background: var(--bg-base); padding: 12px 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.03); transition: 0.3s; cursor: pointer; }
    .friend-invite-row:hover { border-color: rgba(255,255,255,0.1); background: rgba(255,255,255,0.02); }
    .friend-info-mini { display: flex; align-items: center; gap: 12px; }
    .friend-av-mini { width: 45px; height: 45px; border-radius: 50%; background: var(--surface-panel); display: flex; justify-content: center; align-items: center; font-weight: bold; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
    .friend-av-mini img { width: 100%; height: 100%; object-fit: cover; }
    .friend-name-mini { font-size: 1rem; font-weight: 800; color: var(--text-main); font-family: var(--font-en); }
    
    /* تصميم الـ Checkbox الاحترافي */
    .custom-checkbox { width: 26px; height: 26px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.2); display: flex; justify-content: center; align-items: center; transition: 0.2s; color: transparent; }
    .friend-invite-row.selected .custom-checkbox { background: var(--accent-red); border-color: var(--accent-red); color: white; box-shadow: 0 0 10px rgba(255,76,106,0.4); }

    .invite-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2); display: flex; gap: 10px; }
    .btn-select-all { flex: 1; background: var(--surface-panel); color: var(--text-main); border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; }
    .btn-select-all:hover { background: rgba(255,255,255,0.05); }
    .btn-send-invites { flex: 2; background: var(--accent-red); color: white; border: none; padding: 14px; border-radius: 16px; font-weight: 800; font-size: 1.05rem; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(255,76,106,0.3); }
    .btn-send-invites:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,76,106,0.4); }

    @media (max-width: 768px) {
        .emblems-grid { grid-template-columns: 1fr; gap: 15px; } /* عمود واحد في الجوال ليأخذ الأمبلم عرضه الكامل */
        .code-text { font-size: 2.8rem; letter-spacing: 5px; }
        .lobby-bottom-actions { flex-direction: column; }
    }
</style>

<div class="lobby-master-container">
    
    <div class="premium-lobby-header">
        <div class="header-inner-content">
            <div class="room-status-badge">
                <div class="online-dot" style="position:static; margin:0;"></div> غرفة عامة
            </div>
            <div class="code-display-group">
                <div class="code-label">كود الدعوة الخاص بك</div>
                <div class="code-value-box" onclick="copyRoomCode()">
                    <span class="code-text" id="dynamic-room-code">GENERATING...</span>
                    <i class="ph-bold ph-copy copy-icon"></i>
                </div>
            </div>
            <div class="room-status-text" style="margin-top: 25px; color: var(--text-dim);">
                <i class="ph-bold ph-spinner ph-spin"></i> بانتظار انضمام بقية اللاعبين... (1/6)
            </div>
        </div>
    </div>

    <div class="lobby-section-title">
        <span>اللاعبون المنضمون</span>
        <button class="invite-btn-small" onclick="openInviteModal()">
            <i class="ph-bold ph-user-plus"></i> دعوة أصدقاء
        </button>
    </div>

    <div class="emblems-grid" id="lobby-players-grid">
        </div>

    <div class="lobby-bottom-actions">
        <button class="btn-ready-master" id="btn-ready-action" onclick="toggleReadyState()">
            <i class="ph-bold ph-check-circle" style="font-size: 1.5rem;"></i> أنا جاهز للبدء
        </button>
        <button class="btn-leave-master" onclick="leaveRoom()">
            <i class="ph-bold ph-sign-out" style="font-size: 1.3rem;"></i> مغادرة
        </button>
    </div>

</div>

<div class="invite-modal-overlay" id="invite-friends-modal" onclick="if(event.target === this) closeInviteModal()">
    <div class="invite-modal-card">
        <div class="invite-header">
            <div class="invite-title"><i class="ph-fill ph-users-three" style="color: var(--accent-red);"></i> دعوة الأصدقاء</div>
            <button class="close-invite-btn" onclick="closeInviteModal()"><i class="ph-bold ph-x"></i></button>
        </div>
        
        <div class="invite-list-wrapper" id="invite-friends-list">
            </div>

        <div class="invite-footer">
            <button class="btn-select-all" id="btn-select-all" onclick="toggleSelectAllFriends()">تحديد الكل</button>
            <button class="btn-send-invites" onclick="sendInvitesToSelected()"><i class="ph-bold ph-paper-plane-tilt"></i> إرسال الدعوات</button>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // تهيئة اللوبي عند فتح الصفحة
    // ==========================================
    function initLobby() {
        if (!window.currentUserData || !window.UI_COMPONENTS) {
            setTimeout(initLobby, 100);
            return;
        }

        // 1. توليد كود وهمي للغرفة وعرضه (مؤقتاً لحين ربطه بالفايربيس)
        if (!window.currentRoomCode) {
            window.currentRoomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
        }
        document.getElementById('dynamic-room-code').innerText = window.currentRoomCode;

        // 2. رسم شبكة اللاعبين (أمبلم الهوست + 5 أماكن فارغة)
        const grid = document.getElementById('lobby-players-grid');
        
        // بناء أمبلم الهوست (المستخدم الحالي) بارتفاع 100px ليكون مستطيلاً فخماً
        let hostEmblem = window.UI_COMPONENTS.buildEmblemCard(window.currentUserData, "100px", false);
        
        // إضافة التاج فوق الأمبلم لتمييز المالك
        let hostWrapper = `
            <div style="position: relative;">
                <div class="host-crown-wrapper"><i class="ph-fill ph-crown" style="font-size: 2.2rem; color: gold;"></i></div>
                ${hostEmblem}
            </div>
        `;

        // إضافة الأماكن الفارغة
        let emptySlotHtml = `
            <div class="empty-emblem-slot" onclick="openInviteModal()">
                <i class="ph-duotone ph-user-plus"></i>
                <span>دعوة لاعب</span>
            </div>
        `;

        grid.innerHTML = hostWrapper + emptySlotHtml.repeat(5); // 1 host + 5 empty = 6 slots
    }

    // ==========================================
    // منطق نافذة الدعوات (Invite System)
    // ==========================================
    window.selectedFriendsToInvite = new Set();

    function openInviteModal() {
        const modal = document.getElementById('invite-friends-modal');
        const listContainer = document.getElementById('invite-friends-list');
        window.selectedFriendsToInvite.clear();
        updateSelectAllBtnText();

        const friendsArray = (window.currentUserData && Array.isArray(window.currentUserData.friends)) ? window.currentUserData.friends : [];
        
        if (friendsArray.length === 0) {
            listContainer.innerHTML = `<div style="text-align:center; padding: 40px 20px; color: var(--text-dim);"><i class="ph-duotone ph-users-slash" style="font-size:3rem; margin-bottom:10px;"></i><br>لا يوجد لديك أصدقاء مضافين حالياً.</div>`;
        } else {
            let html = '';
            friendsArray.forEach(fName => {
                const fData = window.friendsCache[fName] || { username: fName };
                const safeName = fData.username || fName;
                let avHtml = `<span>${safeName.charAt(0).toUpperCase()}</span>`;
                if(fData.avatar) avHtml = `<img src="${fData.avatar}">`;
                
                html += `
                    <div class="friend-invite-row" onclick="toggleFriendSelection(this, '${fName}')" data-fname="${fName}">
                        <div class="friend-info-mini">
                            <div class="friend-av-mini">${avHtml}</div>
                            <div class="friend-name-mini">${safeName}</div>
                        </div>
                        <div class="custom-checkbox"><i class="ph-bold ph-check"></i></div>
                    </div>
                `;
            });
            listContainer.innerHTML = html;
        }

        modal.classList.add('show');
    }

    function closeInviteModal() {
        document.getElementById('invite-friends-modal').classList.remove('show');
    }

    function toggleFriendSelection(rowElement, friendName) {
        if (window.selectedFriendsToInvite.has(friendName)) {
            window.selectedFriendsToInvite.delete(friendName);
            rowElement.classList.remove('selected');
        } else {
            window.selectedFriendsToInvite.add(friendName);
            rowElement.classList.add('selected');
        }
        updateSelectAllBtnText();
    }

    function toggleSelectAllFriends() {
        const friendsArray = (window.currentUserData && Array.isArray(window.currentUserData.friends)) ? window.currentUserData.friends : [];
        const rows = document.querySelectorAll('.friend-invite-row');
        
        if (window.selectedFriendsToInvite.size === friendsArray.length && friendsArray.length > 0) {
            // إلغاء تحديد الكل
            window.selectedFriendsToInvite.clear();
            rows.forEach(r => r.classList.remove('selected'));
        } else {
            // تحديد الكل
            friendsArray.forEach(f => window.selectedFriendsToInvite.add(f));
            rows.forEach(r => r.classList.add('selected'));
        }
        updateSelectAllBtnText();
    }

    function updateSelectAllBtnText() {
        const friendsArray = (window.currentUserData && Array.isArray(window.currentUserData.friends)) ? window.currentUserData.friends : [];
        const btn = document.getElementById('btn-select-all');
        if(friendsArray.length === 0) return;

        if (window.selectedFriendsToInvite.size === friendsArray.length) {
            btn.innerText = "إلغاء التحديد";
            btn.style.color = "var(--accent-red)";
        } else {
            btn.innerText = "تحديد الكل";
            btn.style.color = "var(--text-main)";
        }
    }

    function sendInvitesToSelected() {
        if (window.selectedFriendsToInvite.size === 0) {
            alert("يرجى تحديد صديق واحد على الأقل!");
            return;
        }
        alert(`تم إرسال دعوات لـ ${window.selectedFriendsToInvite.size} أصدقاء للانضمام للغرفة: ${window.currentRoomCode}`);
        closeInviteModal();
    }

    // ==========================================
    // أدوات اللوبي العامة
    // ==========================================
    function copyRoomCode() {
        const code = document.getElementById('dynamic-room-code').innerText;
        navigator.clipboard.writeText(code);
        alert("تم نسخ كود الغرفة: " + code);
    }

    function toggleReadyState() {
        const btn = document.getElementById('btn-ready-action');
        if (btn.innerText.includes("أنا جاهز")) {
            btn.innerHTML = `<i class="ph-bold ph-x-circle" style="font-size: 1.5rem;"></i> إلغاء الجاهزية`;
            btn.style.background = "var(--surface-hover)";
            btn.style.color = "var(--text-main)";
            btn.style.boxShadow = "none";
        } else {
            btn.innerHTML = `<i class="ph-bold ph-check-circle" style="font-size: 1.5rem;"></i> أنا جاهز للبدء`;
            btn.style.background = "linear-gradient(135deg, var(--accent-green) 0%, #27ae60 100%)";
            btn.style.color = "var(--bg-base)";
        }
    }

    function leaveRoom() {
        if(confirm("هل أنت متأكد من مغادرة الغرفة؟")) {
            window.currentRoomCode = null; // تفريغ الكود المحلي
            if(window.loadFragment) window.loadFragment('play', document.querySelectorAll('.nav-btn')[1]);
        }
    }

    // تشغيل التهيئة
    initLobby();
</script>
