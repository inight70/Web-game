<style>
    .lobby-master-container { max-width: 1000px; margin: 0 auto; padding: 20px 15px 100px 15px; animation: smoothFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; display: flex; flex-direction: column; gap: 25px; }
    @keyframes spinFast { 100% { transform: rotate(360deg); } }
    .animate-spin { animation: spinFast 1s linear infinite; display: inline-block; }

    /* =========================================
       1. الهيدر الفخم (بصورة الخلفية)
       ========================================= */
    .premium-lobby-header {
        /* سحب الصورة من المجلد مع تغطية سوداء متدرجة لجمالية النصوص */
        background-image: linear-gradient(to right, rgba(20,20,25,0.95) 0%, rgba(20,20,25,0.6) 50%, rgba(20,20,25,0.95) 100%), url('assets/images/lobby-bg.jpg');
        background-size: cover; background-position: center; border-radius: 24px;
        padding: 40px 30px; display: flex; flex-direction: column; align-items: center; text-align: center;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); position: relative;
    }

    .room-code-label { font-size: 0.8rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 8px; }
    
    .tactical-code-box {
        background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 10px 30px;
        border-radius: 16px; display: inline-flex; align-items: center; gap: 15px; cursor: pointer;
        backdrop-filter: blur(10px); transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .tactical-code-box:hover { background: rgba(255, 76, 106, 0.15); border-color: var(--accent-red); transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 30px rgba(255, 76, 106, 0.25); }
    .code-text { font-size: 3.2rem; font-weight: 900; color: white; font-family: var(--font-en); letter-spacing: 10px; margin-right: -10px; text-shadow: 0 2px 15px rgba(255,255,255,0.2); }
    .copy-icon { color: var(--text-dim); font-size: 1.5rem; transition: 0.3s; }
    .tactical-code-box:hover .copy-icon { color: var(--accent-red); }

    /* =========================================
       2. بطاقات اللاعبين (شخصية + أمبلم) AAA Style
       ========================================= */
    .emblems-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }

    .player-master-card {
        background: var(--surface-panel); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
        display: flex; flex-direction: column; overflow: hidden; position: relative;
        transition: 0.3s; box-shadow: var(--shadow-soft); height: 260px;
    }
    .player-master-card:hover { transform: translateY(-4px); box-shadow: 0 15px 30px rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.1); }

    /* الجزء العلوي: اختيار الشخصية */
    .character-view-area {
        flex: 1; background: rgba(0,0,0,0.2); display: flex; justify-content: center; align-items: center;
        position: relative; cursor: pointer; transition: 0.3s;
    }
    .character-view-area:hover { background: rgba(255,255,255,0.05); }
    .select-char-btn { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--text-dim); transition: 0.3s; }
    .character-view-area:hover .select-char-btn { color: white; transform: scale(1.05); }
    .select-char-btn i { font-size: 2rem; }
    .select-char-btn span { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

    /* الجزء السفلي: الأمبلم */
    .emblem-view-area { height: 85px; width: 100%; border-top: 1px solid rgba(255,255,255,0.05); }

    /* علامة المالك */
    .host-star { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); padding: 5px; border-radius: 50%; color: var(--accent-red); font-size: 1.2rem; z-index: 10; border: 1px solid rgba(255,76,106,0.3); }

    /* مكان فارغ (لدعوة الأصدقاء) */
    .empty-master-card {
        background: rgba(255,255,255,0.01); border: 2px dashed rgba(255,255,255,0.08); border-radius: 20px;
        display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px;
        color: var(--text-dim); transition: 0.3s; cursor: pointer; height: 260px;
    }
    .empty-master-card:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.03); color: white; }
    .empty-master-card i { font-size: 2.5rem; }

    /* =========================================
       3. الأزرار السفلية وحالة الغرفة
       ========================================= */
    .room-status-footer { display: flex; justify-content: space-between; align-items: center; margin-bottom: -10px; padding: 0 10px; }
    .waiting-text { font-size: 0.9rem; font-weight: 700; color: var(--text-dim); display: flex; align-items: center; gap: 8px; }

    .lobby-bottom-actions { display: flex; gap: 12px; width: 100%; }
    
    .btn-room-settings { background: var(--surface-panel); color: var(--text-main); border: 1px solid rgba(255,255,255,0.1); width: 60px; border-radius: 18px; display: flex; justify-content: center; align-items: center; font-size: 1.6rem; cursor: pointer; transition: 0.3s; }
    .btn-room-settings:hover { background: rgba(255,255,255,0.1); color: white; transform: translateY(-2px); }

    .btn-ready-master { flex: 1; background: var(--surface-panel); color: var(--text-main); border: 1px solid rgba(255,255,255,0.1); padding: 18px; border-radius: 18px; font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: flex; justify-content: center; align-items: center; gap: 10px; }
    .btn-ready-master.is-ready { background: var(--accent-green); color: var(--bg-base); border-color: var(--accent-green); box-shadow: 0 10px 25px rgba(46, 204, 113, 0.3); }
    .btn-ready-master:active { transform: scale(0.98); }
    
    .btn-leave-master { background: transparent; color: var(--text-dim); padding: 0 25px; border-radius: 18px; font-weight: 800; font-size: 1rem; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
    .btn-leave-master:hover { background: rgba(255,76,106,0.1); color: var(--accent-red); border-color: var(--accent-red); }

    /* =========================================
       4. النوافذ المخصصة (Modals)
       ========================================= */
    .custom-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); z-index: 100000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s ease; padding: 15px; }
    .custom-modal-overlay.show { opacity: 1; visibility: visible; }
    .custom-modal-card { background: var(--surface-panel); width: 100%; max-width: 400px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 30px 60px rgba(0,0,0,0.6); display: flex; flex-direction: column; overflow: hidden; transform: scale(0.9) translateY(20px); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .custom-modal-overlay.show .custom-modal-card { transform: scale(1) translateY(0); }

    /* نافذة المغادرة */
    .leave-modal-content { padding: 35px 25px; text-align: center; }
    .leave-icon { font-size: 4rem; color: var(--accent-red); margin-bottom: 15px; filter: drop-shadow(0 0 15px rgba(255,76,106,0.4)); }
    .leave-title { font-size: 1.5rem; font-weight: 900; color: white; margin-bottom: 10px; }
    .leave-desc { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 25px; }
    .leave-actions { display: flex; gap: 10px; }
    .btn-cancel-leave { flex: 1; background: rgba(255,255,255,0.05); color: white; border: none; padding: 14px; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; }
    .btn-cancel-leave:hover { background: rgba(255,255,255,0.1); }
    .btn-confirm-leave { flex: 1; background: var(--accent-red); color: white; border: none; padding: 14px; border-radius: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(255,76,106,0.3); }
    .btn-confirm-leave:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,76,106,0.4); }

    /* نافذة الدعوات والأصدقاء (تم تحسينها) */
    .invite-header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); }
    .invite-title { font-size: 1.3rem; font-weight: 800; color: white; display: flex; align-items: center; gap: 10px; }
    .invite-list-wrapper { padding: 15px; height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; scrollbar-width: none; }
    .friend-invite-row { display: flex; align-items: center; justify-content: space-between; background: var(--bg-base); padding: 12px 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.03); transition: 0.3s; cursor: pointer; }
    .friend-invite-row.selected { border-color: var(--accent-red); background: rgba(255,76,106,0.05); }
    .custom-checkbox { width: 24px; height: 24px; border-radius: 6px; border: 2px solid rgba(255,255,255,0.2); display: flex; justify-content: center; align-items: center; transition: 0.2s; color: transparent; }
    .friend-invite-row.selected .custom-checkbox { background: var(--accent-red); border-color: var(--accent-red); color: white; }
    .invite-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2); display: flex; gap: 10px; }

    @media (max-width: 768px) {
        .emblems-grid { grid-template-columns: repeat(2, 1fr); }
        .lobby-bottom-actions { flex-wrap: wrap; }
        .btn-room-settings { width: 100%; flex-basis: 100%; order: 3; }
        .code-text { font-size: 2.5rem; letter-spacing: 5px; }
    }
</style>

<div class="lobby-master-container">
    
    <div class="premium-lobby-header">
        <div class="room-code-label">كود الغرفة</div>
        <div class="tactical-code-box" onclick="copyRoomCode()">
            <span class="code-text" id="dynamic-room-code">----</span>
            <i class="ph-bold ph-copy copy-icon"></i>
        </div>
    </div>

    <div class="room-status-footer">
        <div class="waiting-text">
            <i class="ph-bold ph-circle-notch animate-spin"></i> 
            <span id="player-count-text">بانتظار اللاعبين (0/0)</span>
        </div>
    </div>

    <div class="emblems-grid" id="lobby-players-grid">
        <div style="text-align:center; padding: 20px; color:var(--text-dim); width:100%; grid-column: 1 / -1;">
            <i class="ph-bold ph-spinner animate-spin" style="font-size:2rem;"></i> جاري التحميل...
        </div>
    </div>

    <div class="lobby-bottom-actions">
        <button class="btn-leave-master" onclick="openLeaveModal()">
            <i class="ph-bold ph-sign-out"></i> مغادرة
        </button>
        <button class="btn-ready-master" id="btn-ready-action" onclick="toggleReadyState()">
            <i class="ph-bold ph-check-circle" style="font-size: 1.4rem;"></i> أنا جاهز
        </button>
        <button class="btn-room-settings" onclick="openRoomSettings()">
            <i class="ph-bold ph-sliders-horizontal"></i>
        </button>
    </div>
</div>

<div class="custom-modal-overlay" id="leave-confirm-modal" onclick="if(event.target === this) closeLeaveModal()">
    <div class="custom-modal-card">
        <div class="leave-modal-content">
            <i class="ph-duotone ph-warning-circle leave-icon"></i>
            <h3 class="leave-title">مغادرة الغرفة؟</h3>
            <p class="leave-desc">إذا غادرت الآن، سيتعين عليك إدخال كود الغرفة للعودة مجدداً.</p>
            <div class="leave-actions">
                <button class="btn-cancel-leave" onclick="closeLeaveModal()">إلغاء</button>
                <button class="btn-confirm-leave" onclick="executeLeaveRoom()">نعم، غادر</button>
            </div>
        </div>
    </div>
</div>

<div class="custom-modal-overlay" id="character-select-modal" onclick="if(event.target === this) closeCharacterModal()">
    <div class="custom-modal-card" style="max-width: 600px;">
        <div class="invite-header">
            <div class="invite-title"><i class="ph-fill ph-mask-happy"></i> اختيار الشخصية</div>
            <button class="close-invite-btn" onclick="closeCharacterModal()"><i class="ph-bold ph-x"></i></button>
        </div>
        <div style="padding: 50px 20px; text-align: center; color: var(--text-dim);">
            <i class="ph-duotone ph-alien" style="font-size: 4rem; margin-bottom: 10px; opacity: 0.5;"></i>
            <p>سيتم إضافة قائمة الشخصيات هنا قريباً...</p>
        </div>
    </div>
</div>

<div class="custom-modal-overlay" id="invite-friends-modal" onclick="if(event.target === this) closeInviteModal()">
    <div class="custom-modal-card">
        <div class="invite-header">
            <div class="invite-title"><i class="ph-fill ph-users-three" style="color: var(--accent-red);"></i> دعوة أصدقاء</div>
            <button class="close-invite-btn" onclick="closeInviteModal()"><i class="ph-bold ph-x"></i></button>
        </div>
        <div class="invite-list-wrapper" id="invite-friends-list"></div>
        <div class="invite-footer">
            <button class="btn-cancel-leave" id="btn-select-all" onclick="toggleSelectAllFriends()" style="flex: 1;">الكل</button>
            <button class="btn-confirm-leave" id="btn-send-inv-submit" onclick="sendInvitesToSelected()" style="flex: 2; font-size: 1rem;"><i class="ph-bold ph-paper-plane-tilt"></i> إرسال</button>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // محرك واجهة اللوبي (Lobby UI Engine)
    // ==========================================
    
    window.fetchAndRenderLobbyPlayers = function() {
        if (!window.currentRoomData || !window.UI_COMPONENTS) return;

        document.getElementById('dynamic-room-code').innerText = window.currentRoomData.id;
        
        const playersArray = window.currentRoomData.players || [];
        const maxPlayers = window.currentRoomData.maxPlayers || 6;
        document.getElementById('player-count-text').innerText = `بانتظار اللاعبين... (${playersArray.length}/${maxPlayers})`;

        const grid = document.getElementById('lobby-players-grid');
        grid.innerHTML = ''; 

        // 1. رسم اللاعبين المتواجدين
        playersArray.forEach(pName => {
            let pData = window.lobbyPlayersCache[pName] || window.friendsCache[pName] || { username: pName };
            
            // الأمبلم الخاص باللاعب (بدون أفتار داخلي)
            let emblem = window.UI_COMPONENTS.buildEmblemCard(pData, "100%", true);
            
            // علامة المالك
            let hostMark = (window.currentRoomData.hostId === pData.uid || pName === playersArray[0]) ? 
                `<i class="ph-fill ph-star-four host-star"></i>` : '';

            // هل هذا الكرت خاص بالمستخدم الحالي؟ (ليتمكن من تغيير شخصيته)
            let isMe = (pName === window.currentUserData.username_lower);
            let charAction = isMe ? `onclick="openCharacterModal()"` : ``;
            let charText = isMe ? `اختر شخصية` : `ينتظر...`;

            grid.innerHTML += `
                <div class="player-master-card">
                    ${hostMark}
                    <div class="character-view-area" ${charAction}>
                        <div class="select-char-btn">
                            <i class="ph-duotone ph-user-focus"></i>
                            <span>${charText}</span>
                        </div>
                    </div>
                    <div class="emblem-view-area">
                        ${emblem}
                    </div>
                </div>
            `;
        });

        // 2. رسم الأماكن المتبقية كأزرار دعوة
        const emptyCount = maxPlayers - playersArray.length;
        for(let i=0; i<emptyCount; i++) {
            grid.innerHTML += `
                <div class="empty-master-card" onclick="openInviteModal()">
                    <i class="ph-duotone ph-plus"></i>
                    <span style="font-size: 0.8rem; font-weight: 700;">مكان متاح</span>
                </div>
            `;
        }
    };

    function copyRoomCode() {
        const code = document.getElementById('dynamic-room-code').innerText;
        if(code === '----') return;
        navigator.clipboard.writeText(code);
        alert("تم نسخ الكود: " + code);
    }

    function toggleReadyState() {
        const btn = document.getElementById('btn-ready-action');
        btn.classList.toggle('is-ready');
        if (btn.classList.contains('is-ready')) {
            btn.innerHTML = `<i class="ph-bold ph-spinner ph-spin" style="font-size: 1.4rem;"></i> جاهز، بانتظار البقية`;
        } else {
            btn.innerHTML = `<i class="ph-bold ph-check-circle" style="font-size: 1.4rem;"></i> أنا جاهز`;
        }
    }

    function openRoomSettings() { alert("سيتم برمجة إعدادات الغرفة هنا."); }

    // ==========================================
    // نظام النوافذ المخصصة (Modals Logic)
    // ==========================================

    // 1. المغادرة
    function openLeaveModal() { document.getElementById('leave-confirm-modal').classList.add('show'); }
    function closeLeaveModal() { document.getElementById('leave-confirm-modal').classList.remove('show'); }
    function executeLeaveRoom() {
        closeLeaveModal();
        if(window.leaveFirebaseRoom) window.leaveFirebaseRoom();
    }

    // 2. اختيار الشخصية
    function openCharacterModal() { document.getElementById('character-select-modal').classList.add('show'); }
    function closeCharacterModal() { document.getElementById('character-select-modal').classList.remove('show'); }

    // 3. نظام الدعوات (مع الإشعار الصامت)
    window.selectedFriendsToInvite = new Set();

    function openInviteModal() {
        const modal = document.getElementById('invite-friends-modal');
        const listContainer = document.getElementById('invite-friends-list');
        window.selectedFriendsToInvite.clear();
        updateSelectAllBtnText();

        const friendsArray = (window.currentUserData && Array.isArray(window.currentUserData.friends)) ? window.currentUserData.friends : [];
        const currentPlayers = window.currentRoomData ? window.currentRoomData.players : [];
        
        if (friendsArray.length === 0) {
            listContainer.innerHTML = `<div style="text-align:center; padding: 40px 20px; color: var(--text-dim);"><i class="ph-duotone ph-users-slash" style="font-size:3rem; margin-bottom:10px;"></i><br>لا يوجد أصدقاء لدعوتهم.</div>`;
        } else {
            let html = '';
            friendsArray.forEach(fName => {
                if(currentPlayers.includes(fName.toLowerCase())) return; 
                const fData = window.friendsCache[fName] || { username: fName };
                const safeName = fData.username || fName;
                let avHtml = `<div style="width:100%; height:100%; display:flex; justify-content:center; align-items:center;">${safeName.charAt(0).toUpperCase()}</div>`;
                if(fData.avatar) avHtml = `<img src="${fData.avatar}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
                
                html += `
                    <div class="friend-invite-row" onclick="toggleFriendSelection(this, '${fName}')" data-fname="${fName}">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--surface-panel); border: 1px solid rgba(255,255,255,0.1); overflow:hidden;">${avHtml}</div>
                            <span style="font-weight: 800; color: white;">${safeName}</span>
                        </div>
                        <div class="custom-checkbox"><i class="ph-bold ph-check"></i></div>
                    </div>
                `;
            });
            if(html === '') html = `<div style="text-align:center; padding: 40px 20px; color: var(--text-dim);">جميع أصدقائك موجودون في الغرفة!</div>`;
            listContainer.innerHTML = html;
        }
        modal.classList.add('show');
    }

    function closeInviteModal() { document.getElementById('invite-friends-modal').classList.remove('show'); }

    function toggleFriendSelection(rowElement, friendName) {
        if (window.selectedFriendsToInvite.has(friendName)) {
            window.selectedFriendsToInvite.delete(friendName);
            rowElement.classList.remove('selected');
        } else {
            window.selectedFriendsToInvite.add(friendName);
            rowElement.classList.add('selected');
        }
        updateSelectAllBtnText();
    }

    function toggleSelectAllFriends() {
        const rows = document.querySelectorAll('.friend-invite-row');
        if (rows.length === 0) return;

        if (window.selectedFriendsToInvite.size === rows.length) {
            window.selectedFriendsToInvite.clear();
            rows.forEach(r => r.classList.remove('selected'));
        } else {
            rows.forEach(r => {
                window.selectedFriendsToInvite.add(r.getAttribute('data-fname'));
                r.classList.add('selected');
            });
        }
        updateSelectAllBtnText();
    }

    function updateSelectAllBtnText() {
        const rows = document.querySelectorAll('.friend-invite-row');
        const btn = document.getElementById('btn-select-all');
        if(rows.length === 0) return;
        btn.innerText = (window.selectedFriendsToInvite.size === rows.length) ? "إلغاء التحديد" : "تحديد الكل";
    }

    async function sendInvitesToSelected() {
        if (window.selectedFriendsToInvite.size === 0) return;
        
        const btn = document.getElementById('btn-send-inv-submit');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="ph-bold ph-spinner ph-spin"></i> جاري الإرسال...';
        btn.disabled = true;

        try {
            const { getDocs, query, collection, where, updateDoc, doc, arrayUnion } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
            const friendsArray = Array.from(window.selectedFriendsToInvite).map(f => f.toLowerCase());
            
            const q = query(collection(window.dbInstance, "users"), where("username_lower", "in", friendsArray));
            const snap = await getDocs(q);
            
            const inviteData = { roomId: window.currentRoomId, hostName: window.currentUserData.username, timestamp: Date.now() };

            snap.forEach(async (d) => { await updateDoc(doc(window.dbInstance, "users", d.id), { gameInvites: arrayUnion(inviteData) }); });
            
            // إشعار صامت وناعم داخل الزر
            btn.innerHTML = '<i class="ph-bold ph-check"></i> تم الإرسال!';
            btn.style.background = "var(--accent-green)";
            
            setTimeout(() => {
                closeInviteModal();
                setTimeout(() => { btn.innerHTML = originalText; btn.style.background = "var(--accent-red)"; btn.disabled = false; }, 300);
            }, 1000);

        } catch (e) {
            console.error(e);
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }

    // تشغيل اللوبي
    if (window.currentRoomId && window.listenToRoom) { window.listenToRoom(); }
</script>
