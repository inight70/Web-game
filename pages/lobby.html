<style>
    .lobby-master-container { max-width: 950px; margin: 0 auto; padding: 20px 10px 90px 10px; animation: smoothFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes spinFast { 100% { transform: rotate(360deg); } }
    .animate-spin { animation: spinFast 1s linear infinite; display: inline-block; }

    /* =========================================
       1. الهيدر الأنيق (Minimalist Premium Header)
       ========================================= */
    .premium-lobby-header {
        background-image: url('assets/images/lobby-header.bg.jpg');
        background-size: cover; background-position: center;
        border-radius: 24px; border: 1px solid rgba(255,255,255,0.08);
        display: flex; flex-direction: column; justify-content: space-between;
        box-shadow: 0 15px 40px rgba(0,0,0,0.5); margin-bottom: 30px; position: relative; overflow: hidden;
        min-height: 200px; padding: 20px 25px;
    }
    
    /* طبقة التعتيم لبروز العناصر */
    .premium-lobby-header::before { 
        content: ''; position: absolute; inset: 0; 
        background: linear-gradient(180deg, rgba(15,15,20,0.6) 0%, rgba(15,15,20,0.9) 100%); 
        z-index: 1; 
    }

    /* الشريط العلوي داخل الهيدر (الإعدادات + الحالة) */
    .header-top-bar {
        position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: center; width: 100%;
    }
    
    .room-status-pill {
        background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 8px 18px; border-radius: 100px;
        font-size: 0.85rem; font-weight: 700; color: var(--text-dim); display: flex; align-items: center; gap: 8px; backdrop-filter: blur(10px);
    }
    .player-count-hl { color: var(--accent-red); font-family: var(--font-en); font-weight: 900; margin-right: 5px; }

    .btn-room-settings {
        background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: white;
        width: 42px; height: 42px; border-radius: 14px; display: flex; justify-content: center; align-items: center;
        font-size: 1.3rem; cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px); -webkit-tap-highlight-color: transparent;
    }
    .btn-room-settings:hover { background: rgba(255,255,255,0.1); color: var(--accent-red); transform: rotate(45deg); }

    /* الكود الأنيق في منتصف الهيدر */
    .header-center-content {
        position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; padding-bottom: 15px;
    }
    .elegant-code-box {
        background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 8px 24px; border-radius: 100px;
        display: inline-flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.3s; backdrop-filter: blur(15px);
    }
    .elegant-code-box:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.3); transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
    .code-label-elegant { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }
    .code-text-elegant { font-size: 1.6rem; font-weight: 900; color: white; letter-spacing: 4px; font-family: var(--font-en); margin: 0 5px; }
    .copy-icon-elegant { color: var(--text-dim); font-size: 1.1rem; transition: 0.3s; }
    .elegant-code-box:hover .copy-icon-elegant { color: white; }

    /* =========================================
       2. شبكة اللاعبين (الأمبلم يمين - الشخصية يسار)
       ========================================= */
    .lobby-section-title { font-size: 1.1rem; font-weight: 800; color: white; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; display: flex; justify-content: space-between; }
    .emblems-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }

    /* الحاوية الجامعة */
    .player-slot-combo { display: flex; align-items: stretch; gap: 10px; position: relative; transition: 0.3s; }
    .player-slot-combo:hover { transform: translateY(-2px); }

    /* غلاف الأمبلم يأخذ المساحة الأكبر */
    .emblem-fluid-wrapper { flex: 1; min-width: 0; }

    /* مربع الشخصية (تم نقله برمجياً لليسار) */
    .character-select-box {
        width: 70px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1);
        border-radius: 18px; display: flex; flex-direction: column; justify-content: center; align-items: center;
        cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; flex-shrink: 0;
    }
    .character-select-box:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.3); }
    .character-select-box i { font-size: 1.6rem; color: rgba(255,255,255,0.2); transition: 0.3s; }
    .character-select-box:hover i { color: var(--accent-red); transform: scale(1.1); }
    .char-box-label { font-size: 0.55rem; font-weight: 800; color: var(--text-dim); margin-top: 5px; letter-spacing: 1px; }

    /* أيقونة الهوست (نجمة مصغرة جداً وأنيقة) */
    .host-star-wrapper { position: absolute; top: -6px; right: -6px; z-index: 10; background: var(--bg-base); padding: 3px; border-radius: 50%; box-shadow: 0 3px 8px rgba(0,0,0,0.5); }
    .host-star-wrapper i { font-size: 1rem; color: var(--accent-red); filter: drop-shadow(0 0 5px rgba(255,76,106,0.6)); }

    /* المكان الفارغ لدعوة صديق */
    .empty-emblem-slot {
        height: 85px; border-radius: 20px; background: rgba(255,255,255,0.01); border: 1px dashed rgba(255,255,255,0.15);
        display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
        color: var(--text-dim); transition: 0.3s; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .empty-emblem-slot:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.3); color: white; }
    .empty-emblem-slot i { font-size: 1.6rem; }
    .empty-emblem-slot span { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

    /* =========================================
       3. أزرار التحكم السفلية (نظيفة ومركزة)
       ========================================= */
    .lobby-bottom-actions { display: flex; gap: 15px; margin-top: 20px; }
    
    .btn-ready-master { flex: 2; background: var(--surface-panel); color: var(--text-main); border: 1px solid rgba(255,255,255,0.1); padding: 18px; border-radius: 20px; font-weight: 900; font-size: 1.15rem; cursor: pointer; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: flex; justify-content: center; align-items: center; gap: 10px; }
    .btn-ready-master.is-ready { background: var(--accent-red); color: white; border-color: var(--accent-red); box-shadow: 0 10px 30px rgba(255, 76, 106, 0.4); }
    .btn-ready-master:active { transform: scale(0.98); }
    
    .btn-leave-master { flex: 1; background: transparent; color: var(--accent-red); border-radius: 20px; font-weight: 800; font-size: 1.05rem; border: 1px solid rgba(255,76,106,0.3); cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
    .btn-leave-master:hover { background: var(--accent-red); color: white; }

    /* =========================================
       4. النوافذ المخصصة (Modals) - تم الاحتفاظ بها
       ========================================= */
    .game-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 100000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s ease; padding: 15px; }
    .game-modal-overlay.show { opacity: 1; visibility: visible; }
    .game-modal-card { background: var(--surface-panel); width: 100%; max-width: 420px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 30px 60px rgba(0,0,0,0.8); display: flex; flex-direction: column; overflow: hidden; transform: scale(0.9) translateY(20px); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); max-height: 85vh; }
    .game-modal-overlay.show .game-modal-card { transform: scale(1) translateY(0); }

    .leave-content { padding: 40px 30px; text-align: center; }
    .leave-icon { font-size: 4rem; color: var(--accent-red); margin-bottom: 15px; filter: drop-shadow(0 0 15px rgba(255,76,106,0.4)); }
    .leave-title { font-size: 1.5rem; font-weight: 900; color: white; margin-bottom: 10px; }
    .leave-desc { font-size: 0.95rem; color: var(--text-dim); font-weight: 600; line-height: 1.6; margin-bottom: 30px; }
    .leave-actions { display: flex; gap: 15px; }
    .btn-cancel-leave { flex: 1; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; }
    .btn-cancel-leave:hover { background: rgba(255,255,255,0.1); }
    .btn-confirm-leave { flex: 1; background: var(--accent-red); color: white; border: none; padding: 14px; border-radius: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(255,76,106,0.3); }
    .btn-confirm-leave:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255,76,106,0.4); }

    .modal-header { padding: 20px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); }
    .modal-title { font-size: 1.2rem; font-weight: 900; color: white; display: flex; align-items: center; gap: 10px; }
    .btn-close-modal { background: rgba(255,255,255,0.05); border: none; color: var(--text-dim); width: 34px; height: 34px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; }
    .btn-close-modal:hover { background: rgba(255,76,106,0.1); color: var(--accent-red); transform: rotate(90deg); }

    .invite-list-wrapper { padding: 15px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; scrollbar-width: none; }
    .friend-invite-row { display: flex; align-items: center; justify-content: space-between; background: var(--bg-base); padding: 12px 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.03); transition: 0.3s; cursor: pointer; }
    .friend-invite-row:hover { border-color: rgba(255,255,255,0.1); background: rgba(255,255,255,0.02); }
    .friend-info-mini { display: flex; align-items: center; gap: 12px; }
    .friend-av-mini { width: 45px; height: 45px; border-radius: 50%; background: var(--surface-panel); display: flex; justify-content: center; align-items: center; font-weight: bold; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
    .friend-av-mini img { width: 100%; height: 100%; object-fit: cover; }
    .friend-name-mini { font-size: 1rem; font-weight: 800; color: var(--text-main); font-family: var(--font-en); }
    .custom-checkbox { width: 26px; height: 26px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.2); display: flex; justify-content: center; align-items: center; transition: 0.2s; color: transparent; }
    .friend-invite-row.selected .custom-checkbox { background: var(--accent-red); border-color: var(--accent-red); color: white; box-shadow: 0 0 10px rgba(255,76,106,0.4); }

    .modal-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2); display: flex; gap: 10px; }
    .btn-select-all { flex: 1; background: var(--surface-panel); color: var(--text-main); border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; }
    .btn-select-all:hover { background: rgba(255,255,255,0.05); }
    .btn-send-invites { flex: 2; background: var(--accent-red); color: white; border: none; padding: 14px; border-radius: 16px; font-weight: 800; font-size: 1.05rem; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(255,76,106,0.3); display: flex; justify-content: center; align-items: center; gap: 8px; }
    
    .character-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
    .char-item { aspect-ratio: 1; background: var(--bg-base); border: 2px dashed rgba(255,255,255,0.1); border-radius: 16px; display: flex; justify-content: center; align-items: center; color: var(--text-dim); cursor: not-allowed; }

    @media (max-width: 768px) {
        .emblems-grid { grid-template-columns: 1fr; }
        .lobby-bottom-actions { flex-wrap: wrap; }
        .btn-ready-master { width: 100%; flex: none; }
    }
</style>

<div class="lobby-master-container">
    
    <div class="premium-lobby-header">
        
        <div class="header-top-bar">
            <div class="room-status-pill">
                <i class="ph-bold ph-spinner animate-spin" style="color:var(--text-main);"></i> 
                <span>بانتظار اللاعبين <span class="player-count-hl" id="player-count-text">(1/6)</span></span>
            </div>
            
            <button class="btn-room-settings" onclick="openSettingsModal()">
                <i class="ph-bold ph-sliders-horizontal"></i>
            </button>
        </div>

        <div class="header-center-content">
            <div class="elegant-code-box" onclick="copyRoomCode()">
                <span class="code-label-elegant">كود الغرفة</span>
                <span class="code-text-elegant" id="dynamic-room-code">----</span>
                <i class="ph-bold ph-copy copy-icon-elegant"></i>
            </div>
        </div>
        
    </div>

    <div class="lobby-section-title">
        <span>فريق العمليات</span>
    </div>

    <div class="emblems-grid" id="lobby-players-grid">
        <div style="text-align:center; padding: 20px; color:var(--text-dim); width:100%; grid-column: span 2;">
            <i class="ph-bold ph-spinner animate-spin" style="font-size:2rem;"></i> جاري التحميل...
        </div>
    </div>

    <div class="lobby-bottom-actions">
        <button class="btn-ready-master" id="btn-ready-action" onclick="toggleReadyState()">
            <i class="ph-bold ph-check-circle" style="font-size: 1.4rem;"></i> تأكيد الجاهزية
        </button>
        <button class="btn-leave-master" onclick="openLeaveModal()">
            <i class="ph-bold ph-sign-out" style="font-size: 1.2rem;"></i> مغادرة
        </button>
    </div>

</div>

<div class="game-modal-overlay" id="custom-leave-modal">
    <div class="game-modal-card">
        <div class="leave-content">
            <i class="ph-fill ph-warning-octagon leave-icon"></i>
            <h3 class="leave-title">مغادرة الغرفة؟</h3>
            <p class="leave-desc">إذا غادرت الآن، ستفقد مكانك في التشكيلة وقد لا تتمكن من العودة إذا امتلأت الغرفة.</p>
            <div class="leave-actions">
                <button class="btn-cancel-leave" onclick="closeLeaveModal()">بقاء</button>
                <button class="btn-confirm-leave" onclick="executeLeaveRoom()">نعم، غادر</button>
            </div>
        </div>
    </div>
</div>

<div class="game-modal-overlay" id="character-select-modal" onclick="if(event.target === this) closeCharModal()">
    <div class="game-modal-card">
        <div class="modal-header">
            <div class="modal-title"><i class="ph-fill ph-user-focus" style="color:var(--accent-red);"></i> اختيار الشخصية</div>
            <button class="btn-close-modal" onclick="closeCharModal()"><i class="ph-bold ph-x"></i></button>
        </div>
        <div class="character-grid">
            <div class="char-item"><i class="ph-duotone ph-lock-key"></i></div>
            <div class="char-item"><i class="ph-duotone ph-lock-key"></i></div>
            <div class="char-item"><i class="ph-duotone ph-lock-key"></i></div>
            <div class="char-item"><i class="ph-duotone ph-lock-key"></i></div>
            <div class="char-item"><i class="ph-duotone ph-lock-key"></i></div>
            <div class="char-item"><i class="ph-duotone ph-lock-key"></i></div>
        </div>
    </div>
</div>

<div class="game-modal-overlay" id="invite-friends-modal" onclick="if(event.target === this) closeInviteModal()">
    <div class="game-modal-card">
        <div class="modal-header">
            <div class="modal-title"><i class="ph-fill ph-users-three" style="color: var(--accent-red);"></i> دعوة الأصدقاء</div>
            <button class="btn-close-modal" onclick="closeInviteModal()"><i class="ph-bold ph-x"></i></button>
        </div>
        <div class="invite-list-wrapper" id="invite-friends-list"></div>
        <div class="modal-footer">
            <button class="btn-select-all" id="btn-select-all" onclick="toggleSelectAllFriends()">تحديد الكل</button>
            <button class="btn-send-invites" id="btn-send-inv-submit" onclick="sendInvitesToSelected()"><i class="ph-bold ph-paper-plane-tilt"></i> إرسال الدعوات</button>
        </div>
    </div>
</div>

<script>
    window.fetchAndRenderLobbyPlayers = function() {
        if (!window.currentRoomData || !window.UI_COMPONENTS) return;

        document.getElementById('dynamic-room-code').innerText = window.currentRoomData.id;
        
        const playersArray = window.currentRoomData.players || [];
        const maxPlayers = window.currentRoomData.maxPlayers || 6;
        
        document.getElementById('player-count-text').innerText = `(${playersArray.length}/${maxPlayers})`;

        const grid = document.getElementById('lobby-players-grid');
        grid.innerHTML = ''; 

        playersArray.forEach(pName => {
            let pData = window.lobbyPlayersCache[pName] || window.friendsCache[pName] || { username: pName };
            let emblem = window.UI_COMPONENTS.buildEmblemCard(pData, "85px", true);
            
            let hostMark = (window.currentRoomData.hostId === pData.uid || pName === playersArray[0]) ? 
                `<div class="host-star-wrapper"><i class="ph-fill ph-star-four"></i></div>` : '';

            // السحر هنا: وضعنا الأمبلم أولاً ثم مربع الشخصية لكي يظهر صندوق الشخصية على يسار الأمبلم
            grid.innerHTML += `
                <div class="player-slot-combo">
                    ${hostMark}
                    <div class="emblem-fluid-wrapper">
                        ${emblem}
                    </div>
                    <div class="character-select-box" onclick="openCharModal()">
                        <i class="ph-duotone ph-user"></i>
                        <span class="char-box-label">SELECT</span>
                    </div>
                </div>
            `;
        });

        const emptyCount = maxPlayers - playersArray.length;
        for(let i=0; i<emptyCount; i++) {
            grid.innerHTML += `
                <div class="empty-emblem-slot" onclick="openInviteModal()">
                    <i class="ph-bold ph-plus"></i>
                    <span>مكان متاح</span>
                </div>
            `;
        }
    };

    function copyRoomCode() {
        const code = document.getElementById('dynamic-room-code').innerText;
        if(code === '----') return;
        navigator.clipboard.writeText(code);
        
        const icon = document.querySelector('.copy-icon-elegant');
        icon.className = 'ph-bold ph-check copy-icon-elegant';
        setTimeout(() => { icon.className = 'ph-bold ph-copy copy-icon-elegant'; }, 2000);
    }

    function toggleReadyState() {
        const btn = document.getElementById('btn-ready-action');
        btn.classList.toggle('is-ready');
        if (btn.classList.contains('is-ready')) {
            btn.innerHTML = `<i class="ph-bold ph-check-circle" style="font-size: 1.4rem;"></i> بانتظار البقية`;
        } else {
            btn.innerHTML = `<i class="ph-bold ph-check-circle" style="font-size: 1.4rem;"></i> تأكيد الجاهزية`;
        }
    }

    function openSettingsModal() { alert("نافذة إعدادات المباراة (الوقت، الطور، الخ)"); }

    function openLeaveModal() { document.getElementById('custom-leave-modal').classList.add('show'); }
    function closeLeaveModal() { document.getElementById('custom-leave-modal').classList.remove('show'); }
    function executeLeaveRoom() {
        closeLeaveModal();
        if(window.leaveFirebaseRoom) window.leaveFirebaseRoom();
    }

    function openCharModal() { document.getElementById('character-select-modal').classList.add('show'); }
    function closeCharModal() { document.getElementById('character-select-modal').classList.remove('show'); }

    /* ================= الدعوات ================= */
    window.selectedFriendsToInvite = new Set();

    function openInviteModal() {
        const modal = document.getElementById('invite-friends-modal');
        const listContainer = document.getElementById('invite-friends-list');
        window.selectedFriendsToInvite.clear();
        updateSelectAllBtnText();

        const friendsArray = (window.currentUserData && Array.isArray(window.currentUserData.friends)) ? window.currentUserData.friends : [];
        const currentPlayers = window.currentRoomData ? window.currentRoomData.players : [];
        
        if (friendsArray.length === 0) {
            listContainer.innerHTML = `<div style="text-align:center; padding: 40px 20px; color: var(--text-dim);"><i class="ph-duotone ph-users-slash" style="font-size:3rem; margin-bottom:10px;"></i><br>لا يوجد أصدقاء لدعوتهم.</div>`;
        } else {
            let html = '';
            friendsArray.forEach(fName => {
                if(currentPlayers.includes(fName.toLowerCase())) return; 

                const fData = window.friendsCache[fName] || { username: fName };
                const safeName = fData.username || fName;
                let avHtml = `<span>${safeName.charAt(0).toUpperCase()}</span>`;
                if(fData.avatar) avHtml = `<img src="${fData.avatar}">`;
                
                html += `
                    <div class="friend-invite-row" onclick="toggleFriendSelection(this, '${fName}')" data-fname="${fName}">
                        <div class="friend-info-mini">
                            <div class="friend-av-mini">${avHtml}</div>
                            <div class="friend-name-mini">${safeName}</div>
                        </div>
                        <div class="custom-checkbox"><i class="ph-bold ph-check"></i></div>
                    </div>
                `;
            });
            if(html === '') html = `<div style="text-align:center; padding: 40px 20px; color: var(--text-dim);">جميع أصدقائك في الغرفة بالفعل!</div>`;
            listContainer.innerHTML = html;
        }
        modal.classList.add('show');
    }

    function closeInviteModal() { document.getElementById('invite-friends-modal').classList.remove('show'); }

    function toggleFriendSelection(rowElement, friendName) {
        if (window.selectedFriendsToInvite.has(friendName)) {
            window.selectedFriendsToInvite.delete(friendName);
            rowElement.classList.remove('selected');
        } else {
            window.selectedFriendsToInvite.add(friendName);
            rowElement.classList.add('selected');
        }
        updateSelectAllBtnText();
    }

    function toggleSelectAllFriends() {
        const rows = document.querySelectorAll('.friend-invite-row');
        if (rows.length === 0) return;

        if (window.selectedFriendsToInvite.size === rows.length) {
            window.selectedFriendsToInvite.clear();
            rows.forEach(r => r.classList.remove('selected'));
        } else {
            rows.forEach(r => {
                const fname = r.getAttribute('data-fname');
                window.selectedFriendsToInvite.add(fname);
                r.classList.add('selected');
            });
        }
        updateSelectAllBtnText();
    }

    function updateSelectAllBtnText() {
        const rows = document.querySelectorAll('.friend-invite-row');
        const btn = document.getElementById('btn-select-all');
        if(rows.length === 0) return;

        if (window.selectedFriendsToInvite.size === rows.length) {
            btn.innerText = "إلغاء التحديد";
            btn.style.color = "var(--accent-red)";
        } else {
            btn.innerText = "تحديد الكل";
            btn.style.color = "var(--text-main)";
        }
    }

    async function sendInvitesToSelected() {
        if (window.selectedFriendsToInvite.size === 0) return;
        
        const btn = document.getElementById('btn-send-inv-submit');
        btn.innerHTML = '<i class="ph-bold ph-spinner ph-spin"></i> جاري الإرسال...';
        btn.disabled = true;

        try {
            const { getDocs, query, collection, where, updateDoc, doc, arrayUnion } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
            const friendsArray = Array.from(window.selectedFriendsToInvite).map(f => f.toLowerCase());
            
            const q = query(collection(window.dbInstance, "users"), where("username_lower", "in", friendsArray));
            const snap = await getDocs(q);
            
            const inviteData = {
                roomId: window.currentRoomId,
                hostName: window.currentUserData.username,
                timestamp: Date.now()
            };

            snap.forEach(async (d) => {
                await updateDoc(doc(window.dbInstance, "users", d.id), {
                    gameInvites: arrayUnion(inviteData)
                });
            });
            
            closeInviteModal();
            const btnReady = document.getElementById('btn-ready-action');
            const originalReadyText = btnReady.innerHTML;
            btnReady.innerHTML = `<i class="ph-bold ph-paper-plane-right"></i> تم إرسال الدعوات`;
            setTimeout(() => { btnReady.innerHTML = originalReadyText; }, 3000);

        } catch (e) {
            console.error(e);
            alert("حدث خطأ أثناء الإرسال");
        } finally {
            btn.innerHTML = '<i class="ph-bold ph-paper-plane-tilt"></i> إرسال الدعوات';
            btn.disabled = false;
        }
    }

    if (window.currentRoomId) { window.listenToRoom(); }
</script>
