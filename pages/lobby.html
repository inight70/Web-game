<style>
    .lobby-wrapper { max-width: 1000px; margin: 0 auto; padding: 20px 10px 80px 10px; animation: smoothFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    /* =========================================
       1. شريط التحكم العلوي (Sleek Dashboard Header)
       ========================================= */
    .esports-lobby-header {
        background: rgba(20, 20, 25, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.05); border-bottom: 2px solid var(--accent-red);
        border-radius: 20px; padding: 15px 25px; margin-bottom: 30px;
        display: flex; justify-content: space-between; align-items: center;
        box-shadow: 0 15px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .header-side { display: flex; align-items: center; gap: 15px; flex: 1; }
    .header-side.right { justify-content: flex-end; }

    /* زر الإعدادات */
    .btn-room-settings {
        background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-main);
        width: 44px; height: 44px; border-radius: 14px; display: flex; justify-content: center; align-items: center;
        font-size: 1.4rem; cursor: pointer; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-room-settings:hover { background: var(--accent-red); color: white; border-color: var(--accent-red); transform: rotate(90deg); box-shadow: 0 5px 15px rgba(255, 76, 106, 0.3); }

    /* حالة الغرفة (تدور) */
    .room-status-pill {
        background: rgba(46, 204, 113, 0.1); color: var(--accent-green); padding: 8px 16px; border-radius: 12px;
        font-size: 0.85rem; font-weight: 800; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(46, 204, 113, 0.2);
    }
    @keyframes fastSpin { 100% { transform: rotate(360deg); } }
    .spin-icon { animation: fastSpin 1.2s linear infinite; }

    /* كود الغرفة (في المنتصف - قصير وأنيق) */
    .header-center-code {
        display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; cursor: pointer; group;
    }
    .code-sm-label { font-size: 0.7rem; color: var(--text-dim); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2px; }
    .code-display-box {
        display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.5); padding: 8px 25px;
        border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); transition: 0.3s;
    }
    .header-center-code:hover .code-display-box { background: rgba(255,76,106,0.1); border-color: var(--accent-red); transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255,76,106,0.2); }
    .room-code-text { font-size: 1.8rem; font-weight: 900; color: white; font-family: var(--font-en); letter-spacing: 6px; margin-right: -6px; }
    .room-code-copy { color: var(--text-dim); font-size: 1.2rem; transition: 0.3s; }
    .header-center-code:hover .room-code-copy { color: var(--accent-red); }

    /* عداد اللاعبين */
    .player-count-pill {
        background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white;
        padding: 8px 16px; border-radius: 12px; font-size: 0.9rem; font-weight: 800; font-family: var(--font-en);
        display: flex; align-items: center; gap: 8px;
    }

    /* =========================================
       2. شبكة اللاعبين بالأمبلمات
       ========================================= */
    .lobby-section-title { font-size: 1.1rem; font-weight: 800; color: white; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
    .invite-btn-small { background: rgba(255, 76, 106, 0.1); color: var(--accent-red); border: 1px solid rgba(255, 76, 106, 0.3); padding: 8px 16px; border-radius: 12px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 6px; -webkit-tap-highlight-color: transparent; }
    .invite-btn-small:hover { background: var(--accent-red); color: white; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 76, 106, 0.4); }

    .emblems-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }

    /* مكان اللاعب الفارغ */
    .empty-emblem-slot {
        height: 100px; border-radius: 20px; background: rgba(0,0,0,0.3); border: 2px dashed rgba(255,255,255,0.1);
        display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px;
        color: var(--text-dim); transition: 0.3s; cursor: pointer; position: relative; overflow: hidden;
    }
    .empty-emblem-slot:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); color: white; transform: translateY(-2px); }
    .empty-emblem-slot i { font-size: 1.8rem; color: rgba(255,255,255,0.2); transition: 0.3s; }
    .empty-emblem-slot:hover i { color: var(--accent-red); transform: scale(1.1); }
    .empty-emblem-slot span { font-size: 0.85rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

    .host-crown-wrapper { position: absolute; top: -15px; left: 15px; z-index: 10; animation: bounceGlow 2s infinite alternate; filter: drop-shadow(0 2px 8px rgba(255,215,0,0.6)); }
    @keyframes bounceGlow { 0% { transform: translateY(0); filter: drop-shadow(0 2px 5px rgba(255,215,0,0.4)); } 100% { transform: translateY(-4px); filter: drop-shadow(0 5px 15px rgba(255,215,0,0.8)); } }

    /* =========================================
       3. أزرار التحكم السفلية
       ========================================= */
    .lobby-bottom-actions { display: flex; gap: 15px; }
    .btn-ready-master {
        flex: 2; background: linear-gradient(135deg, var(--accent-green) 0%, #27ae60 100%); color: var(--bg-base);
        padding: 18px; border-radius: 18px; font-weight: 900; font-size: 1.1rem; border: none; cursor: pointer;
        transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 10px 25px rgba(46, 204, 113, 0.3);
        display: flex; justify-content: center; align-items: center; gap: 10px;
    }
    .btn-ready-master:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 35px rgba(46, 204, 113, 0.5); }
    .btn-ready-master:active { transform: translateY(0) scale(0.98); }
    
    .btn-leave-master {
        flex: 1; background: rgba(255,255,255,0.03); color: var(--accent-red); padding: 18px; border-radius: 18px;
        font-weight: 800; font-size: 1.05rem; border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
        transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: flex; justify-content: center; align-items: center; gap: 8px;
    }
    .btn-leave-master:hover { background: rgba(255, 76, 106, 0.1); border-color: var(--accent-red); transform: translateY(-3px); }
    .btn-leave-master:active { transform: translateY(0) scale(0.98); }

    @media (max-width: 768px) {
        .esports-lobby-header { flex-direction: column; gap: 15px; padding: 20px; border-radius: 24px; }
        .header-side { width: 100%; justify-content: space-between; }
        .emblems-grid { grid-template-columns: 1fr; gap: 15px; } 
        .lobby-bottom-actions { flex-direction: column; }
    }
</style>

<div class="lobby-wrapper">
    
    <div class="esports-lobby-header">
        <div class="header-side">
            <button class="btn-room-settings" onclick="openRoomSettings()"><i class="ph-bold ph-sliders-horizontal"></i></button>
            <div class="room-status-pill"><i class="ph-bold ph-circle-notch spin-icon"></i> بانتظار اللاعبين</div>
        </div>

        <div class="header-center-code" onclick="copyRoomCode()">
            <div class="code-sm-label">كود الغرفة</div>
            <div class="code-display-box">
                <span class="room-code-text" id="dynamic-room-code">-----</span>
                <i class="ph-bold ph-copy room-code-copy"></i>
            </div>
        </div>

        <div class="header-side right">
            <div class="player-count-pill"><i class="ph-fill ph-users"></i> <span id="player-count-text">1/6</span></div>
        </div>
    </div>

    <div class="lobby-section-title">
        <span>اللاعبون المنضمون</span>
        <button class="invite-btn-small" onclick="alert('سيتم إظهار قائمة الأصدقاء قريباً')">
            <i class="ph-bold ph-user-plus"></i> دعوة أصدقاء
        </button>
    </div>

    <div class="emblems-grid" id="lobby-players-grid">
        </div>

    <div class="lobby-bottom-actions">
        <button class="btn-ready-master" id="btn-ready-action" onclick="toggleReadyState()">
            <i class="ph-bold ph-check-circle" style="font-size: 1.4rem;"></i> أنا جاهز للبدء
        </button>
        <button class="btn-leave-master" onclick="leaveRoom()">
            <i class="ph-bold ph-sign-out" style="font-size: 1.3rem;"></i> مغادرة
        </button>
    </div>

</div>

<script>
    // توليد كود قصير مكون من 5 حروف/أرقام (بدون الأحرف المتشابهة)
    function generateSimpleRoomCode() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // بدون I, O, 0, 1
        let code = '';
        for (let i = 0; i < 5; i++) {
            code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return code;
    }

    function initLobby() {
        if (!window.currentUserData || !window.UI_COMPONENTS) {
            setTimeout(initLobby, 100);
            return;
        }

        // توليد وعرض الكود القصير
        if (!window.currentRoomCode) {
            window.currentRoomCode = generateSimpleRoomCode();
        }
        document.getElementById('dynamic-room-code').innerText = window.currentRoomCode;

        const grid = document.getElementById('lobby-players-grid');
        
        // بناء أمبلم الهوست وإرسال 'true' لإخفاء الأفتار الداخلي
        let hostEmblem = window.UI_COMPONENTS.buildEmblemCard(window.currentUserData, "100px", true);
        
        let hostWrapper = `
            <div style="position: relative;">
                <div class="host-crown-wrapper"><i class="ph-fill ph-crown" style="font-size: 2.2rem; color: gold;"></i></div>
                ${hostEmblem}
            </div>
        `;

        let emptySlotHtml = `
            <div class="empty-emblem-slot" onclick="alert('سيتم إظهار قائمة الأصدقاء قريباً')">
                <i class="ph-duotone ph-user-plus"></i>
                <span>مكان فارغ</span>
            </div>
        `;

        grid.innerHTML = hostWrapper + emptySlotHtml.repeat(5); // 1 host + 5 empty = 6 slots
    }

    function openRoomSettings() {
        alert("إعدادات الغرفة: سيتم برمجتها لتحديد (نوع اللعبة، عدد اللاعبين، الخصوصية)");
    }

    function copyRoomCode() {
        const code = document.getElementById('dynamic-room-code').innerText;
        if(code === '-----') return;
        navigator.clipboard.writeText(code);
        alert("تم نسخ كود الغرفة: " + code);
    }

    function toggleReadyState() {
        const btn = document.getElementById('btn-ready-action');
        if (btn.innerText.includes("أنا جاهز")) {
            btn.innerHTML = `<i class="ph-bold ph-x-circle" style="font-size: 1.4rem;"></i> إلغاء الجاهزية`;
            btn.style.background = "var(--surface-hover)";
            btn.style.color = "var(--text-main)";
            btn.style.boxShadow = "none";
        } else {
            btn.innerHTML = `<i class="ph-bold ph-check-circle" style="font-size: 1.4rem;"></i> أنا جاهز للبدء`;
            btn.style.background = "linear-gradient(135deg, var(--accent-green) 0%, #27ae60 100%)";
            btn.style.color = "var(--bg-base)";
        }
    }

    function leaveRoom() {
        if(confirm("هل أنت متأكد من مغادرة الغرفة؟")) {
            window.currentRoomCode = null; 
            if(window.loadFragment) window.loadFragment('play', document.querySelectorAll('.nav-btn')[1]);
        }
    }

    initLobby();
</script>
