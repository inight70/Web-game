<style>
    .lobby-master-container { max-width: 900px; margin: 0 auto; padding: 20px 10px 90px 10px; animation: smoothFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    /* سبينر حقيقي يدور */
    @keyframes spinFast { 100% { transform: rotate(360deg); } }
    .animate-spin { animation: spinFast 1s linear infinite; display: inline-block; }

    /* =========================================
       1. الهيدر التكتيكي الفخم (Tactical Header)
       ========================================= */
    .premium-lobby-header {
        background: var(--surface-panel); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
        padding: 20px 25px; display: flex; justify-content: space-between; align-items: center;
        box-shadow: 0 15px 40px rgba(0,0,0,0.4); margin-bottom: 25px; position: relative; overflow: hidden;
    }
    /* خط النيون العلوي */
    .premium-lobby-header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--accent-red), transparent); opacity: 0.8; }

    .lobby-header-left { display: flex; flex-direction: column; gap: 8px; }
    .room-status-badge {
        font-size: 0.8rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px;
        display: flex; align-items: center; gap: 6px;
    }

    .code-value-box {
        background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); padding: 8px 20px;
        border-radius: 12px; display: inline-flex; align-items: center; gap: 15px; cursor: pointer;
        transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .code-value-box:hover { background: rgba(255, 76, 106, 0.1); border-color: rgba(255, 76, 106, 0.4); transform: translateY(-2px); }
    .code-text { font-size: 2rem; font-weight: 900; color: white; font-family: var(--font-en); letter-spacing: 4px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    .copy-icon { color: var(--text-dim); font-size: 1.2rem; transition: 0.3s; }
    .code-value-box:hover .copy-icon { color: var(--accent-red); }

    .lobby-header-right { display: flex; align-items: center; gap: 15px; }
    
    /* زر الإعدادات الجديد */
    .btn-room-settings {
        background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: var(--text-main);
        width: 45px; height: 45px; border-radius: 14px; display: flex; justify-content: center; align-items: center;
        font-size: 1.4rem; cursor: pointer; transition: 0.3s; -webkit-tap-highlight-color: transparent;
    }
    .btn-room-settings:hover { background: rgba(255,255,255,0.1); color: white; transform: rotate(45deg); }

    /* =========================================
       2. شبكة اللاعبين (الأمبلمات بدون أفتار)
       ========================================= */
    .lobby-section-title { font-size: 1.1rem; font-weight: 800; color: white; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
    
    .emblems-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }

    .player-slot-wrap { position: relative; transition: 0.3s; }
    .player-slot-wrap:hover { transform: translateY(-3px); }

    /* النجمة الفخمة بديل التاج */
    .host-star-wrapper {
        position: absolute; top: -10px; left: -10px; z-index: 10;
        background: var(--bg-base); padding: 4px; border-radius: 50%;
        display: flex; justify-content: center; align-items: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .host-star-wrapper i { font-size: 1.4rem; color: var(--accent-red); filter: drop-shadow(0 0 8px rgba(255,76,106,0.8)); }

    /* مكان فارغ احترافي يتطابق مع شكل الأمبلم */
    .empty-emblem-slot {
        height: 85px; border-radius: 20px; background: rgba(255,255,255,0.01); border: 1px dashed rgba(255,255,255,0.1);
        display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
        color: var(--text-dim); transition: 0.3s; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .empty-emblem-slot:hover { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.3); color: white; }
    .empty-emblem-slot i { font-size: 1.8rem; }
    .empty-emblem-slot span { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

    /* =========================================
       3. أزرار التحكم السفلية
       ========================================= */
    .lobby-bottom-actions { display: flex; gap: 15px; }
    .btn-ready-master {
        flex: 2; background: var(--surface-panel); color: var(--text-main); border: 1px solid rgba(255,255,255,0.1);
        padding: 16px; border-radius: 18px; font-weight: 800; font-size: 1.1rem; cursor: pointer;
        transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: flex; justify-content: center; align-items: center; gap: 10px;
    }
    .btn-ready-master.is-ready { background: var(--accent-red); color: white; border-color: var(--accent-red); box-shadow: 0 10px 25px rgba(255, 76, 106, 0.3); }
    .btn-ready-master:active { transform: scale(0.98); }
    
    .btn-leave-master {
        flex: 1; background: transparent; color: var(--text-dim); padding: 16px; border-radius: 18px;
        font-weight: 800; font-size: 1rem; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px;
    }
    .btn-leave-master:hover { background: rgba(255,76,106,0.1); color: var(--accent-red); border-color: var(--accent-red); }

    @media (max-width: 768px) {
        .emblems-grid { grid-template-columns: 1fr; }
        .premium-lobby-header { flex-direction: column; align-items: flex-start; gap: 20px; }
        .lobby-header-right { width: 100%; justify-content: flex-end; }
        .lobby-bottom-actions { flex-direction: column; }
    }
</style>

<div class="lobby-master-container">
    
    <div class="premium-lobby-header">
        <div class="lobby-header-left">
            <div class="room-status-badge">
                <i class="ph-bold ph-spinner animate-spin"></i> 
                <span id="player-count-text">بانتظار اللاعبين... (1/6)</span>
            </div>
            <div class="code-value-box" onclick="copyRoomCode()">
                <span class="code-text" id="dynamic-room-code">----</span>
                <i class="ph-bold ph-copy copy-icon"></i>
            </div>
        </div>
        
        <div class="lobby-header-right">
            <button class="btn-room-settings" onclick="openRoomSettings()">
                <i class="ph-fill ph-gear-six"></i>
            </button>
        </div>
    </div>

    <div class="lobby-section-title">
        <span>فريق العمليات</span>
        <span style="font-size:0.8rem; color:var(--text-dim);" id="ready-count-text">جاهز: 0/1</span>
    </div>

    <div class="emblems-grid" id="lobby-players-grid">
        <div style="text-align:center; padding: 20px; color:var(--text-dim); width:100%; grid-column: span 2;">
            <i class="ph-bold ph-spinner animate-spin" style="font-size:2rem;"></i> جاري تحميل الغرفة...
        </div>
    </div>

    <div class="lobby-bottom-actions">
        <button class="btn-ready-master" id="btn-ready-action" onclick="toggleReadyState()">
            <i class="ph-bold ph-check-circle" style="font-size: 1.4rem;"></i> أنا جاهز
        </button>
        <button class="btn-leave-master" onclick="window.leaveFirebaseRoom()">
            <i class="ph-bold ph-sign-out" style="font-size: 1.2rem;"></i> مغادرة
        </button>
    </div>

</div>

<script>
    // دالة لجلب بيانات اللاعبين ورسمهم (تُستدعى من room-manager.js)
    window.fetchAndRenderLobbyPlayers = async function() {
        if (!window.currentRoomData || !window.UI_COMPONENTS) return;

        document.getElementById('dynamic-room-code').innerText = window.currentRoomData.id;
        
        const playersArray = window.currentRoomData.players || [];
        const maxPlayers = window.currentRoomData.maxPlayers || 6;
        document.getElementById('player-count-text').innerText = `بانتظار اللاعبين... (${playersArray.length}/${maxPlayers})`;

        const grid = document.getElementById('lobby-players-grid');
        grid.innerHTML = ''; // مسح التحميل

        // سحب بيانات كل لاعب من مجموعة users
        const { getDocs, query, collection, where } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
        
        try {
            // بحث عن المستخدمين الموجودين في المصفوفة
            const q = query(collection(window.dbInstance, "users"), where("username_lower", "in", playersArray));
            const snap = await getDocs(q);
            
            let playersData = {};
            snap.forEach(doc => { playersData[doc.data().username_lower] = doc.data(); });

            // رسم الأمبلمات بناءً على الترتيب
            playersArray.forEach(pName => {
                let pData = playersData[pName] || { username: pName };
                // بناء الأمبلم بدون أفتار داخلي (hideAvatar = true) وبطول 85px
                let emblem = window.UI_COMPONENTS.buildEmblemCard(pData, "85px", true);
                
                // إضافة النجمة إذا كان هو المالك
                let hostMark = (window.currentRoomData.hostId === pData.uid || pName === playersArray[0]) ? 
                    `<div class="host-star-wrapper"><i class="ph-fill ph-star-four"></i></div>` : '';

                grid.innerHTML += `
                    <div class="player-slot-wrap">
                        ${hostMark}
                        ${emblem}
                    </div>
                `;
            });

            // رسم الأماكن الفارغة
            const emptyCount = maxPlayers - playersArray.length;
            for(let i=0; i<emptyCount; i++) {
                grid.innerHTML += `
                    <div class="empty-emblem-slot" onclick="alert('سيتم فتح قائمة دعوة الأصدقاء')">
                        <i class="ph-duotone ph-plus-circle"></i>
                        <span>دعوة</span>
                    </div>
                `;
            }

        } catch (error) { console.error("Error rendering players:", error); }
    };

    function copyRoomCode() {
        const code = document.getElementById('dynamic-room-code').innerText;
        if(code === '----') return;
        navigator.clipboard.writeText(code);
        alert("تم نسخ الكود: " + code);
    }

    function toggleReadyState() {
        const btn = document.getElementById('btn-ready-action');
        btn.classList.toggle('is-ready');
        if (btn.classList.contains('is-ready')) {
            btn.innerHTML = `<i class="ph-bold ph-check-circle" style="font-size: 1.4rem;"></i> بانتظار البقية...`;
        } else {
            btn.innerHTML = `<i class="ph-bold ph-check-circle" style="font-size: 1.4rem;"></i> أنا جاهز`;
        }
        // سيتم ربطها بالفايربيس لإخبار الآخرين أنك جاهز
    }

    function openRoomSettings() {
        alert("سيتم فتح نافذة إعدادات الغرفة (الوقت، الطور، الخ) لاحقاً.");
    }

    // تفعيل السيرفر عند دخول الصفحة
    if (window.currentRoomId) {
        window.listenToRoom(); // إذا كان لديه غرفة مسبقاً
    }
</script>
