<style>
    .lobby-master-container { max-width: 950px; margin: 0 auto; padding: 20px 10px 90px 10px; animation: smoothFadeIn 0.5s ease forwards; }
    @keyframes spinFast { 100% { transform: rotate(360deg); } }
    .animate-spin { animation: spinFast 1s linear infinite; display: inline-block; }

    /* =========================================
       1. الهيدر الاحترافي (مستطيل صافي تماماً)
       ========================================= */
    .premium-lobby-header {
        background-image: url('assets/images/lobby-header-bg.jpg');
        background-size: cover; 
        background-position: center;
        border-radius: 20px; 
        position: relative; 
        overflow: hidden;
        min-height: 240px; 
        margin-bottom: 30px;
        /* إزالة أي إطار أو ظل أو ضبابية حسب الطلب */
        border: none;
        box-shadow: none;
        filter: none;
    }

    /* العنوان شفاف وبدون ظلال */
    .header-game-title {
        position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
        font-size: 2.2rem; font-weight: 900; 
        color: rgba(255, 255, 255, 0.25); /* شفافية */
        font-family: var(--font-en);
        letter-spacing: 8px; text-transform: uppercase;
        text-shadow: none; /* بدون ظلال */
        pointer-events: none;
    }

    /* بانتظار اللاعبين - أقصى اليمين تحت بخط صغير */
    .header-bottom-right {
        position: absolute; bottom: 15px; right: 20px;
        font-size: 0.75rem; color: rgba(255,255,255,0.6); 
        font-weight: 600; pointer-events: none; border: none;
    }

    /* منطقة اليسار تحت (للكود والإعدادات) */
    .header-bottom-left {
        position: absolute; bottom: 15px; left: 20px;
        display: flex; flex-direction: row; align-items: flex-end; gap: 20px;
    }
    
    /* تصميم الكود الأنيق (الكلمة فوق والكود تحت) */
    .clean-code-container {
        display: flex; flex-direction: column; align-items: flex-start; gap: 4px;
    }
    .clean-code-label { 
        font-size: 0.7rem; color: rgba(255,255,255,0.7); font-weight: 700; 
        text-transform: uppercase; letter-spacing: 1px; margin-left: 2px;
    }
    .clean-code-box {
        display: flex; align-items: center; gap: 10px; 
        background: rgba(0, 0, 0, 0.4); padding: 8px 16px; 
        border-radius: 12px; cursor: pointer; transition: 0.2s;
    }
    .clean-code-box:hover { background: rgba(0, 0, 0, 0.6); }
    .clean-code-value { 
        font-size: 1.5rem; font-weight: 900; color: white; 
        font-family: var(--font-en); letter-spacing: 3px; line-height: 1; 
    }
    
    /* زر الإعدادات العالمي الجديد */
    .clean-settings-btn {
        display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: white;
        font-weight: 600; cursor: pointer; transition: 0.2s; 
        background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.1); 
        padding: 10px 18px; border-radius: 100px; backdrop-filter: blur(5px);
        -webkit-tap-highlight-color: transparent; margin-bottom: 2px;
    }
    .clean-settings-btn:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }
    .clean-settings-btn i { font-size: 1.2rem; }

    /* =========================================
       2. شبكة اللاعبين
       ========================================= */
    .lobby-section-title { font-size: 1rem; font-weight: 800; color: var(--text-dim); margin-bottom: 15px; text-transform: uppercase; }
    .emblems-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }

    .player-slot-combo { display: flex; flex-direction: row-reverse; align-items: stretch; gap: 10px; position: relative; transition: 0.2s; }
    .player-slot-combo:hover { transform: translateY(-2px); }

    .character-select-box {
        width: 80px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px; display: flex; justify-content: center; align-items: center;
        cursor: pointer; transition: 0.2s; flex-shrink: 0;
    }
    .character-select-box:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); }
    .character-select-box i { font-size: 1.8rem; color: rgba(255,255,255,0.3); transition: 0.2s; }
    .character-select-box:hover i { color: var(--accent-red); }

    .emblem-fluid-wrapper { flex: 1; min-width: 0; position: relative; }

    .host-badge-small { 
        position: absolute; top: -5px; right: -5px; z-index: 10; 
        background: var(--accent-red); width: 18px; height: 18px; border-radius: 50%; 
        display: flex; justify-content: center; align-items: center; 
        border: 2px solid var(--bg-base);
    }
    .host-badge-small i { font-size: 0.65rem; color: white; }

    .empty-emblem-slot {
        border-radius: 16px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.1);
        display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
        color: var(--text-dim); transition: 0.2s; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .empty-emblem-slot:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.3); color: white; }
    .empty-emblem-slot i { font-size: 1.5rem; }

    /* =========================================
       3. أزرار التحكم السفلية (Discord Style)
       ========================================= */
    .lobby-bottom-actions { display: flex; gap: 12px; }
    
    .btn-discord-ready { 
        flex: 2; background-color: var(--surface-panel); color: white; 
        border: none; border-radius: 8px; /* زوايا ديسكورد */
        font-weight: 700; font-size: 1.05rem; padding: 16px; cursor: pointer; 
        transition: background-color 0.2s ease, transform 0.1s ease; 
        display: flex; justify-content: center; align-items: center; gap: 8px; 
    }
    .btn-discord-ready:hover { background-color: rgba(255, 255, 255, 0.1); }
    .btn-discord-ready:active { transform: scale(0.98); }
    
    /* عند الجاهزية يتحول للأخضر العالمي */
    .btn-discord-ready.is-ready { background-color: #23a559; color: white; }
    .btn-discord-ready.is-ready:hover { background-color: #1b8546; }
    
    .btn-discord-leave { 
        flex: 1; background-color: transparent; color: var(--accent-red); 
        border: none; border-radius: 8px; 
        font-weight: 700; font-size: 1rem; padding: 16px; cursor: pointer; 
        transition: background-color 0.2s ease, transform 0.1s ease; 
        display: flex; justify-content: center; align-items: center; gap: 8px; 
    }
    .btn-discord-leave:hover { background-color: rgba(242, 63, 67, 0.1); }
    .btn-discord-leave:active { transform: scale(0.98); }

    /* =========================================
       استجابة الشاشات (الجوال / الكمبيوتر)
       ========================================= */
    @media (max-width: 768px) {
        .emblems-grid { grid-template-columns: 1fr; }
        .premium-lobby-header { min-height: 160px; padding: 15px; border-radius: 16px; }
        .header-game-title { font-size: 1.8rem; top: 15px; letter-spacing: 5px; }
        .header-bottom-right { bottom: 12px; right: 15px; font-size: 0.7rem; }
        .header-bottom-left { bottom: 12px; left: 15px; gap: 10px; flex-direction: column; align-items: flex-start; }
        .clean-settings-btn { padding: 8px 14px; font-size: 0.75rem; }
        .clean-code-value { font-size: 1.3rem; }
        .lobby-bottom-actions { flex-direction: column; }
    }

    /* النوافذ (Modals) الأساسية */
    .game-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 100000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s ease; padding: 15px; }
    .game-modal-overlay.show { opacity: 1; visibility: visible; }
    .game-modal-card { background: var(--surface-panel); width: 100%; max-width: 420px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 50px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; transform: scale(0.95); transition: 0.3s; }
    .game-modal-overlay.show .game-modal-card { transform: scale(1); }

    .modal-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-size: 1.1rem; font-weight: 800; color: white; display: flex; align-items: center; gap: 8px; }
    .btn-close-modal { background: none; border: none; color: var(--text-dim); font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
    .btn-close-modal:hover { color: white; transform: rotate(90deg); }

    /* الدعوات - تصميم جديد وأنيق */
    .invite-list-wrapper { padding: 15px; max-height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; scrollbar-width: none; }
    .invite-list-wrapper::-webkit-scrollbar { display: none; }
    .friend-invite-row { display: flex; align-items: center; justify-content: space-between; background: transparent; padding: 8px 12px; border-radius: 8px; transition: background-color 0.2s; cursor: pointer; border: none; }
    .friend-invite-row:hover { background: rgba(255,255,255,0.03); }
    .friend-info-mini { display: flex; align-items: center; gap: 12px; }
    .friend-av-mini { width: 38px; height: 38px; border-radius: 50%; background: var(--bg-base); display: flex; justify-content: center; align-items: center; font-weight: bold; overflow: hidden; color: white; }
    .friend-av-mini img { width: 100%; height: 100%; object-fit: cover; }
    .friend-name-mini { font-size: 0.95rem; font-weight: 700; color: white; font-family: var(--font-en); }
    
    /* Checkbox احترافي */
    .custom-checkbox { width: 20px; height: 20px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); display: flex; justify-content: center; align-items: center; color: transparent; transition: 0.2s; background: transparent; }
    .custom-checkbox i { font-size: 0.75rem; transform: scale(0.5); transition: 0.2s; }
    .friend-invite-row.selected .custom-checkbox { background: var(--accent-red); border-color: var(--accent-red); color: white; }
    .friend-invite-row.selected .custom-checkbox i { transform: scale(1); }
    
    /* الفوتر الخاص بالدعوة */
    .modal-footer { padding: 15px 20px; background: var(--bg-base); display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); }
    .btn-select-all { background: transparent; color: var(--text-dim); border: none; font-weight: 600; font-size: 0.9rem; cursor: pointer; padding: 5px; transition: 0.2s; }
    .btn-select-all:hover { color: white; }
    .btn-send-invites { background: var(--accent-red); color: white; border: none; border-radius: 8px; font-weight: 700; font-size: 0.95rem; padding: 10px 24px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(255, 76, 106, 0.2); }
    .btn-send-invites:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-send-invites:active { transform: scale(0.95); }
</style>

<div class="lobby-master-container">
    
    <div class="premium-lobby-header">
        <div class="header-game-title" data-i18n="main_game_title">Deception</div>
        
        <div class="header-bottom-left">
            <div class="clean-code-container">
                <span class="clean-code-label">Code</span>
                <div class="clean-code-box" onclick="copyRoomCode()">
                    <span class="clean-code-value" id="dynamic-room-code">----</span>
                    <i class="ph-bold ph-copy" style="color: rgba(255,255,255,0.5); font-size: 1.1rem;"></i>
                </div>
            </div>
            <button class="clean-settings-btn" onclick="alert('سيتم فتح نافذة الإعدادات')">
                <i class="ph-fill ph-gear"></i> إعدادات اللعبة
            </button>
        </div>

        <div class="header-bottom-right">
            <span id="player-count-text">بانتظار اللاعبين...</span>
        </div>
    </div>

    <div class="lobby-section-title">الأعضاء</div>
    <div class="emblems-grid" id="lobby-players-grid">
        <div style="text-align:center; padding: 20px; color:var(--text-dim); width:100%; grid-column: span 2;">
            <i class="ph-bold ph-spinner animate-spin" style="font-size:1.5rem;"></i>
        </div>
    </div>

    <div class="lobby-bottom-actions">
        <button class="btn-discord-ready" id="btn-ready-action" onclick="toggleReadyState()">
            تأكيد الجاهزية
        </button>
        <button class="btn-discord-leave" onclick="openLeaveModal()">
            مغادرة
        </button>
    </div>

</div>

<div class="game-modal-overlay" id="custom-leave-modal">
    <div class="game-modal-card" style="text-align: center; padding: 30px 20px; max-width: 350px;">
        <h3 style="color: white; margin-bottom: 10px; font-size: 1.2rem;">مغادرة الغرفة؟</h3>
        <p style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 25px;">لن تتمكن من العودة إذا امتلأت الغرفة.</p>
        <div style="display: flex; gap: 10px;">
            <button onclick="closeLeaveModal()" style="flex:1; background: var(--surface-panel); color:white; border:1px solid rgba(255,255,255,0.1); padding:12px; border-radius:8px; font-weight:700; cursor:pointer;">بقاء</button>
            <button onclick="executeLeaveRoom()" style="flex:1; background: var(--accent-red); color:white; border:none; padding:12px; border-radius:8px; font-weight:700; cursor:pointer;">مغادرة</button>
        </div>
    </div>
</div>

<div class="game-modal-overlay" id="invite-friends-modal" onclick="if(event.target === this) closeInviteModal()">
    <div class="game-modal-card">
        <div class="modal-header">
            <div class="modal-title">دعوة الأصدقاء</div>
            <button class="btn-close-modal" onclick="closeInviteModal()"><i class="ph-bold ph-x"></i></button>
        </div>
        <div class="invite-list-wrapper" id="invite-friends-list"></div>
        <div class="modal-footer">
            <button class="btn-select-all" id="btn-select-all" onclick="toggleSelectAllFriends()">تحديد الكل</button>
            <button class="btn-send-invites" id="btn-send-inv-submit" onclick="sendInvitesToSelected()">إرسال الدعوات</button>
        </div>
    </div>
</div>

<script>
    window.fetchAndRenderLobbyPlayers = function() {
        if (!window.currentRoomData || !window.UI_COMPONENTS) return;

        document.getElementById('dynamic-room-code').innerText = window.currentRoomData.id;
        
        const playersArray = window.currentRoomData.players || [];
        const maxPlayers = window.currentRoomData.maxPlayers || 6;
        document.getElementById('player-count-text').innerText = `بانتظار اللاعبين... (${playersArray.length}/${maxPlayers})`;

        const grid = document.getElementById('lobby-players-grid');
        grid.innerHTML = ''; 

        let emblemHeight = window.innerWidth > 768 ? "105px" : "85px";

        playersArray.forEach(pName => {
            let pData = window.lobbyPlayersCache[pName] || window.friendsCache[pName] || { username: pName };
            let emblem = window.UI_COMPONENTS.buildEmblemCard(pData, emblemHeight, true);
            
            let hostMark = (window.currentRoomData.hostId === pData.uid || pName === playersArray[0]) ? 
                `<div class="host-badge-small"><i class="ph-fill ph-star"></i></div>` : '';

            grid.innerHTML += `
                <div class="player-slot-combo">
                    <div class="character-select-box" onclick="alert('سيتم فتح نافذة اختيار الشخصية')">
                        <i class="ph-fill ph-user"></i>
                    </div>
                    <div class="emblem-fluid-wrapper">
                        ${hostMark}
                        ${emblem}
                    </div>
                </div>
            `;
        });

        const emptyCount = maxPlayers - playersArray.length;
        for(let i=0; i<emptyCount; i++) {
            grid.innerHTML += `
                <div class="empty-emblem-slot" style="height: ${emblemHeight};" onclick="openInviteModal()">
                    <i class="ph-bold ph-plus"></i>
                </div>
            `;
        }
    };

    function copyRoomCode() {
        const code = document.getElementById('dynamic-room-code').innerText;
        if(code === '----') return;
        navigator.clipboard.writeText(code);
        const icon = document.querySelector('.clean-code-box .ph-copy');
        if(icon) {
            icon.className = 'ph-bold ph-check';
            icon.style.color = 'var(--accent-green)';
            setTimeout(() => { 
                icon.className = 'ph-bold ph-copy'; 
                icon.style.color = 'rgba(255,255,255,0.5)';
            }, 2000);
        }
    }

    function toggleReadyState() {
        const btn = document.getElementById('btn-ready-action');
        btn.classList.toggle('is-ready');
        if (btn.classList.contains('is-ready')) {
            btn.innerHTML = `<i class="ph-bold ph-check"></i> إلغاء الجاهزية`;
        } else {
            btn.innerHTML = `تأكيد الجاهزية`;
        }
    }

    function openLeaveModal() { document.getElementById('custom-leave-modal').classList.add('show'); }
    function closeLeaveModal() { document.getElementById('custom-leave-modal').classList.remove('show'); }
    function executeLeaveRoom() { closeLeaveModal(); if(window.leaveFirebaseRoom) window.leaveFirebaseRoom(); }

    window.selectedFriendsToInvite = new Set();
    function openInviteModal() {
        const modal = document.getElementById('invite-friends-modal');
        const listContainer = document.getElementById('invite-friends-list');
        window.selectedFriendsToInvite.clear(); updateSelectAllBtnText();
        const friendsArray = (window.currentUserData && Array.isArray(window.currentUserData.friends)) ? window.currentUserData.friends : [];
        const currentPlayers = window.currentRoomData ? window.currentRoomData.players : [];
        
        if (friendsArray.length === 0) {
            listContainer.innerHTML = `<div style="text-align:center; padding: 30px 10px; color: var(--text-dim); font-size: 0.9rem;">لا يوجد أصدقاء لدعوتهم.</div>`;
        } else {
            let html = '';
            friendsArray.forEach(fName => {
                if(currentPlayers.includes(fName.toLowerCase())) return; 
                const fData = window.friendsCache[fName] || { username: fName };
                const safeName = fData.username || fName;
                let avHtml = `<span>${safeName.charAt(0).toUpperCase()}</span>`;
                if(fData.avatar) avHtml = `<img src="${fData.avatar}">`;
                html += `
                <button class="friend-invite-row" onclick="toggleFriendSelection(this, '${fName}')" data-fname="${fName}">
                    <div class="friend-info-mini">
                        <div class="friend-av-mini">${avHtml}</div>
                        <div class="friend-name-mini">${safeName}</div>
                    </div>
                    <div class="custom-checkbox"><i class="ph-bold ph-check"></i></div>
                </button>`;
            });
            if(html === '') html = `<div style="text-align:center; padding: 30px 10px; color: var(--text-dim); font-size: 0.9rem;">جميع أصدقائك متواجدون في الغرفة بالفعل!</div>`;
            listContainer.innerHTML = html;
        }
        modal.classList.add('show');
    }

    function closeInviteModal() { document.getElementById('invite-friends-modal').classList.remove('show'); }
    
    function toggleFriendSelection(rowElement, friendName) { 
        if (window.selectedFriendsToInvite.has(friendName)) { 
            window.selectedFriendsToInvite.delete(friendName); 
            rowElement.classList.remove('selected'); 
        } else { 
            window.selectedFriendsToInvite.add(friendName); 
            rowElement.classList.add('selected'); 
        } 
        updateSelectAllBtnText(); 
    }
    
    function toggleSelectAllFriends() { 
        const rows = document.querySelectorAll('.friend-invite-row'); 
        if (rows.length === 0) return; 
        if (window.selectedFriendsToInvite.size === rows.length) { 
            window.selectedFriendsToInvite.clear(); 
            rows.forEach(r => r.classList.remove('selected')); 
        } else { 
            rows.forEach(r => { 
                const fname = r.getAttribute('data-fname'); 
                window.selectedFriendsToInvite.add(fname); 
                r.classList.add('selected'); 
            }); 
        } 
        updateSelectAllBtnText(); 
    }
    
    function updateSelectAllBtnText() { 
        const rows = document.querySelectorAll('.friend-invite-row'); 
        const btn = document.getElementById('btn-select-all'); 
        if(rows.length === 0) return; 
        if (window.selectedFriendsToInvite.size === rows.length) { 
            btn.innerText = "إلغاء التحديد"; 
        } else { 
            btn.innerText = "تحديد الكل"; 
        } 
    }

    async function sendInvitesToSelected() {
        if (window.selectedFriendsToInvite.size === 0) return;
        const btn = document.getElementById('btn-send-inv-submit');
        btn.innerHTML = 'جاري...'; btn.disabled = true;
        try {
            const { getDocs, query, collection, where, updateDoc, doc, arrayUnion } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
            const friendsArray = Array.from(window.selectedFriendsToInvite).map(f => f.toLowerCase());
            const q = query(collection(window.dbInstance, "users"), where("username_lower", "in", friendsArray));
            const snap = await getDocs(q);
            const inviteData = { roomId: window.currentRoomId, hostName: window.currentUserData.username, timestamp: Date.now() };
            snap.forEach(async (d) => { await updateDoc(doc(window.dbInstance, "users", d.id), { gameInvites: arrayUnion(inviteData) }); });
            closeInviteModal();
        } catch (e) { alert("حدث خطأ"); } finally { btn.innerHTML = 'إرسال الدعوات'; btn.disabled = false; }
    }

    if (window.currentRoomId) { window.listenToRoom(); }
</script>
