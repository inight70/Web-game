<style>
    /* =========================================
       الخلفية العامة للصفحة مع البلور
       ========================================= */
    .lobby-master-container { 
        max-width: 1000px; margin: 0 auto; padding: 20px 15px 90px 15px; 
        animation: smoothFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        position: relative; z-index: 1; min-height: 100vh;
    }
    
    /* صورة الخلفية الكاملة للوبي */
    .lobby-master-container::before {
        content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: url('assets/images/lobby-bg.jpg') center/cover no-repeat;
        filter: blur(8px) brightness(0.4); /* البلور والتعتيم */
        z-index: -1; transform: scale(1.1); /* منع الحواف البيضاء بسبب البلور */
    }

    @keyframes spinFast { 100% { transform: rotate(360deg); } }
    .animate-spin { animation: spinFast 1s linear infinite; display: inline-block; }

    /* =========================================
       الهيدر الفخم (الخلفية الخاصة + الشفافية)
       ========================================= */
    .premium-lobby-header {
        background: url('assets/images/lobby-header-bg.jpg') center/cover no-repeat;
        border-radius: 24px; position: relative; overflow: hidden;
        box-shadow: 0 20px 50px rgba(0,0,0,0.6); margin-bottom: 30px;
        border: 1px solid rgba(255,255,255,0.1);
    }
    /* الطبقة الزجاجية فوق صورة الهيدر */
    .premium-lobby-header::after {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(135deg, rgba(20,20,25,0.85) 0%, rgba(20,20,25,0.6) 100%);
        backdrop-filter: blur(10px); z-index: 1;
    }

    .header-content-wrapper {
        position: relative; z-index: 2; padding: 30px;
        display: flex; justify-content: space-between; align-items: flex-start;
    }

    /* عرض كود الغرفة المطور (Tiles Design) */
    .room-code-section { display: flex; flex-direction: column; gap: 10px; }
    .room-code-label { font-size: 0.8rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 3px; }
    
    .code-tiles-wrapper { display: flex; gap: 8px; align-items: center; cursor: pointer; transition: 0.3s; }
    .code-tiles-wrapper:hover { transform: translateY(-3px); }
    .code-tiles-wrapper:hover .code-tile { border-color: var(--accent-red); box-shadow: 0 5px 15px rgba(255,76,106,0.3); color: white; }
    .code-tiles-wrapper:hover .copy-badge { background: var(--accent-red); color: white; }

    .code-tile {
        width: 50px; height: 60px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px; display: flex; justify-content: center; align-items: center;
        font-size: 2.2rem; font-weight: 900; font-family: var(--font-en); color: rgba(255,255,255,0.9);
        backdrop-filter: blur(5px); transition: 0.3s;
    }
    .copy-badge {
        background: rgba(255,255,255,0.1); border: none; color: var(--text-dim); height: 60px; padding: 0 15px;
        border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem;
        cursor: pointer; transition: 0.3s; backdrop-filter: blur(5px);
    }

    /* أزرار الهيدر (الإعدادات والدعوة للموبايل) */
    .header-actions-right { display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }
    
    .btn-room-settings {
        background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white;
        width: 45px; height: 45px; border-radius: 14px; display: flex; justify-content: center; align-items: center;
        font-size: 1.5rem; cursor: pointer; transition: 0.3s; backdrop-filter: blur(5px);
    }
    .btn-room-settings:hover { background: rgba(255,255,255,0.15); transform: rotate(90deg); color: var(--accent-red); }

    .mobile-invite-btn { display: none; } /* مخفي في الكمبيوتر */

    /* حالة الانتظار السفلية */
    .waiting-status-text {
        font-size: 0.95rem; font-weight: 600; color: rgba(255,255,255,0.8);
        display: flex; align-items: center; gap: 10px; margin-top: 15px;
        text-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }
    .waiting-status-text i { color: var(--accent-red); }

    /* =========================================
       شبكة اللاعبين والأزرار السفلية (زجاجية)
       ========================================= */
    .lobby-section-title { font-size: 1.1rem; font-weight: 800; color: white; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
    
    .emblems-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
    .player-slot-wrap { position: relative; transition: 0.3s; }
    .player-slot-wrap:hover { transform: translateY(-3px); }

    .host-star-wrapper {
        position: absolute; top: -10px; left: -10px; z-index: 10;
        background: var(--bg-base); padding: 5px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.6);
    }
    .host-star-wrapper i { font-size: 1.5rem; color: var(--accent-red); filter: drop-shadow(0 0 8px rgba(255,76,106,0.8)); }

    /* المكان الفارغ شفاف زجاجي */
    .empty-emblem-slot {
        height: 85px; border-radius: 20px; background: rgba(20,20,25,0.5); border: 1px dashed rgba(255,255,255,0.15);
        display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
        color: rgba(255,255,255,0.5); transition: 0.3s; cursor: pointer; backdrop-filter: blur(10px); -webkit-tap-highlight-color: transparent;
    }
    .empty-emblem-slot:hover { background: rgba(20,20,25,0.8); border-color: rgba(255,255,255,0.4); color: white; }

    .lobby-bottom-actions { display: flex; gap: 15px; }
    .btn-ready-master {
        flex: 2; background: rgba(20,20,25,0.6); color: white; border: 1px solid rgba(255,255,255,0.1);
        padding: 16px; border-radius: 18px; font-weight: 800; font-size: 1.1rem; cursor: pointer;
        transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; backdrop-filter: blur(15px);
    }
    .btn-ready-master.is-ready { background: var(--accent-red); border-color: var(--accent-red); box-shadow: 0 10px 25px rgba(255, 76, 106, 0.4); }
    .btn-ready-master:active { transform: scale(0.98); }
    
    .btn-leave-master {
        flex: 1; background: rgba(20,20,25,0.6); color: var(--accent-red); padding: 16px; border-radius: 18px; font-weight: 800; font-size: 1rem; border: 1px solid rgba(255,76,106,0.3); cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; backdrop-filter: blur(15px);
    }
    .btn-leave-master:hover { background: rgba(255,76,106,0.15); }

    /* =========================================
       تجاوب الجوال
       ========================================= */
    @media (max-width: 768px) {
        .emblems-grid { grid-template-columns: 1fr; }
        .header-content-wrapper { flex-direction: column; gap: 20px; }
        .header-actions-right { width: 100%; flex-direction: row-reverse; justify-content: space-between; position: absolute; top: 20px; right: 20px; left: 20px; width: auto; }
        .room-code-section { margin-top: 40px; align-items: center; width: 100%; }
        
        /* إظهار زر الدعوة الخاص بالجوال */
        .mobile-invite-btn {
            display: flex; background: rgba(255,76,106,0.1); border: 1px solid rgba(255,76,106,0.3); color: var(--accent-red);
            padding: 0 15px; height: 45px; border-radius: 14px; align-items: center; gap: 8px; font-weight: 800;
            backdrop-filter: blur(5px); cursor: pointer; transition: 0.3s;
        }
        .lobby-bottom-actions { flex-direction: column; }
    }
</style>

<div class="lobby-master-container">
    
    <div class="premium-lobby-header">
        <div class="header-content-wrapper">
            
            <div class="room-code-section">
                <div class="room-code-label">رمز الغرفة السري</div>
                <div class="code-tiles-wrapper" onclick="copyRoomCode()" id="room-tiles-container">
                    <div class="code-tile">-</div><div class="code-tile">-</div><div class="code-tile">-</div><div class="code-tile">-</div>
                    <button class="copy-badge"><i class="ph-bold ph-copy"></i></button>
                </div>
                <div class="waiting-status-text">
                    <i class="ph-bold ph-spinner animate-spin"></i> 
                    <span id="player-count-text">جاري الاتصال...</span>
                </div>
            </div>
            
            <div class="header-actions-right">
                <button class="btn-room-settings" onclick="openRoomSettings()">
                    <i class="ph-fill ph-faders"></i>
                </button>
                <button class="mobile-invite-btn" onclick="openInviteModal()">
                    <i class="ph-bold ph-user-plus"></i> دعوة
                </button>
            </div>
            
        </div>
    </div>

    <div class="lobby-section-title">
        <span>فريق العمليات</span>
        <span style="font-size:0.8rem; color:var(--text-dim);" id="ready-count-text"></span>
    </div>

    <div class="emblems-grid" id="lobby-players-grid">
        <div style="text-align:center; padding: 30px; color:var(--text-dim); width:100%; grid-column: span 2; background: rgba(20,20,25,0.5); border-radius: 20px; backdrop-filter: blur(10px);">
            <i class="ph-bold ph-spinner animate-spin" style="font-size:2.5rem; margin-bottom: 10px;"></i><br>جاري تهيئة الغرفة...
        </div>
    </div>

    <div class="lobby-bottom-actions">
        <button class="btn-ready-master" id="btn-ready-action" onclick="toggleReadyState()">
            <i class="ph-bold ph-check-circle" style="font-size: 1.4rem;"></i> أنا جاهز
        </button>
        <button class="btn-leave-master" onclick="window.leaveFirebaseRoom()">
            <i class="ph-bold ph-sign-out" style="font-size: 1.2rem;"></i> مغادرة
        </button>
    </div>
</div>

<div class="invite-modal-overlay" id="invite-friends-modal" onclick="if(event.target === this) closeInviteModal()">
    </div>

<script>
    window.fetchAndRenderLobbyPlayers = function() {
        if (!window.currentRoomData || !window.UI_COMPONENTS) return;

        const code = window.currentRoomData.id;
        
        // تحديث مربعات الكود (Tiles) برمجياً
        const tilesContainer = document.getElementById('room-tiles-container');
        tilesContainer.innerHTML = '';
        for (let i = 0; i < code.length; i++) {
            tilesContainer.innerHTML += `<div class="code-tile">${code[i]}</div>`;
        }
        tilesContainer.innerHTML += `<button class="copy-badge"><i class="ph-bold ph-copy"></i></button>`;
        
        // تحديث النصوص
        const playersArray = window.currentRoomData.players || [];
        const maxPlayers = window.currentRoomData.maxPlayers || 6;
        document.getElementById('player-count-text').innerText = `بانتظار اكتمال الفريق... (${playersArray.length}/${maxPlayers})`;

        const grid = document.getElementById('lobby-players-grid');
        grid.innerHTML = ''; 

        playersArray.forEach(pName => {
            let pData = window.lobbyPlayersCache[pName] || window.friendsCache[pName] || { username: pName };
            let emblem = window.UI_COMPONENTS.buildEmblemCard(pData, "85px", true); // الأمبلم بدون أفتار
            
            let hostMark = (window.currentRoomData.hostId === pData.uid || pName === playersArray[0]) ? 
                `<div class="host-star-wrapper"><i class="ph-fill ph-star-four"></i></div>` : '';

            grid.innerHTML += `
                <div class="player-slot-wrap">
                    ${hostMark}
                    ${emblem}
                </div>
            `;
        });

        const emptyCount = maxPlayers - playersArray.length;
        for(let i=0; i<emptyCount; i++) {
            grid.innerHTML += `
                <div class="empty-emblem-slot" onclick="openInviteModal()">
                    <i class="ph-duotone ph-plus-circle"></i>
                    <span>دعوة صديق</span>
                </div>
            `;
        }
    };

    function copyRoomCode() {
        if(!window.currentRoomData) return;
        navigator.clipboard.writeText(window.currentRoomData.id);
        alert("تم نسخ الكود: " + window.currentRoomData.id);
    }

    function toggleReadyState() {
        const btn = document.getElementById('btn-ready-action');
        btn.classList.toggle('is-ready');
        if (btn.classList.contains('is-ready')) {
            btn.innerHTML = `<i class="ph-bold ph-check-circle" style="font-size: 1.4rem;"></i> بانتظار البقية...`;
        } else {
            btn.innerHTML = `<i class="ph-bold ph-check-circle" style="font-size: 1.4rem;"></i> أنا جاهز`;
        }
    }

    function openRoomSettings() { alert("سيتم فتح إعدادات الجيم بلاي (وقت، طور) قريباً."); }

    if (window.currentRoomId) { window.listenToRoom(); }
</script>
