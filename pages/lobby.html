<style>
    /* =========================================
       1. الخلفية العامة والبلور الخفيف
       ========================================= */
    .lobby-master-wrapper {
        position: absolute; inset: 0; min-height: 100vh;
        background-image: url('assets/images/lobby-bg.jpg'); /* صورتك الخاصة باللوبي */
        background-size: cover; background-position: center; background-attachment: fixed;
        animation: smoothFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        overflow-y: auto; overflow-x: hidden;
    }
    .lobby-bg-overlay {
        position: absolute; inset: 0; min-height: 100%;
        background: rgba(15, 15, 20, 0.45); /* تعتيم خفيف */
        backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); /* بلور خفيف جداً */
        z-index: 0;
    }
    
    .lobby-content-container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 20px 15px 100px 15px; }

    @keyframes spinFast { 100% { transform: rotate(360deg); } }
    .animate-spin { animation: spinFast 1s linear infinite; display: inline-block; }

    /* =========================================
       2. الهيدر التكتيكي الشفاف
       ========================================= */
    .premium-lobby-header {
        background-image: url('assets/images/lobby-header.jpg'); /* صورة الهيدر */
        background-size: cover; background-position: center;
        border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
        padding: 25px; display: flex; justify-content: space-between; align-items: center;
        box-shadow: 0 15px 40px rgba(0,0,0,0.6); margin-bottom: 25px; position: relative;
    }
    /* تعتيم فوق صورة الهيدر لكي تظهر النصوص */
    .premium-lobby-header::after {
        content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.5); border-radius: 20px; z-index: 1;
    }
    .lobby-header-inner { position: relative; z-index: 2; width: 100%; display: flex; justify-content: space-between; align-items: center; }

    .lobby-header-left { display: flex; flex-direction: column; gap: 15px; }
    .code-label { font-size: 0.8rem; font-weight: 800; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 2px; }

    /* التصميم الحديث والحصري لكود الغرفة (Tactical Blocks) */
    .tactical-code-display {
        background-image: url('assets/images/code-bg.jpg'); /* صورة مربع الكود بدون بلور */
        background-size: cover; background-position: center;
        border: 1px solid rgba(255,255,255,0.2); padding: 10px 15px;
        border-radius: 14px; display: inline-flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.3s;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3);
    }
    .tactical-code-display:hover { border-color: var(--accent-red); transform: translateY(-2px); }
    
    .code-char-box {
        background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255,76,106,0.3);
        width: 35px; height: 45px; display: flex; justify-content: center; align-items: center;
        border-radius: 8px; font-size: 1.8rem; font-weight: 900; color: white; font-family: var(--font-en);
        text-shadow: 0 0 10px rgba(255,76,106,0.5);
    }
    .copy-icon { color: var(--text-dim); font-size: 1.4rem; margin-left: 5px; transition: 0.3s; }
    .tactical-code-display:hover .copy-icon { color: var(--accent-red); }

    /* زر دعوة الأصدقاء الخاص بالجوال (يظهر في الجوال فقط) */
    .mobile-invite-btn { display: none; background: rgba(255, 76, 106, 0.15); color: var(--accent-red); border: 1px solid rgba(255, 76, 106, 0.4); width: 45px; height: 45px; border-radius: 14px; justify-content: center; align-items: center; font-size: 1.4rem; cursor: pointer; transition: 0.3s; backdrop-filter: blur(5px); }
    .mobile-invite-btn:active { transform: scale(0.9); }

    /* =========================================
       3. شبكة اللاعبين (شفافة)
       ========================================= */
    .lobby-section-title { font-size: 1.1rem; font-weight: 800; color: white; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }
    
    .emblems-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }

    .player-slot-wrap { position: relative; transition: 0.3s; }
    .player-slot-wrap:hover { transform: translateY(-3px); }
    .host-star-wrapper { position: absolute; top: -10px; left: -10px; z-index: 10; background: rgba(0,0,0,0.8); padding: 4px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 1px solid rgba(255,215,0,0.3); }
    .host-star-wrapper i { font-size: 1.4rem; color: gold; filter: drop-shadow(0 0 8px rgba(255,215,0,0.8)); }

    /* الأماكن الفارغة شفافة لتندمج مع الخلفية */
    .empty-emblem-slot {
        height: 85px; border-radius: 20px; background: rgba(0,0,0,0.4); border: 1px dashed rgba(255,255,255,0.15);
        display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
        color: rgba(255,255,255,0.5); transition: 0.3s; cursor: pointer; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
    }
    .empty-emblem-slot:hover { background: rgba(0,0,0,0.6); border-color: rgba(255,255,255,0.4); color: white; }

    /* =========================================
       4. شريط الحالة السفلي (متصل وأنيق)
       ========================================= */
    .lobby-status-bar {
        background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); padding: 15px 25px;
        border-radius: 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px;
        backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); font-size: 1rem; font-weight: 700; color: white;
    }

    /* =========================================
       5. أزرار التحكم السفلية
       ========================================= */
    .lobby-bottom-actions { display: flex; gap: 12px; }
    
    .btn-room-settings { flex: 1; background: rgba(0,0,0,0.5); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 18px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; backdrop-filter: blur(5px); }
    .btn-room-settings:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }
    
    .btn-ready-master { flex: 3; background: rgba(0,0,0,0.5); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 16px; border-radius: 18px; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; backdrop-filter: blur(5px); }
    .btn-ready-master.is-ready { background: var(--accent-red); color: white; border-color: var(--accent-red); box-shadow: 0 10px 25px rgba(255, 76, 106, 0.3); }
    .btn-ready-master:active { transform: scale(0.98); }
    
    .btn-leave-master { flex: 1; background: rgba(255,76,106,0.1); color: var(--accent-red); padding: 16px; border-radius: 18px; font-weight: 800; font-size: 1rem; border: 1px solid rgba(255,76,106,0.3); cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
    .btn-leave-master:hover { background: var(--accent-red); color: white; }

    /* =========================================
       الاستجابة للشاشات (Mobile)
       ========================================= */
    @media (max-width: 768px) {
        .mobile-invite-btn { display: flex; } /* إظهار زر الدعوة في الجوال */
        .emblems-grid { grid-template-columns: 1fr; }
        .lobby-bottom-actions { flex-wrap: wrap; }
        .btn-ready-master { order: -1; min-width: 100%; } /* زر الجاهزية يأخذ العرض الكامل بالأعلى */
    }
</style>

<div class="lobby-master-wrapper">
    <div class="lobby-bg-overlay"></div>
    
    <div class="lobby-content-container">
        
        <div class="premium-lobby-header">
            <div class="lobby-header-inner">
                <div class="lobby-header-left">
                    <div class="code-label">كود التشفير السري للغرفة</div>
                    <div class="tactical-code-display" onclick="copyRoomCode()" id="tactical-code-wrap">
                        <div class="code-char-box">-</div><div class="code-char-box">-</div><div class="code-char-box">-</div><div class="code-char-box">-</div>
                        <i class="ph-bold ph-copy copy-icon"></i>
                    </div>
                </div>
                
                <div class="lobby-header-right">
                    <button class="mobile-invite-btn" onclick="if(window.openInviteModal) window.openInviteModal();">
                        <i class="ph-bold ph-user-plus"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="lobby-section-title">
            <span>فريق العمليات المتصل</span>
            <span style="font-size:0.8rem; color:var(--text-dim);" id="ready-count-text"></span>
        </div>

        <div class="emblems-grid" id="lobby-players-grid">
            <div style="text-align:center; padding: 20px; color:rgba(255,255,255,0.7); width:100%; grid-column: span 2;">
                <i class="ph-bold ph-spinner animate-spin" style="font-size:2rem;"></i> جاري فك التشفير...
            </div>
        </div>

        <div class="lobby-status-bar" id="room-status-bar">
            <i class="ph-bold ph-spinner animate-spin" style="color: var(--accent-red); font-size: 1.5rem;"></i> 
            <span id="player-count-text">تأمين الاتصال وبانتظار باقي اللاعبين...</span>
        </div>

        <div class="lobby-bottom-actions">
            <button class="btn-room-settings" onclick="openRoomSettings()">
                <i class="ph-bold ph-faders"></i> إعدادات
            </button>
            <button class="btn-ready-master" id="btn-ready-action" onclick="toggleReadyState()">
                <i class="ph-bold ph-check-circle" style="font-size: 1.4rem;"></i> تأكيد الجاهزية
            </button>
            <button class="btn-leave-master" onclick="window.leaveFirebaseRoom()">
                <i class="ph-bold ph-sign-out" style="font-size: 1.2rem;"></i>
            </button>
        </div>

    </div>
</div>

<div class="invite-modal-overlay" id="invite-friends-modal" onclick="if(event.target === this) closeInviteModal()">
    <div class="invite-modal-card">
        <div class="invite-header">
            <div class="invite-title"><i class="ph-fill ph-users-three" style="color: var(--accent-red);"></i> دعوة الأصدقاء</div>
            <button class="close-invite-btn" onclick="closeInviteModal()"><i class="ph-bold ph-x"></i></button>
        </div>
        <div class="invite-list-wrapper" id="invite-friends-list"></div>
        <div class="invite-footer">
            <button class="btn-select-all" id="btn-select-all" onclick="toggleSelectAllFriends()">تحديد الكل</button>
            <button class="btn-send-invites" id="btn-send-inv-submit" onclick="sendInvitesToSelected()"><i class="ph-bold ph-paper-plane-tilt"></i> إرسال الدعوات</button>
        </div>
    </div>
</div>

<script>
    window.fetchAndRenderLobbyPlayers = function() {
        if (!window.currentRoomData || !window.UI_COMPONENTS) return;

        // 1. توليد كود الغرفة بالشكل التكتيكي الجديد
        const codeString = window.currentRoomData.id || "----";
        let codeHtml = '';
        for(let i=0; i<codeString.length; i++){
            codeHtml += `<div class="code-char-box">${codeString[i]}</div>`;
        }
        codeHtml += `<i class="ph-bold ph-copy copy-icon"></i>`;
        document.getElementById('tactical-code-wrap').innerHTML = codeHtml;
        
        // 2. تحديث جملة "بانتظار اللاعبين" الديناميكية
        const playersArray = window.currentRoomData.players || [];
        const maxPlayers = window.currentRoomData.maxPlayers || 6;
        document.getElementById('player-count-text').innerText = `تأمين الاتصال وبانتظار باقي اللاعبين... (${playersArray.length}/${maxPlayers})`;

        // 3. رسم الأمبلمات
        const grid = document.getElementById('lobby-players-grid');
        grid.innerHTML = ''; 

        playersArray.forEach(pName => {
            let pData = window.lobbyPlayersCache[pName] || window.friendsCache[pName] || { username: pName };
            let emblem = window.UI_COMPONENTS.buildEmblemCard(pData, "85px", true);
            
            let hostMark = (window.currentRoomData.hostId === pData.uid || pName === playersArray[0]) ? 
                `<div class="host-star-wrapper"><i class="ph-fill ph-star-four"></i></div>` : '';

            grid.innerHTML += `
                <div class="player-slot-wrap">
                    ${hostMark}
                    ${emblem}
                </div>
            `;
        });

        // رسم الأماكن الفارغة الشفافة
        const emptyCount = maxPlayers - playersArray.length;
        for(let i=0; i<emptyCount; i++) {
            grid.innerHTML += `
                <div class="empty-emblem-slot" onclick="if(window.openInviteModal) window.openInviteModal();">
                    <i class="ph-duotone ph-plus"></i>
                    <span>مكان متاح</span>
                </div>
            `;
        }
    };

    function copyRoomCode() {
        const code = window.currentRoomData ? window.currentRoomData.id : null;
        if(!code) return;
        navigator.clipboard.writeText(code);
        alert("تم نسخ الكود: " + code);
    }

    function toggleReadyState() {
        const btn = document.getElementById('btn-ready-action');
        btn.classList.toggle('is-ready');
        if (btn.classList.contains('is-ready')) {
            btn.innerHTML = `<i class="ph-bold ph-x-circle" style="font-size: 1.4rem;"></i> إلغاء الجاهزية`;
        } else {
            btn.innerHTML = `<i class="ph-bold ph-check-circle" style="font-size: 1.4rem;"></i> تأكيد الجاهزية`;
        }
    }

    function openRoomSettings() { 
        alert("إعدادات الغرفة (الوقت، عدد اللاعبين) ستبرمج هنا."); 
    }

    /* --- منطق إرسال الدعوات المطور --- */
    window.selectedFriendsToInvite = new Set();

    window.openInviteModal = function() {
        const modal = document.getElementById('invite-friends-modal');
        const listContainer = document.getElementById('invite-friends-list');
        window.selectedFriendsToInvite.clear();
        updateSelectAllBtnText();

        const friendsArray = (window.currentUserData && Array.isArray(window.currentUserData.friends)) ? window.currentUserData.friends : [];
        const currentPlayers = window.currentRoomData ? window.currentRoomData.players : [];
        
        if (friendsArray.length === 0) {
            listContainer.innerHTML = `<div style="text-align:center; padding: 40px 20px; color: var(--text-dim);"><i class="ph-duotone ph-users-slash" style="font-size:3rem; margin-bottom:10px;"></i><br>لا يوجد أصدقاء لدعوتهم.</div>`;
        } else {
            let html = '';
            friendsArray.forEach(fName => {
                if(currentPlayers.includes(fName.toLowerCase())) return; 

                const fData = window.friendsCache[fName] || { username: fName };
                const safeName = fData.username || fName;
                let avHtml = `<span>${safeName.charAt(0).toUpperCase()}</span>`;
                if(fData.avatar) avHtml = `<img src="${fData.avatar}">`;
                
                html += `
                    <div class="friend-invite-row" onclick="toggleFriendSelection(this, '${fName}')" data-fname="${fName}">
                        <div class="friend-info-mini">
                            <div class="friend-av-mini">${avHtml}</div>
                            <div class="friend-name-mini">${safeName}</div>
                        </div>
                        <div class="custom-checkbox"><i class="ph-bold ph-check"></i></div>
                    </div>
                `;
            });
            if(html === '') html = `<div style="text-align:center; padding: 40px 20px; color: var(--text-dim);">جميع أصدقائك موجودون في الغرفة بالفعل!</div>`;
            listContainer.innerHTML = html;
        }

        modal.classList.add('show');
    };

    function closeInviteModal() { document.getElementById('invite-friends-modal').classList.remove('show'); }

    function toggleFriendSelection(rowElement, friendName) {
        if (window.selectedFriendsToInvite.has(friendName)) {
            window.selectedFriendsToInvite.delete(friendName);
            rowElement.classList.remove('selected');
        } else {
            window.selectedFriendsToInvite.add(friendName);
            rowElement.classList.add('selected');
        }
        updateSelectAllBtnText();
    }

    function toggleSelectAllFriends() {
        const rows = document.querySelectorAll('.friend-invite-row');
        if (rows.length === 0) return;

        if (window.selectedFriendsToInvite.size === rows.length) {
            window.selectedFriendsToInvite.clear();
            rows.forEach(r => r.classList.remove('selected'));
        } else {
            rows.forEach(r => {
                const fname = r.getAttribute('data-fname');
                window.selectedFriendsToInvite.add(fname);
                r.classList.add('selected');
            });
        }
        updateSelectAllBtnText();
    }

    function updateSelectAllBtnText() {
        const rows = document.querySelectorAll('.friend-invite-row');
        const btn = document.getElementById('btn-select-all');
        if(rows.length === 0) return;

        if (window.selectedFriendsToInvite.size === rows.length) {
            btn.innerText = "إلغاء التحديد";
            btn.style.color = "var(--accent-red)";
        } else {
            btn.innerText = "تحديد الكل";
            btn.style.color = "var(--text-main)";
        }
    }

    async function sendInvitesToSelected() {
        if (window.selectedFriendsToInvite.size === 0) return;
        
        const btn = document.getElementById('btn-send-inv-submit');
        btn.innerHTML = '<i class="ph-bold ph-spinner ph-spin"></i> جاري الإرسال...';
        btn.disabled = true;

        try {
            const { getDocs, query, collection, where, updateDoc, doc, arrayUnion } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
            const friendsArray = Array.from(window.selectedFriendsToInvite).map(f => f.toLowerCase());
            
            const q = query(collection(window.dbInstance, "users"), where("username_lower", "in", friendsArray));
            const snap = await getDocs(q);
            
            const inviteData = {
                roomId: window.currentRoomId,
                hostName: window.currentUserData.username,
                timestamp: Date.now()
            };

            snap.forEach(async (d) => {
                await updateDoc(doc(window.dbInstance, "users", d.id), {
                    gameInvites: arrayUnion(inviteData)
                });
            });
            
            alert(`تم إرسال دعوات لـ ${window.selectedFriendsToInvite.size} أصدقاء! (ستصلهم في الإشعارات)`);
            closeInviteModal();
        } catch (e) {
            console.error(e);
            alert("حدث خطأ أثناء الإرسال");
        } finally {
            btn.innerHTML = '<i class="ph-bold ph-paper-plane-tilt"></i> إرسال الدعوات';
            btn.disabled = false;
        }
    }

    if (window.currentRoomId) { window.listenToRoom(); }
</script>
