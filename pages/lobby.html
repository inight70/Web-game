<style>
    .lobby-wrapper { max-width: 900px; margin: 0 auto; padding: 10px 10px 80px 10px; animation: smoothFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    /* بطاقة الهيدر العلوية للغرفة */
    .room-header-card { 
        background: linear-gradient(135deg, var(--accent-red) 0%, #ff768e 100%); border-radius: 28px; padding: 30px 20px; 
        text-align: center; color: white; position: relative; overflow: hidden; 
        box-shadow: 0 15px 35px rgba(255, 76, 106, 0.3); margin-bottom: 25px; 
    }
    .room-header-card::before { content: ''; position: absolute; top: -50%; left: -20%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%); border-radius: 50%; pointer-events: none; }
    
    .room-code-label { font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; opacity: 0.9; margin-bottom: 5px; }
    .room-code-display { 
        font-size: 3.5rem; font-weight: 900; letter-spacing: 6px; font-family: var(--font-en); margin: 0; 
        text-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
        display: inline-flex; align-items: center; gap: 10px; padding: 5px 20px; border-radius: 20px;
    }
    .room-code-display:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }
    .room-code-display i { font-size: 1.8rem; opacity: 0.7; }
    
    .room-status-text { font-size: 1rem; font-weight: 600; background: rgba(0,0,0,0.2); padding: 8px 20px; border-radius: 100px; display: inline-block; margin-top: 15px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); }

    /* شبكة اللاعبين (Slots) */
    .players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-bottom: 30px; }
    
    .player-slot { 
        background: var(--surface-panel); border: 2px dashed rgba(255,255,255,0.1); border-radius: 24px; aspect-ratio: 1; 
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; 
        transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); position: relative; padding: 15px;
    }
    /* تأثيرات إذا كان المكان ممتلئاً أو اللاعب جاهزاً */
    .player-slot.filled { border-style: solid; border-color: rgba(255,255,255,0.05); box-shadow: var(--shadow-soft); }
    .player-slot.ready { border-color: var(--accent-green); background: rgba(46, 204, 113, 0.05); box-shadow: 0 10px 25px rgba(46, 204, 113, 0.15); transform: translateY(-5px); }
    .player-slot.host .slot-crown { display: block; }
    
    .slot-crown { display: none; position: absolute; top: -12px; font-size: 1.5rem; color: gold; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); z-index: 5; animation: smoothFadeIn 0.3s ease; }
    
    .slot-avatar { width: 65px; height: 65px; border-radius: 50%; background: var(--bg-base); border: 2px solid transparent; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; font-weight: bold; overflow: hidden; position: relative; }
    .player-slot.ready .slot-avatar { border-color: var(--accent-green); }
    .slot-avatar img { width: 100%; height: 100%; object-fit: cover; }
    
    .slot-name { font-size: 0.9rem; font-weight: 800; color: var(--text-main); font-family: var(--font-en); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
    .slot-status { font-size: 0.75rem; font-weight: 800; padding: 4px 12px; border-radius: 100px; background: var(--bg-base); color: var(--text-dim); transition: 0.3s; }
    .player-slot.ready .slot-status { background: var(--accent-green); color: var(--bg-base); box-shadow: 0 4px 10px rgba(46, 204, 113, 0.4); }

    /* المكان الفارغ */
    .player-slot.empty { color: var(--text-dim); opacity: 0.7; cursor: pointer; }
    .player-slot.empty:hover { background: rgba(255,255,255,0.02); opacity: 1; border-color: rgba(255,255,255,0.2); }
    .player-slot.empty .slot-avatar { background: transparent; border: 2px dashed rgba(255,255,255,0.2); }

    /* شريط الأزرار السفلي */
    .lobby-actions { display: flex; gap: 15px; margin-top: 10px; }
    
    .btn-lobby-ready { flex: 2; background: var(--accent-green); color: var(--bg-base); padding: 18px; border-radius: 20px; font-weight: 900; font-size: 1.15rem; border: none; cursor: pointer; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 10px 25px rgba(46,204,113,0.3); display: flex; justify-content: center; align-items: center; gap: 10px; -webkit-tap-highlight-color: transparent; }
    .btn-lobby-ready:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 35px rgba(46,204,113,0.4); }
    .btn-lobby-ready:active { transform: translateY(0) scale(0.98); }
    
    .btn-lobby-leave { flex: 1; background: rgba(255,76,106,0.05); color: var(--accent-red); padding: 18px; border-radius: 20px; font-weight: 800; font-size: 1.05rem; border: 1px solid rgba(255,76,106,0.2); cursor: pointer; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: flex; justify-content: center; align-items: center; gap: 8px; -webkit-tap-highlight-color: transparent; }
    .btn-lobby-leave:hover { background: var(--accent-red); color: white; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,76,106,0.3); border-color: transparent; }
    .btn-lobby-leave:active { transform: translateY(0) scale(0.98); }

    @media (max-width: 768px) {
        .players-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .room-code-display { font-size: 2.8rem; }
        .room-header-card { padding: 20px 15px; }
        .lobby-actions { flex-direction: column; }
        .btn-lobby-ready, .btn-lobby-leave { width: 100%; padding: 15px; }
    }
</style>

<div class="lobby-wrapper">
    
    <div class="room-header-card">
        <div class="room-code-label">كود الغرفة</div>
        <div class="room-code-display" onclick="copyRoomCode()">
            <span id="display-room-code">------</span>
            <i class="ph-bold ph-copy"></i>
        </div>
        <div class="room-status-text" id="room-status-msg">
            <i class="ph-bold ph-spinner ph-spin"></i> بانتظار اكتمال اللاعبين...
        </div>
    </div>

    <div class="players-grid" id="lobby-players-grid">
        <div class="player-slot filled host ready">
            <i class="ph-fill ph-crown slot-crown"></i>
            <div class="slot-avatar"><i class="ph-fill ph-user"></i></div>
            <div class="slot-name">أنت (Host)</div>
            <div class="slot-status">جاهز</div>
        </div>

        <div class="player-slot filled">
            <div class="slot-avatar"><i class="ph-fill ph-user"></i></div>
            <div class="slot-name">Player 2</div>
            <div class="slot-status">ينتظر</div>
        </div>

        <div class="player-slot empty">
            <div class="slot-avatar"><i class="ph-bold ph-plus"></i></div>
            <div class="slot-name">مكان فارغ</div>
        </div>
        <div class="player-slot empty"><div class="slot-avatar"><i class="ph-bold ph-plus"></i></div><div class="slot-name">مكان فارغ</div></div>
        <div class="player-slot empty"><div class="slot-avatar"><i class="ph-bold ph-plus"></i></div><div class="slot-name">مكان فارغ</div></div>
        <div class="player-slot empty"><div class="slot-avatar"><i class="ph-bold ph-plus"></i></div><div class="slot-name">مكان فارغ</div></div>
    </div>

    <div class="lobby-actions">
        <button class="btn-lobby-ready" id="btn-ready-action" onclick="toggleReadyState()">
            <i class="ph-bold ph-check-circle"></i> أنا جاهز
        </button>
        <button class="btn-lobby-leave" onclick="leaveRoom()">
            <i class="ph-bold ph-sign-out"></i> مغادرة
        </button>
    </div>

</div>

<script>
    function copyRoomCode() {
        const code = document.getElementById('display-room-code').innerText;
        if(code === '------') return;
        navigator.clipboard.writeText(code);
        alert("تم نسخ كود الغرفة: " + code);
    }

    function toggleReadyState() {
        // سيتم برمجتها لاحقاً لإرسال حالتك للفايربيس (جاهز / غير جاهز)
        const btn = document.getElementById('btn-ready-action');
        if (btn.innerText.includes("أنا جاهز")) {
            btn.innerHTML = `<i class="ph-bold ph-x-circle"></i> إلغاء الجاهزية`;
            btn.style.background = "var(--surface-hover)";
            btn.style.color = "var(--text-main)";
        } else {
            btn.innerHTML = `<i class="ph-bold ph-check-circle"></i> أنا جاهز`;
            btn.style.background = "var(--accent-green)";
            btn.style.color = "var(--bg-base)";
        }
    }

    function leaveRoom() {
        if(confirm("هل أنت متأكد من مغادرة الغرفة؟")) {
            // كود الفايربيس للحذف من الغرفة سيضاف هنا
            window.loadFragment('play', document.querySelectorAll('.nav-btn')[1]);
        }
    }
</script>
