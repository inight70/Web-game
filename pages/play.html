<style>
    /* الأنيميشن الأساسي لدخول الصفحة */
    .smooth-fade-in { animation: smoothFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(15px); }
    @keyframes smoothFadeIn { to { opacity: 1; transform: translateY(0); } }

    /* البطاقة الأساسية - تم تعديلها لتأخذ تدرج آرسنال الجديد */
    .hero-game-card { 
        background: var(--cyber-gradient); /* السحر هنا! تم استدعاء التدرج من index.html */
        border-radius: 28px; padding: 0 40px; 
        display: flex; align-items: center; justify-content: space-between; position: relative; overflow: hidden; 
        box-shadow: var(--shadow-glow); /* تحديث الظل ليطابق اللوبي */
        min-height: 380px; gap: 20px; margin-bottom: 20px; 
    }
    .hero-game-card::before { content: ''; position: absolute; top: -50%; right: -20%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%); border-radius: 50%; z-index: 0; pointer-events: none; }
    
    /* حاوية الحالات (Morphing Container) */
    .hero-state-machine { flex: 1; z-index: 2; max-width: 50%; position: relative; height: 300px; display: flex; align-items: center; }
    
    /* الحالات (الصفحات الداخلية للبطاقة) - تم تحسين السلاسة ومنع الاهتزاز */
    .hero-state { width: 100%; position: absolute; transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); opacity: 0; pointer-events: none; transform: translateX(20px); display: flex; flex-direction: column; align-items: flex-start; }
    .hero-state.active { opacity: 1; pointer-events: auto; transform: translateX(0); z-index: 10; }
    .hero-state.exit-left { transform: translateX(-20px); opacity: 0; pointer-events: none; z-index: 1; }

    /* تنسيقات المحتوى الافتراضي */
    .hero-badge-btn { background: rgba(255, 255, 255, 0.2); color: #fff; padding: 8px 16px; border-radius: 100px; font-size: 0.85rem; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
    
    .hero-title { font-size: 2.8rem; font-weight: 800; color: #ffffff; font-family: var(--font-en); line-height: 1.1; margin-bottom: 10px; text-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .hero-desc { font-size: 0.95rem; color: rgba(255, 255, 255, 0.9); line-height: 1.7; font-weight: 500; margin-bottom: 25px; }
    
    /* الأزرار الافتراضية */
    .hero-actions { display: flex; gap: 15px; flex-wrap: wrap; width: 100%; }
    .btn-hero-primary { background-color: #ffffff; color: var(--accent-red); border: none; padding: 14px 28px; border-radius: 100px; font-weight: 800; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15); transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); -webkit-tap-highlight-color: transparent; }
    .btn-hero-secondary { background-color: rgba(255, 255, 255, 0.1); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.4); padding: 14px 28px; border-radius: 100px; font-weight: 700; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; backdrop-filter: blur(5px); -webkit-tap-highlight-color: transparent; }

    /* =========================================
       تنسيقات حالة (الغرف) المدمجة
       ========================================= */
    .room-ui-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; width: 100%; }
    .btn-back-room { background: rgba(255,255,255,0.2); border: none; color: white; width: 38px; height: 38px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; transition: 0.3s; backdrop-filter: blur(5px); -webkit-tap-highlight-color: transparent; }
    .room-ui-title { font-size: 1.5rem; font-weight: 800; color: white; }

    .room-create-btn { width: 100%; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 16px; border-radius: 20px; font-weight: 800; font-size: 1.05rem; cursor: pointer; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: flex; align-items: center; justify-content: center; gap: 10px; backdrop-filter: blur(10px); -webkit-tap-highlight-color: transparent; }

    .room-divider { display: flex; align-items: center; text-align: center; color: rgba(255,255,255,0.6); font-size: 0.8rem; font-weight: bold; margin: 15px 0; width: 100%; }
    .room-divider::before, .room-divider::after { content: ''; flex: 1; border-bottom: 1px dashed rgba(255,255,255,0.3); }
    .room-divider:not(:empty)::before { margin-right: 1em; }
    .room-divider:not(:empty)::after { margin-left: 1em; }

    .room-join-wrapper { display: flex; gap: 10px; width: 100%; background: rgba(0,0,0,0.2); padding: 6px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    .room-code-input { flex: 1; background: transparent; border: none; padding: 12px 15px; color: white; font-size: 1rem; font-family: var(--font-en); font-weight: 800; text-align: center; letter-spacing: 2px; outline: none; text-transform: uppercase; }
    .room-code-input::placeholder { color: rgba(255,255,255,0.5); font-weight: 500; letter-spacing: normal; text-transform: none; }
    .room-join-submit { background: white; color: var(--accent-red); border: none; padding: 0 25px; border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }

    /* =========================================
       حل مشكلة الـ Hover في الجوال وتخصيص اللمس
       ========================================= */
    @media (hover: hover) {
        .hero-badge-btn:hover { background: rgba(255, 255, 255, 0.35); transform: translateY(-2px); }
        .btn-hero-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2); }
        .btn-hero-secondary:hover { background-color: rgba(255, 255, 255, 0.25); border-color: #ffffff; transform: translateY(-3px); }
        .btn-back-room:hover { background: white; color: var(--accent-red); transform: translateX(3px); }
        .room-create-btn:hover { background: white; color: var(--accent-red); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        .room-join-submit:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    }
    
    /* تأثير الضغط الفعلي للجوال والكمبيوتر معاً */
    .btn-hero-primary:active, .room-create-btn:active, .room-join-submit:active { transform: scale(0.95); transition: 0.1s; }
    .btn-hero-secondary:active, .btn-back-room:active { transform: scale(0.95); background-color: rgba(255, 255, 255, 0.3); transition: 0.1s; }

    /* الصورة والبطاقة السفلية */
    .hero-image-wrapper { flex: 1; display: flex; justify-content: flex-end; align-items: flex-end; position: relative; z-index: 1; height: 100%; align-self: flex-end; }
    .hero-character-img { max-width: 100%; max-height: 380px; object-fit: contain; object-position: bottom right; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)); transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    
    .play-page-container { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 1000px; margin: 0 auto; padding-top: 10px; padding-bottom: 80px; }
    .game-card { background-color: var(--surface-panel); border-radius: 24px; padding: 30px; display: flex; gap: 30px; box-shadow: var(--shadow-soft); transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); }
    .secondary-game-card { align-items: center; opacity: 0.85; padding: 20px 30px; }

    /* استجابة الجوال */
    @media (max-width: 768px) { 
        .hero-game-card { flex-direction: column; padding: 30px 20px 0 20px; text-align: center; min-height: auto; } 
        .hero-state-machine { max-width: 100%; width: 100%; height: auto; min-height: 250px; padding: 0 0 20px 0; } 
        .hero-state { align-items: center; }
        .hero-actions { justify-content: center; } 
        .room-ui-header { justify-content: center; position: relative; }
        .btn-back-room { position: absolute; right: 0; }
        .hero-image-wrapper { width: 100%; margin-top: 10px; justify-content: center; } 
        .hero-character-img { max-height: 280px; } 
        .secondary-game-card { text-align: center; padding: 20px; } 
    }
</style>

<div class="play-page-container smooth-fade-in">
    <div class="hero-game-card">
        
        <div class="hero-state-machine">
            
            <div id="hero-state-main" class="hero-state active">
                <h2 class="hero-title" data-i18n="main_game_title">Deception</h2>
                <button class="hero-badge-btn" onclick="window.loadFragment('how-to-play', null)">
                    <i class="ph-bold ph-info"></i> <span data-i18n="how_to_play_badge">شرح اللعبة</span>
                </button>
                <p class="hero-desc" data-i18n="main_game_desc">اكتشف الخداع، تفوق على خصومك، وكن الفائز في هذه المواجهة المليئة بالاستراتيجية والمكر. العب الآن أينما كنت وفي أي وقت!</p>
                <div class="hero-actions">
                    <button class="btn-hero-primary" onclick="switchHeroState('rooms')">
                        <span data-i18n="play_now">العب الآن</span> <i class="ph-bold ph-sword"></i>
                    </button>
                    <button class="btn-hero-secondary" onclick="window.loadFragment('leaderboard', null)">
                        <i class="ph-bold ph-trophy"></i> <span data-i18n="leaderboard_btn">المتصدرون</span>
                    </button>
                </div>
            </div>

            <div id="hero-state-rooms" class="hero-state">
                <div class="room-ui-header">
                    <button class="btn-back-room" onclick="switchHeroState('main')"><i class="ph-bold ph-arrow-right"></i></button>
                    <h3 class="room-ui-title">إعداد الغرفة</h3>
                </div>
                
                <button class="room-create-btn" onclick="handleCreateRoom()">
                    <i class="ph-bold ph-plus-circle" style="font-size: 1.4rem;"></i> أنشئ غرفة جديدة
                </button>

                <div class="room-divider">أو انضم لغرفة</div>

                <div class="room-join-wrapper">
                    <input type="text" class="room-code-input" id="inlineRoomCode" placeholder="أدخل كود الغرفة" maxlength="4" autocomplete="off">
                    <button class="room-join-submit" onclick="handleJoinRoom()">
                        <i class="ph-bold ph-sign-in" style="font-size: 1.3rem;"></i>
                    </button>
                </div>
            </div>

        </div>

        <div class="hero-image-wrapper">
            <img src="assets/images/characters.png" alt="Deception Characters" class="hero-character-img" id="hero-img">
        </div>
    </div>

    <div class="game-card secondary-game-card smooth-fade-in" style="animation-delay: 0.1s; margin-top: 10px;">
        <div class="game-info" style="display: flex; flex-direction: column; gap: 10px;">
            <h3 class="game-title" data-i18n="focus_game_title" style="font-size: 1.4rem; color: var(--text-main);">Focus Mode</h3>
            <p class="game-desc" data-i18n="focus_game_desc" style="font-size: 0.85rem; color: var(--text-dim);">طور لعب سريع يعتمد على التركيز وسرعة البديهة.</p>
            <button class="btn-secondary play-now-btn" disabled style="opacity: 0.5; cursor: not-allowed; width: fit-content; padding: 12px 25px; margin-top: 10px;"><i class="ph-duotone ph-lock"></i> <span data-i18n="coming_soon">قريباً</span></button>
        </div>
    </div>
</div>

<script>
    function switchHeroState(targetState) {
        if (window.isGuest || !window.currentUserData) {
            const wView = document.getElementById('modal-welcome-view'); 
            const fView = document.getElementById('modal-form-view'); 
            const aModal = document.getElementById('auth-modal'); 
            const shell = document.getElementById('app-shell'); 
            
            if(wView) wView.style.display = 'none'; 
            if(fView) fView.style.display = 'block';
            if(window.setFormType) window.setFormType('login'); 
            if(aModal) aModal.classList.remove('hidden'); 
            if(shell) shell.classList.remove('unlocked'); 
            if(window.toggleDropdown) window.toggleDropdown('');
            return;
        }

        const stateMain = document.getElementById('hero-state-main');
        const stateRooms = document.getElementById('hero-state-rooms');
        const img = document.getElementById('hero-img');

        if (targetState === 'rooms') {
            stateMain.classList.remove('active');
            stateMain.classList.add('exit-left');
            
            setTimeout(() => {
                stateRooms.classList.remove('exit-left');
                stateRooms.classList.add('active');
                img.style.transform = "scale(1.08) translateX(-15px)"; 
            }, 50);
        } else {
            stateRooms.classList.remove('active');
            
            setTimeout(() => {
                stateMain.classList.remove('exit-left');
                stateMain.classList.add('active');
                img.style.transform = "scale(1) translateX(0)";
                document.getElementById('inlineRoomCode').value = '';
            }, 50);
        }
    }

    async function handleCreateRoom() {
        const btn = document.querySelector('.room-create-btn');
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<i class="ph-bold ph-spinner ph-spin"></i> جاري الإنشاء...';
        btn.disabled = true;

        if (window.createFirebaseRoom) {
            const success = await window.createFirebaseRoom();
            if (success) {
                window.loadFragment('lobby', document.querySelectorAll('.nav-btn')[1]);
            }
        } else {
            alert("ملف السيرفر غير متصل! يرجى التأكد من استدعاء room-manager.js");
        }

        btn.innerHTML = originalHtml;
        btn.disabled = false;
    }

    async function handleJoinRoom() {
        const code = document.getElementById('inlineRoomCode').value.trim().toUpperCase();
        if (code.length !== 4) {
            if(window.showTempModal) window.showTempModal("خطأ", "كود الغرفة يجب أن يكون 4 أحرف!", "ph-bold ph-warning-circle", "#f90069");
            return;
        }

        const btn = document.querySelector('.room-join-submit');
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<i class="ph-bold ph-spinner ph-spin"></i>';
        btn.disabled = true;

        if (window.joinFirebaseRoom) {
            const success = await window.joinFirebaseRoom(code);
            if (success) {
                window.loadFragment('lobby', document.querySelectorAll('.nav-btn')[1]);
            }
        } else {
            alert("ملف السيرفر غير متصل! يرجى التأكد من استدعاء room-manager.js");
        }

        btn.innerHTML = originalHtml;
        btn.disabled = false;
    }
</script>
