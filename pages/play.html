<div class="play-page-container">
    <div class="game-card main-game-card">
        <div class="game-info">
            <h2 class="game-title" data-i18n="main_game_title">Deception</h2>
            <p class="game-desc" data-i18n="main_game_desc">اكتشف الخداع، تفوق على خصومك، وكن الفائز في هذه المواجهة المليئة بالاستراتيجية والمكر. هل أنت مستعد للبدء؟</p>
            <button class="btn-core play-now-btn" onclick="alert('سيتم برمجة نظام الانضمام للغرف هنا!')">
                <i class="ph-fill ph-play-circle"></i> <span data-i18n="play_now">العب الآن</span>
            </button>
        </div>
        <div class="game-image-placeholder">
            <i class="ph-duotone ph-images"></i>
            <span>مساحة مخصصة لصور الشخصيات</span>
        </div>
    </div>

    <div class="game-card secondary-game-card">
        <div class="game-info">
            <h3 class="game-title" data-i18n="focus_game_title">Focus Mode</h3>
            <p class="game-desc" data-i18n="focus_game_desc">طور لعب سريع يعتمد على التركيز وسرعة البديهة. (سيتم إضافته لاحقاً)</p>
            <button class="btn-secondary play-now-btn" disabled style="opacity: 0.5; cursor: not-allowed; min-width: 150px; padding: 12px;">
                <i class="ph-duotone ph-lock"></i> <span data-i18n="coming_soon">قريباً</span>
            </button>
        </div>
    </div>
</div>
