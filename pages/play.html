<style>
    /* حركة دخول احترافية وناعمة جداً للصفحة بالكامل */
    .smooth-fade-in { animation: smoothFadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; transform: translateY(15px); }
    @keyframes smoothFadeIn { to { opacity: 1; transform: translateY(0); } }

    .hero-game-card { background: linear-gradient(135deg, #ff4c6a 0%, #ff768e 100%); border-radius: 28px; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; position: relative; overflow: hidden; box-shadow: 0 15px 35px rgba(255, 76, 106, 0.3); min-height: 360px; gap: 20px; margin-bottom: 20px; }
    .hero-game-card::before { content: ''; position: absolute; top: -50%; right: -20%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%); border-radius: 50%; z-index: 0; pointer-events: none; }
    .hero-content { flex: 1; z-index: 2; max-width: 50%; padding: 40px 0; }
    
    .hero-badge-btn { background: rgba(255, 255, 255, 0.2); color: #fff; padding: 8px 16px; border-radius: 100px; font-size: 0.85rem; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 15px; letter-spacing: 0.5px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s ease; }
    .hero-badge-btn:hover { background: rgba(255, 255, 255, 0.35); transform: translateY(-2px); }
    
    .hero-title { font-size: 2.8rem; font-weight: 800; color: #ffffff; font-family: var(--font-en); line-height: 1.1; margin-bottom: 10px; text-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .hero-desc { font-size: 0.95rem; color: rgba(255, 255, 255, 0.9); line-height: 1.7; font-weight: 500; margin-bottom: 25px; }
    .hero-actions { display: flex; gap: 15px; flex-wrap: wrap; }
    
    .btn-hero-primary { background-color: #ffffff; color: #ff4c6a; border: none; padding: 14px 28px; border-radius: 100px; font-weight: 800; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .btn-hero-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2); }
    .btn-hero-primary:active { transform: translateY(0) scale(0.98); }
    
    .btn-hero-secondary { background-color: rgba(255, 255, 255, 0.1); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.4); padding: 14px 28px; border-radius: 100px; font-weight: 700; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); backdrop-filter: blur(5px); }
    .btn-hero-secondary:hover { background-color: rgba(255, 255, 255, 0.25); border-color: #ffffff; transform: translateY(-3px); }
    
    .hero-image-wrapper { flex: 1; display: flex; justify-content: flex-end; align-items: flex-end; position: relative; z-index: 1; height: 100%; align-self: flex-end; }
    .hero-character-img { max-width: 100%; max-height: 380px; object-fit: contain; object-position: bottom right; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)); }
    
    .play-page-container { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 1000px; margin: 0 auto; padding-top: 10px; padding-bottom: 80px; }
    .game-card { background-color: var(--surface-panel); border-radius: 24px; padding: 30px; display: flex; gap: 30px; box-shadow: var(--shadow-soft); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(100,100,100,0.05); }
    .secondary-game-card { align-items: center; opacity: 0.85; padding: 20px 30px; }

    /* =========================================
       تصميم نافذة (غرف اللعب) المودرن
       ========================================= */
    .room-menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 1000000; display: flex; justify-content: center; align-items: center; animation: smoothFadeIn 0.2s ease; padding: 20px; opacity: 0; visibility: hidden; pointer-events: none; transition: 0.3s ease; }
    .room-menu-overlay.show { opacity: 1; visibility: visible; pointer-events: auto; }
    
    .room-menu-card { background: var(--surface-panel); width: 100%; max-width: 400px; border-radius: 28px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.08); overflow: hidden; transform: scale(0.9) translateY(20px); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); position: relative; padding: 35px 25px; display: flex; flex-direction: column; gap: 20px; text-align: center; }
    .room-menu-overlay.show .room-menu-card { transform: scale(1) translateY(0); }

    .room-close-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-dim); width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 10; }
    .room-close-btn:hover { background: rgba(255, 76, 106, 0.1); color: var(--accent-red); transform: rotate(90deg) scale(1.1); border-color: rgba(255, 76, 106, 0.4); }

    .room-menu-icon { width: 70px; height: 70px; background: linear-gradient(135deg, var(--accent-red) 0%, #ff768e 100%); color: white; border-radius: 20px; display: flex; justify-content: center; align-items: center; font-size: 2.2rem; margin: 0 auto; box-shadow: 0 10px 20px rgba(255, 76, 106, 0.3); }
    .room-menu-title { font-size: 1.6rem; font-weight: 800; color: var(--text-main); margin-bottom: -5px; }
    .room-menu-desc { font-size: 0.85rem; color: var(--text-dim); font-weight: 600; line-height: 1.5; }

    .room-action-btn { background: rgba(255,255,255,0.03); color: var(--text-main); border: 1px solid rgba(255,255,255,0.08); padding: 16px; border-radius: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1rem; width: 100%; }
    .room-action-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
    .room-action-btn:active { transform: translateY(0) scale(0.98); }

    .room-divider { display: flex; align-items: center; text-align: center; color: var(--text-dim); font-size: 0.75rem; font-weight: bold; margin: 5px 0; }
    .room-divider::before, .room-divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .room-divider:not(:empty)::before { margin-right: .25em; }
    .room-divider:not(:empty)::after { margin-left: .25em; }

    .room-input-wrapper { display: flex; gap: 10px; width: 100%; }
    .room-input { flex: 1; background: var(--bg-base); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 14px 15px; color: var(--text-main); font-size: 0.95rem; font-family: var(--font-en); font-weight: 700; text-align: center; letter-spacing: 2px; outline: none; transition: 0.3s; text-transform: uppercase; }
    .room-input:focus { border-color: var(--accent-red); box-shadow: 0 0 0 3px rgba(255, 76, 106, 0.15); }
    .room-input::placeholder { color: var(--text-dim); font-weight: 500; letter-spacing: normal; text-transform: none; }
    
    .room-join-btn { background: var(--accent-red); color: white; border: none; padding: 0 20px; border-radius: 14px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 5px 15px rgba(255, 76, 106, 0.3); display: flex; justify-content: center; align-items: center; }
    .room-join-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 76, 106, 0.4); }
    .room-join-btn:active { transform: translateY(0) scale(0.95); }
    
    @media (max-width: 768px) { .hero-game-card { flex-direction: column; padding: 30px 20px 0 20px; text-align: center; min-height: auto; } .hero-content { max-width: 100%; display: flex; flex-direction: column; align-items: center; padding-bottom: 20px; } .hero-actions { justify-content: center; } .hero-image-wrapper { width: 100%; margin-top: 10px; justify-content: center; } .hero-character-img { max-height: 280px; } .secondary-game-card { text-align: center; padding: 20px; } }
</style>

<div class="play-page-container smooth-fade-in">
    <div class="hero-game-card">
        <div class="hero-content">
            <h2 class="hero-title" data-i18n="main_game_title">Deception</h2>
            <button class="hero-badge-btn" onclick="window.loadFragment('how-to-play', null)">
                <i class="ph-bold ph-info"></i> <span data-i18n="how_to_play_badge">شرح اللعبة</span>
            </button>
            <p class="hero-desc" data-i18n="main_game_desc">اكتشف الخداع، تفوق على خصومك، وكن الفائز في هذه المواجهة المليئة بالاستراتيجية والمكر. العب الآن أينما كنت وفي أي وقت!</p>
            <div class="hero-actions">
                <button class="btn-hero-primary" onclick="openRoomMenuModal()">
                    <span data-i18n="play_now">العب الآن</span> <i class="ph-bold ph-sword"></i>
                </button>
                <button class="btn-hero-secondary" onclick="window.loadFragment('leaderboard', null)">
                    <i class="ph-bold ph-trophy"></i> <span data-i18n="leaderboard_btn">المتصدرون</span>
                </button>
            </div>
        </div>

        <div class="hero-image-wrapper">
            <img src="assets/images/characters.png" alt="Deception Characters" class="hero-character-img">
        </div>
    </div>

    <div class="game-card secondary-game-card smooth-fade-in" style="animation-delay: 0.1s; margin-top: 20px;">
        <div class="game-info" style="display: flex; flex-direction: column; gap: 10px;">
            <h3 class="game-title" data-i18n="focus_game_title" style="font-size: 1.4rem; color: var(--text-main);">Focus Mode</h3>
            <p class="game-desc" data-i18n="focus_game_desc" style="font-size: 0.85rem; color: var(--text-dim);">طور لعب سريع يعتمد على التركيز وسرعة البديهة.</p>
            <button class="btn-secondary play-now-btn" disabled style="opacity: 0.5; cursor: not-allowed; width: fit-content; padding: 12px 25px; margin-top: 10px;"><i class="ph-duotone ph-lock"></i> <span data-i18n="coming_soon">قريباً</span></button>
        </div>
    </div>
</div>

<div class="room-menu-overlay" id="roomMenuModal" onclick="if(event.target === this) closeRoomMenuModal()">
    <div class="room-menu-card">
        <button class="room-close-btn" onclick="closeRoomMenuModal()"><i class="ph-bold ph-x"></i></button>
        
        <div class="room-menu-icon"><i class="ph-fill ph-game-controller"></i></div>
        <h2 class="room-menu-title">إعداد الغرفة</h2>
        <p class="room-menu-desc">يمكنك إنشاء غرفة جديدة لدعوة أصدقائك، أو إدخال كود غرفة للانضمام إليهم مباشرة.</p>
        
        <button class="room-action-btn" onclick="handleCreateRoom()">
            <i class="ph-bold ph-plus-circle" style="font-size: 1.3rem;"></i> أنشئ غرفة جديدة
        </button>

        <div class="room-divider">أو</div>

        <div class="room-input-wrapper">
            <input type="text" class="room-input" id="roomCodeInput" placeholder="أدخل كود الغرفة" maxlength="6" autocomplete="off">
            <button class="room-join-btn" onclick="handleJoinRoom()">
                <i class="ph-bold ph-sign-in" style="font-size: 1.3rem;"></i>
            </button>
        </div>
    </div>
</div>

<script>
    // دوال فتح وإغلاق نافذة الغرف
    function openRoomMenuModal() {
        // التأكد من أن المستخدم مسجل الدخول قبل فتح النافذة (اختياري، لكن يفضل في الألعاب الأونلاين)
        if (window.isGuest || !window.currentUserData) {
            alert("يرجى تسجيل الدخول لتتمكن من اللعب أونلاين!");
            return;
        }
        document.getElementById('roomMenuModal').classList.add('show');
        document.getElementById('roomCodeInput').value = ''; // تفريغ الحقل
    }

    function closeRoomMenuModal() {
        document.getElementById('roomMenuModal').classList.remove('show');
    }

    // دالة إنشاء الغرفة (نقطة التوقف الحالية بانتظار توجيهاتك)
    function handleCreateRoom() {
        alert("سيتم برمجة منطق إنشاء غرفة في الفايربيس ونقلك للغرفة (Lobby)!");
        // هنا سنكتب لاحقاً كود يولد ID للغرفة، ويحفظها في Firestore، ثم ينقل اللاعب لصفحة Room.
    }

    // دالة الانضمام للغرفة
    function handleJoinRoom() {
        const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
        if (code.length < 4) {
            alert("الرجاء إدخال كود غرفة صحيح!");
            return;
        }
        alert("سيتم البحث عن الغرفة رقم: " + code + " في الفايربيس وإدخالك إليها!");
        // هنا سنكتب لاحقاً كود يبحث عن الغرفة بالـ ID، وإذا كانت موجودة وغير ممتلئة يضيف اللاعب.
    }
</script>
