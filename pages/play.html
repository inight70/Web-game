<style>
    /* حركة دخول احترافية للصفحة بالكامل */
    .smooth-fade-in { animation: smoothFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(15px); }
    @keyframes smoothFadeIn { to { opacity: 1; transform: translateY(0); } }

    /* البطاقة الأساسية (Hero Card) */
    .hero-game-card { background: linear-gradient(135deg, #ff4c6a 0%, #ff768e 100%); border-radius: 28px; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; position: relative; overflow: hidden; box-shadow: 0 20px 40px rgba(255, 76, 106, 0.3); min-height: 380px; gap: 20px; margin-bottom: 20px; transition: 0.4s ease; }
    .hero-game-card::before { content: ''; position: absolute; top: -50%; right: -20%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%); border-radius: 50%; z-index: 0; pointer-events: none; }
    
    /* حاويات الواجهة (المتغيرة) */
    .hero-content-wrapper { flex: 1; z-index: 2; max-width: 55%; position: relative; height: 100%; display: flex; align-items: center; }
    
    /* الواجهة الأساسية */
    .hero-default-view { padding: 40px 0; width: 100%; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); opacity: 1; transform: translateX(0); }
    /* واجهة الغرف (مخفية افتراضياً) */
    .hero-room-view { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; width: 100%; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); opacity: 0; transform: translateX(50px); pointer-events: none; visibility: hidden; }
    
    /* حالة التحول (Morphing State) */
    .hero-game-card.show-rooms .hero-default-view { opacity: 0; transform: translateX(-50px); pointer-events: none; visibility: hidden; }
    .hero-game-card.show-rooms .hero-room-view { opacity: 1; transform: translateX(0); pointer-events: auto; visibility: visible; }
    .hero-game-card.show-rooms .hero-character-img { filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)) brightness(0.3) blur(2px); transform: scale(1.05); }

    .hero-badge-btn { background: rgba(255, 255, 255, 0.2); color: #fff; padding: 8px 16px; border-radius: 100px; font-size: 0.85rem; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 15px; letter-spacing: 0.5px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .hero-badge-btn:hover { background: rgba(255, 255, 255, 0.35); transform: translateY(-2px); }
    
    .hero-title { font-size: 3rem; font-weight: 900; color: #ffffff; font-family: var(--font-en); line-height: 1.1; margin-bottom: 10px; text-shadow: 0 4px 15px rgba(0,0,0,0.2); letter-spacing: -1px; }
    .hero-desc { font-size: 0.95rem; color: rgba(255, 255, 255, 0.9); line-height: 1.7; font-weight: 600; margin-bottom: 25px; }
    .hero-actions { display: flex; gap: 15px; flex-wrap: wrap; }
    
    .btn-hero-primary { background-color: #ffffff; color: #ff4c6a; border: none; padding: 16px 32px; border-radius: 100px; font-weight: 800; font-size: 1rem; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .btn-hero-primary:hover { transform: translateY(-4px) scale(1.03); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25); }
    .btn-hero-primary:active { transform: translateY(0) scale(0.98); }
    
    .btn-hero-secondary { background-color: rgba(255, 255, 255, 0.1); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.4); padding: 16px 32px; border-radius: 100px; font-weight: 700; font-size: 1rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); backdrop-filter: blur(5px); }
    .btn-hero-secondary:hover { background-color: rgba(255, 255, 255, 0.25); border-color: #ffffff; transform: translateY(-4px); }
    .btn-hero-secondary:active { transform: translateY(0) scale(0.98); }
    
    .hero-image-wrapper { flex: 1; display: flex; justify-content: flex-end; align-items: flex-end; position: relative; z-index: 1; height: 100%; align-self: flex-end; }
    .hero-character-img { max-width: 100%; max-height: 400px; object-fit: contain; object-position: bottom right; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)); transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
    
    /* =========================================
       تصميم واجهة الغرف (داخل البطاقة)
       ========================================= */
    .room-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
    .btn-room-back { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); backdrop-filter: blur(10px); }
    .btn-room-back:hover { background: rgba(255,255,255,0.4); transform: translateX(5px); }
    
    .room-title { font-size: 1.8rem; font-weight: 900; color: white; margin: 0; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
    
    .room-options { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 380px; }
    
    .btn-room-action { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 18px; border-radius: 20px; font-weight: 800; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); backdrop-filter: blur(10px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    .btn-room-action:hover { background: white; color: var(--accent-red); transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.2); }
    .btn-room-action:active { transform: translateY(0) scale(0.98); }

    .room-divider { display: flex; align-items: center; text-align: center; color: rgba(255,255,255,0.8); font-size: 0.8rem; font-weight: bold; margin: 5px 0; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }
    .room-divider::before, .room-divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.2); }
    .room-divider:not(:empty)::before { margin-right: .5em; }
    .room-divider:not(:empty)::after { margin-left: .5em; }

    .room-input-group { display: flex; gap: 10px; width: 100%; }
    .room-input { flex: 1; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.3); border-radius: 18px; padding: 16px 20px; color: white; font-size: 1rem; font-family: var(--font-en); font-weight: 800; text-align: center; letter-spacing: 3px; outline: none; transition: 0.3s; text-transform: uppercase; backdrop-filter: blur(10px); }
    .room-input:focus { background: rgba(0,0,0,0.4); border-color: white; box-shadow: 0 0 0 4px rgba(255,255,255,0.2); }
    .room-input::placeholder { color: rgba(255,255,255,0.6); font-weight: 600; letter-spacing: normal; text-transform: none; }
    
    .room-join-btn { background: white; color: var(--accent-red); border: none; padding: 0 24px; border-radius: 18px; font-weight: 900; font-size: 1.3rem; cursor: pointer; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 8px 20px rgba(0,0,0,0.15); display: flex; justify-content: center; align-items: center; }
    .room-join-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(0,0,0,0.25); background: var(--bg-base); }
    .room-join-btn:active { transform: translateY(0) scale(0.95); }

    /* بطاقة الطور الإضافي */
    .play-page-container { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 1000px; margin: 0 auto; padding-top: 10px; padding-bottom: 80px; }
    .game-card { background-color: var(--surface-panel); border-radius: 24px; padding: 30px; display: flex; gap: 30px; box-shadow: var(--shadow-soft); transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); border: 1px solid rgba(255,255,255,0.05); }
    .secondary-game-card { align-items: center; opacity: 0.85; padding: 25px 30px; }
    
    @media (max-width: 768px) { 
        .hero-game-card { flex-direction: column; padding: 30px 20px 0 20px; text-align: center; min-height: 450px; } 
        .hero-content-wrapper { max-width: 100%; width: 100%; padding-bottom: 20px; } 
        .hero-actions { justify-content: center; } 
        .hero-image-wrapper { width: 100%; margin-top: 10px; justify-content: center; position: absolute; bottom: 0; z-index: 1; pointer-events: none; } 
        .hero-character-img { max-height: 250px; opacity: 0.6; } 
        .hero-default-view, .hero-room-view { align-items: center; z-index: 2; position: relative; }
        .room-header { justify-content: center; width: 100%; position: relative; }
        .btn-room-back { position: absolute; right: 0; }
        .secondary-game-card { text-align: center; padding: 25px 20px; } 
    }
</style>

<div class="play-page-container smooth-fade-in">
    <div class="hero-game-card" id="mainHeroCard">
        
        <div class="hero-content-wrapper">
            <div class="hero-default-view">
                <h2 class="hero-title" data-i18n="main_game_title">Deception</h2>
                <button class="hero-badge-btn" onclick="window.loadFragment('how-to-play', null)">
                    <i class="ph-bold ph-info"></i> <span data-i18n="how_to_play_badge">شرح اللعبة</span>
                </button>
                <p class="hero-desc" data-i18n="main_game_desc">اكتشف الخداع، تفوق على خصومك، وكن الفائز في هذه المواجهة المليئة بالاستراتيجية والمكر. العب الآن أينما كنت وفي أي وقت!</p>
                <div class="hero-actions">
                    <button class="btn-hero-primary" onclick="toggleRoomUI(true)">
                        <span data-i18n="play_now">العب الآن</span> <i class="ph-bold ph-sword"></i>
                    </button>
                    <button class="btn-hero-secondary" onclick="window.loadFragment('leaderboard', null)">
                        <i class="ph-bold ph-trophy"></i> <span data-i18n="leaderboard_btn">المتصدرون</span>
                    </button>
                </div>
            </div>

            <div class="hero-room-view">
                <div class="room-header">
                    <button class="btn-room-back" onclick="toggleRoomUI(false)"><i class="ph-bold ph-arrow-right"></i></button>
                    <h3 class="room-title">إعداد الغرفة</h3>
                </div>
                
                <div class="room-options">
                    <button class="btn-room-action" onclick="handleCreateRoom()">
                        <i class="ph-bold ph-plus-circle" style="font-size: 1.4rem;"></i> أنشئ غرفة جديدة
                    </button>

                    <div class="room-divider">أو</div>

                    <div class="room-input-group">
                        <input type="text" class="room-input" id="roomCodeInput" placeholder="كود الغرفة" maxlength="6" autocomplete="off">
                        <button class="room-join-btn" onclick="handleJoinRoom()">
                            <i class="ph-bold ph-sign-in"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="hero-image-wrapper">
            <img src="assets/images/characters.png" alt="Deception Characters" class="hero-character-img">
        </div>
    </div>

    <div class="game-card secondary-game-card smooth-fade-in" style="animation-delay: 0.1s;">
        <div class="game-info" style="display: flex; flex-direction: column; gap: 10px;">
            <h3 class="game-title" data-i18n="focus_game_title" style="font-size: 1.4rem; color: var(--text-main); font-weight: 800;">Focus Mode</h3>
            <p class="game-desc" data-i18n="focus_game_desc" style="font-size: 0.9rem; color: var(--text-dim); font-weight: 600;">طور لعب سريع يعتمد على التركيز وسرعة البديهة.</p>
            <button class="btn-secondary play-now-btn" disabled style="opacity: 0.5; cursor: not-allowed; width: fit-content; padding: 12px 25px; margin-top: 10px; border-radius: 12px;"><i class="ph-duotone ph-lock"></i> <span data-i18n="coming_soon">قريباً</span></button>
        </div>
    </div>
</div>

<script>
    // دالة التحول بين الواجهتين بنعومة
    function toggleRoomUI(show) {
        if (show) {
            if (window.isGuest || !window.currentUserData) {
                alert("يرجى تسجيل الدخول لتتمكن من اللعب أونلاين!");
                return;
            }
            document.getElementById('mainHeroCard').classList.add('show-rooms');
        } else {
            document.getElementById('mainHeroCard').classList.remove('show-rooms');
            document.getElementById('roomCodeInput').value = '';
        }
    }

    // تجهيز دوال الفايربيس (ستبرمج لاحقاً)
    function handleCreateRoom() {
        alert("جاري تجهيز الفايربيس لإنشاء الغرفة...");
        // Code to create room doc and load 'lobby' fragment will go here
    }

    function handleJoinRoom() {
        const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
        if (code.length < 4) {
            alert("الرجاء إدخال كود غرفة صحيح!");
            return;
        }
        alert("البحث عن الغرفة: " + code);
        // Code to verify room doc and load 'lobby' fragment will go here
    }
</script>
