<style>
    /* =========================================================================
       1. الإخفاء والتهيئة الأساسية
       ========================================================================= */
    body.in-game-mode { background-color: var(--bg-base) !important; }
    body.in-game-mode .right-sidebar, body.in-game-mode .top-header { display: none !important; }
    
    @media (min-width: 901px) { 
        body.in-game-mode .sidebar { background-color: transparent !important; border-right: none !important; }
        body.in-game-mode .sidebar .nav-menu > button:not(.game-injected-btn) { display: none !important; } 
    }
    
    body.in-game-mode .app-shell > .bottom-bar { display: none !important; }
    
    body.in-game-mode .dynamic-content { 
        padding: 0 !important; overflow: hidden !important; 
        height: 100vh !important; height: 100dvh !important;
        background-color: var(--bg-base) !important; 
    }

    .g-master-container { 
        position: relative; width: 100%; height: 100%; background: transparent; color: var(--text-main); 
        font-family: 'Guesswhat', var(--font-ar), sans-serif; 
    }

    /* =========================================================================
       2. الشاشة السينمائية (قليتش خفيف ومُحسّن للأجهزة القديمة)
       ========================================================================= */
    .cinematic-intro {
        position: fixed; inset: 0; z-index: 1000000; background: var(--bg-base);
        display: none; justify-content: center; align-items: center; opacity: 0;
        will-change: opacity; transition: opacity 0.3s ease-out;
    }
    
    .glitch-container { position: relative; width: 180px; height: 180px; display: flex; justify-content: center; align-items: center; }
    .glitch-img {
        position: absolute; width: 100%; height: auto; object-fit: contain; opacity: 0; transform: scale(0.95);
        will-change: transform, opacity, clip-path; transition: opacity 0.4s;
    }
    
    .cinematic-intro.show-logo .main-img { opacity: 1; transform: scale(1); }
    
    /* القليتش المُحسن: لا نستخدم drop-shadow الثقيل، بل نعتمد على الإزاحة والقص */
    .cinematic-intro.start-glitch .main-img { animation: liteGlitchBase 0.2s infinite; }
    .cinematic-intro.start-glitch .layer-red { opacity: 0.8; transform: translateX(-4px); animation: liteGlitchSlice 0.15s linear infinite reverse; mix-blend-mode: screen; }
    .cinematic-intro.start-glitch .layer-blue { opacity: 0.8; transform: translateX(4px); animation: liteGlitchSlice 0.2s linear infinite; mix-blend-mode: screen; }

    @keyframes liteGlitchSlice {
        0% { clip-path: inset(10% 0 80% 0); }
        25% { clip-path: inset(60% 0 15% 0); }
        50% { clip-path: inset(25% 0 50% 0); }
        75% { clip-path: inset(80% 0 5% 0); }
        100% { clip-path: inset(40% 0 30% 0); }
    }
    @keyframes liteGlitchBase {
        0% { transform: translate(2px, 0) skewX(1deg); }
        50% { transform: translate(-2px, 0) skewX(-1deg); }
        100% { transform: translate(0, 0) skewX(0deg); }
    }

    /* =========================================================================
       3. الحاويات العامة (سلسة ومحسنة الأداء)
       ========================================================================= */
    .g-section-view { position: absolute; inset: 0; opacity: 0; visibility: hidden; overflow-y: auto; scrollbar-width: none; z-index: 1; padding: 40px; padding-bottom: 80px; will-change: opacity, visibility;}
    .g-section-view::-webkit-scrollbar { display: none; }
    .g-section-view.active { opacity: 1; visibility: visible; z-index: 10; transition: opacity 0.2s ease-out; }

    .g-section-view.active .anim-elem { animation: staggerUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(15px); will-change: transform, opacity; }
    .g-section-view.active .anim-elem:nth-child(1) { animation-delay: 0.05s; }
    .g-section-view.active .anim-elem:nth-child(2) { animation-delay: 0.1s; }
    .g-section-view.active .anim-elem:nth-child(3) { animation-delay: 0.15s; }
    @keyframes staggerUp { to { opacity: 1; transform: translateY(0); } }

    .sharp-card { 
        background: var(--surface-panel); border: 1px solid rgba(150,150,150,0.1); 
        padding: 30px; margin-bottom: 20px; position: relative;
        clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
        border-left: 3px solid rgba(150,150,150,0.3); transition: border-color 0.3s ease;
    }
    .sharp-title { font-family: var(--font-en); font-size: 2rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 25px; border-bottom: 1px solid rgba(150,150,150,0.1); padding-bottom: 15px; display: inline-block;}
    .sharp-title i { color: var(--accent-red); margin-right: 10px; }

    /* =========================================================================
       4. منصة الاتهام (خلفية نظيفة وتأثير اختفاء القليتش السريع)
       ========================================================================= */
    #tab-game-accuse, #tab-game-evidence { padding: 0 !important; background: transparent; }
    
    .val-bg-container { 
        position: absolute; inset: 0; background-size: cover; background-position: top center; 
        opacity: 0.65; z-index: 0; will-change: background-image, clip-path;
        /* تمت إزالة التمدد والضبابية ليكون سريعاً */
    }
    .val-bg-overlay { 
        position: absolute; inset: 0; z-index: 1; pointer-events: none; 
        background: linear-gradient(to right, var(--bg-base) 0%, rgba(0,0,0,0.1) 50%, transparent 100%), 
                    linear-gradient(to top, var(--bg-base) 0%, transparent 30%); 
    }

    /* قليتش اختفاء الصورة الكبيرة عند إغلاق النافذة */
    .bg-glitch-out-anim { animation: bgGlitchOut 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
    @keyframes bgGlitchOut {
        0% { clip-path: inset(0 0 0 0); transform: translateX(0); }
        30% { clip-path: inset(10% 0 50% 0); transform: translateX(-5px); opacity: 0.8; }
        60% { clip-path: inset(60% 0 10% 0); transform: translateX(5px); opacity: 0.4; }
        100% { clip-path: inset(0 0 0 0); transform: translateX(0); opacity: 0.65; }
    }

    /* قليتش ناعم للدخول */
    .bg-glitch-anim { animation: bgGlitchIn 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
    @keyframes bgGlitchIn {
        0% { transform: scale(1); opacity: 0.65; }
        50% { transform: translateX(3px) scale(1.01); clip-path: inset(20% 0 40% 0); opacity: 0.8; }
        100% { transform: scale(1) translate(0); clip-path: inset(0 0 0 0); opacity: 0.65; }
    }

    .val-layout-wrapper { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 50px; }
    .val-left-menu { display: flex; flex-direction: column; gap: 20px; direction: ltr; }
    .val-logo { width: 130px; height: auto; margin-bottom: 5px; }
    .val-round-info { color: var(--text-dim); letter-spacing: 4px; font-family: var(--font-en); font-size: 0.8rem; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; text-transform: uppercase; width: max-content; }
    .val-menu-items { display: flex; flex-direction: column; gap: 18px; margin-top: 10px; }
    .val-item { color: rgba(255,255,255,0.5); font-size: 1.05rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s; width: max-content; }
    .val-item:hover, .val-item.active { color: white; transform: translateX(5px); }
    .val-item:hover i, .val-item.active i { color: var(--accent-red); }

    .val-roster-container { align-self: center; width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; }
    .val-roster-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; }

    .val-char-box {
        background: rgba(15, 15, 18, 0.6); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        border: 1px solid rgba(255,255,255,0.05); border-top: 4px solid rgba(255,255,255,0.1); 
        clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
        height: 75px; display: flex; align-items: center; cursor: pointer; transition: 0.2s;
        direction: ltr; position: relative; overflow: hidden; will-change: transform;
    }
    .val-char-box:hover { background: rgba(25, 25, 30, 0.9); border-top-color: var(--accent-red); transform: translateY(-4px); }
    
    .val-char-avatar { 
        position: absolute; right: 0; top: 0; width: 50%; height: 100%; 
        object-fit: cover; object-position: center top; z-index: 1;
        mask-image: linear-gradient(to left, black 50%, transparent 100%);
        -webkit-mask-image: linear-gradient(to left, black 50%, transparent 100%);
    }
    
    .val-char-info { position: relative; z-index: 2; width: 60%; padding-left: 15px; display: flex; flex-direction: column; text-align: left;}
    .val-char-name { font-size: 1.25rem; font-family: var(--font-en); font-weight: 900; color: white; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
    .val-char-role { font-size: 0.75rem; color: rgba(255,255,255,0.5); font-weight: 700; margin-top: 2px; font-family: 'Guesswhat', var(--font-ar); }

    /* =========================================================================
       5. نافذة الشخصية (خفيفة الأداء)
       ========================================================================= */
    .accuse-modal-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        z-index: 100000; display: flex; justify-content: center; align-items: center;
        opacity: 0; visibility: hidden; transition: opacity 0.2s ease;
        will-change: opacity;
    }
    .accuse-modal-overlay.show { opacity: 1; visibility: visible; }
    
    .target-panel {
        width: 100%; max-width: 500px; background: transparent; opacity: 0; 
        will-change: transform, opacity, clip-path;
    }
    
    .accuse-modal-overlay.show .target-panel { animation: modalFastGlitch 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    @keyframes modalFastGlitch {
        0% { opacity: 0; transform: scale(0.95); clip-path: inset(20% 0 80% 0); }
        50% { opacity: 1; transform: scale(1.02) translateX(3px); clip-path: inset(50% 0 10% 0); }
        100% { opacity: 1; transform: scale(1) translateX(0); clip-path: inset(0 0 0 0); }
    }

    .target-header {
        position: relative; height: 240px; 
        clip-path: polygon(0 0, 100% 0, 100% calc(100% - 30px), calc(100% - 30px) 100%, 0 100%);
        background: var(--surface-panel); overflow: hidden; 
        border: 2px solid #FDFAF6; border-bottom: none;
    }
    
    .target-img { 
        position: absolute; right: 0; top: 0; width: 65%; height: 100%; 
        object-fit: cover; object-position: top center; opacity: 0.9; 
        mask-image: linear-gradient(to left, black 60%, transparent 100%);
        -webkit-mask-image: linear-gradient(to left, black 60%, transparent 100%);
    }
    
    .target-name { 
        position: absolute; bottom: 20px; left: 25px; 
        font-size: 2.8rem; font-weight: 900; color: #FDFAF6; 
        font-family: var(--font-en); letter-spacing: 2px; text-transform: uppercase; 
        z-index: 2; direction: ltr; max-width: 60%; line-height: 1;
    }
    
    .target-body {
        background: var(--surface-panel); padding: 35px 30px; color: #fff;
        clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
        border: 2px solid #FDFAF6; border-top: none;
    }
    
    .sharp-btn {
        width: 100%; background: transparent; border: 1px solid #FDFAF6; border-left: 4px solid #FDFAF6;
        color: #FDFAF6; font-size: 1.1rem; font-weight: 900; padding: 18px; cursor: pointer;
        clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
        transition: 0.2s; text-transform: uppercase; letter-spacing: 2px; font-family: 'Guesswhat', var(--font-ar);
        display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px;
    }
    .sharp-btn:hover { background: rgba(253, 250, 246, 0.1); transform: scale(1.02); }

    /* =========================================================================
       6. استجابة الجوال (شريط مطابق 100% للأساسي)
       ========================================================================= */
    .game-mobile-bar { display: none !important; }

    @media (max-width: 900px) {
        .g-section-view { padding: 20px 15px 120px 15px; }
        .sharp-title { font-size: 1.6rem; }
        
        /* شريط الجوال يرث التصميم الأساسي من موقعك بدون تلاعب زائد */
        .game-mobile-bar { display: flex !important; z-index: 99999; }
        
        .val-layout-wrapper { padding: 30px 20px 100px 20px; }
        .val-left-menu { gap: 10px; }
        .val-logo { width: 100px; }
        .val-round-info { font-size: 0.65rem; padding-bottom: 10px; }
        .val-item { font-size: 0.85rem; gap: 8px; }
        
        .val-roster-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .val-char-box { height: 65px; }
        .val-char-info { padding-left: 10px; }
        .val-char-name { font-size: 1rem; }
        .val-char-role { font-size: 0.6rem; }
        
        .target-name { font-size: 2rem; }
    }
</style>

<div class="g-master-container" id="game-master-root">
    
    <div class="cinematic-intro" id="cinematic-overlay">
        <div class="glitch-container">
            <img src="assets/images/logo.png" class="glitch-img main-img" alt="Deception">

    <div class="accuse-modal-overlay" id="accuse-action-modal" onclick="if(event.target === this) closeAccuseModal()">

                    <div style="display:flex; flex-wrap:wrap; gap:8px;" id="a-modal-weapons"></div>

                    <div style="font-size:0.8rem; color:var(--text-dim); margin-bottom:12px; font-weight:800; font-family:var(--font-en); letter-spacing:1px;">[ CLASSIFIED EVIDENCE ]</div>

    <div id="tab-game-settings" class="g-section-view">

            <div class="sharp-title anim-elem"><i class="ph-fill ph-gear"></i> الإعدادات</div>
            <div class="sharp-card anim-elem">
                <button class="sharp-btn" style="border-left-color: rgba(150,150,150,0.3); justify-content: flex-start; border-color:rgba(150,150,150,0.1); color:var(--text-main);" onclick="window.gameEngine.requestLeaveGame()">
                    <i class="ph-bold ph-sign-out"></i> مغادرة الغرفة
                </button>
            </div>
        </div>
    </div>

    <div id="tab-game-info" class="g-section-view">

            <div class="sharp-title anim-elem"><i class="ph-fill ph-identification-card"></i> هويتي السرية</div>
            <div id="render-game-role" class="sharp-card anim-elem" style="text-align: center; padding: 60px 20px;">
                <i class="ph-duotone ph-spinner ph-spin" style="font-size:3rem; color:var(--text-dim);"></i>

    <div id="tab-game-accuse" class="g-section-view active">
        <div class="val-bg-container" id="val-dynamic-bg" style="background-image: url('assets/images/accuse-bg.jpg');"></div>
        <div class="val-bg-overlay"></div>
        
        <div class="val-layout-wrapper">
            <div class="val-left-menu anim-elem">
                <img src="assets/images/logo.png" class="val-logo" alt="Logo">
                <div class="val-round-info">ROUND 01 // DECEPTION</div>
                <div class="val-menu-items">
                    <div class="val-item active"><i class="ph-fill ph-gavel"></i> حق الاتهام المتبقي: 1</div>
                    <div class="val-item"><i class="ph-fill ph-clock-counter-clockwise"></i> السجل</div>

            <div class="val-roster-container anim-elem">
                <div class="val-roster-grid" id="render-game-accuse">

    <div id="tab-game-evidence" class="g-section-view">

            <div class="sharp-card anim-elem" style="background: rgba(15,15,20,0.5); text-align:center; padding: 80px 20px; border-left-color: #00d2ff;">
                <div style="position: relative; width: 100px; height: 100px; margin: 0 auto 20px auto; border-radius: 50%; border: 2px solid rgba(0, 210, 255, 0.3);">

        <button class="bottom-tab" onclick="window.switchGameTab('tab-game-evidence', 3)"><i class="ph ph-microscope"></i></button>
        <button class="bottom-tab" onclick="window.switchGameTab('tab-game-items', 4)"><i class="ph ph-briefcase"></i></button>
    </nav>

<script>
    // ========================================================
    // 1. نظام السينمائية (آمن وخفيف ومربوط ببداية الغرفة)
    // ========================================================
    window.playCinematicIntro = function() {
        const overlay = document.getElementById('cinematic-overlay');
        if (!overlay) return;

        const sessionKey = 'deception_intro_played_' + (window.currentRoomId || 'global');

        if (sessionStorage.getItem(sessionKey)) {
            overlay.style.display = 'none'; return;
        }

        sessionStorage.setItem(sessionKey, 'true');
        overlay.style.display = 'flex';
        
        requestAnimationFrame(() => {
            overlay.style.opacity = '1';
            setTimeout(() => { overlay.classList.add('show-logo'); }, 50);
            setTimeout(() => { overlay.classList.add('start-glitch'); }, 1200); 
            setTimeout(() => {
                overlay.classList.add('fade-out-complete');
                setTimeout(() => { overlay.style.display = 'none'; overlay.remove(); }, 500);
            }, 2000); 
        });
    };

    // ========================================================
    // 2. نظام التنقل والتهيئة (مضاد للتعليق - Retry Logic)
    // ========================================================
    window.cleanupGameUI = function() {
        document.body.classList.remove('in-game-mode');
        document.querySelectorAll('.game-injected-btn').forEach(b => b.remove());
    };

    window.initGameUI = function(attempts = 0) {
        const desktopMenu = document.querySelector('.sidebar .nav-menu');
        // إذا لم يجد العنصر (بسبب الـ SPA)، يحاول مجدداً 10 مرات لضمان التشغيل
        if(!desktopMenu && attempts < 10) {
            setTimeout(() => window.initGameUI(attempts + 1), 100);
            return;
        }

        window.cleanupGameUI();
        document.body.classList.add('in-game-mode');

        if(desktopMenu) {
            desktopMenu.insertAdjacentHTML('beforeend', `
                <button class="nav-btn game-injected-btn" onclick="window.switchGameTab('tab-game-settings', 0)"><i class="ph ph-gear"></i></button>
                <button class="nav-btn game-injected-btn" onclick="window.switchGameTab('tab-game-info', 1)"><i class="ph ph-identification-card"></i></button>
                <button class="nav-btn game-injected-btn active" onclick="window.switchGameTab('tab-game-accuse', 2)"><i class="ph-fill ph-gavel"></i></button>
                <button class="nav-btn game-injected-btn" onclick="window.switchGameTab('tab-game-evidence', 3)"><i class="ph ph-microscope"></i></button>
                <button class="nav-btn game-injected-btn" onclick="window.switchGameTab('tab-game-items', 4)"><i class="ph ph-briefcase"></i></button>
            `);
        }
        window.playCinematicIntro();
    };

    window.switchGameTab = function(tabId, index) {
        requestAnimationFrame(() => {
            document.querySelectorAll('.g-section-view').forEach(s => s.classList.remove('active'));
            const targetSec = document.getElementById(tabId);
            if(targetSec) {
                targetSec.classList.add('active');
                const animElems = targetSec.querySelectorAll('.anim-elem');
                animElems.forEach(el => {
                    el.style.animation = 'none'; el.offsetHeight; el.style.animation = null;
                });
            }

            const icons = ['ph-gear', 'ph-identification-card', 'ph-gavel', 'ph-microscope', 'ph-briefcase'];

            document.querySelectorAll('.sidebar .game-injected-btn').forEach((b, i) => {
                b.classList.toggle('active', i === index);
                const icon = b.querySelector('i');
                if(icon) icon.className = (i === index) ? `ph-fill ${icons[i]}` : `ph ${icons[i]}`;
            });

            document.querySelectorAll('.game-mobile-bar .bottom-tab').forEach((b, i) => {
                b.classList.toggle('active', i === index);
                const icon = b.querySelector('i');
                if(icon) icon.className = (i === index) ? `ph-fill ${icons[i]}` : `ph ${icons[i]}`;
            });
        });
    };

    // ========================================================
    // 3. تغيير الخلفية واختفاؤها بقليتش
    // ========================================================
    window.triggerBgGlitch = function(imgSrc, isOut = false) {
        const bg = document.getElementById('val-dynamic-bg');
        if(!bg) return;
        
        bg.classList.remove('bg-glitch-anim', 'bg-glitch-out-anim');
        void bg.offsetWidth; 
        
        if(isOut) {
            // تأثير القص للخارج
            bg.classList.add('bg-glitch-out-anim');
            setTimeout(() => { bg.style.backgroundImage = `url(${imgSrc})`; }, 100);
        } else {
            // تأثير الدخول
            bg.style.backgroundImage = `url(${imgSrc})`;
            bg.classList.add('bg-glitch-anim');
        }
    };

    // ========================================================
    // 4. نافذة الشخصية
    // ========================================================
    window.gameAccuseDataCache = {}; 

    window.openAccuseModal = function(playerName, imgSrc) {
        const modal = document.getElementById('accuse-action-modal');
        const pItems = window.currentRoomData.items ? window.currentRoomData.items[playerName] : {weapons:[], evidence:[]};
        
        document.getElementById('a-modal-name').innerText = playerName;
        document.getElementById('a-modal-img').src = imgSrc;
        
        const wHtml = pItems.weapons ? pItems.weapons.map(w => `<span class="sharp-badge" style="background:rgba(255,255,255,0.05); border:none; color:var(--text-main);"><i class="ph-fill ph-crosshair" style="color:var(--text-dim);"></i>${w}</span>`).join('') : '';
        const eHtml = pItems.evidence ? pItems.evidence.map(e => `<span class="sharp-badge" style="background:rgba(255,255,255,0.05); border:none; color:var(--text-main);"><i class="ph-fill ph-fingerprint" style="color:var(--text-dim);"></i>${e}</span>`).join('') : '';
        
        document.getElementById('a-modal-weapons').innerHTML = wHtml || '<span style="color:var(--text-dim);">لا يوجد</span>';
        document.getElementById('a-modal-evidence').innerHTML = eHtml || '<span style="color:var(--text-dim);">لا يوجد</span>';
        
        window.gameAccuseDataCache.currentTarget = playerName;
        modal.classList.add('show');
    };

    window.closeAccuseModal = function() { 
        document.getElementById('accuse-action-modal').classList.remove('show'); 
        window.triggerBgGlitch('assets/images/accuse-bg.jpg', true); // اختفاء الصورة الكبيرة بقليتش!
    };
    
    window.submitAccusation = function() { alert("تم تحديد الهدف: " + window.gameAccuseDataCache.currentTarget); window.closeAccuseModal(); };

    // ========================================================
    // 5. محرك الداتا (الرندر)
    // ========================================================
    window.renderGameData = function() {
        try {
            if(!window.currentRoomData || !window.currentRoomData.roles) return;
            
            const myName = window.currentUserData ? window.currentUserData.username_lower : 'unknown';
            const allPlayers = window.currentRoomData.players || [];
            
            const accuseGrid = document.getElementById('render-game-accuse');
            let accuseHtml = '';
            
            let allGameChars = (window.GAME_ASSETS && window.GAME_ASSETS.characters) ? [...window.GAME_ASSETS.characters] : [];
            let dbSelections = window.currentRoomData.characterSelections || {};
            let usedIds = Object.values(dbSelections);
            let availableChars = allGameChars.filter(c => !usedIds.includes(c.id));

            allPlayers.forEach(p => {
                let charImgSrc = 'assets/images/default-avatar.png'; 
                if(dbSelections[p]) {
                    let foundChar = allGameChars.find(c => c.id === dbSelections[p]);
                    if(foundChar) charImgSrc = foundChar.src;
                } else {
                    if(availableChars.length > 0) { charImgSrc = availableChars.shift().src; } 
                    else if (p.startsWith('Bot_')) { charImgSrc = `https://api.dicebear.com/9.x/bottts/svg?seed=${p}&backgroundColor=transparent`; }
                }

                let isMe = (p.toLowerCase() === myName);
                let roleText = isMe ? 'أنت / محقق' : 'مشتبه به';
                
                accuseHtml += `
                    <div class="val-char-box" 
                         onmouseenter="window.triggerBgGlitch('${charImgSrc}')"
                         onmouseleave="window.triggerBgGlitch('assets/images/accuse-bg.jpg', true)"
                         onclick="window.openAccuseModal('${p}', '${charImgSrc}')">
                        <img src="${charImgSrc}" class="val-char-avatar" onerror="this.src='assets/images/default-avatar.png';">
                        <div class="val-char-info">
                            <div class="val-char-name">${p}</div>
                            <div class="val-char-role">${roleText}</div>
                        </div>
                    </div>
                `;
            });
            accuseGrid.innerHTML = accuseHtml;

            let myRole = 'investigator';
            for (const [k, v] of Object.entries(window.currentRoomData.roles)) { if (k.toLowerCase() === myName) { myRole = v; break; } }
            
            const roleDiv = document.getElementById('render-game-role');
            if(myRole === 'murderer') {
                roleDiv.innerHTML = `<i class="ph-duotone ph-knife" style="font-size:6rem; color:var(--accent-red); margin-bottom:15px; filter: drop-shadow(0 0 20px rgba(242, 39, 123, 0.5));"></i><h2 style="font-family:var(--font-en); font-size:3.5rem; font-weight:900; color:var(--text-main); text-transform:uppercase; letter-spacing:4px; margin-bottom:10px;">القاتل</h2><p style="color:var(--text-dim); font-size:1.1rem;">أنت القاتل. استخدم أدواتك بذكاء لتضليل البقية.</p>`;
                roleDiv.style.borderLeftColor = 'var(--accent-red)';
            } else if(myRole === 'forensic') {
                roleDiv.innerHTML = `<i class="ph-duotone ph-microscope" style="font-size:6rem; color:#00d2ff; margin-bottom:15px; filter: drop-shadow(0 0 20px rgba(0, 210, 255, 0.5));"></i><h2 style="font-family:var(--font-en); font-size:3.5rem; font-weight:900; color:var(--text-main); text-transform:uppercase; letter-spacing:4px; margin-bottom:10px;">الطبيب الشرعي</h2><p style="color:var(--text-dim); font-size:1.1rem;">أنت تعرف القاتل. وجه المحققين عبر التلميحات.</p>`;
                roleDiv.style.borderLeftColor = '#00d2ff';
            } else {
                roleDiv.innerHTML = `<i class="ph-duotone ph-magnifying-glass" style="font-size:6rem; color:var(--accent-green); margin-bottom:15px; filter: drop-shadow(0 0 20px rgba(46, 204, 113, 0.5));"></i><h2 style="font-family:var(--font-en); font-size:3.5rem; font-weight:900; color:var(--text-main); text-transform:uppercase; letter-spacing:4px; margin-bottom:10px;">محقق</h2><p style="color:var(--text-dim); font-size:1.1rem;">اكتشف القاتل قبل فوات الأوان.</p>`;
                roleDiv.style.borderLeftColor = 'var(--accent-green)';
            }

            let myItems = null;
            if(window.currentRoomData.items) {
                for (const [k, v] of Object.entries(window.currentRoomData.items)) { if (k.toLowerCase() === myName) { myItems = v; break; } }
            }
            const itemsDiv = document.getElementById('render-game-items');
            if(myItems && myItems.weapons) {
                let wHtml = myItems.weapons.map(w => `<span class="sharp-badge"><i class="ph-fill ph-crosshair" style="color:var(--text-dim);"></i>${w}</span>`).join('');
                let eHtml = myItems.evidence.map(e => `<span class="sharp-badge"><i class="ph-fill ph-fingerprint" style="color:#00d2ff;"></i>${e}</span>`).join('');
                itemsDiv.innerHTML = `
                    <div style="text-align:left; direction: ltr;">
                        <h3 style="color:var(--text-dim); font-family:var(--font-en); letter-spacing:2px; margin-bottom:15px; font-size:0.8rem;">[ ASSIGNED WEAPONS ]</h3>
                        <div style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:35px;">${wHtml}</div>
                        <h3 style="color:var(--text-dim); font-family:var(--font-en); letter-spacing:2px; margin-bottom:15px; font-size:0.8rem;">[ COLLECTED EVIDENCE ]</h3>
                        <div style="display:flex; flex-wrap:wrap; gap:12px;">${eHtml}</div>
                    </div>
                `;
            }
        } catch(e) { console.error("Error drawing UI", e); }
    };

    // استدعاء البناء محمي بـ Retry Logic لضمان العمل دائماً
    window.initGameUI();
    
    let retries = 0;
    function safeRender() {
        if(window.currentRoomData && window.currentRoomData.roles) window.renderGameData();
        else if(retries < 15) { retries++; setTimeout(safeRender, 500); }
    }
    safeRender();

    window.addEventListener('popstate', function cleanUp() {
        if(window.cleanupGameUI) window.cleanupGameUI();
        window.removeEventListener('popstate', cleanUp);
    });
</script>
