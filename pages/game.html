<style>
    /* 1. إخفاء قوائم الموقع الأساسية لتظهر القوائم الجديدة الخاصة باللعبة */
    body.in-game-mode .app-shell > .sidebar, 
    body.in-game-mode .app-shell > .right-sidebar, 
    body.in-game-mode .app-shell > .bottom-bar, 
    body.in-game-mode .app-shell > .main-viewport > .top-header { display: none !important; }
    
    /* 2. هندسة شبكة اللعبة (تطابق تصميمك الأساسي) */
    .in-game-shell {
        display: grid;
        grid-template-columns: 100px 1fr; /* شريط جانبي + محتوى */
        width: 100vw; height: 100vh;
        background: var(--bg-base);
    }

    /* 3. الشريط الجانبي (كمبيوتر) بتصميم Dribbble */
    .game-sidebar-modern {
        background: var(--surface-panel);
        border-left: 1px solid rgba(255,255,255,0.05);
        display: flex; flex-direction: column; align-items: center;
        padding: 30px 0; gap: 20px; z-index: 100;
        box-shadow: 10px 0 30px rgba(0,0,0,0.3);
    }

    .game-nav-modern {
        background: transparent; border: none; color: var(--text-dim);
        width: 55px; height: 55px; border-radius: 20px;
        display: flex; justify-content: center; align-items: center;
        font-size: 1.8rem; cursor: pointer; transition: 0.3s;
        position: relative; -webkit-tap-highlight-color: transparent;
    }
    .game-nav-modern:hover { color: white; background: rgba(255,255,255,0.05); }
    .game-nav-modern.active { color: white; background: var(--cyber-gradient); box-shadow: var(--shadow-glow); }
    
    /* أداة توضيحية تظهر عند الوقوف على الزر (Tooltip) */
    .game-nav-modern::after {
        content: attr(data-tooltip); position: absolute; right: 75px;
        background: var(--surface-panel); color: white; padding: 6px 12px;
        border-radius: 8px; font-size: 0.8rem; font-weight: bold; font-family: var(--font-ar);
        opacity: 0; visibility: hidden; transition: 0.2s; white-space: nowrap;
        border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .game-nav-modern:hover::after { opacity: 1; visibility: visible; }

    /* 4. منطقة العرض الأساسية */
    .game-viewport { position: relative; overflow: hidden; background: var(--bg-base); }
    .game-tab-view {
        position: absolute; inset: 0; padding: 40px; overflow-y: auto; scrollbar-width: none;
        opacity: 0; visibility: hidden; transform: scale(0.98); transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .game-tab-view.active { opacity: 1; visibility: visible; transform: scale(1); z-index: 10; }

    /* 5. تصميم البطاقات الفاخر (Premium Cards) */
    .g-title-modern { font-size: 2rem; font-weight: 900; color: white; margin-bottom: 30px; display: flex; align-items: center; gap: 12px; letter-spacing: -0.5px; }
    .g-title-modern i { color: var(--accent-red); background: rgba(242, 39, 123, 0.1); padding: 8px; border-radius: 14px; }
    
    .g-premium-card { background: var(--surface-panel); border-radius: 28px; padding: 30px; border: 1px solid rgba(255,255,255,0.03); box-shadow: var(--shadow-soft); margin-bottom: 20px; position: relative; overflow: hidden; }
    .g-premium-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at top left, rgba(255,255,255,0.03) 0%, transparent 60%); pointer-events: none; }

    /* منصة الاتهام واللاعبين */
    .players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .player-accuse-card { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 20px; transition: 0.3s; cursor: pointer; }
    .player-accuse-card:hover { border-color: var(--accent-red); background: rgba(242, 39, 123, 0.05); transform: translateY(-5px); box-shadow: 0 10px 25px rgba(242, 39, 123, 0.15); }
    .player-card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 15px; }
    .player-av { width: 50px; height: 50px; border-radius: 50%; background: var(--surface-panel); display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1.2rem; }
    .player-name { font-size: 1.1rem; font-weight: 800; color: white; }
    
    .items-mini-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .mini-item { background: var(--surface-panel); padding: 8px 4px; border-radius: 12px; font-size: 0.75rem; text-align: center; color: var(--text-dim); font-weight: bold; border: 1px solid rgba(255,255,255,0.05); }

    /* تصميم بطاقة الهوية (التاب 2) */
    .role-super-card { text-align: center; padding: 50px 20px; border-radius: 30px; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
    .role-super-card i { font-size: 5rem; margin-bottom: 20px; filter: drop-shadow(0 0 20px currentColor); }
    .role-super-card h2 { font-size: 3rem; font-weight: 900; color: white; margin-bottom: 10px; }
    .role-super-card p { font-size: 1.1rem; color: rgba(255,255,255,0.8); max-width: 600px; margin: 0 auto; line-height: 1.6; }

    /* 6. استجابة الجوال (شريط سفلي مثل التطبيقات الأصلية) */
    @media (max-width: 900px) {
        .in-game-shell { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
        
        .game-sidebar-modern {
            grid-row: 2; flex-direction: row; justify-content: space-around;
            padding: 10px 5px calc(10px + env(safe-area-inset-bottom)) 5px;
            border-left: none; border-top: 1px solid rgba(255,255,255,0.05);
            background: rgba(25, 25, 30, 0.85); backdrop-filter: blur(25px);
        }
        
        .game-nav-modern { width: 50px; height: 50px; border-radius: 16px; font-size: 1.5rem; }
        .game-nav-modern::after { display: none; } /* إخفاء التولتيب في الجوال */
        .game-tab-view { padding: 25px 20px; }
        .g-title-modern { font-size: 1.5rem; }
    }
</style>

<div class="in-game-shell">
    
    <aside class="game-sidebar-modern">
        <button type="button" class="game-nav-modern active" data-tooltip="إعدادات اللعبة" onclick="window.navGame('g-tab-settings', this)">
            <i class="ph-bold ph-gear"></i>
        </button>
        <button type="button" class="game-nav-modern" data-tooltip="هويتي السرية" onclick="window.navGame('g-tab-info', this)">
            <i class="ph-bold ph-identification-card"></i>
        </button>
        <button type="button" class="game-nav-modern" data-tooltip="منصة الاتهام" onclick="window.navGame('g-tab-accuse', this)">
            <i class="ph-bold ph-gavel"></i>
        </button>
        <button type="button" class="game-nav-modern" data-tooltip="الأدلة ومسرح الجريمة" onclick="window.navGame('g-tab-evidence', this)">
            <i class="ph-bold ph-microscope"></i>
        </button>
        <button type="button" class="game-nav-modern" data-tooltip="أدواتي الخاصة" onclick="window.navGame('g-tab-items', this)">
            <i class="ph-bold ph-briefcase"></i>
        </button>
    </aside>

    <main class="game-viewport">
        
        <div id="g-tab-settings" class="game-tab-view active">
            <div style="max-width: 600px; margin: 0 auto;">
                <h2 class="g-title-modern"><i class="ph-bold ph-gear"></i> قائمة الإعدادات</h2>
                <div class="g-premium-card">
                    <button class="btn-core" style="background: rgba(242, 39, 123, 0.1); color: var(--accent-red); box-shadow: none;" onclick="window.gameEngine.requestLeaveGame()">
                        <i class="ph-bold ph-sign-out"></i> مغادرة اللعبة الحالية
                    </button>
                </div>
            </div>
        </div>

        <div id="g-tab-info" class="game-tab-view">
            <div style="max-width: 800px; margin: 0 auto;">
                <h2 class="g-title-modern"><i class="ph-bold ph-identification-card"></i> هويتي السرية</h2>
                <div id="ui-my-role" class="g-premium-card" style="padding:0; border:none; background:transparent;">
                    <div style="text-align:center; padding: 50px; color:var(--text-dim);"><i class="ph-duotone ph-spinner ph-spin" style="font-size:3rem;"></i></div>
                </div>
            </div>
        </div>

        <div id="g-tab-accuse" class="game-tab-view">
            <div style="max-width: 1200px; margin: 0 auto;">
                <h2 class="g-title-modern"><i class="ph-bold ph-gavel"></i> منصة الاتهام واللاعبين</h2>
                <div id="ui-accuse-grid" class="players-grid">
                    </div>
            </div>
        </div>

        <div id="g-tab-evidence" class="game-tab-view">
            <div style="max-width: 800px; margin: 0 auto;">
                <h2 class="g-title-modern"><i class="ph-bold ph-microscope"></i> مسرح الجريمة</h2>
                <div class="g-premium-card" style="text-align:center; color:var(--text-dim); padding:80px 20px;">
                    <i class="ph-duotone ph-file-magnifying-glass" style="font-size:4rem; margin-bottom:15px; opacity:0.5;"></i>
                    <h3 style="color:white;">لا توجد أدلة مطروحة بعد</h3>
                    <p>يقوم الطبيب الشرعي بجمع التلميحات حالياً.</p>
                </div>
            </div>
        </div>

        <div id="g-tab-items" class="game-tab-view">
            <div style="max-width: 800px; margin: 0 auto;">
                <h2 class="g-title-modern"><i class="ph-bold ph-briefcase"></i> أسلحتي وآثاري</h2>
                <div id="ui-my-items" class="g-premium-card">
                    </div>
            </div>
        </div>

    </main>
</div>

<script>
    document.body.classList.add('in-game-mode');

    // 1. نظام التنقل السلس 
    window.navGame = function(tabId, btn) {
        document.querySelectorAll('.game-nav-modern').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.game-tab-view').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(tabId).classList.add('active');
    };

    // 2. المحرك الواجهي (يقرأ البيانات ويطبعها بتصميم جميل)
    window.renderGameData = function() {
        if(!window.currentRoomData || !window.currentRoomData.roles) return;
        
        const myName = window.currentUserData.username_lower || window.currentUserData.username;
        const myRole = window.currentRoomData.roles[myName] || 'investigator';
        const myItems = window.currentRoomData.items ? window.currentRoomData.items[myName] : null;
        const allPlayers = window.currentRoomData.players || [];

        // --- أ) رسم بطاقة الهوية ---
        const roleDiv = document.getElementById('ui-my-role');
        if(myRole === 'murderer') {
            roleDiv.innerHTML = `<div class="role-super-card" style="background: radial-gradient(circle at bottom, rgba(232, 65, 24, 0.3), var(--surface-panel)); border-color: rgba(232, 65, 24, 0.4);"><i class="ph-duotone ph-knife" style="color:#e84118;"></i><h2>أنت القاتل</h2><p>اختر سلاحاً ودليلاً، وقم بخداع المحققين للفوز.</p></div>`;
        } else if(myRole === 'forensic') {
            roleDiv.innerHTML = `<div class="role-super-card" style="background: radial-gradient(circle at bottom, rgba(9, 132, 227, 0.3), var(--surface-panel)); border-color: rgba(9, 132, 227, 0.4);"><i class="ph-duotone ph-microscope" style="color:#0984e3;"></i><h2>الطبيب الشرعي</h2><p>أنت تعرف القاتل، وجه المحققين عبر التلميحات دون التحدث.</p></div>`;
        } else {
            roleDiv.innerHTML = `<div class="role-super-card" style="background: radial-gradient(circle at bottom, rgba(46, 204, 113, 0.3), var(--surface-panel)); border-color: rgba(46, 204, 113, 0.4);"><i class="ph-duotone ph-magnifying-glass" style="color:#2ecc71;"></i><h2>أنت محقق</h2><p>اجمع التلميحات، وابحث في أغراض اللاعبين لكشف القاتل.</p></div>`;
        }

        // --- ب) رسم أدواتي ---
        const itemsDiv = document.getElementById('ui-my-items');
        if(myItems) {
            let wHtml = myItems.weapons.map(w => `<div class="mini-item" style="font-size:1rem; padding:15px;"><i class="ph-fill ph-crosshair" style="color:var(--accent-red); font-size:1.5rem; display:block; margin-bottom:5px;"></i>${w}</div>`).join('');
            let eHtml = myItems.evidence.map(e => `<div class="mini-item" style="font-size:1rem; padding:15px;"><i class="ph-fill ph-fingerprint" style="color:#3498db; font-size:1.5rem; display:block; margin-bottom:5px;"></i>${e}</div>`).join('');
            
            itemsDiv.innerHTML = `
                <h3 style="color:white; margin-bottom:15px;">أسلحتي الأربعة:</h3>
                <div class="items-mini-grid" style="margin-bottom:30px;">${wHtml}</div>
                <h3 style="color:white; margin-bottom:15px;">آثاري (الأدلة):</h3>
                <div class="items-mini-grid">${eHtml}</div>
            `;
        }

        // --- ج) رسم منصة الاتهام (بما فيها البوتات) ---
        const accuseGrid = document.getElementById('ui-accuse-grid');
        let accuseHtml = '';
        allPlayers.forEach(p => {
            let pItems = window.currentRoomData.items ? window.currentRoomData.items[p] : {weapons:[], evidence:[]};
            let wList = pItems.weapons.map(w => `<div class="mini-item">${w}</div>`).join('');
            let eList = pItems.evidence.map(e => `<div class="mini-item">${e}</div>`).join('');
            let isMe = (p === myName) ? `<span style="color:var(--accent-green); font-size:0.75rem;">(أنت)</span>` : '';
            
            accuseHtml += `
                <div class="player-accuse-card" onclick="alert('سيوجه اتهام للاعب: ${p}')">
                    <div class="player-card-header">
                        <div class="player-av">${p.charAt(0).toUpperCase()}</div>
                        <div class="player-name">${p} ${isMe}</div>
                    </div>
                    <div style="font-size:0.8rem; color:var(--text-dim); margin-bottom:8px;">الأسلحة:</div>
                    <div class="items-mini-grid" style="margin-bottom:12px;">${wList}</div>
                    <div style="font-size:0.8rem; color:var(--text-dim); margin-bottom:8px;">الأدلة:</div>
                    <div class="items-mini-grid">${eList}</div>
                </div>
            `;
        });
        accuseGrid.innerHTML = accuseHtml;
    };

    // تشغيل الدالة فوراً
    setTimeout(() => { if(window.renderGameData) window.renderGameData(); }, 500);

    // تأمين عند زر الرجوع
    window.addEventListener('popstate', function cleanUpGameMode() {
        document.body.classList.remove('in-game-mode');
        window.removeEventListener('popstate', cleanUpGameMode);
    });
</script>
