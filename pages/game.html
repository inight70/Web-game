<style>
    /* =========================================================================
       1. الإخفاء الذكي لقوائم الموقع
       ========================================================================= */
    body.in-game-mode .right-sidebar, 
    body.in-game-mode .top-header { display: none !important; }
    
    @media (min-width: 901px) {
        body.in-game-mode .sidebar .nav-menu > button:not(.game-injected-btn) { display: none !important; }
    }
    body.in-game-mode .app-shell > .bottom-bar { display: none !important; }
    body.in-game-mode .dynamic-content { padding: 0 !important; overflow: hidden !important; height: 100vh !important; height: 100dvh !important; }

    /* =========================================================================
       2. الشاشة السينمائية المحترفة (القليتش الخالص بدون وميض الخلفية)
       ========================================================================= */
    .cinematic-intro {
        position: fixed; inset: 0; z-index: 1000000;
        background: #0b0b0e; /* خلفية داكنة معتمة تماماً وثابتة */
        display: flex; justify-content: center; align-items: center;
        opacity: 1; visibility: visible; transition: opacity 0.4s ease, visibility 0.4s;
    }
    
    .glitch-container {
        position: relative; width: 140px; height: 140px;
        display: flex; justify-content: center; align-items: center;
    }
    
    .glitch-img {
        position: absolute; width: 100%; height: auto; object-fit: contain;
        opacity: 0; transform: scale(0.9);
        transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s;
    }
    
    .cinematic-intro.show-logo .main-img { opacity: 1; transform: scale(1); }

    /* القليتش المعقد للشعار فقط */
    .start-glitch .main-img { animation: mainGlitchAnim 0.3s linear infinite; }
    .start-glitch .layer-red {
        opacity: 0.8; transform: translateX(-6px) scale(1.02);
        filter: drop-shadow(-3px 0 var(--accent-red)) saturate(2);
        animation: glitchSliceTop 0.2s linear infinite;
    }
    .start-glitch .layer-blue {
        opacity: 0.8; transform: translateX(6px) scale(0.98);
        filter: drop-shadow(3px 0 #00d2ff) saturate(2);
        animation: glitchSliceBottom 0.25s linear infinite;
    }

    @keyframes glitchSliceTop {
        0% { clip-path: inset(10% 0 60% 0); } 20% { clip-path: inset(40% 0 10% 0); }
        40% { clip-path: inset(25% 0 50% 0); } 60% { clip-path: inset(70% 0 5% 0); }
        80% { clip-path: inset(5% 0 80% 0); } 100% { clip-path: inset(50% 0 30% 0); }
    }
    @keyframes glitchSliceBottom {
        0% { clip-path: inset(60% 0 5% 0); } 25% { clip-path: inset(15% 0 70% 0); }
        50% { clip-path: inset(50% 0 20% 0); } 75% { clip-path: inset(5% 0 60% 0); }
        100% { clip-path: inset(30% 0 45% 0); }
    }
    @keyframes mainGlitchAnim {
        0% { transform: translate(2px, 1px) skewX(2deg); } 25% { transform: translate(-1px, -2px) skewX(-3deg); }
        50% { transform: translate(-3px, 1px) skewX(5deg); } 75% { transform: translate(1px, 2px) skewX(-1deg); }
        100% { transform: translate(0px, 0px) skewX(0deg); }
    }

    .cinematic-intro.fade-out-complete { opacity: 0; visibility: hidden; pointer-events: none; }

    /* =========================================================================
       3. حاوية أقسام اللعبة
       ========================================================================= */
    .g-master-container { position: relative; width: 100%; height: 100%; background: transparent; }

    .g-section-view {
        position: absolute; inset: 0; padding: 40px; padding-bottom: 40px;
        opacity: 0; visibility: hidden; transition: 0.2s ease-in-out;
        overflow-y: auto; scrollbar-width: none;
    }
    .g-section-view::-webkit-scrollbar { display: none; }
    .g-section-view.active { opacity: 1; visibility: visible; z-index: 10; }

    .g-native-card { 
        background: var(--surface-panel); border: 1px solid rgba(255,255,255,0.03); 
        border-radius: 24px; padding: 25px; margin-bottom: 20px; 
        box-shadow: var(--shadow-soft); transition: var(--trans-smooth); 
    }
    .g-native-card:hover { border-color: rgba(242, 39, 123, 0.15); box-shadow: var(--shadow-glow); }
    
    .g-page-title { color: var(--text-main); font-size: 1.8rem; margin-bottom: 25px; font-weight: 900; display: flex; align-items: center; gap: 12px; position: relative; z-index: 2; }
    .g-page-title i { color: var(--accent-red); font-size: 2.2rem; }
    
    .g-badge { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; padding: 10px 14px; font-size: 0.9rem; color: var(--text-main); font-weight: 700; display: inline-flex; align-items: center; gap: 6px; }

    .game-mobile-bar { display: none !important; }

    /* =========================================================================
       4. تصميم منصة الاتهام الخاص (الخلفية وشبكة الشخصيات)
       ========================================================================= */
    #tab-game-accuse {
        /* اسم الصورة التي طلبت إضافتها (ضعها في مجلد الصور) */
        background-image: url('assets/images/accuse-bg.jpg'); 
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }
    /* طبقة تعتيم فوق الخلفية لكي تبرز الكروت */
    #tab-game-accuse::before {
        content: ''; position: absolute; inset: 0; background: rgba(10, 10, 15, 0.85); z-index: 0;
    }
    #tab-game-accuse > div { position: relative; z-index: 2; }

    .accuse-char-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px;
    }
    
    .accuse-char-card {
        background: var(--bg-base); border: 2px solid rgba(255,255,255,0.05);
        border-radius: 20px; overflow: hidden; cursor: pointer; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative; aspect-ratio: 3/4; box-shadow: 0 5px 20px rgba(0,0,0,0.4);
    }
    .accuse-char-card img { width: 100%; height: 100%; object-fit: cover; object-position: top center; transition: 0.4s ease; }
    .accuse-char-badge {
        position: absolute; bottom: 0; left: 0; right: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 50%, transparent 100%);
        color: white; font-size: 1rem; font-weight: 900; text-align: center;
        padding: 30px 10px 15px 10px; font-family: var(--font-ar); transition: 0.3s;
    }
    
    .accuse-char-card:hover { border-color: var(--accent-red); transform: translateY(-5px); box-shadow: 0 12px 30px rgba(242, 39, 123, 0.3); }
    .accuse-char-card:hover img { transform: scale(1.05); }
    .accuse-char-card:hover .accuse-char-badge { background: linear-gradient(to top, var(--accent-red) 0%, rgba(242, 39, 123, 0.5) 60%, transparent 100%); }

    /* =========================================================================
       5. نافذة الاتهام المنبثقة (Modal)
       ========================================================================= */
    .accuse-modal-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        z-index: 100000; display: flex; justify-content: center; align-items: center;
        opacity: 0; visibility: hidden; transition: 0.3s ease; padding: 15px;
    }
    .accuse-modal-overlay.show { opacity: 1; visibility: visible; }
    .accuse-modal-card {
        background: var(--surface-panel); width: 100%; max-width: 500px;
        border-radius: 28px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        display: flex; flex-direction: column; overflow: hidden;
        transform: scale(0.9) translateY(20px); transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .accuse-modal-overlay.show .accuse-modal-card { transform: scale(1) translateY(0); }
    
    .accuse-modal-header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); }
    .accuse-modal-title { font-size: 1.3rem; font-weight: 900; color: white; display: flex; align-items: center; gap: 10px; }
    .accuse-modal-close { background: none; border: none; color: var(--text-dim); font-size: 1.5rem; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent;}
    .accuse-modal-close:hover { color: var(--accent-red); transform: rotate(90deg); }
    
    .accuse-modal-body { padding: 25px; max-height: 60vh; overflow-y: auto; scrollbar-width: none; }
    .accuse-items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .accuse-item-box { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 12px 5px; text-align: center; color: white; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.2s; }
    .accuse-item-box:hover { background: rgba(255,255,255,0.05); border-color: var(--accent-red); transform: translateY(-2px); }
    
    @media (max-width: 900px) {
        .g-section-view { padding: 20px 15px 120px 15px; }
        .g-page-title { font-size: 1.5rem; }
        .game-mobile-bar { display: flex !important; z-index: 99999; }
        .accuse-char-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    }
</style>

<div class="g-master-container" id="game-master-root">
    
    <div class="cinematic-intro" id="cinematic-overlay">
        <div class="glitch-container">
            <img src="assets/images/logo.png" class="glitch-img main-img" alt="Deception">
            <img src="assets/images/logo.png" class="glitch-img layer-red" alt="Deception Glitch R">
            <img src="assets/images/logo.png" class="glitch-img layer-blue" alt="Deception Glitch B">
        </div>
    </div>

    <div id="tab-game-settings" class="g-section-view">
        <div style="max-width: 600px; margin: 0 auto;">
            <h2 class="g-page-title"><i class="ph-fill ph-gear"></i> الإعدادات</h2>
            <div class="g-native-card">
                <button class="modern-danger-btn" style="width: 100%; padding: 18px; font-size: 1.1rem;" onclick="window.gameEngine.requestLeaveGame()">
                    <i class="ph-bold ph-sign-out"></i> الخروج من اللعبة الحالية
                </button>
            </div>
        </div>
    </div>

    <div id="tab-game-info" class="g-section-view">
        <div style="max-width: 800px; margin: 0 auto;">
            <h2 class="g-page-title"><i class="ph-fill ph-identification-card"></i> هويتي السرية</h2>
            <div id="render-game-role" class="g-native-card" style="text-align: center; padding: 60px 20px;">
                <i class="ph-duotone ph-spinner ph-spin" style="font-size:3rem; color:var(--text-dim);"></i>
            </div>
        </div>
    </div>

    <div id="tab-game-accuse" class="g-section-view active">
        <div style="max-width: 1200px; margin: 0 auto;">
            <h2 class="g-page-title"><i class="ph-fill ph-gavel"></i> منصة الاتهام</h2>
            <div id="render-game-accuse" class="accuse-char-grid">
                <div style="text-align:center; padding: 50px; grid-column: 1/-1;"><i class="ph-duotone ph-spinner ph-spin" style="font-size:3rem; color:var(--text-dim);"></i></div>
            </div>
        </div>
    </div>

    <div id="tab-game-evidence" class="g-section-view">
        <div style="max-width: 800px; margin: 0 auto;">
            <h2 class="g-page-title"><i class="ph-fill ph-microscope"></i> مسرح الجريمة</h2>
            <div class="g-native-card" style="text-align:center; padding: 80px 20px;">
                <i class="ph-duotone ph-file-magnifying-glass" style="font-size:4rem; color:var(--text-dim); margin-bottom:15px; opacity:0.5;"></i>
                <h3 style="color:var(--text-main); margin-bottom:10px;">لا توجد أدلة بعد</h3>
                <p style="color:var(--text-dim);">تلميحات الطبيب الشرعي ستظهر هنا.</p>
            </div>
        </div>
    </div>

    <div id="tab-game-items" class="g-section-view">
        <div style="max-width: 800px; margin: 0 auto;">
            <h2 class="g-page-title"><i class="ph-fill ph-briefcase"></i> أسلحتي وآثاري</h2>
            <div id="render-game-items" class="g-native-card" style="text-align: center; padding: 60px 20px;">
                <i class="ph-duotone ph-spinner ph-spin" style="font-size:3rem; color:var(--text-dim);"></i>
            </div>
        </div>
    </div>

    <nav class="bottom-bar game-mobile-bar">
        <button class="bottom-tab" onclick="window.switchGameTab('tab-game-settings', 0)"><i class="ph ph-gear"></i></button>
        <button class="bottom-tab" onclick="window.switchGameTab('tab-game-info', 1)"><i class="ph ph-identification-card"></i></button>
        <button class="bottom-tab active" onclick="window.switchGameTab('tab-game-accuse', 2)"><i class="ph-fill ph-gavel"></i></button>
        <button class="bottom-tab" onclick="window.switchGameTab('tab-game-evidence', 3)"><i class="ph ph-microscope"></i></button>
        <button class="bottom-tab" onclick="window.switchGameTab('tab-game-items', 4)"><i class="ph ph-briefcase"></i></button>
    </nav>

    <div class="accuse-modal-overlay" id="accuse-player-modal" onclick="if(event.target === this) closeAccuseModal()">
        <div class="accuse-modal-card">
            <div class="accuse-modal-header">
                <div class="accuse-modal-title" id="accuse-modal-title-text"><i class="ph-fill ph-user-focus"></i> أغراض اللاعب</div>
                <button class="accuse-modal-close" onclick="closeAccuseModal()"><i class="ph-bold ph-x"></i></button>
            </div>
            <div class="accuse-modal-body" id="accuse-modal-content">
                </div>
            <div style="padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2);">
                <button class="modern-danger-btn" style="width: 100%; font-size:1.1rem; padding:16px;" onclick="submitAccusation()"><i class="ph-bold ph-gavel"></i> توجيه الاتهام</button>
            </div>
        </div>
    </div>

</div>

<script>
    // ========================================================
    // 1. الأنيميشن السينمائي (قليتش الشعار النظيف)
    // ========================================================
    (function handleCinematicTimeline() {
        const introOverlay = document.getElementById('cinematic-overlay');
        if (!introOverlay) return;

        const sessionKey = 'deception_intro_played_' + (window.currentRoomId || 'global');

        if (sessionStorage.getItem(sessionKey)) {
            introOverlay.remove();
        } else {
            sessionStorage.setItem(sessionKey, 'true');
            setTimeout(() => { introOverlay.classList.add('show-logo'); }, 100);
            setTimeout(() => { introOverlay.classList.add('start-glitch'); }, 2000);
            setTimeout(() => { 
                introOverlay.classList.add('fade-out-complete');
                setTimeout(() => introOverlay.remove(), 400);
            }, 3000); // قللنا الوقت ليكون أسرع وأكثر حماساً
        }
    })();

    // ========================================================
    // 2. نظام التحكم بالأشرطة
    // ========================================================
    window.cleanupGameUI = function() {
        document.body.classList.remove('in-game-mode');
        document.querySelectorAll('.game-injected-btn').forEach(b => b.remove());
    };

    window.initGameUI = function() {
        window.cleanupGameUI();
        document.body.classList.add('in-game-mode');

        const desktopMenu = document.querySelector('.sidebar .nav-menu');
        if(desktopMenu) {
            desktopMenu.insertAdjacentHTML('beforeend', `
                <button class="nav-btn game-injected-btn" onclick="window.switchGameTab('tab-game-settings', 0)"><i class="ph ph-gear"></i></button>
                <button class="nav-btn game-injected-btn" onclick="window.switchGameTab('tab-game-info', 1)"><i class="ph ph-identification-card"></i></button>
                <button class="nav-btn game-injected-btn active" onclick="window.switchGameTab('tab-game-accuse', 2)"><i class="ph-fill ph-gavel"></i></button>
                <button class="nav-btn game-injected-btn" onclick="window.switchGameTab('tab-game-evidence', 3)"><i class="ph ph-microscope"></i></button>
                <button class="nav-btn game-injected-btn" onclick="window.switchGameTab('tab-game-items', 4)"><i class="ph ph-briefcase"></i></button>
            `);
        }
    };

    window.switchGameTab = function(tabId, index) {
        document.querySelectorAll('.g-section-view').forEach(s => s.classList.remove('active'));
        const targetSec = document.getElementById(tabId);
        if(targetSec) targetSec.classList.add('active');

        const icons = ['ph-gear', 'ph-identification-card', 'ph-gavel', 'ph-microscope', 'ph-briefcase'];

        document.querySelectorAll('.sidebar .game-injected-btn').forEach((b, i) => {
            b.classList.toggle('active', i === index);
            const icon = b.querySelector('i');
            if(icon) icon.className = (i === index) ? `ph-fill ${icons[i]}` : `ph ${icons[i]}`;
        });

        document.querySelectorAll('.game-mobile-bar .bottom-tab').forEach((b, i) => {
            b.classList.toggle('active', i === index);
            const icon = b.querySelector('i');
            if(icon) icon.className = (i === index) ? `ph-fill ${icons[i]}` : `ph ${icons[i]}`;
        });
    };

    // ========================================================
    // 3. المحرك الواجهي ورسم منصة الاتهام الفاخرة
    // ========================================================
    window.renderGameData = function() {
        try {
            if(!window.currentRoomData || !window.currentRoomData.roles) return;
            
            const myName = window.currentUserData ? window.currentUserData.username_lower : 'unknown';
            const allPlayers = window.currentRoomData.players || [];
            
            let myRole = 'investigator';
            for (const [k, v] of Object.entries(window.currentRoomData.roles)) {
                if (k.toLowerCase() === myName) { myRole = v; break; }
            }
            
            let myItems = null;
            if(window.currentRoomData.items) {
                for (const [k, v] of Object.entries(window.currentRoomData.items)) {
                    if (k.toLowerCase() === myName) { myItems = v; break; }
                }
            }

            // رسم الهوية
            const roleDiv = document.getElementById('render-game-role');
            if(myRole === 'murderer') {
                roleDiv.innerHTML = `<i class="ph-duotone ph-knife" style="font-size:6rem; color:var(--accent-red); margin-bottom:15px; filter: drop-shadow(0 0 15px rgba(242, 39, 123, 0.4));"></i><h2 style="color:white; font-size:2.8rem; font-weight:900; margin-bottom:10px;">أنت القاتل</h2><p style="color:var(--text-dim); font-size:1.1rem; max-width:400px; margin: 0 auto;">اختر سلاحك ودليلك وقم بخداعهم.</p>`;
            } else if(myRole === 'forensic') {
                roleDiv.innerHTML = `<i class="ph-duotone ph-microscope" style="font-size:6rem; color:#3498db; margin-bottom:15px; filter: drop-shadow(0 0 15px rgba(52, 152, 219, 0.4));"></i><h2 style="color:white; font-size:2.8rem; font-weight:900; margin-bottom:10px;">الطبيب الشرعي</h2><p style="color:var(--text-dim); font-size:1.1rem; max-width:400px; margin: 0 auto;">أنت تعرف القاتل. وجه المحققين عبر التلميحات.</p>`;
            } else {
                roleDiv.innerHTML = `<i class="ph-duotone ph-magnifying-glass" style="font-size:6rem; color:var(--accent-green); margin-bottom:15px; filter: drop-shadow(0 0 15px rgba(46, 204, 113, 0.4));"></i><h2 style="color:white; font-size:2.8rem; font-weight:900; margin-bottom:10px;">محقق</h2><p style="color:var(--text-dim); font-size:1.1rem; max-width:400px; margin: 0 auto;">اكتشف القاتل من خلال التلميحات والأدوات.</p>`;
            }

            // رسم أدواتي
            const itemsDiv = document.getElementById('render-game-items');
            if(myItems && myItems.weapons) {
                let wHtml = myItems.weapons.map(w => `<span class="g-badge"><i class="ph-fill ph-crosshair" style="color:var(--accent-red);"></i>${w}</span>`).join('');
                let eHtml = myItems.evidence.map(e => `<span class="g-badge"><i class="ph-fill ph-fingerprint" style="color:#3498db;"></i>${e}</span>`).join('');
                itemsDiv.innerHTML = `
                    <div style="text-align:right;">
                        <h3 style="color:white; margin-bottom:15px; font-size:1.2rem;">الأسلحة المتاحة لك:</h3>
                        <div style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:35px;">${wHtml}</div>
                        <h3 style="color:white; margin-bottom:15px; font-size:1.2rem;">الآثار (الأدلة):</h3>
                        <div style="display:flex; flex-wrap:wrap; gap:12px;">${eHtml}</div>
                    </div>
                `;
            }

            // رسم منصة الاتهام (بطاقات الشخصيات)
            const accuseGrid = document.getElementById('render-game-accuse');
            let accuseHtml = '';
            
            // جلب اختيارات الشخصيات من الغرفة
            const charSelections = window.currentRoomData.characterSelections || {};

            allPlayers.forEach(p => {
                let isMe = (p.toLowerCase() === myName) ? `<span style="color:var(--accent-green); font-size:0.8rem; display:block;">(أنت)</span>` : '';
                
                // جلب صورة الشخصية
                let charId = charSelections[p];
                let charImg = 'assets/images/default-avatar.png';
                if(charId && window.GAME_ASSETS && window.GAME_ASSETS.characters) {
                    let found = window.GAME_ASSETS.characters.find(c => c.id === charId);
                    if(found) charImg = found.src;
                }
                if(p.startsWith('Bot_')) {
                    charImg = 'https://api.dicebear.com/9.x/bottts/svg?seed=' + p + '&backgroundColor=transparent';
                }

                accuseHtml += `
                    <div class="accuse-char-card" onclick="openAccuseModal('${p}')">
                        <img src="${charImg}" alt="${p}">
                        <div class="accuse-char-badge">${p} ${isMe}</div>
                    </div>
                `;
            });
            accuseGrid.innerHTML = accuseHtml;

        } catch(e) { console.error("Error drawing UI", e); }
    };

    // ========================================================
    // 4. دوال نافذة الاتهام (Modal)
    // ========================================================
    window.openAccuseModal = function(playerName) {
        document.getElementById('accuse-modal-title-text').innerHTML = `<i class="ph-fill ph-user-focus"></i> أغراض اللاعب: <span style="color:var(--accent-red); margin-right:5px;">${playerName}</span>`;
        
        let pItems = window.currentRoomData.items ? window.currentRoomData.items[playerName] : null;
        let bodyHtml = '';

        if(pItems && pItems.weapons) {
            let wList = pItems.weapons.map(w => `<div class="accuse-item-box"><i class="ph-fill ph-crosshair" style="color:var(--text-dim); display:block; font-size:1.5rem; margin-bottom:5px;"></i>${w}</div>`).join('');
            let eList = pItems.evidence.map(e => `<div class="accuse-item-box"><i class="ph-fill ph-fingerprint" style="color:var(--text-dim); display:block; font-size:1.5rem; margin-bottom:5px;"></i>${e}</div>`).join('');
            
            bodyHtml = `
                <h4 style="color:white; margin-bottom:10px; font-size:1rem;">الأسلحة:</h4>
                <div class="accuse-items-grid">${wList}</div>
                <h4 style="color:white; margin-bottom:10px; font-size:1rem;">الآثار (الأدلة):</h4>
                <div class="accuse-items-grid">${eList}</div>
            `;
        } else {
            bodyHtml = `<div style="text-align:center; color:var(--text-dim); padding: 30px;">لا توجد أدوات متاحة.</div>`;
        }

        document.getElementById('accuse-modal-content').innerHTML = bodyHtml;
        document.getElementById('accuse-player-modal').classList.add('show');
    };

    window.closeAccuseModal = function() {
        document.getElementById('accuse-player-modal').classList.remove('show');
    };

    window.submitAccusation = function() {
        alert("سيتم برمجة نظام الاتهام وتحديد السلاح والدليل في الخطوة القادمة!");
        closeAccuseModal();
    };

    window.initGameUI();
    let retries = 0;
    function safeRender() {
        if(window.currentRoomData && window.currentRoomData.roles) window.renderGameData();
        else if(retries < 15) { retries++; setTimeout(safeRender, 500); }
    }
    safeRender();

</script>
