<style>
    /* =========================================================================
       1. الإخفاء الجذري (Integration & GPU Acceleration)
       ========================================================================= */
    body.in-game-mode .right-sidebar, 
    body.in-game-mode .top-header { display: none !important; }
    
    @media (min-width: 901px) {
        body.in-game-mode .sidebar .nav-menu > button:not(.game-injected-btn) { display: none !important; }
    }
    
    body.in-game-mode .app-shell > .bottom-bar { display: none !important; }
    
    body.in-game-mode .dynamic-content { 
        padding: 0 !important; overflow: hidden !important; 
        height: 100vh !important; height: 100dvh !important;
        will-change: transform, opacity; /* إجبار كرت الشاشة على المعالجة */
        transform: translateZ(0);
    }

    /* =========================================================================
       2. الشاشة السينمائية المحمية ضد التعليق (Glitch Engine)
       ========================================================================= */
    .cinematic-intro {
        position: fixed; inset: 0; z-index: 1000000;
        background: #060608; 
        display: none; /* مخفية افتراضياً، يتم إظهارها بالـ JS */
        justify-content: center; align-items: center;
        opacity: 1; visibility: visible;
        transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.5s;
    }
    
    .glitch-container { position: relative; width: 150px; height: 150px; display: flex; justify-content: center; align-items: center; }
    .glitch-img { position: absolute; width: 100%; height: auto; object-fit: contain; opacity: 0; transform: scale(0.95); transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s; }
    .cinematic-intro.show-logo .main-img { opacity: 1; transform: scale(1); }
    .cinematic-intro.start-glitch .main-img { animation: mainGlitchAnim 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite; }
    
    .cinematic-intro.start-glitch .layer-red {
        opacity: 0.8; transform: translateX(-5px);
        filter: drop-shadow(-2px 0 var(--accent-red)) saturate(1.5);
        animation: glitchSliceTop 0.2s linear infinite;
    }
    
    .cinematic-intro.start-glitch .layer-blue {
        opacity: 0.8; transform: translateX(5px);
        filter: drop-shadow(2px 0 #00d2ff) saturate(1.5);
        animation: glitchSliceBottom 0.25s linear infinite;
    }

    @keyframes glitchSliceTop { 0% { clip-path: inset(20% 0 60% 0); } 20% { clip-path: inset(50% 0 10% 0); } 40% { clip-path: inset(10% 0 70% 0); } 60% { clip-path: inset(80% 0 5% 0); } 80% { clip-path: inset(30% 0 50% 0); } 100% { clip-path: inset(60% 0 20% 0); } }
    @keyframes glitchSliceBottom { 0% { clip-path: inset(60% 0 10% 0); } 25% { clip-path: inset(15% 0 80% 0); } 50% { clip-path: inset(70% 0 20% 0); } 75% { clip-path: inset(5% 0 50% 0); } 100% { clip-path: inset(40% 0 30% 0); } }
    @keyframes mainGlitchAnim { 0% { transform: translate(1px, 1px); } 25% { transform: translate(-1px, -1px); } 50% { transform: translate(-2px, 1px); } 75% { transform: translate(1px, -1px); } 100% { transform: translate(0px, 0px); } }

    /* =========================================================================
       3. لغة التصميم المتطورة للأقسام (Advanced Layout)
       ========================================================================= */
    .g-master-container { position: relative; width: 100%; height: 100%; background: transparent; }

    .g-section-view {
        position: absolute; inset: 0; padding: 40px; padding-bottom: 40px;
        opacity: 0; visibility: hidden; transition: 0.2s ease-in-out;
        overflow-y: auto; scrollbar-width: none; z-index: 1;
        will-change: opacity, visibility;
    }
    .g-section-view::-webkit-scrollbar { display: none; }
    .g-section-view.active { opacity: 1; visibility: visible; z-index: 10; }

    .g-native-card { background: var(--surface-panel); border: 1px solid rgba(255,255,255,0.03); border-radius: 24px; padding: 25px; margin-bottom: 20px; box-shadow: var(--shadow-soft); transition: var(--trans-smooth); }
    .g-page-title { color: var(--text-main); font-size: 1.8rem; margin-bottom: 25px; font-weight: 900; display: flex; align-items: center; gap: 12px; }
    .g-page-title i { color: var(--accent-red); font-size: 2.2rem; }
    .g-badge { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; padding: 10px 14px; font-size: 0.9rem; color: var(--text-main); font-weight: 700; display: inline-flex; align-items: center; gap: 6px; }

    /* =========================================================================
       4. منصة الاتهام (Valorant AAA Style + Dynamic Lighting)
       ========================================================================= */
    #tab-game-accuse { padding: 0 !important; overflow: hidden; background: #0b0b0e; }

    .val-bg-container {
        position: absolute; inset: 0; background-size: cover; background-position: top center;
        transition: background-image 0.5s ease-in-out, opacity 0.5s; opacity: 0.4; z-index: 0;
        will-change: background-image;
    }
    
    .val-bg-overlay {
        position: absolute; inset: 0; z-index: 1; pointer-events: none;
        background: linear-gradient(to right, rgba(11,11,14,0.95) 0%, rgba(11,11,14,0.1) 40%, transparent 100%),
                    linear-gradient(to top, rgba(11,11,14,1) 0%, transparent 50%);
    }

    .val-layout-wrapper { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 50px; }

    .val-left-menu { display: flex; flex-direction: column; gap: 20px; direction: ltr; }
    .val-logo { width: 130px; height: auto; object-fit: contain; margin-bottom: 5px; }
    .val-round-info { color: var(--text-dim); letter-spacing: 4px; font-family: var(--font-en); font-size: 0.8rem; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; text-transform: uppercase; width: max-content; }
    
    .val-menu-items { display: flex; flex-direction: column; gap: 18px; margin-top: 10px; }
    .val-item { color: rgba(255,255,255,0.6); font-size: 1.05rem; font-weight: 800; font-family: var(--font-ar); cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); width: max-content; }
    .val-item i { font-size: 1.5rem; transition: 0.3s; }
    .val-item:hover, .val-item.active { color: white; transform: translateX(8px); }
    .val-item:hover i, .val-item.active i { color: var(--accent-red); filter: drop-shadow(0 0 8px var(--accent-red)); }

    .val-roster-container { align-self: center; width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; perspective: 1000px; }
    .val-roster-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; }

    /* المربع المتطور: يتم تحديث المتغيرات (--mouse-x, --mouse-y) بواسطة JS لإضاءة تفاعلية */
    .val-char-box {
        --mouse-x: 50%;
        --mouse-y: 50%;
        background: rgba(20, 20, 25, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255,255,255,0.05); 
        clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
        padding: 12px; display: flex; align-items: center; gap: 15px;
        cursor: pointer; transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s;
        direction: ltr; position: relative; overflow: hidden;
    }
    
    /* طبقة الإضاءة التفاعلية التي تتبع الماوس (Advanced Mouse Tracking Glow) */
    .val-char-box::before {
        content: ''; position: absolute; inset: 0; z-index: 1; pointer-events: none;
        background: radial-gradient(circle 80px at var(--mouse-x) var(--mouse-y), rgba(255, 255, 255, 0.1), transparent);
        opacity: 0; transition: opacity 0.3s ease;
    }
    
    /* الخط العلوي الثابت */
    .val-char-box::after {
        content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
        background: rgba(255,255,255,0.2); transition: 0.3s; z-index: 2;
    }

    .val-char-box:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.6); border-color: rgba(255,255,255,0.15); }
    .val-char-box:hover::before { opacity: 1; }
    .val-char-box:hover::after { background: var(--accent-red); box-shadow: 0 0 15px var(--accent-red); }

    .val-char-avatar { width: 55px; height: 55px; border-radius: 6px; object-fit: cover; object-position: top center; border: 1px solid rgba(255,255,255,0.1); background: var(--surface-panel); flex-shrink: 0; position: relative; z-index: 2; }
    .val-char-info { display: flex; flex-direction: column; text-align: left; overflow: hidden; position: relative; z-index: 2; }
    .val-char-name { font-size: 1.15rem; font-family: var(--font-en); font-weight: 900; color: white; letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .val-char-role { font-size: 0.75rem; color: rgba(255,255,255,0.5); font-weight: 700; margin-top: 2px; font-family: var(--font-ar); }

    /* =========================================================================
       5. نافذة الاستهداف (Cyberpunk Dossier Modal)
       ========================================================================= */
    .accuse-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 100000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s; padding: 20px; }
    .accuse-modal-overlay.show { opacity: 1; visibility: visible; }
    
    .target-panel { width: 100%; max-width: 450px; background: transparent; transform: scale(0.95) translateY(20px); opacity: 0; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; }
    .accuse-modal-overlay.show .target-panel { transform: scale(1) translateY(0); opacity: 1; }

    .target-header { position: relative; height: 200px; clip-path: polygon(0 0, 100% 0, 100% calc(100% - 25px), calc(100% - 25px) 100%, 0 100%); background: #050505; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); border-bottom: none; display: flex; align-items: flex-end; padding: 20px; }
    .target-header::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px); pointer-events: none; }
    .target-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: top center; opacity: 0.5; filter: grayscale(30%); mask-image: linear-gradient(to bottom, black 40%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%); }
    .target-name { position: relative; z-index: 2; font-size: 2.2rem; font-weight: 900; color: white; font-family: var(--font-en); letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 4px 15px rgba(0,0,0,1); direction: ltr; }
    
    .target-body { background: rgba(15, 15, 20, 0.95); padding: 30px; clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%); border: 1px solid rgba(255,255,255,0.1); border-top: none; backdrop-filter: blur(10px); position: relative;}
    
    .btn-close-modal { position: absolute; top: -190px; right: 15px; z-index: 20; background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.2); color: white; width: 35px; height: 35px; border-radius: 8px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; backdrop-filter: blur(5px); }
    .btn-close-modal:hover { background: var(--accent-red); border-color: var(--accent-red); }

    .sharp-btn { width: 100%; background: transparent; border: 1px solid rgba(255,255,255,0.1); border-left: 4px solid var(--accent-red); color: white; font-size: 1.1rem; font-weight: 900; padding: 18px; cursor: pointer; border-radius: 6px; transition: 0.3s; font-family: var(--font-ar); display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 15px; }
    .sharp-btn:hover { background: rgba(255,255,255,0.05); border-color: var(--accent-red); box-shadow: 0 5px 20px rgba(242, 39, 123, 0.15); transform: translateY(-2px); }

    /* =========================================================================
       6. استجابة الجوال المتقنة
       ========================================================================= */
    .game-mobile-bar { display: none !important; }

    @media (max-width: 900px) {
        .g-section-view { padding: 20px 15px 120px 15px; }
        .g-page-title { font-size: 1.5rem; }
        .game-mobile-bar { display: flex !important; z-index: 99999; }
        
        .val-layout-wrapper { padding: 30px 20px 100px 20px; }
        .val-left-menu { gap: 10px; }
        .val-logo { width: 100px; }
        .val-round-info { font-size: 0.65rem; padding-bottom: 10px; }
        .val-item { font-size: 0.9rem; gap: 8px; }
        
        /* في الجوال: عمودين فقط ليكون الضغط مريحاً */
        .val-roster-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .val-char-box { padding: 8px; gap: 10px; }
        .val-char-avatar { width: 45px; height: 45px; }
        .val-char-name { font-size: 0.9rem; letter-spacing: 0.5px; }
        .val-char-role { font-size: 0.6rem; }
    }
</style>

<div class="g-master-container" id="game-master-root">
    
    <div class="cinematic-intro" id="cinematic-overlay">
        <div class="glitch-container">
            <img src="assets/images/logo.png" class="glitch-img main-img" alt="Deception">
            <img src="assets/images/logo.png" class="glitch-img layer-red" alt="Glitch R">
            <img src="assets/images/logo.png" class="glitch-img layer-blue" alt="Glitch B">
        </div>
    </div>

    <div class="accuse-modal-overlay" id="accuse-action-modal" onclick="if(event.target === this) closeAccuseModal()">
        <div class="target-panel">
            <div class="target-header">
                <img src="" id="a-modal-img" class="target-img" alt="Target">
                <div class="target-name" id="a-modal-name">PLAYER</div>
            </div>
            <div class="target-body">
                <button class="btn-close-modal" onclick="closeAccuseModal()"><i class="ph-bold ph-x"></i></button>
                <div style="margin-bottom: 20px;">
                    <div style="font-size:0.85rem; color:var(--text-dim); margin-bottom:12px; font-weight:800; font-family:var(--font-en); letter-spacing:1px;">WEAPONS</div>
                    <div style="display:flex; flex-wrap:wrap; gap:8px;" id="a-modal-weapons"></div>
                </div>
                <div style="margin-bottom: 20px;">
                    <div style="font-size:0.85rem; color:var(--text-dim); margin-bottom:12px; font-weight:800; font-family:var(--font-en); letter-spacing:1px;">EVIDENCE</div>
                    <div style="display:flex; flex-wrap:wrap; gap:8px;" id="a-modal-evidence"></div>
                </div>
                <button class="sharp-btn" onclick="submitAccusation()"><i class="ph-bold ph-gavel" style="color:var(--accent-red);"></i> ELIMINATE TARGET</button>
            </div>
        </div>
    </div>

    <div id="tab-game-settings" class="g-section-view">
        <div style="max-width: 600px; margin: 0 auto;">
            <h2 class="g-page-title"><i class="ph-fill ph-gear"></i> الإعدادات</h2>
            <div class="g-native-card">
                <button class="modern-danger-btn" style="width: 100%; padding: 18px; font-size: 1.1rem;" onclick="window.gameEngine.requestLeaveGame()">
                    <i class="ph-bold ph-sign-out"></i> الخروج من اللعبة الحالية
                </button>
            </div>
        </div>
    </div>

    <div id="tab-game-info" class="g-section-view">
        <div style="max-width: 800px; margin: 0 auto;">
            <h2 class="g-page-title"><i class="ph-fill ph-identification-card"></i> هويتي السرية</h2>
            <div id="render-game-role" class="g-native-card" style="text-align: center; padding: 60px 20px;">
                <i class="ph-duotone ph-spinner ph-spin" style="font-size:3rem; color:var(--text-dim);"></i>
            </div>
        </div>
    </div>

    <div id="tab-game-accuse" class="g-section-view active">
        <div class="val-bg-container" id="val-dynamic-bg" style="background-image: url('assets/images/accuse-bg.jpg');"></div>

        <div class="val-layout-wrapper">
            <div class="val-left-menu">
                <img src="assets/images/logo.png" class="val-logo" alt="Logo">
                <div class="val-round-info">ROUND 01 // DECEPTION</div>
                <div class="val-menu-items">
                    <div class="val-item active"><i class="ph-fill ph-gavel"></i> حق الاتهام المتبقي: 1</div>
                    <div class="val-item"><i class="ph-fill ph-clock-counter-clockwise"></i> السجل</div>
                    <div class="val-item"><i class="ph-fill ph-broadcast"></i> آخر التحديثات</div>
                </div>
            </div>
            
            <div class="val-roster-container">
                <div class="val-roster-grid" id="render-game-accuse">
                    <div style="color:var(--text-dim); text-align: center; grid-column: 1/-1; padding: 50px;"><i class="ph-bold ph-spinner ph-spin" style="font-size: 2rem;"></i></div>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-game-evidence" class="g-section-view">
        <div style="max-width: 800px; margin: 0 auto;">
            <h2 class="g-page-title"><i class="ph-fill ph-microscope"></i> مسرح الجريمة</h2>
            <div class="g-native-card" style="text-align:center; padding: 80px 20px;">
                <i class="ph-duotone ph-file-magnifying-glass" style="font-size:4rem; color:var(--text-dim); margin-bottom:15px; opacity:0.5;"></i>
                <h3 style="color:var(--text-main); margin-bottom:10px;">لا توجد أدلة بعد</h3>
                <p style="color:var(--text-dim);">تلميحات الطبيب الشرعي ستظهر هنا.</p>

    <div id="tab-game-items" class="g-section-view">

            </div>
        </div>
    </div>

    <nav class="bottom-bar game-mobile-bar">
        <button class="bottom-tab" onclick="window.switchGameTab('tab-game-settings', 0)"><i class="ph ph-gear"></i></button>
        <button class="bottom-tab" onclick="window.switchGameTab('tab-game-info', 1)"><i class="ph ph-identification-card"></i></button>
        <button class="bottom-tab active" onclick="window.switchGameTab('tab-game-accuse', 2)"><i class="ph-fill ph-gavel"></i></button>
        <button class="bottom-tab" onclick="window.switchGameTab('tab-game-evidence', 3)"><i class="ph ph-microscope"></i></button>
        <button class="bottom-tab" onclick="window.switchGameTab('tab-game-items', 4)"><i class="ph ph-briefcase"></i></button>
    </nav>

</div>

<script>
    // ========================================================
    // 1. نظام الحقن وإدارة الواجهة (آمن ومرتبط بدورة الحياة)
    // ========================================================
    window.cleanupGameUI = function() {
        document.body.classList.remove('in-game-mode');
        document.querySelectorAll('.game-injected-btn').forEach(b => b.remove());
    };

    window.initGameUI = function(isNewSession = false) {
        window.cleanupGameUI();
        document.body.classList.add('in-game-mode');

        // حقن أزرار الكمبيوتر
        const desktopMenu = document.querySelector('.sidebar .nav-menu');
        if(desktopMenu) {
            desktopMenu.insertAdjacentHTML('beforeend', `
                <button class="nav-btn game-injected-btn" onclick="window.switchGameTab('tab-game-settings', 0)"><i class="ph ph-gear"></i></button>
                <button class="nav-btn game-injected-btn" onclick="window.switchGameTab('tab-game-info', 1)"><i class="ph ph-identification-card"></i></button>
                <button class="nav-btn game-injected-btn active" onclick="window.switchGameTab('tab-game-accuse', 2)"><i class="ph-fill ph-gavel"></i></button>
                <button class="nav-btn game-injected-btn" onclick="window.switchGameTab('tab-game-evidence', 3)"><i class="ph ph-microscope"></i></button>
                <button class="nav-btn game-injected-btn" onclick="window.switchGameTab('tab-game-items', 4)"><i class="ph ph-briefcase"></i></button>
            `);
        }

        // معالجة الأنيميشن السينمائي بشكل آمن ضد التعليق
        const introOverlay = document.getElementById('cinematic-overlay');
        if (introOverlay) {
            if (isNewSession) {
                // عرض الشاشة السينمائية
                introOverlay.style.display = 'flex';
                setTimeout(() => { introOverlay.classList.add('show-logo'); }, 100);
                setTimeout(() => { introOverlay.classList.add('start-glitch'); }, 1500);
                setTimeout(() => {
                    introOverlay.classList.add('fade-out-complete');
                    setTimeout(() => introOverlay.style.display = 'none', 500);
                }, 2500);
            } else {
                // إخفاء فوري إذا لم يكن جيم جديد لمنع الشاشة السوداء
                introOverlay.style.display = 'none';
            }
        }
    };

    window.switchGameTab = function(tabId, index) {
        document.querySelectorAll('.g-section-view').forEach(s => s.classList.remove('active'));
        const targetSec = document.getElementById(tabId);
        if(targetSec) targetSec.classList.add('active');

        const icons = ['ph-gear', 'ph-identification-card', 'ph-gavel', 'ph-microscope', 'ph-briefcase'];

        document.querySelectorAll('.sidebar .game-injected-btn').forEach((b, i) => {
            b.classList.toggle('active', i === index);
            const icon = b.querySelector('i');
            if(icon) icon.className = (i === index) ? `ph-fill ${icons[i]}` : `ph ${icons[i]}`;
        });

        document.querySelectorAll('.game-mobile-bar .bottom-tab').forEach((b, i) => {
            b.classList.toggle('active', i === index);
            const icon = b.querySelector('i');
            if(icon) icon.className = (i === index) ? `ph-fill ${icons[i]}` : `ph ${icons[i]}`;
        });
    };

    // ========================================================
    // 2. نظام التفاعل الذكي (Mouse Tracking Light)
    // ========================================================
    function applyMouseTracking() {
        const cards = document.querySelectorAll('.val-char-box');
        cards.forEach(card => {
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);
            });
        });
    }

    // ========================================================
    // 3. التحكم بالنافذة المنبثقة للاتهام (Dossier Modal)
    // ========================================================
    window.gameAccuseDataCache = {}; 

    window.openAccuseModal = function(playerName, imgSrc) {
        const modal = document.getElementById('accuse-action-modal');
        const pItems = window.currentRoomData.items ? window.currentRoomData.items[playerName] : {weapons:[], evidence:[]};
        
        document.getElementById('a-modal-name').innerText = playerName;
        document.getElementById('a-modal-img').src = imgSrc;
        
        const wHtml = pItems.weapons ? pItems.weapons.map(w => `<span class="g-badge" style="background:rgba(255,255,255,0.05); border:none; color:white;"><i class="ph-fill ph-crosshair" style="color:var(--text-dim);"></i>${w}</span>`).join('') : '';
        const eHtml = pItems.evidence ? pItems.evidence.map(e => `<span class="g-badge" style="background:rgba(255,255,255,0.05); border:none; color:white;"><i class="ph-fill ph-fingerprint" style="color:var(--text-dim);"></i>${e}</span>`).join('') : '';
        
        document.getElementById('a-modal-weapons').innerHTML = wHtml || '<span style="color:var(--text-dim);">NO DATA</span>';
        document.getElementById('a-modal-evidence').innerHTML = eHtml || '<span style="color:var(--text-dim);">NO DATA</span>';
        
        window.gameAccuseDataCache.currentTarget = playerName;
        modal.classList.add('show');
    };

    window.closeAccuseModal = function() { document.getElementById('accuse-action-modal').classList.remove('show'); };
    window.submitAccusation = function() { alert("تم توجيه الاتهام إلى الهدف: " + window.gameAccuseDataCache.currentTarget); window.closeAccuseModal(); };

    // ========================================================
    // 4. محرك الداتا ورسم منصة الاتهام 
    // ========================================================
    window.renderGameData = function() {
        try {
            if(!window.currentRoomData || !window.currentRoomData.roles) return;
            
            const myName = window.currentUserData ? window.currentUserData.username_lower : 'unknown';
            const allPlayers = window.currentRoomData.players || [];
            
            const accuseGrid = document.getElementById('render-game-accuse');
            let accuseHtml = '';
            
            // خوارزمية جلب الشخصيات ومنع التكرار
            let allGameChars = (window.GAME_ASSETS && window.GAME_ASSETS.characters) ? [...window.GAME_ASSETS.characters] : [];
            let dbSelections = window.currentRoomData.characterSelections || {};
            let usedIds = Object.values(dbSelections);
            let availableChars = allGameChars.filter(c => !usedIds.includes(c.id));

            allPlayers.forEach(p => {
                let charImgSrc = 'assets/images/default-avatar.png'; 
                if(dbSelections[p]) {
                    let foundChar = allGameChars.find(c => c.id === dbSelections[p]);
                    if(foundChar) charImgSrc = foundChar.src;
                } else {
                    if(availableChars.length > 0) { charImgSrc = availableChars.shift().src; } 
                    else if (p.startsWith('Bot_')) { charImgSrc = `https://api.dicebear.com/9.x/bottts/svg?seed=${p}&backgroundColor=transparent`; }
                }

                let isMe = (p.toLowerCase() === myName);
                let roleText = isMe ? 'YOU (DETECTIVE)' : 'SUSPECT';
                
                accuseHtml += `
                    <div class="val-char-box" 
                         onmouseenter="document.getElementById('val-dynamic-bg').style.backgroundImage = 'url(${charImgSrc})'; document.getElementById('val-dynamic-bg').style.opacity = '0.5';"
                         onmouseleave="document.getElementById('val-dynamic-bg').style.backgroundImage = 'url(assets/images/accuse-bg.jpg)'; document.getElementById('val-dynamic-bg').style.opacity = '0.4';"
                         onclick="window.openAccuseModal('${p}', '${charImgSrc}')">
                        <img src="${charImgSrc}" class="val-char-avatar" onerror="this.src='assets/images/default-avatar.png';">
                        <div class="val-char-info">
                            <div class="val-char-name">${p}</div>
                            <div class="val-char-role">${roleText}</div>
                        </div>
                    </div>
                `;
            });
            accuseGrid.innerHTML = accuseHtml;
            
            // تفعيل تأثير الماوس بعد رسم المربعات
            applyMouseTracking();

            // رسم باقي البيانات (نفس الكود السابق للحفاظ على الاستقرار)
            let myRole = 'investigator';
            for (const [k, v] of Object.entries(window.currentRoomData.roles)) { if (k.toLowerCase() === myName) { myRole = v; break; } }
            
            let myItems = null;
            if(window.currentRoomData.items) {
                for (const [k, v] of Object.entries(window.currentRoomData.items)) { if (k.toLowerCase() === myName) { myItems = v; break; } }
            }

            const roleDiv = document.getElementById('render-game-role');
            if(myRole === 'murderer') {
                roleDiv.innerHTML = `<i class="ph-duotone ph-knife" style="font-size:6rem; color:var(--accent-red); margin-bottom:15px; filter: drop-shadow(0 0 15px rgba(242, 39, 123, 0.4));"></i><h2 style="font-family:var(--font-en); font-size:3rem; font-weight:900; color:white; text-transform:uppercase; letter-spacing:2px; margin-bottom:10px;">MURDERER</h2><p style="color:var(--text-dim); font-size:1.1rem; max-width:400px; margin: 0 auto;">أنت القاتل. استخدم أدواتك بذكاء لتضليل البقية.</p>`;
            } else if(myRole === 'forensic') {
                roleDiv.innerHTML = `<i class="ph-duotone ph-microscope" style="font-size:6rem; color:#3498db; margin-bottom:15px; filter: drop-shadow(0 0 15px rgba(52, 152, 219, 0.4));"></i><h2 style="font-family:var(--font-en); font-size:3rem; font-weight:900; color:white; text-transform:uppercase; letter-spacing:2px; margin-bottom:10px;">FORENSIC</h2><p style="color:var(--text-dim); font-size:1.1rem; max-width:400px; margin: 0 auto;">أنت تعرف القاتل. وجه المحققين عبر التلميحات.</p>`;
            } else {
                roleDiv.innerHTML = `<i class="ph-duotone ph-magnifying-glass" style="font-size:6rem; color:var(--accent-green); margin-bottom:15px; filter: drop-shadow(0 0 15px rgba(46, 204, 113, 0.4));"></i><h2 style="font-family:var(--font-en); font-size:3rem; font-weight:900; color:white; text-transform:uppercase; letter-spacing:2px; margin-bottom:10px;">INVESTIGATOR</h2><p style="color:var(--text-dim); font-size:1.1rem; max-width:400px; margin: 0 auto;">اكتشف القاتل من خلال التلميحات والأدوات.</p>`;
            }

            const itemsDiv = document.getElementById('render-game-items');
            if(myItems && myItems.weapons) {
                let wHtml = myItems.weapons.map(w => `<span class="g-badge"><i class="ph-fill ph-crosshair" style="color:var(--accent-red);"></i>${w}</span>`).join('');
                let eHtml = myItems.evidence.map(e => `<span class="g-badge"><i class="ph-fill ph-fingerprint" style="color:#3498db;"></i>${e}</span>`).join('');
                itemsDiv.innerHTML = `
                    <div style="text-align:right;">
                        <h3 style="color:white; margin-bottom:15px; font-size:1.2rem;">الأسلحة المتاحة لك:</h3>
                        <div style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:35px;">${wHtml}</div>
                        <h3 style="color:white; margin-bottom:15px; font-size:1.2rem;">الآثار (الأدلة):</h3>
                        <div style="display:flex; flex-wrap:wrap; gap:12px;">${eHtml}</div>
                    </div>
                `;
            }
        } catch(e) { console.error("Error drawing UI", e); }
    };

    // ========================================================
    // 5. التشغيل الآمن والذكي
    // ========================================================
    
    // نتحقق إذا كان اللاعب قد شاهد الانترو مسبقاً في نفس الجلسة
    const sessionKey = 'deception_intro_played_' + (window.currentRoomId || 'global');
    const isFirstLoad = !sessionStorage.getItem(sessionKey);
    
    window.initGameUI(isFirstLoad);
    
    let retries = 0;
    function safeRender() {
        if(window.currentRoomData && window.currentRoomData.roles) window.renderGameData();
        else if(retries < 15) { retries++; setTimeout(safeRender, 500); }
    }
    safeRender();

    window.addEventListener('popstate', function cleanUp() {
        if(window.cleanupGameUI) window.cleanupGameUI();
        window.removeEventListener('popstate', cleanUp);
    });
</script>
