<style>
    /* =========================================================================
       1. الإخفاء الذكي والتسريع العتادي (GPU Acceleration)
       ========================================================================= */
    body.in-game-mode .right-sidebar, 
    body.in-game-mode .top-header { display: none !important; }
    
    @media (min-width: 901px) {
        body.in-game-mode .sidebar .nav-menu > button:not(.game-injected-btn) { display: none !important; }
    }
    
    body.in-game-mode .app-shell > .bottom-bar { display: none !important; }
    
    body.in-game-mode .dynamic-content { 
        padding: 0 !important; overflow: hidden !important; 
        height: 100vh !important; height: 100dvh !important;
        background-color: #050507 !important; /* فرض اللون الأسود العميق جداً */
    }

    /* =========================================================================
       2. الشاشة السينمائية المعالجة (تُدار بواسطة الجافاسكريبت لمنع التعليق)
       ========================================================================= */
    .cinematic-intro {
        position: fixed; inset: 0; z-index: 1000000;
        background: #050507; 
        display: none; /* مخفية افتراضياً لمنع التعليق */
        justify-content: center; align-items: center;
        opacity: 0;
        /* استخدام will-change لتسريع كرت الشاشة */
        will-change: opacity, transform; 
        transition: opacity 0.4s ease-out;
    }
    
    .glitch-container { position: relative; width: 160px; height: 160px; display: flex; justify-content: center; align-items: center; }
    .glitch-img {
        position: absolute; width: 100%; height: auto; object-fit: contain;
        opacity: 0; transform: scale(0.95) translateZ(0);
        will-change: transform, opacity, filter;
        transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s;
    }
    
    .cinematic-intro.show-logo .main-img { opacity: 1; transform: scale(1) translateZ(0); }
    .cinematic-intro.start-glitch .main-img { animation: mainGlitchAnim 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite; }
    
    .cinematic-intro.start-glitch .layer-red {
        opacity: 0.8; transform: translateX(-5px) translateZ(0);
        filter: drop-shadow(-2px 0 var(--accent-red)) saturate(1.5);
        animation: glitchSliceTop 0.2s linear infinite;
    }
    
    .cinematic-intro.start-glitch .layer-blue {
        opacity: 0.8; transform: translateX(5px) translateZ(0);
        filter: drop-shadow(2px 0 #00d2ff) saturate(1.5);
        animation: glitchSliceBottom 0.25s linear infinite;
    }

    @keyframes glitchSliceTop { 0% { clip-path: inset(20% 0 60% 0); } 20% { clip-path: inset(50% 0 10% 0); } 40% { clip-path: inset(10% 0 70% 0); } 60% { clip-path: inset(80% 0 5% 0); } 80% { clip-path: inset(30% 0 50% 0); } 100% { clip-path: inset(60% 0 20% 0); } }
    @keyframes glitchSliceBottom { 0% { clip-path: inset(60% 0 10% 0); } 25% { clip-path: inset(15% 0 80% 0); } 50% { clip-path: inset(70% 0 20% 0); } 75% { clip-path: inset(5% 0 50% 0); } 100% { clip-path: inset(40% 0 30% 0); } }
    @keyframes mainGlitchAnim { 0% { transform: translate(1px, 1px); } 25% { transform: translate(-1px, -1px); } 50% { transform: translate(-2px, 1px); } 75% { transform: translate(1px, -1px); } 100% { transform: translate(0px, 0px); } }

    /* =========================================================================
       3. الحاويات وتصميم الأقسام (Cyberpunk / Valorant DNA)
       ========================================================================= */
    .g-master-container { position: relative; width: 100%; height: 100%; background: #050507; color: white; font-family: var(--font-ar); }
    
    /* شبكة وهمية (Scanlines) خفيفة جداً تعطي إحساس الشاشات للعبة كاملة */
    .g-master-container::after {
        content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 9999;
        background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
        opacity: 0.5; mix-blend-mode: overlay;
    }

    .g-section-view { position: absolute; inset: 0; opacity: 0; visibility: hidden; transition: 0.1s; overflow-y: auto; scrollbar-width: none; z-index: 1; padding: 40px; padding-bottom: 80px;}
    .g-section-view::-webkit-scrollbar { display: none; }
    .g-section-view.active { opacity: 1; visibility: visible; z-index: 10; }

    /* أنيميشن دخول متدرج مدعوم بالـ GPU */
    .g-section-view.active .anim-elem { animation: staggerUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px) translateZ(0); will-change: transform, opacity; }
    .g-section-view.active .anim-elem:nth-child(1) { animation-delay: 0.05s; }
    .g-section-view.active .anim-elem:nth-child(2) { animation-delay: 0.1s; }
    .g-section-view.active .anim-elem:nth-child(3) { animation-delay: 0.15s; }
    @keyframes staggerUp { to { opacity: 1; transform: translateY(0) translateZ(0); } }

    /* البطاقات المائلة الاحترافية */
    .sharp-card { 
        background: rgba(15, 15, 20, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.03); padding: 30px; margin-bottom: 20px; position: relative;
        clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
        border-left: 3px solid rgba(255,255,255,0.05); transition: 0.3s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    .sharp-card:hover { border-left-color: var(--accent-red); background: rgba(20, 20, 25, 0.9); }

    .sharp-title { font-family: var(--font-en); font-size: 2.2rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; display: inline-block;}
    .sharp-title i { color: var(--accent-red); margin-right: 10px; filter: drop-shadow(0 0 10px rgba(242, 39, 123, 0.4));}

    .sharp-badge { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); clip-path: polygon(0 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%); padding: 10px 15px; font-size: 0.9rem; font-weight: 800; display: inline-flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.7); }
    .sharp-badge i { color: var(--accent-red); font-size: 1.2rem; }

    /* =========================================================================
       4. منصة الاتهام (Valorant Layout)
       ========================================================================= */
    #tab-game-accuse { padding: 0 !important; background: #050507; }
    
    /* قناع متقدم (Advanced Masking) للخلفية */
    .val-bg-container { position: absolute; inset: 0; background-size: cover; background-position: top center; transition: background-image 0.4s ease-in-out, opacity 0.4s; opacity: 0.7; z-index: 0; filter: grayscale(10%) contrast(1.1); will-change: background-image; }
    .val-bg-overlay { position: absolute; inset: 0; z-index: 1; pointer-events: none; background: linear-gradient(to right, #050507 0%, rgba(5,5,7,0.3) 40%, transparent 100%), linear-gradient(to top, #050507 0%, transparent 40%); }

    .val-layout-wrapper { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 50px; }
    .val-left-menu { display: flex; flex-direction: column; gap: 20px; direction: ltr; }
    .val-logo { width: 130px; height: auto; margin-bottom: 5px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));}
    .val-round-info { color: var(--text-dim); letter-spacing: 4px; font-family: var(--font-en); font-size: 0.8rem; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; text-transform: uppercase; width: max-content; }
    
    .val-menu-items { display: flex; flex-direction: column; gap: 18px; margin-top: 10px; }
    .val-item { color: rgba(255,255,255,0.5); font-size: 1.05rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s; width: max-content; }
    .val-item:hover, .val-item.active { color: white; transform: translateX(5px); }
    .val-item:hover i, .val-item.active i { color: var(--accent-red); }

    .val-roster-container { align-self: center; width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; }
    .val-roster-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; }

    /* تأثيرات البطاقة ثلاثية الأبعاد (3D Hover Effect) */
    .val-char-box {
        background: rgba(15, 15, 18, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.04); border-top: 4px solid rgba(255,255,255,0.1); 
        clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
        padding: 12px; display: flex; align-items: center; gap: 15px;
        cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        direction: ltr; position: relative; will-change: transform;
    }
    .val-char-box:hover { background: rgba(25, 25, 30, 0.9); border-top-color: var(--accent-red); transform: translateY(-5px) scale(1.02); box-shadow: 0 15px 30px rgba(0,0,0,0.6); }
    .val-char-avatar { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; object-position: top center; border: 1px solid rgba(255,255,255,0.05); background: #000; flex-shrink: 0; }
    .val-char-info { display: flex; flex-direction: column; text-align: left; overflow: hidden; }
    .val-char-name { font-size: 1.1rem; font-family: var(--font-en); font-weight: 900; color: white; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: 0 2px 4px rgba(0,0,0,0.8);}
    .val-char-role { font-size: 0.75rem; color: rgba(255,255,255,0.4); font-weight: 700; margin-top: 2px; font-family: var(--font-ar); }

    /* =========================================================================
       5. نافذة الاستهداف (Cyberpunk Dossier)
       ========================================================================= */
    .accuse-modal-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        z-index: 100000; display: flex; justify-content: center; align-items: center;
        opacity: 0; visibility: hidden; transition: 0.3s ease; padding: 20px;
        will-change: opacity;
    }
    .accuse-modal-overlay.show { opacity: 1; visibility: visible; }
    
    .target-panel {
        width: 100%; max-width: 480px; background: transparent;
        transform: scale(0.95) translateY(20px); opacity: 0; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        will-change: transform, opacity;
    }
    .accuse-modal-overlay.show .target-panel { transform: scale(1) translateY(0); opacity: 1; }

    .target-header {
        position: relative; height: 220px; 
        clip-path: polygon(0 0, 100% 0, 100% calc(100% - 30px), calc(100% - 30px) 100%, 0 100%);
        background: #050507; overflow: hidden; border: 2px solid var(--accent-red); border-bottom: none;
    }
    .target-header::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(242, 39, 123, 0.1) 2px, rgba(242, 39, 123, 0.1) 4px); pointer-events: none; }
    .target-img { width: 100%; height: 100%; object-fit: cover; object-position: top center; opacity: 0.7; filter: grayscale(30%) contrast(1.2); }
    .target-name { position: absolute; bottom: 15px; left: 25px; font-size: 2.8rem; font-weight: 900; color: white; font-family: var(--font-en); letter-spacing: 2px; text-transform: uppercase; z-index: 2; text-shadow: 3px 3px 0px var(--accent-red); direction: ltr;}
    
    .target-body {
        background: rgba(10, 10, 12, 0.95); padding: 35px 30px;
        clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
        border: 2px solid var(--accent-red); border-top: none; backdrop-filter: blur(10px);
    }
    
    .sharp-btn {
        width: 100%; background: rgba(242, 39, 123, 0.05); border: 1px solid var(--accent-red);
        color: var(--accent-red); font-size: 1.1rem; font-weight: 900; padding: 18px; cursor: pointer;
        clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
        transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; font-family: var(--font-ar);
    }
    .sharp-btn:hover { background: var(--accent-red); color: white; transform: scale(1.02); box-shadow: 0 10px 20px rgba(242, 39, 123, 0.3); }

    /* =========================================================================
       6. استجابة الجوال (Mobile Tweaks)
       ========================================================================= */
    .game-mobile-bar { display: none !important; }

    @media (max-width: 900px) {
        .g-section-view { padding: 20px 15px 120px 15px; }
        .sharp-title { font-size: 1.6rem; }
        .game-mobile-bar { display: flex !important; z-index: 99999; }
        
        .val-layout-wrapper { padding: 30px 20px 100px 20px; }
        .val-left-menu { top: 20px; left: 20px; gap: 10px; }
        .val-logo { width: 100px; }
        .val-round-info { font-size: 0.65rem; padding-bottom: 10px; }
        .val-item { font-size: 0.85rem; gap: 8px; }
        
        .val-roster-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .val-char-box { padding: 8px; gap: 10px; }
        .val-char-avatar { width: 40px; height: 40px; }
        .val-char-name { font-size: 0.9rem; }
        .val-char-role { font-size: 0.6rem; }
        
        .target-name { font-size: 2rem; }
    }
</style>

<div class="g-master-container" id="game-master-root">
    
    <div class="cinematic-intro" id="cinematic-overlay">
        <div class="glitch-container">
            <img src="assets/images/logo.png" class="glitch-img main-img" alt="Deception">
            <img src="assets/images/logo.png" class="glitch-img layer-red" alt="Glitch R">

    <div class="accuse-modal-overlay" id="accuse-action-modal" onclick="if(event.target === this) closeAccuseModal()">

                    <div style="display:flex; flex-wrap:wrap; gap:8px;" id="a-modal-weapons"></div>
                </div>
                <div style="margin-bottom: 30px;">
                    <div style="font-size:0.8rem; color:var(--text-dim); margin-bottom:12px; font-weight:800; letter-spacing:1px; font-family:var(--font-en);">[ CLASSIFIED EVIDENCE ]</div>
                    <div style="display:flex; flex-wrap:wrap; gap:8px;" id="a-modal-evidence"></div>

    <div id="tab-game-settings" class="g-section-view">
        <div style="max-width: 600px; margin: 0 auto;">
            <div class="sharp-title anim-elem"><i class="ph-fill ph-gear"></i> SETTINGS</div>
            <div class="sharp-card anim-elem">
                <button class="sharp-btn" style="border-color: rgba(255,255,255,0.1); color: var(--text-main); background: rgba(255,255,255,0.02);" onclick="window.gameEngine.requestLeaveGame()">
                    ABORT MISSION (LEAVE ROOM)
                </button>
            </div>
        </div>
    </div>

    <div id="tab-game-info" class="g-section-view">
        <div style="max-width: 800px; margin: 0 auto;">
            <div class="sharp-title anim-elem"><i class="ph-fill ph-identification-card"></i> IDENTITY</div>
            <div id="render-game-role" class="sharp-card anim-elem" style="text-align: center; padding: 60px 20px;">
                <i class="ph-duotone ph-spinner ph-spin" style="font-size:3rem; color:var(--text-dim);"></i>
            </div>
        </div>
    </div>

    <div id="tab-game-accuse" class="g-section-view active">
        <div class="val-bg-container" id="val-dynamic-bg" style="background-image: url('assets/images/accuse-bg.jpg');"></div>
        <div class="val-bg-overlay"></div>
        
        <div class="val-layout-wrapper">
            <div class="val-left-menu anim-elem">
                <img src="assets/images/logo.png" class="val-logo" alt="Logo">
                <div class="val-round-info">ROUND 01 // DECEPTION</div>
                <div class="val-menu-items">
                    <div class="val-item active"><i class="ph-fill ph-gavel"></i> حق الاتهام المتبقي: 1</div>
                    <div class="val-item"><i class="ph-fill ph-clock-counter-clockwise"></i> السجل</div>
                    <div class="val-item"><i class="ph-fill ph-broadcast"></i> آخر التحديثات</div>
                </div>

            <div class="val-roster-container anim-elem">
                <div class="val-roster-grid" id="render-game-accuse">

    <div id="tab-game-evidence" class="g-section-view">

            <div class="sharp-card anim-elem" style="text-align:center; padding: 80px 20px; border-left-color: #00d2ff;">
                <div style="position: relative; width: 100px; height: 100px; margin: 0 auto 20px auto; border-radius: 50%; border: 2px solid rgba(0, 210, 255, 0.2);">
                    <div style="position: absolute; inset: 0; border-radius: 50%; border: 2px solid #00d2ff; border-top-color: transparent; animation: spinFast 1.5s linear infinite;"></div>
                    <i class="ph-fill ph-radar" style="font-size:3rem; color:#00d2ff; line-height: 100px;"></i>

        <button class="bottom-tab" onclick="window.switchGameTab('tab-game-items', 4)"><i class="ph ph-briefcase"></i></button>

</div>

<script>
    // ========================================================
    // 1. نظام السينمائية الآمن (محمي من مشكلة التعليق الأسود)
    // ========================================================
    window.playCinematicIntro = function() {
        const overlay = document.getElementById('cinematic-overlay');
        if (!overlay) return;

        const sessionKey = 'deception_intro_played_' + (window.currentRoomId || 'global');

        if (sessionStorage.getItem(sessionKey)) {
            // اللاعب شاهدها مسبقاً، نحذفها فوراً دون تأخير
            overlay.style.display = 'none';
            return;
        }

        // إظهار الشاشة (نستخدم display flex لأنها كانت none لمنع التعليق)
        sessionStorage.setItem(sessionKey, 'true');
        overlay.style.display = 'flex';
        
        // إجبار المتصفح على رسم العنصر قبل تفعيل الأنيميشن (تقنية لتجنب التعليق)
        requestAnimationFrame(() => {
            overlay.style.opacity = '1';
            
            setTimeout(() => { overlay.classList.add('show-logo'); }, 50);
            setTimeout(() => { overlay.classList.add('start-glitch'); }, 1500);
            setTimeout(() => {
                overlay.classList.add('fade-out-complete');
                setTimeout(() => { overlay.style.display = 'none'; overlay.remove(); }, 500);
            }, 2500); 
        });
    };

    // ========================================================
    // 2. نظام التنقل المحكم
    // ========================================================
    window.cleanupGameUI = function() {
        document.body.classList.remove('in-game-mode');
        document.querySelectorAll('.game-injected-btn').forEach(b => b.remove());
    };

    window.initGameUI = function() {
        window.cleanupGameUI();
        document.body.classList.add('in-game-mode');

        const desktopMenu = document.querySelector('.sidebar .nav-menu');
        if(desktopMenu) {
            desktopMenu.insertAdjacentHTML('beforeend', `
                <button class="nav-btn game-injected-btn" onclick="window.switchGameTab('tab-game-settings', 0)"><i class="ph ph-gear"></i></button>
                <button class="nav-btn game-injected-btn" onclick="window.switchGameTab('tab-game-info', 1)"><i class="ph ph-identification-card"></i></button>
                <button class="nav-btn game-injected-btn active" onclick="window.switchGameTab('tab-game-accuse', 2)"><i class="ph-fill ph-gavel"></i></button>
                <button class="nav-btn game-injected-btn" onclick="window.switchGameTab('tab-game-evidence', 3)"><i class="ph ph-microscope"></i></button>
                <button class="nav-btn game-injected-btn" onclick="window.switchGameTab('tab-game-items', 4)"><i class="ph ph-briefcase"></i></button>
            `);
        }
        // تشغيل الأنيميشن بأمان بعد رسم الواجهة
        window.playCinematicIntro();
    };

    window.switchGameTab = function(tabId, index) {
        document.querySelectorAll('.g-section-view').forEach(s => s.classList.remove('active'));
        const targetSec = document.getElementById(tabId);
        if(targetSec) {
            targetSec.classList.add('active');
            // إعادة تشغيل الأنيميشن المتدرج للفخامة
            const animElems = targetSec.querySelectorAll('.anim-elem');
            animElems.forEach(el => {
                el.style.animation = 'none';
                el.offsetHeight; 
                el.style.animation = null;
            });
        }

        const icons = ['ph-gear', 'ph-identification-card', 'ph-gavel', 'ph-microscope', 'ph-briefcase'];

        document.querySelectorAll('.sidebar .game-injected-btn').forEach((b, i) => {
            b.classList.toggle('active', i === index);
            const icon = b.querySelector('i');
            if(icon) icon.className = (i === index) ? `ph-fill ${icons[i]}` : `ph ${icons[i]}`;
        });

        document.querySelectorAll('.game-mobile-bar .bottom-tab').forEach((b, i) => {
            b.classList.toggle('active', i === index);
            const icon = b.querySelector('i');
            if(icon) icon.className = (i === index) ? `ph-fill ${icons[i]}` : `ph ${icons[i]}`;
        });
    };

    // ========================================================
    // 3. النافذة المنبثقة للاتهام (Cyberpunk Dossier)
    // ========================================================
    window.gameAccuseDataCache = {}; 

    window.openAccuseModal = function(playerName, imgSrc) {
        const modal = document.getElementById('accuse-action-modal');
        const pItems = window.currentRoomData.items ? window.currentRoomData.items[playerName] : {weapons:[], evidence:[]};
        
        document.getElementById('a-modal-name').innerText = playerName;
        document.getElementById('a-modal-img').src = imgSrc;
        
        const wHtml = pItems.weapons ? pItems.weapons.map(w => `<span class="sharp-badge"><i class="ph-fill ph-crosshair"></i>${w}</span>`).join('') : '';
        const eHtml = pItems.evidence ? pItems.evidence.map(e => `<span class="sharp-badge"><i class="ph-fill ph-fingerprint" style="color:#3498db;"></i>${e}</span>`).join('') : '';
        
        document.getElementById('a-modal-weapons').innerHTML = wHtml || '<span style="color:var(--text-dim);">NO DATA</span>';
        document.getElementById('a-modal-evidence').innerHTML = eHtml || '<span style="color:var(--text-dim);">NO DATA</span>';
        
        window.gameAccuseDataCache.currentTarget = playerName;
        modal.classList.add('show');
    };

    window.closeAccuseModal = function() { document.getElementById('accuse-action-modal').classList.remove('show'); };
    window.submitAccusation = function() { alert("TARGET LOCKED: " + window.gameAccuseDataCache.currentTarget); window.closeAccuseModal(); };

    // ========================================================
    // 4. محرك الداتا ورسم المنصة الذكية
    // ========================================================
    window.renderGameData = function() {
        try {
            if(!window.currentRoomData || !window.currentRoomData.roles) return;
            
            const myName = window.currentUserData ? window.currentUserData.username_lower : 'unknown';
            const allPlayers = window.currentRoomData.players || [];
            
            const accuseGrid = document.getElementById('render-game-accuse');
            let accuseHtml = '';
            
            let allGameChars = (window.GAME_ASSETS && window.GAME_ASSETS.characters) ? [...window.GAME_ASSETS.characters] : [];
            let dbSelections = window.currentRoomData.characterSelections || {};
            let usedIds = Object.values(dbSelections);
            let availableChars = allGameChars.filter(c => !usedIds.includes(c.id));

            allPlayers.forEach(p => {
                let charImgSrc = 'assets/images/default-avatar.png'; 
                if(dbSelections[p]) {
                    let foundChar = allGameChars.find(c => c.id === dbSelections[p]);
                    if(foundChar) charImgSrc = foundChar.src;
                } else {
                    if(availableChars.length > 0) { charImgSrc = availableChars.shift().src; } 
                    else if (p.startsWith('Bot_')) { charImgSrc = `https://api.dicebear.com/9.x/bottts/svg?seed=${p}&backgroundColor=transparent`; }
                }

                let isMe = (p.toLowerCase() === myName);
                let roleText = isMe ? 'YOU / INVESTIGATOR' : 'SUSPECT';
                
                accuseHtml += `
                    <div class="val-char-box" 
                         onmouseenter="document.getElementById('val-dynamic-bg').style.backgroundImage = 'url(${charImgSrc})'; document.getElementById('val-dynamic-bg').style.opacity = '0.5';"
                         onmouseleave="document.getElementById('val-dynamic-bg').style.backgroundImage = 'url(assets/images/accuse-bg.jpg)'; document.getElementById('val-dynamic-bg').style.opacity = '0.7';"
                         onclick="window.openAccuseModal('${p}', '${charImgSrc}')">
                        <img src="${charImgSrc}" class="val-char-avatar" onerror="this.src='assets/images/default-avatar.png';">
                        <div class="val-char-info">
                            <div class="val-char-name">${p}</div>
                            <div class="val-char-role">${roleText}</div>
                        </div>
                    </div>
                `;
            });
            accuseGrid.innerHTML = accuseHtml;

            let myRole = 'investigator';
            for (const [k, v] of Object.entries(window.currentRoomData.roles)) { if (k.toLowerCase() === myName) { myRole = v; break; } }
            
            const roleDiv = document.getElementById('render-game-role');
            if(myRole === 'murderer') {
                roleDiv.innerHTML = `<i class="ph-duotone ph-knife" style="font-size:6rem; color:var(--accent-red); margin-bottom:15px; filter: drop-shadow(0 0 20px rgba(242, 39, 123, 0.5));"></i><h2 style="font-family:var(--font-en); font-size:3.5rem; font-weight:900; color:white; text-transform:uppercase; letter-spacing:4px; margin-bottom:10px;">MURDERER</h2><p style="color:var(--text-dim); font-size:1.1rem;">أنت القاتل. استخدم أدواتك بذكاء لتضليل البقية.</p>`;
                roleDiv.style.borderLeftColor = 'var(--accent-red)';
            } else if(myRole === 'forensic') {
                roleDiv.innerHTML = `<i class="ph-duotone ph-microscope" style="font-size:6rem; color:#00d2ff; margin-bottom:15px; filter: drop-shadow(0 0 20px rgba(0, 210, 255, 0.5));"></i><h2 style="font-family:var(--font-en); font-size:3.5rem; font-weight:900; color:white; text-transform:uppercase; letter-spacing:4px; margin-bottom:10px;">FORENSIC</h2><p style="color:var(--text-dim); font-size:1.1rem;">الطبيب الشرعي. ساعد المحققين بالتلميحات الصامتة.</p>`;
                roleDiv.style.borderLeftColor = '#00d2ff';
            } else {
                roleDiv.innerHTML = `<i class="ph-duotone ph-magnifying-glass" style="font-size:6rem; color:var(--accent-green); margin-bottom:15px; filter: drop-shadow(0 0 20px rgba(46, 204, 113, 0.5));"></i><h2 style="font-family:var(--font-en); font-size:3.5rem; font-weight:900; color:white; text-transform:uppercase; letter-spacing:4px; margin-bottom:10px;">INVESTIGATOR</h2><p style="color:var(--text-dim); font-size:1.1rem;">أنت المحقق. اكتشف القاتل قبل فوات الأوان.</p>`;
                roleDiv.style.borderLeftColor = 'var(--accent-green)';
            }

            let myItems = null;
            if(window.currentRoomData.items) {
                for (const [k, v] of Object.entries(window.currentRoomData.items)) { if (k.toLowerCase() === myName) { myItems = v; break; } }
            }
            const itemsDiv = document.getElementById('render-game-items');
            if(myItems && myItems.weapons) {
                let wHtml = myItems.weapons.map(w => `<span class="sharp-badge"><i class="ph-fill ph-crosshair"></i>${w}</span>`).join('');
                let eHtml = myItems.evidence.map(e => `<span class="sharp-badge"><i class="ph-fill ph-fingerprint" style="color:#00d2ff;"></i>${e}</span>`).join('');
                itemsDiv.innerHTML = `
                    <div style="text-align:left; direction: ltr;">
                        <h3 style="color:rgba(255,255,255,0.4); font-family:var(--font-en); letter-spacing:2px; margin-bottom:15px; font-size:0.8rem;">[ ASSIGNED WEAPONS ]</h3>
                        <div style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:35px;">${wHtml}</div>
                        <h3 style="color:rgba(255,255,255,0.4); font-family:var(--font-en); letter-spacing:2px; margin-bottom:15px; font-size:0.8rem;">[ COLLECTED EVIDENCE ]</h3>
                        <div style="display:flex; flex-wrap:wrap; gap:12px;">${eHtml}</div>
                    </div>
                `;
            }
        } catch(e) { console.error("Error drawing UI", e); }
    };

    window.initGameUI();
    let retries = 0;
    function safeRender() {
        if(window.currentRoomData && window.currentRoomData.roles) window.renderGameData();
        else if(retries < 15) { retries++; setTimeout(safeRender, 500); }
    }
    safeRender();

    window.addEventListener('popstate', function cleanUp() {
        if(window.cleanupGameUI) window.cleanupGameUI();
        window.removeEventListener('popstate', cleanUp);
    });
</script>
