<div class="game-layout-container">

    <div id="game-panel-settings" class="game-tab-panel">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; direction: rtl;">
            <div class="game-premium-card" style="display: flex; flex-direction: column; gap: 18px;">
                <div style="font-weight: 800; font-size: 1.1rem; color: white; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px;"><i class="ph-bold ph-sliders" style="color: var(--accent-red); margin-left: 8px;"></i> خيارات المظهر</div>
                <div class="settings-group" style="display: flex; flex-direction: column; gap: 8px;"><label style="font-size: 0.8rem; color: var(--text-dim); font-weight: 600;">حجم الخط</label><div class="segmented-control"><button class="segment-btn" onclick="window.setFontSize('small')">صغير</button><button class="segment-btn active" onclick="window.setFontSize('default')">افتراضي</button><button class="segment-btn" onclick="window.setFontSize('large')">كبير</button></div></div>
                <div class="settings-group mobile-only-theme" style="display: flex; flex-direction: column; gap: 8px;"><label style="font-size: 0.8rem; color: var(--text-dim); font-weight: 600;">المظهر</label><div class="segmented-control"><button class="segment-btn" onclick="window.toggleTheme('light')">فاتح</button><button class="segment-btn active" onclick="window.toggleTheme('dark')">داكن</button></div></div>
            </div>
            <div class="game-premium-card" style="display: flex; flex-direction: column; gap: 15px;">
                <div style="font-weight: 800; font-size: 1.1rem; color: white; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px;"><i class="ph-bold ph-users-three" style="color: var(--accent-red); margin-left: 8px;"></i> قائمة المتواجدين</div>
                <div id="game-in-my-personal-emblem" style="width: 100%;"></div>
                <div id="game-in-others-emblems-list" style="display: flex; flex-direction: column; gap: 12px; flex-grow: 1; overflow-y: auto; max-height: 300px; padding-left: 5px;"></div>
                <button class="modern-danger-btn" style="width: 100%; padding: 16px; border-radius: 100px; margin-top: auto;" onclick="window.GameEngine.leaveAndCollapseActiveGame()"><i class="ph-bold ph-door-open" style="font-size: 1.2rem;"></i> مغادرة المباراة فوراً</button>
            </div>
        </div>
    </div>

    <div id="game-panel-info" class="game-tab-panel active">
        <div style="max-width: 650px; margin: 0 auto; direction: rtl; text-align: center; display: flex; flex-direction: column; gap: 25px;">
            <div class="game-premium-card" style="padding: 40px 20px; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center;">
                <div style="position: absolute; top: 0; left: 0; right: 0; height: 6px; background: var(--cyber-gradient);"></div>
                <div id="game-role-identity-badge" style="padding: 12px 35px; border-radius: 100px; font-weight: 900; font-size: 1.5rem; color: #ffffff; margin-bottom: 20px; box-shadow: var(--shadow-glow);">جاري الفحص...</div>
                <div style="width: 140px; height: 185px; border-radius: 24px; overflow: hidden; border: 2px solid rgba(255,255,255,0.08); margin-bottom: 20px; background-color: #0c0c10; box-shadow: var(--shadow-soft);"><img id="game-role-avatar-picture" src="" style="width: 100%; height: 100%; object-fit: cover; object-position: top center;"></div>
                <p id="game-role-strategy-description" style="color: var(--text-dim); line-height: 1.8; font-size: 0.98rem; max-width: 500px; margin: 0 auto; text-align: center;"></p>
            </div>
            <div class="game-premium-card" style="text-align: right;">
                <div style="font-weight: 800; font-size: 1.1rem; color: white; margin-bottom: 15px;"><i class="ph-bold ph-clock-counter-clockwise" style="color: var(--accent-red); margin-left: 8px;"></i> السجل اللحظي للمباراة</div>
                <div id="game-rounds-live-events-log" class="live-rounds-log-container"></div>
            </div>
        </div>
    </div>

    <div id="game-panel-court" class="game-tab-panel">
        <div style="text-align: center; margin-bottom: 25px; direction: rtl;">
            <div style="font-size: 1.8rem; font-weight: 900; background: var(--cyber-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;" id="game-court-current-round-title">الجولة الأولى</div>
            <div style="font-size: 0.9rem; color: var(--text-dim); margin-top: 5px; font-weight: 500;">اضغط على كارت المشتبه به لتوجيه اتهام رسمي</div>
        </div>
        <div class="game-players-court-grid" id="game-court-players-injection-grid"></div>
    </div>

    <div id="game-panel-clues" class="game-tab-panel">
        <div style="max-width: 850px; margin: 0 auto; direction: rtl;">
            <div style="font-size: 1.4rem; font-weight: 900; margin-bottom: 20px; text-align: right; color: var(--text-main); display: flex; align-items: center; gap: 10px;"><i class="ph-bold ph-cards" style="color: var(--accent-red); font-size: 1.6rem;"></i> لوحة قرائن الطبيب الشرعي</div>
            <div class="game-players-court-grid" id="game-forensic-clues-tiles-board"></div>
        </div>
    </div>

    <div id="game-panel-tools" class="game-tab-panel">
        <div class="game-players-court-grid" id="game-scene-investigation-tools-grid"></div>
    </div>

</div>
