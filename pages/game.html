<style>
    /* =========================================================================
       1. الإخفاء الذكي والتمديد (بدون تدمير هيكلة الموقع)
       ========================================================================= */
    body.in-game-mode .right-sidebar, 
    body.in-game-mode .top-header { display: none !important; }
    
    @media (min-width: 901px) {
        body.in-game-mode .sidebar .nav-menu > button:not(.game-injected-btn) { display: none !important; }
    }
    
    body.in-game-mode .app-shell > .bottom-bar { display: none !important; }
    
    body.in-game-mode .dynamic-content { 
        padding: 0 !important; overflow: hidden !important; 
        height: 100vh !important; height: 100dvh !important;
    }

    /* =========================================================================
       2. الشاشة السينمائية الفاخرة (قليتش رقمي داكن بدون وميض)
       ========================================================================= */
    .cinematic-intro {
        position: fixed; inset: 0; z-index: 1000000;
        background: #060608; /* خلفية داكنة ثابتة ومريحة للعين */
        display: flex; justify-content: center; align-items: center;
        opacity: 1; visibility: visible;
        transition: opacity 0.5s ease, visibility 0.5s;
    }
    
    .glitch-container {
        position: relative; width: 150px; height: 150px;
        display: flex; justify-content: center; align-items: center;
    }
    
    .glitch-img {
        position: absolute; width: 100%; height: auto; object-fit: contain;
        opacity: 0; transform: scale(0.95);
        transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s;
    }
    
    .cinematic-intro.show-logo .main-img { opacity: 1; transform: scale(1); }

    /* تأثير القليتش (فقط انقسام RGB مع اهتزاز خفيف) */
    .start-glitch .main-img { animation: mainGlitchAnim 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite; }
    
    .start-glitch .layer-red {
        opacity: 0.8; transform: translateX(-5px);
        filter: drop-shadow(-2px 0 var(--accent-red)) saturate(1.5);
        animation: glitchSliceTop 0.2s linear infinite;
    }
    
    .start-glitch .layer-blue {
        opacity: 0.8; transform: translateX(5px);
        filter: drop-shadow(2px 0 #00d2ff) saturate(1.5);
        animation: glitchSliceBottom 0.25s linear infinite;
    }

    @keyframes glitchSliceTop {
        0% { clip-path: inset(20% 0 60% 0); }
        20% { clip-path: inset(50% 0 10% 0); }
        40% { clip-path: inset(10% 0 70% 0); }
        60% { clip-path: inset(80% 0 5% 0); }
        80% { clip-path: inset(30% 0 50% 0); }
        100% { clip-path: inset(60% 0 20% 0); }
    }
    
    @keyframes glitchSliceBottom {
        0% { clip-path: inset(60% 0 10% 0); }
        25% { clip-path: inset(15% 0 80% 0); }
        50% { clip-path: inset(70% 0 20% 0); }
        75% { clip-path: inset(5% 0 50% 0); }
        100% { clip-path: inset(40% 0 30% 0); }
    }

    @keyframes mainGlitchAnim {
        0% { transform: translate(1px, 1px); }
        25% { transform: translate(-1px, -1px); }
        50% { transform: translate(-2px, 1px); }
        75% { transform: translate(1px, -1px); }
        100% { transform: translate(0px, 0px); }
    }

    .cinematic-intro.fade-out-complete { opacity: 0; visibility: hidden; pointer-events: none; }

    /* =========================================================================
       3. الحاويات الأساسية للأقسام
       ========================================================================= */
    .g-master-container { position: relative; width: 100%; height: 100%; background: transparent; }

    .g-section-view {
        position: absolute; inset: 0; padding: 40px; padding-bottom: 40px;
        opacity: 0; visibility: hidden; transition: 0.2s ease-in-out;
        overflow-y: auto; scrollbar-width: none; z-index: 1;
    }
    .g-section-view::-webkit-scrollbar { display: none; }
    .g-section-view.active { opacity: 1; visibility: visible; z-index: 10; }

    /* تصميم البطاقات لبقية الأقسام */
    .g-native-card { background: var(--surface-panel); border: 1px solid rgba(255,255,255,0.03); border-radius: 24px; padding: 25px; margin-bottom: 20px; box-shadow: var(--shadow-soft); transition: var(--trans-smooth); }
    .g-page-title { color: var(--text-main); font-size: 1.8rem; margin-bottom: 25px; font-weight: 900; display: flex; align-items: center; gap: 12px; }
    .g-page-title i { color: var(--accent-red); font-size: 2.2rem; }
    .g-badge { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; padding: 10px 14px; font-size: 0.9rem; color: var(--text-main); font-weight: 700; display: inline-flex; align-items: center; gap: 6px; }

    /* =========================================================================
       4. منصة الاتهام (Valorant Style)
       ========================================================================= */
    #tab-game-accuse {
        padding: 0 !important; overflow: hidden; background: #0b0b0e;
    }

    /* الخلفية الديناميكية التي تتغير عند الوقوف على اللاعب */
    .val-bg-container {
        position: absolute; inset: 0; background-size: cover; background-position: top center;
        transition: background-image 0.5s ease-in-out, opacity 0.5s; opacity: 0.3;
        /* تدرج لوني لتظليل أسفل الصورة وجعلها مدمجة مع الواجهة */
        mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%);
        -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 100%);
    }

    /* القائمة الجانبية اليسرى (شعار + أزرار) */
    .val-left-menu {
        position: absolute; top: 50px; left: 50px; z-index: 10;
        display: flex; flex-direction: column; gap: 20px;
        direction: ltr; /* للحفاظ على ترتيب Valorant */
    }
    
    .val-logo { width: 140px; height: auto; object-fit: contain; margin-bottom: 5px; }
    .val-round-info { color: var(--text-dim); letter-spacing: 4px; font-family: var(--font-en); font-size: 0.8rem; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; text-transform: uppercase; }
    
    .val-menu-items { display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }
    .val-item {
        color: rgba(255,255,255,0.5); font-size: 1rem; font-weight: 800; font-family: var(--font-ar);
        cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s;
    }
    .val-item i { font-size: 1.4rem; transition: 0.3s; }
    .val-item:hover, .val-item.active { color: white; transform: translateX(5px); }
    .val-item:hover i, .val-item.active i { color: var(--accent-red); }

    /* المربعات السفلية للاعبين (Roster) */
    .val-bottom-roster {
        position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
        display: flex; justify-content: center; gap: 15px; z-index: 10; width: max-content;
    }

    .val-char-box {
        width: 190px; height: 80px;
        background: rgba(15, 15, 20, 0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.05); border-top: 3px solid transparent;
        position: relative; overflow: hidden; display: flex; align-items: center; padding: 0 15px;
        cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        direction: ltr;
    }
    
    /* خط الديكور الأيسر */
    .val-char-box::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: rgba(255,255,255,0.1); transition: 0.3s; z-index: 3; }
    
    /* تأثير الوقوف (Hover) */
    .val-char-box:hover {
        border-color: rgba(255,255,255,0.3); border-top-color: var(--accent-red);
        background: rgba(25, 25, 30, 0.95); transform: translateY(-8px);
    }
    .val-char-box:hover::before { background: var(--accent-red); }

    /* صورة الشخصية كخلفية للمربع */
    .val-char-box img.bg-img {
        position: absolute; right: -20px; top: -10px; height: 130%; width: auto;
        opacity: 0.3; transition: 0.4s ease; z-index: 1;
        mask-image: linear-gradient(to right, transparent 10%, black 80%);
        -webkit-mask-image: linear-gradient(to right, transparent 10%, black 80%);
    }
    .val-char-box:hover img.bg-img { opacity: 0.8; transform: scale(1.1) translateX(-5px); }

    /* النصوص داخل المربع */
    .val-char-info { position: relative; z-index: 2; display: flex; flex-direction: column; width: 100%; text-align: left; }
    .val-char-name { font-size: 1.1rem; font-weight: 900; color: white; letter-spacing: 1px; font-family: var(--font-en); text-transform: uppercase; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }
    .val-char-role { font-size: 0.75rem; color: rgba(255,255,255,0.6); font-family: var(--font-ar); font-weight: 700; margin-top: 2px; }

    /* =========================================================================
       5. النافذة المنبثقة (Modal) للاتهام
       ========================================================================= */
    .accuse-modal-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        z-index: 100000; display: flex; justify-content: center; align-items: center;
        opacity: 0; visibility: hidden; transition: 0.3s; padding: 20px;
    }
    .accuse-modal-overlay.show { opacity: 1; visibility: visible; }
    
    .accuse-modal-card {
        background: var(--surface-panel); width: 100%; max-width: 480px; border-radius: 28px;
        border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        overflow: hidden; transform: scale(0.9) translateY(20px); transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        display: flex; flex-direction: column;
    }
    .accuse-modal-overlay.show .accuse-modal-card { transform: scale(1) translateY(0); }

    .a-modal-header { height: 200px; position: relative; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 25px; background: #000; }
    .a-modal-header img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; mask-image: linear-gradient(to bottom, black 40%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);}
    .a-modal-header h3 { position: relative; z-index: 2; font-size: 2rem; font-weight: 900; color: white; text-shadow: 0 4px 15px rgba(0,0,0,0.9); font-family: var(--font-en); letter-spacing: 2px; text-transform: uppercase;}
    
    .btn-close-modal { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); color: white; width: 38px; height: 38px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 10; transition: 0.2s;}
    .btn-close-modal:hover { background: var(--accent-red); border-color: var(--accent-red); transform: rotate(90deg); }

    /* =========================================================================
       6. استجابة الجوال (Mobile)
       ========================================================================= */
    .game-mobile-bar { display: none !important; }

    @media (max-width: 900px) {
        .g-section-view { padding: 20px 15px 120px 15px; }
        .g-page-title { font-size: 1.5rem; }
        .game-mobile-bar { display: flex !important; z-index: 99999; }
        
        /* تعديلات Valorant للجوال */
        .val-left-menu { top: 20px; left: 20px; gap: 10px; }
        .val-logo { width: 100px; }
        .val-round-info { font-size: 0.65rem; padding-bottom: 10px; }
        .val-item { font-size: 0.85rem; gap: 8px; }
        .val-bottom-roster { bottom: 90px; width: 100%; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .val-char-box { width: 140px; height: 60px; padding: 0 10px; }
        .val-char-name { font-size: 0.9rem; }
        .val-char-role { font-size: 0.6rem; }
    }
</style>

<div class="g-master-container" id="game-master-root">
    
    <div class="cinematic-intro" id="cinematic-overlay">
        <div class="glitch-container">
            <img src="assets/images/logo2.png" class="glitch-img main-img" alt="Deception">
            <img src="assets/images/logo2.png" class="glitch-img layer-red" alt="Deception Glitch R">
            <img src="assets/images/logo2.png" class="glitch-img layer-blue" alt="Deception Glitch B">
        </div>
    </div>

    <div class="accuse-modal-overlay" id="accuse-action-modal" onclick="if(event.target === this) closeAccuseModal()">
        <div class="accuse-modal-card">
            <button class="btn-close-modal" onclick="closeAccuseModal()"><i class="ph-bold ph-x"></i></button>
            <div class="a-modal-header">
                <img src="" id="a-modal-img" alt="Player">
                <h3 id="a-modal-name">PLAYER</h3>
            </div>
            <div style="padding: 25px; display: flex; flex-direction: column; gap: 20px; background: var(--bg-base);">
                <div>
                    <div style="font-size:0.95rem; color:var(--text-dim); margin-bottom:12px; font-weight:800;"><i class="ph-fill ph-crosshair" style="color:var(--accent-red); margin-left:5px;"></i> الأسلحة المتوفرة:</div>
                    <div style="display:flex; flex-wrap:wrap; gap:8px;" id="a-modal-weapons"></div>
                </div>
                <div>
                    <div style="font-size:0.95rem; color:var(--text-dim); margin-bottom:12px; font-weight:800;"><i class="ph-fill ph-fingerprint" style="color:#3498db; margin-left:5px;"></i> الآثار والأدلة:</div>
                    <div style="display:flex; flex-wrap:wrap; gap:8px;" id="a-modal-evidence"></div>
                </div>
                <button class="modern-danger-btn" style="width: 100%; padding: 18px; font-size: 1.1rem; margin-top: 15px;" onclick="submitAccusation()">
                    <i class="ph-bold ph-gavel"></i> تصويت للاتهام
                </button>
            </div>
        </div>

    <div id="tab-game-settings" class="g-section-view">
        <div style="max-width: 600px; margin: 0 auto;">
            <h2 class="g-page-title"><i class="ph-fill ph-gear"></i> الإعدادات</h2>
            <div class="g-native-card">
                <button class="modern-danger-btn" style="width: 100%; padding: 18px; font-size: 1.1rem;" onclick="window.gameEngine.requestLeaveGame()">
                    <i class="ph-bold ph-sign-out"></i> الخروج من اللعبة الحالية
                </button>
            </div>
        </div>
    </div>

    <div id="tab-game-info" class="g-section-view">
        <div style="max-width: 800px; margin: 0 auto;">
            <h2 class="g-page-title"><i class="ph-fill ph-identification-card"></i> هويتي السرية</h2>
            <div id="render-game-role" class="g-native-card" style="text-align: center; padding: 60px 20px;">
                <i class="ph-duotone ph-spinner ph-spin" style="font-size:3rem; color:var(--text-dim);"></i>
            </div>
        </div>
    </div>

    <div id="tab-game-accuse" class="g-section-view active">
        <div class="val-bg-container" id="val-dynamic-bg" style="background-image: url('assets/images/accuse-bg.jpg');"></div>
        
        <div class="val-left-menu">
            <img src="assets/images/logo2.png" class="val-logo" alt="Logo">
            <div class="val-round-info">ROUND 01 // DECEPTION</div>
            <div class="val-menu-items">
                <div class="val-item active"><i class="ph-fill ph-gavel"></i> حق الاتهام المتبقي: 1</div>
                <div class="val-item"><i class="ph-fill ph-clock-counter-clockwise"></i> السجل</div>
                <div class="val-item"><i class="ph-fill ph-broadcast"></i> آخر التحديثات</div>
            </div>
        </div>

        <div class="val-bottom-roster" id="render-game-accuse">
            <div style="color:var(--text-dim); padding: 20px;"><i class="ph-bold ph-spinner ph-spin" style="font-size: 2rem;"></i></div>
        </div>
    </div>

    <div id="tab-game-evidence" class="g-section-view">
        <div style="max-width: 800px; margin: 0 auto;">
            <h2 class="g-page-title"><i class="ph-fill ph-microscope"></i> مسرح الجريمة</h2>
            <div class="g-native-card" style="text-align:center; padding: 80px 20px;">
                <i class="ph-duotone ph-file-magnifying-glass" style="font-size:4rem; color:var(--text-dim); margin-bottom:15px; opacity:0.5;"></i>
                <h3 style="color:var(--text-main); margin-bottom:10px;">لا توجد أدلة بعد</h3>
                <p style="color:var(--text-dim);">تلميحات الطبيب الشرعي ستظهر هنا.</p>
            </div>
        </div>
    </div>

    <div id="tab-game-items" class="g-section-view">
        <div style="max-width: 800px; margin: 0 auto;">
            <h2 class="g-page-title"><i class="ph-fill ph-briefcase"></i> أسلحتي وآثاري</h2>
            <div id="render-game-items" class="g-native-card" style="text-align: center; padding: 60px 20px;">
                <i class="ph-duotone ph-spinner ph-spin" style="font-size:3rem; color:var(--text-dim);"></i>
            </div>
        </div>
    </div>

    <nav class="bottom-bar game-mobile-bar">
        <button class="bottom-tab" onclick="window.switchGameTab('tab-game-settings', 0)"><i class="ph ph-gear"></i></button>
        <button class="bottom-tab" onclick="window.switchGameTab('tab-game-info', 1)"><i class="ph ph-identification-card"></i></button>
        <button class="bottom-tab active" onclick="window.switchGameTab('tab-game-accuse', 2)"><i class="ph-fill ph-gavel"></i></button>
        <button class="bottom-tab" onclick="window.switchGameTab('tab-game-evidence', 3)"><i class="ph ph-microscope"></i></button>
        <button class="bottom-tab" onclick="window.switchGameTab('tab-game-items', 4)"><i class="ph ph-briefcase"></i></button>
    </nav>

</div>

<script>
    // ========================================================
    // 1. الأنيميشن السينمائي المعالج (يظهر مرة واحدة بدون وميض)
    // ========================================================
    (function handleCinematicTimeline() {
        const introOverlay = document.getElementById('cinematic-overlay');
        if (!introOverlay) return;

        const sessionKey = 'deception_intro_played_' + (window.currentRoomId || 'global');

        if (sessionStorage.getItem(sessionKey)) {
            introOverlay.remove();
        } else {
            sessionStorage.setItem(sessionKey, 'true');

            setTimeout(() => { introOverlay.classList.add('show-logo'); }, 100);
            setTimeout(() => { introOverlay.classList.add('start-glitch'); }, 1500);
            
            setTimeout(() => {
                introOverlay.classList.add('fade-out-complete');
                setTimeout(() => introOverlay.remove(), 500);
            }, 2500); // سريع وحماسي
        }
    })();

    // ========================================================
    // 2. نظام التحكم بالأشرطة والتنقل
    // ========================================================
    window.cleanupGameUI = function() {
        document.body.classList.remove('in-game-mode');
        document.querySelectorAll('.game-injected-btn').forEach(b => b.remove());
    };

    window.initGameUI = function() {
        window.cleanupGameUI();
        document.body.classList.add('in-game-mode');

        const desktopMenu = document.querySelector('.sidebar .nav-menu');
        if(desktopMenu) {
            desktopMenu.insertAdjacentHTML('beforeend', `
                <button class="nav-btn game-injected-btn" onclick="window.switchGameTab('tab-game-settings', 0)"><i class="ph ph-gear"></i></button>
                <button class="nav-btn game-injected-btn" onclick="window.switchGameTab('tab-game-info', 1)"><i class="ph ph-identification-card"></i></button>
                <button class="nav-btn game-injected-btn active" onclick="window.switchGameTab('tab-game-accuse', 2)"><i class="ph-fill ph-gavel"></i></button>
                <button class="nav-btn game-injected-btn" onclick="window.switchGameTab('tab-game-evidence', 3)"><i class="ph ph-microscope"></i></button>
                <button class="nav-btn game-injected-btn" onclick="window.switchGameTab('tab-game-items', 4)"><i class="ph ph-briefcase"></i></button>
            `);
        }
    };

    window.switchGameTab = function(tabId, index) {
        document.querySelectorAll('.g-section-view').forEach(s => s.classList.remove('active'));
        const targetSec = document.getElementById(tabId);
        if(targetSec) targetSec.classList.add('active');

        const icons = ['ph-gear', 'ph-identification-card', 'ph-gavel', 'ph-microscope', 'ph-briefcase'];

        document.querySelectorAll('.sidebar .game-injected-btn').forEach((b, i) => {
            b.classList.toggle('active', i === index);
            const icon = b.querySelector('i');
            if(icon) icon.className = (i === index) ? `ph-fill ${icons[i]}` : `ph ${icons[i]}`;
        });

        document.querySelectorAll('.game-mobile-bar .bottom-tab').forEach((b, i) => {
            b.classList.toggle('active', i === index);
            const icon = b.querySelector('i');
            if(icon) icon.className = (i === index) ? `ph-fill ${icons[i]}` : `ph ${icons[i]}`;
        });
    };

    // ========================================================
    // 3. النافذة المنبثقة للاتهام
    // ========================================================
    window.gameAccuseDataCache = {}; 

    window.openAccuseModal = function(playerName, imgSrc) {
        const modal = document.getElementById('accuse-action-modal');
        const pItems = window.currentRoomData.items ? window.currentRoomData.items[playerName] : {weapons:[], evidence:[]};
        
        document.getElementById('a-modal-name').innerText = playerName;
        document.getElementById('a-modal-img').src = imgSrc;
        
        const wHtml = pItems.weapons ? pItems.weapons.map(w => `<span class="g-badge" style="background:rgba(255,255,255,0.05); border:none;"><i class="ph-fill ph-crosshair" style="color:var(--accent-red);"></i>${w}</span>`).join('') : '';
        const eHtml = pItems.evidence ? pItems.evidence.map(e => `<span class="g-badge" style="background:rgba(255,255,255,0.05); border:none;"><i class="ph-fill ph-fingerprint" style="color:#3498db;"></i>${e}</span>`).join('') : '';
        
        document.getElementById('a-modal-weapons').innerHTML = wHtml || '<span style="color:var(--text-dim); font-size:0.85rem;">لا يوجد</span>';
        document.getElementById('a-modal-evidence').innerHTML = eHtml || '<span style="color:var(--text-dim); font-size:0.85rem;">لا يوجد</span>';
        
        window.gameAccuseDataCache.currentTarget = playerName;
        modal.classList.add('show');
    };

    window.closeAccuseModal = function() {
        document.getElementById('accuse-action-modal').classList.remove('show');
    };

    window.submitAccusation = function() {
        alert("تم تسجيل تصويتك ضد: " + window.gameAccuseDataCache.currentTarget);
        window.closeAccuseModal();
    };

    // ========================================================
    // 4. محرك الداتا ورسم منصة الاتهام الفاخرة (بدون تكرار صور)
    // ========================================================
    window.renderGameData = function() {
        try {
            if(!window.currentRoomData || !window.currentRoomData.roles) return;
            
            const myName = window.currentUserData ? window.currentUserData.username_lower : 'unknown';
            const allPlayers = window.currentRoomData.players || [];
            
            // رسم منصة الاتهام (Valorant Style)
            const accuseGrid = document.getElementById('render-game-accuse');
            let accuseHtml = '';
            
            // خوارزمية جلب الشخصيات ومنع التكرار
            let allGameChars = (window.GAME_ASSETS && window.GAME_ASSETS.characters) ? [...window.GAME_ASSETS.characters] : [];
            let dbSelections = window.currentRoomData.characterSelections || {};
            let usedIds = Object.values(dbSelections);
            let availableChars = allGameChars.filter(c => !usedIds.includes(c.id));

            allPlayers.forEach(p => {
                let charImgSrc = 'assets/images/default-avatar.png'; 
                
                if(dbSelections[p]) {
                    let foundChar = allGameChars.find(c => c.id === dbSelections[p]);
                    if(foundChar) charImgSrc = foundChar.src;
                } else {
                    if(availableChars.length > 0) {
                        let pickedChar = availableChars.shift(); 
                        charImgSrc = pickedChar.src;
                    } else if (p.startsWith('Bot_')) {
                        charImgSrc = `https://api.dicebear.com/9.x/bottts/svg?seed=${p}&backgroundColor=transparent`;
                    }
                }

                let isMe = (p.toLowerCase() === myName);
                let roleText = isMe ? 'أنت (محقق)' : 'مشتبه به';
                
                accuseHtml += `
                    <div class="val-char-box" 
                         onmouseenter="document.getElementById('val-dynamic-bg').style.backgroundImage = 'url(${charImgSrc})'"
                         onclick="window.openAccuseModal('${p}', '${charImgSrc}')">
                        <img src="${charImgSrc}" class="bg-img" onerror="this.src='assets/images/default-avatar.png';">
                        <div class="val-char-info">
                            <div class="val-char-name">${p}</div>
                            <div class="val-char-role">${roleText}</div>
                        </div>
                    </div>
                `;
            });
            accuseGrid.innerHTML = accuseHtml;

            // رسم باقي البيانات (نفس الكود السابق للحفاظ على الاستقرار)
            let myRole = 'investigator';
            for (const [k, v] of Object.entries(window.currentRoomData.roles)) {
                if (k.toLowerCase() === myName) { myRole = v; break; }
            }
            let myItems = null;
            if(window.currentRoomData.items) {
                for (const [k, v] of Object.entries(window.currentRoomData.items)) {
                    if (k.toLowerCase() === myName) { myItems = v; break; }
                }
            }

            const roleDiv = document.getElementById('render-game-role');
            if(myRole === 'murderer') {
                roleDiv.innerHTML = `<i class="ph-duotone ph-knife" style="font-size:6rem; color:var(--accent-red); margin-bottom:15px; filter: drop-shadow(0 0 15px rgba(242, 39, 123, 0.4));"></i><h2 style="color:white; font-size:2.8rem; font-weight:900; margin-bottom:10px;">أنت القاتل</h2><p style="color:var(--text-dim); font-size:1.1rem; max-width:400px; margin: 0 auto;">اختر سلاحك ودليلك وقم بخداعهم.</p>`;
            } else if(myRole === 'forensic') {
                roleDiv.innerHTML = `<i class="ph-duotone ph-microscope" style="font-size:6rem; color:#3498db; margin-bottom:15px; filter: drop-shadow(0 0 15px rgba(52, 152, 219, 0.4));"></i><h2 style="color:white; font-size:2.8rem; font-weight:900; margin-bottom:10px;">الطبيب الشرعي</h2><p style="color:var(--text-dim); font-size:1.1rem; max-width:400px; margin: 0 auto;">أنت تعرف القاتل. وجه المحققين عبر التلميحات.</p>`;
            } else {
                roleDiv.innerHTML = `<i class="ph-duotone ph-magnifying-glass" style="font-size:6rem; color:var(--accent-green); margin-bottom:15px; filter: drop-shadow(0 0 15px rgba(46, 204, 113, 0.4));"></i><h2 style="color:white; font-size:2.8rem; font-weight:900; margin-bottom:10px;">محقق</h2><p style="color:var(--text-dim); font-size:1.1rem; max-width:400px; margin: 0 auto;">اكتشف القاتل من خلال التلميحات والأدوات.</p>`;
            }

            const itemsDiv = document.getElementById('render-game-items');
            if(myItems && myItems.weapons) {
                let wHtml = myItems.weapons.map(w => `<span class="g-badge"><i class="ph-fill ph-crosshair" style="color:var(--accent-red);"></i>${w}</span>`).join('');
                let eHtml = myItems.evidence.map(e => `<span class="g-badge"><i class="ph-fill ph-fingerprint" style="color:#3498db;"></i>${e}</span>`).join('');
                itemsDiv.innerHTML = `
                    <div style="text-align:right;">
                        <h3 style="color:white; margin-bottom:15px; font-size:1.2rem;">الأسلحة المتاحة لك:</h3>
                        <div style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:35px;">${wHtml}</div>
                        <h3 style="color:white; margin-bottom:15px; font-size:1.2rem;">الآثار (الأدلة):</h3>
                        <div style="display:flex; flex-wrap:wrap; gap:12px;">${eHtml}</div>
                    </div>
                `;
            }
        } catch(e) { console.error("Error drawing UI", e); }
    };

    window.initGameUI();
    
    let retries = 0;
    function safeRender() {
        if(window.currentRoomData && window.currentRoomData.roles) window.renderGameData();
        else if(retries < 15) { retries++; setTimeout(safeRender, 500); }
    }
    safeRender();

    window.addEventListener('popstate', function cleanUp() {
        if(window.cleanupGameUI) window.cleanupGameUI();
        window.removeEventListener('popstate', cleanUp);
    });
</script>
