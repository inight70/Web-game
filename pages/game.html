<style>
    /* 1. تنظيف هيكل الموقع الأساسي لدعم اللعبة بملء الشاشة بدون تشوهات */
    body.in-game-mode .app-shell > .sidebar, 
    body.in-game-mode .app-shell > .right-sidebar, 
    body.in-game-mode .app-shell > .main-viewport > .top-header { display: none !important; }
    
    body.in-game-mode .bottom-bar:not(.game-mobile-bar) { display: none !important; }
    
    /* جعل الحاوية ديناميكية وتأخذ أبعاد الشاشة باحترافية */
    body.in-game-mode .app-shell { display: block !important; padding: 0 !important; margin: 0 !important; }
    body.in-game-mode .main-viewport { padding: 0 !important; width: 100vw; height: 100vh; overflow: hidden; max-width: 100%; margin: 0 !important; }
    body.in-game-mode .dynamic-content { padding: 0 !important; height: 100vh; width: 100vw; max-width: 100%; overflow: hidden; display: flex; flex-direction: row; background: var(--bg-base); }

    /* =========================================================================
       2. الشريط الجانبي (نسخة طبق الأصل من هندسة موقعك الأصلية)
       ========================================================================= */
    .game-sidebar-desktop {
        width: 100px; /* نفس عرض الشريط الأساسي في موقعك */
        height: 100vh;
        background: var(--surface-panel);
        border-left: 1px solid rgba(255,255,255,0.05);
        display: flex; flex-direction: column; align-items: center;
        padding-top: 25px; gap: 15px;
        box-shadow: -5px 0 20px rgba(0,0,0,0.3); /* ظل خفيف وأنيق */
        flex-shrink: 0;
        z-index: 100;
    }

    /* معالجة الشعار (دارك ولايت مود) */
    .game-logo-wrapper { margin-bottom: 20px; width: 100%; display: flex; justify-content: center; }
    .game-logo-wrapper img { width: 45px; height: auto; object-fit: contain; }
    .logo-light { display: none; }
    [data-theme="light"] .logo-dark { display: none; }
    [data-theme="light"] .logo-light { display: block; }

    /* الأزرار (مطابقة تماماً لأزرار index.html) */
    .game-nav-btn {
        background: transparent; border: none; color: var(--text-dim);
        width: 55px; height: 55px; border-radius: 16px; font-size: 1.6rem;
        display: flex; justify-content: center; align-items: center; 
        cursor: pointer; transition: var(--trans-smooth);
        -webkit-tap-highlight-color: transparent; position: relative;
    }
    .game-nav-btn:hover { background: var(--surface-hover); color: var(--text-main); }
    .game-nav-btn.active { color: white; background: var(--cyber-gradient); box-shadow: var(--shadow-glow); }

    /* تولتيب (Tooltip) أنيق يشرح وظيفة الزر عند تمرير الماوس */
    .game-nav-btn::after {
        content: attr(data-tip); position: absolute; right: 70px;
        background: var(--surface-panel); color: white; padding: 6px 14px;
        border-radius: 8px; font-size: 0.85rem; font-weight: bold; font-family: var(--font-ar);
        white-space: nowrap; opacity: 0; visibility: hidden; transition: 0.2s;
        border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }
    .game-nav-btn:hover::after { opacity: 1; visibility: visible; }

    /* =========================================================================
       3. منطقة المحتوى والأقسام الداخلية
       ========================================================================= */
    .game-content-wrapper { flex: 1; position: relative; overflow: hidden; background: var(--bg-base); }
    
    .game-view-section {
        position: absolute; inset: 0; padding: 40px; padding-bottom: 120px;
        opacity: 0; visibility: hidden; transition: opacity 0.3s ease;
        overflow-y: auto; scrollbar-width: none;
    }
    .game-view-section::-webkit-scrollbar { display: none; }
    .game-view-section.active { opacity: 1; visibility: visible; z-index: 10; }

    /* =========================================================================
       4. تصميم البطاقات المشترك
       ========================================================================= */
    .g-title { color: var(--text-main); font-size: 1.8rem; margin-bottom: 25px; font-weight: 900; display: flex; align-items: center; gap: 12px; }
    .g-title i { color: var(--accent-red); }
    
    .g-card { 
        background: var(--surface-panel); border: 1px solid rgba(255,255,255,0.03); 
        border-radius: 24px; padding: 25px; margin-bottom: 20px; 
        box-shadow: var(--shadow-soft); transition: var(--trans-smooth); 
    }
    .g-card:hover { border-color: rgba(242, 39, 123, 0.15); box-shadow: var(--shadow-glow); }
    
    .g-tag { 
        background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); 
        border-radius: 12px; padding: 8px 12px; font-size: 0.85rem; 
        color: var(--text-main); font-weight: 700; display: inline-flex; align-items: center; gap: 6px; 
    }

    /* =========================================================================
       5. شريط الجوال المخفي افتراضياً
       ========================================================================= */
    .game-mobile-bar { display: none; }

    @media (max-width: 900px) {
        body.in-game-mode .dynamic-content { flex-direction: column; } /* الترتيب العام للجوال */
        .game-sidebar-desktop { display: none !important; }
        .game-view-section { padding: 20px 15px 120px 15px; }
        .game-mobile-bar { display: flex !important; z-index: 99999; }
    }
</style>

<aside class="game-sidebar-desktop">
    <div class="game-logo-wrapper">
        <img src="assets/images/logo.png" alt="Logo" class="logo-dark">
        <img src="assets/images/logo2.png" alt="Logo" class="logo-light">
    </div>
    
    <button class="game-nav-btn active" data-tip="الإعدادات" onclick="window.switchGameSection('sec-settings', 0)"><i class="ph-fill ph-gear"></i></button>
    <button class="game-nav-btn" data-tip="هويتي السرية" onclick="window.switchGameSection('sec-info', 1)"><i class="ph ph-identification-card"></i></button>
    <button class="game-nav-btn" data-tip="منصة الاتهام" onclick="window.switchGameSection('sec-accuse', 2)"><i class="ph ph-gavel"></i></button>
    <button class="game-nav-btn" data-tip="تلميحات الطبيب" onclick="window.switchGameSection('sec-evidence', 3)"><i class="ph ph-microscope"></i></button>
    <button class="game-nav-btn" data-tip="أدواتي" onclick="window.switchGameSection('sec-items', 4)"><i class="ph ph-briefcase"></i></button>
</aside>

<main class="game-content-wrapper">
    
    <div id="sec-settings" class="game-view-section active">
        <div style="max-width: 600px; margin: 0 auto;">
            <h2 class="g-title"><i class="ph-fill ph-gear"></i> الإعدادات</h2>
            <div class="g-card">
                <button class="modern-danger-btn" style="width: 100%; padding: 18px; font-size: 1.1rem;" onclick="window.gameEngine.requestLeaveGame()">
                    <i class="ph-bold ph-sign-out"></i> الخروج من الغرفة
                </button>
            </div>
        </div>
    </div>

    <div id="sec-info" class="game-view-section">
        <div style="max-width: 800px; margin: 0 auto;">
            <h2 class="g-title"><i class="ph-fill ph-identification-card"></i> هويتي السرية</h2>
            <div id="v-role" class="g-card" style="text-align: center; padding: 80px 20px;">
                <i class="ph-duotone ph-spinner ph-spin" style="font-size:3rem; color:var(--text-dim);"></i>
            </div>
        </div>
    </div>

    <div id="sec-accuse" class="game-view-section">
        <div style="max-width: 1000px; margin: 0 auto;">
            <h2 class="g-title"><i class="ph-fill ph-gavel"></i> منصة الاتهام</h2>
            <div id="v-accuse" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;">
                <div class="g-card" style="text-align:center; grid-column: 1/-1;"><i class="ph-duotone ph-spinner ph-spin" style="font-size:3rem; color:var(--text-dim);"></i></div>
            </div>
        </div>
    </div>

    <div id="sec-evidence" class="game-view-section">
        <div style="max-width: 800px; margin: 0 auto;">
            <h2 class="g-title"><i class="ph-fill ph-microscope"></i> مسرح الجريمة</h2>
            <div class="g-card" style="text-align:center; padding: 80px 20px;">
                <i class="ph-duotone ph-file-magnifying-glass" style="font-size:4rem; color:var(--text-dim); margin-bottom:15px; opacity:0.5;"></i>
                <h3 style="color:var(--text-main); margin-bottom:10px;">لا توجد أدلة بعد</h3>
                <p style="color:var(--text-dim);">في انتظار تلميحات الطبيب الشرعي لهذه الجولة.</p>
            </div>
        </div>
    </div>

    <div id="sec-items" class="game-view-section">
        <div style="max-width: 800px; margin: 0 auto;">
            <h2 class="g-title"><i class="ph-fill ph-briefcase"></i> أسلحتي وآثاري</h2>
            <div id="v-items" class="g-card" style="text-align: center; padding: 60px 20px;">
                <i class="ph-duotone ph-spinner ph-spin" style="font-size:3rem; color:var(--text-dim);"></i>
            </div>
        </div>
    </div>

</main>

<nav class="bottom-bar game-mobile-bar">
    <button class="bottom-tab active" onclick="window.switchGameSection('sec-settings', 0)"><i class="ph-fill ph-gear"></i></button>
    <button class="bottom-tab" onclick="window.switchGameSection('sec-info', 1)"><i class="ph ph-identification-card"></i></button>
    <button class="bottom-tab" onclick="window.switchGameSection('sec-accuse', 2)"><i class="ph ph-gavel"></i></button>
    <button class="bottom-tab" onclick="window.switchGameSection('sec-evidence', 3)"><i class="ph ph-microscope"></i></button>
    <button class="bottom-tab" onclick="window.switchGameSection('sec-items', 4)"><i class="ph ph-briefcase"></i></button>
</nav>

<script>
    // تفعيل وضع اللعب لتطبيق الإخفاء
    document.body.classList.add('in-game-mode');

    // 1. نظام التنقل اللحظي (Zero Latency)
    window.switchGameSection = function(secId, index) {
        // إخفاء وإظهار الأقسام
        document.querySelectorAll('.game-view-section').forEach(s => s.classList.remove('active'));
        document.getElementById(secId).classList.add('active');

        // تحديث أزرار الكمبيوتر
        const desktopBtns = document.querySelectorAll('.game-sidebar-desktop .game-nav-btn');
        desktopBtns.forEach(b => {
            b.classList.remove('active');
            let icon = b.querySelector('i');
            if(icon) { icon.classList.remove('ph-fill'); icon.classList.add('ph'); }
        });
        if(desktopBtns[index]) {
            desktopBtns[index].classList.add('active');
            let icon = desktopBtns[index].querySelector('i');
            if(icon) { icon.classList.remove('ph'); icon.classList.add('ph-fill'); }
        }

        // تحديث أزرار الجوال
        const mobileBtns = document.querySelectorAll('.game-mobile-bar .bottom-tab');
        mobileBtns.forEach(b => {
            b.classList.remove('active');
            let icon = b.querySelector('i');
            if(icon) { icon.classList.remove('ph-fill'); icon.classList.add('ph'); }
        });
        if(mobileBtns[index]) {
            mobileBtns[index].classList.add('active');
            let icon = mobileBtns[index].querySelector('i');
            if(icon) { icon.classList.remove('ph'); icon.classList.add('ph-fill'); }
        }
    };

    // 2. محرك رسم البيانات اللحظي (Hydration)
    window.renderGameData = function() {
        try {
            if(!window.currentRoomData || !window.currentRoomData.roles) return;
            
            const myName = window.currentUserData ? window.currentUserData.username_lower : 'unknown';
            const allPlayers = window.currentRoomData.players || [];
            
            let myRole = 'investigator';
            for (const [k, v] of Object.entries(window.currentRoomData.roles)) {
                if (k.toLowerCase() === myName) { myRole = v; break; }
            }
            
            let myItems = null;
            if(window.currentRoomData.items) {
                for (const [k, v] of Object.entries(window.currentRoomData.items)) {
                    if (k.toLowerCase() === myName) { myItems = v; break; }
                }
            }

            // رسم الهوية
            const roleDiv = document.getElementById('v-role');
            if(myRole === 'murderer') {
                roleDiv.innerHTML = `<i class="ph-duotone ph-knife" style="font-size:6rem; color:var(--accent-red); margin-bottom:20px;"></i><h2 style="color:var(--text-main); font-size:2.8rem; margin-bottom:15px; font-weight:900;">أنت القاتل</h2><p style="color:var(--text-dim); font-size:1.1rem; line-height:1.6;">العب بذكاء، اختر أداة الجريمة، وقم بتضليل المحققين.</p>`;
            } else if(myRole === 'forensic') {
                roleDiv.innerHTML = `<i class="ph-duotone ph-microscope" style="font-size:6rem; color:#3498db; margin-bottom:20px;"></i><h2 style="color:var(--text-main); font-size:2.8rem; margin-bottom:15px; font-weight:900;">الطبيب الشرعي</h2><p style="color:var(--text-dim); font-size:1.1rem; line-height:1.6;">أنت تعلم من هو المجرم. قدم التلميحات للمحققين ليتمكنوا من حله.</p>`;
            } else {
                roleDiv.innerHTML = `<i class="ph-duotone ph-magnifying-glass" style="font-size:6rem; color:var(--accent-green); margin-bottom:20px;"></i><h2 style="color:var(--text-main); font-size:2.8rem; margin-bottom:15px; font-weight:900;">محقق</h2><p style="color:var(--text-dim); font-size:1.1rem; line-height:1.6;">استخدم ذكاءك لربط الأدلة بالتلميحات واكشف القاتل الحقيقي.</p>`;
            }

            // رسم أدواتي
            const itemsDiv = document.getElementById('v-items');
            if(myItems && myItems.weapons) {
                let wHtml = myItems.weapons.map(w => `<span class="g-tag"><i class="ph-fill ph-crosshair" style="color:var(--accent-red);"></i> ${w}</span>`).join('');
                let eHtml = myItems.evidence.map(e => `<span class="g-tag"><i class="ph-fill ph-fingerprint" style="color:#3498db;"></i> ${e}</span>`).join('');
                
                itemsDiv.innerHTML = `
                    <div style="text-align:right;">
                        <h3 style="color:var(--text-main); margin-bottom:15px;">أسلحتي المتاحة:</h3>
                        <div style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:35px;">${wHtml}</div>
                        <h3 style="color:var(--text-main); margin-bottom:15px;">الآثار (الأدلة):</h3>
                        <div style="display:flex; flex-wrap:wrap; gap:12px;">${eHtml}</div>
                    </div>
                `;
            }

            // رسم اللاعبين
            const accuseGrid = document.getElementById('v-accuse');
            let accuseHtml = '';
            allPlayers.forEach(p => {
                let pItems = window.currentRoomData.items ? window.currentRoomData.items[p] : {weapons:[], evidence:[]};
                let wList = pItems.weapons ? pItems.weapons.map(w => `<span class="g-tag" style="font-size:0.75rem; padding:4px 8px;">${w}</span>`).join('') : '';
                let eList = pItems.evidence ? pItems.evidence.map(e => `<span class="g-tag" style="font-size:0.75rem; padding:4px 8px;">${e}</span>`).join('') : '';
                let isMe = (p.toLowerCase() === myName) ? `<span style="color:var(--accent-green); font-size:0.8rem; margin-right:8px;">(أنت)</span>` : '';
                
                accuseHtml += `
                    <div class="g-card" style="margin-bottom:0; cursor:pointer;" onclick="alert('توجيه اتهام لـ: ${p}')">
                        <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px; border-bottom:1px dashed rgba(255,255,255,0.05); padding-bottom:15px;">
                            <div style="width:50px; height:50px; border-radius:50%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-weight:bold; color:var(--text-main); font-size:1.2rem;">${p.charAt(0).toUpperCase()}</div>
                            <div style="font-size:1.2rem; font-weight:800; color:white;">${p} ${isMe}</div>
                        </div>
                        <div style="font-size:0.8rem; color:var(--text-dim); margin-bottom:10px; font-weight:bold;">الأسلحة المتاحة:</div>
                        <div style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:20px;">${wList}</div>
                        <div style="font-size:0.8rem; color:var(--text-dim); margin-bottom:10px; font-weight:bold;">الآثار (الأدلة):</div>
                        <div style="display:flex; flex-wrap:wrap; gap:6px;">${eList}</div>
                    </div>
                `;
            });
            accuseGrid.innerHTML = accuseHtml;

        } catch(e) { console.error("Error drawing UI", e); }
    };

    let retries = 0;
    function safeRender() {
        if(window.currentRoomData && window.currentRoomData.roles) window.renderGameData();
        else if(retries < 15) { retries++; setTimeout(safeRender, 500); }
    }
    safeRender();

    window.addEventListener('popstate', function cleanUp() {
        document.body.classList.remove('in-game-mode');
        window.removeEventListener('popstate', cleanUp);
    });
</script>
