<style>
    /* =========================================================================
       1. الإخفاء الآمن: نخفي القوائم القديمة دون تدمير حاوية الموقع الأساسية
       ========================================================================= */
    body.in-game-mode .app-shell > .sidebar, 
    body.in-game-mode .app-shell > .right-sidebar, 
    body.in-game-mode .app-shell > .main-viewport > .top-header { display: none !important; }
    
    /* إخفاء الشريط السفلي القديم فقط */
    body.in-game-mode .bottom-bar:not(.game-mobile-bar) { display: none !important; }
    
    /* جعل الحاوية الديناميكية تملأ المساحة المتاحة بداخل حدود موقعك الأنيقة */
    body.in-game-mode .dynamic-content { 
        padding: 0 !important; 
        display: flex; 
        flex-direction: row; 
        height: 100vh; /* لتعبئة الشاشة رأسياً */
        overflow: hidden; 
    }

    /* =========================================================================
       2. الشريط الجانبي (نسخة طبق الأصل من الـ Sidebar الخاص بك)
       ========================================================================= */
    .game-specific-sidebar {
        position: relative !important; /* ليلتصق بالحاوية وليس بالشاشة */
        height: 100% !important;
        border-radius: 0 !important;
        background: var(--surface-panel);
        border-left: 1px solid rgba(255,255,255,0.05);
        z-index: 10;
        /* بقية خصائصه يأخذها تلقائياً من كلاس .sidebar الموجود في style.css */
    }

    /* منطقة المحتوى الداخلية (الأقسام) */
    .game-views-container { 
        flex: 1; position: relative; overflow: hidden; background: var(--bg-base); 
    }
    
    .g-section-view { 
        position: absolute; inset: 0; padding: 40px; padding-bottom: 120px; 
        opacity: 0; visibility: hidden; transition: 0.2s ease-in-out; 
        overflow-y: auto; scrollbar-width: none; 
    }
    .g-section-view::-webkit-scrollbar { display: none; }
    .g-section-view.active { opacity: 1; visibility: visible; z-index: 10; }

    /* =========================================================================
       3. بطاقات اللعبة الداخلية (متناسقة مع أسلوبك)
       ========================================================================= */
    .g-native-card { 
        background: var(--surface-panel); 
        border: 1px solid rgba(255,255,255,0.03); 
        border-radius: 20px; padding: 25px; margin-bottom: 20px; 
        box-shadow: var(--shadow-soft); transition: var(--trans-smooth); 
    }
    .g-native-card:hover { border-color: rgba(242, 39, 123, 0.15); box-shadow: var(--shadow-glow); }
    
    .g-page-title { color: var(--text-main); font-size: 1.6rem; margin-bottom: 25px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
    .g-page-title i { color: var(--accent-red); font-size: 2rem;}
    
    .g-badge { 
        background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); 
        border-radius: 12px; padding: 8px 12px; font-size: 0.85rem; 
        color: var(--text-main); font-weight: 700; display: inline-flex; align-items: center; gap: 6px; 
    }

    /* =========================================================================
       4. شريط الجوال (يظهر فقط للشاشات الصغيرة)
       ========================================================================= */
    .game-mobile-bar { display: none; }

    @media (max-width: 900px) {
        body.in-game-mode .dynamic-content { flex-direction: column; }
        .game-specific-sidebar { display: none !important; }
        .g-section-view { padding: 20px 15px 120px 15px; }
        
        /* هذا الشريط يقرأ كلاس .bottom-bar من style.css تماماً! */
        .game-mobile-bar { display: flex !important; z-index: 99999; }
    }
</style>

<aside class="sidebar game-specific-sidebar">
    <div class="logo" style="display: flex; justify-content: center; padding: 25px 0 20px 0; margin-bottom: 10px;">
        <img src="assets/images/logo.png" alt="Deception Logo" style="width: 45px; height: auto; object-fit: contain;">
    </div>
    
    <nav class="nav-menu">
        <button class="nav-btn active" onclick="window.switchGameTab('tab-game-settings', 0)"><i class="ph-fill ph-gear"></i></button>
        <button class="nav-btn" onclick="window.switchGameTab('tab-game-info', 1)"><i class="ph ph-identification-card"></i></button>
        <button class="nav-btn" onclick="window.switchGameTab('tab-game-accuse', 2)"><i class="ph ph-gavel"></i></button>
        <button class="nav-btn" onclick="window.switchGameTab('tab-game-evidence', 3)"><i class="ph ph-microscope"></i></button>
        <button class="nav-btn" onclick="window.switchGameTab('tab-game-items', 4)"><i class="ph ph-briefcase"></i></button>
    </nav>
</aside>

<main class="game-views-container">
    
    <div id="tab-game-settings" class="g-section-view active">
        <div style="max-width: 600px; margin: 0 auto;">
            <h2 class="g-page-title"><i class="ph-fill ph-gear"></i> الإعدادات</h2>
            <div class="g-native-card">
                <button class="modern-danger-btn" style="width: 100%; padding: 18px; font-size: 1.1rem;" onclick="window.gameEngine.requestLeaveGame()">
                    <i class="ph-bold ph-sign-out"></i> الخروج من اللعبة
                </button>
            </div>
        </div>
    </div>

    <div id="tab-game-info" class="g-section-view">
        <div style="max-width: 800px; margin: 0 auto;">
            <h2 class="g-page-title"><i class="ph-fill ph-identification-card"></i> هويتي السرية</h2>
            <div id="render-game-role" class="g-native-card" style="text-align: center; padding: 60px 20px;">
                <i class="ph-duotone ph-spinner ph-spin" style="font-size:3rem; color:var(--text-dim);"></i>
            </div>
        </div>
    </div>

    <div id="tab-game-accuse" class="g-section-view">
        <div style="max-width: 1000px; margin: 0 auto;">
            <h2 class="g-page-title"><i class="ph-fill ph-gavel"></i> منصة الاتهام</h2>
            <div id="render-game-accuse" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px;">
                <div class="g-native-card" style="text-align:center; grid-column: 1/-1;"><i class="ph-duotone ph-spinner ph-spin" style="font-size:3rem; color:var(--text-dim);"></i></div>
            </div>
        </div>
    </div>

    <div id="tab-game-evidence" class="g-section-view">
        <div style="max-width: 800px; margin: 0 auto;">
            <h2 class="g-page-title"><i class="ph-fill ph-microscope"></i> مسرح الجريمة</h2>
            <div class="g-native-card" style="text-align:center; padding: 80px 20px;">
                <i class="ph-duotone ph-file-magnifying-glass" style="font-size:4rem; color:var(--text-dim); margin-bottom:15px; opacity:0.5;"></i>
                <h3 style="color:var(--text-main); margin-bottom:10px;">لا توجد أدلة بعد</h3>
                <p style="color:var(--text-dim);">تلميحات الطبيب الشرعي ستظهر هنا.</p>
            </div>
        </div>
    </div>

    <div id="tab-game-items" class="g-section-view">
        <div style="max-width: 800px; margin: 0 auto;">
            <h2 class="g-page-title"><i class="ph-fill ph-briefcase"></i> أسلحتي وآثاري</h2>
            <div id="render-game-items" class="g-native-card" style="text-align: center; padding: 60px 20px;">
                <i class="ph-duotone ph-spinner ph-spin" style="font-size:3rem; color:var(--text-dim);"></i>
            </div>
        </div>
    </div>

</main>

<nav class="bottom-bar game-mobile-bar">
    <button class="bottom-tab active" onclick="window.switchGameTab('tab-game-settings', 0)"><i class="ph-fill ph-gear"></i></button>
    <button class="bottom-tab" onclick="window.switchGameTab('tab-game-info', 1)"><i class="ph ph-identification-card"></i></button>
    <button class="bottom-tab" onclick="window.switchGameTab('tab-game-accuse', 2)"><i class="ph ph-gavel"></i></button>
    <button class="bottom-tab" onclick="window.switchGameTab('tab-game-evidence', 3)"><i class="ph ph-microscope"></i></button>
    <button class="bottom-tab" onclick="window.switchGameTab('tab-game-items', 4)"><i class="ph ph-briefcase"></i></button>
</nav>

<script>
    document.body.classList.add('in-game-mode');

    // 1. نظام التنقل الموحد (يُحدث شريط الكمبيوتر والجوال معاً)
    window.switchGameTab = function(tabId, index) {
        document.querySelectorAll('.g-section-view').forEach(s => s.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');

        // تحديث أزرار الكمبيوتر الأصلية
        const desktopBtns = document.querySelectorAll('.game-specific-sidebar .nav-btn');
        desktopBtns.forEach(b => {
            b.classList.remove('active');
            b.querySelector('i').classList.remove('ph-fill');
            b.querySelector('i').classList.add('ph');
        });
        if(desktopBtns[index]) {
            desktopBtns[index].classList.add('active');
            desktopBtns[index].querySelector('i').classList.remove('ph');
            desktopBtns[index].querySelector('i').classList.add('ph-fill');
        }

        // تحديث أزرار الجوال الأصلية
        const mobileBtns = document.querySelectorAll('.game-mobile-bar .bottom-tab');
        mobileBtns.forEach(b => {
            b.classList.remove('active');
            b.querySelector('i').classList.remove('ph-fill');
            b.querySelector('i').classList.add('ph');
        });
        if(mobileBtns[index]) {
            mobileBtns[index].classList.add('active');
            mobileBtns[index].querySelector('i').classList.remove('ph');
            mobileBtns[index].querySelector('i').classList.add('ph-fill');
        }
    };

    // 2. المحرك السلس لعرض البيانات (بدون تعليق)
    window.renderGameData = function() {
        try {
            if(!window.currentRoomData || !window.currentRoomData.roles) return;
            
            const myName = window.currentUserData ? window.currentUserData.username_lower : 'unknown';
            const allPlayers = window.currentRoomData.players || [];
            
            let myRole = 'investigator';
            for (const [k, v] of Object.entries(window.currentRoomData.roles)) {
                if (k.toLowerCase() === myName) { myRole = v; break; }
            }
            
            let myItems = null;
            if(window.currentRoomData.items) {
                for (const [k, v] of Object.entries(window.currentRoomData.items)) {
                    if (k.toLowerCase() === myName) { myItems = v; break; }
                }
            }

            // رسم الهوية
            const roleDiv = document.getElementById('render-game-role');
            if(myRole === 'murderer') {
                roleDiv.innerHTML = `<i class="ph-duotone ph-knife" style="font-size:5rem; color:var(--accent-red); margin-bottom:15px;"></i><h2 style="color:var(--text-main); font-size:2.5rem; margin-bottom:10px;">أنت القاتل</h2><p style="color:var(--text-dim); font-size:1.1rem;">اختر سلاحك ودليلك وقم بخداعهم.</p>`;
            } else if(myRole === 'forensic') {
                roleDiv.innerHTML = `<i class="ph-duotone ph-microscope" style="font-size:5rem; color:#3498db; margin-bottom:15px;"></i><h2 style="color:var(--text-main); font-size:2.5rem; margin-bottom:10px;">الطبيب الشرعي</h2><p style="color:var(--text-dim); font-size:1.1rem;">أنت تعرف القاتل. وجه المحققين عبر التلميحات.</p>`;
            } else {
                roleDiv.innerHTML = `<i class="ph-duotone ph-magnifying-glass" style="font-size:5rem; color:var(--accent-green); margin-bottom:15px;"></i><h2 style="color:var(--text-main); font-size:2.5rem; margin-bottom:10px;">محقق</h2><p style="color:var(--text-dim); font-size:1.1rem;">اكتشف القاتل من خلال التلميحات والأدوات.</p>`;
            }

            // رسم أدواتي
            const itemsDiv = document.getElementById('render-game-items');
            if(myItems && myItems.weapons) {
                let wHtml = myItems.weapons.map(w => `<span class="g-badge"><i class="ph-fill ph-crosshair" style="color:var(--accent-red); margin-left:5px;"></i>${w}</span>`).join('');
                let eHtml = myItems.evidence.map(e => `<span class="g-badge"><i class="ph-fill ph-fingerprint" style="color:#3498db; margin-left:5px;"></i>${e}</span>`).join('');
                
                itemsDiv.innerHTML = `
                    <div style="text-align:right;">
                        <h3 style="color:var(--text-main); margin-bottom:15px;">الأسلحة المتاحة لك:</h3>
                        <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:30px;">${wHtml}</div>
                        <h3 style="color:var(--text-main); margin-bottom:15px;">الآثار (الأدلة):</h3>
                        <div style="display:flex; flex-wrap:wrap; gap:10px;">${eHtml}</div>
                    </div>
                `;
            }

            // رسم منصة الاتهام
            const accuseGrid = document.getElementById('render-game-accuse');
            let accuseHtml = '';
            allPlayers.forEach(p => {
                let pItems = window.currentRoomData.items ? window.currentRoomData.items[p] : {weapons:[], evidence:[]};
                let wList = pItems.weapons ? pItems.weapons.map(w => `<span class="g-badge" style="font-size:0.75rem; padding:5px 8px;">${w}</span>`).join('') : '';
                let eList = pItems.evidence ? pItems.evidence.map(e => `<span class="g-badge" style="font-size:0.75rem; padding:5px 8px;">${e}</span>`).join('') : '';
                let isMe = (p.toLowerCase() === myName) ? `<span style="color:var(--accent-green); font-size:0.8rem; margin-right:5px;">(أنت)</span>` : '';
                
                accuseHtml += `
                    <div class="g-native-card" style="margin-bottom:0; cursor:pointer;" onclick="alert('توجيه اتهام لـ: ${p}')">
                        <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:15px;">
                            <div style="width:45px; height:45px; border-radius:50%; background:rgba(255,255,255,0.05); display:flex; align-items:center; justify-content:center; font-weight:bold; color:var(--text-main);">${p.charAt(0).toUpperCase()}</div>
                            <div style="font-size:1.1rem; font-weight:800; color:var(--text-main);">${p} ${isMe}</div>
                        </div>
                        <div style="font-size:0.8rem; color:var(--text-dim); margin-bottom:8px;">الأسلحة:</div>
                        <div style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:15px;">${wList}</div>
                        <div style="font-size:0.8rem; color:var(--text-dim); margin-bottom:8px;">الأدلة:</div>
                        <div style="display:flex; flex-wrap:wrap; gap:5px;">${eList}</div>
                    </div>
                `;
            });
            accuseGrid.innerHTML = accuseHtml;

        } catch(e) { console.error("Error drawing UI", e); }
    };

    let retries = 0;
    function safeRender() {
        if(window.currentRoomData && window.currentRoomData.roles) window.renderGameData();
        else if(retries < 15) { retries++; setTimeout(safeRender, 500); }
    }
    safeRender();

    window.addEventListener('popstate', function cleanUp() {
        document.body.classList.remove('in-game-mode');
        window.removeEventListener('popstate', cleanUp);
    });
</script>
