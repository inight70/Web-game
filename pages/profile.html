<style>
    /* حركة الدخول الناعمة */
    .smooth-fade-in { animation: smoothFadeIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; transform: translateY(15px); }
    @keyframes smoothFadeIn { to { opacity: 1; transform: translateY(0); } }

    .profile-container { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 1000px; margin: 0 auto; padding-top: 10px; }

    /* شبكة البطاقات العلوية (معلومات الحساب والمظهر) */
    .top-profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    
    .profile-card { background-color: var(--surface-panel); border-radius: 20px; padding: 25px; border: 1px solid rgba(100,100,100,0.05); box-shadow: var(--shadow-soft); display: flex; flex-direction: column; justify-content: center; position: relative; }
    .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; color: var(--text-main); font-weight: 700; font-size: 1.1rem; }
    .card-header i { color: var(--accent-red); font-size: 1.4rem; }
    .info-list { display: flex; flex-direction: column; gap: 10px; color: var(--text-dim); font-size: 0.9rem; }
    .info-list span strong { color: var(--text-main); font-weight: 600; margin-inline-start: 5px; }

    /* دائرة الأفتار في بطاقة المظهر */
    .appearance-content { display: flex; align-items: center; justify-content: space-between; }
    .avatar-wrapper { width: 80px; height: 80px; border-radius: 50%; position: relative; cursor: pointer; border: 2px solid rgba(100,100,100,0.2); overflow: hidden; transition: var(--trans-smooth); background-color: var(--bg-base); display: flex; justify-content: center; align-items: center; }
    .avatar-wrapper:hover { border-color: var(--accent-red); box-shadow: 0 0 15px rgba(255, 76, 106, 0.3); }
    .avatar-img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: var(--trans-smooth); color: #fff; font-size: 0.7rem; font-weight: 700; gap: 5px; }
    .avatar-wrapper:hover .avatar-overlay { opacity: 1; }

    /* المستطيل الفخم (Destiny Banner Style) */
    .emblem-banner {
        position: relative;
        width: 100%;
        height: 140px;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        display: flex;
        align-items: center;
        padding: 0 30px;
        border: 1px solid rgba(255,255,255,0.05);
        cursor: pointer;
        transition: var(--trans-smooth);
        /* تم إضافة تدرج لوني أسود من اليسار لضمان قراءة الاسم، يليه الصورة */
        background-image: linear-gradient(to right, rgba(20, 20, 25, 0.95) 0%, rgba(20, 20, 25, 0.6) 40%, transparent 100%), url('assets/images/default-banner.png');
        background-size: cover;
        background-position: center right;
    }
    .emblem-banner:hover { transform: scale(1.01); border-color: rgba(255, 76, 106, 0.3); }
    
    .emblem-info { z-index: 2; display: flex; flex-direction: column; gap: 5px; }
    .emblem-username { font-size: 2.2rem; font-weight: 800; color: #fff; font-family: var(--font-en); letter-spacing: 1px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    .emblem-title { font-size: 0.85rem; color: var(--accent-red); font-weight: 700; background: rgba(0,0,0,0.4); padding: 4px 12px; border-radius: 100px; width: fit-content; backdrop-filter: blur(5px); }

    .edit-banner-icon { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.5); width: 35px; height: 35px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #fff; backdrop-filter: blur(5px); opacity: 0; transition: var(--trans-smooth); }
    [dir="rtl"] .edit-banner-icon { left: auto; right: 15px; }
    .emblem-banner:hover .edit-banner-icon { opacity: 1; }

    /* الأقسام السفلية (المعرض، المباريات، الإحصائيات) */
    .profile-tabs-nav { display: flex; gap: 10px; background: var(--surface-panel); padding: 8px; border-radius: 100px; margin-top: 10px; }
    .p-tab-btn { flex: 1; padding: 12px 0; border: none; background: transparent; color: var(--text-dim); font-weight: 700; font-size: 0.95rem; border-radius: 100px; cursor: pointer; transition: var(--trans-smooth); }
    .p-tab-btn.active { background: var(--accent-red); color: #fff; box-shadow: var(--shadow-glow); }

    .tab-content-area { background: var(--surface-panel); border-radius: 20px; padding: 30px; min-height: 250px; display: flex; justify-content: center; align-items: center; color: var(--text-dim); border: 1px solid rgba(100,100,100,0.05); }

    @media (max-width: 768px) {
        .top-profile-grid { grid-template-columns: 1fr; }
        .emblem-banner { height: 110px; padding: 0 20px; background-image: linear-gradient(to top, rgba(20, 20, 25, 0.9) 0%, rgba(20, 20, 25, 0.4) 100%), url('assets/images/default-banner.png'); justify-content: center; text-align: center; }
        .emblem-info { align-items: center; }
        .profile-tabs-nav { flex-wrap: wrap; border-radius: 16px; }
        .p-tab-btn { min-width: 40%; border-radius: 10px; }
    }
</style>

<div class="profile-container smooth-fade-in">
    
    <div class="top-profile-grid">
        <div class="profile-card">
            <div class="card-header"><i class="ph-fill ph-identification-card"></i> <span data-i18n="acc_info">معلومات الحساب</span></div>
            <div class="info-list">
                <span id="prof-email-disp">البريد: <strong>user@example.com</strong></span>
                <span id="prof-status-disp">الحالة: <strong style="color: var(--accent-green);">متصل</strong></span>
            </div>
        </div>

        <div class="profile-card">
            <div class="card-header"><i class="ph-fill ph-paint-brush-broad"></i> <span data-i18n="appearance">المظهر والأفتار</span></div>
            <div class="appearance-content">
                <div class="info-list">
                    <span data-i18n="click_avatar">اضغط على الصورة لتغييرها</span>
                    <button class="btn-secondary" style="padding: 8px 15px; font-size: 0.8rem; margin-top: 5px; border-radius: 8px;" onclick="window.toggleTheme(document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light')">
                        <i class="ph-duotone ph-moon-stars"></i> تبديل المظهر
                    </button>
                </div>
                <div class="avatar-wrapper" onclick="alert('نافذة اختيار ورفع الصورة ستبرمج هنا')">
                    <div style="font-size: 2rem; font-weight: bold; color: var(--text-dim);" id="prof-avatar-letter">؟</div>
                    <div class="avatar-overlay">
                        <i class="ph-bold ph-camera"></i>
                        <span data-i18n="upload">رفع</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="emblem-banner" onclick="alert('نافذة اختيار الخلفيات ستبرمج هنا')">
        <div class="edit-banner-icon"><i class="ph-bold ph-pencil-simple"></i></div>
        <div class="emblem-info">
            <div class="emblem-username" id="prof-banner-name">Player_Name</div>
            <div class="emblem-title" data-i18n="new_investigator">محقق مبتدئ</div>
        </div>
    </div>

    <div>
        <div class="profile-tabs-nav">
            <button class="p-tab-btn active" onclick="switchProfileTab(this, 'gallery')" data-i18n="gallery">المعرض</button>
            <button class="p-tab-btn" onclick="switchProfileTab(this, 'history')" data-i18n="match_history">آخر المباريات</button>
            <button class="p-tab-btn" onclick="switchProfileTab(this, 'stats')" data-i18n="statistics">الإحصائيات</button>
        </div>

        <div class="tab-content-area" id="profile-tab-content">
            <div style="text-align: center;">
                <i class="ph-duotone ph-backpack" style="font-size: 3rem; margin-bottom: 10px; opacity: 0.5;"></i>
                <div data-i18n="gallery_empty">المعرض فارغ، العب لاكتساب عناصر جديدة!</div>
            </div>
        </div>
    </div>

</div>

<script>
    // حقن اسم اللاعب الفعلي في الـ Banner إذا كان مسجلاً
    if(window.currentUserData) {
        document.getElementById('prof-banner-name').innerText = window.currentUserData.username;
        document.getElementById('prof-avatar-letter').innerText = window.currentUserData.username.charAt(0).toUpperCase();
        document.getElementById('prof-email-disp').innerHTML = `البريد: <strong style="font-family: var(--font-en);">${window.currentUserData.email}</strong>`;
    } else if (window.isGuest) {
        document.getElementById('prof-banner-name').innerText = window.translations[window.currentLang].guest_name;
        document.getElementById('prof-avatar-letter').innerText = "ز";
    }

    // دالة التبديل بين الأقسام
    function switchProfileTab(btn, tabName) {
        document.querySelectorAll('.p-tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const contentArea = document.getElementById('profile-tab-content');
        
        let html = '';
        if(tabName === 'gallery') {
            html = `<div style="text-align: center;"><i class="ph-duotone ph-backpack" style="font-size: 3rem; margin-bottom: 10px; opacity: 0.5;"></i><div data-i18n="gallery_empty">المعرض فارغ، العب لاكتساب عناصر جديدة!</div></div>`;
        } else if (tabName === 'history') {
            html = `<div style="text-align: center;"><i class="ph-duotone ph-clock-counter-clockwise" style="font-size: 3rem; margin-bottom: 10px; opacity: 0.5;"></i><div data-i18n="history_empty">لا توجد مباريات سابقة.</div></div>`;
        } else if (tabName === 'stats') {
            html = `<div style="text-align: center;"><i class="ph-duotone ph-chart-polar" style="font-size: 3rem; margin-bottom: 10px; opacity: 0.5;"></i><div data-i18n="stats_empty">العب مباريات لجمع الإحصائيات.</div></div>`;
        }
        
        contentArea.innerHTML = html;
        if(window.setLanguage) window.setLanguage(window.currentLang, true); // لتحديث الترجمة فوراً
    }
</script>
