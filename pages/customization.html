<style>
    /* تم منع الـ overflow:hidden في الآباء لمنع قص الوهج (Clipping) */
    .customization-container { max-width: 1100px; margin: 0 auto; padding: 20px 10px 40px 10px; animation: smoothFadeIn 0.5s ease forwards; display: flex; flex-direction: column; height: calc(100vh - 100px); }
    
    .cust-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; flex-shrink: 0; padding: 0 10px; }
    .btn-back-cust { width: 44px; height: 44px; border-radius: 50%; background: var(--surface-panel); border: 1px solid rgba(100,100,100,0.1); color: var(--text-main); display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
    .btn-back-cust:hover { background: var(--surface-hover); color: var(--accent-red); transform: translateX(3px); }
    .cust-title { font-size: 1.6rem; font-weight: 800; color: var(--text-main); }

    /* أزرار سلسة مع Padding يمنع قص الظلال */
    .cust-tabs-wrapper { margin-bottom: 15px; flex-shrink: 0; width: 100%; }
    .cust-tabs { display: flex; gap: 15px; overflow-x: auto; padding: 20px 10px; margin: -20px -10px; scrollbar-width: none; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; align-items: center; }
    .cust-tabs::-webkit-scrollbar { display: none; }
    
    .cust-tab-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(100,100,100,0.1); color: var(--text-dim); padding: 14px 24px; border-radius: 100px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; gap: 8px; flex-shrink: 0; white-space: nowrap; backdrop-filter: blur(10px); }
    .cust-tab-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-main); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
    .cust-tab-btn.active { background: var(--accent-red); color: white; border-color: var(--accent-red); box-shadow: 0 10px 30px rgba(255, 76, 106, 0.5); transform: translateY(-4px); }
    .cust-tab-btn i { font-size: 1.3rem; }
    
    .cust-content-area { flex: 1; overflow-y: auto; padding: 10px; scrollbar-width: none; }
    .cust-content-area::-webkit-scrollbar { display: none; }

    /* 1. تصميم الأمبلمات الحديث جداً (Modern UI Glassmorphism) */
    .grid-emblems { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; padding-bottom: 20px; }
    .emblem-card-preview { position: relative; height: 150px; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 8px 25px rgba(0,0,0,0.2); direction: ltr; background: #0f0f15; }
    .emblem-card-preview:hover:not(.locked) { transform: translateY(-8px); border-color: rgba(255, 76, 106, 0.6); box-shadow: 0 15px 35px rgba(255, 76, 106, 0.2); }
    
    .emblem-card-preview.equipped { border-color: var(--accent-green); box-shadow: 0 10px 40px rgba(46, 204, 113, 0.3); transform: scale(1.03); }
    .item-equipped-mark { position: absolute; top: 12px; left: 12px; background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.1rem; z-index: 10; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.5); animation: popIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 70% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); } }
    
    .emblem-bg-preview { position: absolute; inset: 0; background-size: cover; background-position: center; transition: 0.5s ease; opacity: 0.8; }
    .emblem-card-preview:hover .emblem-bg-preview { transform: scale(1.05); opacity: 1; }
    
    .emblem-glass-bar { position: absolute; bottom: 0; left: 0; right: 0; padding: 15px 20px; background: rgba(10, 10, 15, 0.6); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.05); color: white; font-weight: 800; font-size: 1.1rem; font-family: var(--font-en); text-align: left; z-index: 2; transition: 0.3s; }
    .emblem-card-preview:hover .emblem-glass-bar { background: rgba(10, 10, 15, 0.8); }

    .emblem-card-preview.locked { opacity: 0.6; cursor: not-allowed; filter: grayscale(0.8); }
    .item-locked-mark { position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; gap: 8px; backdrop-filter: blur(3px); }
    .item-locked-mark i { font-size: 2.5rem; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    .item-locked-text { font-size: 0.85rem; font-weight: bold; background: rgba(0,0,0,0.7); padding: 6px 16px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.1); }

    /* 2. الشارات (Badges) */
    .grid-small-items { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 20px; padding-bottom: 20px; }
    .small-item-card { background: rgba(255,255,255,0.02); border-radius: 20px; padding: 25px 10px; display: flex; flex-direction: column; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; backdrop-filter: blur(10px); }
    .small-item-card:hover:not(.locked) { transform: translateY(-8px); border-color: rgba(255, 76, 106, 0.5); box-shadow: 0 10px 25px rgba(255, 76, 106, 0.15); }
    .small-item-card.equipped { border-color: var(--accent-green); background: rgba(46, 204, 113, 0.05); transform: scale(1.05); }
    .small-item-card.locked { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
    
    .badge-icon { width: 70px; height: 70px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; transition: 0.3s; }
    .small-item-card:hover .badge-icon { transform: scale(1.1); }
    .small-item-title { font-size: 0.9rem; font-weight: bold; color: var(--text-main); text-align: center; }

    /* 3. الألقاب (Titles) */
    .grid-titles { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; padding-bottom: 20px; }
    .title-card { background: rgba(255,255,255,0.02); border-radius: 16px; padding: 20px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; overflow: hidden; backdrop-filter: blur(10px); }
    .title-card:hover:not(.locked) { border-color: gold; transform: translateX(-5px); background: rgba(255, 215, 0, 0.05); box-shadow: 0 10px 25px rgba(255, 215, 0, 0.15); }
    .title-card.equipped { border-color: var(--accent-green); background: rgba(46, 204, 113, 0.05); transform: scale(1.02); }
    .title-card.locked { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
    .title-text { font-size: 1.15rem; font-weight: 800; color: gold; text-transform: uppercase; letter-spacing: 1px; }

    /* 4. رسالة الأقسام قيد التطوير (للخرائط) */
    .coming-soon-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 40vh; text-align: center; gap: 15px; background: rgba(255,255,255,0.02); border-radius: 24px; border: 1px dashed rgba(255,255,255,0.1); }
    .coming-soon-box i { font-size: 4rem; color: var(--text-dim); opacity: 0.5; }
    .coming-soon-box h3 { color: var(--text-main); font-size: 1.5rem; margin: 0; }

    @media (max-width: 768px) {
        .grid-emblems { grid-template-columns: 1fr; }
        .emblem-card-preview { height: 130px; }
    }
</style>

<div class="customization-container">
    <div class="cust-header">
        <button class="btn-back-cust" onclick="window.loadFragment('profile')"><i class="ph-bold ph-arrow-right"></i></button>
        <h2 class="cust-title">تعديلات المظهر</h2>
    </div>

    <div class="cust-tabs-wrapper">
        <div class="cust-tabs">
            <!-- أيقونات جديدة بدون إنجليزي، وإضافة الخرائط، وحذف الأفتارات -->
            <button class="cust-tab-btn" id="tab-emblems" onclick="switchCustTab('emblems', this)"><i class="ph-duotone ph-panorama"></i> الخلفيات</button>
            <button class="cust-tab-btn" id="tab-badges" onclick="switchCustTab('badges', this)"><i class="ph-duotone ph-shield-star"></i> الشارات</button>
            <button class="cust-tab-btn" id="tab-titles" onclick="switchCustTab('titles', this)"><i class="ph-duotone ph-crown"></i> الألقاب</button>
            <button class="cust-tab-btn" id="tab-maps" onclick="switchCustTab('maps', this)"><i class="ph-duotone ph-map-trifold"></i> الخرائط</button>
        </div>
    </div>

    <div class="cust-content-area" id="dynamic-content-renderer"></div>
</div>

<script>
    // قاعدة بيانات الأصول (Assets)
    const gameAssets = {
        emblems: window.globalStoreEmblems || [
            { id: 'default', name: 'افتراضي', src: 'assets/images/default-emblem.png', locked: false, req: '' },
            { id: 'blue', name: 'أزرق', src: 'assets/images/emblem-blue.png', locked: false, req: '' },
            { id: 'green', name: 'أخضر', src: 'assets/images/emblem-green.png', locked: true, req: 'افتح المستوى 5' }
        ],
        badges: window.globalStoreBadges || [
            { id: 'beginner', name: 'مبتدئ', icon: 'ph-shield-star', color: '#ff4c6a', locked: false, req: '' }
        ],
        titles: window.globalStoreTitles || [
            { id: 'none', name: 'بدون لقب', locked: false, req: '' }
        ]
    };

    const renderer = document.getElementById('dynamic-content-renderer');
    const userData = window.currentUserData || {};

    function renderEmblems() {
        let html = '<div class="grid-emblems">';
        gameAssets.emblems.forEach(item => {
            const isEquipped = userData.emblem === item.src || (item.id === 'default' && !userData.emblem);
            const statusClass = item.locked ? 'locked' : (isEquipped ? 'equipped' : '');
            const checkMark = isEquipped ? `<div class="item-equipped-mark"><i class="ph-bold ph-check"></i></div>` : '';
            const lockOverlay = item.locked ? `<div class="item-locked-mark"><i class="ph-fill ph-lock-key"></i><span class="item-locked-text">${item.req}</span></div>` : '';
            
            html += `
                <div class="emblem-card-preview ${statusClass}" data-type="emblem" data-val="${item.src}" onclick="!${item.locked} && handleSelection(this, 'emblem', '${item.src}')">
                    ${checkMark}
                    <div class="emblem-bg-preview" style="background-image: url('${item.src}');"></div>
                    ${lockOverlay}
                    <div class="emblem-glass-bar">${item.name}</div>
                </div>
            `;
        });
        html += '</div>';
        renderer.innerHTML = html;
    }

    function renderBadges() {
        let html = '<div class="grid-small-items">';
        gameAssets.badges.forEach(item => {
            const isEquipped = userData.badge === item.id || (item.id === 'beginner' && !userData.badge);
            const statusClass = item.locked ? 'locked' : (isEquipped ? 'equipped' : '');
            const checkMark = isEquipped ? `<div class="item-equipped-mark" style="top:8px; left:8px; width:24px; height:24px;"><i class="ph-bold ph-check" style="font-size:0.8rem;"></i></div>` : '';
            
            html += `
                <div class="small-item-card ${statusClass}" data-type="badge" data-val="${item.id}" onclick="!${item.locked} && handleSelection(this, 'badge', '${item.id}')">
                    ${checkMark}
                    <div class="badge-icon" style="background: ${item.color}15; color: ${item.color}; border: 1px solid ${isEquipped ? 'transparent' : item.color}40;">
                        ${item.locked ? '<i class="ph-fill ph-lock-key"></i>' : `<i class="ph-fill ${item.icon}"></i>`}
                    </div>
                    <span class="small-item-title">${item.locked ? 'مغلق' : item.name}</span>
                </div>
            `;
        });
        html += '</div>';
        renderer.innerHTML = html;
    }

    function renderTitles() {
        let html = '<div class="grid-titles">';
        gameAssets.titles.forEach(item => {
            const isEquipped = userData.title === item.name || (item.id === 'none' && (!userData.title || userData.title === 'none'));
            const statusClass = item.locked ? 'locked' : (isEquipped ? 'equipped' : '');
            const checkMark = isEquipped ? `<div class="item-equipped-mark" style="position:relative; top:0; left:0; width:28px; height:28px;"><i class="ph-bold ph-check" style="font-size:0.9rem;"></i></div>` : '';
            const lockIcon = item.locked ? `<i class="ph-fill ph-lock-key" style="color:var(--text-dim); font-size:1.5rem;"></i>` : '';
            
            html += `
                <div class="title-card ${statusClass}" data-type="title" data-val="${item.name}" onclick="!${item.locked} && handleSelection(this, 'title', '${item.id === 'none' ? 'none' : item.name}')">
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <span class="title-text" style="${item.locked ? 'color:var(--text-dim);' : ''}">${item.name}</span>
                        ${item.locked ? `<span style="font-size:0.75rem; color:var(--text-dim); background:rgba(0,0,0,0.3); padding:4px 8px; border-radius:6px;">${item.req}</span>` : ''}
                    </div>
                    ${item.locked ? lockIcon : checkMark}
                </div>
            `;
        });
        html += '</div>';
        renderer.innerHTML = html;
    }

    function renderMaps() {
        renderer.innerHTML = `
            <div class="coming-soon-box">
                <i class="ph-duotone ph-map-trifold"></i>
                <h3>قسم الخرائط</h3>
                <p style="color: var(--text-dim); font-size: 0.9rem;">سيتم تفعيل هذا القسم قريباً لاختيار خرائط اللعب المخصصة.</p>
            </div>
        `;
    }

    window.switchCustTab = function(tabName, btnElement) {
        document.querySelectorAll('.cust-tab-btn').forEach(b => b.classList.remove('active'));
        if(btnElement) {
            btnElement.classList.add('active');
            btnElement.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
        
        if(tabName === 'emblems') renderEmblems();
        else if(tabName === 'badges') renderBadges();
        else if(tabName === 'titles') renderTitles();
        else if(tabName === 'maps') renderMaps();
    };

    window.handleSelection = async function(element, type, value) {
        const container = element.parentElement;
        
        container.querySelectorAll('.equipped').forEach(el => {
            el.classList.remove('equipped');
            const mark = el.querySelector('.item-equipped-mark');
            if(mark) mark.remove();
        });

        element.classList.add('equipped');
        let markHTML = `<div class="item-equipped-mark"><i class="ph-bold ph-check"></i></div>`;
        if(type === 'badge') markHTML = `<div class="item-equipped-mark" style="top:8px; left:8px; width:24px; height:24px;"><i class="ph-bold ph-check" style="font-size:0.8rem;"></i></div>`;
        if(type === 'title') markHTML = `<div class="item-equipped-mark" style="position:relative; top:0; left:0; width:28px; height:28px;"><i class="ph-bold ph-check" style="font-size:0.9rem;"></i></div>`;
        
        element.insertAdjacentHTML('afterbegin', markHTML);

        window.currentUserData[type] = value;

        if(window.authInstance && window.authInstance.currentUser) {
            let updateData = {};
            updateData[type] = value;
            try {
                await window.updateDocFunc(window.docFunc(window.dbInstance, "users", window.authInstance.currentUser.uid), updateData);
            } catch(e) { console.error("Save error: ", e); }
        }
    };

    // حل مشكلة (التعليق/الصفحة الفارغة) عبر التأكد من تشغيل الدالة بعد اكتمال بناء الصفحة
    setTimeout(() => {
        let initialTab = window.targetCustomizationTab || 'emblems';
        let targetBtn = document.getElementById(`tab-${initialTab}`);
        if(targetBtn) {
            window.switchCustTab(initialTab, targetBtn);
        } else {
            window.switchCustTab('emblems', document.getElementById('tab-emblems'));
        }
    }, 50);

</script>
