<style>
    .friends-page-container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px; animation: smoothFadeIn 0.5s ease forwards; display: flex; flex-direction: column; height: calc(100vh - 80px); }
    .friends-header { font-size: 1.8rem; font-weight: 900; color: var(--text-main); margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
    
    /* شبكة عرض الأصدقاء المتكيفة */
    .friends-grid { display: grid; gap: 20px; align-items: start; padding-bottom: 80px; }

    /* =========================================
       1. تصميم الكمبيوتر (Desktop) - أفتارات دائرية
       ========================================= */
    .friend-desktop-view { display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; transition: 0.3s; padding: 15px; border-radius: 20px; border: 1px solid transparent; }
    .friend-desktop-view:hover { background: var(--surface-panel); border-color: rgba(255, 76, 106, 0.3); transform: translateY(-5px); }
    .fd-avatar-wrapper { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--surface-hover); overflow: hidden; position: relative; transition: 0.3s; }
    .friend-desktop-view:hover .fd-avatar-wrapper { border-color: var(--accent-red); box-shadow: 0 10px 20px rgba(255, 76, 106, 0.4); }
    .fd-avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    .fd-name { font-weight: 700; color: var(--text-main); font-size: 0.95rem; font-family: var(--font-en); text-align: center; }

    /* =========================================
       2. تصميم الجوال (Mobile) - بطاقات أمبلم كاملة
       ========================================= */
    .friend-mobile-wrapper { display: flex; flex-direction: column; width: 100%; max-width: 450px; margin: 0 auto; border-radius: 24px; overflow: hidden; background: var(--surface-panel); box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); }
    .friend-mobile-wrapper.active { border-color: var(--accent-red); box-shadow: 0 15px 30px rgba(255, 76, 106, 0.2); }
    
    .friend-mobile-card { position: relative; height: 130px; cursor: pointer; display: flex; align-items: center; padding: 0 20px; gap: 15px; overflow: hidden; }
    .fm-bg { position: absolute; inset: 0; background-size: cover; background-position: right center; z-index: 1; transition: 0.5s; }
    .friend-mobile-card:hover .fm-bg { transform: scale(1.05); }
    .fm-overlay { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 100%); z-index: 2; }
    
    .fm-content { position: relative; z-index: 3; display: flex; align-items: center; gap: 15px; width: 100%; }
    .fm-avatar { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--accent-green); overflow: hidden; flex-shrink: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.5); position: relative; }
    .fm-avatar img { width: 100%; height: 100%; object-fit: cover; }
    
    /* البادج الصغير فوق الأفتار */
    .fm-badge { position: absolute; bottom: -5px; right: -5px; width: 24px; height: 24px; background: rgba(0,0,0,0.8); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px); }

    .fm-info { display: flex; flex-direction: column; gap: 5px; }
    .fm-name { font-size: 1.4rem; font-weight: 900; color: white; font-family: var(--font-en); line-height: 1; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }
    .fm-title { font-size: 0.75rem; font-weight: bold; color: gold; background: rgba(0,0,0,0.6); padding: 2px 10px; border-radius: 100px; width: fit-content; border: 1px solid rgba(255,215,0,0.3); }

    /* الأزرار المنسدلة في الجوال */
    .fm-actions-dropdown { display: flex; flex-direction: column; gap: 8px; padding: 0 20px; max-height: 0; overflow: hidden; opacity: 0; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); background: rgba(0,0,0,0.2); }
    .friend-mobile-wrapper.active .fm-actions-dropdown { max-height: 200px; padding: 15px 20px; opacity: 1; }

    /* =========================================
       3. النافذة المنبثقة للكمبيوتر (Modal)
       ========================================= */
    .friend-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 9999; display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.3s ease; }
    .friend-modal-content { background: var(--surface-panel); width: 90%; max-width: 450px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; transform: scale(0.9); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; }
    
    /* عرض الأمبلم داخل النافذة (نفس تصميم الجوال تقريباً لكن ثابت) */
    .modal-emblem-header { position: relative; height: 150px; display: flex; align-items: center; padding: 0 25px; }
    .modal-actions-body { padding: 25px; display: flex; flex-direction: column; gap: 12px; background: var(--bg-base); }

    /* =========================================
       4. تصميم الأزرار الموحدة (جوال وكمبيوتر)
       ========================================= */
    .btn-f-action { width: 100%; padding: 12px 15px; border-radius: 14px; font-size: 0.95rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; border: none; }
    .btn-f-profile { background: rgba(255, 255, 255, 0.05); color: var(--text-main); border: 1px solid rgba(255,255,255,0.1); }
    .btn-f-profile:hover { background: rgba(255, 255, 255, 0.15); color: white; }
    .btn-f-history { background: rgba(46, 204, 113, 0.1); color: var(--accent-green); border: 1px solid rgba(46, 204, 113, 0.2); }
    .btn-f-history:hover { background: var(--accent-green); color: white; }
    .btn-f-delete { background: rgba(255, 76, 106, 0.1); color: var(--accent-red); border: 1px solid rgba(255, 76, 106, 0.2); }
    .btn-f-delete:hover { background: var(--accent-red); color: white; }

    /* =========================================
       5. التحكم بالظهور (Media Queries)
       ========================================= */
    /* الافتراضي (للكمبيوتر): نعرض الأفتارات الدائرية ونخفي بطاقات الجوال */
    .friends-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
    .d-mobile-only { display: none !important; }
    .d-desktop-only { display: flex !important; }

    /* شاشات الجوال: نعرض بطاقات الأمبلم ونخفي الأفتارات الدائرية */
    @media (max-width: 768px) {
        .friends-grid { grid-template-columns: 1fr; padding-bottom: 100px; }
        .d-mobile-only { display: flex !important; }
        .d-desktop-only { display: none !important; }
    }
</style>

<div class="friends-page-container">
    <div class="friends-header">
        <i class="ph-duotone ph-users-three" style="color: var(--accent-red);"></i> قائمة الأصدقاء
    </div>

    <div class="friends-grid" id="friends-list-renderer">
        </div>
</div>

<div class="friend-modal-overlay" id="desktop-friend-modal" onclick="window.closeFriendModal(event)">
    <div class="friend-modal-content" id="desktop-friend-modal-content" onclick="event.stopPropagation()">
        <div class="modal-emblem-header">
            <div class="fm-bg" id="modal-f-bg" style="background-image: url('assets/images/default-emblem.png');"></div>
            <div class="fm-overlay"></div>
            <div class="fm-content">
                <div class="fm-avatar">
                    <img id="modal-f-avatar" src="https://i.ibb.co/Vvz3zJ5/default-avatar.png">
                    <div class="fm-badge" id="modal-f-badge-container"><i class="ph-fill ph-shield-star" id="modal-f-badge" style="color:white;"></i></div>
                </div>
                <div class="fm-info">
                    <div class="fm-name" id="modal-f-name">Player</div>
                    <div class="fm-title" id="modal-f-title">بدون لقب</div>
                </div>
            </div>
            <button onclick="window.closeFriendModal()" style="position:absolute; top:15px; right:15px; z-index:10; background:rgba(0,0,0,0.5); border:none; color:white; width:30px; height:30px; border-radius:50%; cursor:pointer; display:flex; justify-content:center; align-items:center; backdrop-filter:blur(5px);"><i class="ph-bold ph-x"></i></button>
        </div>
        
        <div class="modal-actions-body">
            <button class="btn-f-action btn-f-profile" onclick="window.goToFriendProfile()"><i class="ph-bold ph-user"></i> عرض الملف الشخصي</button>
            <button class="btn-f-action btn-f-history" onclick="window.goToFriendHistory()"><i class="ph-bold ph-clock-counter-clockwise"></i> سجل المباريات</button>
            <button class="btn-f-action btn-f-delete" onclick="window.deleteFriend()"><i class="ph-bold ph-user-minus"></i> حذف صديق</button>
        </div>
    </div>
</div>
