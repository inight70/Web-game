<style>
    .friends-page-container { max-width: 800px; margin: 0 auto; padding: 20px 10px 80px 10px; animation: smoothFadeIn 0.5s ease forwards; display: flex; flex-direction: column; height: calc(100vh - 100px); }
    
    .friends-header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-shrink: 0; }
    .friends-title-group { display: flex; align-items: center; gap: 15px; }
    .friends-icon { width: 50px; height: 50px; background: rgba(46, 204, 113, 0.1); color: var(--accent-green); border-radius: 16px; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; }
    .friends-title { font-size: 1.8rem; font-weight: 800; color: var(--text-main); }
    
    .add-friend-btn-circle { width: 44px; height: 44px; border-radius: 50%; background-color: var(--surface-panel); border: 1px dashed var(--text-dim); color: var(--text-dim); display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; transition: var(--trans-smooth); box-shadow: var(--shadow-soft); }
    .add-friend-btn-circle:hover { border-color: var(--text-main); color: var(--text-main); background: var(--surface-hover); transform: rotate(90deg); }

    #mobile-friends-wrapper { flex: 1; overflow-y: auto; padding: 5px; scrollbar-width: none; display: flex; flex-direction: column; gap: 18px; }
    #mobile-friends-wrapper::-webkit-scrollbar { display: none; }

    /* إجبار الصف على LTR ليكون الأفتار على اليسار دائماً قبل الأمبلم */
    .friend-row { display: flex; align-items: center; gap: 15px; width: 100%; cursor: pointer; transition: 0.3s; direction: ltr !important; }
    .friend-row:hover .friend-emblem-card { border-color: var(--accent-green); transform: translateY(-3px); }
    .friend-row:hover .friend-avatar-outside { border-color: var(--accent-green); transform: scale(1.05); }

    /* تكبير دائرة الأفتار لتبان النقطة بوضوح */
    .friend-avatar-outside { width: 65px; height: 65px; border-radius: 50%; background: var(--surface-panel); border: 2px solid rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; font-size: 1.4rem; font-weight: bold; color: white; position: relative; flex-shrink: 0; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s; overflow: hidden; z-index: 5; }
    .friend-avatar-outside img { width: 100%; height: 100%; object-fit: cover; }
    .online-dot-large { position: absolute; bottom: 2px; right: 2px; width: 16px; height: 16px; background: var(--accent-green); border: 2px solid var(--surface-panel); border-radius: 50%; box-shadow: 0 0 10px var(--accent-green); }

    /* الأمبلم الخالي من الظلال */
    .friend-emblem-card { flex: 1; position: relative; height: 90px; border-radius: 20px; overflow: hidden; box-shadow: var(--shadow-soft); border: 2px solid transparent; transition: var(--trans-smooth); background-color: #1a1a24; }
    .friend-emblem-bg { position: absolute; inset: 0; background-size: cover; background-position: right center; background-repeat: no-repeat; }
    
    .friend-emblem-content { position: relative; z-index: 2; height: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 12px; padding: 0 15px; }
    
    .friend-text-group { display: flex; flex-direction: column; justify-content: center; align-items: flex-start; }
    /* زيادة الظل خلف النص فقط ليكون مقروءاً بدون ظل جانبي للأمبلم */
    .friend-name { font-size: 1.5rem; font-weight: 800; color: white; font-family: var(--font-en); text-shadow: 0 2px 8px rgba(0,0,0,0.9); letter-spacing: 0.5px; line-height: 1; margin-bottom: 4px; }
    .friend-title { font-size: 0.65rem; font-weight: 700; padding: 2px 10px; background: rgba(0,0,0,0.6); border-radius: 6px; backdrop-filter: blur(5px); border: 1px solid rgba(255,215,0,0.5); color: gold; text-transform: uppercase; letter-spacing: 1px; display: inline-block; }
</style>

<div class="friends-page-container">
    <div class="friends-header-section">
        <div class="friends-title-group">
            <div class="friends-icon"><i class="ph-fill ph-users"></i></div>
            <h2 class="friends-title">الأصدقاء</h2>
        </div>
        <button class="add-friend-btn-circle" onclick="window.openAddFriendModal()">
            <i class="ph-bold ph-plus"></i>
        </button>
    </div>

    <div id="mobile-friends-wrapper"></div>
</div>
