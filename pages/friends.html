<style>
    /* 1. تنسيقات قائمة الأصدقاء (لتجميل عرض الصديق قبل الضغط عليه) */
    .friend-card-item { width: 100%; background: var(--surface-panel); border: 1px solid rgba(100,100,100,0.05); border-radius: 20px; padding: 15px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .friend-card-item:hover { transform: translateY(-3px); border-color: rgba(255, 76, 106, 0.4); }
    
    .friend-info-group { display: flex; align-items: center; gap: 15px; }
    .friend-avatar-mini { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--text-dim); object-fit: cover; background: var(--bg-base); }
    .friend-name-text { font-size: 1.1rem; font-weight: 800; color: var(--text-main); font-family: var(--font-en); margin-bottom: 3px; display: flex; flex-direction: column; }
    .friend-level-text { font-size: 0.75rem; color: var(--text-dim); font-weight: bold; display: flex; align-items: center; gap: 4px; }
    
    .friend-status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
    .friend-status-dot.offline { background: var(--text-dim); box-shadow: none; }

    /* 2. النافذة المنبثقة (Modal) لخيارات الصديق */
    .friend-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 9999; display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.3s ease; padding: 20px; }
    .friend-modal-content { background: var(--surface-panel); width: 100%; max-width: 420px; border-radius: 24px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 20px; transform: scale(0.9); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    
    /* رأس النافذة المنبثقة للرسميات */
    .f-modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(100,100,100,0.1); padding-bottom: 10px; }
    .f-modal-title { font-size: 1.1rem; font-weight: bold; color: var(--text-dim); }
    .f-close-btn { background: transparent; border: none; color: var(--text-dim); font-size: 1.5rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
    .f-close-btn:hover { color: var(--accent-red); }

    /* 3. تنسيق الأمبلم داخل النافذة (نفس فخامة البروفايل مصغر قليلاً ليتناسب مع الكرت) */
    .f-emblem-preview { position: relative; width: 100%; height: 130px; border-radius: 18px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; direction: ltr !important; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    .f-emblem-bg { position: absolute; inset: 0; background-size: cover; background-position: right center; background-repeat: no-repeat; z-index: 1; }
    .f-emblem-content { position: relative; z-index: 2; display: flex; align-items: center; justify-content: flex-start; gap: 15px; padding: 0 20px; width: 100%; height: 100%; }
    
    .f-emblem-badge { width: 50px; height: 50px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 1.5rem; backdrop-filter: blur(5px); flex-shrink: 0; }
    
    .f-emblem-text-group { display: flex; flex-direction: column; align-items: flex-start; justify-content: center; gap: 2px; }
    .f-emblem-name { font-size: 1.6rem; font-weight: 900; color: white; font-family: var(--font-en); text-shadow: 0 4px 10px rgba(0,0,0,0.8); line-height: 1; margin: 0; }
    .f-emblem-title { font-size: 0.7rem; font-weight: 800; color: rgba(255, 215, 0, 0.9); text-transform: uppercase; letter-spacing: 1px; padding: 2px 10px; background: rgba(0,0,0,0.6); border-radius: 100px; backdrop-filter: blur(5px); }
    .f-emblem-title.hidden { display: none; } /* لإخفاء اللقب إذا لم يكن لديه لقب */

    /* 4. أزرار الخيارات */
    .f-action-buttons { display: flex; flex-direction: column; gap: 10px; }
    .f-btn { width: 100%; padding: 14px; border-radius: 14px; font-size: 1rem; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    
    .f-btn-primary { background: var(--surface-hover); color: var(--text-main); border: 1px solid rgba(255,255,255,0.05); }
    .f-btn-primary:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
    
    .f-btn-danger { background: rgba(255, 76, 106, 0.1); color: var(--accent-red); border: 1px solid transparent; margin-top: 10px; }
    .f-btn-danger:hover { background: var(--accent-red); color: white; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255, 76, 106, 0.4); }
</style>

<!-- الحاوية الأساسية الخاصة بك -->
<div id="mobile-friends-wrapper" style="width:100%; max-width:400px; margin: 20px auto; display:flex; flex-direction:column; align-items:center; gap:15px;">
    <!-- سيتم تعبئة الأصدقاء هنا بواسطة جافاسكريبت -->
</div>

<!-- النافذة المنبثقة (Modal) التفاعلية لخيارات الصديق -->
<div class="friend-modal-overlay" id="friend-options-modal" onclick="window.closeFriendModal(event)">
    <div class="friend-modal-content" onclick="event.stopPropagation()">
        
        <div class="f-modal-header">
            <span class="f-modal-title">خيارات الصديق</span>
            <button class="f-close-btn" onclick="window.closeFriendModal()"><i class="ph-bold ph-x"></i></button>
        </div>

        <!-- الأمبلم الخاص بالصديق (يتم تحديثه برمجياً) -->
        <div class="f-emblem-preview">
            <div class="f-emblem-bg" id="modal-friend-emblem" style="background-image: url('assets/images/default-emblem.png');"></div>
            <div class="f-emblem-content">
                <div class="f-emblem-badge" id="modal-friend-badge">
                    <i class="ph-fill ph-shield-star"></i>
                </div>
                <div class="f-emblem-text-group">
                    <h3 class="f-emblem-name" id="modal-friend-name">Player</h3>
                    <span class="f-emblem-title" id="modal-friend-title">بدون لقب</span>
                </div>
            </div>
        </div>

        <!-- أزرار الإجراءات -->
        <div class="f-action-buttons">
            <button class="f-btn f-btn-primary" id="btn-view-profile" onclick="window.viewFriendProfile()">
                <i class="ph-bold ph-user-circle"></i> عرض الملف الشخصي
            </button>
            <button class="f-btn f-btn-primary" id="btn-view-history" onclick="window.viewFriendHistory()">
                <i class="ph-bold ph-clock-counter-clockwise"></i> عرض سجل المباريات
            </button>
            <button class="f-btn f-btn-danger" id="btn-remove-friend" onclick="window.removeFriendAction()">
                <i class="ph-bold ph-user-minus"></i> حذف صديق
            </button>
        </div>

    </div>
</div>

<script>
    // 1. مصفوفة وهمية للأصدقاء (حتى نقوم بربطها لاحقاً بـ Firebase)
    // لاحظ أن كل صديق يحمل بياناته الكاملة (الامبلم، اللقب، البادج)
    window.mockFriendsList = [
        { 
            id: 'u1', 
            name: 'Saud_99', 
            level: 15, 
            avatar: 'https://api.dicebear.com/9.x/lorelei/svg?seed=Felix', 
            emblem: 'assets/images/emblem-blue.png', 
            badge: 'ph-shield-check', 
            title: 'المحترف', 
            isOnline: true 
        },
        { 
            id: 'u2', 
            name: 'DarkKnight', 
            level: 8, 
            avatar: 'https://api.dicebear.com/9.x/lorelei/svg?seed=Loki', 
            emblem: 'assets/images/emblem-green.png', 
            badge: 'ph-sword', 
            title: '', // لا يملك لقب
            isOnline: false 
        },
        { 
            id: 'u3', 
            name: 'Milo_Game', 
            level: 22, 
            avatar: 'https://api.dicebear.com/9.x/lorelei/svg?seed=Milo', 
            emblem: 'assets/images/default-emblem.png', 
            badge: 'ph-crown', 
            title: 'الأسطورة', 
            isOnline: true 
        }
    ];

    // متغير لتخزين الـ ID الخاص بالصديق المختار حالياً في النافذة
    window.currentSelectedFriendId = null;

    // 2. دالة رسم قائمة الأصدقاء داخل الحاوية الخاصة بك
    window.renderFriendsList = function() {
        const wrapper = document.getElementById('mobile-friends-wrapper');
        if(!wrapper) return;
        
        let html = '';
        window.mockFriendsList.forEach(friend => {
            const statusClass = friend.isOnline ? '' : 'offline';
            const statusText = friend.isOnline ? 'متصل' : 'غير متصل';

            // عند الضغط على الكرت، يتم إرسال كائن الصديق كامل لدالة الفتح
            html += `
                <div class="friend-card-item" onclick='window.openFriendOptions(${JSON.stringify(friend)})'>
                    <div class="friend-info-group">
                        <img src="${friend.avatar}" class="friend-avatar-mini" alt="${friend.name}">
                        <div class="friend-name-text">
                            ${friend.name}
                            <span class="friend-level-text"><i class="ph-bold ph-star" style="color:gold;"></i> مستوى ${friend.level}</span>
                        </div>
                    </div>
                    <div class="friend-status-dot ${statusClass}" title="${statusText}"></div>
                </div>
            `;
        });

        wrapper.innerHTML = html;
    };

    // 3. دالة فتح النافذة المنبثقة وتعبئة بيانات الصديق داخل الأمبلم
    window.openFriendOptions = function(friendData) {
        window.currentSelectedFriendId = friendData.id;

        // تعبئة الأمبلم ببيانات الصديق المستدعاة
        document.getElementById('modal-friend-emblem').style.backgroundImage = `url('${friendData.emblem || 'assets/images/default-emblem.png'}')`;
        document.getElementById('modal-friend-name').innerText = friendData.name;
        document.getElementById('modal-friend-badge').innerHTML = `<i class="ph-fill ${friendData.badge || 'ph-shield-star'}"></i>`;

        // معالجة اللقب: إذا لم يكن لديه لقب، نخفي عنصر اللقب ليصبح المنظر أرتب
        const titleEl = document.getElementById('modal-friend-title');
        if(friendData.title && friendData.title.trim() !== '') {
            titleEl.innerText = friendData.title;
            titleEl.classList.remove('hidden');
        } else {
            titleEl.classList.add('hidden');
        }

        // إظهار النافذة بتأثير سلس
        const overlay = document.getElementById('friend-options-modal');
        const content = overlay.querySelector('.friend-modal-content');
        
        overlay.style.display = 'flex';
        setTimeout(() => {
            overlay.style.opacity = '1';
            content.style.transform = 'scale(1)';
        }, 10);
    };

    // 4. دالة إغلاق النافذة
    window.closeFriendModal = function(event) {
        // إذا كان الاستدعاء من الخلفية (overlay) وتأكدنا أن الضغطة ليست على المحتوى نفسه
        if (event && event.target.id !== 'friend-options-modal') return;

        const overlay = document.getElementById('friend-options-modal');
        const content = overlay.querySelector('.friend-modal-content');
        
        overlay.style.opacity = '0';
        content.style.transform = 'scale(0.9)';
        
        setTimeout(() => {
            overlay.style.display = 'none';
            window.currentSelectedFriendId = null;
        }, 300);
    };

    // 5. دوال الأزرار الثلاثة (مجهزة للمستقبل)
    window.viewFriendProfile = function() {
        console.log("عرض بروفايل الصديق رقم:", window.currentSelectedFriendId);
        window.closeFriendModal();
        // هنا الكود المستقبلي للانتقال لصفحة البروفايل الخاص به
        alert("سيتم نقلك لملف الصديق قريباً!");
    };

    window.viewFriendHistory = function() {
        console.log("عرض سجل الصديق رقم:", window.currentSelectedFriendId);
        window.closeFriendModal();
        // هنا الكود المستقبلي لعرض السجل
        alert("سيتم عرض سجل الصديق قريباً!");
    };

    window.removeFriendAction = function() {
        if(!window.currentSelectedFriendId) return;
        
        // رسالة تأكيد إضافية للحماية من الحذف بالخطأ
        const confirmDelete = confirm("هل أنت متأكد أنك تريد حذف هذا الصديق نهائياً؟");
        if(confirmDelete) {
            console.log("تم حذف الصديق رقم:", window.currentSelectedFriendId);
            // هنا كود الـ Firebase المستقبلي للحذف من المصفوفة
            
            // تحديث الواجهة محلياً للتجربة (حذف العنصر من المصفوفة الوهمية)
            window.mockFriendsList = window.mockFriendsList.filter(f => f.id !== window.currentSelectedFriendId);
            window.renderFriendsList();
            window.closeFriendModal();
        }
    };

    // تنفيذ دالة الرسم عند تحميل الصفحة
    setTimeout(() => {
        window.renderFriendsList();
    }, 100);

</script>
