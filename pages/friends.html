<style>
    .friends-page-container { max-width: 800px; margin: 0 auto; padding: 20px 10px 80px 10px; animation: smoothFadeIn 0.5s ease forwards; display: flex; flex-direction: column; height: calc(100vh - 100px); }
    
    .friends-header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-shrink: 0; }
    .friends-title-group { display: flex; align-items: center; gap: 15px; }
    .friends-icon { width: 50px; height: 50px; background: rgba(46, 204, 113, 0.1); color: var(--accent-green); border-radius: 16px; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; }
    .friends-title { font-size: 1.8rem; font-weight: 800; color: var(--text-main); }
    
    .btn-add-friend-large { background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px 20px; border-radius: 14px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(5px); }
    .btn-add-friend-large:hover { background: var(--accent-red); border-color: var(--accent-red); box-shadow: var(--shadow-glow); }

    /* حاوية قائمة الأصدقاء (يتم حقن الأمبلمات هنا) */
    #mobile-friends-wrapper { flex: 1; overflow-y: auto; padding: 5px; scrollbar-width: none; display: flex; flex-direction: column; gap: 15px; }
    #mobile-friends-wrapper::-webkit-scrollbar { display: none; }

    /* تنسيق أمبلم الصديق داخل القائمة (تصميم بطاقة كاملة) */
    .friend-emblem-card { position: relative; width: 100%; height: 110px; border-radius: 20px; overflow: hidden; box-shadow: var(--shadow-soft); border: 2px solid transparent; transition: var(--trans-smooth); cursor: pointer; direction: ltr !important; background-color: #1a1a24; flex-shrink: 0; }
    .friend-emblem-card:hover { border-color: var(--accent-green); transform: translateY(-3px); }
    .friend-emblem-bg { position: absolute; inset: 0; background-size: cover; background-position: right center; background-repeat: no-repeat; transition: 0.5s ease; }
    .friend-emblem-content { position: relative; z-index: 2; height: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; padding: 0 20px; }
    
    .friend-badge { width: 50px; height: 50px; background: rgba(255,255,255,0.1); border: 1px dashed rgba(255,255,255,0.4); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .friend-text-group { display: flex; flex-direction: column; justify-content: center; align-items: flex-start; }
    .friend-name { font-size: 1.6rem; font-weight: 800; color: white; font-family: var(--font-en); text-shadow: 0 2px 5px rgba(0,0,0,0.6); letter-spacing: 0.5px; line-height: 1; margin-bottom: 4px; }
    .friend-title { font-size: 0.7rem; font-weight: 700; padding: 2px 10px; background: rgba(0,0,0,0.5); border-radius: 6px; backdrop-filter: blur(5px); border: 1px solid rgba(255,215,0,0.5); color: gold; text-transform: uppercase; letter-spacing: 1px; display: inline-block; }

    /* النقطة الخضراء للحالة */
    .friend-status-dot { position: absolute; top: 15px; right: 15px; width: 12px; height: 12px; background: var(--accent-green); border-radius: 50%; box-shadow: 0 0 10px var(--accent-green); z-index: 5; }
</style>

<div class="friends-page-container">
    <div class="friends-header-section">
        <div class="friends-title-group">
            <div class="friends-icon"><i class="ph-fill ph-users"></i></div>
            <h2 class="friends-title">الأصدقاء</h2>
        </div>
        <button class="btn-add-friend-large" onclick="window.openAddFriendModal()">
            <i class="ph-bold ph-user-plus"></i> إضافة صديق
        </button>
    </div>

    <div id="mobile-friends-wrapper"></div>
</div>
